<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordenar e Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Alterado o fundo da página para branco para contrastar com a onda azul clara */
            --bg-page: #ffffff; 
            
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
            --text-main: #455a64;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page); /* Fundo branco para estabilidade */
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* CABEÇALHO LÍMPIDO - REMOVIDO BOX-SHADOW */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
            box-shadow: none; /* Garante que não há sombra */
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; gap: 10px; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        /* MENU LATERAL - HAMBURGER */
        .hamburger {
            cursor: pointer; background: rgba(255,255,255,0.3); border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 10px;
            transition: 0.3s;
        }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--azul-escuro); }
        .hamburger:hover { background: rgba(255,255,255,0.5); }

        /* BOTÃO VOLTAR */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 8px 16px; border-radius: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 0px #e68a00;
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
            transition: all 0.2s ease;
        }
        .btn-menu:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-menu:active { transform: translateY(3px); box-shadow: 0 1px 0px #e68a00; }

        /* ONDA LÍMPIDA - REMOVIDO DROP-SHADOW */
        .onda-container {
            height: 50px; 
            width: 100%; 
            overflow: hidden;
            margin-top: -1px; 
            flex-shrink: 0; 
            z-index: 10;
            position: relative;
            filter: none; /* Remove qualquer filtro de sombra */
        }

        .onda-container svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* PROGRESSO */
        .status-jogo { padding: 5px; flex-shrink: 0; margin-top: 10px; }
        .progresso-container {
            width: 90%; max-width: 600px; height: 12px; 
            background: white; border-radius: 10px; margin: 0 auto; 
            overflow: hidden; border: 2.5px solid rgba(46, 134, 222, 0.3);
        }
        .barra-progresso {
            width: 20%; height: 100%;
            background: var(--azul-vibrante);
            transition: width 0.5s ease;
        }

        #main-content { 
            flex: 1; display: flex; align-items: center; 
            justify-content: center; padding: 10px;
        }

        /* CARTÃO DO JOGO */
        .cartao {
            background: white; width: 92%; max-width: 600px; padding: 35px; border-radius: 35px; 
            border: 1.5px solid rgba(0, 145, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        /* SIDEBAR E OVERLAY IGUAIS */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar {
            background: #fff5f5; color: #ff4757; padding: 20px 25px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            font-weight: 600; border-bottom: 1px solid #ffebeb;
        }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; text-align: left; }
        .sidebar li a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; text-decoration: none;
            color: var(--text-main); font-weight: 400; 
            background: #f8fafc; border-radius: 12px; transition: 0.3s;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 199; backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* FOOTER */
        footer {
            height: 45px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }
        footer p { font-size: 0.85rem; color: var(--azul-escuro); }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()">
        <span>✕</span> Fechar
    </div>
    <ul>
        <li><a href="#">🏠 Início</a></li>
        <li><a href="#">📝 Atividades</a></li>
        <li><a href="#">🏆 Recordes</a></li>
        <li><a href="#">⚙️ Definições</a></li>
        <li><a href="#">👤 Perfil</a></li>
        <li><a href="#">❓ Ajuda</a></li>
    </ul>
</nav>

<header class="cabecalho">
    <div class="header-left">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/1F4DD.svg" style="width:60px" alt="ícone">
        <h1>Escrever Sílabas</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="progresso-container">
        <div id="progressoInterno" class="barra-progresso"></div>
    </div>
</div>

<main id="main-content">
    <div class="cartao">
        <p>A carregar jogo...</p>
    </div>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>
</body>
</html>
