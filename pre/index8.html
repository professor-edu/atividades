<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8; /* Cor do fundo do body */
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --grad-header: linear-gradient(90deg, #bde6ff 0%, #2e86de 100%);
            --text-main: #2c3e50;
            --accent: #ff9800;
        }

        body { 
            font-family: 'Fredoka', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* HEADER COM 3 COLUNAS PARA CENTRAMENTO PERFEITO */
        .cabecalho { 
            background: var(--grad-header); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 110px; 
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }

        /* Colunas laterais e central */
        .header-left, .header-right { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex: 2; /* Espaço central maior para o título */
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .img-titulo { width: 70px; height: auto; }

        /* BOTÕES DO HEADER */
        .btn-header {
            background: var(--accent); color: white; border: none;
            padding: 8px 15px; border-radius: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 0px #e68a00;
            font-size: 0.9rem; display: flex; align-items: center; gap: 5px;
            transition: 0.2s;
        }
        .btn-header:active { transform: translateY(3px); box-shadow: 0 1px 0px #e68a00; }

        /* HAMBURGUER */
        .hamburger {
            cursor: pointer; background: none; border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 5px;
        }
        .hamburger span {
            display: block; width: 25px; height: 3px; 
            background: var(--azul-escuro); border-radius: 2px;
        }

        /* ONDA INTEGRADA - SEM SHADOWS */
        .onda-container {
            position: absolute;
            bottom: -1px; /* Evita frestas de 1px entre div e svg */
            left: 0;
            width: 100%;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }
        .onda-container svg { width: 100%; height: 100%; display: block; }
        .onda-fill { fill: var(--bg-body); } /* Cor exata do body */

        /* CARTÃO DO JOGO */
        #main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .cartao {
            background: white; width: 95%; max-width: 650px; 
            padding: 40px; border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        /* FOOTER ORIGINAL COM AJUSTE DE BORDA */
        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; 
            border-top: 2px solid var(--azul-vibrante); /* 2px e cor do template */
            width: 100%;
        }

        /* SIDEBAR (MENU LATERAL) */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); padding-top: 20px;
        }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar li a {
            display: block; padding: 15px 25px; text-decoration: none;
            color: var(--text-main); font-weight: 600; border-bottom: 1px solid #eee;
        }
        .sidebar li a:hover { background: var(--bg-body); color: var(--azul-vibrante); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; z-index: 199;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="sidebar" id="sidebar">
    <h2 style="padding: 0 25px; color: var(--azul-escuro);">Menu</h2>
    <ul>
        <li><a href="#">🏠 Início</a></li>
        <li><a href="#">📝 Atividades</a></li>
        <li><a href="#">🏆 Recordes</a></li>
        <li><a href="#">⚙️ Definições</a></li>
        <li><a href="#">👤 Perfil</a></li>
        <li><a href="#">❓ Ajuda</a></li>
    </ul>
</nav>

<header class="cabecalho">
    <div class="header-left">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <button class="btn-header" onclick="window.location.href='../index.html'">
            🏠 Voltar
        </button>
    </div>

    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/1F4DD.svg" class="img-titulo" alt="ícone">
        <h1>Escrever Sílabas</h1>
    </div>

    <div class="header-right">
        </div>

    <div class="onda-container">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none">
            <path d="M0,80 C150,150 350,0 500,80 L500,150 L0,150 Z" class="onda-fill"></path>
        </svg>
    </div>
</header>

<div class="status-jogo" style="margin-top: 10px;">
    <div class="contadores" style="display:flex; justify-content:center; gap:30px; font-weight:700; font-size:1.2rem; margin-bottom:8px;">
        <span id="certas" style="color:#4caf50;">0</span>
        <span id="erros" style="color:#e53935;">0</span>
    </div>
    <div style="width:80%; max-width:600px; height:12px; background:white; border-radius:10px; margin:0 auto; overflow:hidden; border:2px solid #2e86de;">
        <div id="progressoInterno" style="width:0%; height:100%; background:var(--azul-vibrante); transition:0.5s;"></div>
    </div>
</div>

<main id="main-content">
    <div class="cartao">
        <img id="imagemPalavra" src="" alt="" style="height:180px; object-fit:contain;">
        <div id="silabas" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;"></div>
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." style="width:80%; padding:15px; border:3px solid #add8e6; border-radius:20px; font-size:1.6rem; text-align:center; font-family:'Fredoka'; outline:none;">
        <button id="validar" style="background:var(--azul-vibrante); color:white; border:none; padding:15px 40px; border-radius:30px; font-weight:700; cursor:pointer; font-size:1.2rem;">Verificar</button>
        <div id="feedback" style="min-height:30px; font-weight:700;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.9rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>
<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>
</body>
</html>
