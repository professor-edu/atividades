<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --grad-header: linear-gradient(90deg, #bde6ff 0%, #2e86de 100%);
            --text-main: #455a64;
            --accent: #ff9800;
        }

        body { 
            font-family: 'Fredoka', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* CABEÇALHO OTIMIZADO - REDUÇÃO DE ESPAÇO */
        .cabecalho { 
            background: var(--grad-header); 
            /* Ajustado conforme o teu pedido: Top 5px | Bottom 30px */
            padding: 5px 20px 30px 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 80px; /* Altura reduzida para ganhar área de jogo */
            flex-shrink: 0;
            z-index: 100;
            position: relative;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; gap: 12px; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 2;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 1.8rem; /* Ligeiramente menor para caber no novo espaço */
            font-weight: 500;
            color: var(--azul-escuro);
        }

        .img-titulo { width: 60px; height: auto; } /* Ajustado de 70px para 60px */

        .btn-header {
            background: var(--accent); color: white; border: none;
            padding: 6px 15px; border-radius: 20px; font-weight: 500;
            cursor: pointer; box-shadow: 0 4px 0px #e68a00;
            font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s ease;
        }
        .btn-header:hover { transform: scale(1.05); filter: brightness(1.1); }

        .hamburger {
            cursor: pointer; background: rgba(255,255,255,0.3); border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 8px; border-radius: 8px;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }

        /* ONDA AJUSTADA PARA O NOVO TAMANHO */
        .onda-container {
            position: absolute;
            bottom: -1px;
            left: 0; width: 100%; height: 50px;
            pointer-events: none; z-index: 10;
            filter: drop-shadow(0px -4px 3px rgba(0,0,0,0.08));
        }
        .onda-container svg { width: 100%; height: 100%; display: block; }
        .onda-fill { fill: var(--bg-body); }

        /* ÁREA DE JOGO MAXIMIZADA */
        #main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 10px; /* Reduzi o padding para o cartão poder crescer mais */
        }

        .cartao {
            background: white; 
            width: 92%; 
            max-width: 620px; 
            padding: 30px; /* Padding interno ligeiramente menor para ganhar espaço */
            border-radius: 35px; 
            border: 1.5px solid rgba(0, 145, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px;
        }

        /* SIDEBAR E RESTANTES ESTILOS IGUAIS */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar {
            background: #fff5f5; color: #ff4757; padding: 20px 25px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            font-weight: 600; border-bottom: 1px solid #ffebeb;
        }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; text-align: left; }
        .sidebar li { margin-bottom: 8px; }
        .sidebar li a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; text-decoration: none;
            color: var(--text-main); font-weight: 400; 
            background: #f8fafc; border-radius: 12px; transition: 0.3s;
        }
        .sidebar li a:hover { background: var(--bg-body); color: var(--azul-vibrante); transform: translateX(5px); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); display: none; z-index: 199; backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        footer {
            height: 45px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; 
            border-top: 1px solid var(--azul-vibrante); 
            width: 100%;
        }
        footer p { font-size: 0.8rem; font-weight: 400; color: var(--azul-vibrante); }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()">
        <span>✕</span> Fechar
    </div>
    <ul>
        <li><a href="#">🏠 Início</a></li>
        <li><a href="#">📝 Atividades</a></li>
        <li><a href="#">🏆 Recordes</a></li>
        <li><a href="#">⚙️ Definições</a></li>
        <li><a href="#">👤 Perfil</a></li>
        <li><a href="#">❓ Ajuda</a></li>
    </ul>
</nav>

<header class="cabecalho">
    <div class="header-left">
        <button class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <button class="btn-header" onclick="window.location.href='../index.html'">
            <span>🏠</span> Voltar
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/1F4DD.svg" class="img-titulo" alt="ícone">
        <h1>Escrever Sílabas</h1>
    </div>
    <div class="header-right"></div>
    <div class="onda-container">
        <svg viewBox="0 0 500 150" preserveAspectRatio="none">
            <path d="M0,80 C150,150 350,0 500,80 L500,150 L0,150 Z" class="onda-fill"></path>
        </svg>
    </div>
</header>

<div class="status-jogo" style="margin-top: 25px;">
    <div style="width:70%; max-width:500px; height:8px; background:#e0e0e0; border-radius:10px; margin:10px auto; overflow:hidden;">
        <div id="progressoInterno" style="width:20%; height:100%; background:var(--azul-vibrante);"></div>
    </div>
</div>

<main id="main-content">
    <div class="cartao">
        <p>A carregar jogo...</p>
    </div>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }
</script>
</body>
</html>
