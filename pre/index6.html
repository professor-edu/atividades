<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Nuvem Criativa ☁️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta Escola Criativa */
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde-sucesso: #2ecc71;
            --verde-sombra: #27ae60;
            --laranja: #f39c12;
            --laranja-sombra: #d35400;
            --vermelho-erro: #ff7675;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0; 
            background-color: var(--azul-claro); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }

        /* --- CABEÇALHO NUVEM SUAVE --- */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 30px;
            /* Curvatura de Nuvem na base */
            border-radius: 0 0 50% 50% / 0 0 30px 30px; 
            box-shadow: 0 10px 25px rgba(46, 134, 222, 0.2);
            z-index: 20;
            position: relative;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 2; }
        
        /* Regra Imutável: Imagem 70px */
        .cabecalho-conteudo img { width: 70px; height: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
        .cabecalho h1 { font-size: 1.8rem; color: var(--azul-escuro); margin: 0; font-weight: 700; text-shadow: 0 2px 4px rgba(255,255,255,0.3); }

        /* --- BOTÕES 3D ESTILO GOMA --- */
        .btn-goma {
            border: none;
            border-radius: 20px;
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.1s ease;
            position: relative;
            top: 0;
        }

        /* Variante Laranja (Menu) */
        .btn-laranja {
            background-color: var(--laranja);
            box-shadow: 0 6px 0 var(--laranja-sombra); /* Sombra sólida para efeito 3D */
        }

        /* Variante Verde (Níveis/Ações) */
        .btn-verde {
            background-color: var(--verde-sucesso);
            box-shadow: 0 6px 0 var(--verde-sombra);
        }

        /* Efeito de Clique: O botão "afunda" */
        .btn-goma:active {
            top: 4px;
            box-shadow: 0 2px 0 var(--laranja-sombra);
        }
        .btn-verde:active { box-shadow: 0 2px 0 var(--verde-sombra); }

        .btn-goma:hover { transform: scale(1.02); }

        /* --- ÁREA DE JOGO --- */
        #jogo-container {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        footer { 
            height: 60px; 
            background: white; 
            margin-top: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-top: 2px solid var(--azul-grad-esq); 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: var(--azul-escuro); 
        }

        @media (max-width: 600px) {
            .cabecalho { height: 90px; padding: 0 15px; }
            .cabecalho h1 { font-size: 1.3rem; }
            .cabecalho-conteudo img { width: 50px; }
            .btn-goma { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header class="cabecalho">
        <div class="header-left">
            <a href="../index.html" class="btn-goma btn-laranja">
                <span>🏠</span> MENU
            </a>
        </div>
        
        <div class="cabecalho-conteudo">
            <img src="memoria.png" alt="Logótipo">
            <h1>Jogo da Memória</h1>
        </div>

        <div class="header-right">
            </div>
    </header>

    <main id="jogo-container">
        <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
            <button class="btn-goma btn-verde">NÍVEL FÁCIL</button>
            <button class="btn-goma btn-verde">NÍVEL MÉDIO</button>
        </div>

        <div style="background: white; width: 80%; max-width: 600px; height: 300px; border-radius: 30px; display: flex; align-items: center; justify-content: center; border: 4px dashed var(--azul-grad-dir); margin-top: 20px;">
            <p style="color: var(--azul-escuro); font-weight: 700;">Tabuleiro do Jogo aqui...</p>
        </div>
    </main>

    <footer>
        <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a></p>
    </footer>

    <script>
        document.getElementById('ano-atual').innerText = new Date().getFullYear();
    </script>
</body>
</html>
