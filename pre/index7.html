<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória 🧠</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde-sucesso: #2ecc71;
            --verde-sombra: #27ae60;
            --laranja: #f39c12;
            --laranja-sombra: #d35400;
            --vermelho-erro: #e74c3c;
            --roxo-genio: #9b59b6;
            --azul-janela-borda: #add8e6;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0; background-color: var(--azul-claro); 
            display: flex; flex-direction: column; min-height: 100vh;
            user-select: none;
        }

        /* --- CABEÇALHO NUVEM SUAVE --- */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            height: 110px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-radius: 0 0 50% 50% / 0 0 30px 30px; 
            box-shadow: 0 10px 25px rgba(46, 134, 222, 0.2); z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 2; }
        
        .cabecalho-conteudo img { width: 70px; height: auto; } /* REGRA IMUTÁVEL */
        .cabecalho h1 { font-size: 1.8rem; color: var(--azul-escuro); margin: 0; font-weight: 700; }

        /* --- BOTÕES 3D ESTILO GOMA --- */
        .btn-goma {
            border: none; border-radius: 20px; color: white;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            padding: 12px 22px; cursor: pointer; display: flex;
            align-items: center; gap: 8px; text-decoration: none;
            transition: all 0.1s ease; position: relative; top: 0;
        }

        .btn-laranja { background-color: var(--laranja); box-shadow: 0 6px 0 var(--laranja-sombra); }
        .btn-laranja:active { top: 4px; box-shadow: 0 2px 0 var(--laranja-sombra); }

        .btn-nivel { background-color: #bdc3c7; box-shadow: 0 6px 0 #95a5a6; color: #333; font-size: 0.9rem; }
        .btn-nivel.ativo { color: white; }
        
        /* Cores de Dificuldade Ativas */
        #btn-4.ativo { background: var(--verde-sucesso); box-shadow: 0 6px 0 var(--verde-sombra); }
        #btn-6.ativo { background: #f1c40f; box-shadow: 0 6px 0 #f39c12; color: white; }
        #btn-8.ativo { background: var(--vermelho-erro); box-shadow: 0 6px 0 #c0392b; }
        #btn-10.ativo { background: var(--roxo-genio); box-shadow: 0 6px 0 #8e44ad; }

        .btn-nivel:active { top: 4px; box-shadow: 0 2px 0 #95a5a6; }

        /* --- LAYOUT JOGO --- */
        .menu-niveis { margin: 25px 0 15px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .stats { font-size: 1.2rem; margin-bottom: 15px; display: flex; justify-content: center; gap: 20px; font-weight: 700; }

        .tabuleiro { display: grid; gap: 12px; max-width: 900px; margin: 10px auto 40px; padding: 15px; justify-content: center; }

        /* --- CARTAS CORRIGIDAS --- */
        .carta { width: 120px; aspect-ratio: 1/1; border-radius: 15px; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .carta.virada { transform: rotateY(180deg); }
        .carta.par-encontrado { opacity: 0.4; pointer-events: none; transform: rotateY(180deg) !important; }

        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 15px; background: white; border: 3px solid var(--azul-janela-borda); box-sizing: border-box; }
        .verso { background-color: var(--azul-escuro); color: white; font-size: 2.5rem; font-weight: 700; }
        .frente { transform: rotateY(180deg); padding: 10px; }
        .frente img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .frente span { font-weight: 700; color: var(--azul-escuro); font-size: 1.1rem; text-align: center; line-height: 1.2; }

        #final-screen { display: none; padding: 40px; }
        footer { height: 60px; background: white; border-top: 2px solid var(--azul-grad-esq); display: flex; align-items: center; justify-content: center; margin-top: auto; font-weight: 700; color: var(--azul-escuro); font-size: 0.8rem; }

        @media (max-width: 600px) {
            .cabecalho { height: 90px; }
            .cabecalho h1 { font-size: 1.3rem; }
            .carta { width: 85px; }
        }
    </style>
</head>
<body>

<audio id="som-acerto" src="https://www.soundjay.com/buttons/sounds/button-37.mp3"></audio>

<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-goma btn-laranja"><span>🏠</span> MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="memoria.png" alt="Logótipo"> 
        <h1>Jogo da Memória</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="menu-niveis">
    <button class="btn-goma btn-nivel" id="btn-4" onclick="iniciarJogo(4)">Fácil (8)</button>
    <button class="btn-goma btn-nivel" id="btn-6" onclick="iniciarJogo(6)">Médio (12)</button>
    <button class="btn-goma btn-nivel" id="btn-8" onclick="iniciarJogo(8)">Difícil (16)</button>
    <button class="btn-goma btn-nivel" id="btn-10" onclick="iniciarJogo(10)">Génio (20)</button>
</div>

<div class="stats">
    <span style="color: var(--verde-sucesso);">✅ Acertos: <span id="v-acertos">0</span></span>
    <span style="color: var(--vermelho-erro);">❌ Erros: <span id="v-erros">0</span></span>
    <span style="color: var(--azul-escuro);">⏱️ Tempo: <span id="v-tempo">0</span>s</span>
</div>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="final-screen">
    <div style="background:white; padding:40px; border-radius:30px; display:inline-block; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="color:var(--azul-escuro); margin-bottom:10px;">🏆 BRAVO! 🏆</h2>
        <p id="resumo-final" style="font-weight:700; margin-bottom:20px; color: #555;"></p>
        <button class="btn-goma btn-laranja" style="margin:0 auto;" onclick="location.reload()">JOGAR DE NOVO</button>
    </div>
</div>

<footer><p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a></p></footer>

<script src="js/dados.js"></script>
<script>
    document.getElementById('ano-atual').textContent = new Date().getFullYear();
    let cartasViradas = [], paresDescobertos = 0, totalPares = 0, nAcertos = 0, nErros = 0, podeJogar = false;
    let tempo = 0, intervaloTempo;

    function iniciarJogo(numPares) {
        clearInterval(intervaloTempo);
        tempo = 0; document.getElementById('v-tempo').innerText = "0";
        const tabuleiro = document.getElementById('tabuleiro');
        tabuleiro.innerHTML = ""; tabuleiro.style.display = "grid";
        document.getElementById('final-screen').style.display = "none";
        
        // Ajuste de grelha conforme o nível
        tabuleiro.style.gridTemplateColumns = numPares >= 10 ? "repeat(5, 1fr)" : "repeat(4, 1fr)";
        
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('ativo'));
        document.getElementById('btn-' + numPares).classList.add('ativo');

        paresDescobertos = 0; totalPares = numPares; nAcertos = 0; nErros = 0;
        document.getElementById('v-acertos').innerText = "0"; document.getElementById('v-erros').innerText = "0";

        const selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, numPares);
        let baralho = [];
        selecao.forEach(item => {
            baralho.push({ id: item.palavra, tipo: 'img', conteudo: item.imagem });
            baralho.push({ id: item.palavra, tipo: 'txt', conteudo: item.palavra });
        });
        baralho.sort(() => 0.5 - Math.random());

        baralho.forEach(info => {
            const carta = document.createElement('div');
            carta.className = 'carta';
            carta.dataset.id = info.id;
            carta.innerHTML = `
                <div class="face verso">?</div>
                <div class="face frente">
                    ${info.tipo === 'img' ? `<img src="${info.conteudo}">` : `<span>${info.conteudo.toUpperCase()}</span>`}
                </div>`;
            carta.onclick = function() { virarCarta(this); };
            tabuleiro.appendChild(carta);
        });

        // REVELAÇÃO INICIAL (3 seg para níveis superiores)
        if(numPares >= 8) {
            document.querySelectorAll('.carta').forEach(c => c.classList.add('virada'));
            setTimeout(() => {
                document.querySelectorAll('.carta').forEach(c => c.classList.remove('virada'));
                podeJogar = true;
                iniciarCronometro();
            }, 3000);
        } else {
            podeJogar = true;
            iniciarCronometro();
        }
    }

    function iniciarCronometro() {
        intervaloTempo = setInterval(() => { tempo++; document.getElementById('v-tempo').innerText = tempo; }, 1000);
    }

    function virarCarta(carta) {
        if (!podeJogar || carta.classList.contains('virada') || carta.classList.contains('par-encontrado')) return;
        carta.classList.add('virada');
        cartasViradas.push(carta);
        if (cartasViradas.length === 2) verificarPar();
    }

    function verificarPar() {
        podeJogar = false;
        const [c1, c2] = cartasViradas;
        if (c1.dataset.id === c2.dataset.id) {
            nAcertos++; paresDescobertos++;
            document.getElementById('v-acertos').innerText = nAcertos;
            document.getElementById('som-acerto').play().catch(() => {});
            setTimeout(() => {
                c1.classList.add('par-encontrado'); c2.classList.add('par-encontrado');
                cartasViradas = []; podeJogar = true;
                if (paresDescobertos === totalPares) finalizar();
            }, 600);
        } else {
            nErros++; document.getElementById('v-erros').innerText = nErros;
            setTimeout(() => {
                c1.classList.remove('virada'); c2.classList.remove('virada');
                cartasViradas = []; podeJogar = true;
            }, 1000);
        }
    }

    function finalizar() {
        clearInterval(intervaloTempo);
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('tabuleiro').style.display = "none";
        document.getElementById('resumo-final').innerText = `Terminaste em ${tempo}s com ${nErros} erros.`;
        document.getElementById('final-screen').style.display = "block";
    }

    window.onload = () => iniciarJogo(4);
</script>
</body>
</html>
