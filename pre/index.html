<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            /* COR AZUL PARA O CABEÇALHO DO 1º ANO */
            --bg-header-1ano: #ddecfa; 
            --text-main: #455a64;
            --accent: #ff9800;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
        }
        
        /* CABEÇALHO AZUL SÓLIDO */
        .cabecalho { 
            background-color: var(--bg-header-1ano); /* Azul definido */
            padding: 5px 20px 30px 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 80px;
            flex-shrink: 0;
            z-index: 100;
            position: relative;
            border-bottom: 2px solid var(--azul-vibrante);
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; gap: 12px; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 2;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: clamp(1.1rem, 4vw, 1.8rem); 
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .img-titulo { width: 55px; height: auto; }

        .btn-header {
            background: var(--accent); color: white; border: none;
            padding: 6px 15px; border-radius: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 0px #e68a00;
            font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-header:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-header:active { transform: translateY(3px); box-shadow: 0 1px 0px #e68a00; }

        /* HAMBURGER ANIMADO */
        .hamburger {
            cursor: pointer; background: rgba(255,255,255,0.5); border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 8px; border-radius: 8px;
            transition: 0.3s; z-index: 201;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            text-align: left;
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar {
            background: #fff5f5; color: #ff4757; padding: 20px 25px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            font-weight: 700; border-bottom: 1px solid #ffebeb;
        }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li { margin-bottom: 8px; }
        .sidebar li a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; text-decoration: none;
            color: var(--text-main); background: #f8fafc; border-radius: 12px; 
            transition: 0.3s ease;
        }
        .sidebar li a:hover { background: #e3f2fd; color: var(--azul-vibrante); transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* GRID DISCIPLINAS */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 60px 20px 40px; }
        .subtitulo { color: var(--azul-escuro); font-weight: 500; margin-bottom: 30px; opacity: 0.8; }

        .grid-disciplinas {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 25px;
            max-width: 1200px; width: 100%;
        }

        .cartao-disciplina {
            background: white; flex: 0 1 220px; aspect-ratio: 1 / 1;
            border-radius: 25px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 15px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid #eee;
            border-top: 8px solid var(--azul-vibrante);
        }
        .cartao-disciplina:hover { transform: translateY(-10px) scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.12); }
        .icone-wrapper { font-size: 4rem; transition: 0.3s; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.2rem; }

        /* Cores das Bordas Superiores */
        .c-port { border-top-color: #ff6b6b; } 
        .c-mat { border-top-color: #4dabf7; } 
        .c-estudo { border-top-color: #51cf66; }

        footer {
            height: 45px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); width: 100%;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        @media (max-width: 480px) {
            .img-titulo { display: none; }
            .btn-header span:last-child { display: none; }
            .cartao-disciplina { flex: 0 1 150px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">📖 3º Ano</a></li>
        <li><a href="../4/index.html">🧬 4º Ano</a></li>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 15px;">
        <li><a href="#">🏆 Recordes</a></li>
        <li><a href="#">❓ Ajuda</a></li>
    </ul>
</nav>

<header class="cabecalho">
    <div class="header-left">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <a href="../index.html" class="btn-header">
            <span>🏠</span> <span>Início</span>
        </a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="mochila.png" class="img-titulo" alt="ícone">
        <h1>1º Ano</h1>
    </div>
    <div class="header-right"></div>
</header>

<main>
    <p class="subtitulo">O que vamos aprender hoje? 😊</p>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">📚</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🌍</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        
        // Esta é a parte que faz o menu abrir/fechar ao clicar
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }
</script>
</body>
</html>
