<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar - Vamos Aprender a Brincar 🎨</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff; /* Cor da linha do footer */
            --azul-escuro: #0d47a1;
            --cor-pre-forte: #4fd1c5; /* Cor da Pré mais carregada */
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO RESPONSIVO */
        header {
            background-color: var(--bg-header-footer);
            padding: 20px 15px;
            border-bottom: 2px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
        }

        .btn-voltar {
            background: var(--cor-pre-forte);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #38a89d;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-voltar:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-voltar:active { transform: translateY(2px); box-shadow: none; }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.3rem, 5vw, 2rem); 
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* GRID DE CARTÕES QUADRANGULARES */
        .grid-jogos {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .cartao-jogo {
            background: white;
            aspect-ratio: 1 / 1; /* Formato quadrangular estilo imagem */
            border-radius: 15px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animação template jogos */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 6px solid var(--azul-vibrante); /* Cor igual ao footer */
            border-left: 1px solid #eee;
            border-right: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        /* ANIMAÇÃO HOVER DECIDIDA NO TEMPLATE */
        .cartao-jogo:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .cartao-jogo .icone-wrapper {
            font-size: 3.5rem;
            transition: transform 0.3s ease;
        }

        .cartao-jogo:hover .icone-wrapper {
            transform: scale(1.15);
        }

        .cartao-jogo span.nome-jogo {
            color: var(--azul-escuro);
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* FOOTER ORIGINAL */
        footer {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
            margin-top: auto;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        @media (max-width: 500px) {
            .grid-jogos { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
            .cartao-jogo .icone-wrapper { font-size: 2.5rem; }
            .cartao-jogo span.nome-jogo { font-size: 1rem; }
            .header-top { padding: 0 5px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <a href="../index.html" class="btn-voltar">🏠 <span>Início</span></a>
        <h1>🎨 Pré-Escolar</h1>
        <div style="width: 85px;" class="hide-mobile"></div> 
    </div>
</header>

<main class="grid-jogos">
    <a href="#" class="cartao-jogo">
        <div class="icone-wrapper">🔢</div>
        <span class="nome-jogo">Contagens</span>
    </a>

    <a href="#" class="cartao-jogo">
        <div class="icone-wrapper">🧩</div>
        <span class="nome-jogo">Sílabas</span>
    </a>

    <a href="#" class="cartao-jogo">
        <div class="icone-wrapper">🔍</div>
        <span class="nome-jogo">Diferenças</span>
    </a>

    <a href="#" class="cartao-jogo">
        <div class="icone-wrapper">🎨</div>
        <span class="nome-jogo">Cores</span>
    </a>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
