<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar 🎨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --cor-pre: #81e6d9; /* Turquesa oficial do Pré */
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO PADRÃO */
        header {
            background-color: var(--bg-header-footer);
            padding: 20px 15px;
            border-bottom: 2px solid var(--cor-pre);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1100px;
        }

        .btn-voltar {
            background: var(--cor-pre);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #5ec4b8;
            transition: 0.2s;
        }

        .btn-voltar:active { transform: translateY(2px); box-shadow: none; }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.3rem, 5vw, 2rem); 
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        /* GRID DE JOGOS */
        .grid-jogos {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .cartao-jogo {
            background: white;
            border-radius: 15px;
            padding: 30px 15px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--cor-pre);
            position: relative;
        }

        .cartao-jogo:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .cartao-jogo .icone-jogo { font-size: 2.5rem; }
        .cartao-jogo span.nome-jogo { color: var(--azul-escuro); font-weight: 700; font-size: 1.1rem; }

        /* Cores das bordas */
        .c-vermelho { border-top-color: #ff6b6b; }
        .c-azul { border-top-color: #4dabf7; }
        .c-verde { border-top-color: #51cf66; }
        .c-roxo { border-top-color: #cc5de8; }

        /* FOOTER ORIGINAL DO TEMPLATE */
        footer {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
            margin-top: auto;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <a href="../index.html" class="btn-voltar">🏠 Início</a>
        <h1>🎨 Pré-Escolar</h1>
        <div style="width: 80px;"></div> 
    </div>
</header>

<main class="grid-jogos">
    <a href="#" class="cartao-jogo c-vermelho">
        <span class="icone-jogo">🔢</span>
        <span class="nome-jogo">Vamos Contar</span>
    </a>
    <a href="#" class="cartao-jogo c-azul">
        <span class="icone-jogo">🧩</span>
        <span class="nome-jogo">Contar Sílabas</span>
    </a>
    <a href="#" class="cartao-jogo c-verde">
        <span class="icone-jogo">🔍</span>
        <span class="nome-jogo">Diferenças</span>
    </a>
    <a href="#" class="cartao-jogo c-roxo">
        <span class="icone-jogo">🔴</span>
        <span class="nome-jogo">Cores e Formas</span>
    </a>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
