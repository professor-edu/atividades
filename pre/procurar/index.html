<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar - O Detetive 🕵️‍♂️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE (MOLDE INTOCÁVEL)
           ========================================= */
        :root {
            --bg-body: #f0f7ff;
            --cor-pre: #4fd1c5;       
            --cor-pre-dark: #38a89d;
            --cor-borda: #48b5aa;    
            --bg-header: #e1f5f2;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            
            /* Cor Específica deste Jogo */
            --cor-jogo: #51cf66;
            --cor-jogo-dark: #40c057;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; touch-action: pan-y;}
        
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-borda); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-pre); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-pre-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-pre); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* =========================================
           ÁREA PRINCIPAL MAXIMIZADA E SEM SCROLL
           ========================================= */
        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 15px 20px; gap: 15px; }
        
        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 900px; 
            flex: 1; 
            padding: 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-jogo); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; position: relative; overflow: hidden; 
        }
        
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-borda); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--cor-borda); margin: 0; }
        footer a { color: var(--cor-borda); text-decoration: none; font-weight: 700; }
        
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 15px 10px; gap: 10px; }
            .cartao-jogo-container { padding: 15px; }
        }

        /* =========================================
           O CAMINHO MÁGICO 🕵️‍♂️ -> 🔍
           ========================================= */
        .caminho-magico {
            width: 100%; max-width: 700px; height: 50px; position: relative;
            display: block; margin-bottom: 5px; flex-shrink: 0;
        }
        .caminho-trilho {
            position: absolute; bottom: 10px; left: 40px; right: 50px; height: 0;
            border-bottom: 4px dashed var(--cor-jogo); z-index: 1;
        }
        .caminho-avatar {
            position: absolute; left: 0%; bottom: -5px; 
            transform: translateX(-50%) scaleX(-1); 
            font-size: 2.5rem; 
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 3; filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15)); line-height: 1;
        }
        .caminho-alvo {
            position: absolute; right: -10px; bottom: -2px; font-size: 2.5rem;
            z-index: 2; filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15)); line-height: 1;
        }

        /* =========================================
           MENUS E ECRÃS BASE
           ========================================= */
        .ecra { display: none; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; min-height: 350px; text-align: center; flex: 1; }

        .pergunta-destaque { font-size: 1.6rem; color: var(--azul-escuro); margin-bottom: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px;}

        /* =========================================
           CSS ESPECÍFICO: O DETETIVE
           ========================================= */
        
        /* A Caixa do Topo (Alvos) */
        .alvos-container {
            display: flex; gap: 20px; justify-content: center; margin-bottom: 25px;
            background: #f8fafc; padding: 15px 30px; border-radius: 20px; border: 3px dashed #cbd5e1;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.02);
        }

        .alvo-wrapper {
            position: relative; display: flex; flex-direction: column; align-items: center;
        }

        .img-alvo {
            width: clamp(70px, 15vw, 110px);
            height: clamp(70px, 15vw, 110px);
            object-fit: contain;
            background: white; border-radius: 15px; padding: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        /* EFEITO HOVER PEDIDO: Suave zoom, borda esverdeada e sombra */
        .img-alvo:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 20px rgba(81, 207, 102, 0.3);
            border-color: rgba(81, 207, 102, 0.6);
        }

        /* Quando o alvo é encontrado no jogo */
        .img-alvo.encontrado {
            opacity: 0.4; filter: grayscale(1); pointer-events: none; transform: scale(0.95);
        }

        .visto-alvo {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 3rem; color: var(--cor-jogo); filter: drop-shadow(0 2px 2px white);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 10;
        }
        .img-alvo.encontrado + .visto-alvo { transform: translate(-50%, -50%) scale(1); }

        /* A Cena do Crime (Quadro de Busca) */
        .busca-container {
            display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start;
            gap: clamp(10px, 3vw, 25px); width: 100%; max-width: 750px; flex: 1;
            padding: 10px;
        }

        .item-busca-wrapper {
            position: relative;
            transition: transform 0.2s;
        }
        
        .item-busca-wrapper:hover {
            transform: scale(1.1) rotate(0deg) !important;
            z-index: 10;
        }
        .item-busca-wrapper:active { transform: scale(0.9) !important; }

        .img-busca {
            width: clamp(65px, 14vw, 100px);
            height: clamp(65px, 14vw, 100px);
            object-fit: contain; background: white; border-radius: 15px; padding: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer;
            user-select: none; -webkit-tap-highlight-color: transparent;
            border: 4px solid transparent;
            transition: all 0.2s;
        }

        .img-busca.correto {
            border-color: var(--cor-jogo); background: #eafff0; pointer-events: none;
            box-shadow: 0 0 15px rgba(81, 207, 102, 0.4);
        }

        .visto-busca {
            position: absolute; top: -10px; right: -10px; font-size: 2rem; color: var(--cor-jogo);
            filter: drop-shadow(0 2px 2px white); opacity: 0; transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 10;
        }
        .img-busca.correto + .visto-busca { opacity: 1; transform: scale(1); }

        /* Fim de Jogo e Transições */
        .titulo-destaque { font-size: 3rem; color: var(--azul-escuro); margin-bottom: 15px; }
        .btn-acao { background-color: var(--cor-jogo); color: white; border: none; padding: 15px 35px; font-size: 1.3rem; font-weight: 800; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 var(--cor-jogo-dark); transition: 0.2s; text-transform: uppercase; margin-top: 15px; display: inline-flex; align-items: center; justify-content: center; gap: 10px;}
        .btn-acao:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .btn-acao:hover { filter: brightness(1.05); }

        #ecra-transicao { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; position: absolute; top: 0; left: 0; 
            background: rgba(255,255,255,0.95); z-index: 20; border-radius: 30px; animation: fadeIn 0.5s ease;
        }

        @media (max-width: 600px) {
            .caminho-trilho { left: 30px; right: 40px; }
            .alvos-container { padding: 10px 15px; gap: 10px; margin-bottom: 15px;}
            .img-alvo { padding: 5px; }
            .img-busca { padding: 5px; }
            .titulo-destaque { font-size: 2.2rem; }
            .pergunta-destaque { font-size: 1.4rem; margin-bottom: 5px; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .error-shake { animation: shakeError 0.4s ease; }
        .error-flash { border-color: #ff4757 !important; background: #ffefef !important; }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: hidden; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../">🎨 Pré-Escolar</a></li>
        <li><a href="../../../1/">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>O Detetive 🕵️‍♂️</h1>
        <div class="subtitulo">Abre bem os olhos e encontra a imagem!</div>
    </div>
</header>

<main>
    <!-- O CAMINHO MÁGICO DO DETETIVE -->
    <div class="caminho-magico" id="caminho-magico">
        <div class="caminho-trilho">
            <div class="caminho-avatar" id="avatar-progresso">🕵️‍♂️</div> 
        </div>
        <div class="caminho-alvo" id="alvo-progresso">🔍</div> 
    </div>

    <!-- CARTÃO DO JOGO -->
    <div class="cartao-jogo-container">
        
        <!-- ECRÃ 1: JOGO (Começa direto aqui) -->
        <div id="ecra-jogo" class="ecra">
            
            <div class="pergunta-destaque" id="instrucao-ronda">Procura esta imagem:</div>

            <!-- CAIXA DO TOPO (Alvos) -->
            <div class="alvos-container" id="alvos-container">
                <!-- Imagens alvo injetadas por JS -->
            </div>

            <!-- ÁREA DE BUSCA (Imagens Misturadas) -->
            <div class="busca-container" id="busca-container">
                <!-- Imagens para clicar injetadas por JS -->
            </div>

        </div>

        <!-- ECRÃ 2: FIM DO JOGO (Sobreposição Absoluta) -->
        <div id="ecra-transicao" class="ecra">
            <div style="font-size: 5rem; margin-bottom: 10px;">🏆</div>
            <h2 class="titulo-destaque">Fantástico!</h2>
            <p style="font-size: 1.3rem; color: var(--text-main); margin-bottom: 25px;">Tens uns olhos de lince. Encontraste tudo!</p>
            <button class="btn-acao" onclick="iniciarJogo()">Jogar Novamente 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>


<script src="dados.js"></script>

<script>
    /* =====================================================================
       JAVASCRIPT DO TEMPLATE E MENU
       ===================================================================== */
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    
    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
        document.getElementById('hamburgerBtn').classList.toggle('open'); 
    }

    function mostrarEcra(id) {
        document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none');
        const e = document.getElementById(id);
        if(e) e.style.display = 'flex';
    }

    function atualizarProgressoCaminho(percentagem) {
        const avatar = document.getElementById('avatar-progresso');
        if(avatar) avatar.style.left = `${percentagem}%`;
    }

    // NOVA FUNÇÃO TOTALMENTE SEGURA PARA A ROTA DAS IMAGENS
    function getImagePath(nomeImg) {
        if (!nomeImg) return '';
        // Limpa qualquer pasta do caminho (ex: "img/pato.png" vira "pato.png")
        const nomeFicheiro = nomeImg.replace('img/', '');
        // Força o caminho direto de 'procurar' para a pasta de imagens 'img'
        return `../img/${nomeFicheiro}`;
    }

    /* =====================================================================
       LÓGICA DO JOGO "O DETETIVE"
       ===================================================================== */
    
    const TOTAL_RONDAS = 15;
    let rondaAtual = 0;
    let alvosDestaRonda =[]; 
    let alvosEncontrados = 0;
    let isVerificando = false;

    // Elementos DOM
    const alvosContainer = document.getElementById('alvos-container');
    const buscaContainer = document.getElementById('busca-container');
    const instrucaoTxt = document.getElementById('instrucao-ronda');

    // O jogo arranca logo sem menu (assim que garante que o dados.js carregou)
    window.onload = function() {
        iniciarJogo();
    };

    function iniciarJogo() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        rondaAtual = 0;
        atualizarProgressoCaminho(0);
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        
        mostrarEcra('ecra-jogo');
        prepararRonda();
    }

    function prepararRonda() {
        isVerificando = false;
        alvosContainer.innerHTML = '';
        buscaContainer.innerHTML = '';
        alvosDestaRonda =[];
        alvosEncontrados = 0;

        // Configuração de Dificuldade Automática
        let qtdAlvos = 1;
        let qtdTotalCenario = 6;

        if (rondaAtual >= 10) {
            qtdAlvos = 2;
            qtdTotalCenario = 16;
            instrucaoTxt.textContent = "Procura estas duas imagens:";
        } else if (rondaAtual >= 5) {
            qtdAlvos = 1;
            qtdTotalCenario = 12;
            instrucaoTxt.textContent = "Onde está esta imagem?";
        } else {
            qtdAlvos = 1;
            qtdTotalCenario = 6;
            instrucaoTxt.textContent = "Procura esta imagem:";
        }

        // 1. Usa as palavras do dados.js e baralha
        let bancoImagens = [...palavras].map(p => p.imagem).sort(() => Math.random() - 0.5);

        // 2. Seleciona os alvos
        for(let i=0; i<qtdAlvos; i++) {
            alvosDestaRonda.push(bancoImagens[i]);
            
            let wrapper = document.createElement('div');
            wrapper.className = 'alvo-wrapper';
            wrapper.innerHTML = `
                <img src="${getImagePath(bancoImagens[i])}" class="img-alvo" id="alvo-topo-${i}" alt="Alvo">
                <div class="visto-alvo">✔️</div>
            `;
            alvosContainer.appendChild(wrapper);
        }

        // 3. Prepara a piscina de imagens para o cenário
        let imagensCenario =[...alvosDestaRonda]; 
        let imagensRestantes = bancoImagens.slice(qtdAlvos); 
        
        // Preenche o resto com distratores
        while (imagensCenario.length < qtdTotalCenario) {
            imagensCenario.push(imagensRestantes.pop());
        }

        // 4. Baralha o cenário e renderiza
        imagensCenario.sort(() => Math.random() - 0.5);

        imagensCenario.forEach(img => {
            let wrapper = document.createElement('div');
            wrapper.className = 'item-busca-wrapper';
            
            // Rotação subtil para parecer "desarrumado" (-15 a 15 graus)
            let rot = Math.floor(Math.random() * 30) - 15;
            wrapper.style.transform = `rotate(${rot}deg)`;
            
            let imgHTML = document.createElement('img');
            imgHTML.src = getImagePath(img);
            imgHTML.className = 'img-busca';
            imgHTML.alt = "Busca";
            
            let visto = document.createElement('div');
            visto.className = 'visto-busca';
            visto.textContent = '✔️';

            wrapper.appendChild(imgHTML);
            wrapper.appendChild(visto);

            // Evento de clique
            wrapper.onclick = () => verificarClique(img, wrapper, imgHTML);

            buscaContainer.appendChild(wrapper);
        });
    }

    function verificarClique(imagemClicada, wrapperDOM, imgDOM) {
        if (isVerificando || imgDOM.classList.contains('correto')) return;

        let alvoIndex = alvosDestaRonda.indexOf(imagemClicada);

        if (alvoIndex !== -1) {
            // ACERTOU
            tocarSom('acerto');
            imgDOM.classList.add('correto');
            
            let alvoTopo = document.getElementById(`alvo-topo-${alvoIndex}`);
            alvoTopo.classList.add('encontrado');

            alvosEncontrados++;

            if (alvosEncontrados === alvosDestaRonda.length) {
                isVerificando = true;
                rondaAtual++;
                
                let percentagem = (rondaAtual / TOTAL_RONDAS) * 100;
                atualizarProgressoCaminho(percentagem);

                setTimeout(() => {
                    if (rondaAtual >= TOTAL_RONDAS) {
                        tocarSom('vitoria');
                        dispararConfetis();
                        mostrarEcra('ecra-transicao');
                    } else {
                        prepararRonda();
                    }
                }, 1000);
            }

        } else {
            // ERROU
            tocarSom('erro');
            wrapperDOM.classList.add('error-shake');
            imgDOM.classList.add('error-flash');
            
            setTimeout(() => {
                wrapperDOM.classList.remove('error-shake');
                imgDOM.classList.remove('error-flash');
            }, 400);
        }
    }

    /* =====================================================================
       SISTEMA DE SOM E CONFETIS
       ===================================================================== */
    let audioCtx = null;
    function iniciarAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    document.body.addEventListener('click', iniciarAudio, { once: true });
    document.body.addEventListener('touchstart', iniciarAudio, { once: true });

    function tocarSom(tipo) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'acerto') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } else if (tipo === 'erro') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(250, agora); osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } else if (tipo === 'vitoria') {
            const notas =[440, 554.37, 659.25, 880, 1046.50]; 
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'triangle'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.6);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.6);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];
    function redimensionarCanvas() { canvasConfetti.width = window.innerWidth; canvasConfetti.height = window.innerHeight; }
    window.addEventListener('resize', redimensionarCanvas);
    
    function dispararConfetis() {
        redimensionarCanvas(); confetis =[]; const cores =['#4fd1c5', '#ff4757', '#0091ff', '#ffa502', '#eccc68'];
        for (let i = 0; i < 150; i++) {
            confetis.push({ x: Math.random() * canvasConfetti.width, y: Math.random() * canvasConfetti.height - canvasConfetti.height, w: Math.random() * 10 + 5, h: Math.random() * 10 + 5, cor: cores[Math.floor(Math.random() * cores.length)], velY: Math.random() * 3 + 2, velX: Math.random() * 2 - 1, rotacao: Math.random() * 360, velRotacao: Math.random() * 5 - 2.5 });
        }
        animarConfetis();
    }
    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height); let ativos = false;
        confetis.forEach(c => {
            c.y += c.velY; c.x += c.velX; c.rotacao += c.velRotacao; if (c.y < canvasConfetti.height) ativos = true;
            ctxConfetti.save(); ctxConfetti.translate(c.x, c.y); ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor; ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h); ctxConfetti.restore();
        });
        if (ativos) requestAnimationFrame(animarConfetis);
    }

</script>
