<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Giz ✏️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --laranja: #ff9800;
        }

        body { font-family: 'Quicksand', sans-serif; margin: 0; background-color: var(--azul-claro); display: flex; flex-direction: column; min-height: 100vh; }

        /* CABEÇALHO GIZ */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            height: 85px; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px;
            border-bottom: 5px dashed rgba(255, 255, 255, 0.6); /* Efeito Giz/Tracejado */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 2; }
        
        /* Regra: Imagem 70px */
        .cabecalho-conteudo img { width: 70px; height: auto; }
        .cabecalho h1 { font-size: 1.8rem; color: var(--azul-escuro); margin: 0; font-weight: 700; }

        /* Regra: Botão Menu Imutável */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            text-decoration: none; transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        footer { height: 50px; background: white; margin-top: auto; display: flex; align-items: center; justify-content: center; border-top: 1px solid #eee; font-weight: 700; font-size: 0.8rem; color: var(--azul-escuro); }
    </style>
</head>
<body>
    <header class="cabecalho">
        <div class="header-left"><a href="../index.html" class="btn-menu"><span>🏠</span> MENU</a></div>
        <div class="cabecalho-conteudo">
            <img src="memoria.png" alt="Logo">
            <h1>Título do Jogo</h1>
        </div>
        <div class="header-right"></div>
    </header>
    <main style="flex:1; padding:40px;"> </main>
    <footer><p>&copy; <span id="ano"></span> EB1/PE da Marinheira</p></footer>
    <script>document.getElementById('ano').innerText = new Date().getFullYear();</script>
</body>
</html>
