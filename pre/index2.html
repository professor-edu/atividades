<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras - EB1/PE da Marinheira 🔎</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh;
            user-select: none;
        }
        
        /* --- HEADER --- */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 30px; 
            display: flex; align-items: center; justify-content: space-between;
            height: 85px; flex-shrink: 0;
            z-index: 20;
        }

        /* MENU PILL COM ANIMAÇÃO */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            width: 180px; height: 45px; border-radius: 50px; 
            font-weight: 700; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease; /* Animação suave */
        }
        .btn-menu:hover {
            transform: scale(1.05); /* Efeito de aumento */
        }

        .cabecalho-conteudo { display: flex; align-items: center; gap: 15px; }
        .cabecalho h1 { font-size: 2rem; color: var(--azul-escuro); margin: 0; }

        /* --- ONDA --- */
        .onda-container {
            height: 45px; width: 100%; overflow: hidden; margin-top: -1px;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
            z-index: 10;
        }

        /* --- CONTROLOS DO JOGO --- */
        .seletor-niveis { margin: 15px 0; display: flex; justify-content: center; gap: 12px; }
        .btn-diff {
            background: white; border: 2px solid var(--azul-grad-dir); color: var(--azul-grad-dir);
            padding: 8px 20px; border-radius: 20px; font-weight: 700; cursor: pointer;
        }
        .btn-diff.active { background: var(--azul-grad-dir); color: white; }

        #countdown-box {
            display: inline-block; background: white; padding: 8px 30px;
            border-radius: 25px; border: 3px solid var(--azul-grad-dir);
            font-weight: 700; font-size: 1.5rem; color: var(--azul-escuro);
        }

        /* --- ÁREA DE JOGO --- */
        .container { 
            display: flex; justify-content: center; align-items: stretch; 
            gap: 30px; padding: 10px 20px 40px; flex-wrap: wrap;
        }

        #grid { 
            display: grid; background: white; padding: 15px; border-radius: 25px;
            border: 2px solid var(--azul-janela-borda); touch-action: none;
        }

        .letra { 
            border: 1px solid #e3efff; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; border-radius: 12px; background: #fff;
        }

        /* --- FOOTER --- */
        footer {
            height: 50px; background: white; border-top: 1px solid #eee;
            display: flex; align-items: center; justify-content: center; margin-top: auto;
            font-weight: 700; color: var(--azul-escuro); font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <a href="../index.html" class="btn-menu"><span>🏠</span> MENU</a>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:55px" alt="ícone">
        <h1>Sopa de Letras</h1>
    </div>
    <div style="width: 180px;"></div> </header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="fill: var(--azul-grad-dir);"></path>
    </svg>
</div>

<div style="padding:10px;">
    <div id="countdown-box">⏱️ <span id="timer-display">04:00</span></div>
    
    <div class="seletor-niveis">
        <button onclick="mudarDificuldade(8)" id="btn-8" class="btn-diff">FÁCIL (3 min)</button>
        <button onclick="mudarDificuldade(10)" id="btn-10" class="btn-diff active">MÉDIO (4 min)</button>
        <button onclick="mudarDificuldade(12)" id="btn-12" class="btn-diff">DIFÍCIL (5 min)</button>
    </div>
</div>

<div class="container">
    <div id="grid">
        </div> 
</div>

<footer>
    <span id="ano-atual"></span>&nbsp;🏫&nbsp;<a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
</footer>

<script>
    // ANO ATUAL AUTOMÁTICO
    document.getElementById('ano-atual').textContent = new Date().getFullYear();

    let TAMANHO = 10;
    let tempoRestante = 240;
    let intervaloCountdown;

    function mudarDificuldade(n) {
        TAMANHO = n;
        // Atualiza visual dos botões
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n).classList.add('active');
        
        iniciarJogo();
    }

    function iniciarJogo() {
        clearInterval(intervaloCountdown);
        
        // Define tempos baseados no nível selecionado
        if(TAMANHO === 8) tempoRestante = 180;  // 3 min
        else if(TAMANHO === 10) tempoRestante = 240; // 4 min
        else tempoRestante = 300; // 5 min

        // Ajusta o tamanho visual da grelha
        const grid = document.getElementById('grid');
        const celSize = TAMANHO === 8 ? 55 : (TAMANHO === 10 ? 48 : 38);
        grid.style.gridTemplateColumns = `repeat(${TAMANHO}, ${celSize}px)`;
        grid.style.gridTemplateRows = `repeat(${TAMANHO}, ${celSize}px)`;

        // (Aqui continuarias com a tua lógica de gerar letras...)
        
        iniciarTimer();
    }

    function iniciarTimer() {
        intervaloCountdown = setInterval(() => {
            tempoRestante--;
            let m = Math.floor(tempoRestante/60), s = tempoRestante%60;
            document.getElementById('timer-display').textContent = 
                `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            
            if(tempoRestante <= 0) clearInterval(intervaloCountdown);
        }, 1000);
    }

    // Inicia pela primeira vez (Nível Médio)
    iniciarJogo();
</script>

</body>
</html>
