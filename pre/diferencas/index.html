<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar - Jogo das Diferenças 🔍</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f7ff;
            --cor-pre: #ff9f43; /* Cor laranja para diferenciar do jogo das sombras */
            --cor-pre-dark: #ee5253;
            --cor-borda: #ff9f43;    
            --bg-header: #fff5ed;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; touch-action: manipulation;}
        
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-borda); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1.1rem; font-weight: 500; opacity: 0.8; margin-top: 10px; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        
        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 1000px; 
            padding: 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-pre); position: relative;
        }

        /* CAMINHO DO COELHINHO */
        .caminho-magico { width: 100%; max-width: 700px; height: 50px; position: relative; margin-bottom: 20px; display: none; }
        .caminho-trilho { position: absolute; bottom: 10px; left: 40px; right: 50px; height: 4px; background: #dfe6e9; border-radius: 2px; }
        .progresso-cor { position: absolute; height: 100%; background: var(--cor-pre); border-radius: 2px; transition: width 0.5s; }
        .caminho-avatar { position: absolute; left: 0%; bottom: -5px; transform: translateX(-50%); font-size: 2.5rem; transition: left 0.5s; z-index: 3; }
        .caminho-alvo { position: absolute; right: -10px; bottom: -5px; font-size: 2.5rem; }

        /* ÁREA DE JOGO: LADO A LADO */
        .jogo-grid { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
        .imagens-container { display: flex; gap: 10px; justify-content: center; width: 100%; flex-wrap: wrap; }
        
        .imagem-wrapper { position: relative; width: 45%; min-width: 300px; border: 5px solid #eee; border-radius: 15px; overflow: hidden; }
        .img-jogo { width: 100%; display: block; pointer-events: none; }

        /* Zonas clicáveis das diferenças */
        .diferenca-ponto {
            position: absolute;
            width: 40px;
            height: 40px;
            /* background: rgba(255,0,0,0.2); // Debug: tirar comentário para ver onde estão as áreas */
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .marcador-acerto {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #2ed573;
            border-radius: 50%;
            pointer-events: none;
            animation: popIn 0.3s ease;
        }

        .ecra { display: none; flex-direction: column; align-items: center; width: 100%; }
        #ecra-selecao { display: flex; }

        .btn-voltar-menu { background: #f0f4f8; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; font-weight: bold; color: #334e68; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1>Jogo das Diferenças 🔍</h1>
        <div class="subtitulo" id="jogo-subtitulo">Encontra as 3 coisas diferentes!</div>
    </div>
</header>

<main>
    <div class="caminho-magico" id="caminho-magico">
        <div class="caminho-trilho"><div class="progresso-cor" id="barra-progresso"></div></div>
        <div class="caminho-avatar" id="avatar-progresso">🐰</div> 
        <div class="caminho-alvo">🥕</div> 
    </div>

    <div class="cartao-jogo-container">
        
        <div id="ecra-selecao" class="ecra">
            <h2>Escolhe um desafio:</h2>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <button class="btn-voltar-menu" onclick="iniciarJogo(1)" style="padding: 30px;">🖼️ Desafio 1</button>
                <button class="btn-voltar-menu" onclick="iniciarJogo(2)" style="padding: 30px;">🖼️ Desafio 2</button>
            </div>
        </div>

        <div id="ecra-jogo" class="ecra">
            <button class="btn-voltar-menu" onclick="location.reload()">🔄 Outro Tema</button>
            
            <div class="imagens-container">
                <div class="imagem-wrapper">
                    <img id="img-original" class="img-jogo" src="">
                    <div style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px; border-radius: 5px; font-weight: bold;">Original</div>
                </div>
                <div class="imagem-wrapper" id="container-diferencas">
                    <img id="img-alterada" class="img-jogo" src="">
                    </div>
            </div>
        </div>

        <div id="ecra-fim" class="ecra">
            <h2 style="font-size: 3rem;">🌟 Parabéns! 🌟</h2>
            <p>Encontraste todas as diferenças!</p>
            <button class="btn-voltar-menu" onclick="location.reload()" style="background: var(--cor-pre); color: white;">Jogar de Novo</button>
        </div>
    </div>
</main>

<script>
    const desafios = {
        1: {
            original: "img/desafio1_a.png",
            alterada: "img/desafio1_b.png",
            diferencas: [
                { top: '20%', left: '30%' },
                { top: '55%', left: '70%' },
                { top: '80%', left: '40%' }
            ]
        },
        2: {
            original: "img/desafio2_a.png",
            alterada: "img/desafio2_b.png",
            diferencas: [
                { top: '10%', left: '10%' },
                { top: '40%', left: '50%' },
                { top: '75%', left: '20%' }
            ]
        }
    };

    let encontradas = 0;
    let totalNestaRonda = 0;

    function mostrarEcra(id) {
        document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function iniciarJogo(id) {
        const jogo = desafios[id];
        encontradas = 0;
        totalNestaRonda = jogo.diferencas.length;
        
        document.getElementById('img-original').src = jogo.original;
        document.getElementById('img-alterada').src = jogo.alterada;
        
        const container = document.getElementById('container-diferencas');
        // Limpar zonas antigas (manter a imagem)
        const nodes = container.querySelectorAll('.diferenca-ponto, .marcador-acerto');
        nodes.forEach(n => n.remove());

        // Criar novas zonas
        jogo.diferencas.forEach((pos, index) => {
            const ponto = document.createElement('div');
            ponto.className = 'diferenca-ponto';
            ponto.style.top = pos.top;
            ponto.style.left = pos.left;
            ponto.onclick = (e) => acertouDiferenca(e.target, pos);
            container.appendChild(ponto);
        });

        document.getElementById('caminho-magico').style.display = 'block';
        atualizarProgresso();
        mostrarEcra('ecra-jogo');
    }

    function acertouDiferenca(elemento, pos) {
        if (elemento.classList.contains('achado')) return;
        
        elemento.classList.add('achado');
        encontradas++;
        
        // Criar círculo verde
        const marcador = document.createElement('div');
        marcador.className = 'marcador-acerto';
        marcador.style.top = pos.top;
        marcador.style.left = pos.left;
        document.getElementById('container-diferencas').appendChild(marcador);
        
        atualizarProgresso();

        if (encontradas === totalNestaRonda) {
            setTimeout(() => mostrarEcra('ecra-fim'), 1000);
        }
    }

    function atualizarProgresso() {
        const percent = (encontradas / totalNestaRonda) * 100;
        document.getElementById('barra-progresso').style.width = percent + '%';
        document.getElementById('avatar-progresso').style.left = percent + '%';
    }
</script>
</body>
</html>
