<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Novo Header 🚀</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NOVO CABEÇALHO FLUTUANTE --- */
        .cabecalho-container {
            padding: 20px 0; /* Espaço para a cápsula "respirar" */
            flex-shrink: 0;
        }

        .cabecalho { 
            width: 92%;
            max-width: 1100px;
            height: 85px; 
            margin: 0 auto;
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            border-radius: 50px; /* Formato de cápsula */
            display: flex;
            align-items: center; 
            justify-content: space-between;
            padding: 0 25px; 
            box-shadow: 0 8px 25px rgba(46, 134, 222, 0.3);
            z-index: 20;
        }

        /* Lados equilibrados para centrar o título */
        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 2;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        /* Imagem imutável */
        .cabecalho-conteudo img { width: 70px; height: auto; }

        /* --- BOTÃO MENU IMUTÁVEL --- */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        /* --- ÁREA PRINCIPAL DO JOGO --- */
        #main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }

        /* --- FOOTER --- */
        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 650px) {
            .cabecalho { height: 70px; width: 95%; padding: 0 15px; }
            .cabecalho h1 { font-size: 1.2rem; }
            .cabecalho-conteudo img { width: 50px; }
            .header-left, .header-right { flex: 0 0 auto; }
        }
    </style>
</head>
<body>

<div class="cabecalho-container">
    <header class="cabecalho">
        <div class="header-left">
            <a href="../index.html" class="btn-menu">
                <span>🏠</span> MENU
            </a>
        </div>
        
        <div class="cabecalho-conteudo">
            <img src="https://openmoji.org/data/color/svg/1F4DD.svg" alt="ícone">
            <h1>Título do Jogo</h1>
        </div>

        <div class="header-right">
            </div>
    </header>
</div>

<main id="main-content">
    <div style="background:white; padding:40px; border-radius:30px; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
        <p style="font-size:1.2rem; font-weight:700; color:var(--azul-escuro);">
            O teu jogo começa aqui! 🚀
        </p>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    // Atualiza o ano automaticamente
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
