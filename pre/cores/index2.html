<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Escolar - Super Cores 🎨</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =====================================================================
           🚫 TEMPLATE BASE (MANTIDO)
           ===================================================================== */
        :root {
            --bg-body: #f0f7ff;
            --cor-pre: #4fd1c5;       
            --cor-pre-dark: #38a89d;
            --cor-borda: #48b5aa;    
            --bg-header: #e1f5f2;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; touch-action: none;}
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-borda); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }
        .btn-voltar { background: var(--cor-pre); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-pre-dark); display: flex; align-items: center; gap: 8px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 15px 20px; gap: 15px; width: 100%; box-sizing: border-box;}
        .cartao-jogo-container { background: white; width: 100%; max-width: 900px; flex: 1; padding: 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-pre); display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
        
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-borda); flex-shrink: 0; width: 100%;}
        .ecra { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 350px; text-align: center; flex: 1; }
        
        .btn-acao { background-color: var(--cor-pre); color: white; border: none; padding: 15px 35px; font-size: 1.3rem; font-weight: 700; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-pre-dark); margin-top: 10px; }
        .titulo-destaque { font-size: 2.2rem; color: var(--azul-escuro); margin: 0 0 20px 0; }
        .pergunta-destaque { font-size: 1.6rem; color: var(--azul-escuro); margin-bottom: 15px; font-weight: 900; }

        .caminho-magico { width: 100%; max-width: 700px; height: 50px; position: relative; display: none; margin-bottom: 5px; }
        .caminho-trilho { position: absolute; bottom: 10px; left: 40px; right: 50px; height: 0; border-bottom: 4px dashed var(--cor-pre); }
        .caminho-avatar { position: absolute; left: 0%; bottom: -5px; transform: translateX(-50%) scaleX(-1); font-size: 2.5rem; transition: left 0.8s ease; }
        .caminho-alvo { position: absolute; right: -10px; bottom: -2px; font-size: 2.5rem; }

        /* =====================================================================
           🟢 CSS ESPECÍFICO JOGOS DE CORES
           ===================================================================== */
        .menu-jogos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .btn-jogo { background: white; border: 3px solid var(--cor-pre); border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .btn-jogo span { font-size: 2.5rem; }
        
        .zona-interacao { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; width: 100%; position: relative; min-height: 250px;}
        .item-drag { font-size: 4.5rem; cursor: grab; user-select: none; touch-action: none; position: relative; z-index: 10; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1)); }
        .item-drag:active { cursor: grabbing; transform: scale(1.1); }

        .alvo-drop { width: 160px; height: 160px; border: 4px dashed #ccc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 5rem; transition: 0.3s; background: #fafafa; }
        .alvo-drop.over { border-color: var(--cor-pre); background: #e1f5f2; transform: scale(1.05); }

        .opcoes-cores { display: flex; gap: 15px; }
        .cor-botao { width: 70px; height: 70px; border-radius: 50%; border: 4px solid white; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        #confetti-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
        .error-shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="sidebar" id="sidebar">
    <div style="padding: 20px; font-weight: bold; color: #ff4757; cursor: pointer;" onclick="toggleMenu()">✕ Fechar</div>
    <ul style="list-style: none; padding: 0 20px;">
        <li><a href="#" style="text-decoration: none; color: #333; display: block; padding: 10px 0;">🏠 Início</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="#" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1 id="header-titulo">Mundo das Cores 🎨</h1>
        <div class="subtitulo" id="header-subtitulo">Vamos aprender as cores a brincar!</div>
    </div>
</header>

<main>
    <div class="caminho-magico" id="caminho-magico">
        <div class="caminho-trilho"><div class="caminho-avatar" id="avatar-progresso">🎨</div></div>
        <div class="caminho-alvo" id="alvo-progresso">🏆</div> 
    </div>

    <div class="cartao-jogo-container">
        <div id="ecra-selecao" class="ecra" style="display: flex;">
            <h2 class="titulo-destaque">Escolhe um jogo!</h2>
            <div class="menu-jogos">
                <button class="btn-jogo" onclick="iniciarJogo(1)"><span>👾</span><label>Monstro Comilão</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(2)"><span>🌳</span><label>Árvore Mágica</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(3)"><span>🚂</span><label>Comboio Cor</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(4)"><span>❓</span><label>Que cor é?</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(5)"><span>🧪</span><label>Misturas</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(6)"><span>👕</span><label>O Armário</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(7)"><span>🔍</span><label>Caça-Cores</label></button>
                <button class="btn-jogo" onclick="iniciarJogo(8)"><span>🌸</span><label>Flor Mágica</label></button>
            </div>
        </div>

        <div id="ecra-jogo" class="ecra">
            <div class="pergunta-destaque" id="instrucao-ronda">Prepara-te...</div>
            <div id="area-conteudo-jogo" class="zona-interacao"></div>
        </div>

        <div id="ecra-fim" class="ecra" style="position: absolute; top:0; left:0; height:100%; background:white; z-index:20; border-radius:30px;">
            <div style="font-size: 5rem;">🎉</div>
            <h2 class="titulo-destaque">Incrível!</h2>
            <p id="msg-fim">És um artista das cores!</p>
            <button class="btn-acao" onclick="voltarMenuPrincipal()">Outro Jogo 🔄</button>
        </div>
    </div>
</main>

<canvas id="confetti-canvas"></canvas>
<footer><p>2024 🏫 EB1/PE da Marinheira</p></footer>

<script>
    /* =====================================================================
       ⚙️ LÓGICA DO TEMPLATE
       ===================================================================== */
    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
    }

    function mostrarEcra(id) {
        document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function voltarMenuPrincipal() {
        document.getElementById('caminho-magico').style.display = 'none';
        mostrarEcra('ecra-selecao');
    }

    function atualizarProgressoCaminho(perc) {
        document.getElementById('avatar-progresso').style.left = perc + "%";
    }

    // Áudio Context
    let audioCtx = null;
    function tocarSom(tipo) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;
        if (tipo === 'acerto') {
            osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1000, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); osc.start(); osc.stop(agora + 0.2);
        } else if (tipo === 'erro') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, agora);
            gain.gain.setValueAtTime(0.05, agora); osc.start(); osc.stop(agora + 0.3);
        }
    }

    /* =====================================================================
       🎨 LÓGICA DOS JOGOS E DRAG & DROP
       ===================================================================== */
    const CORES = {
        vermelho: { nome: 'Vermelho', hex: '#ff4757', itens: ['🍎', '🍓', '🚗', '🎈'] },
        azul: { nome: 'Azul', hex: '#0091ff', itens: ['🐳', '🐟', '👕', '🧊'] },
        amarelo: { nome: 'Amarelo', hex: '#ffa502', itens: ['🍌', '🌻', '🐤', '⭐'] },
        verde: { nome: 'Verde', hex: '#2ed573', itens: ['🍏', '🐸', '🐢', '🍃'] }
    };

    let jogoAtual = 0;
    let ronda = 0;
    let totalRondas = 4;
    let corAlvo = "";

    function iniciarJogo(id) {
        jogoAtual = id;
        ronda = 0;
        document.getElementById('caminho-magico').style.display = 'block';
        atualizarProgressoCaminho(0);
        mostrarEcra('ecra-jogo');
        proximaRonda();
    }

    function proximaRonda() {
        if (ronda >= totalRondas) {
            tocarSom('acerto');
            mostrarEcra('ecra-fim');
            return;
        }
        
        const area = document.getElementById('area-conteudo-jogo');
        area.innerHTML = "";
        const chaves = Object.keys(CORES);
        corAlvo = chaves[Math.floor(Math.random() * chaves.length)];
        
        document.getElementById('instrucao-ronda').innerText = `Encontra o ${corAlvo.toUpperCase()}!`;
        
        // Criar Alvo (Recipiente)
        const alvo = document.createElement('div');
        alvo.className = "alvo-drop";
        alvo.innerHTML = jogoAtual === 1 ? "👾" : (jogoAtual === 6 ? "🧺" : "⭕");
        area.appendChild(alvo);

        // Criar Itens para arrastar
        const pool = [];
        pool.push({cor: corAlvo, item: CORES[corAlvo].itens[Math.floor(Math.random()*4)]});
        while(pool.length < 4) {
            let cErrada = chaves[Math.floor(Math.random()*4)];
            if(cErrada !== corAlvo) pool.push({cor: cErrada, item: CORES[cErrada].itens[Math.floor(Math.random()*4)]});
        }
        pool.sort(() => Math.random() - 0.5);

        pool.forEach(obj => {
            const el = document.createElement('div');
            el.className = "item-drag";
            el.textContent = obj.item;
            el.dataset.cor = obj.cor;
            area.appendChild(el);
            tornarArrastavel(el, alvo);
        });
    }

    function tornarArrastavel(el, alvo) {
        let isDragging = false;
        let startX, startY, origX, origY;

        el.onpointerdown = (e) => {
            isDragging = true;
            el.setPointerCapture(e.pointerId);
            startX = e.clientX; startY = e.clientY;
            const rect = el.getBoundingClientRect();
            origX = rect.left; origY = rect.top;
        };

        el.onpointermove = (e) => {
            if (!isDragging) return;
            el.style.transform = `translate(${e.clientX - startX}px, ${e.clientY - startY}px)`;
            
            const aRect = alvo.getBoundingClientRect();
            if (e.clientX > aRect.left && e.clientX < aRect.right && e.clientY > aRect.top && e.clientY < aRect.bottom) {
                alvo.classList.add('over');
            } else {
                alvo.classList.remove('over');
            }
        };

        el.onpointerup = (e) => {
            if (!isDragging) return;
            isDragging = false;
            alvo.classList.remove('over');
            
            const aRect = alvo.getBoundingClientRect();
            if (e.clientX > aRect.left && e.clientX < aRect.right && e.clientY > aRect.top && e.clientY < aRect.bottom) {
                if (el.dataset.cor === corAlvo) {
                    tocarSom('acerto');
                    el.remove();
                    ronda++;
                    atualizarProgressoCaminho((ronda/totalRondas)*100);
                    setTimeout(proximaRonda, 600);
                } else {
                    tocarSom('erro');
                    el.classList.add('error-shake');
                    setTimeout(() => el.classList.remove('error-shake'), 400);
                    el.style.transform = "none";
                }
            } else {
                el.style.transform = "none";
            }
        };
    }
</script>
</body>
</html>
