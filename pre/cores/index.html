<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monstro das Cores 👹</title>
<link rel="icon" type="image/png" href="../../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* =====================================================================
 🚫 NÃO MEXER: CSS DO TEMPLATE BASE E ESTRUTURA GERAL 🚫
 ===================================================================== */

:root {
            --bg-body: #f0f7ff;
            --cor-pre: #4fd1c5;       
            --cor-pre-dark: #38a89d;
            --cor-borda: #48b5aa;    
            --bg-header: #e1f5f2;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; touch-action: pan-y;}
        
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-borda); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-pre); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-pre-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-pre); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 15px 20px; gap: 15px; width: 100%; box-sizing: border-box;}
        
        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 900px; 
            flex: 1; 
            padding: 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-pre); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; position: relative; overflow: hidden; 
        }
        
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-borda); flex-shrink: 0; width: 100%;}
        footer p { font-size: 0.8rem; color: var(--cor-borda); margin: 0; }
        footer a { color: var(--cor-borda); text-decoration: none; font-weight: 700; }
        
        /* ECRÃS BASE (Garante centragem e esconde o que não está ativo) */
        .ecra { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 350px; text-align: center; flex: 1; box-sizing: border-box; }
        
        /* BOTÕES GLOBAIS INTOCÁVEIS */
        .btn-acao { background-color: var(--cor-pre); color: white; border: none; padding: 15px 35px; font-size: 1.3rem; font-weight: 700; border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-pre-dark); transition: 0.2s; text-transform: uppercase; margin-top: 10px; display: inline-flex; align-items: center; justify-content: center; gap: 10px;}
        .btn-acao:active { transform: translateY(5px); box-shadow: 0 0px 0 transparent; }
        .btn-acao:hover { filter: brightness(1.05); }

        /* TÍTULOS E TEXTOS BASE */
        .titulo-destaque { font-size: 2.2rem; color: var(--azul-escuro); margin: 0 0 20px 0; font-weight: 700;}
        .pergunta-destaque { font-size: 1.8rem; color: var(--azul-escuro); margin-bottom: 15px; font-weight: 900; }

        /* O CAMINHO MÁGICO (BARRA DE PROGRESSO DO PRÉ-ESCOLAR) */
        .caminho-magico { width: 100%; max-width: 700px; height: 50px; position: relative; display: none; margin-bottom: 5px; flex-shrink: 0; }
        .caminho-trilho { position: absolute; bottom: 10px; left: 40px; right: 50px; height: 0; border-bottom: 4px dashed var(--cor-pre); z-index: 1; }
        .caminho-avatar { position: absolute; left: 0%; bottom: -5px; transform: translateX(-50%) scaleX(-1); font-size: 2.5rem; transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 3; filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15)); line-height: 1; }
        .caminho-alvo { position: absolute; right: -10px; bottom: -2px; font-size: 2.5rem; z-index: 2; filter: drop-shadow(0 3px 3px rgba(0,0,0,0.15)); line-height: 1; }

        /* ANIMAÇÕES GLOBAIS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        .error-shake { animation: shakeError 0.4s ease; }
        
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 15px 10px; gap: 10px; }
            .cartao-jogo-container { padding: 15px; border-radius: 20px;}
        }


 /* =====================================================================
   🟢 CSS PERSONALIZADO DO JOGO 1 – (CORRIGIDO) 🟢
 ===================================================================== */

 /* Forçar grelha sólida */
 #monstro-origem,
 #monstro-boca {
     display: flex !important;
     flex-wrap: wrap !important;
     justify-content: center !important;
     align-items: flex-start !important;
     gap: 18px !important;
 }

 /* Boca deve expandir horizontal primeiro */
 #monstro-boca {
     min-width: 260px !important;
     max-width: 90% !important;
     width: auto !important;
 }

 /* Prevenir salto / colapso vertical */
 #monstro-origem,
 #monstro-boca,
 #monstro-container {
     overflow: visible !important;
     height: auto !important;
     max-height: none !important;
 }

 /* Botão alinhado */
 #monstro-container .btn-acao {
     margin-top: 25px !important;
     margin-bottom: 30px !important;
 }

 /* Evitar scroll global */
 #area-jogo-1 {
    max-height: none !important;
    overflow-y: visible !important;
 }

 /* Cada item */
 .objeto-cor {
     width: 65px !important;
     height: 65px !important;
     border-radius: 12px !important;
     border: 3px solid #ccc !important;
     background: white !important;
     display: flex !important;
     align-items: center !important;
     justify-content: center !important;
     font-size: 2.2rem !important;
     cursor: pointer !important;
     user-select: none !important;
 }

</style>
</head>

<body>

<!-- 🚫 NÃO MEXER: OVERLAY E SIDEBAR 🚫 -->
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../">🏠 Início</a></li>
        <li><a href="../">🎨 Pré-Escolar</a></li>
        <li><a href="../../1/">🎒 1º Ano</a></li>
        <li><a href="../../2/">💡 2º Ano</a></li>
        <li><a href="../../3/">🔍 3º Ano</a></li>
        <li><a href="../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<!-- 🚫 NÃO MEXER: HEADER BASE 🚫 -->
<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>

        <h1 id="header-titulo">Monstro das Cores 👹</h1>
        <div class="subtitulo" id="header-subtitulo">Escolhe os objetos da cor pedida!</div>
    </div>
</header>

<main>

    <!-- 🚫 NÃO MEXER: CAMINHO MÁGICO 🚫 -->
    <div class="caminho-magico" id="caminho-magico">
        <div class="caminho-trilho">
            <div class="caminho-avatar" id="avatar-progresso">🐝</div>
        </div>
        <div class="caminho-alvo" id="alvo-progresso">🌻</div>
    </div>

    <!-- 🚫 NÃO MEXER: CARTÃO PRINCIPAL 🚫 -->
    <div class="cartao-jogo-container">

        <!-- ======================= -->
        <!-- ECRÃ DE SELEÇÃO (MENU) -->
        <!-- ======================= -->

        <div id="ecra-selecao" class="ecra" style="display:flex;">
            <h2 class="titulo-destaque">Escolhe o teu jogo das cores! 🎨</h2>
            <div class="exemplo-menu-grid">
                <button class="btn-acao" onclick="iniciarJogo(1)">👹 Monstro das Cores</button>
            </div>
        </div>

        <!-- ======================= -->
        <!-- ECRÃ DE JOGO            -->
        <!-- ======================= -->

        <div id="ecra-jogo" class="ecra" style="justify-content:flex-start;">
            <div class="pergunta-destaque" id="instrucao-ronda">O que é que vamos fazer?</div>

            <!-- =============================== -->
            <!-- ÁREA DO JOGO 1 (CORRETA!)      -->
            <!-- =============================== -->
            <div id="area-jogo-1" style="display:none; width:100%;">

                <div id="monstro-container"
                     style="width:100%; display:flex; flex-direction:column; align-items:center;">

                    <!-- Cara do Monstro -->
                    <div id="monstro-cara" style="font-size:4rem; margin-bottom:-5px;">
                        👹
                    </div>

                    <!-- Boca -->
                    <div id="monstro-boca"
                         class="zona destino"
                         style="min-height:130px; margin-bottom:20px;">
                    </div>

                    <!-- Origem -->
                    <div id="monstro-origem"
                         class="zona origem"
                         style="min-height:150px; width:90%; margin:auto;">
                    </div>

                    <!-- Botão -->
                    <button class="btn-acao" onclick="monstroVerificar()">✔️ Pronto</button>
                </div>
            </div>

            <!-- Futuro Jogo 2 -->
            <div id="area-jogo-2" style="display:none; width:100%;"></div>

        </div>

        <!-- ============= -->
        <!-- ECRÃ DE FIM   -->
        <!-- ============= -->
        <div id="ecra-fim" class="ecra" 
             style="position:absolute; top:0; left:0; height:100%; 
                    background:rgba(255,255,255,0.95); z-index:20; border-radius:30px; display:none;">
            <div style="font-size:5rem; margin-bottom:5px;">🏆</div>
            <h2 class="titulo-destaque">Parabéns!</h2>
            <p style="font-size:1.2rem; color:var(--text-main); margin-bottom:25px;" 
               id="msg-fim">Completaste o jogo com sucesso!</p>
            <button class="btn-acao" onclick="voltarMenuPrincipal()">Jogar Outro 🔄</button>
        </div>

    </div>
</main>

<canvas id="confetti-canvas"></canvas>

<footer>
    <p><span id="ano-atual"></span> 🏫 
        <a href="https://eb1pemarinheira.pt/" target="_blank" 
           style="color:inherit; text-decoration:none; font-weight:700;">
           EB1/PE da Marinheira
        </a>
    </p>
</footer>

<script>
/* ======================================================
   JOGO 1 – MONSTRO DAS CORES (clicar + arrastar)
   Integrado no sistema nativo do TEMPLATE_BASE
====================================================== */

/* Substituir avatar do trilho */
document.getElementById("avatar-progresso").textContent = "🐝";
document.getElementById("alvo-progresso").textContent = "🌻";

/* Objetos reais por cor */
const coresMonstro = {
    vermelho: ["🍎","🍓","❤️"],
    azul: ["💧","🐳","🌍"],
    amarelo: ["🍋","⭐","🐥"],
    verde: ["🍏","🌿","🐢"],
    laranja: ["🍊","🥕","🎃"],
    roxo: ["🍇","💜","☂️"]
};

/* Texto visual da cor */
const corDisplay = {
    vermelho: "🍎 VERMELHOS",
    azul: "💧 AZUIS",
    amarelo: "🍋 AMARELOS",
    verde: "🍏 VERDES",
    laranja: "🍊 LARANJAS",
    roxo: "🍇 ROXOS"
};

/* Cores por nível */
const corNiveis = [
    ["vermelho","azul"],
    ["vermelho","azul","amarelo","verde"],
    ["vermelho","azul","amarelo","verde","laranja","roxo"]
];

let nivelMonstro = 0;
let corAlvo = "";

/* Guardar prepararRonda original */
const prepararRondaOriginal = prepararRonda;

/* Substituir prepararRonda apenas quando jogoAtual = 1 */
prepararRonda = function () {

    if (jogoAtual !== 1) {
        prepararRondaOriginal();
        return;
    }

    /* Atualizar texto da ronda */
    document.getElementById("instrucao-ronda").textContent =
        `Ronda ${rondaAtual + 1} de ${totalRondas}`;

    /* Determinar nível */
    if (rondaAtual < 2) nivelMonstro = 0;
    else if (rondaAtual < 4) nivelMonstro = 1;
    else nivelMonstro = 2;

    prepararRondaMonstro();
};

/* =====================================================================
   PREPARAÇÃO DA RONDA DO MONSTRO
   ===================================================================== */
function prepararRondaMonstro() {

    const origem = document.getElementById("monstro-origem");
    const boca = document.getElementById("monstro-boca");

    origem.innerHTML = "";
    boca.innerHTML = "";

    const coresDisponiveis = corNiveis[nivelMonstro];

    /* Escolher cor alvo */
    corAlvo = coresDisponiveis[Math.floor(Math.random() * coresDisponiveis.length)];

    /* Texto */
    document.getElementById("instrucao-ronda").textContent =
        `O monstro quer objetos ${corDisplay[corAlvo]}!`;

    /* Criar os objetos */
    const objetos = [];

    /* Garantir que TODOS os objetos da cor certa devem ser selecionados */
    const quantidadeCorCerta = Math.floor(Math.random() * 3) + 3; // entre 3 e 5

    for (let i = 0; i < quantidadeCorCerta; i++) {
        objetos.push({
            cor: corAlvo,
            emoji: coresMonstro[corAlvo][Math.floor(Math.random() * coresMonstro[corAlvo].length)]
        });
    }

    /* Restantes objetos até 10 */
    while (objetos.length < 10) {
        const cor = coresDisponiveis[Math.floor(Math.random() * coresDisponiveis.length)];
        objetos.push({
            cor: cor,
            emoji: coresMonstro[cor][Math.floor(Math.random() * coresMonstro[cor].length)]
        });
    }

    /* Baralhar */
    objetos.sort(() => Math.random() - 0.5);

    /* Criar no ecrã */
    objetos.forEach(obj => {

        const div = document.createElement("div");
        div.className = "objeto-cor";
        div.dataset.cor = obj.cor;
        div.textContent = obj.emoji;

        /* Clique */
        div.onclick = () => {
            tocarSom("pop");
            if (div.parentElement.id === "monstro-origem") boca.appendChild(div);
            else origem.appendChild(div);
        };

        /* Arrastar */
        div.draggable = true;
        div.ondragstart = () => { window._dragObj = div; };

        origem.appendChild(div);
    });

    /* Permitir drop */
    origem.ondragover = boca.ondragover = e => e.preventDefault();
    origem.ondrop = () => origem.appendChild(window._dragObj);
    boca.ondrop = () => boca.appendChild(window._dragObj);
}

/* =====================================================================
   VERIFICAR RESPOSTA
   ===================================================================== */
function monstroVerificar() {

    if (jogoAtual !== 1) return;

    const origem = document.getElementById("monstro-origem");
    const boca = document.getElementById("monstro-boca");

    const itensOrigem = [...origem.children];
    const itensBoca = [...boca.children];

    /* Quantos itens da cor certa existem no total? */
    const totalCertos = [
        ...document.querySelectorAll("#monstro-origem .objeto-cor, #monstro-boca .objeto-cor")
    ].filter(el => el.dataset.cor === corAlvo).length;

    /* Quantos o aluno colocou na boca? */
    const colocadosCertos = itensBoca.filter(el => el.dataset.cor === corAlvo).length;

    /* Existem intrusos? */
    const intrusos = itensBoca.some(el => el.dataset.cor !== corAlvo);

    if (intrusos) {
        errou(boca);
        return;
    }

    /* Tem exactamente os corretos? */
    if (colocadosCertos !== totalCertos) {
        errou(boca);
        return;
    }

    /* Tudo certo */
    acertou();
}

</script>
</body>
</html>
