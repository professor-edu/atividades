<!DOCTYPE html>
<html lang='pt'>
<head>
<meta charset='UTF-8'>
<title>Jogos das Cores - Completo</title>
<style>
body{font-family:Roboto,sans-serif;background:#f7f7ff;margin:0;text-align:center;}
.menu{padding:30px;}
.card{border:4px solid #ff922b;padding:20px;border-radius:20px;display:inline-block;margin:10px;cursor:pointer;}
.hidden{display:none;}
</style>
</head>
<body>
<div id='menu' class='menu'>
 <h1>Jogos das Cores 🎨</h1>
 <div class='card' onclick="openGame('monstro')">👾 Monstro das Cores</div>
 <div class='card' onclick="openGame('arvore')">🌳 Árvore Mágica</div>
 <div class='card' onclick="openGame('comboio')">🚂 Comboio das Cores</div>
 <div class='card' onclick="openGame('mistura')">🧪 Misturador</div>
 <div class='card' onclick="openGame('armario')">🧦 Armário das Cores</div>
 <div class='card' onclick="openGame('flor')">🌼 Flor Mágica</div>
</div>

<div id='monstro' class='hidden'><h2>Monstro das Cores</h2></div>
<div id='arvore' class='hidden'><h2>Árvore Mágica</h2></div>
<div id='comboio' class='hidden'><h2>Comboio das Cores</h2></div>
<div id='mistura' class='hidden'><h2>Misturador</h2></div>
<div id='armario' class='hidden'><h2>Armário das Cores</h2></div>
<div id='flor' class='hidden'><h2>Flor Mágica</h2></div>

<script>
function openGame(id){
 document.querySelectorAll('.hidden, #menu').forEach(e=>e.style.display='none');
 document.getElementById(id).style.display='block';
}
</script>
</body>
</html>
