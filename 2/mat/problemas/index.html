<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>⭐ Problemas de Matemática | 2º Ano ⭐</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f7ff;
      text-align: center;
      padding: 30px;
    }

    .caixa {
      background: white;
      max-width: 450px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2a6edb;
    }

    p {
      font-size: 18px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background-color: #2a6edb;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #1f56aa;
    }
  body { scrollbar-gutter: stable; }
</style>
</head>

<body>

  <div class="caixa">
    <h1>🧮 Problemas de Matemática</h1>

    <p>
      Vais resolver <strong>10 problemas</strong> de matemática.<br><br>
      Lê com atenção, pensa bem e escreve a resposta.<br><br>
      Cada problema certo vale <strong>1 ponto ⭐</strong>.
    </p>

    <button onclick="comecar()">Começar</button>
  </div>

  <script>
    function comecar() {
      // Inicia a pontuação
      localStorage.setItem("pontuacao", 0);
      localStorage.setItem("problemaAtual", 1);

      // Vai para o primeiro problema
      window.location.href = "problema1.html";
    }
  </script>

</body>
</html>
