<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2º Ano - Estados da Água 💧</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="agua_dados.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --bg-body: #f0f4f8; --azul-vibrante: #0091ff; --cor-2ano: #e7d83f; --cor-2ano-dark: #E3C40D;
            --cor-borda: #E3C40D; --bg-header: #fff9c4; --azul-escuro: #0d47a1; --text-main: #455a64;
            --cor-pt: #ff6b6b; --cor-mat: #4dabf7; --cor-em: #51cf66;
            --cor-agua: #38bdf8; --cor-gelo: #93c5fd; --cor-sol: #fbbf24;
        }								 
        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        @media (min-width: 769px) and (min-height: 600px) { body { height: 100vh; overflow-y: hidden; } }
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-2ano-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.3); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.4s ease; }
        @media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }        
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        .btn-voltar { background: var(--cor-2ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-2ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
        .btn-voltar:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 15px 10px; gap: 10px; } 
            .cartao-jogo-container { padding: 15px; }
        }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-2ano); transform: translateX(8px); color: white !important;}
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; width: 100%; box-sizing: border-box; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 950px; flex: 1; min-height: 0; padding: 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-em); display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        .confetti-container { position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; border-radius:30px; z-index: 10; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-2ano-dark); margin-top: auto; flex-shrink: 0;}
        footer p { font-size: 0.8rem; color: var(--cor-borda); margin: 0; }
        
        .ecra { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; box-sizing: border-box; position: relative; z-index: 2;}
        #ecra-selecao { display: flex; }
        #ecra-jogo { justify-content: flex-start; }
        .titulo-menu { font-size: clamp(1.4rem, 4vw, 1.8rem); color: var(--azul-escuro); margin-bottom: 20px; font-weight: 900;}
        
        .grelha-opcoes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 700px; }
        @media (max-width: 500px) { .grelha-opcoes { grid-template-columns: 1fr; } } 

        .btn-nivel-menu { background-color: white; border: 4px solid #ced6e0; border-radius: 20px; padding: 15px; width: 100%; cursor: pointer; box-shadow: 0 6px 0 #ced6e0; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; touch-action: manipulation; }
        @media (hover: hover) { .btn-nivel-menu:hover { transform: translateY(-4px); border-color: var(--cor-em); box-shadow: 0 6px 0 var(--cor-em); } }
        .btn-nivel-menu:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .nivel-icon img { width: 45px; height: 45px; object-fit: contain;}
        .nivel-icon { font-size: 2.5rem; background: #fff0f0; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 0 auto;}
        .nivel-text { text-align: center; }
        .nivel-titulo { font-size: 1.2rem; font-weight: 900; display: block; color: var(--azul-escuro);}

        .status-bar-jogo { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; background: #eaf1eb; padding: 8px 12px; border-radius: 20px; border: 2px solid var(--cor-em); margin-bottom: 10px; box-sizing: border-box; flex-shrink: 0;}
        .btn-voltar-menu { background-color: white; color: var(--azul-escuro); border: 2px solid #ced6e0; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn-voltar-menu:hover { border-color: var(--azul-escuro); transform: scale(1.05); }
        .btn-dica { background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .btn-dica:hover:not(.esgotada) { border-color: #b18500; transform: scale(1.05); }
        .btn-dica.esgotada { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; }

        .badge-ronda, .badge-erros { background: white; font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 15px; white-space: nowrap; }
        .badge-ronda { border: 2px solid #219d53; color: #219d53; }
        .badge-erros { border: 2px solid #ff4757; color: #ff4757; }

        .progress-bg { background-color: #e2e8f0; border-radius: 20px; height: 35px; width: 100%; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); border: 2px solid white; }
        .progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s; background-color: var(--cor-2ano); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }
        
        @media (max-width: 600px) { .status-bar-jogo { flex-wrap: wrap; justify-content: center; } .btn-voltar-menu, .btn-dica { padding: 4px 8px; font-size: 0.8rem;} .badge-ronda, .badge-erros { font-size: 0.9rem; padding: 4px 8px; } .progress-bg { order: 4; min-width: 100%; margin-top: 5px; } }

        .toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
        .toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }
        .error-shake { animation: shakeError 0.4s ease; border: 2px solid #ff4757 !important; background-color: #ffefef !important; color: #ff4757 !important; }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }

        /* =========================================
           ÁREA DE JOGO GENÉRICA
           ========================================= */
        .area-jogo-custom { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; flex: 1; min-height: 0; background: #f8fafc; border: 2px dashed #ced6e0; border-radius: 20px; padding: 15px; overflow-y: auto; gap: 15px; position: relative; }
        .pergunta-titulo { font-size: clamp(1.1rem, 3vh, 1.3rem); font-weight: 900; color: var(--azul-escuro); text-align: center; margin: 0 0 10px 0;}

        /* Botoes Multipla Escolha */
        .grid-respostas { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; max-width: 650px; }
        .btn-resposta { background: white; border: 3px solid #ced6e0; border-radius: 15px; padding: 12px 15px; font-size: clamp(0.95rem, 2vh, 1.1rem); font-weight: bold; color: var(--text-main); cursor: pointer; box-shadow: 0 5px 0 #ced6e0; transition: all 0.2s; display: flex; justify-content: center; align-items: center; text-align: center; flex: 0 1 calc(50% - 15px); min-width: 130px; max-width: 250px; }
        @media (hover: hover) { .btn-resposta:hover:not(:disabled) { transform: translateY(-4px); background-color: #f1f8ff; border-color: var(--azul-vibrante); box-shadow: 0 7px 0 var(--azul-vibrante); } }
        .btn-resposta:active:not(:disabled) { transform: translateY(5px) !important; box-shadow: 0 0px 0 transparent !important; }
        .btn-resposta.erro { border-color: #ff4757 !important; color: #ff4757 !important; box-shadow: 0 5px 0 #ff4757 !important; }
        .btn-resposta.certo { background-color: #e8f5e9 !important; border-color: var(--cor-em) !important; color: #1e7e34 !important; box-shadow: 0 5px 0 var(--cor-em) !important; transform: scale(1.05); }

        /* JOGO 1: O LABORATÓRIO */
        .lab-container { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; gap: 20px;}
        .lab-wrapper { height: 230px; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; } /* Previne saltos */
        .lab-objeto { width: 256px; height: 256px; background: white; border: 6px solid #bce3ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 6rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); position: relative; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10; }
        .lab-objeto.drag-over { transform: scale(1.15); border-color: var(--cor-em); box-shadow: 0 0 30px rgba(81,207,102,0.6); }
        .lab-objeto.sucesso { animation: pulseLab 0.5s ease; border-color: var(--cor-em); background: #e8f5e9; }
        .lab-objeto img { max-width: 80%; max-height: 80%; object-fit: contain; }
        @keyframes pulseLab { 0% { transform: scale(1); } 50% { transform: scale(1.2) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }
        
        .lab-ferramentas { display: flex; gap: 40px; justify-content: center; width: 100%; padding: 20px; }
        .ferramenta { font-size: 4rem; cursor: grab; background: white; padding: 15px; border-radius: 50%; box-shadow: 0 6px 0 #ced6e0; touch-action: none; user-select: none; transition: transform 0.1s;}
        .ferramenta:active { cursor: grabbing; box-shadow: 0 0 0 transparent; transform: translateY(6px); }

        /* JOGO 4: MÁQUINA DAS PALAVRAS (Layout novo) */
        .maquina-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 700px; }
        .maquina-box { background: #1e293b; padding: 25px; border-radius: 25px; border-bottom: 8px solid #0f172a; width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; box-shadow: 0 10px 20px rgba(0,0,0,0.1);}
        .maquina-estado { background: white; color: #1e293b; font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 900; padding: 15px 30px; border-radius: 15px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1); }
        .seta-maquina { font-size: 2.5rem; color: #fbbf24; font-weight: bold;}
        .drop-maquina { width: 220px; height: 60px; background: #e2e8f0; border: 3px dashed #94a3b8; border-radius: 50px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative;}
        .drop-maquina.drag-over { background: #cbd5e1; border-color: #fbbf24; transform: scale(1.05); }
        .drop-maquina.preenchida { background: #219d53; border-color: #1e7e34; }
        .placeholder-text { color: #64748b; font-weight: bold; font-size: 0.95rem; }

        /* DRAG POOL E FANTASMAS (Pílulas) */
        .drag-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; padding: 15px; background: white; border-radius: 20px; border: 2px dashed #ced6e0; min-height: 80px; position: relative;}
        .drag-item { background-color: var(--azul-vibrante); color: white; padding: 10px 22px; font-size: clamp(0.85rem, 2.5vw, 1.1rem); font-weight: bold; border-radius: 50px; cursor: grab; touch-action: none; box-shadow: 0 4px 0 #187cd6; border: 1px solid #187cd6; transition: transform 0.1s, box-shadow 0.1s; user-select: none; z-index: 100; text-align: center; white-space: nowrap; }
        .drag-item:active { cursor: grabbing; transform: translateY(3px) !important; box-shadow: 0 1px 0 #187cd6 !important; }
        .drop-zone .drag-item { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: none !important; border: none !important; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: transparent; color: white; font-size: clamp(1rem, 2.2vw, 1.3rem); padding: 0; text-shadow: 1px 1px 0px rgba(0,0,0,0.3); }
        
        .drag-ghost { opacity: 0; pointer-events: none; } /* O Fantasma que mantém o layout limpo! */

        /* CAIXA DE CURIOSIDADE */
        .caixa-curiosidade { background: #fff9c4; border: 3px solid #fbc531; color: #b18500; padding: 10px; border-radius: 20px; font-size: 1rem; margin-top: 15px; width: 100%; max-width: 800px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); animation: fadeIn 0.4s ease; line-height: 1.4; text-align: left; }
        .btn-seguinte { background: var(--cor-em); color: white; border: none; padding: 12px 30px; font-size: 1.2rem; font-weight: bold; border-radius: 15px; margin-top: 10px; cursor: pointer; box-shadow: 0 5px 0 #1e7e34; transition: transform 0.2s, box-shadow 0.2s; animation: fadeIn 0.5s ease; }
        @media (hover: hover) { .btn-seguinte:hover { transform: translateY(-3px); box-shadow: 0 8px 0 #1e7e34; } }
        .btn-seguinte:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        /* Outros */
        .imagem-grande { width: clamp(150px, 30vh, 180px); height: clamp(150px, 30vh, 180px); background: white; border: 4px solid var(--cor-mat); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 6rem; box-shadow: 0 6px 0 var(--cor-mat); flex-shrink: 0; margin-bottom: 10px;}
        .texto-historia { font-size: 1.3rem; font-weight: bold; color: var(--text-main); max-width: 700px; line-height: 1.5; background: #f7f3cf; padding: 20px; border-radius: 20px; border: 2px solid #e2e8f0; margin-bottom: 15px;}

        /* Ecrã Fim */
        .end-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--azul-escuro); margin-bottom: 25px; }
        .end-stats { font-size: 1.3rem; color: var(--text-main); margin-bottom: 40px; text-align: center; background: #fff; padding: 30px 20px; border-radius: 20px; border: 2px solid #ffebeb; line-height: 1.5; }
        .btn-acao { background-color: var(--azul-escuro); color: white; border: none; padding: 15px 35px; font-size: 1.1rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #093273; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; transition: transform 0.2s, box-shadow 0.2s, filter 0.2s; }
        @media (hover: hover) { .btn-acao:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #093273; filter: brightness(1.15); } }
        .btn-acao:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .btn-acao.secundario { background-color: #ced6e0; color: #2d3436; box-shadow: 0 6px 0 #a4b0be; }
        @media (hover: hover) { .btn-acao.secundario:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #a4b0be; filter: brightness(1.05); } }
        .btn-acao.secundario:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent !important; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; pointer-events: none;}
        @keyframes fall { to { transform: translateY(600px) rotate(360deg); opacity: 0; } }
				/* =========================================
		   CORREÇÃO PARA TELEMÓVEIS NA HORIZONTAL
		 ========================================= */
		@media (max-height: 600px) {
			body {
				height: auto !important;
				overflow-y: auto !important;
			}
			main {
				justify-content: flex-start !important; /* Evita que o topo do cartão desapareça */
				padding-top: 15px;
				padding-bottom: 15px;
				overflow-y: visible !important;
			}
			.cartao-jogo-container {
				margin: auto 0; /* Centra perfeitamente se houver espaço, ou deixa fazer scroll se não houver */
			}
		} 					  
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../../1">🎒 1º Ano</a></li>
        <li><a href="../../">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
			<a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Estados da Água 💧</h1>
        <div class="subtitulo">Descobre a magia da natureza!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="cartao-jogo">
        <div id="confetti-container" class="confetti-container"></div>
        <div class="toast-msg" id="toast-msg">Mensagem entra aqui!</div>

        <!-- ECRÃ DE SELEÇÃO -->
        <div id="ecra-selecao" class="ecra">
			<h2 class="titulo-menu">Escolhe um desafio:</h2>
            <div class="grelha-opcoes">
                <button class="btn-nivel-menu" onclick="iniciarJogo('laboratorio')">
                    <span class="nivel-icon" style="background:#e3f2fd;">🧪</span>
                    <span class="nivel-text">
                        <span class="nivel-titulo">O Laboratório</span>
                        <span style="font-size:0.8rem; color:#666;">Aquece e arrefece!</span>
                    </span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo('detetive')">
                    <span class="nivel-icon" style="background:#e8f5e9;">🔍</span>
                    <span class="nivel-text">
                        <span class="nivel-titulo">O Detetive</span>
                        <span style="font-size:0.8rem; color:#666;">Descobre o fenómeno.</span>
                    </span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo('gotinha')">
                    <span class="nivel-icon" style="background:#fff3e0;">🌧️</span>
                    <span class="nivel-text">
                        <span class="nivel-titulo">A Gotinha</span>
                        <span style="font-size:0.8rem; color:#666;">A viagem no ciclo da água.</span>
                    </span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo('maquina')">
                    <span class="nivel-icon" style="background:#fce4ec;">⚙️</span>
                    <span class="nivel-text">
                        <span class="nivel-titulo">A Máquina</span>
                        <span style="font-size:0.8rem; color:#666;">O que aconteceu?</span>
                    </span>
                </button>
            </div>
        </div>

        <!-- ECRÃ DE JOGO -->
        <div id="ecra-jogo" class="ecra">
            <div class="status-bar-jogo">
                <button class="btn-voltar-menu" onclick="voltarAoMenu()">🏠 Menu</button>
                <button id="btn-dica" class="btn-dica" onclick="usarDica()">💡 Dica</button>
                <div class="badge-ronda" id="zona-progresso">⭐ <span id="val-progresso">1</span>/<span id="val-total">10</span></div>
				<div class="progress-bg" id="zona-barra"><div id="progress-fill" class="progress-fill"></div></div>
                <div class="badge-erros">❌ <span id="val-erros">0</span></div>
            </div>

            <div class="area-jogo-custom" id="area-jogo"></div>
        </div>

        <!-- ECRÃ DE FIM -->
        <div id="ecra-fim" class="ecra">
            <h2 class="end-title">Missão Cumprida! 🎉</h2>
            <div class="end-stats">
                És um cientista genial!<br><br>
                Cometeste <strong id="final-erros" style="color:#ff4757; font-size:2rem;">0</strong> erros.
            </div>
            <button class="btn-acao" onclick="reiniciarJogo()">JOGAR DE NOVO 🔄</button>
            <button class="btn-acao secundario" onclick="voltarAoMenu()">ESCOLHER OUTRO 🏠</button>
        </div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    // UI BÁSICA E SOM
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); document.getElementById('hamburgerBtn').classList.toggle('open'); }
    function mostrarEcra(id) { document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none'); document.getElementById(id).style.display = 'flex'; }

    let toastTimeout;
    function showToast(msg, isError = false, tempo = 2500) {
        const toast = document.getElementById('toast-msg'); clearTimeout(toastTimeout);
        toast.innerHTML = msg; toast.style.borderColor = isError ? "#ff4757" : "#fbc531"; toast.style.color = isError ? "#ff4757" : "#b18500"; toast.style.backgroundColor = isError ? "#ffefef" : "#fff9c4";
        toast.classList.add('active'); toastTimeout = setTimeout(() => toast.classList.remove('active'), tempo);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); const agora = audioCtx.currentTime;
        if (tipo === 'acerto') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3); osc.start(agora); osc.stop(agora + 0.3);
        } else if (tipo === 'erro') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(250, agora); osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.15, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3); osc.start(agora); osc.stop(agora + 0.3);
        } else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50]; 
            notas.forEach((freq, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.value = freq; g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3); o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3); });
        }
    }

    function lancarConfetis() {
        const container = document.getElementById('confetti-container'); container.innerHTML = "";
        const colors =['#e7d83f', '#0091ff', '#51cf66', '#ff6b6b', '#ff9f43'];
        for (let i = 0; i < 60; i++) {
            let conf = document.createElement('div'); conf.className = 'confetti';
            conf.style.left = Math.floor(Math.random() * 90 + 5) + '%'; conf.style.top = '-10%'; conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's'; conf.style.animationDelay = (Math.random() * 1.5) + 's'; container.appendChild(conf);
        }
    }

    // ESTADO DO JOGO
    let modoAtual = ""; let listaRonda =[]; let rondaIndex = 0; let totalRondas = 10; let errosTotais = 0; let dicaUsada = false;

    function iniciarJogo(modo) {
        modoAtual = modo; errosTotais = 0; rondaIndex = 0; dicaUsada = false;
        
        let pool =[];
        if (modo === 'laboratorio') pool =[...laboratorioDados];
        else if (modo === 'detetive') pool =[...detetiveDados];
        else if (modo === 'gotinha') pool =[...gotinhaDados];
        else if (modo === 'maquina') pool =[...maquinaDados];

        if (modo === 'laboratorio' || modo === 'maquina') { 
            document.getElementById('btn-dica').style.display = 'none'; 
        } else { 
            document.getElementById('btn-dica').style.display = 'flex'; 
            document.getElementById('btn-dica').classList.remove('esgotada'); 
        }

        totalRondas = Math.min(10, pool.length);
        
        // A Gotinha NÃO baralha, segue a história. Os outros baralham.
        if (modo === 'gotinha') {
            listaRonda = pool.slice(0, totalRondas);
        } else {
            listaRonda = pool.sort(() => 0.5 - Math.random()).slice(0, totalRondas);
        }

        atualizarPlacarUI();
        mostrarEcra('ecra-jogo');
        prepararRonda();
    }

    function atualizarPlacarUI() {
        document.getElementById('val-erros').textContent = errosTotais;
        document.getElementById('val-progresso').textContent = rondaIndex + 1 > totalRondas ? totalRondas : rondaIndex + 1;
        document.getElementById('val-total').textContent = totalRondas;
        document.getElementById('progress-fill').style.width = `${(rondaIndex / totalRondas) * 100}%`;
    }

    function usarDica() {
        if (dicaUsada) return;
        dicaUsada = true; document.getElementById('btn-dica').classList.add('esgotada');
        const botoes = Array.from(document.querySelectorAll('.btn-resposta:not(.certo):not(.erro)'));
        const errados = botoes.filter(b => b.dataset.correto !== 'true');
        if (errados.length > 0) {
            const btnApagar = errados[Math.floor(Math.random() * errados.length)];
            btnApagar.style.opacity = '0.3'; btnApagar.style.pointerEvents = 'none'; tocarSom('acerto');
        }
    }

	function prepararRonda() {
			const area = document.getElementById('area-jogo');
			area.innerHTML = ""; 
			const atual = listaRonda[rondaIndex];

			// BÓNUS: Renova a dica na fase 6 para a Gotinha E para o Detetive
			if ((modoAtual === 'gotinha' || modoAtual === 'detetive') && rondaIndex === 5 && dicaUsada) {
				dicaUsada = false;
				document.getElementById('btn-dica').classList.remove('esgotada');
				showToast("Ganhaste uma nova Dica Mágica! 💡", false, 2500);
				tocarSom('vitoria'); // Som de recarga
			}

			// 1. O LABORATÓRIO (Arrastar Sol/Gelo)
			if (modoAtual === 'laboratorio') {
				area.innerHTML = `
					<div class="lab-container">
						<h3 class="pergunta-titulo">${atual.pergunta}</h3>
						<div class="lab-wrapper">
							<div class="lab-objeto drop-zone" data-resposta="${atual.ferramenta}">
								<img src="${atual.imgInicial}" alt="" style="max-width: 80%; max-height: 80%; object-fit: contain;">
							</div>
						</div>
						<div class="lab-ferramentas">
							<!-- BOTÃO QUENTE -->
							<div class="ferramenta drag-item" data-ferramenta="sol" style="display:flex; align-items:center; justify-content:center; gap:12px; border-radius:50px; padding:10px 25px; background: #f7eb7e; color:var(--text-main); border:3px solid #ced6e0; box-shadow:0 5px 0 #ced6e0; text-shadow:none;">
								<img src="img/ferramenta_sol.png" style="width:45px; height:45px; pointer-events:none;" alt="">
								<span style="font-weight:900; font-size:1.3rem; pointer-events:none;">Calor</span>
							</div>
							
							<!-- BOTÃO FRIO -->
							<div class="ferramenta drag-item" data-ferramenta="frio" style="display:flex; align-items:center; justify-content:center; gap:12px; border-radius:50px; padding:10px 25px; background: #54aff3; color:var(--text-main); border:3px solid #ced6e0; box-shadow:0 5px 0 #ced6e0; text-shadow:none;">
								<img src="img/ferramenta_frio.png" style="width:45px; height:45px; pointer-events:none;" alt="">
								<span style="font-weight:900; font-size:1.3rem; pointer-events:none;">Frio</span>
							</div>
						</div>
					</div>
				`;
				ativarDragUniversal('.ferramenta', '.lab-objeto', (item, drop) => acertouLaboratorio(atual, drop));
			}

        // 2. O DETETIVE DO DIA A DIA
        else if (modoAtual === 'detetive') {
            let opcoes = gerarOpcoesString(atual.resposta, fenomenosAgua);
            area.innerHTML = `
                <div class="imagem-grande"><img src="${atual.imagem}" alt="" style="max-width: 90%; max-height: 90%; object-fit: contain;"></div>
                <h3 class="pergunta-titulo" style="max-width: 750px; line-height: 1.3;">"${atual.situacao}"</h3>
                <div class="grid-respostas">
                    ${opcoes.map(o => `<button class="btn-resposta" data-correto="${o === atual.resposta}" onclick="verificarRespostaBotoes('${o}', this)">${o}</button>`).join('')}
                </div>
                <div id="caixa-curiosidade" class="caixa-curiosidade" style="display: none;">
                    💡 <b>O Detetive Explica:</b> <span>${atual.curiosidade}</span>
                </div>
                <button id="btn-seguinte" class="btn-seguinte" style="display: none;" onclick="avancarRonda()">Seguinte ➡️</button>
            `;
        }

        // 3. A VIAGEM DA GOTINHA
        else if (modoAtual === 'gotinha') {
            let opcoes = gerarOpcoesString(atual.resposta, fenomenosAgua);
            area.innerHTML = `
                <div class="imagem-grande" style="border-color: #38bdf8; box-shadow: 0 6px 0 #38bdf8;"><img src="${atual.imagem}" alt="" style="max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 15px;"></div>
                <div class="texto-historia">${atual.texto}</div>
                <div class="grid-respostas">
                    ${opcoes.map(o => `<button class="btn-resposta" data-correto="${o === atual.resposta}" onclick="verificarRespostaBotoes('${o}', this)">${o}</button>`).join('')}
                </div>
            `;
        }

        // 4. A MÁQUINA DAS PALAVRAS
        else if (modoAtual === 'maquina') {
            let palavrasSortidas = gerarOpcoesString(atual.resposta, fenomenosAgua);
            area.innerHTML = `
                <h3 class="pergunta-titulo">Completa a Máquina!</h3>
                <div class="maquina-layout">
                    <div class="maquina-box">
                        <div class="maquina-estado">${atual.de}</div>
                        <div class="seta-maquina">➡️</div>
                        <div class="maquina-estado">${atual.para}</div>
                        
                    </div>
                    <div class="drop-maquina drop-zone drop-zone-especifica" data-resposta="${atual.resposta}">
                        <span class="placeholder-text">Arrasta para aqui</span>
                    </div>
                </div>
                <div class="drag-pool">
                    ${palavrasSortidas.map(p => `<div class="drag-item p-maquina" data-id="${p}">${p}</div>`).join('')}
                </div>
            `;
            ativarDragUniversal('.p-maquina', '.drop-maquina', (item, drop) => acertouMaquina(atual, item, drop));
        }
    }

    // =========================================
    // AUXILIARES MÚLTIPLA ESCOLHA
    // =========================================
    function gerarOpcoesString(certa, poolArray) {
        let erradas = poolArray.filter(i => i !== certa).sort(() => 0.5 - Math.random());
        return[certa, ...erradas.slice(0, 3)].sort(() => 0.5 - Math.random());
    }

    function verificarRespostaBotoes(resposta, btnElement) {
        const atual = listaRonda[rondaIndex];
        if (resposta === atual.resposta) {
            tocarSom('acerto'); document.querySelectorAll('.btn-resposta').forEach(b => b.setAttribute('disabled', 'true'));
            btnElement.classList.add('certo'); 
            
            if (modoAtual === 'detetive') {
                document.getElementById('caixa-curiosidade').style.display = 'block';
                document.getElementById('btn-seguinte').style.display = 'inline-block';
            } else {
                setTimeout(avancarRonda, 1500); 
            }
        } else {
            tocarSom('erro'); errosTotais++; atualizarPlacarUI();
            btnElement.classList.add('erro', 'error-shake'); setTimeout(() => { btnElement.classList.remove('error-shake'); }, 400);
        }
    }

    // =========================================
    // SUCESSOS DRAG & DROP
    // =========================================
    function acertouLaboratorio(dados, dropZone) {
        tocarSom('acerto');
        dropZone.classList.add('sucesso');
        dropZone.innerHTML = `
            <img src="${dados.imgFinal}" alt="" style="max-width: 80%; max-height: 80%; object-fit: contain;">
            <div style="position:absolute; bottom:-25px; background:var(--cor-em); color:white; padding:5px 15px; border-radius:15px; font-weight:bold; font-size:1.5rem; white-space:nowrap; animation:fadeIn 0.3s;">${dados.fenomeno}!</div>
        `;
        document.querySelectorAll('.drag-item').forEach(d => d.style.display = 'none');
        document.querySelectorAll('.drag-ghost').forEach(d => d.style.display = 'none');
        setTimeout(avancarRonda, 2000); 
    }

    function acertouMaquina(dados, itemArrastado, dropZone) {
        tocarSom('acerto');
        dropZone.querySelector('.placeholder-text').style.display = 'none';
        itemArrastado.style.position = 'absolute';
        itemArrastado.style.left = '50%'; itemArrastado.style.top = '50%'; itemArrastado.style.transform = 'translate(-50%, -50%)';
        itemArrastado.style.width = '100%'; itemArrastado.style.height = '100%'; 
        itemArrastado.classList.add('locked');
        dropZone.appendChild(itemArrastado); dropZone.classList.add('preenchida');
        setTimeout(avancarRonda, 1500);
    }

    // =========================================
    // MOTOR DE ARRASTAR UNIVERSAL (BLINDADO)
    // =========================================
    function ativarDragUniversal(classeItens, classeDrop, callbackAcerto) {
        const itens = document.querySelectorAll(classeItens);
        let dragAtivo = null; let offsetX = 0; let offsetY = 0; let ghost = null; let hasMoved = false;

        itens.forEach(item => {
            item.addEventListener('pointerdown', function(e) {
                if (e.target.classList.contains('locked')) return;
                e.preventDefault(); dragAtivo = e.target; hasMoved = false; 
                const rect = dragAtivo.getBoundingClientRect(); 
                
                // CRIA O FANTASMA (Para impedir colapsos na grelha!)
                ghost = document.createElement('div');
                ghost.className = dragAtivo.className + ' drag-ghost';
                ghost.style.width = rect.width + 'px';
                ghost.style.height = rect.height + 'px';
                dragAtivo.parentNode.insertBefore(ghost, dragAtivo);

                offsetX = e.clientX - rect.left; offsetY = e.clientY - rect.top;
                dragAtivo.style.width = rect.width + 'px'; dragAtivo.style.height = rect.height + 'px'; dragAtivo.style.position = 'fixed'; dragAtivo.style.zIndex = 1000; dragAtivo.style.left = rect.left + 'px'; dragAtivo.style.top = rect.top + 'px';
                document.body.appendChild(dragAtivo); tocarSom('acerto'); 
                document.addEventListener('pointermove', moverElemento); document.addEventListener('pointerup', largarElemento);
            });
        });

        function moverElemento(e) {
            if (!dragAtivo) return; hasMoved = true;
            
            // LIMITA O ARRASTAR AOS BORDOS DO ECRÃ
            let cx = Math.max(0, Math.min(window.innerWidth, e.clientX));
            let cy = Math.max(0, Math.min(window.innerHeight, e.clientY));

            dragAtivo.style.left = (cx - offsetX) + 'px'; dragAtivo.style.top = (cy - offsetY) + 'px';
            
            const rect = dragAtivo.getBoundingClientRect(); const centroX = rect.left + rect.width / 2; const centroY = rect.top + rect.height / 2;
            dragAtivo.style.pointerEvents = 'none'; const elementoAbaixo = document.elementFromPoint(centroX, centroY); dragAtivo.style.pointerEvents = 'auto';
            document.querySelectorAll(classeDrop).forEach(dz => dz.classList.remove('drag-over'));
            if (elementoAbaixo) { const dropZone = elementoAbaixo.closest(classeDrop); if (dropZone && !dropZone.classList.contains('preenchida')) { dropZone.classList.add('drag-over'); } }
        }

        function largarElemento(e) {
            if (!dragAtivo) return;
            if (!hasMoved) { cancelaDrag(); return; } // Se não arrastou, volta sem erro

            const rect = dragAtivo.getBoundingClientRect(); 
            const centroX = rect.left + rect.width / 2; 
            const centroY = rect.top + rect.height / 2;
            
            dragAtivo.style.pointerEvents = 'none'; 
            const elementoAbaixo = document.elementFromPoint(centroX, centroY); 
            dragAtivo.style.pointerEvents = 'auto'; 
            
            document.querySelectorAll(classeDrop).forEach(dz => dz.classList.remove('drag-over'));
            
            const dropZone = elementoAbaixo ? elementoAbaixo.closest(classeDrop) : null;

            // NOVA LÓGICA DE AVALIAÇÃO DE ERROS
            if (dropZone && !dropZone.classList.contains('preenchida')) {
                // A criança largou DE PROPÓSITO em cima da caixa de destino! Vamos ver se acertou...
                let acertou = false;
                if (dragAtivo.dataset.ferramenta && dropZone.dataset.resposta === dragAtivo.dataset.ferramenta) acertou = true;
                else if (dragAtivo.dataset.id && dropZone.dataset.resposta === dragAtivo.dataset.id) acertou = true;

                if (acertou) {
                    ghost.remove(); 
                    callbackAcerto(dragAtivo, dropZone);
                } else {
                    // LARGOU NA CAIXA MAS ERA A PALAVRA ERRADA (Aqui sim, conta erro!)
                    tocarSom('erro'); 
                    errosTotais++; 
                    atualizarPlacarUI();
                    dragAtivo.classList.add('error-shake'); 
                    setTimeout(() => dragAtivo.classList.remove('error-shake'), 400);
                    cancelaDrag();
                }
            } else {
                // LARGOU FORA DA CAIXA (Arrependeu-se, largou a meio do caminho, etc)
                // Apenas devolve a palavra ao lugar, SEM CONTAR ERRO!
                cancelaDrag();
            }

            document.removeEventListener('pointermove', moverElemento); 
            document.removeEventListener('pointerup', largarElemento); 
            dragAtivo = null;
        }

        function cancelaDrag() {
            // A palavra volta para o lugar exato do fantasma
            ghost.replaceWith(dragAtivo);
            dragAtivo.style.position = 'static'; dragAtivo.style.width = 'auto'; dragAtivo.style.height = 'auto';
            document.removeEventListener('pointermove', moverElemento); document.removeEventListener('pointerup', largarElemento); dragAtivo = null; ghost = null;
        }
    }

    function avancarRonda() {
        rondaIndex++;
        if (rondaIndex >= totalRondas) {
            document.getElementById('progress-fill').style.width = `100%`; document.getElementById('final-erros').textContent = errosTotais;
            tocarSom('vitoria'); lancarConfetis(); mostrarEcra('ecra-fim');
        } else { atualizarPlacarUI(); prepararRonda(); }
    }

    function voltarAoMenu() { document.getElementById('confetti-container').innerHTML = ""; mostrarEcra('ecra-selecao'); }
    function reiniciarJogo() { document.getElementById('confetti-container').innerHTML = ""; iniciarJogo(modoAtual); }
    window.onload = () => mostrarEcra('ecra-selecao');

</script>
</body>
</html>
