<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2º Ano 💡</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #7c4dff; /* Violeta do 2º Ano */
            --azul-escuro: #311b92;
            --bg-header-2ano: #e8e0ff; 
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-header-2ano);
            padding: 15px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .hamburger span { 
            display: block; width: 20px; height: 2px; 
            background: var(--azul-escuro); 
            transition: 0.3s cubic-bezier(0.215, 0.610, 0.355, 1.000);
            transform-origin: center;
        }
        
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--azul-vibrante);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #5e35b1;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }

        h1 { 
            color: var(--azul-escuro); 
            font-size: clamp(1.4rem, 5vw, 2.2rem); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
        }

        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 3vw, 1rem); 
            font-weight: 500; 
            opacity: 0.8; 
            margin-top: 15px; /* Atualizado conforme pedido */
        }

        @media (max-width: 768px) {
            header { padding: 10px; }
            .header-content {
                display: grid;
                grid-template-columns: 50px 1fr 50px; 
                grid-template-rows: auto auto;
                gap: 10px;
            }
            .nav-container {
                position: static;
                transform: none;
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: 50px 1fr 50px;
                width: 100%;
            }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; width: fit-content; }
            h1, .subtitulo { grid-column: 2; }
        }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; transition: 0.3s; }
        .sidebar li a:hover { background: #ede7f6; color: var(--azul-vibrante); transform: translateX(8px); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 1000px; width: 100%; }
        
        .cartao-disciplina { 
            background: white; flex: 0 1 220px; aspect-ratio: 1/1; border-radius: 30px; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 15px; transition: 0.3s; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; 
            border-top: 8px solid var(--azul-vibrante); 
        }
        .cartao-disciplina:hover { transform: translateY(-10px) scale(1.02); }
        .icone-wrapper { font-size: 4rem; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.3rem; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../1/index.html">🎒 1º Ano</a></li>
        <li><a href="index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">🏠 Início</a>
        </div>
        
        <h1>💡 2º Ano 💡</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina">
            <div class="icone-wrapper">🌍</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }
</script>
</body>
</html>
