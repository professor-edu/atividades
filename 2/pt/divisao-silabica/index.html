<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2º Ano - Divisão Silábica ✂️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        /* =========================================
           CSS DO TEMPLATE BASE (CORES E ESTRUTURA)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-2ano: #e7d83f;     
            --cor-2ano-dark: #E3C40D;
            --cor-borda: #E3C40D;            
            --bg-header: #fff9c4;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --borda-cartao: #ced6e0;
            --cor-pt: #ff6b6b;
        }

        body { 
            font-family: 'Roboto', sans-serif; text-align: center; 
            background-color: var(--bg-body); margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }
        
        /* REGRA ANTI-SCROLL NO PC + CORREÇÃO ALTURA */
        @media (min-width: 769px) and (min-height: 600px) { 
            body { height: 100vh; overflow-y: hidden; } 
        }
        
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--cor-2ano-dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.3); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        @media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }        
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        .btn-voltar { background: var(--cor-2ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-2ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
        .btn-voltar:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 15px 10px; gap: 10px; } 
            .cartao-jogo-container { padding: 15px; }
        }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-2ano); transform: translateX(8px); color: white !important;}
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 20px; width: 100%; box-sizing: border-box; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 950px; flex: 1; min-height: 0; padding: 25px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-pt); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; box-sizing: border-box; }
        .confetti-container { position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; border-radius:30px; z-index: 10; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-2ano-dark); margin-top: auto; flex-shrink: 0;}
        footer p { font-size: 0.8rem; color: var(--cor-borda); margin: 0; }
        
        .ecra { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; align-items: center; justify-content: flex-start; animation: fadeIn 0.4s ease; box-sizing: border-box; position: relative; z-index: 2;}
        #ecra-selecao { display: flex; justify-content: center;}
        
        .titulo-menu { font-size: clamp(1.4rem, 4vw, 1.8rem); color: var(--azul-escuro); margin-bottom: 20px; font-weight: 900;}
        .grelha-opcoes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 700px; }
        @media (max-width: 500px) { .grelha-opcoes { grid-template-columns: 1fr; } } 

        .btn-nivel-menu { background-color: white; border: 4px solid #ced6e0; border-radius: 20px; padding: 15px; width: 100%; cursor: pointer; box-shadow: 0 6px 0 #ced6e0; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; touch-action: manipulation; }
        @media (hover: hover) { .btn-nivel-menu:hover { transform: translateY(-4px); border-color: var(--cor-pt); box-shadow: 0 6px 0 var(--cor-pt); } }
        .btn-nivel-menu:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .nivel-icon { font-size: 2.5rem; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin: 0 auto;}
        .nivel-titulo { font-size: 1.2rem; font-weight: 900; display: block; color: var(--azul-escuro);}
        .nivel-desc { font-size: 0.8rem; color: var(--text-main); font-weight: 500; }

        .status-bar-jogo { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; background: #fdf2f2; padding: 8px 12px; border-radius: 20px; border: 2px solid var(--cor-pt); margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0; }
        .btn-voltar-menu { background-color: white; color: var(--azul-escuro); border: 2px solid #ced6e0; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn-voltar-menu:hover { border-color: var(--azul-escuro); transform: scale(1.05); }
        .btn-dica { background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .btn-dica:hover { border-color: #b18500; transform: scale(1.05); }
        .btn-dica.esgotada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }

        .badge-ronda, .badge-erros { background: white; font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 15px; white-space: nowrap; }
        .badge-ronda { border: 2px solid #219d53; color: #219d53; }
        .badge-erros { border: 2px solid #ff4757; color: #ff4757; }
        .progress-bg { background-color: #e2e8f0; border-radius: 20px; height: 35px; width: 100%; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); border: 2px solid white; }
        .progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-color: var(--cor-2ano); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }
        
        @media (max-width: 600px) {
            .status-bar-jogo { flex-wrap: wrap; justify-content: center; }
            .btn-voltar-menu, .btn-dica { padding: 4px 8px; font-size: 0.8rem;}
            .badge-ronda, .badge-erros { font-size: 0.9rem; padding: 4px 8px; }
            .progress-bg { order: 4; min-width: 100%; margin-top: 5px; }
        }

        .toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
        .toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }
        .error-shake { animation: shakeError 0.4s ease; border: 2px solid #ff4757 !important; background-color: #ffefef !important; color: #ff4757 !important; }
        
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }

        .end-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--azul-escuro); margin-bottom: 25px; text-align: center; }
        .end-stats { font-size: 1.3rem; color: var(--text-main); margin-bottom: 40px; text-align: center; background: #fff; padding: 30px 20px; border-radius: 20px; border: 2px solid #ffebeb; line-height: 1.5; }
        .btn-acao { background-color: var(--azul-escuro); color: white; border: none; padding: 15px 35px; font-size: 1.1rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #093273; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; transition: transform 0.2s, box-shadow 0.2s; }
        @media (hover: hover) { .btn-acao:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #093273; filter: brightness(1.15); } }
        .btn-acao:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }
        .btn-acao.secundario { background-color: #ced6e0; color: #2d3436; box-shadow: 0 6px 0 #a4b0be; }
        @media (hover: hover) { .btn-acao.secundario:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #a4b0be; filter: brightness(1.05); } }
        .btn-acao.secundario:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent !important; }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; pointer-events: none;}
        @keyframes fall { to { transform: translateY(600px) rotate(360deg); opacity: 0; } }

        /* =========================================
           ÁREA DE JOGO E IMAGENS DINÂMICAS
           ========================================= */
        .area-jogo-custom { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; flex: 1; min-height: 0; background: #f8fafc; border: 2px dashed #ced6e0; border-radius: 20px; padding: 15px; overflow-y: auto; gap: 15px; position: relative; overflow-x: hidden;}

        /* IMAGEM POLIDA (Mín. 200px com animação hover) */
        .img-display { 
            width: auto; max-width: 250px; height: 200px; min-height: 200px; object-fit: contain; 
            border-radius: 15px; background: white; padding: 10px; border: 3px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 10px; flex-shrink: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        @media (hover:hover) { .img-display:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); border-color: var(--azul-vibrante);} }

        /* BOTÕES DE SÍLABA E MONTE GERAL */
        .grelha-monte { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; width: 100%;}
        .btn-silaba { background: var(--cor-pt); color: white; border: none; font-size: 1.2rem; font-weight: 800; cursor: pointer; box-shadow: 0 5px 0 #d63031; transition: background 0.2s, transform 0.1s, box-shadow 0.1s; display: inline-flex; align-items: center; justify-content: center;}
        @media (hover:hover) { .btn-silaba:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-2px); } }
        .btn-silaba:active:not(:disabled) { transform: translateY(5px) !important; box-shadow: 0 0 0 transparent !important; animation: none !important; }
        .btn-silaba.certo { background: #22c55e !important; box-shadow: 0 5px 0 #16a34a !important; cursor: default; animation: none !important; transform: scale(1) !important;}

        /* --- Jogo 1: O Comboio Mágico --- */
        .comboio-wrapper { display: flex; flex-wrap: nowrap; justify-content: center; align-items: flex-end; width: auto; border-radius: 15px; padding: 15px 15px 25px 15px; gap: 5px; transition: transform 1.5s cubic-bezier(0.5, 0, 0.2, 1); }
        .comboio-sai { transform: translateX(120vw); } /* Animação de saída para a direita */
        .locomotiva { font-size: 3.5rem; line-height: 1; margin-left: -12px; transform: scaleX(-1); /* Vira o comboio para a direita */ z-index: 5; }
        .slot-carruagem { width: 80px; height: 60px; border: 3px dashed #94a3b8; border-radius: 10px 10px 0 0; background: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; position: relative; transition: 0.3s; flex-shrink:0; }
        .slot-carruagem::before, .slot-carruagem::after { content: ''; position: absolute; bottom: -12px; width: 22px; height: 22px; background: #334155; border: 3px solid #94a3b8; border-radius: 50%; z-index: 2;}
        .slot-carruagem::before { left: 5px; } .slot-carruagem::after { right: 5px; }
        .slot-carruagem.preenchido { border-color: transparent; background: transparent; }
        .btn-silaba-comboio { width: 80px; height: 60px; border-radius: 10px 10px 0 0; }

        /* --- Jogo 2: O Ninja --- */
        .ninja-container { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .letra-box { font-size: 2rem; font-weight: 900; color: var(--azul-escuro); }
        .ninja-gap { width: 25px; height: 40px; border-radius: 5px; background: #e2e8f0; cursor: pointer; display: flex; align-items: center; justify-content: center; color: transparent; font-weight: bold; transition: 0.2s; }
        .ninja-gap:hover { background: #cbd5e1; }
        .ninja-gap.cortado { background: #ff4757; color: white; }
        .btn-verificar { background: var(--azul-vibrante); color: white; font-size: 1.1rem; font-weight: 800; padding: 10px 30px; border-radius: 15px; border: none; cursor: pointer; box-shadow: 0 5px 0 #0056b3; margin-top: 15px;}
        .btn-verificar:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        /* --- Jogo 3: Fábrica Mágica --- */
        .fabrica-top { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 20px; width: 100%; margin-bottom: 10px; }
        .esteira-container { background: #475569; padding: 15px 30px; border-radius: 15px; position: relative; box-shadow: inset 0 -10px 0 #334155, 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; }
        .esteira-container::after { content: ''; position: absolute; bottom: 5px; left: 10px; right: 10px; height: 8px; background: repeating-linear-gradient(90deg, #94a3b8, #94a3b8 15px, #cbd5e1 15px, #cbd5e1 30px); border-radius: 4px; animation: moverEsteira 2s linear infinite; }
        @keyframes moverEsteira { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
        .palavra-display { font-size: 2.2rem; font-weight: 900; color: white; margin: 0; letter-spacing: 2px; text-shadow: 2px 2px 0 #0f172a; position: relative; z-index: 2;}
        .grelha-fabrica { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; }
        @media (max-width: 500px) { .grelha-fabrica { grid-template-columns: 1fr; } }
        .btn-fabrica { background: white; border: 3px solid #ced6e0; border-radius: 15px; padding: 15px 20px; font-size: 1.1rem; font-weight: 800; color: var(--azul-escuro); cursor: pointer; box-shadow: 0 5px 0 #ced6e0; transition: 0.2s; display: flex; align-items: center; justify-content: flex-start; gap: 15px; text-align: left;}
        .btn-fabrica:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
        .btn-fabrica:hover { background: #f8fafc; border-color: var(--azul-vibrante); box-shadow: 0 5px 0 var(--azul-vibrante); }

        /* --- Jogo 4: Sapinho e o Rio --- */
        .btn-silaba-num { width: 60px; height: 50px; border-radius: 10px; font-size: 1.5rem; }
        .rio-container { 
            background: linear-gradient(180deg, #7dd3fc 0%, #0284c7 100%); 
            border-radius: 20px; 
            padding: 20px 15px; /* Reduzimos o padding para encolher */
            width: 100%; 
            position: relative; 
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* Mantém o conteúdo centrado */
            min-height: 190px; /* Reduzimos drasticamente dos antigos 220px! */
            overflow: hidden; 
            margin-bottom: 5px;
        }
        .sapo-animado { 
            position: absolute; 
            left: 10px; 
            top: 50%; /* Puxa para o meio vertical do rio */
            margin-top: -45px; /* Compensa metade da altura do sapo (90px) */
            width: 90px; 
            height: 90px; 
            object-fit: contain; 
            z-index: 5; 
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        
        .slot-pedra { width: 75px; height: 75px; border-radius: 50%; border: 4px dashed rgba(255,255,255,0.6); background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: 0.3s; z-index: 2; position: relative;}
        .slot-pedra.preenchido { border-color: transparent; background: transparent; }
        
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .btn-pedra { width: 75px; height: 75px; border-radius: 50%; background: #4caf50; box-shadow: 0 6px 0 #2e7d32, inset 0 3px 0 rgba(255,255,255,0.3); color: white; font-size: 1.1rem; font-weight: 800; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 3; animation: flutuar 3s ease-in-out infinite;}
		
		/* As pedras soltas dentro do monte passam a ser absolutas */
        #monte-sapo .btn-pedra {
            position: absolute;
        }
		
		
        /* =========================================
           CORREÇÃO PARA TELEMÓVEIS NA HORIZONTAL
           ========================================= */
        @media (max-height: 600px) {
            body { height: auto !important; overflow-y: auto !important; }
            main { justify-content: flex-start !important; padding-top: 15px; padding-bottom: 15px; overflow-y: visible !important; }
            .cartao-jogo-container { margin: auto 0; }
            .img-display { height: 120px; min-height: 120px; } /* Encolhe apenas no ecrã deitado */
            .locomotiva { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../../1">🎒 1º Ano</a></li>
        <li><a href="../../">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Divisão Silábica ✂️</h1>
        <div class="subtitulo" id="subtitulo-jogo">Escolhe outro jogo!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="cartao-jogo">
        <div id="confetti-container" class="confetti-container"></div>
        <div class="toast-msg" id="toast-msg">Mensagem entra aqui!</div>

        <!-- ECRÃ DE SELEÇÃO -->
        <div id="ecra-selecao" class="ecra" style="display: flex;">
            <h2 class="titulo-menu">Escolhe um Jogo:</h2>
            
            <div class="grelha-opcoes">
                <button class="btn-nivel-menu" onclick="iniciarJogo(1)">
                    <span class="nivel-icon" style="background:#e3f2fd;">🚂</span>
                    <span class="nivel-text"><span class="nivel-titulo">O Comboio</span><span class="nivel-desc">Ordena as sílabas soltas</span></span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo(2)">
                    <span class="nivel-icon" style="background:#ffebee;">✂️</span>
                    <span class="nivel-text"><span class="nivel-titulo">Ninja das Palavras</span><span class="nivel-desc">Corta nos locais certos</span></span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo(3)">
                    <span class="nivel-icon" style="background:#f3e5f5;">🏭</span>
                    <span class="nivel-text"><span class="nivel-titulo">Fábrica de Palavras</span><span class="nivel-desc">Número de sílabas</span></span>
                </button>
                <button class="btn-nivel-menu" onclick="iniciarJogo(4)">
                    <span class="nivel-icon" style="background:#e8f5e9;">🐸</span>
                    <span class="nivel-text"><span class="nivel-titulo">Sapinho Saltitão</span><span class="nivel-desc">Conta e ordena na lagoa</span></span>
                </button>
            </div>
        </div>

        <!-- ECRÃ DE JOGO -->
        <div id="ecra-jogo" class="ecra">
            <div class="status-bar-jogo">
                <button class="btn-voltar-menu" onclick="voltarAoMenu()">🏠 Menu</button>
                <button id="btn-dica" class="btn-dica" onclick="usarDica()">💡 Dica</button>
                <div class="badge-ronda">⭐ <span id="val-progresso">1</span>/10</div>
                <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
                <div class="badge-erros">❌ <span id="val-erros">0</span></div>
            </div>

            <div class="area-jogo-custom" id="area-jogo"></div>
        </div>

        <!-- ECRÃ DE FIM -->
        <div id="ecra-fim" class="ecra">
            <h2 class="end-title" id="end-title-text">Missão Cumprida! 🎉</h2>
            <div class="end-stats">
                Terminaste os 10 exercícios!<br><br>
                Tiveste <strong id="final-erros" style="color:#ff4757; font-size:2rem;">0</strong> erros.
            </div>
            <button class="btn-acao" onclick="iniciarJogo(jogoAtualID)">JOGAR DE NOVO 🔄</button>
            <button class="btn-acao secundario" onclick="voltarAoMenu()">OUTRO JOGO 🏠</button>
        </div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script src="../dados.js"></script>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    if (typeof dbPalavras === 'undefined') {
        window.dbPalavras =[
            { palavra: "sol", imagem: "https://placehold.co/200/e0f2fe/0369a1?text=SOL", num: 1, divisao: "SOL" },
            { palavra: "bolo", imagem: "https://placehold.co/200/ffebee/c62828?text=BOLO", num: 2, divisao: "BO-LO" },
            { palavra: "abelha", imagem: "https://placehold.co/200/fff8e1/f57f17?text=ABELHA", num: 3, divisao: "A-BE-LHA" },
            { palavra: "abacaxi", imagem: "https://placehold.co/200/e8f5e9/2e7d32?text=ABACAXI", num: 4, divisao: "A-BA-CA-XI" },
            { palavra: "americano", imagem: "https://placehold.co/200/f3e5f5/6a1b9a?text=AMERICANO", num: 5, divisao: "A-ME-RI-CA-NO" }
        ];
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); document.getElementById('hamburgerBtn').classList.toggle('open'); }
    function mostrarEcra(id) { document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none'); document.getElementById(id).style.display = 'flex'; }
    function showToast(msg, isError = false) { const toast = document.getElementById('toast-msg'); toast.textContent = msg; toast.className = `toast-msg active ${isError ? 'error-shake' : ''}`; toast.style.borderColor = isError ? "#ff4757" : "#fbc531"; toast.style.color = isError ? "#ff4757" : "#b18500"; toast.style.backgroundColor = isError ? "#ffefef" : "#fff9c4"; setTimeout(() => toast.classList.remove('active', 'error-shake'), 2000); }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); const agora = audioCtx.currentTime;
        if (tipo === 'acerto') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.2); gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3); osc.start(agora); osc.stop(agora + 0.3); } 
        else if (tipo === 'erro') { osc.type = 'triangle'; osc.frequency.setValueAtTime(250, agora); osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2); gain.gain.setValueAtTime(0.15, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3); osc.start(agora); osc.stop(agora + 0.3); } 
        else if (tipo === 'click') { osc.type = 'square'; osc.frequency.setValueAtTime(400, agora); osc.frequency.exponentialRampToValueAtTime(200, agora + 0.1); gain.gain.setValueAtTime(0.05, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1); osc.start(agora); osc.stop(agora + 0.1); }
        else if (tipo === 'vitoria') { const notas =[523.25, 659.25, 783.99, 1046.50]; notas.forEach((freq, i) => { const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.value = freq; g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3); o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3); }); }
        else if (tipo === 'comboio') {
            const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
            osc1.type = 'square'; osc1.frequency.setValueAtTime(350, agora); osc1.frequency.linearRampToValueAtTime(400, agora + 0.5);
            gain1.gain.setValueAtTime(0, agora); gain1.gain.linearRampToValueAtTime(0.08, agora + 0.1); gain1.gain.linearRampToValueAtTime(0, agora + 0.8);
            osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(agora); osc1.stop(agora + 0.8);
        }
    }
    function lancarConfetis() { const container = document.getElementById('confetti-container'); container.innerHTML = ""; const colors =['#e7d83f', '#0091ff', '#51cf66', '#ff6b6b']; for (let i=0; i<60; i++) { let conf = document.createElement('div'); conf.className='confetti'; conf.style.left = Math.floor(Math.random()*90+5)+'%'; conf.style.top = '-10%'; conf.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)]; conf.style.animationDuration = (Math.random()*2+2)+'s'; conf.style.animationDelay = (Math.random()*1.5)+'s'; container.appendChild(conf); } }

    let jogoAtualID = null; let rondaAtual = 1; let errosTotais = 0; let listaRonda =[]; let palavraAtual = null; 
    let dicaUsadaNestaJanela = false; 
    let slotsEstado =[]; let silabasCorretas =[]; let sapoFase = 1;

    function baralharArray(arr) { let array = [...arr]; for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }

	function selecionarPalavrasDiversificadas(idJogo) {
        if (idJogo === 4) {
            // REGRA EXCLUSIVA DO SAPO: Só palavras com 3 ou mais sílabas
            let poolSapo = baralharArray(dbPalavras.filter(p => p.num >= 3));
            let sorteadas = poolSapo.slice(0, 10);
            
            // Rede de segurança: Se a tua base de dados tiver menos de 10 palavras grandes, 
            // ele preenche o resto com as pequenas para o jogo não encravar.
            if (sorteadas.length < 10) {
                let poolPequenas = baralharArray(dbPalavras.filter(p => p.num < 3));
                while(sorteadas.length < 10 && poolPequenas.length > 0) {
                    sorteadas.push(poolPequenas.pop());
                }
            }
            return baralharArray(sorteadas);
            
        } else {
            // LÓGICA NORMAL (MISTURA) PARA OS OUTROS 3 JOGOS
            let pool1 = baralharArray(dbPalavras.filter(p => p.num <= 2));
            let pool3 = baralharArray(dbPalavras.filter(p => p.num === 3));
            let pool4 = baralharArray(dbPalavras.filter(p => p.num >= 4));
            let sorteadas =[...pool1.splice(0, 3), ...pool3.splice(0, 4), ...pool4.splice(0, 3)];
            
            let restos = baralharArray([...pool1, ...pool3, ...pool4]);
            while(sorteadas.length < 10 && restos.length > 0) sorteadas.push(restos.pop());
            return baralharArray(sorteadas).slice(0, 10);
        }
    }

    function atualizarPlacarUI() {
        document.getElementById('val-erros').textContent = errosTotais;
        document.getElementById('val-progresso').textContent = rondaAtual > 10 ? 10 : rondaAtual;
        document.getElementById('progress-fill').style.width = `${((rondaAtual - 1) / 10) * 100}%`;
    }

    function iniciarJogo(id) {
        jogoAtualID = id; rondaAtual = 1; errosTotais = 0;
        document.getElementById('confetti-container').innerHTML = "";
        const titulos =["", "O Comboio das Sílabas", "Ninja das Palavras", "Fábrica de Palavras", "Sapinho Saltitão"];
        document.getElementById('subtitulo-jogo').textContent = titulos[id];
        listaRonda = selecionarPalavrasDiversificadas(id);
        atualizarPlacarUI(); mostrarEcra('ecra-jogo'); prepararRonda();
    }

    function prepararRonda() {
        const area = document.getElementById('area-jogo'); area.innerHTML = ''; 
        palavraAtual = listaRonda[rondaAtual - 1];
        silabasCorretas = palavraAtual.divisao.split('-');

        // Dica Renovada: Ativa na ronda 1 e na ronda 6.
        if (rondaAtual === 1 || rondaAtual === 6) {
            dicaUsadaNestaJanela = false;
            document.getElementById('btn-dica').classList.remove('esgotada');
        } else if (dicaUsadaNestaJanela) {
            document.getElementById('btn-dica').classList.add('esgotada');
        }

        if(jogoAtualID === 1) renderJogo1(area);
        else if(jogoAtualID === 2) renderJogo2(area);
        else if(jogoAtualID === 3) renderJogo3(area);
        else if(jogoAtualID === 4) { sapoFase = 1; renderJogo4(area); }
    }

    function avancarComEspera() {
        rondaAtual++;
        if (rondaAtual > 10) finalizarJogo();
        else { atualizarPlacarUI(); prepararRonda(); }
    }

    function feedbackAvancar(erroEncontrado = false) {
        if(erroEncontrado) {
            tocarSom('erro'); errosTotais++; atualizarPlacarUI(); showToast("Tenta outra vez!", true);
        } else {
            tocarSom('acerto');
            
            if(jogoAtualID === 1) {
                // ANIMAÇÃO DE SAÍDA DO COMBOIO
                setTimeout(() => {
                    tocarSom('comboio');
                    document.getElementById('comboio-container').classList.add('comboio-sai');
                    setTimeout(avancarComEspera, 1200); // Espera o comboio sair
                }, 400);
            } 
            else if(jogoAtualID === 4 && sapoFase === 2) {
                // ANIMAÇÃO SEQUENCIAL DO SAPO A SALTAR NAS PEDRAS
                let sapo = document.getElementById('sapo-avatar');
                let pedras = document.querySelectorAll('.slot-pedra');
                let containerRect = sapo.parentElement.getBoundingClientRect();
                
                let saltarPedra = (i) => {
                    if (i >= pedras.length) {
                        // Salto final para fora do rio (direita)
                        sapo.style.transform = `translate(${containerRect.width + 50}px, 0px)`;
                        setTimeout(avancarComEspera, 500);
                        return;
                    }
                    let pRect = pedras[i].getBoundingClientRect();
                    // Calcula o destino subtraindo a posição do próprio sapo para o Transform funcionar
                    let destX = pRect.left - containerRect.left + (pRect.width/2) - 45; // 45 = metade do tamanho do sapo (90px)
                    let destY = pRect.top - containerRect.top - 50; // Senta-se em cima da pedra
                    
                    sapo.style.transform = `translate(${destX}px, ${destY}px)`;
                    tocarSom('click');
                    setTimeout(() => saltarPedra(i+1), 500); // Meio segundo por salto
                };
                
                setTimeout(() => saltarPedra(0), 400); // Inicia os saltos
            }
            else {
                // Jogos normais
                setTimeout(avancarComEspera, 1000);
            }
        }
    }

    function finalizarJogo() {
        document.getElementById('progress-fill').style.width = `100%`; document.getElementById('final-erros').textContent = errosTotais;
        mostrarEcra('ecra-fim'); tocarSom('vitoria'); lancarConfetis();
    }
    function voltarAoMenu() { document.getElementById('confetti-container').innerHTML = ""; mostrarEcra('ecra-selecao'); }

    // =========================================
    // DICA GLOBAL
    // =========================================
    function usarDica() {
        if(dicaUsadaNestaJanela) return;
        tocarSom('click'); dicaUsadaNestaJanela = true; document.getElementById('btn-dica').classList.add('esgotada');
        
        if(jogoAtualID === 1 || (jogoAtualID === 4 && sapoFase === 2)) {
            let classBusca = jogoAtualID === 1 ? '.btn-silaba-comboio' : '.btn-pedra';
            let indexVazio = slotsEstado.indexOf(null);
            if(indexVazio !== -1) {
                let btn = Array.from(document.querySelectorAll(classBusca)).find(b => b.textContent === silabasCorretas[indexVazio] && !b.disabled);
                if(btn) clicarSilaba(btn, jogoAtualID);
            }
        } else if(jogoAtualID === 2) {
            let gaps = document.querySelectorAll('.ninja-gap'); let indicesCorretos =[];
            let letras = palavraAtual.palavra.toUpperCase().split(''); let idxS = 0;
            for(let i=0; i<letras.length-1; i++) { idxS += letras[i].length; if(palavraAtual.divisao[idxS] === '-') { indicesCorretos.push(i); idxS++; } }
            let gapDica = indicesCorretos.find(idx => !gaps[idx].classList.contains('cortado'));
            if(gapDica !== undefined) { gaps[gapDica].classList.add('cortado'); gaps[gapDica].textContent = '-'; }
        } else if(jogoAtualID === 3 || (jogoAtualID === 4 && sapoFase === 1)) {
            let correto = palavraAtual.num >= 4 && jogoAtualID === 3 ? 4 : palavraAtual.num;
            let classBusca = jogoAtualID === 3 ? '.btn-fabrica' : '.btn-silaba-num';
            let btns = document.querySelectorAll(classBusca);
            let erradas = Array.from(btns).filter(b => parseInt(b.dataset.val) !== correto);
            baralharArray(erradas).slice(0, 2).forEach(b => { b.style.opacity = '0.2'; b.disabled = true; });
        }
    }

    // =========================================
    // JOGO 1: O COMBOIO
    // =========================================
    function renderJogo1(area) {
        area.innerHTML = `<img src="${palavraAtual.imagem}" class="img-display" alt="Imagem">
                          <div class="comboio-wrapper" id="comboio-container">
                              <div id="slots-comboio" style="display:flex; gap:5px; flex-wrap:wrap;"></div>
                              <div class="locomotiva">🚂</div>
                          </div>
                          <div class="grelha-monte" id="monte-comboio"></div>`;
        slotsEstado = new Array(silabasCorretas.length).fill(null);
        const grelhaSlots = document.getElementById('slots-comboio');
        const grelhaMonte = document.getElementById('monte-comboio');

        silabasCorretas.forEach((_, i) => {
            let slot = document.createElement('div'); slot.className = 'slot-carruagem'; slot.id = `c-slot-${i}`;
            grelhaSlots.appendChild(slot);
        });

        baralharArray(silabasCorretas).forEach((sil, i) => {
            let btn = document.createElement('button'); btn.className = 'btn-silaba btn-silaba-comboio'; btn.textContent = sil;
            btn.onclick = () => clicarSilaba(btn, 1); grelhaMonte.appendChild(btn);
        });
    }

    function clicarSilaba(btn, tipoJogo) {
        if(btn.disabled) return; tocarSom('click');
        let idMonte = tipoJogo === 1 ? 'monte-comboio' : 'monte-sapo';
        let idSlotPrefixo = tipoJogo === 1 ? 'c-slot-' : 's-slot-';

        if(btn.parentElement.id === idMonte) {
            let idx = slotsEstado.indexOf(null);
            if(idx !== -1) {
                let alvo = document.getElementById(`${idSlotPrefixo}${idx}`);
                alvo.appendChild(btn); alvo.classList.add('preenchido'); slotsEstado[idx] = btn;
            }
        } else {
            let idx = parseInt(btn.parentElement.id.replace(idSlotPrefixo, ''));
            slotsEstado[idx] = null; document.getElementById(`${idSlotPrefixo}${idx}`).classList.remove('preenchido');
            document.getElementById(idMonte).appendChild(btn);
        }

        if(!slotsEstado.includes(null)) setTimeout(() => verificarOrdenacao(tipoJogo), 200);
    }

    function verificarOrdenacao(tipoJogo) {
        let erros = 0;
        slotsEstado.forEach((btn, i) => {
            if(btn.textContent === silabasCorretas[i]) { btn.classList.add('certo'); btn.disabled = true; } 
            else { erros++; btn.classList.add('error-shake'); }
        });

        if(erros === 0) { feedbackAvancar(false); } 
        else {
            feedbackAvancar(true);
            setTimeout(() => {
                slotsEstado.forEach((btn, i) => {
                    if(!btn.classList.contains('certo')) {
                        btn.classList.remove('error-shake');
                        document.getElementById(btn.parentElement.id.includes('c-slot') ? 'monte-comboio' : 'monte-sapo').appendChild(btn);
                        slotsEstado[i] = null;
                        document.getElementById(`${btn.parentElement.id.includes('c-slot') ? 'c-slot-' : 's-slot-'}${i}`).classList.remove('preenchido');
                    }
                });
            }, 800);
        }
    }

    // =========================================
    // JOGO 2: NINJA
    // =========================================
    function renderJogo2(area) {
        let letras = palavraAtual.palavra.toUpperCase().split('');
        let html = `<img src="${palavraAtual.imagem}" class="img-display" alt="Imagem">
                    <p style="color:var(--text-main); font-weight:bold;">Clica nos espaços para separar as sílabas!</p>
                    <div class="ninja-container" id="ninja-box">`;
        for(let i=0; i<letras.length; i++) {
            html += `<span class="letra-box">${letras[i]}</span>`;
            if(i < letras.length - 1) html += `<div class="ninja-gap" onclick="toggleCorte(this)"> </div>`;
        }
        html += `</div><button class="btn-verificar" onclick="verificarCortes()">Cortar ✂️</button>`; area.innerHTML = html;
    }

    function toggleCorte(el) { tocarSom('click'); el.classList.toggle('cortado'); el.textContent = el.classList.contains('cortado') ? '-' : ' '; }
    function verificarCortes() {
        let box = document.getElementById('ninja-box'); let str = "";
        Array.from(box.children).forEach(f => { if(f.classList.contains('letra-box')) str += f.textContent; else if(f.classList.contains('cortado')) str += "-"; });
        if(str === palavraAtual.divisao) { box.style.background = '#e8f5e9'; box.style.borderColor = '#219d53'; feedbackAvancar(false); } else { feedbackAvancar(true); }
    }

    // =========================================
    // JOGO 3: FÁBRICA DE PALAVRAS
    // =========================================
    function renderJogo3(area) {
        area.innerHTML = `
            <div class="fabrica-top">
                <img src="${palavraAtual.imagem}" class="img-display" style="margin:0;" alt="Imagem">
                <div class="esteira-container">
                    <div class="palavra-display">${palavraAtual.divisao}</div>
                </div>
            </div>
            <div class="grelha-fabrica">
                <button class="btn-fabrica" data-val="1" onclick="verificarFabrica(1)"><span style="font-size:2rem;">📦</span>Monossílabo (1)</button>
                <button class="btn-fabrica" data-val="2" onclick="verificarFabrica(2)"><span style="font-size:2rem;">📦</span>Dissílabo (2)</button>
                <button class="btn-fabrica" data-val="3" onclick="verificarFabrica(3)"><span style="font-size:2rem;">📦</span>Trissílabo (3)</button>
                <button class="btn-fabrica" data-val="4" onclick="verificarFabrica(4)"><span style="font-size:2rem;">📦</span>Polissílabo (+3)</button>
            </div>`;
    }

    function verificarFabrica(resp) {
        let correto = palavraAtual.num >= 4 ? 4 : palavraAtual.num;
        if(resp === correto) { event.target.style.background = '#e8f5e9'; event.target.style.borderColor = '#219d53'; feedbackAvancar(false); } 
        else { event.target.classList.add('error-shake'); feedbackAvancar(true); setTimeout(() => event.target.classList.remove('error-shake'), 500); }
    }

    // =========================================
    // JOGO 4: SAPINHO E A LAGOA
    // =========================================
    function renderJogo4(area) {
        if (sapoFase === 1) {
            area.innerHTML = `
                <img src="${palavraAtual.imagem}" class="img-display" alt="Imagem">
                <h3 style="color:var(--azul-escuro); margin:0;">Quantas sílabas tem?</h3>
                <h2 style="font-size:2.5rem; margin:10px 0; color:var(--text-main);">${palavraAtual.palavra.toUpperCase()}</h2>
                <div style="display:flex; gap:10px;">
                    ${[1,2,3,4,5].map(n => `<button class="btn-silaba btn-silaba-num" data-val="${n}" onclick="verificarSapoFase1(${n})">${n}</button>`).join('')}
                </div>`;
        }
    }

    function verificarSapoFase1(n) {
        if(n === palavraAtual.num) {
            tocarSom('acerto'); sapoFase = 2; // Avança para fase 2
            const area = document.getElementById('area-jogo');
            
            // IDEA B Aplicada: As pedras para construir e os botões de sílabas soltas estão AMBOS dentro do rio! Poupa 50% de espaço.
            area.innerHTML = `
                <img src="${palavraAtual.imagem}" class="img-display" alt="Imagem">
                <div class="rio-container">
                    <img src="sapo_saltitao.png" id="sapo-avatar" class="sapo-animado" alt="Sapo">
                    
                    <p style="color:white; font-weight:bold; margin: 0 0 25px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); width: 100%;">Ordena as pedras no rio:</p>
                    
                    <!-- Destinos (Pedras Vazias) -->
                    <div id="slots-sapo" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; width:100%; z-index:2; margin-bottom: 10px;"></div>
                    
                    <!-- Botões Soltos (Nenúfares Flutuantes) -->
                    <div id="monte-sapo" style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap; width:100%; z-index:3;"></div>
                </div>`;
            
            slotsEstado = new Array(silabasCorretas.length).fill(null);
            const grelhaSlots = document.getElementById('slots-sapo');
            const grelhaMonte = document.getElementById('monte-sapo');

            // Cria os slots de destino (pedras brancas semi-transparentes)
            silabasCorretas.forEach((_, i) => {
                let slot = document.createElement('div'); slot.className = 'slot-pedra'; slot.id = `s-slot-${i}`;
                grelhaSlots.appendChild(slot);
            });

			// Posições base garantidas para não haver sobreposições (até 6 sílabas)
            const posicoesSeguras =[
                { top: 15, left: 75 }, // 1: Direita cima
                { top: 20, left: 15 }, // 2: Esquerda cima
                { top: 55, left: 80 }, // 3: Direita meio
                { top: 60, left: 20 }, // 4: Esquerda meio
                { top: 35, left: 87 }, // 5: Direita baixo
                { top: 85, left: 25 }  // 6: Esquerda baixo
            ];

            // Cria as sílabas arrastáveis (folhas de nenúfar) espalhadas pelo rio
            baralharArray(silabasCorretas).forEach((sil, i) => {
                let btn = document.createElement('button'); 
                btn.className = 'btn-pedra'; 
                btn.textContent = sil;
                
                // Pega na posição segura e adiciona um ligeiro "tremor" aleatório (-2% a +2%)
                let tremorTop = Math.random() * 4 - 2;
                let tremorLeft = Math.random() * 4 - 2;

                // Previne erros caso a palavra seja gigante (mais de 6 sílabas, o que no 2º ano não acontece)
                let pos = posicoesSeguras[i % posicoesSeguras.length];

                btn.style.top = `${pos.top + tremorTop}%`;
                btn.style.left = `${pos.left + tremorLeft}%`;
                
                btn.onclick = () => clicarSilaba(btn, 4);
                grelhaMonte.appendChild(btn);
            });

        } else {
            event.target.classList.add('error-shake'); feedbackAvancar(true);
            setTimeout(() => event.target.classList.remove('error-shake'), 500);
        }
    }

    window.onload = () => mostrarEcra('ecra-selecao');

</script>
