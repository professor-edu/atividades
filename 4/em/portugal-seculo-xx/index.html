<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4º Ano - Portugal: O Século XX 🕊️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
/* ==========================================================================
   1. RESET E VARIÁVEIS GLOBAIS (LITERAL)
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; }

:root {
    --bg-body: #f0f7ff;
    --azul-vibrante: #0091ff; 
    --cor-4ano: #a28cf2;     
    --cor-4ano-dark: #8a72e0;
    --cor-borda: #8a72e0;
    --bg-header: #f3f0ff; 
    --cor-btn-fundo: #fffde7;
    --azul-escuro: #0d47a1;
    --text-main: #455a64;
    --borda-cartao: #ced6e0;
    --cor-pt: #ff6b6b;
    --cor-mat: #4dabf7;
    --cor-em: #51cf66;

    /* CORES DOS BOTÕES DO MENU INICIAL */
    --cor-btn-azul: #61A0FF;
    --cor-btn-verde: #5DD279;
    --cor-btn-amarelo: #FBC531;
    --cor-btn-vermelho: #FF6B6B;
    --cor-btn-roxo: #A55EEA;
    --cor-btn-laranja: #FA983A;
    --cor-btn-rosa: #e04d8c;
    --cor-btn-turquesa: #139ea3;
    
    /* Cores de Feedback (Vibrantes) */
    --cor-sucesso: #2ed573;
    --cor-sucesso-dark: #219d53;
    --cor-erro: #ff4757;
    --cor-erro-dark: #d0303f;
}

body { 
    font-family: 'Roboto', sans-serif; 
    text-align: center; 
    background-color: var(--bg-body); 
    background-image: radial-gradient(rgba(13, 71, 161, 0.06) 2px, transparent 2px);
    background-size: 25px 25px;
    margin: 0; 
    display: flex;
    flex-direction: column;
    min-height: 100dvh; 
    overflow-x: hidden; 
}

*:focus-visible {
    outline: 4px solid var(--cor-btn-amarelo);
    border-radius: 8px;
}

@media (min-width: 769px) and (min-height: 600px) { body { height: 100vh; overflow-y: auto; } }

/* ==========================================================================
   2. LAYOUT: HEADER, SIDEBAR, MAIN, FOOTER E ÍCONES
   ========================================================================== */
header {
    background-color: var(--bg-header); padding: 25px 20px;
    border-bottom: 1px solid var(--cor-4ano-dark);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100;
}
.header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }

.nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
.hamburger { cursor: pointer; background: rgba(255,255,255,0.3); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
@media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
.hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }        
.hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
.subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

.btn-voltar { background: var(--cor-4ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-4ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
@media (hover: hover) { .btn-voltar:hover { transform: scale(1.05); } }

.sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
.sidebar.active { left: 0; }
.sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
.sidebar ul { list-style: none; padding: 15px; margin: 0; }
.sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
@media (hover: hover) { .sidebar li a:hover { background: var(--cor-4ano); color: white; transform: translateX(8px); } }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
.overlay.active { display: block; }

main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 20px; width: 100%; box-sizing: border-box; }

.cartao-jogo-container { 
    background: white; width: 100%; max-width: 950px; 
    flex: 1; min-height: 0; 
    padding: 25px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(69, 176, 98, 0.52); 
    border-top: 8px solid var(--cor-em); 
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; box-sizing: border-box;
}

footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-4ano-dark); margin-top: auto; flex-shrink: 0;}
footer p { font-size: 0.8rem; color: var(--cor-4ano-dark); margin: 0; }

/* Ícones e Classes Utilitárias de SVG */
.icon-svg-menu { width: 20px; height: 20px; display: inline-block; vertical-align: middle; object-fit: contain; }
.icon-svg-voltar { width: 1.3em; height: 1.3em; vertical-align: middle; margin-right:0px; object-fit: contain; }
.icon-svg-footer { width: 2.3em; height: 2.3em; vertical-align: middle; margin-right:5px; margin-left: 7px; object-fit: contain; }
.icon-svg-titulo { width: 1em; height: 1em; vertical-align: middle; object-fit: contain; }
.svg-icon { width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 5px; fill: currentColor; }

/* ==========================================================================
   3. BARRA DE ESTADO DO JOGO (HUD) E PROGRESSO
   ========================================================================== */
.status-bar-jogo {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    width: 100%; background: #eaf1eb; padding: 8px 12px;
    border-radius: 20px; border: 2px solid var(--cor-em); margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0;
    max-width: 900px;
}

.btn-voltar-menu { 
    background-color: white; color: var(--azul-escuro); border: 2px solid var(--cor-em); 
    padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; 
    display: flex; align-items: center; gap: 5px; 
    transition: border-color 0.2s ease;
    touch-action: manipulation;
}

.btn-voltar-menu svg {
    transition: transform 0.2s ease;
}

@media (hover: hover) { 
    .btn-voltar-menu:hover { border-color: var(--azul-escuro); } 
    .btn-voltar-menu:hover svg { transform: scale(1.15); }
}

.btn-dica { 
    background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; 
    padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; 
    display: flex; align-items: center; gap: 5px; 
    transition: border-color 0.2s ease;
    touch-action: manipulation;
}

.btn-dica svg {
    transition: transform 0.2s ease;
}

@media (hover: hover) { 
    .btn-dica:hover:not(.esgotada) { border-color: #b18500; } 
    .btn-dica:hover:not(.esgotada) svg { transform: scale(1.15); }
}

.btn-dica.esgotada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }

.btn-dica.dica-impaciente:not(.esgotada) {
    animation: chamarAtencaoDica 1.5s infinite ease-in-out;
    border-color: #f39c12;
    background-color: #fffde7;
}

.badge-ronda { 
    background: white; 
    font-weight: 800; 
    font-size: 0.9rem; 
    padding: 6px 12px; 
    border-radius: 15px; 
    white-space: nowrap; 
    border: 2px solid #219d53; 
    color: #219d53; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px; 
}

.badge-ronda svg {
    margin: 0 !important; 
    width: 1.1em !important; 
    height: 1.1em !important;
    display: block;
}

.badge-erros { 
    background: white; 
    border: 2px solid var(--cor-pt); 
    color: var(--cor-mat); 
    font-weight: 800; 
    font-size: 0.9rem; 
    line-height: 1; 
    padding: 6px 12px; 
    border-radius: 15px; 
    white-space: nowrap; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px; 
}

.badge-erros svg {
    margin: 0 !important; 
    width: 0.85em !important;
    height: 0.85em !important;
    display: block;
}

.progress-bg { 
    background-color: #e2e8f0; 
    border-radius: 20px; 
    height: 35px; 
    flex: 1 1 0%; 
    min-width: 50px; 
    margin: 0; 
    overflow: hidden; 
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); 
    border: 2px solid white; 
}

.progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-color: var(--cor-4ano-dark); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }

/* ==========================================================================
   4. MENU INICIAL E SELEÇÃO DE NÍVEIS
   ========================================================================== */
.ecra { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; box-sizing: border-box; position: relative; z-index: 2;}
#ecra-selecao { display: flex; }
#ecra-jogo { justify-content: flex-start; }
.titulo-menu { font-size: clamp(1.4rem, 4vw, 1.8rem); color: var(--azul-escuro); margin-bottom: 30px; font-weight: 900;}

.grid-niveis {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    width: 100%;
    max-width: 750px;
    margin: 0 auto 20px;
}

.btn-nivel-novo {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    padding: 15px 20px;
    gap: 15px;
    width: 100%;
    border-radius: 20px;
    border: 4px solid white;
    color: white;
    font-size: 1.2rem;
    font-weight: 900;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    box-shadow: 0 6px 0 #e2e8f0, 0 10px 15px rgba(0, 0, 0, 0.08);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
}

@media (hover: hover) {
    .btn-nivel-novo:hover {
        transform: translateY(-2px); box-shadow: 0 8px 0 #cbd5e1, 0 12px 20px rgba(0,0,0,0.12); filter: brightness(1.05);
    }
}

.btn-nivel-novo:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent, 0 0px 0 transparent !important; }

.icon-btn-nivel-novo, .icon-btn-nivel {
    width: 75px;
    height: 75px;
    flex-shrink: 0;
    object-fit: contain;
    filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
    pointer-events: none;
}

.btn-nivel-text-container {
    display: flex;
    flex-direction: column;
    gap: 3px;
    pointer-events: none;
}

.btn-nivel-titulo {
    font-size: 1.1rem;
    font-weight: 900;
    color: white;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    line-height: 1.2;
}

.btn-nivel-subtitulo {
    font-size: 0.85rem;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
    line-height: 1.2;
}

/* CLASSES DE COR DOS BOTÕES */
.bg-azul { background-color: var(--cor-btn-azul); }
.bg-verde { background-color: var(--cor-btn-verde); }
.bg-amarelo { background-color: var(--cor-btn-amarelo); }
.bg-vermelho { background-color: var(--cor-btn-vermelho); }
.bg-roxo { background-color: var(--cor-btn-roxo); }
.bg-laranja { background-color: var(--cor-btn-laranja); }
.bg-rosa { background-color: var(--cor-btn-rosa); }
.bg-turquesa { background-color: var(--cor-btn-turquesa); }

/* ==========================================================================
   5. IMAGENS MODULARES E CARD ZOOMABLE
   ========================================================================== */
.card-imagem-zoomable {
    position: relative;
    display: inline-block;
    background-color: #ffffff;
    border: 3px solid #e2e8f0;
    border-radius: 20px;
    padding: 8px;
    box-sizing: border-box;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.04);
    animation: flutuarCartao 3.5s infinite ease-in-out;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.card-imagem-zoomable:hover {
    animation-play-state: paused;
    transform: scale(1.04) translateY(-3px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
}

.imagem-evento-tempo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
}

.card-imagem-zoomable.img-quadrada { width: 160px; height: 160px; }
.card-imagem-zoomable.img-retangular { width: 210px; height: 140px; }

@media (min-width: 769px) {
    .card-imagem-zoomable.img-quadrada { width: 240px !important; height: 240px !important; }
    .card-imagem-zoomable.img-retangular { width: 330px !important; height: 220px !important; }
}
/* ==========================================================================
   6. MECÂNICA DE JOGO: BOTÕES VIBRANTES E FEEDBACKS
   ========================================================================== */
.area-jogo-custom {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; flex: 1; min-height: 0; background: #f8fafc; border: 2px dashed var(--cor-em); border-radius: 20px; padding: 25px; gap: 20px;
    position: relative; color: #94a3b8; font-weight: bold; overflow: hidden;
}

.pergunta-texto { font-size: clamp(1.2rem, 4vw, 1.5rem); color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 0 0 20px 0; animation: fadeIn 0.4s ease;}

.opcoes-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; }

/* Botão Opção Vibrante (Usado em Múltipla Escolha e Ligar) */
.btn-opcao-vibrante {
    border: 3px solid white;
    border-radius: 15px;
    padding: 12px 20px;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    color: white;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.1s, filter 0.1s;
    touch-action: manipulation;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

/* Cores dos Botões Vibrantes dentro do Jogo */
.btn-opcao-vibrante.bg-azul { background-color: var(--cor-btn-azul); box-shadow: 0 4px 0 #4a8deb; }
.btn-opcao-vibrante.bg-verde { background-color: var(--cor-btn-verde); box-shadow: 0 4px 0 #45b062; }
.btn-opcao-vibrante.bg-laranja { background-color: var(--cor-btn-laranja); box-shadow: 0 4px 0 #d97d2c; }
.btn-opcao-vibrante.bg-roxo { background-color: var(--cor-btn-roxo); box-shadow: 0 4px 0 #8e44ad; }
.btn-opcao-vibrante.bg-amarelo { background-color: var(--cor-btn-amarelo); box-shadow: 0 4px 0 #FBC531; }
.btn-opcao-vibrante.bg-turquesa { background-color: var(--cor-btn-turquesa); box-shadow: 0 4px 0 #139ea3; }
.btn-opcao-vibrante.bg-rosa { background-color: var(--cor-btn-rosa); box-shadow: 0 4px 0 #e04d8c; }
.btn-opcao-vibrante.bg-vermelho { background-color: var(--cor-btn-vermelho); box-shadow: 0 4px 0 #d64f4f; }

.btn-opcao-vibrante:active { transform: scale(0.95); filter: brightness(0.9); }
@media (hover: hover) { .btn-opcao-vibrante:hover { transform: translateY(-2px); filter: brightness(1.05); } }







/* SE DER ERRO REPOR AS CLASSES ABAIXO */


.cartao-opcao-visual.bg-azul { background-color: var(--cor-btn-azul) !important; border-color: white !important; box-shadow: 0 6px 0 #4a8deb !important; }
.cartao-opcao-visual.bg-verde { background-color: var(--cor-btn-verde) !important; border-color: white !important; box-shadow: 0 6px 0 #45b062 !important; }
.cartao-opcao-visual.bg-laranja { background-color: var(--cor-btn-laranja) !important; border-color: white !important; box-shadow: 0 6px 0 #d97d2c !important; }
.cartao-opcao-visual.bg-roxo { background-color: var(--cor-btn-roxo) !important; border-color: white !important; box-shadow: 0 6px 0 #8e44ad !important; }
.cartao-opcao-visual.bg-amarelo { background-color: var(--cor-btn-amarelo) !important; border-color: white !important; box-shadow: 0 6px 0 #f39c12 !important; }
.cartao-opcao-visual.bg-vermelho { background-color: var(--cor-btn-vermelho) !important; border-color: white !important; box-shadow: 0 6px 0 #d64f4f !important; }
.cartao-opcao-visual.bg-turquesa { background-color: var(--cor-btn-turquesa) !important; border-color: white !important; box-shadow: 0 6px 0 #139ea3 !important; }
.cartao-opcao-visual.bg-rosa { background-color: var(--cor-btn-rosa) !important; border-color: white !important; box-shadow: 0 6px 0 #e04d8c !important; }



/* Efeito de Acerto no Cartão */
.cartao-opcao-visual.sucesso-vibrante {
    background-color: var(--cor-sucesso) !important;
    border-color: var(--cor-sucesso-dark) !important;
    box-shadow: 0 6px 0 var(--cor-sucesso-dark) !important;
}
.cartao-opcao-visual.sucesso-vibrante .nome-opcao-legenda {
    color: white !important;
}

/* Efeito de Erro no Cartão */
.cartao-opcao-visual.erro-vibrante {
    animation: shakeError 0.4s ease;
    background-color: #ffefef !important;
    border-color: var(--cor-erro) !important;
    box-shadow: 0 6px 0 var(--cor-erro) !important;
}
.cartao-opcao-visual.erro-vibrante .nome-opcao-legenda {
    color: var(--cor-erro) !important;
}









.icon-certo { width: 1.1em; height: 1.1em; object-fit: contain; vertical-align: middle; }
.icon-errado { width: 1em; height: 1em; object-fit: contain; vertical-align: middle; }
.imagem-opcao-vibrante {
    display: block;
    max-width: 140px;
    max-height: 110px;
	border-radius: 10px;
    object-fit: contain;
    pointer-events: none;
}
.btn-opcao-vibrante:has(img) {
    min-width: 180px;
    min-height: 150px;
}

.nome-opcao-legenda {
    font-size: 1.1rem;
    font-weight: 900;
    color: white !important; /* Texto branco para destacar nas cores */
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    text-align: center;
    line-height: 1;
    margin-top: 5px;
}

/* ==========================================================================
   7. MECÂNICA DE ARRASTAR, LIGAR E LACUNAS
   ========================================================================== */
.coluna-ligar-container { display: flex; gap: 40px; justify-content: center; width: 100%; box-sizing: border-box; }
.coluna-ligar { display: flex; flex-direction: column; gap: 18px !important; }

.btn-opcao-vibrante.ligado {
    opacity: 0.55;
    border-color: #cbd5e1 !important;
    background-color: #f1f5f9 !important;
    color: #64748b !important;
    box-shadow: 0 2px 0 #cbd5e1 !important;
    transform: translateY(2px) !important;
}

/* Blocos de Arrastar */
.bloco-arrastar {
    display: flex !important; align-items: center !important; justify-content: center !important;
    width: 100%; min-width: 150px; padding: 12px 20px !important; border-radius: 15px !important;
    font-size: clamp(1rem, 3vw, 1.1rem) !important; font-weight: 700 !important;
    background-color: #ffffff !important; border: 3px solid var(--azul-vibrante) !important;
    color: var(--azul-escuro) !important; box-shadow: 0 4px 0 var(--azul-vibrante) !important;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; touch-action: manipulation;
}
.bloco-arrastar:active { transform: scale(0.95) !important; box-shadow: 0 0px 0 transparent !important; }
.bloco-arrastar:not(.selecionado):not([disabled]) { animation: respirarBloco 2s infinite ease-in-out; }

.alvo-arrastar.pronto-receber {
    border-color: var(--cor-btn-amarelo) !important;
    background-color: #fffde7;
    animation: pulseAlvo 0.8s infinite alternate;
}

/* Lacunas (Gaps) */
.texto-paragrafo-lacunas {
    font-size: 1.1rem !important; line-height: 2.6 !important; color: var(--text-main) !important;
    text-align: justify !important; margin-bottom: 10px !important; background: #ffffff !important;
    padding: 20px 25px !important; border-radius: 20px !important; border: 2px solid #e2e8f0 !important;
    width: 100% !important; max-width: 800px !important; box-sizing: border-box !important;
}
.slot-vazio {
    display: inline-flex; align-items: center; justify-content: center; min-width: 110px; height: 34px; margin: 0 6px;

.slot-vazio.pronto-receber { border-color: var(--cor-btn-amarelo) !important; background-color: #fffde7 !important; animation: pulseAlvo 0.8s infinite alternate !important; }
.slot-vazio.preenchido { border-style: solid !important; border-color: var(--cor-em) !important; background-color: #ffffff !important; }

.banco-opcoes { display: flex !important; gap: 12px !important; justify-content: center !important; flex-wrap: wrap !important; width: 100% !important; max-width: 650px !important; margin-bottom: 15px !important; }
.palavra-banco {
    padding: 8px 18px !important; background: #ffffff !important; border: 2px solid var(--azul-vibrante) !important;

    cursor: pointer !important; transition: all 0.15s ease !important; box-shadow: 0 4px 0 var(--azul-vibrante) !important;
}
.palavra-banco.selecionado { border-color: var(--cor-btn-amarelo) !important; box-shadow: 0 4px 0 var(--cor-btn-amarelo) !important; outline: none !important; }

/* Mapas e Esquemas */
.mapa-relevo-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); flex-shrink: 0; }
.mapa-relevo-wrapper.mapa-quadrado { max-width: 450px !important; aspect-ratio: 1 / 1; }
.mapa-relevo-wrapper.mapa-retangular { max-width: 540px; aspect-ratio: 800 / 510; }
.mapa-relevo-imagem { width: 100%; height: 100%; object-fit: contain; display: block; }

.slot-mapa {
    position: absolute; background-color: rgba(255, 255, 255, 0.45); border: 2px dashed #0091ff;

}
.slot-mapa.pronto-receber { border-color: var(--cor-btn-amarelo) !important; background-color: rgba(251, 197, 49, 0.18) !important; animation: pulseAlvo 0.8s infinite alternate; }

.slot-mapa.preenchido strong { color: var(--azul-escuro) !important; font-size: 0.95rem; font-weight: 900; }

/* ==========================================================================
   8. MASCOTE, MODAIS E OVERLAYS

#foguetao-feedback {
    position: absolute; bottom: 15px; right: 15px; width: 100px; height: 100px;

}
#foguetao-feedback img { width: 100%; height: 100%; object-fit: contain; }

.foguetao-normal { animation: flutuar 3s infinite ease-in-out; }
.foguetao-erro { animation: shakeError 0.4s ease-in-out; filter: saturate(1.5) hue-rotate(-20deg); }
.foguetao-decolar { animation: decolar 1.5s forwards ease-in; }

/* Modais e Toasts */
.modal-ajuda-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; padding: 20px; box-sizing: border-box;}
.modal-ajuda-overlay.active { display: flex; }
.modal-ajuda-box { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; border-top: 8px solid var(--cor-4ano);}
.btn-fechar-modal { position: absolute; top: 15px; right: 15px; background: #ffebeb; color: #ff4757; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s;}

.toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
.toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Destaques e Recompensas */
.highlight-correto {
    position: relative;
    outline: 4px solid var(--cor-btn-verde);
    outline-offset: 4px;
    animation: pulseHighlight 1.4s infinite;
    z-index: 2;
}
.highlight-correto::after {
    position: absolute; top: -16px; right: -16px; background: var(--cor-btn-verde); color: white;
    border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: bounceCheck 1s infinite alternate;
}
/* ==========================================================================
   9. ECRÃ DE FIM E ESTATÍSTICAS
   ========================================================================== */
.end-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--azul-escuro); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; }
.icon-end-title {
    width: 1.2em; 
    height: 1.2em;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

.end-stats { 
    font-size: 1.3rem; color: var(--text-main); margin-bottom: 40px; 
    text-align: center; background: var(--bg-header); padding: 30px 20px; 
    border-radius: 20px; border: 2px dashed var(--cor-em); line-height: 1.5; 
}

.botoes-acao-container { display: flex; flex-direction: column; align-items: center; gap: 35px; width: 100%; }

.btn-acao { 
    border: 4px solid white; color: white; padding: 15px 30px; 
    font-size: 1.2rem; font-weight: 900; border-radius: 20px; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; gap: 12px; 
    width: 100%; max-width: 350px; transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease; 
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2); touch-action: manipulation; 
    text-transform: uppercase; letter-spacing: 1px;
}
.btn-acao.primario { background-color: var(--cor-btn-verde); box-shadow: 0 6px 0 #45b062, 0 10px 15px rgba(0,0,0,0.1); }
.btn-acao.secundario { background-color: var(--cor-btn-laranja); box-shadow: 0 6px 0 #d97d2c, 0 10px 15px rgba(0,0,0,0.1); }
.btn-acao.terciario { background-color: var(--cor-btn-azul); box-shadow: 0 6px 0 #4a8deb, 0 10px 15px rgba(0,0,0,0.1); }
.btn-acao:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent !important; }

.icon-acao { width: 1.4em; height: 1.4em; object-fit: contain; flex-shrink: 0; pointer-events: none; transition: transform 0.2s ease; }
.primario:hover .icon-acao, .secundario:hover .icon-acao, .terciario:hover .icon-acao { transform: translateX(4px); }

/* Vitória e Confetis */
.taca-vitoria {
    width: clamp(80px, 15vw, 130px); 
    margin-bottom: 15px; 
    object-fit: contain;
    display: block;
    margin-left: auto;
    margin-right: auto;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, tacaDanca 3s infinite 0.6s ease-in-out;
}
.confetti-container { position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; border-radius:30px; z-index: 10; }
.confetti { position: absolute; width: 12px; height: 12px; border-radius: 2px; opacity: 0; animation: fall linear forwards; pointer-events: none; z-index: 15; }

/* ==========================================================================
   10. ZONA DE EDIÇÃO: PERSONALIDADE, ANIMAÇÕES E DESTAQUES
   ========================================================================== */
.scanner-tutorial {
    width: 100%; max-width: 400px; height: 180px;
    background: #0a3983; border: 3px dashed var(--cor-em);
    border-radius: 20px; position: relative; margin: 0 auto 25px;
    display: flex !important; align-items: center; justify-content: space-evenly; overflow: hidden;
	gap: 10px;
    padding: 10px;
}

/* 1. SILHUETA (Tamanho dinâmico) */
.silhueta-portugal-grande {
    height: clamp(70px, 15vh, 140px); 
    width: auto;
    filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
    flex-shrink: 0;
}

/* 2. ZONA DE TRANSIÇÃO */
.zona-transicao {
    position: relative;
    width: clamp(70px, 12vw, 90px);
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.lapis-simples {
    position: absolute;
    width: 100%;
    transform: rotate(-15deg);
    z-index: 10;
    opacity: 0;
    animation: lapisAfastar 8s infinite;
}

.cravo-vibrante {
    position: absolute;
    width: 90%;
    z-index: 5;
    transform: scale(0);
    animation: cravoEntrar 8s infinite;
}

/* 3. TEXTO (Lógica de não ser "comido") */
.texto-container {
    flex: 2; /* Dá mais espaço ao texto do que às imagens */
    text-align: left;
    min-width: 0; /* Permite que o flexbox encolha o texto se necessário */
}

.label-era-historia {
    color: #ffffff;
    font-family: 'Roboto', sans-serif;
    font-weight: 900;
    /* Tamanho do texto ajusta-se ao ecrã */
    font-size: clamp(0.75rem, 2.5vw, 1rem); 
    line-height: 1.2;
    display: block;
    word-wrap: break-word; /* Permite quebrar palavras se não couberem */
    opacity: 0;
    animation: textoEntrar 8s infinite;
}

/* KEYFRAMES MANTIDOS COM AJUSTES DE DISTÂNCIA */
@keyframes lapisAfastar {
    0%, 5% { opacity: 0; transform: rotate(-15deg) translateY(20px); }
    15%, 35% { opacity: 1; transform: rotate(-15deg) translateY(0); }
    45%, 100% { opacity: 0; transform: rotate(-30deg) translateY(-80px) translateX(-20px); }
}

@keyframes cravoEntrar {
    0%, 40% { transform: scale(0); opacity: 0; }
    50%, 85% { transform: scale(1.1); opacity: 1; }
    95%, 100% { transform: scale(0); opacity: 0; }
}

@keyframes textoEntrar {
    0%, 50% { opacity: 0; transform: translateX(10px); }
    60%, 85% { opacity: 1; transform: translateX(0); }
    95%, 100% { opacity: 0; }
}


.btn-wrapper-transparente {
    background: none !important;
    border: none !important;
    padding: 0 !important;
    cursor: pointer;
    outline: none;
    display: block;
    touch-action: manipulation;
}

/* O novo botão real que contém a imagem e o nome */
.cartao-opcao-visual {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    border-radius: 20px;
    background-color: white;
    border: 3px solid #e2e8f0; /* Borda cinza clara por padrão */
    
    /* O SEGREDO DO 3D: Sombra sólida na base */
    box-shadow: 0 6px 0 #cbd5e1; 
    
    transition: all 0.2s ease;
    width: 100%;
    min-width: 160px;
    cursor: pointer;
}

@media (hover: hover) {
    .btn-wrapper-transparente:hover .cartao-opcao-visual {
        transform: translateY(-4px);
        filter: brightness(1.05); /* Brilha ligeiramente ao passar o rato */
    }
}

/* Efeito de clique na imagem/nome */
.btn-wrapper-transparente:active .cartao-opcao-visual {
    transform: translateY(4px) !important; /* Desce o botão */
    box-shadow: 0 2px 0 #cbd5e1 !important; /* Quase anula a sombra */
}

/* Estilo para quando a opção é apenas texto (sem imagem) */
.btn-texto-apenas {
    color: white !important; 
	font-size: 1.2rem;
    font-weight: 800;
    min-height: 80px;
}





/* Realce de Títulos e Textos */
.destaque-fundo { background-color: #fff275; color: var(--azul-escuro); padding: 2px 6px; border-radius: 6px; font-weight: 900; }
.destaque-texto { color: var(--cor-btn-vermelho); font-weight: 900; }
.destaque-texto-verde { color: var(--cor-em); font-weight: 900; }

/* ==========================================================================
   11. KEYFRAMES (TODAS AS ANIMAÇÕES DO TEMPLATE)
   ========================================================================== */
@keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(1000px) rotate(720deg); opacity: 0; } }
@keyframes flutuar { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(3deg); } }
@keyframes decolar { 0% { transform: translateY(0) scale(1); } 20% { transform: translateY(10px) scale(0.9); } 100% { transform: translateY(-1000px) scale(1.2); opacity: 0; } }
@keyframes scanMove { 0%, 100% { top: 5%; } 50% { top: 90%; } }
@keyframes tacaDanca {
    0%, 100% { transform: translateY(0) scale(1) rotate(0deg); filter: drop-shadow(0 6px 12px rgba(251, 197, 49, 0.3)); }
    25% { transform: translateY(-10px) scale(1.06) rotate(-4deg); filter: drop-shadow(0 14px 24px rgba(251, 197, 49, 0.65)); }
    50% { transform: translateY(0) scale(1) rotate(0deg); filter: drop-shadow(0 6px 12px rgba(251, 197, 49, 0.3)); }
    75% { transform: translateY(-10px) scale(1.06) rotate(4deg); filter: drop-shadow(0 14px 24px rgba(251, 197, 49, 0.65)); }
}
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
@keyframes pulseAlvo { from { box-shadow: inset 0 0 0 transparent, 0 0 0 transparent; } to { box-shadow: inset 0 0 10px rgba(251, 197, 49, 0.2), 0 0 15px rgba(251, 197, 49, 0.4); } }
@keyframes pulseHighlight { 0% { box-shadow: 0 0 0 0 rgba(93, 210, 121, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(93, 210, 121, 0); } 100% { box-shadow: 0 0 0 0 rgba(93, 210, 121, 0); } }
@keyframes bounceCheck { from { transform: scale(1); } to { transform: scale(1.2); } }
@keyframes flutuarCartao { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes chamarAtencaoDica { 0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 0 0 transparent; } 50% { transform: scale(1.1) translateY(-3px); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.5); } }

   ========================================================================== */

	function prepararJogo(sistema) {
		sistemaAtivo = sistema;
		erradas = 0; desafioAtual = 0; podeInteragir = true;

		// 1. GESTÃO DA PILHA (MEMÓRIA ENTRE JOGOS)
		if (sistema !== ultimoSistema) {
			poolRestantesSessao = [];
			ultimoSistema = sistema;
		}

		let baseCompleta = [];
		let nomeSistema = "";

		// 2. SELEÇÃO DA BASE DE DADOS (Conforme os novos nomes)
		if (sistema === 'republica') {
			baseCompleta = QUESTOES_REPUBLICA;
			nomeSistema = "Adeus Monarquia!";
		} else if (sistema === 'ditadura') {
			baseCompleta = QUESTOES_DITADURA;
			nomeSistema = "Anos de Ditadura";
		} else if (sistema === 'democracia') {
			baseCompleta = QUESTOES_DEMOCRACIA;
			nomeSistema = "Revolução dos Cravos";
		} else if (sistema === 'quiz-total') {
			baseCompleta = BD_HISTORIA_SECULO_XX;
			nomeSistema = "Missão: Liberdade";
		}

		// 3. RECARREGAMENTO DA PILHA
		if (poolRestantesSessao.length < 10) {
			poolRestantesSessao = baralharArray([...baseCompleta]);
		}

		// 4. SORTEIO DIRETO (Retira apenas as próximas 10 da pilha)
		// Já não obriga a ter Mapas ou Ligar
		perguntasSorteadas = poolRestantesSessao.splice(0, 10);

		// 5. INICIALIZAÇÃO DA INTERFACE
		const fog = document.getElementById('foguetao-feedback');
		if(fog) { 
			fog.style.display = "flex"; 
			animarFoguetao('normal'); 
		}
		
		document.getElementById('subtitulo-header').textContent = nomeSistema;
		rondasParaDica = 0;
		atualizarBotaoDica(); 
		mostrarEcra('ecra-jogo');
		atualizarBarraEstado();
		carregarRonda();
	}
	
	function atualizarBarraEstado() {
		const p = document.getElementById('val-progresso');
		const t = document.getElementById('val-total');
		const e = document.getElementById('val-erros');
		if(p) p.textContent = Math.min(desafioAtual + 1, 10);
		if(t) t.textContent = 10;
		if(e) e.textContent = erradas;

		// PROGRESSO VISUAL CORRIGIDO: Começa logo preenchido em 10% na Ronda 1
		const progressoReferencia = Math.min(desafioAtual + 1, 10);
		document.getElementById('progress-fill').style.width = (progressoReferencia / 10 * 100) + '%';
	}
	
	function atualizarBotaoDica() {
		const btn = document.getElementById('btn-dica');
		if (!btn) return;

		// Se o tempo de recarga chegou a zero, o botão fica ativo
		if (rondasParaDica <= 0) {
			btn.classList.remove('esgotada');
			btn.disabled = false;
			btn.innerHTML = SVG_BULB + ' Dica';
		} else {
			// Se estiver em recarga, bloqueia o botão e mostra a ampulheta com a contagem decrescente
			btn.classList.add('esgotada');
			btn.disabled = true;
			btn.innerHTML = `⏳ ${rondasParaDica}`;
		}
	}
	
	/* --- VALIDAÇÃO EXCLUSIVA DO MAPA EM CASO DE ERRO --- */
	function validarMapa(zona) {
		const ronda = perguntasSorteadas[desafioAtual];
		let tudoCerto = true;

		// Verifica se cada órgão foi colocado no local correto
		for (let k in ronda.pares) {
			if (selecoesArrastar[k] !== ronda.pares[k]) {
				tudoCerto = false;
			}
		}

		if (tudoCerto) {
			validar(true, zona);
		} else {
			validar(false, zona);
			
			// REPOSIÇÃO SUAVE DO MAPA EM CASO DE ERRO
			setTimeout(() => {
				selecoesArrastar = {};
				arrastoAtivo = null;

				// 1. Reativa todos os botões azuis de órgãos à esquerda
				document.getElementById('game-area').querySelectorAll('.coluna-ligar button').forEach(btn => {
					btn.disabled = false;
					btn.style.opacity = '1';
					btn.classList.remove('selecionado');
				});

				// 2. Limpa e esvazia visualmente as caixas sobrepostas do corpo
				document.querySelectorAll('.slot-mapa').forEach(slot => {
					slot.innerHTML = '';
					slot.className = 'slot-mapa';
				});
			}, 800);
		}
	}
	
	/* --- VALIDAÇÃO EXCLUSIVA DO ARRASTAR EM CASO DE ERRO --- */
	function validarArrastar(container, ronda) {
		let tudoCerto = true;

		// Compara cada conceito ordenado com o par correto respetivo
		for (let k in ronda.pares) {
			if (selecoesArrastar[k] !== ronda.pares[k]) {
				tudoCerto = false;
			}
		}

		if (tudoCerto) {
			validar(true, container);
		} else {
			validar(false, container);
			
			// REPOSIÇÃO DO ARRASTAMENTO EM CASO DE ERRO
			setTimeout(() => {
				selecoesArrastar = {};
				arrastoAtivo = null;

				// 1. Reativa todos os blocos cinzentos à esquerda
				document.getElementById('game-area').querySelectorAll('.bloco-arrastar').forEach(btn => {
					btn.disabled = false;
					btn.style.opacity = '1';
					btn.classList.remove('selecionado');
				});

				// 2. Limpa e repõe o texto inicial dos alvos da direita (remover as palavras erradas)
				const botoesAlvo = document.getElementById('game-area').querySelectorAll('.coluna-ligar:last-child button');
				ronda.alvos.forEach((alvo, index) => {
					if (botoesAlvo[index]) {
						botoesAlvo[index].textContent = alvo;
					}
				});
			}, 800);
		}
	}

	function carregarRonda() {
		podeInteragir = true;
		selecaoLigar = null; 
		selecoesLigar = {};
		paresElementosLigar = [];
		arrastoAtivo = null; 
		selecoesArrastar = {}; 
		selecoesLacunas = {}; 
		lacunaAtiva = null;
		
		// Remove realces de rondas anteriores
		document.querySelectorAll('.highlight-correto').forEach(el => el.classList.remove('highlight-correto'));

		const ronda = perguntasSorteadas[desafioAtual];
		const area = document.getElementById('game-area');
		
		
		if(!area) return; // Se não encontrar o container, sai
		if(!ronda) { 
			// Se por algum motivo a pergunta falhar, finaliza ou reinicia
			finalizarJogo(); 
			return; 
		}
			
		
		area.innerHTML = '';

		// Limpa as classes do wrapper do ligar e lacunas de segurança
		area.className = 'area-jogo-custom';
		if(ronda.tipo === 'ligar') area.classList.add('jogo-tipo-ligar');
		if(ronda.tipo === 'lacunas') area.classList.add('jogo-tipo-lacunas');

		// A. INJETA IMAGEM MODULAR (QUADRADA OU RETANGULAR COM ZOOM OPCIONAL)
		if(ronda.imagem && ronda.tipo !== 'mapa') {
			const wrapper = document.createElement('div');
			const proporcaoClasse = ronda.proporcao === 'quadrada' ? 'img-quadrada' : 'img-retangular';
			wrapper.className = `card-imagem-zoomable ${proporcaoClasse}`;

			const img = document.createElement('img');
			img.src = ronda.imagem;
			img.className = 'imagem-evento-tempo';
			img.alt = 'Imagem de suporte';
			img.onerror = () => { wrapper.remove(); };
			wrapper.appendChild(img);

			// Se a propriedade "zoom" for verdadeira na base de dados, ativa a lupa e o clique!
			if (ronda.zoom === true) {
				wrapper.onclick = () => abrirZoomImagem(ronda.imagem);

				const zoomBtn = document.createElement('div');
				zoomBtn.className = 'btn-zoom-imagem';
				zoomBtn.innerHTML = `
					<svg viewBox="0 0 24 24">
						<circle cx="11" cy="11" r="8"></circle>
						<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
					</svg>
				`;
				wrapper.appendChild(zoomBtn);
			}

			area.appendChild(wrapper);
		}

		// B. INJETA O TEXTO DA PERGUNTA
		if (ronda.pergunta && ronda.tipo !== 'mapa') {
			const txt = document.createElement('div');
			txt.className = 'pergunta-texto';
			txt.innerHTML = ronda.pergunta;
			area.appendChild(txt);
		}

		// C. GERADOR DE SELEÇÃO MÚLTIPLA VIBRANTE (SUPORTA TEXTO OU IMAGENS)
		if (ronda.tipo === 'multipla') {
			const container = document.createElement('div'); 
			container.className = 'opcoes-container';
			
			// Baralhamos as opções para não estarem sempre na mesma ordem
			const baralhadas = [...ronda.opcoes].sort(() => Math.random() - 0.5);
			const coresSorteio = obterCoresAleatorias(baralhadas.length);

			baralhadas.forEach((opt, idx) => {
				const b = document.createElement('button');
				// O botão agora é apenas um "wrapper" transparente
				b.className = `btn-wrapper-transparente`;
				
				let conteudoHTML = "";
				let valorComparacao = "";

				// VERIFICAÇÃO: A opção é um objeto {img, nome}?
				if (typeof opt === 'object' && opt.img) {
					conteudoHTML = `
						<div class="cartao-opcao-visual ${coresSorteio[idx]}">
							<img src="${opt.img}" class="imagem-opcao-vibrante" alt="">
							<span class="nome-opcao-legenda">${opt.nome}</span>
						</div>
					`;
					valorComparacao = opt.img; // Compara pelo caminho da imagem
				} 
				// É apenas uma imagem simples?
				else if (typeof opt === 'string' && (opt.endsWith('.png') || opt.endsWith('.webp'))) {
					conteudoHTML = `
						<div class="cartao-opcao-visual ${coresSorteio[idx]}">
							<img src="${opt}" class="imagem-opcao-vibrante" alt="">
						</div>
					`;
					valorComparacao = opt;
				} 
				// É apenas texto?
				else {
					conteudoHTML = `
						<div class="cartao-opcao-visual btn-texto-apenas ${coresSorteio[idx]}">
							${opt}
						</div>
					`;
					valorComparacao = opt;
				}

				b.innerHTML = conteudoHTML;
				
				// Quando clicado, envia o elemento interno para a validação (para a animação ser lá)
				const elementoVisual = b.querySelector('.cartao-opcao-visual');
				b.onclick = () => {
					if(!podeInteragir) return;
					validar(valorComparacao === ronda.correta, elementoVisual);
				};
				
				container.appendChild(b);
			});
			area.appendChild(container);
		}
		// D. GERADOR DE LIGAR COLUNAS (COM DESFAZER E CLASSES DO CSS)
		else if (ronda.tipo === 'ligar') {
			const container = document.createElement('div'); container.className = 'coluna-ligar-container';
			const colEsq = document.createElement('div'); colEsq.className = 'coluna-ligar';
			const colDir = document.createElement('div'); colDir.className = 'coluna-ligar';
			
			ronda.esquerda.forEach(it => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-azul'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir) return; selecionarLigarEsq(it, b, ronda); };
				colEsq.appendChild(b);
			});
			[...ronda.direita].sort(() => Math.random() - 0.5).forEach(it => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-turquesa'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir) return; selecionarLigarDir(it, b, ronda); };
				colDir.appendChild(b);
			});
			container.appendChild(colEsq); container.appendChild(colDir); area.appendChild(container);
		}
		// E. GERADOR DE TEXTO COM LACUNAS (MÉTODO PREMIUM 2 TOQUES)
		else if (ronda.tipo === 'lacunas') {
			const p = document.createElement('div'); p.className = 'texto-paragrafo-lacunas';
			let html = ronda.texto;
			ronda.respostas.forEach((r, i) => html = html.replace(`[${i}]`, `<span class="slot-vazio" id="slot-lacuna-${i}">...</span>`));
			p.innerHTML = html; area.appendChild(p);
			
			const banco = document.createElement('div'); banco.className = 'banco-opcoes';
			const distratoresSeguros = ronda.distratores || [];
			const todasAsOpcoes = baralharArray([...ronda.respostas, ...distratoresSeguros]);

			todasAsOpcoes.forEach(pal => {
				const b = document.createElement('button'); b.className = 'palavra-banco'; b.textContent = pal;
				b.onclick = () => {
					if (b.disabled || !podeInteragir) return;
					tocarSom('flip');
					document.querySelectorAll('.palavra-banco').forEach(x => x.classList.remove('selecionado'));
					b.classList.add('selecionado');
					lacunaAtiva = { elemento: b, texto: pal };

					// Ilumina apenas os slots vazios
					document.querySelectorAll('.slot-vazio').forEach(s => {
						if (!s.querySelector('strong')) {
							s.classList.add('pronto-receber');
						}
					});
				};
				banco.appendChild(b);
			});
			area.appendChild(banco);

			// Ativa ação de clique nos slots vazios para receber a palavra
			document.querySelectorAll('.slot-vazio').forEach((slot, idx) => {
				slot.onclick = () => {
					if (!lacunaAtiva) {
						const palavraAtual = slot.querySelector('strong')?.textContent;
						if (palavraAtual) {
							tocarSom('flip');
							slot.textContent = '...';
							slot.classList.remove('preenchido');
							delete selecoesLacunas[idx];
							
							document.querySelectorAll('.palavra-banco').forEach(b => {
								if (b.textContent === palavraAtual) {
									b.disabled = false;
									b.style.opacity = '1';
								}
							});
						} else {
							showToast("Seleciona primeiro uma palavra em baixo!");
						}
						return;
					}

					tocarSom('flip');
					const palavraTexto = lacunaAtiva.texto;

					const palavraAnterior = slot.querySelector('strong')?.textContent;
					if (palavraAnterior) {
						document.querySelectorAll('.palavra-banco').forEach(b => {
							if (b.textContent === palavraAnterior) {
								b.disabled = false;
								b.style.opacity = '1';
							}
						});
					}

					slot.innerHTML = `<strong style="color:var(--azul-escuro); font-size:1.1rem;">${palavraTexto}</strong>`;
					slot.classList.add('preenchido');
					selecoesLacunas[idx] = palavraTexto;

					lacunaAtiva.elemento.classList.remove('selecionado');
					lacunaAtiva.elemento.style.opacity = '0.3';
					lacunaAtiva.elemento.disabled = true;
					lacunaAtiva = null;

					document.querySelectorAll('.slot-vazio').forEach(s => s.classList.remove('pronto-receber'));

					if (Object.keys(selecoesLacunas).length === ronda.respostas.length) {
						let tudoOk = true; 
						ronda.respostas.forEach((res, index) => { 
							if(selecoesLacunas[index] !== res) tudoOk = false; 
						});
						validar(tudoOk, p);
					}
				};
			});
		}
		// F. GERADOR DE ARRASTAR E LIGAR (SISTEMA DE DOIS TOQUES)
		else if (ronda.tipo === 'arrastar') {
			const container = document.createElement('div'); container.style.display="flex"; container.style.gap="30px";
			const colItens = document.createElement('div'); colItens.className="coluna-ligar";
			const colAlvos = document.createElement('div'); colAlvos.className="coluna-ligar";
			
			const itensEmbaralhados = baralharArray(ronda.itens);

			itensEmbaralhados.forEach(it => {
				const b = document.createElement('button'); b.className = 'bloco-arrastar'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir || b.disabled) return; document.querySelectorAll('.bloco-arrastar').forEach(x=>x.classList.remove('selecionado')); b.classList.add('selecionado'); arrastoAtivo = {val: it, btn: b}; tocarSom('flip'); };
				colItens.appendChild(b);
			});

			ronda.alvos.forEach(al => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-turquesa'; b.textContent = al;
				
				b.onclick = () => {
					// MECÂNICA DE DESFAZER ATIVA NO ARRASTAR: Se clicar num alvo já ocupado sem palavra selecionada
					if (!arrastoAtivo) {
						let itemEncontrado = null;
						for (let item in selecoesArrastar) {
							if (selecoesArrastar[item] === al) {
								itemEncontrado = item;
								break;
							}
						}
						
						if (itemEncontrado) {
							tocarSom('flip');
							delete selecoesArrastar[itemEncontrado];
							b.textContent = al; // Devolve o botão ao seu texto original de etapa

							// Reativa o bloco correspondente no lado esquerdo
							document.getElementById('game-area').querySelectorAll('.bloco-arrastar').forEach(bloco => {
								if (bloco.textContent === itemEncontrado) {
									bloco.disabled = false;
									bloco.style.opacity = '1';
								}
							});
						}
						return;
					}

					tocarSom('flip');
					const valorSelecionado = arrastoAtivo.val;
					selecoesArrastar[valorSelecionado] = al;
					
					b.innerHTML = `${al}<br><small style="color:white; opacity:0.8;">(${valorSelecionado})</small>`; 
					arrastoAtivo.btn.disabled = true; 
					arrastoAtivo.btn.style.opacity = "0.3"; 
					arrastoAtivo = null;

					if (Object.keys(selecoesArrastar).length === ronda.itens.length) {
						// CORREÇÃO: Encaminha para a validação e reposição do arrastamento em caso de erro!
						setTimeout(() => { validarArrastar(container, ronda); }, 400);
					}
				};
				colAlvos.appendChild(b);
			});
			container.appendChild(colItens); container.appendChild(colAlvos); area.appendChild(container);
		}

		// G. NOVO CASO: MAPA / ESQUEMA ANATÓMICO COM COORDENADAS E LINHAS VETORIAIS DINÂMICAS
		else if (ronda.tipo === 'mapa') {
			selecoesArrastar = {};
			arrastoAtivo = null;
			totalArrastar = Object.keys(ronda.pares).length;

			const zona = document.createElement('div');
			zona.style.display = 'flex';
			zona.style.alignItems = 'center';
			zona.style.justifyContent = 'center';
			zona.style.gap = '25px';
			zona.style.width = '100%';
			zona.style.flexWrap = 'wrap';

			const itens = document.createElement('div');
			itens.className = 'coluna-ligar';

			const itensEmbaralhados = baralharArray(ronda.itens);
			itensEmbaralhados.forEach(valor => {
				const b = document.createElement('button');
				b.className = 'btn-opcao-vibrante bg-azul';
				b.textContent = valor;
				b.style.fontSize = '0.92rem';

				b.onclick = () => {
					if (b.disabled || !podeInteragir) return;
					tocarSom('flip');
					document.querySelectorAll('.btn-opcao-vibrante').forEach(b => b.classList.remove('selecionado'));
					b.classList.add('selecionado');
					arrastoAtivo = { val: valor, btn: b };

					document.querySelectorAll('.slot-mapa').forEach(s => {
						if (!s.querySelector('strong')) {
							s.classList.add('pronto-receber');
						}
					});
				};
				itens.appendChild(b);
			});

			const wrapper = document.createElement('div');
			const mapaProporcao = 'mapa-quadrado'; /* Forçado 1:1 Quadrado para o Corpo Humano */
			wrapper.className = `mapa-relevo-wrapper ${mapaProporcao}`;

			// Injeta o mapa de fundo
			const img = document.createElement('img');
			img.src = ronda.imagem;
			img.className = 'mapa-relevo-imagem';
			img.alt = 'Esquema do Corpo';
			img.onerror = () => { wrapper.remove(); };
			wrapper.appendChild(img);

			// NOVO: Desenha as linhas pontilhadas dinamicamente na tela transparente sobre o mapa
			if (ronda.coords.linhas) {
				const svgNS = "http://www.w3.org/2000/svg";
				const svg = document.createElementNS(svgNS, "svg");
				svg.setAttribute("viewBox", "0 0 100 100");
				svg.style.position = "absolute";
				svg.style.top = "0";
				svg.style.left = "0";
				svg.style.width = "100%";
				svg.style.height = "100%";
				svg.style.pointerEvents = "none";
				svg.style.zIndex = "5";

				ronda.coords.linhas.forEach(linhaObj => {
				const path = document.createElementNS(svgNS, "path");
				path.setAttribute("d", linhaObj.d); // Lê o trajeto d
				path.setAttribute("stroke", linhaObj.cor || "#0091ff"); // Lê a cor individual definida ou usa azul por padrão
				path.setAttribute("stroke-width", "0.6");
				path.setAttribute("fill", "none");
				svg.appendChild(path);
			});

				wrapper.appendChild(svg);
			}

			// Leitura das coordenadas dinâmicas da base de dados (Evita erros de cruzamento)
			const tops = ronda.coords.tops;
			const lefts = ronda.coords.lefts;
			const widths = ronda.coords.widths;
			const heights = ronda.coords.heights || ['6%', '6%', '6%', '6%', '6%'];

			ronda.alvos.forEach((alvo, index) => {
				const slot = document.createElement('div');
				slot.className = 'slot-mapa';
				slot.style.top = tops[index];
				slot.style.left = lefts[index];
				slot.style.width = widths[index];
				slot.style.height = heights[index];

				slot.onclick = () => {
					if (!arrastoAtivo) {
						const palavraAtual = slot.querySelector('strong')?.textContent;
						if (palavraAtual) {
							tocarSom('flip');
							slot.innerHTML = '';
							slot.classList.remove('preenchido');
							delete selecoesArrastar[palavraAtual];
							
							document.getElementById('game-area').querySelectorAll('.coluna-ligar button').forEach(b => {
								if (b.textContent === palavraAtual) {
									b.disabled = false;
									b.style.opacity = '1';
								}
							});
						} else {
							showToast("Seleciona primeiro uma palavra à esquerda!", false);
						}
						return;
					}

					tocarSom('flip');
					const valorSelecionado = arrastoAtivo.val;
					selecoesArrastar[valorSelecionado] = alvo;

					slot.innerHTML = `<strong>${valorSelecionado}</strong>`;
					slot.classList.add('preenchido');

					arrastoAtivo.btn.classList.remove('selecionado');
					arrastoAtivo.btn.style.opacity = '0.3';
					arrastoAtivo.btn.disabled = true;
					arrastoAtivo = null;

					document.querySelectorAll('.slot-mapa').forEach(s => s.classList.remove('pronto-receber'));

					if (Object.keys(selecoesArrastar).length === totalArrastar) {
						setTimeout(() => { validarMapa(zona); }, 400);
					}
				};

				wrapper.appendChild(slot);
			});

			zona.appendChild(itens);
			zona.appendChild(wrapper);
			area.appendChild(zona);
		}
		// H. NOVO CASO: JOGO DE VERDADEIRO OU FALSO (BOTÕES FIXOS DE CORES FIXAS)
		else if (ronda.tipo === 'verdadeiro-falso') {
			const container = document.createElement('div'); 
			container.className = 'opcoes-container';

			// Cria os dois cartões visuais (Verdadeiro e Falso)
			const opcoesVF = ['Verdadeiro', 'Falso'];
			const coresVF = ['bg-verde', 'bg-vermelho'];

			opcoesVF.forEach((texto, i) => {
				const b = document.createElement('button');
				b.className = 'btn-wrapper-transparente';
				
				b.innerHTML = `
					<div class="cartao-opcao-visual btn-texto-apenas ${coresVF[i]}">
						${texto}
					</div>
				`;

				const elementoVisual = b.querySelector('.cartao-opcao-visual');
				b.onclick = () => {
					if(!podeInteragir) return;
					validar(ronda.correta === texto, elementoVisual);
				};
				container.appendChild(b);
			});
			area.appendChild(container);
		}
		resetTimerImpaciencia();
	}

/* ==========================================================================
   5. LÓGICA DE COORDENAÇÃO DO JOGO DE LIGAR (DESFAZER E ESTILO)
   ========================================================================== */
	function selecionarLigarEsq(it, b, ronda) {
		if (b.classList.contains('ligado')) {
			tocarSom('flip');
			const parIdx = paresElementosLigar.findIndex(p => p.esqBtn === b || p.dirBtn === b);
			if (parIdx !== -1) {
				const par = paresElementosLigar[parIdx];
				par.esqBtn.classList.remove('ligado');
				par.dirBtn.classList.remove('ligado');
				delete selecoesLigar[par.esqVal];
				paresElementosLigar.splice(parIdx, 1);
			}
			if (selecaoLigar) {
				selecaoLigar.btn.classList.remove('selecionado');
				selecaoLigar = null;
			}
			return;
		}

		if (selecaoLigar && selecaoLigar.btn === b) {
			b.classList.remove('selecionado');
			selecaoLigar = null;
			tocarSom('flip');
			return;
		}

		tocarSom('flip');
		document.querySelectorAll('.coluna-ligar button').forEach(x => x.classList.remove('selecionado'));
		b.classList.add('selecionado');
		selecaoLigar = { val: it, btn: b };
	}

	function selecionarLigarDir(it, b, ronda) {
		if (!selecaoLigar || !podeInteragir) return;
		
		if (b.classList.contains('ligado')) {
			tocarSom('flip');
			const parIdx = paresElementosLigar.findIndex(p => p.esqBtn === b || p.dirBtn === b);
			if (parIdx !== -1) {
				const par = paresElementosLigar[parIdx];
				par.esqBtn.classList.remove('ligado');
				par.dirBtn.classList.remove('ligado');
				delete selecoesLigar[par.esqVal];
				paresElementosLigar.splice(parIdx, 1);
			}
			selecaoLigar = null;
			return;
		}

		const ok = (ronda.pares[selecaoLigar.val] === it);
		
		if (ok) {
			b.classList.add('ligado');
			selecaoLigar.btn.classList.add('ligado');
			selecaoLigar.btn.classList.remove('selecionado');

			selecoesLigar[selecaoLigar.val] = it;
			paresElementosLigar.push({
				esqBtn: selecaoLigar.btn,
				dirBtn: b,
				esqVal: selecaoLigar.val,
				dirVal: it
			});

			selecaoLigar = null;

			const totalPares = Object.keys(ronda.pares).length;
			if (Object.keys(selecoesLigar).length === totalPares) {
				validar(true, b);
			} else {
				tocarSom('acerto');
			}
		} else {
			validar(false, b);
			
			setTimeout(() => {
				selecoesLigar = {};
				selecaoLigar = null;
				paresElementosLigar = [];
				document.querySelectorAll('.coluna-ligar button').forEach(btn => {
					btn.classList.remove('selecionado', 'ligado');
					btn.style.opacity = '1';
				});
			}, 600);
		}
	}

/* ==========================================================================
   6. VERIFICAÇÃO E TRANSIÇÕES DE FEEDBACK
   ========================================================================== */
	function validar(correto, el) {
		if (!podeInteragir) return; podeInteragir = false; clearTimeout(timerImpaciencia);
		if (correto) {
			el.classList.add('sucesso-vibrante'); animarFoguetao('acerto'); tocarSom('decolar'); // Ativa o rugido do motor ao subir!
			
			// ADICIONADO: Reduz o cooldown da dica em caso de acerto!
			if (rondasParaDica > 0) {
				rondasParaDica--;
			}
			atualizarBotaoDica();

			setTimeout(() => { desafioAtual++; if(desafioAtual < 10) { atualizarBarraEstado(); carregarRonda(); } else finalizarJogo(); }, 1600);
		} else {
			el.classList.add('erro-vibrante'); erradas++; atualizarBarraEstado(); animarFoguetao('erro'); tocarSom('erro');
			setTimeout(() => { el.classList.remove('erro-vibrante'); podeInteragir = true; resetTimerImpaciencia(); }, 600);
		}
	}

	function animarFoguetao(estado) {
		const fog = document.getElementById('foguetao-feedback');
		if (!fog) return;

		// Limpa as animações antigas para permitir que ocorra o reflow
		fog.classList.remove('foguetao-normal', 'foguetao-erro', 'foguetao-decolar');
		void fog.offsetWidth;

		if (estado === 'normal') {
			fog.src = "img/foguetao_normal.png"; // Carrega o foguetão em repouso
			fog.classList.add('foguetao-normal');
		}
		else if (estado === 'erro') {
			fog.src = "img/foguetao_normal.png"; // Usa o mesmo em repouso para abanar no erro
			fog.classList.add('foguetao-erro');
			setTimeout(() => animarFoguetao('normal'), 500);
		}
		else if (estado === 'acerto') {
			fog.src = "img/foguetao_decolar.png"; // Carrega o foguetão com chamas e propulsão!
			fog.classList.add('foguetao-decolar');
			setTimeout(() => { 
				if (desafioAtual < 10) animarFoguetao('normal'); 
			}, 1500);
		}
	}

	function resetTimerImpaciencia() {
		clearTimeout(timerImpaciencia); 
		const btnDica = document.getElementById('btn-dica');
		if(btnDica) btnDica.classList.remove('dica-impaciente');
		timerImpaciencia = setTimeout(() => { if(btnDica) btnDica.classList.add('dica-impaciente'); }, 15000);
	}

	function usarDica() {
		if (rondasParaDica > 0 || !podeInteragir) return;
		
		const ronda = perguntasSorteadas[desafioAtual];
		const configDica = ronda.dica;
		if (!configDica) return;

		tocarSom('flip');

		// 1. Dica tipo TEXTO (Abre Modal)
		if (typeof configDica === 'string') {
			document.getElementById('modal-dica-conteudo').innerHTML = `<p>${configDica}</p>`;
			document.getElementById('modal-ajuda').classList.add('active');
		}
		// 2. Dica tipo HIGHLIGHT (Delega para a função inteligente)
		else if (configDica.tipo === 'highlight') {
			aplicarHighlightRespostaCorreta(ronda);
		}
		// 3. Dica tipo 50-50 ou RETIRAR-UM
		else if (configDica.tipo === '50-50' || configDica.tipo === 'retirar-um') {
			// Seleciona botões que não estão desativados nem ligados
			const botoes = Array.from(document.querySelectorAll('.btn-opcao-vibrante:not(.ligado), .palavra-banco:not([disabled])'));
			let errados = botoes.filter(btn => {
				const texto = btn.textContent.trim();
				const imgInside = btn.querySelector('img')?.getAttribute('src');
				
				// Verifica se é a correta (suporta texto ou imagem)
				const isCorretaMultipla = (texto === ronda.correta || imgInside === ronda.correta);
				const isCorretaLacuna = ronda.respostas && ronda.respostas.includes(texto);
				
				return !isCorretaMultipla && !isCorretaLacuna;
			});

			errados = baralharArray(errados);
			const qtdParaEsconder = (configDica.tipo === '50-50') ? Math.max(1, Math.floor(errados.length / 2)) : 1;

			for (let i = 0; i < qtdParaEsconder; i++) {
				errados[i].style.opacity = '0.2';
				errados[i].style.pointerEvents = 'none';
				errados[i].setAttribute('disabled', 'true');
			}
			showToast("Removi opções erradas!");
		}

		rondasParaDica = COOLDOWN_DICA;
		atualizarBotaoDica();
	}

	function fecharModalDica() { document.getElementById('modal-ajuda').classList.remove('active'); }

	function finalizarJogo() {
		document.getElementById('foguetao-feedback').style.display = "none";
		mostrarEcra('ecra-fim');
		document.getElementById('final-erros').textContent = erradas;
		const rank = document.getElementById('rank-container');
		let img = erradas === 0 ? "rank_ouro.svg" : (erradas <= 3 ? "rank_prata.svg" : "rank_bronze.svg");
		rank.innerHTML = `<img src="../../../SVG/${img}" class="taca-vitoria" style="width:120px;">`;
		tocarSom('vitoria'); dispararConfetis();
	}

	function voltarAoMenuPrincipal() {
		mostrarEcra('ecra-selecao');
		document.getElementById('foguetao-feedback').style.display = "none";
		document.getElementById('subtitulo-header').textContent = "Da Monarquia à Democracia";
		limparConfetis();
	}

	function confirmarSair() {
		voltarAoMenuPrincipal();
	}

	function reiniciarJogo() { prepararJogo(sistemaAtivo); limparConfetis();}

/* ==========================================================================
   7. ÁUDIO, CONFETIS E AUXILIARES (COM COMPATIBILIDADE SEGURA)
   ========================================================================== */
	const AudioContextClass = window.AudioContext || window.webkitAudioContext;
	let audioCtx = null;

	function initAudio() {
		try {
			if (!AudioContextClass) return;
			if (!audioCtx) {
				audioCtx = new AudioContextClass();
			}
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume().catch(e => console.warn("Aviso: Não foi possível retomar o AudioContext:", e));
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha na inicialização do AudioContext:", error);
			audioCtx = null;
		}
	}

	document.addEventListener('pointerdown', initAudio, { once: true });

	function baralharArray(arr) {
		let array = [...arr];
		for (let i = array.length - 1; i > 0; i--) {
			const j = Math.floor(Math.random() * (i + 1));
			[array[i], array[j]] = [array[j], array[i]];
		}
		return array;
	}

	function obterCoresAleatorias(quantidade) {
		const coresTemplate = ['bg-azul', 'bg-amarelo', 'bg-roxo', 'bg-laranja', 'bg-rosa', 'bg-turquesa', 'bg-vermelho'];
		const baralhadas = baralharArray(coresTemplate);
		return baralhadas.slice(0, quantidade);
	}

	function tocarSom(t) {
		try {
			initAudio();
			if (!audioCtx) return;
			const agora = audioCtx.currentTime; // Variável unificada como agora

			if (t === 'acerto') {
				const notas = [783.99, 1046.50];
				notas.forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'sine';
					o.frequency.value = freq;
					g.gain.setValueAtTime(0, agora + i * 0.12);
					g.gain.linearRampToValueAtTime(0.08, agora + i * 0.12 + 0.02);
					g.gain.exponentialRampToValueAtTime(0.001, agora + i * 0.12 + 0.3);
					o.start(agora + i * 0.12);
					o.stop(agora + i * 0.12 + 0.3);
				});
			} else if (t === 'erro') {
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'triangle';
				o.frequency.setValueAtTime(220, agora);
				o.frequency.exponentialRampToValueAtTime(80, agora + 0.3);
				g.gain.setValueAtTime(0.08, agora);
				o.start(agora);
				o.stop(agora + 0.3);
			} else if (t === 'vitoria') {
				const melodia = [
					{ freq: 523.25, tempo: 0.00, duracao: 0.15 }, 
					{ freq: 659.25, tempo: 0.15, duracao: 0.15 }, 
					{ freq: 783.99, tempo: 0.30, duracao: 0.20 }, 
					{ freq: 659.25, tempo: 0.50, duracao: 0.15 }, 
					{ freq: 1046.50, tempo: 0.65, duracao: 0.70 } 
				];
				melodia.forEach(nota => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'triangle'; 
					o.frequency.value = nota.freq;
					g.gain.setValueAtTime(0.08, agora + nota.tempo);
					g.gain.exponentialRampToValueAtTime(0.001, agora + nota.tempo + nota.duracao);
					o.start(agora + nota.tempo);
					o.stop(agora + nota.tempo + nota.duracao);
				});
			} else if (t === 'decolar') {
				// NOVO: Som de Propulsão Sci-Fi Limpo e Cristalino (Zwoooop!)
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine'; // Onda 100% pura e limpa, sem qualquer distorção
				o.frequency.setValueAtTime(150, agora);
				// Varredura exponencial ascendente muito rápida (efeito de aceleração para o espaço)
				o.frequency.exponentialRampToValueAtTime(1800, agora + 0.8); 
				g.gain.setValueAtTime(0, agora);
				g.gain.linearRampToValueAtTime(0.12, agora + 0.05); // Ataque de ignição rápido
				g.gain.exponentialRampToValueAtTime(0.001, agora + 0.8); // Desvanece suavemente
				o.start(agora);
				o.stop(agora + 0.8);
			} else if (t === 'flip') { // CORREÇÃO: Removida a chaveta extra "}" que quebrava a sintaxe aqui
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine';
				o.frequency.setValueAtTime(400, agora);
				o.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
				g.gain.setValueAtTime(0.05, agora);
				o.start(agora);
				o.stop(agora + 0.1);
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha ao tentar reproduzir o áudio sintetizado:", error);
		}
	}

	function dispararConfetis() {
		const c = document.getElementById('confetti-container');
		if (!c) return;
		c.innerHTML = '';
		const cores = ['#ff4757', '#2ed573', '#0091ff', '#fbc531'];
		for (let i = 0; i < 120; i++) {
			const d = document.createElement('div');
			d.className = 'confetti';
			d.style.left = Math.random() * 100 + '%';
			d.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
			
			const escala = Math.random() * 0.8 + 0.4;
			const duracao = Math.random() * 2 + 2.5;
			const atraso = Math.random() * 1.5;
			
			d.style.animationDuration = duracao + 's';
			d.style.animationDelay = atraso + 's';
			d.style.transform = `scale(${escala})`;
			
			c.appendChild(d);
			setTimeout(() => d.remove(), (duracao + atraso) * 1000);
		}
	}

	function limparConfetis() {
		const container = document.getElementById('confetti-container');
		if (container) {
			container.innerHTML = '';
		}
	}

	function aplicarHighlightRespostaCorreta(ronda) {
		// Seleciona todos os elementos interativos possíveis
		const todosBotoes = document.querySelectorAll('.btn-opcao-vibrante, .btn-opcao, .bloco-arrastar, .palavra-banco, .cartao-opcao-visual');

		/* A. CASO: ESCOLHA MÚLTIPLA */
		if (ronda.tipo === 'multipla') {
			todosBotoes.forEach(btn => {
				const texto = btn.textContent.trim();
				const imgInside = btn.querySelector('img')?.getAttribute('src');
				// Verifica se o texto ou o SRC da imagem coincide com a resposta certa
				if (texto === ronda.correta || imgInside === ronda.correta) {
					btn.classList.add('highlight-correto');
					setTimeout(() => btn.classList.remove('highlight-correto'), 4000);
				}
			});
		}

		/* B. CASO: LIGAR (Lógica Inteligente) */
		else if (ronda.tipo === 'ligar') {
			// Encontra o primeiro par da esquerda que AINDA NÃO está ligado
			const parPendente = Object.entries(ronda.pares).find(([esq, dir]) => {
				const btnEsq = Array.from(todosBotoes).find(b => b.textContent.trim() === esq);
				return btnEsq && !btnEsq.classList.contains('ligado');
			});

			if (parPendente) {
				const [valEsq, valDir] = parPendente;
				todosBotoes.forEach(btn => {
					const txt = btn.textContent.trim();
					if (txt === valEsq || txt === valDir) {
						btn.classList.add('highlight-correto');
						setTimeout(() => btn.classList.remove('highlight-correto'), 4000);
					}
				});
			}
		}

		/* C. CASO: ARRASTAR OU MAPA */
		else if (ronda.tipo === 'arrastar' || ronda.tipo === 'mapa') {
			// Encontra o primeiro item que ainda não foi colocado no alvo
			const itemPendente = Object.keys(ronda.pares).find(item => !selecoesArrastar[item]);

			if (itemPendente) {
				todosBotoes.forEach(el => {
					if (el.textContent.trim() === itemPendente) {
						el.classList.add('highlight-correto');
						setTimeout(() => el.classList.remove('highlight-correto'), 4000);
					}
				});
				showToast("Observa o destaque!");
			}
		}
	}
