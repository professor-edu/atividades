<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4º Ano - Mestre das Ordens 🔢</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
/* ==========================================================================
   1. RESET E VARIÁVEIS GLOBAIS (LITERAL)
   ========================================================================== */
*, *::before, *::after { box-sizing: border-box; }

:root {
    --bg-body: #f0f7ff;
    --azul-vibrante: #0091ff; 
    --cor-4ano: #a28cf2;     
    --cor-4ano-dark: #8a72e0;
    --cor-borda: #8a72e0;
    --bg-header: #f3f0ff; 
    --cor-btn-fundo: #fffde7;
    --azul-escuro: #0d47a1;
    --text-main: #455a64;
    --borda-cartao: #ced6e0;
    --cor-pt: #ff6b6b;
    --cor-mat: #4dabf7;
    --cor-em: #51cf66;

    /* CORES DOS BOTÕES DO MENU INICIAL */
    --cor-btn-azul: #61A0FF;
    --cor-btn-verde: #5DD279;
    --cor-btn-amarelo: #FBC531;
    --cor-btn-vermelho: #FF6B6B;
    --cor-btn-roxo: #A55EEA;
    --cor-btn-laranja: #FA983A;
    --cor-btn-rosa: #e04d8c;
    --cor-btn-turquesa: #139ea3;
    
    /* Cores de Feedback (Vibrantes) */
    --cor-sucesso: #2ed573;
    --cor-sucesso-dark: #219d53;
    --cor-erro: #ff4757;
    --cor-erro-dark: #d0303f;
}

body { 
    font-family: 'Roboto', sans-serif; 
    text-align: center; 
    background-color: var(--bg-body); 
    background-image: radial-gradient(rgba(13, 71, 161, 0.06) 2px, transparent 2px);
    background-size: 25px 25px;
    margin: 0; 
    display: flex;
    flex-direction: column;
    min-height: 100dvh; 
    overflow-x: hidden; 
}

*:focus-visible {
    outline: 4px solid var(--cor-btn-amarelo);
    border-radius: 8px;
}

@media (min-width: 769px) and (min-height: 600px) { body { height: 100vh; overflow-y: auto; } }

/* ==========================================================================
   2. LAYOUT: HEADER, SIDEBAR, MAIN, FOOTER E ÍCONES
   ========================================================================== */
header {
    background-color: var(--bg-header); padding: 25px 20px;
    border-bottom: 1px solid var(--cor-4ano-dark);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100;
}
.header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }

.nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
.hamburger { cursor: pointer; background: rgba(255,255,255,0.3); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
@media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
.hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }        
.hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
.subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

.btn-voltar { background: var(--cor-4ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-4ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
@media (hover: hover) { .btn-voltar:hover { transform: scale(1.05); } }

.sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
.sidebar.active { left: 0; }
.sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
.sidebar ul { list-style: none; padding: 15px; margin: 0; }
.sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
@media (hover: hover) { .sidebar li a:hover { background: var(--cor-4ano); color: white; transform: translateX(8px); } }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
.overlay.active { display: block; }

main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 20px; width: 100%; box-sizing: border-box; }

.cartao-jogo-container { 
    background: white; width: 100%; max-width: 950px; 
    flex: 1; min-height: 0; 
    padding: 25px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(77, 171, 247, 0.66); 
    border-top: 8px solid var(--cor-mat); 
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; box-sizing: border-box;
}

footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--cor-4ano-dark); margin-top: auto; flex-shrink: 0;}
footer p { font-size: 0.8rem; color: var(--cor-4ano-dark); margin: 0; }

/* Ícones e Classes Utilitárias de SVG */
.icon-svg-menu { width: 20px; height: 20px; display: inline-block; vertical-align: middle; object-fit: contain; }
.icon-svg-voltar { width: 1.3em; height: 1.3em; vertical-align: middle; margin-right:0px; object-fit: contain; }
.icon-svg-footer { width: 2.3em; height: 2.3em; vertical-align: middle; margin-right:5px; margin-left: 7px; object-fit: contain; }
.icon-svg-titulo { width: 1em; height: 1em; vertical-align: middle; object-fit: contain; }
.svg-icon { width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 5px; fill: currentColor; }

/* ==========================================================================
   3. BARRA DE ESTADO DO JOGO (HUD) E PROGRESSO
   ========================================================================== */
.status-bar-jogo {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    width: 100%; background: #e0ecf3; padding: 8px 12px;
    border-radius: 20px; border: 2px solid var(--cor-mat); margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0;
    max-width: 900px;
}

.btn-voltar-menu { 
    background-color: white; color: var(--azul-escuro); border: 2px solid var(--cor-mat); 
    padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; 
    display: flex; align-items: center; gap: 5px; 
    transition: border-color 0.2s ease;
    touch-action: manipulation;
}

.btn-voltar-menu svg {
    transition: transform 0.2s ease;
}

@media (hover: hover) { 
    .btn-voltar-menu:hover { border-color: var(--azul-escuro); } 
    .btn-voltar-menu:hover svg { transform: scale(1.15); }
}

.btn-dica { 
    background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; 
    padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; 
    display: flex; align-items: center; gap: 5px; 
    transition: border-color 0.2s ease;
    touch-action: manipulation;
}

.btn-dica svg {
    transition: transform 0.2s ease;
}

@media (hover: hover) { 
    .btn-dica:hover:not(.esgotada) { border-color: #b18500; } 
    .btn-dica:hover:not(.esgotada) svg { transform: scale(1.15); }
}

.btn-dica.esgotada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }

.btn-dica.dica-impaciente:not(.esgotada) {
    animation: chamarAtencaoDica 1.5s infinite ease-in-out;
    border-color: #f39c12;
    background-color: #fffde7;
}

.badge-ronda { 
    background: white; 
    font-weight: 800; 
    font-size: 0.9rem; 
    padding: 6px 12px; 
    border-radius: 15px; 
    white-space: nowrap; 
    border: 2px solid #219d53; 
    color: #219d53; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px; 
}

.badge-ronda svg {
    margin: 0 !important; 
    width: 1.1em !important; 
    height: 1.1em !important;
    display: block;
}

.badge-erros { 
    background: white; 
    border: 2px solid var(--cor-pt); 
    color: var(--cor-mat); 
    font-weight: 800; 
    font-size: 0.9rem; 
    line-height: 1; 
    padding: 6px 12px; 
    border-radius: 15px; 
    white-space: nowrap; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 6px; 
}

.badge-erros svg {
    margin: 0 !important; 
    width: 0.85em !important;
    height: 0.85em !important;
    display: block;
}

.progress-bg { 
    background-color: #e2e8f0; 
    border-radius: 20px; 
    height: 35px; 
    flex: 1 1 0%; 
    min-width: 50px; 
    margin: 0; 
    overflow: hidden; 
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); 
    border: 2px solid white; 
}

.progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-color: var(--cor-4ano-dark); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }

/* ==========================================================================
   4. MENU INICIAL E SELEÇÃO DE NÍVEIS
   ========================================================================== */
.ecra { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; box-sizing: border-box; position: relative; z-index: 2;}
#ecra-selecao { display: flex; }
#ecra-jogo { justify-content: flex-start; }
.titulo-menu { font-size: clamp(1.1rem, 4vw, 1.5rem); color: var(--azul-escuro); margin-bottom: 30px; margin-top: 40px; font-weight: 900;}

.grid-niveis {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    width: 100%;
    max-width: 750px;
    margin: 0 auto 20px;
}

.btn-nivel-novo {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    text-align: left;
    padding: 15px 20px;
    gap: 15px;
    width: 100%;
    border-radius: 20px;
    border: 4px solid white;
    color: white;
    font-size: 1.2rem;
    font-weight: 900;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    box-shadow: 0 6px 0 #e2e8f0, 0 10px 15px rgba(0, 0, 0, 0.08);
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
}

@media (hover: hover) {
    .btn-nivel-novo:hover {
        transform: translateY(-2px); box-shadow: 0 8px 0 #cbd5e1, 0 12px 20px rgba(0,0,0,0.12); filter: brightness(1.05);
    }
}

.btn-nivel-novo:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent, 0 0px 0 transparent !important; }

.icon-btn-nivel-novo, .icon-btn-nivel {
    width: 65px;
    height: 65px;
    flex-shrink: 0;
    object-fit: contain;
    filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
    pointer-events: none;
}

.btn-nivel-text-container {
    display: flex;
    flex-direction: column;
    gap: 3px;
    pointer-events: none;
}

.btn-nivel-titulo {
    font-size: 1rem;
    font-weight: 800;
    color: white;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    line-height: 1.2;
}

.btn-nivel-subtitulo {
    font-size: 0.85rem;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.2);
    line-height: 1.2;
}

/* CLASSES DE COR DOS BOTÕES */
.bg-azul { background-color: var(--cor-btn-azul); }
.bg-verde { background-color: var(--cor-btn-verde); }
.bg-amarelo { background-color: var(--cor-btn-amarelo); }
.bg-vermelho { background-color: var(--cor-btn-vermelho); }
.bg-roxo { background-color: var(--cor-btn-roxo); }
.bg-laranja { background-color: var(--cor-btn-laranja); }
.bg-rosa { background-color: var(--cor-btn-rosa); }
.bg-turquesa { background-color: var(--cor-btn-turquesa); }

/* ==========================================================================
   5. IMAGENS MODULARES E CARD ZOOMABLE
   ========================================================================== */
.card-imagem-zoomable {
    position: relative;
    display: inline-block;
    background-color: #ffffff;
    border: 3px solid #e2e8f0;
    border-radius: 20px;
    padding: 8px;
    box-sizing: border-box;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.04);
    animation: flutuarCartao 3.5s infinite ease-in-out;
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.card-imagem-zoomable:hover {
    animation-play-state: paused;
    transform: scale(1.04) translateY(-3px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
}

.imagem-evento-tempo {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
}

.card-imagem-zoomable.img-quadrada { width: 160px; height: 160px; }
.card-imagem-zoomable.img-retangular { width: 210px; height: 140px; }

@media (min-width: 769px) {
    .card-imagem-zoomable.img-quadrada { width: 240px !important; height: 240px !important; }
    .card-imagem-zoomable.img-retangular { width: 330px !important; height: 220px !important; }
}
/* ==========================================================================
   6. MECÂNICA DE JOGO: BOTÕES VIBRANTES E FEEDBACKS
   ========================================================================== */
.area-jogo-custom {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; flex: 1; min-height: 0; background: #f8fafc; border: 2px dashed var(--cor-mat); border-radius: 20px; padding: 15px; gap: 15px;
    position: relative; color: #94a3b8; font-weight: bold; overflow: hidden;
}

.pergunta-texto { font-size: clamp(1.2rem, 4vw, 1.5rem); color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 0 0 20px 0; animation: fadeIn 0.4s ease;}

.opcoes-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; }

/* Botão Opção Vibrante (Usado em Múltipla Escolha e Ligar) */
.btn-opcao-vibrante {
    border: 3px solid white;
    border-radius: 15px;
    padding: 15px !important;
    min-width: 180px;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: 700;
    color: white;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.1s, filter 0.1s;
    touch-action: manipulation;
    text-align: center;
	flex-direction: column !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 10px !important;
}

/* Cores dos Botões Vibrantes dentro do Jogo */
.btn-opcao-vibrante.bg-azul { background-color: var(--cor-btn-azul); box-shadow: 0 4px 0 #4a8deb; }
.btn-opcao-vibrante.bg-verde { background-color: var(--cor-btn-verde); box-shadow: 0 4px 0 #45b062; }
.btn-opcao-vibrante.bg-laranja { background-color: var(--cor-btn-laranja); box-shadow: 0 4px 0 #d97d2c; }
.btn-opcao-vibrante.bg-roxo { background-color: var(--cor-btn-roxo); box-shadow: 0 4px 0 #8e44ad; }
.btn-opcao-vibrante.bg-amarelo { background-color: var(--cor-btn-amarelo); box-shadow: 0 4px 0 #FBC531; }
.btn-opcao-vibrante.bg-turquesa { background-color: var(--cor-btn-turquesa); box-shadow: 0 4px 0 #139ea3; }
.btn-opcao-vibrante.bg-rosa { background-color: var(--cor-btn-rosa); box-shadow: 0 4px 0 #e04d8c; }
.btn-opcao-vibrante.bg-vermelho { background-color: var(--cor-btn-vermelho); box-shadow: 0 4px 0 #d64f4f; }

.btn-opcao-vibrante:active { transform: scale(0.95); filter: brightness(0.9); }
@media (hover: hover) { .btn-opcao-vibrante:hover { transform: translateY(-2px); filter: brightness(1.05); } }

/* Estados de Sucesso e Erro Vibrante */
.btn-opcao-vibrante.sucesso-vibrante, .btn-opcao.sucesso-vibrante { 
    background-color: var(--cor-sucesso) !important; 
    color: white !important; 
    border-color: var(--cor-sucesso-dark) !important; 
    box-shadow: 0 6px 0 var(--cor-sucesso-dark) !important; 
    transform: translateY(3px) !important; 
}

.btn-opcao-vibrante.erro-vibrante, .btn-opcao.erro-vibrante { 
    animation: shakeError 0.4s ease; 
    border-color: var(--cor-erro) !important; 
    background-color: #ffefef !important; 
    color: var(--cor-erro) !important; 
    box-shadow: 0 6px 0 var(--cor-erro) !important;
}

.icon-certo { width: 1.1em; height: 1.1em; object-fit: contain; vertical-align: middle; }
.icon-errado { width: 1em; height: 1em; object-fit: contain; vertical-align: middle; }
.imagem-opcao-vibrante { display: block; max-width: 180px; max-height: 140px; object-fit: contain; border-radius: 8px; pointer-events: none; }
.btn-opcao-vibrante:has(img) {
    min-width: 180px;
    min-height: 150px;
}

/* ==========================================================================
   7. MECÂNICA DE ARRASTAR, LIGAR E LACUNAS
   ========================================================================== */
.coluna-ligar-container { display: flex; gap: 40px; justify-content: center; width: 100%; box-sizing: border-box; }
.coluna-ligar { display: flex; flex-direction: column; gap: 18px !important; }

.btn-opcao-vibrante.ligado {
    opacity: 0.55;
    border-color: #cbd5e1 !important;
    background-color: #f1f5f9 !important;
    color: #64748b !important;
    box-shadow: 0 2px 0 #cbd5e1 !important;
    transform: translateY(2px) !important;
}

/* Blocos de Arrastar */
.bloco-arrastar {
    display: flex !important; align-items: center !important; justify-content: center !important;
    width: 100%; min-width: 150px; padding: 12px 20px !important; border-radius: 15px !important;
    font-size: clamp(1rem, 3vw, 1.1rem) !important; font-weight: 700 !important;
    background-color: #ffffff !important; border: 3px solid var(--azul-vibrante) !important;
    color: var(--azul-escuro) !important; box-shadow: 0 4px 0 var(--azul-vibrante) !important;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; touch-action: manipulation;
}
.bloco-arrastar:active { transform: scale(0.95) !important; box-shadow: 0 0px 0 transparent !important; }
.bloco-arrastar:not(.selecionado):not([disabled]) { animation: respirarBloco 2s infinite ease-in-out; }

.alvo-arrastar.pronto-receber {
    border-color: var(--cor-btn-amarelo) !important;
    background-color: #fffde7;
    animation: pulseAlvo 0.8s infinite alternate;
}

/* Lacunas (Gaps) */
.texto-paragrafo-lacunas {
    font-size: 1.25rem !important; line-height: 2.6 !important; color: var(--text-main) !important;
    text-align: justify !important; margin-bottom: 25px !important; background: #ffffff !important;
    padding: 20px 25px !important; border-radius: 20px !important; border: 2px solid #e2e8f0 !important;
    width: 100% !important; max-width: 750px !important; box-sizing: border-box !important;
}
.slot-vazio {
    display: inline-flex; align-items: center; justify-content: center; min-width: 110px; height: 34px; margin: 0 6px;
    padding: 0 12px; border: 2px dashed var(--azul-vibrante); border-radius: 10px; background-color: #f8fafc;
    vertical-align: middle; cursor: pointer; transition: all 0.2s ease; font-weight: 900; color: var(--azul-escuro);
}
.slot-vazio.pronto-receber { border-color: var(--cor-btn-amarelo) !important; background-color: #fffde7 !important; animation: pulseAlvo 0.8s infinite alternate !important; }
.slot-vazio.preenchido { border-style: solid !important; border-color: var(--cor-mat) !important; background-color: #ffffff !important; }

.banco-opcoes { display: flex !important; gap: 12px !important; justify-content: center !important; flex-wrap: wrap !important; width: 100% !important; max-width: 650px !important; margin-bottom: 15px !important; }
.palavra-banco {
    padding: 8px 18px !important; background: #ffffff !important; border: 2px solid var(--azul-vibrante) !important;
    border-radius: 14px !important; font-weight: 800 !important; font-size: 1.1rem !important; color: var(--azul-escuro) !important;
    cursor: pointer !important; transition: all 0.15s ease !important; box-shadow: 0 4px 0 var(--azul-vibrante) !important;
}
.palavra-banco.selecionado { border-color: var(--cor-btn-amarelo) !important; box-shadow: 0 4px 0 var(--cor-btn-amarelo) !important; outline: none !important; }

/* Mapas e Esquemas */
.mapa-relevo-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04); flex-shrink: 0; }
.mapa-relevo-wrapper.mapa-quadrado { max-width: 450px !important; aspect-ratio: 1 / 1; }
.mapa-relevo-wrapper.mapa-retangular { max-width: 540px; aspect-ratio: 800 / 510; }
.mapa-relevo-imagem { width: 100%; height: 100%; object-fit: contain; display: block; }

.slot-mapa {
    position: absolute; background-color: rgba(255, 255, 255, 0.45); border: 2px dashed #0091ff;
    border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.2s ease; box-sizing: border-box; z-index: 10;
}
.slot-mapa.pronto-receber { border-color: var(--cor-btn-amarelo) !important; background-color: rgba(251, 197, 49, 0.18) !important; animation: pulseAlvo 0.8s infinite alternate; }
.slot-mapa.preenchido { border: 2px solid var(--cor-mat) !important; background-color: #ffffff !important; box-shadow: 0 3px 6px rgba(0, 0, 0, 0.08) !important; }
.slot-mapa.preenchido strong { color: var(--azul-escuro) !important; font-size: 0.95rem; font-weight: 900; }

/* ==========================================================================
   8. MASCOTE: SISTEMA DE EXPRESSÕES E MOVIMENTOS
   ========================================================================== */
#robo-feedback {
    position: absolute; bottom: 15px; right: 15px; width: 100px; height: 100px;
    z-index: 100; pointer-events: none; transition: all 0.5s ease; 
    display: flex; align-items: center; justify-content: center;
}

#robo-feedback img { width: 100%; height: 100%; object-fit: contain; }

/* Estado em Repouso: Movimento lateral leve e mecânico */
.mascote-normal { animation: balancoRobo 3s infinite ease-in-out; }

/* Estado de Erro: Abana (Shake) */
.mascote-erro { animation: shakeError 0.4s ease-in-out; }

/* Estado de Sucesso: Salto de alegria */
.mascote-sucesso { animation: saltoAlegria 0.8s ease-out; }

/* ANIMAÇÃO DO SALTO */
@keyframes saltoAlegria {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-45px) scale(1.1, 0.9); } /* Sobe e achata um pouco */
    50% { transform: translateY(-55px) scale(0.9, 1.1); } /* Pico do salto e estica */
}

/* Responsividade Mobile */
@media (max-width: 600px) {
    #robo-feedback { width: 60px; height: 60px; right: 5px; bottom: 5px; }
}

/* Desativa as transições durante as animações para evitar conflitos no transform */
.mascote-sucesso, .mascote-erro {
    transition: none !important;
}


/* Modais e Toasts */
.modal-ajuda-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; padding: 20px; box-sizing: border-box;}
.modal-ajuda-overlay.active { display: flex; }
.modal-ajuda-box { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; border-top: 8px solid var(--cor-4ano);}
.btn-fechar-modal { position: absolute; top: 15px; right: 15px; background: #ffebeb; color: #ff4757; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s;}

.toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
.toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Destaques e Recompensas */
.highlight-correto {
    position: relative;
    outline: 4px solid var(--cor-btn-verde);
    outline-offset: 4px;
    animation: pulseHighlight 1.4s infinite;
    z-index: 2;
}
.highlight-correto::after {
    position: absolute; top: -16px; right: -16px; background: var(--cor-btn-verde); color: white;
    border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: bounceCheck 1s infinite alternate;
}

/* Realce de Títulos e Textos */
.destaque-fundo { background-color: #fff275; color: var(--azul-escuro); padding: 2px 6px; border-radius: 6px; font-weight: 900; }
.destaque-texto { color: var(--cor-btn-vermelho); font-weight: 900; }
.destaque-texto-verde { color: var(--cor-em); font-weight: 900; }
/* ==========================================================================
   9. ECRÃ DE FIM E ESTATÍSTICAS
   ========================================================================== */
.end-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--azul-escuro); margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 15px; }
.icon-end-title {
    width: 1.2em; 
    height: 1.2em;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}

.end-stats { 
    font-size: 1.3rem; color: var(--text-main); margin-bottom: 40px; 
    text-align: center; background: var(--bg-header); padding: 30px 20px; 
    border-radius: 20px; border: 2px dashed var(--cor-em); line-height: 1.5; 
}

.botoes-acao-container { display: flex; flex-direction: column; align-items: center; gap: 35px; width: 100%; }

.btn-acao { 
    border: 4px solid white; color: white; padding: 15px 30px; 
    font-size: 1.2rem; font-weight: 900; border-radius: 20px; cursor: pointer; 
    display: flex; align-items: center; justify-content: center; gap: 12px; 
    width: 100%; max-width: 350px; transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease; 
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2); touch-action: manipulation; 
    text-transform: uppercase; letter-spacing: 1px;
}
.btn-acao.primario { background-color: var(--cor-btn-verde); box-shadow: 0 6px 0 #45b062, 0 10px 15px rgba(0,0,0,0.1); }
@media (hover: hover) { .btn-acao.primario:hover { box-shadow: 0 8px 0 #45b062, 0 12px 20px rgba(0,0,0,0.15); } }
.btn-acao.secundario { background-color: var(--cor-btn-laranja); box-shadow: 0 6px 0 #d97d2c, 0 10px 15px rgba(0,0,0,0.1); }
.btn-acao.secundario { background-color: var(--cor-btn-laranja); box-shadow: 0 6px 0 #d97d2c, 0 10px 15px rgba(0,0,0,0.1); }
.btn-acao.terciario { background-color: var(--cor-btn-azul); box-shadow: 0 6px 0 #4a8deb, 0 10px 15px rgba(0,0,0,0.1); }
@media (hover: hover) { .btn-acao.terciario:hover { box-shadow: 0 8px 0 #4a8deb, 0 12px 20px rgba(0,0,0,0.15); } }
.btn-acao:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent !important; }

.icon-acao { width: 1.4em; height: 1.4em; object-fit: contain; flex-shrink: 0; pointer-events: none; transition: transform 0.2s ease; }
.primario:hover .icon-acao, .secundario:hover .icon-acao, .terciario:hover .icon-acao { transform: translateX(4px); }

/* Vitória e Confetis */
.taca-vitoria {
    width: clamp(80px, 15vw, 130px); 
    margin-bottom: 15px; 
    object-fit: contain;
    display: block;
    margin-left: auto;
    margin-right: auto;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, tacaDanca 3s infinite 0.6s ease-in-out;
}
.confetti-container { position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; border-radius:30px; z-index: 10; }
.confetti { position: absolute; width: 12px; height: 12px; border-radius: 2px; opacity: 0; animation: fall linear forwards; pointer-events: none; z-index: 15; }


/* ==========================================================================
   10. KEYFRAMES (TODAS AS ANIMAÇÕES DO TEMPLATE)
   ========================================================================== */
@keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(1000px) rotate(720deg); opacity: 0; } }
@keyframes flutuar { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-10px) rotate(3deg); } }
@keyframes balancoRobo {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
}
@keyframes scanMove { 0%, 100% { top: 5%; } 50% { top: 90%; } }
@keyframes tacaDanca {
    0%, 100% { transform: translateY(0) scale(1) rotate(0deg); filter: drop-shadow(0 6px 12px rgba(251, 197, 49, 0.3)); }
    25% { transform: translateY(-10px) scale(1.06) rotate(-4deg); filter: drop-shadow(0 14px 24px rgba(251, 197, 49, 0.65)); }
    50% { transform: translateY(0) scale(1) rotate(0deg); filter: drop-shadow(0 6px 12px rgba(251, 197, 49, 0.3)); }
    75% { transform: translateY(-10px) scale(1.06) rotate(4deg); filter: drop-shadow(0 14px 24px rgba(251, 197, 49, 0.65)); }
}
@keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
@keyframes pulseAlvo { from { box-shadow: inset 0 0 0 transparent, 0 0 0 transparent; } to { box-shadow: inset 0 0 10px rgba(251, 197, 49, 0.2), 0 0 15px rgba(251, 197, 49, 0.4); } }
@keyframes pulseHighlight { 0% { box-shadow: 0 0 0 0 rgba(93, 210, 121, 0.6); } 70% { box-shadow: 0 0 0 12px rgba(93, 210, 121, 0); } 100% { box-shadow: 0 0 0 0 rgba(93, 210, 121, 0); } }
@keyframes bounceCheck { from { transform: scale(1); } to { transform: scale(1.2); } }
@keyframes flutuarCartao { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes chamarAtencaoDica { 0%, 100% { transform: scale(1) translateY(0); box-shadow: 0 0 0 transparent; } 50% { transform: scale(1.1) translateY(-3px); box-shadow: 0 5px 15px rgba(243, 156, 18, 0.5); } }


/* ==========================================================================
   11. SISTEMA DE ZOOM E OVERLAYS
   ========================================================================== */
.btn-zoom-imagem {
    position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px; background-color: rgba(0, 145, 255, 0.9);
    border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; transition: 0.2s; animation: pulsarLupa 2s infinite ease-in-out;
}
.btn-zoom-imagem svg {
		width: 14px;
		height: 14px;
		fill: none;
		stroke: white;
		stroke-width: 3;
		stroke-linecap: round;
		stroke-linejoin: round;
}

.btn-zoom-imagem:hover {
		background-color: var(--azul-escuro);
		transform: scale(1.1);
}
@keyframes pulsarLupa { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

.zoom-overlay-imagem {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(10, 20, 36, 0.95);
    z-index: 400; align-items: center; justify-content: center; animation: fadeIn 0.3s ease;
}
.zoom-overlay-imagem.active { display: flex; }
.zoom-imagem-conteudo {
    max-width: 90%; max-height: 80%; object-fit: contain; border: 5px solid white; border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); background-color: white; animation: popIn 0.3s;
}
.btn-fechar-zoom {
    position: absolute; top: 25px; right: 25px; background: #ff4757; color: white; border: none;
    width: 45px; height: 45px; border-radius: 50%; font-weight: bold; font-size: 1.5rem; cursor: pointer;
}

/* ==========================================================================
   12. TECLADO
   ========================================================================== */
.teclado-container {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 500px;
    margin: 10px auto;
    background: #f1f5f9;
    padding: 12px;
    border-radius: 25px;
    border: 2px solid #e2e8f0;
}

.btn-teclado {
    background: white;
    border: none;
    border-radius: 15px;
    padding: 8px 5px;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--text-main);
    box-shadow: 0 5px 0 #cbd5e1;
    cursor: pointer;
    transition: all 0.1s;
}

.btn-teclado:active { transform: translateY(4px); box-shadow: 0 1px 0 #cbd5e1; }
.btn-teclado.btn-apagar { background: #fff1f0; color: var(--cor-erro); box-shadow: 0 5px 0 #ffa39e; }
.btn-teclado.btn-confirmar { background: #f6ffed; color: var(--cor-sucesso); box-shadow: 0 5px 0 #73cb2f; }

/* Efeito de Hover no Teclado (Apenas PC) */
@media (hover: hover) {
    .btn-teclado:hover {
        background-color: #f8fafc;
        transform: translateY(-3px); /* O botão sobe */
        box-shadow: 0 7px 0 #cbd5e1; /* A sombra aumenta para dar profundidade */
        color: var(--azul-vibrante);
    }
    
    .btn-teclado.btn-apagar:hover {
        background-color: #fff1f0;
        box-shadow: 0 7px 0 #ffa39e;
    }
    
    .btn-teclado.btn-confirmar:hover {
        background-color: #f6ffed;
        box-shadow: 0 7px 0 #73cb2f;
    }
}

/* Ajuste no clique para parecer que afunda mesmo */
.btn-teclado:active {
    transform: translateY(2px) !important;
    box-shadow: 0 2px 0 #cbd5e1 !important;
}


/* ==========================================================================
   ESTILOS DE FOCO E INTERAÇÃO
   ========================================================================== */
/* Foco da Caixa Amarela */
.caixa-focada {
    border: 3px dashed var(--cor-btn-amarelo) !important;
    background-color: #fffde7 !important;
    color: var(--cor-btn-azul) !important;
    z-index: 10;
    animation: animarCaixaAmarela 1.2s infinite ease-in-out !important;
}

@keyframes animarCaixaAmarela {
    0%, 100% { 
        transform: scale(1); 
        box-shadow: 0 0 5px rgba(251, 197, 49, 0.4); 
    }
    50% { 
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(251, 197, 49, 0.8); 
    }
}

/* Foco do Botão Verde */
.btn-confirmar.caixa-focada {
    border: 3px solid #2ed573 !important; /* Adiciona uma borda verde bem definida */
    background-color: #e3f9eb !important;   /* Fundo ligeiramente mais verde e limpo */
    color: var(--cor-sucesso-dark) !important;
    animation: animarBotaoVerdeIntenso 1.1s infinite ease-in-out !important;
    z-index: 15;
}

@keyframes animarBotaoVerdeIntenso {
    0%, 100% { 
        transform: scale(1.0); /* Mantém o tamanho real do botão */
        filter: brightness(1); 
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05), 0 0 5px rgba(46, 213, 115, 0.3); 
    }
    50% { 
        transform: scale(1.04); /* Crescimento quase impercetível para não empurrar o contentor */
        filter: brightness(1.2); 
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08), 0 0 35px rgba(46, 213, 115, 0.95); /* Glow verde néon muito maior que compensa a escala */
    }
}


/* ==========================================================================
   13. ZONA DA ANIMAÇÃO
   ========================================================================== */
.animacao-tutorial {
    width: 100%; max-width: 400px; height: 180px;
	position: relative;
    background: #f4faff; border: 3px dashed var(--cor-mat); border-radius: 20px;
    margin: 0 auto 25px; display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 15px rgba(0,145,255,0.05); color: var(--azul-vibrante); font-size: 1.2rem; font-weight: 900;
    overflow: hidden;
}

/* ==========================================================================
   13. ANIMAÇÃO TUTORIAL DO QUADRO POSICIONAL (C-D-U CASCADE)
   ========================================================================= */

/* Contentor do Quadro de Animação */
.anim-quadro-milhares {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
}

/* Grelha Posicional em miniatura */
.anim-cdu-grelha {
    display: grid;
    /* 3 colunas para milhares, separador central de 8px e 3 colunas para unidades */
    grid-template-columns: repeat(3, 36px) 10px repeat(3, 36px);
    gap: 4px 2px;
    align-items: center;
    justify-content: center;
    animation: pulsarQuadroGeral 4.5s infinite ease-in-out;
    padding: 10px;
    border-radius: 12px;
}

/* Colunas Posicionais individuais */
.anim-col-ordem {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

/* Etiquetas (CM, DM, UM, C, D, U) */
.anim-etiqueta {
    font-size: 0.72rem;
    font-weight: 900;
}
.classe-milhares .anim-etiqueta { color: var(--cor-4ano-dark); }
.classe-unidades .anim-etiqueta { color: var(--azul-escuro); }

/* Caixa que recebe o algarismo */
.anim-caixa-vazia {
    width: 34px;
    height: 40px;
    border: 2px solid var(--borda-cartao);
    border-radius: 6px;
    background-color: white;
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--azul-escuro);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 5px rgba(0,0,0,0.02);
    overflow: hidden;
}

/* O Separador central de classes */
.anim-separador-cdu {
    grid-column: 4;
    width: 100%;
    height: 100%;
}

/* Algarismos Internos Animados em Cascata */
.num-queda {
    display: inline-block;
    animation: cairNoQuadro 4.5s infinite cubic-bezier(0.175, 0.885, 0.32, 1.2) backwards;
}

/* Sincronização dos Atrasos de Queda (Efeito Cascata da Esquerda para a Direita) */
.num-cm { animation-delay: 0.3s; }
.num-dm { animation-delay: 0.6s; }
.num-um { animation-delay: 0.9s; }
.num-c  { animation-delay: 1.2s; }
.num-d  { animation-delay: 1.5s; }
.num-u  { animation-delay: 1.8s; }


/* ==========================================================================
   KEYFRAMES SINCROIZADOS DA ANIMAÇÃO (LOOP DE 4.5 SEGUNDOS)
   ========================================================================= */

/* Animação de Queda Individual com Salto */
@keyframes cairNoQuadro {
    0% {
        transform: translateY(-50px) scale(0.4);
        opacity: 0;
    }
    8%, 15% {
        transform: translateY(0) scale(1.2); /* Salto de impacto */
        opacity: 1;
    }
    20%, 82% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    90%, 100% {
        transform: translateY(25px) scale(0.5); /* Desvanece por baixo no fim */
        opacity: 0;
    }
}


/* O quadro completo brilha e salta ao concluir as duas classes */
@keyframes pulsarQuadroGeral {
    0%, 46% {
        transform: scale(1);
        background-color: transparent;
        box-shadow: none;
    }
    /* O pico do pulso de sucesso (Entre os 54% e os 82% do tempo) */
    54% {
        transform: scale(1.1); /* Salto de escala muito mais nítido */
        background-color: #fffde7; /* Fundo amarelo muito suave */
        /* Sombra dupla: um glow azul forte e uma aura dourada de sucesso gigante */
        box-shadow: 0 8px 20px rgba(13, 71, 161, 0.15), 
                    0 0 30px rgba(251, 197, 49, 0.8), 
                    0 0 50px rgba(251, 197, 49, 0.4);
    }
    82% {
        transform: scale(1.08); /* Suaviza ligeiramente antes de descer */
        background-color: #fffde7;
        box-shadow: 0 6px 15px rgba(13, 71, 161, 0.12), 
                    0 0 20px rgba(251, 197, 49, 0.6);
    }
    92%, 100% {
        transform: scale(1);
        background-color: transparent;
        box-shadow: none;
    }
}


/* ==========================================================================
   KEYFRAMES SINCROIZADOS DA ANIMAÇÃO (LOOP DE 4 SEGUNDOS)
   ========================================================================= */

/* O Dividendo brilha e pulsa no início */
@keyframes pulsarDividendo {
    0%, 15% { transform: scale(1.12); color: var(--azul-escuro); text-shadow: 0 0 8px rgba(0,145,255,0.4); }
    25%, 100% { transform: scale(1); color: var(--azul-vibrante); }
}

/* O Laser viaja guiando o raciocínio matemático */
@keyframes vooDoLaser {
    0%   { top: 22px; left: 34px; opacity: 1; }      /* Começa focado no 35 */
    20%  { top: 22px; left: 34px; }                  /* Fica no 35 */
    35%  { top: 22px; left: 101px; }                 /* Voa para o divisor 5 */
    48%  { top: 67px; left: 101px; }                 /* Desce para revelar o quociente 7 */
    63%  { top: 67px; left: 34px; }                  /* Voa para a dezenas da subtração -35 */
    78%  { top: 117px; left: 34px; }                 /* Desce para revelar o resto 0 */
    90%, 100% { top: 117px; left: 34px; opacity: 0; }/* Desvanece no fim da conta */
}

/* Revelação do Quociente 7 */
@keyframes mostrarQuociente {
    0%, 40% { transform: scale(0); opacity: 0; }
    48% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px rgba(251, 197, 49, 0.6); }
    55%, 100% { transform: scale(1); opacity: 1; }
}

/* Revelação da Subtração -35 */
@keyframes mostrarSubtracao {
    0%, 55% { transform: translateY(-10px); opacity: 0; }
    64% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
}

/* Revelação do traço de subtração */
@keyframes mostrarTraco {
    0%, 63% { transform: scaleX(0); opacity: 0; }
    70%, 100% { transform: scaleX(1); opacity: 1; }
}

/* Revelação triunfal do Resto 0 */
@keyframes mostrarResto {
    0%, 72% { transform: scale(0); opacity: 0; }
    80% { transform: scale(1.25); opacity: 1; box-shadow: 0 0 18px rgba(46, 213, 115, 0.7); }
    88%, 100% { transform: scale(1); opacity: 1; }
}


/* ==========================================================================
   14. CSS ESPECÍFICO DO JOGO (O MESTRE DOS MILHARES)
   ========================================================================= */

/* Contentor Geral da Área de Jogo */
.quadro-ordens-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 550px;
    margin: 0 auto;
    gap: 15px;
    padding: 10px;
}

/* Cartão Superior com a Escrita por Extenso */
.card-extenso {
    width: 100%;
	max-width: 750px;
	margin: 0 auto; 
    min-height: 70px;
    background-color: #f4faff;
    border: 3px dashed var(--cor-mat);
    border-radius: 20px;
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--azul-escuro);
    line-height: 1.5;
    text-align: center;
    box-shadow: inset 0 0 10px rgba(77, 171, 247, 0.08);
}

/* Grelha Posicional C-D-U (6 Ordens Divididas em 2 Classes) */
.grelha-cdu-ordens {
    display: grid;
    /* 3 colunas para milhares, um espaço de separação de 12px, e 3 colunas para unidades simples */
    grid-template-columns: repeat(3, 44px) 12px repeat(3, 44px);
    gap: 6px 4px;
    align-items: center;
    justify-content: center;
    margin: 10px auto;
}

/* Coluna de Separação de Classes (Apenas o espaço vazio no meio) */
.separador-classes-cdu {
    grid-column: 4;
    width: 100%;
    height: 100%;
}

/* Cada Bloco de Ordem (Etiqueta + Caixa) */
.grupo-ordem-posicional {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}

/* Etiquetas das Ordens (CM, DM, UM, C, D, U) */
.etiqueta-ordem {
    font-size: 0.95rem;
    font-weight: 900;
    text-transform: uppercase;
}

/* Cores pedagógicas para as Ordens */
.classe-milhares .etiqueta-ordem {
    color: var(--cor-4ano-dark); /* Roxo para milhares */
}
.classe-unidades .etiqueta-ordem {
    color: var(--azul-escuro); /* Azul para unidades simples */
}

/* Caixas de Dígitos Individuais */
.caixa-digito-ordem {
    width: 44px;
    height: 52px;
    border: 2.5px solid var(--borda-cartao);
    border-radius: 10px;
    background-color: white;
    font-size: 1.5rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 6px rgba(0,0,0,0.03);
    transition: all 0.2s ease;
    cursor: default;
}

/* Bordas personalizadas conforme a classe do número */
.classe-milhares .caixa-digito-ordem {
    border-color: #cbd5e1; /* Borda neutra para milhares */
}
.classe-unidades .caixa-digito-ordem {
    border-color: #cbd5e1; /* Borda neutra para unidades */
}

/* Estado de Sucesso Estático das Caixas */
.caixa-digito-ordem.preenchida-correta {
    border-color: var(--cor-sucesso-dark) !important;
    color: var(--cor-sucesso) !important;
    background-color: #f6ffed !important;
    box-shadow: none !important;
}

/* --- JOGO B: Contentor de Opções de Múltipla Escolha --- */
.opcoes-leitura-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    margin-top: 5px;
}

/* Botões de Leitura por Extenso Vibrantes */
.btn-opcao-leitura {
    border: 3px solid white;
    border-radius: 15px;
    padding: 12px 18px !important;
    font-size: 1.05rem;
    font-weight: 700;
    color: white;
    cursor: pointer;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    transition: transform 0.1s, filter 0.1s;
    touch-action: manipulation;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.4;
    min-height: 55px;
}

/* Cores vibrantes dos botões de resposta */
.btn-opcao-leitura.bg-azul { background-color: var(--cor-btn-azul); box-shadow: 0 4px 0 #4a8deb; }
.btn-opcao-leitura.bg-turquesa { background-color: var(--cor-btn-turquesa); box-shadow: 0 4px 0 #139ea3; }
.btn-opcao-leitura.bg-laranja { background-color: var(--cor-btn-laranja); box-shadow: 0 4px 0 #d97d2c; }

.btn-opcao-leitura:active { transform: scale(0.97); filter: brightness(0.9); }
@media (hover: hover) { .btn-opcao-leitura:hover { transform: translateY(-2px); filter: brightness(1.05); } }

/* Estados de feedback visual imediato nos botões de leitura */
.btn-opcao-leitura.sucesso-vibrante {
    background-color: var(--cor-sucesso) !important;
    border-color: var(--cor-sucesso-dark) !important;
    box-shadow: 0 6px 0 var(--cor-sucesso-dark) !important;
    transform: translateY(3px) !important;
}

.btn-opcao-leitura.erro-vibrante {

// Conversor Pedagógico de Números para Classes por Extenso em Português de Portugal
function numeroParaClassesExtenso(n) {
    const milhares = Math.floor(n / 1000);
    const unidades = n % 1000;

    const milharesTexto = converterTresDigitos(milhares, false) + " milhares";
    let unidadesTexto = "";
    if (unidades > 0) {
        unidadesTexto = converterTresDigitos(unidades, true) + " unidades";
    }

    return unidadesTexto ? `${milharesTexto}, ${unidadesTexto}` : milharesTexto;
}

function converterTresDigitos(n, isFeminino) {
    if (n === 0) return "";
    if (n === 100) return "cem";

    const centenas = [
        "", "cento", 
        isFeminino ? "duzentas" : "duzentos", 
        isFeminino ? "trezentas" : "trezentos", 
        isFeminino ? "quatrocentas" : "quatrocentos", 
        isFeminino ? "quinhentas" : "quinhentos", 
        isFeminino ? "seiscentas" : "seiscentos", 
        isFeminino ? "setecentas" : "setecentos", 
        isFeminino ? "oitocentas" : "oitocentos", 
        isFeminino ? "novecentas" : "novecentos"
    ];

    const dezenas = ["", "dez", "vinte", "trinta", "quarenta", "cinquenta", "sessenta", "setenta", "oitenta", "noventa"];
    const unidades = ["", "um", "dois", "três", "quatro", "cinco", "seis", "sete", "oito", "nove"];
    const dezaonove = ["dez", "onze", "doze", "treze", "catorze", "quinze", "dezasseis", "dezassete", "dezoito", "dezanove"];

    const c = Math.floor(n / 100);
    const d = Math.floor((n % 100) / 10);
    const u = n % 10;

    let partes = [];

    if (c > 0) partes.push(centenas[c]);

    if (d === 1) {
        partes.push(dezaonove[u]);
    } else {
        if (d > 0) partes.push(dezenas[d]);
        if (u > 0) {
            if (isFeminino && u === 1) partes.push("uma");
            else if (isFeminino && u === 2) partes.push("duas");
            else partes.push(unidades[u]);
        }
    }

    return partes.filter(p => p !== "").join(" e ");
}

// Gerador Matemático Inteligente de Acordo com o Nível
function gerarContaPosicionalDinamica(tipoJogo) {
    let numero = 0;
    
    if (tipoJogo === 'desafio-zeros') {
        // Gera números com rasteiras de zeros intermédios (CM obrigatoriamente ativo)
        const p1 = Math.floor(Math.random() * 9) + 1;
        const p2 = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 9) + 1;
        const p3 = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 9) + 1;
        const p4 = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 9) + 1;
        const p5 = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 9) + 1;
        const p6 = Math.random() < 0.5 ? 0 : Math.floor(Math.random() * 9) + 1;
        
        // Garante a presença de pelo menos um zero para criar o desafio
        const digitos = [p1, p2, p3, p4, p5, p6];
        if (!digitos.slice(1).includes(0)) {
            digitos[Math.floor(Math.random() * 5) + 1] = 0;
        }
        numero = parseInt(digitos.join(''));
    } 
    else if (tipoJogo === 'escrever-classes') {
        // Nível base: Evita zeros para habituar o aluno à estrutura inicial
        numero = Math.floor(Math.random() * 899999) + 100000;
        let s = numero.toString();
        while (s.includes('0')) {
            numero = Math.floor(Math.random() * 899999) + 100000;
            s = numero.toString();
        }
    } 
    else {
        // Níveis gerais de leitura e decomposição
        numero = Math.floor(Math.random() * 899999) + 100000;
    }

    const sStr = numero.toString();
    const cm = parseInt(sStr[0]), dm = parseInt(sStr[1]), um = parseInt(sStr[2]);
    const c = parseInt(sStr[3]), d = parseInt(sStr[4]), u = parseInt(sStr[5]);

    const extenso = numeroParaClassesExtenso(numero);

    // Decomposição por ordens (omite ordens com zero)
    const ordensLabels = ["CM", "DM", "UM", "C", "D", "U"];
    const ordensValores = [cm, dm, um, c, d, u];
    let decompPartes = [];
    for (let i = 0; i < 6; i++) {
        if (ordensValores[i] > 0) {
            decompPartes.push(`${ordensValores[i]} ${ordensLabels[i]}`);
        }
    }
    const decomposicao = decompPartes.join(" + ");

    return {
        numero, cm, dm, um, c, d, u, extenso, decomposicao, tipo: tipoJogo,
        dica: `Lembra-te da ordem das colunas no quadro:<br><strong>Milhares:</strong> CM | DM | UM<br><strong>Unidades:</strong> C | D | U<br>O número de 6 algarismos é preenchido da esquerda para a direita.`
    };
}

function definirFocoPasso() {
    document.querySelectorAll('.caixa-focada').forEach(el => el.classList.remove('caixa-focada'));

    if (passoAtual >= caixasSequencia.length) return;
    const passo = caixasSequencia[passoAtual];

    if (passo.tipo === 'digito') {
        const el = passo.elemento;
        el.classList.add('caixa-focada');
    } 
    else if (passo.tipo === 'confirmar') {
        const btnConf = document.getElementById('btn-confirmar-virtual');
        if (btnConf) btnConf.classList.add('caixa-focada');
    }
}

// --- C. CONTROLO DO TECLADO VIRTUAL E FÍSICO ---
function interacaoTeclado(valor) {
    if (!podeInteragir || passoAtual >= caixasSequencia.length) return;
    const passo = caixasSequencia[passoAtual];

    if (passo.tipo === 'digito') {
        const el = passo.elemento;

        if (valor === 'apagar') {
            tocarSom('flip');
            el.textContent = '';
            el.setAttribute('data-atual', '');
            if (passoAtual > 0 && caixasSequencia[passoAtual - 1].tipo === 'digito') {
                el.classList.remove('caixa-focada');
                passoAtual--;
                definirFocoPasso();
            }
        } 
        else if (valor === 'confirmar') {
            if (el.getAttribute('data-atual') === '') {
                showToast("Preenche primeiro as caixas!");
            }
        } 
        else {
            tocarSom('flip');
            el.textContent = valor;
            el.setAttribute('data-atual', valor);
            el.classList.remove('caixa-focada');
            
            passoAtual++;

            // Validação automática ao preencher a última caixa (Apenas para o Jogo 3 / Desafio do Zero)
            if (passoAtual >= caixasSequencia.length && contaAtiva.tipo === 'desafio-zeros') {
                validarGrupoImediato();
            } else {
                definirFocoPasso();
            }
        }
    } 
    else if (passo.tipo === 'confirmar') {
        if (valor === 'confirmar') {
            validarPassoGrelha(passo.grupo);
        } 
        else if (valor === 'apagar') {
            tocarSom('flip');
            const btnConf = document.getElementById('btn-confirmar-virtual');
            if (btnConf) btnConf.classList.remove('caixa-focada');

            passoAtual--; 
            const ultimoEl = caixasSequencia[passoAtual].elemento;
            ultimoEl.textContent = '';
            ultimoEl.setAttribute('data-atual', '');
            definirFocoPasso();
        }
    }
}

// Validação por confirmação (Jogos 1 e 4)
function validarPassoGrelha(grupo) {
    podeInteragir = false;
    let grupoCorreto = true;

    grupo.forEach(el => {
        const inserido = el.getAttribute('data-atual');
        const esperado = el.getAttribute('data-resposta');
        if (inserido !== esperado) grupoCorreto = false;
    });

    if (grupoCorreto) {
        tocarSom('acerto');
        animarRobo('acerto'); // Ativa o salto de alegria da mascote
        grupo.forEach(el => el.classList.add('preenchida-correta'));
        
        const btnConf = document.getElementById('btn-confirmar-virtual');
        if (btnConf) btnConf.classList.remove('caixa-focada');

        // Aumentado para 1300ms para dar tempo à mascote de saltar com toda a fluidez
        setTimeout(() => {
            podeInteragir = true;
            passoAtual++;
            transitarRonda();
        }, 1300);

    } else {
        tocarSom('erro');
        erradas++;
        atualizarBarraEstado();
        animarRobo('erro');

        grupo.forEach(el => el.classList.add('erro-vibrante'));
        
        setTimeout(() => {
            podeInteragir = true;
            grupo.forEach(el => {
                el.classList.remove('erro-vibrante');
                el.textContent = '';
                el.setAttribute('data-atual', '');
            });
            
            passoAtual = 0;
            definirFocoPasso();
        }, 600);
    }
}

// Validação instantânea sem confirmação (Jogo 3)
function validarGrupoImediato() {
    podeInteragir = false;
    let grupoCorreto = true;
    const inputs = caixasSequencia.map(p => p.elemento);

    inputs.forEach(el => {
        const inserido = el.getAttribute('data-atual');
        const esperado = el.getAttribute('data-resposta');
        if (inserido !== esperado) grupoCorreto = false;
    });

    if (grupoCorreto) {
        tocarSom('acerto');
        animarRobo('acerto'); // Ativa o salto de alegria da mascote
        inputs.forEach(el => el.classList.add('preenchida-correta'));
        
        // Sincronizado para 1300ms
        setTimeout(() => {
            podeInteragir = true;
            transitarRonda();
        }, 1300);
    } else {
        tocarSom('erro');
        erradas++;
        atualizarBarraEstado();
        animarRobo('erro');

        inputs.forEach(el => el.classList.add('erro-vibrante'));
        
        setTimeout(() => {
            podeInteragir = true;
            inputs.forEach(el => {
                el.classList.remove('erro-vibrante');
                el.textContent = '';
                el.setAttribute('data-atual', '');
            });
            passoAtual = 0; 
            definirFocoPasso();
        }, 600);
    }
}

// Validação do Jogo 2 (Múltipla Escolha)
function validarEscolhaLeitura(isCorreta) {
    podeInteragir = false;
    const btnFocado = document.querySelector('.btn-opcao-leitura.caixa-focada');
    
    if (isCorreta) {
        tocarSom('acerto');
        if (btnFocado) btnFocado.classList.add('sucesso-vibrante');
        animarRobo('acerto');

        const btnVerif = document.getElementById('btn-verificar-opcao');
        if (btnVerif) btnVerif.classList.remove('caixa-focada');

        setTimeout(() => {
            podeInteragir = true;
            transitarRonda();
        }, 1200);
    } else {
        tocarSom('erro');
        erradas++;
        atualizarBarraEstado();
        animarRobo('erro');
        if (btnFocado) btnFocado.classList.add('erro-vibrante');

        setTimeout(() => {
            podeInteragir = true;
            if (btnFocado) {
                btnFocado.classList.remove('erro-vibrante', 'caixa-focada');
            }
            const btnVerif = document.getElementById('btn-verificar-opcao');
            if (btnVerif) btnVerif.classList.remove('caixa-focada');
            selecaoLeitura = null;
        }, 600);
    }
}

// Transição inteligente de ronda
function transitarRonda() {
    desafioAtual++;
    if (desafioAtual < totalRondas) {
        atualizarBarraEstado();
        carregarRonda();
    } else {
        finalizarJogo();
    }
}


/* =====================================================================
   D. SUPORTE PARA TECLADO FÍSICO (NATIVO E UNIFICADO)
   ===================================================================== */
document.addEventListener('keydown', (event) => {
    const ecraJogo = document.getElementById('ecra-jogo');
    if (ecraJogo && ecraJogo.style.display === 'flex' && podeInteragir) {
        
        const tecla = event.key;

        // 1. Números de 0 a 9 (apenas se não estiver no Jogo 2)
        if (tecla >= '0' && tecla <= '9') {
            if (contaAtiva && contaAtiva.tipo !== 'ler-classes') {
                interacaoTeclado(tecla);
            }
        }
        // 2. Apagar (Backspace)
        else if (tecla === 'Backspace') {
            if (contaAtiva && contaAtiva.tipo !== 'ler-classes') {
                interacaoTeclado('apagar');
            }
        }
        // 3. Confirmar (Enter) - Unificado para escrita e múltipla escolha
        else if (tecla === 'Enter') {
            if (contaAtiva && contaAtiva.tipo === 'ler-classes') {
                if (selecaoLeitura) {
                    validarEscolhaLeitura(selecaoLeitura.correta);
                } else {
                    showToast("Seleciona primeiro uma opção!");
                }
            } else {
                interacaoTeclado('confirmar');
            }
            event.preventDefault(); 
        }
    }
});

		if(alvo) alvo.style.display = 'flex';
	}

	function abrirZoomImagem(srcCaminho) {
		const modal = document.getElementById('zoom-modal');
		const img = document.getElementById('zoom-img-content');
		if (modal && img) {
			img.src = srcCaminho;
			modal.classList.add('active');
		}
	}

	function fecharZoomImagem() {
		const modal = document.getElementById('zoom-modal');
		if (modal) modal.classList.remove('active');
	}

	function prepararJogo(sistema) {
		sistemaAtivo = sistema; // 'escrever-classes', 'ler-classes', 'desafio-zeros' ou 'decompor-ordens'
		erradas = 0; 
		desafioAtual = 0; 
		podeInteragir = true;

		let nomeSistema = "";

		// Sincronização direta com os teus botões do menu do HTML
		if (sistema === 'escrever-classes') {
			nomeSistema = "Lê por extenso e completa o quadro posicional.";
		} else if (sistema === 'ler-classes') {
			nomeSistema = "Observa os algarismos na tabela e escolhe a escrita correta.";
		} else if (sistema === 'desafio-zeros') {
			nomeSistema = "Escreve no quadro com atenção aos zeros escondidos.";
		} else if (sistema === 'decompor-ordens') {
			nomeSistema = "Junta cada ordem para formar o número.";
		}

		// Geramos dinamicamente as 5 rondas para esta sessão
		perguntasSorteadas = [];
		for (let i = 0; i < totalRondas; i++) {
			perguntasSorteadas.push(gerarContaPosicionalDinamica(sistemaAtivo));
		}
		
		const fog = document.getElementById('robo-feedback');
		if (fog) { 
			fog.style.display = "flex"; 
			animarRobo('normal'); 
		}
		
		document.getElementById('subtitulo-header').textContent = nomeSistema;
		rondasParaDica = 0;
		atualizarBotaoDica(); 

		mostrarEcra('ecra-jogo');
		atualizarBarraEstado();
		carregarRonda();
	}


	/* =====================================================================
	   4. GESTÃO DE FEEDBACK, HUD, MASCOTE E DICAS (ESTÁTICO - NUNCA MEXER)
	   ===================================================================== */
	function atualizarBarraEstado() {
		const p = document.getElementById('val-progresso');
		const t = document.getElementById('val-total');
		const e = document.getElementById('val-erros');
		if (p) p.textContent = Math.min(desafioAtual + 1, totalRondas);
		if (t) t.textContent = totalRondas; // Mostra dinamicamente o total (5)
		if (e) e.textContent = erradas;

		const progressoReferencia = Math.min(desafioAtual + 1, totalRondas);
		document.getElementById('progress-fill').style.width = (progressoReferencia / totalRondas * 100) + '%';
	}
	
	function atualizarBotaoDica() {
		const btn = document.getElementById('btn-dica');
		if (!btn) return;

		// Mantém o botão sempre ativo e disponível para clique
		btn.classList.remove('esgotada');
		btn.disabled = false;
		btn.innerHTML = SVG_BULB + ' Dica';
	}

	function validar(correto, el) {

	}

	function animarRobo(estado) {
		const mascote = document.getElementById('robo-feedback');
		if (!mascote) return;

		mascote.classList.remove('mascote-normal', 'mascote-erro', 'mascote-sucesso');
		void mascote.offsetWidth; 

		if (estado === 'normal') {
			mascote.src = "img/mascote_normal.png";
			mascote.classList.add('mascote-normal');
		}
		else if (estado === 'erro') {
			mascote.src = "img/mascote_erro.png";
			mascote.classList.add('mascote-erro');
			setTimeout(() => animarRobo('normal'), 600);
		}
		else if (estado === 'acerto') {
			mascote.src = "img/mascote_acerto.png";
			mascote.classList.add('mascote-sucesso');
			setTimeout(() => {
				if (desafioAtual < totalRondas) animarRobo('normal');
			}, 1000);
		}
	}

	function resetTimerImpaciencia() {
		clearTimeout(timerImpaciencia); 
		const btnDica = document.getElementById('btn-dica');
		if(btnDica) btnDica.classList.remove('dica-impaciente');
		timerImpaciencia = setTimeout(() => { if(btnDica) btnDica.classList.add('dica-impaciente'); }, 15000);
	}

	function usarDica() {
		if (rondasParaDica > 0 || !podeInteragir) return;
		
		const ronda = perguntasSorteadas[desafioAtual];
		const configDica = ronda.dica;
		if (!configDica) return;

		tocarSom('flip');

		// Abre o modal de dica com a explicação posicional e tabuada contexto
		document.getElementById('modal-dica-conteudo').innerHTML = `<p>${configDica}</p>`;
		document.getElementById('modal-ajuda').classList.add('active');

	}

	function fecharModalDica() { document.getElementById('modal-ajuda').classList.remove('active'); }

	function finalizarJogo() {
		document.getElementById('robo-feedback').style.display = "none";
		mostrarEcra('ecra-fim');
		document.getElementById('final-erros').textContent = erradas;
		const rank = document.getElementById('rank-container');
		let img = erradas === 0 ? "rank_ouro.svg" : (erradas <= 3 ? "rank_prata.svg" : "rank_bronze.svg");
		rank.innerHTML = `<img src="../../../SVG/${img}" class="taca-vitoria" style="width:120px;">`;
		tocarSom('vitoria'); 
		dispararConfetis();
	}

	function voltarAoMenuPrincipal() {
		mostrarEcra('ecra-selecao');
		document.getElementById('robo-feedback').style.display = "none";
		document.getElementById('subtitulo-header').textContent = "Lê, escreve e decompõe grandes números no quadro de ordens!";
		limparConfetis();
	}

	function confirmarSair() {
		voltarAoMenuPrincipal();
	}

	function reiniciarJogo() { 
		prepararJogo(sistemaAtivo); 
		limparConfetis();
	}


	/* =====================================================================
	   5. AUDIO, CONFETIS E UTILITÁRIOS GLOBAIS (ESTÁTICO - NUNCA MEXER)
	   ===================================================================== */
	const AudioContextClass = window.AudioContext || window.webkitAudioContext;
	let audioCtx = null;

	function initAudio() {
		try {
			if (!AudioContextClass) return;
			if (!audioCtx) {
				audioCtx = new AudioContextClass();
			}
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume().catch(e => console.warn("Aviso: Não foi possível retomar o AudioContext:", e));
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha na inicialização do AudioContext:", error);
			audioCtx = null;
		}
	}

	document.addEventListener('pointerdown', initAudio, { once: true });

	function baralharArray(arr) {
		let array = [...arr];
		for (let i = array.length - 1; i > 0; i--) {
			const j = Math.floor(Math.random() * (i + 1));
			[array[i], array[j]] = [array[j], array[i]];
		}
		return array;
	}

	function obterCoresAleatorias(quantidade) {
		const coresTemplate = ['bg-azul', 'bg-amarelo', 'bg-roxo', 'bg-laranja', 'bg-rosa', 'bg-turquesa', 'bg-vermelho'];
		const baralhadas = baralharArray(coresTemplate);
		return baralhadas.slice(0, quantidade);
	}

	function tocarSom(t) {
		try {
			initAudio();
			if (!audioCtx) return;
			const agora = audioCtx.currentTime;

			if (t === 'acerto') {
				const notas = [783.99, 1046.50];
				notas.forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'sine';
					o.frequency.value = freq;
					g.gain.setValueAtTime(0, agora + i * 0.12);
					g.gain.linearRampToValueAtTime(0.08, agora + i * 0.12 + 0.02);
					g.gain.exponentialRampToValueAtTime(0.001, agora + i * 0.12 + 0.3);
					o.start(agora + i * 0.12);
					o.stop(agora + i * 0.12 + 0.3);
				});
			} else if (t === 'erro') {
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'triangle';
				o.frequency.setValueAtTime(220, agora);
				o.frequency.exponentialRampToValueAtTime(80, agora + 0.3);
				g.gain.setValueAtTime(0.08, agora);
				o.start(agora);
				o.stop(agora + 0.3);
			} else if (t === 'vitoria') {
				const melodia = [
					{ freq: 523.25, tempo: 0.00, duracao: 0.15 }, 
					{ freq: 659.25, tempo: 0.15, duracao: 0.15 }, 
					{ freq: 783.99, tempo: 0.30, duracao: 0.20 }, 
					{ freq: 659.25, tempo: 0.50, duracao: 0.15 }, 
					{ freq: 1046.50, tempo: 0.65, duracao: 0.70 } 
				];
				melodia.forEach(nota => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'triangle'; 
					o.frequency.value = nota.freq;
					g.gain.setValueAtTime(0.08, agora + nota.tempo);
					g.gain.exponentialRampToValueAtTime(0.001, agora + nota.tempo + nota.duracao);
					o.start(agora + nota.tempo);
					o.stop(agora + nota.tempo + nota.duracao);
				});
			} else if (t === 'decolar') {
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine';
				o.frequency.setValueAtTime(150, agora);
				o.frequency.exponentialRampToValueAtTime(1800, agora + 0.8); 
				g.gain.setValueAtTime(0, agora);
				g.gain.linearRampToValueAtTime(0.12, agora + 0.05);
				g.gain.exponentialRampToValueAtTime(0.001, agora + 0.8);
				o.start(agora);
				o.stop(agora + 0.8);
			} else if (t === 'flip') {
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine';
				o.frequency.setValueAtTime(400, agora);
				o.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
				g.gain.setValueAtTime(0.05, agora);
				o.start(agora);
				o.stop(agora + 0.1);
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha ao tentar reproduzir o áudio sintetizado:", error);
		}
	}

	function dispararConfetis() {
		const c = document.getElementById('confetti-container');
		if (!c) return;
		c.innerHTML = '';
		const cores = ['#ff4757', '#2ed573', '#0091ff', '#fbc531'];
		for (let i = 0; i < 120; i++) {
			const d = document.createElement('div');
			d.className = 'confetti';
			d.style.left = Math.random() * 100 + '%';
			d.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
			
			const escala = Math.random() * 0.8 + 0.4;
			const duracao = Math.random() * 2 + 2.5;
			const atraso = Math.random() * 1.5;
			
			d.style.animationDuration = duracao + 's';
			d.style.animationDelay = atraso + 's';
			d.style.transform = `scale(${escala})`;
			
			c.appendChild(d);
			setTimeout(() => d.remove(), (duracao + atraso) * 1000);
		}
	}

	function limparConfetis() {
		const container = document.getElementById('confetti-container');
		if (container) {
			container.innerHTML = '';
		}
	}
