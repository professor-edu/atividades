	function prepararJogo(sistema) {
		sistemaAtivo = sistema;
		erradas = 0; 
		desafioAtual = 0; 
		podeInteragir = true;

		// Gestão inteligente da pool de questões da sessão
		if (sistema !== ultimoSistema) {
			poolRestantesSessao = [];
			ultimoSistema = sistema;
		}

		let baseCompleta = [];
		let nomeSistema = "";

		// Configuração dos caminhos lógicos para "O Mundo dos Pronomes"
		if (sistema === 'estudo') {
			nomeSistema = "1. Guia de Estudo";
		} else if (sistema === 'pessoais') {
			baseCompleta = BD_PESSOAIS;
			nomeSistema = "2. Pronomes Pessoais";
		} else if (sistema === 'possessivos') {
			baseCompleta = BD_POSSESSIVOS;
			nomeSistema = "3. Pronomes Possessivos";
		} else if (sistema === 'demonstrativos') {
			baseCompleta = BD_DEMONSTRATIVOS;
			nomeSistema = "4. Pronomes Demonstrativos";
		}

		// Seleção de elementos do HUD da barra de estado
		const progressBg = document.querySelector('.progress-bg');
		const badgeRonda = document.querySelector('.badge-ronda');
		const badgeErros = document.querySelector('.badge-erros');
		const btnDica = document.getElementById('btn-dica');
		const mascote = document.getElementById('mascote-feedback');

		if (sistema === 'estudo') {
			// Modo Estudo: Oculta elementos semânticos de pontuação, progresso e dicas
			if (progressBg) progressBg.style.display = 'none';
			if (badgeRonda) badgeRonda.style.display = 'none';
			if (badgeErros) badgeErros.style.display = 'none';
			if (btnDica) btnDica.style.display = 'none';
			if (mascote) mascote.style.display = 'none';

			// Cria ou ativa o Título Dinâmico na barra de estado
			let tituloEstudo = document.getElementById('status-titulo-estudo');
			if (!tituloEstudo) {
				tituloEstudo = document.createElement('div');
				tituloEstudo.id = 'status-titulo-estudo';
				tituloEstudo.className = 'status-titulo-estudo';
				const statusBar = document.querySelector('.status-bar-jogo');
				if (statusBar) statusBar.appendChild(tituloEstudo);
			}
			tituloEstudo.style.display = 'block';
		} else {
			// Modo Jogo Ativo: Repõe todos os elementos e reativa a mascote
			if (progressBg) progressBg.style.display = 'block';
			if (badgeRonda) badgeRonda.style.display = 'flex';
			if (badgeErros) badgeErros.style.display = 'flex';
			if (btnDica) btnDica.style.display = 'flex';
			if (mascote) {
				mascote.style.display = 'flex';
				animarMascote('normal');
			}

			// Oculta o título do modo estudo
			const tituloEstudo = document.getElementById('status-titulo-estudo');
			if (tituloEstudo) tituloEstudo.style.display = 'none';
		}

		// Sorteio de questões (apenas para os minijogos 2, 3 e 4)
		if (sistema !== 'estudo') {
			if (baseCompleta.length >= 10) {
				if (poolRestantesSessao.length < 10) {
					poolRestantesSessao = baralharArray([...baseCompleta]);
				}
				perguntasSorteadas = poolRestantesSessao.splice(0, 10);
			} else {
				perguntasSorteadas = baralharArray([...baseCompleta]).slice(0, 10);
			}
		}

		document.getElementById('subtitulo-header').textContent = nomeSistema;
		rondasParaDica = 0;
		atualizarBotaoDica(); 

		mostrarEcra('ecra-jogo');

		// Direciona para o renderizador correto
		if (sistema === 'estudo') {
			carregarGuiaEstudo();
		} else {
			atualizarBarraEstado();
			carregarRonda();
		}
	}
	
	function atualizarBarraEstado() {
		const p = document.getElementById('val-progresso');
		const t = document.getElementById('val-total');
		const e = document.getElementById('val-erros');
		if(p) p.textContent = Math.min(desafioAtual + 1, 10);
		if(t) t.textContent = 10;
		if(e) e.textContent = erradas;

		// PROGRESSO VISUAL CORRIGIDO: Começa logo preenchido em 10% na Ronda 1
		const progressoReferencia = Math.min(desafioAtual + 1, 10);
		document.getElementById('progress-fill').style.width = (progressoReferencia / 10 * 100) + '%';
	}
	
	function atualizarBotaoDica() {
		const btn = document.getElementById('btn-dica');
		if (!btn) return;

		// Se o tempo de recarga chegou a zero, o botão fica ativo
		if (rondasParaDica <= 0) {
			btn.classList.remove('esgotada');
			btn.disabled = false;
			btn.innerHTML = SVG_BULB + ' Dica';
		} else {
			// Se estiver em recarga, bloqueia o botão e mostra a ampulheta com a contagem decrescente
			btn.classList.add('esgotada');
			btn.disabled = true;
			btn.innerHTML = `⏳ ${rondasParaDica}`;
		}
	}
	
	/* --- VALIDAÇÃO EXCLUSIVA DO MAPA EM CASO DE ERRO --- */
	function validarMapa(zona) {
		const ronda = perguntasSorteadas[desafioAtual];
		let tudoCerto = true;

		// Verifica se cada órgão foi colocado no local correto
		for (let k in ronda.pares) {
			if (selecoesArrastar[k] !== ronda.pares[k]) {
				tudoCerto = false;
			}
		}

		if (tudoCerto) {
			validar(true, zona);
		} else {
			validar(false, zona);
			
			// REPOSIÇÃO SUAVE DO MAPA EM CASO DE ERRO
			setTimeout(() => {
				selecoesArrastar = {};
				arrastoAtivo = null;

				// 1. Reativa todos os botões azuis de órgãos à esquerda
				document.getElementById('game-area').querySelectorAll('.coluna-ligar button').forEach(btn => {
					btn.disabled = false;
					btn.style.opacity = '1';
					btn.classList.remove('selecionado');
				});

				// 2. Limpa e esvazia visualmente as caixas sobrepostas do corpo
				document.querySelectorAll('.slot-mapa').forEach(slot => {
					slot.innerHTML = '';
					slot.className = 'slot-mapa';
				});
			}, 800);
		}
	}
	
	/* --- VALIDAÇÃO EXCLUSIVA DO ARRASTAR EM CASO DE ERRO --- */
	function validarArrastar(container, ronda) {
		let tudoCerto = true;

		// Compara cada conceito ordenado com o par correto respetivo
		for (let k in ronda.pares) {
			if (selecoesArrastar[k] !== ronda.pares[k]) {
				tudoCerto = false;
			}
		}

		if (tudoCerto) {
			validar(true, container);
		} else {
			validar(false, container);
			
			// REPOSIÇÃO DO ARRASTAMENTO EM CASO DE ERRO
			setTimeout(() => {
				selecoesArrastar = {};
				arrastoAtivo = null;

				// 1. Reativa todos os blocos cinzentos à esquerda
				document.getElementById('game-area').querySelectorAll('.bloco-arrastar').forEach(btn => {
					btn.disabled = false;
					btn.style.opacity = '1';
					btn.classList.remove('selecionado');
				});

				// 2. Limpa e repõe o texto inicial dos alvos da direita (remover as palavras erradas)
				const botoesAlvo = document.getElementById('game-area').querySelectorAll('.coluna-ligar:last-child button');
				ronda.alvos.forEach((alvo, index) => {
					if (botoesAlvo[index]) {
						botoesAlvo[index].textContent = alvo;
					}
				});
			}, 800);
		}
	}

/* ==========================================================================
   5. CONSTRUÇÃO DINÂMICA DOS EXERCÍCIOS
   ========================================================================== */
	function carregarRonda() {
		podeInteragir = true;
		selecaoLigar = null; 
		selecoesLigar = {};
		paresElementosLigar = [];
		arrastoAtivo = null; 
		selecoesArrastar = {}; 
		selecoesLacunas = {}; 
		lacunaAtiva = null;
		
		// Remove realces de rondas anteriores
		document.querySelectorAll('.highlight-correto').forEach(el => el.classList.remove('highlight-correto'));

		const ronda = perguntasSorteadas[desafioAtual];
		const area = document.getElementById('game-area');
		if(!area || !ronda) return;
		area.innerHTML = '';

		// Limpa as classes do wrapper do ligar e lacunas de segurança
		area.className = 'area-jogo-custom';
		if(ronda.tipo === 'ligar') area.classList.add('jogo-tipo-ligar');
		if(ronda.tipo === 'lacunas') area.classList.add('jogo-tipo-lacunas');

		// A. INJETA IMAGEM MODULAR (QUADRADA OU RETANGULAR COM ZOOM OPCIONAL)
		if(ronda.imagem && ronda.tipo !== 'mapa' && ronda.tipo !== 'lacunas') {
			const wrapper = document.createElement('div');
			const proporcaoClasse = ronda.proporcao === 'quadrada' ? 'img-quadrada' : 'img-retangular';
			wrapper.className = `card-imagem-zoomable ${proporcaoClasse}`;

			const img = document.createElement('img');
			img.src = ronda.imagem;
			img.className = 'imagem-evento-tempo';
			img.alt = 'Imagem de suporte';
			img.onerror = () => { wrapper.remove(); };
			wrapper.appendChild(img);

			// Se a propriedade "zoom" for verdadeira na base de dados, ativa a lupa e o clique!
			if (ronda.zoom === true) {
				wrapper.onclick = () => abrirZoomImagem(ronda.imagem);

				const zoomBtn = document.createElement('div');
				zoomBtn.className = 'btn-zoom-imagem';
				zoomBtn.innerHTML = `
					<svg viewBox="0 0 24 24">
						<circle cx="11" cy="11" r="8"></circle>
						<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
					</svg>
				`;
				wrapper.appendChild(zoomBtn);
			}

			area.appendChild(wrapper);
		}

		// B. INJETA O TEXTO DA PERGUNTA
		if (ronda.pergunta && ronda.tipo !== 'mapa') {
			const txt = document.createElement('div');
			txt.className = 'pergunta-texto';
			txt.innerHTML = ronda.pergunta;
			area.appendChild(txt);
		}

		// C. GERADOR DE SELEÇÃO MÚLTIPLA VIBRANTE (SUPORTA TEXTO OU IMAGENS)
		if (ronda.tipo === 'multipla') {
			const container = document.createElement('div'); 
			container.className = 'opcoes-container';
			
			// Baralhamos as opções
			const baralhadas = [...ronda.opcoes].sort(() => Math.random() - 0.5);
			const coresSorteio = obterCoresAleatorias(baralhadas.length);

			baralhadas.forEach((opt, idx) => {
				const b = document.createElement('button');
				b.className = `btn-opcao-vibrante ${coresSorteio[idx]}`;
				
				let valorComparacao = "";

				// 1. VERIFICAÇÃO: É o formato NOVO (Objeto com Imagem + Nome)?
				if (typeof opt === 'object' && opt !== null) {
					b.innerHTML = `
						<img src="${opt.img}" class="imagem-opcao-vibrante" alt="">
						<div class="nome-opcao-legenda" style="font-size:1.1rem; font-weight:900; color:white; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); margin-top:5px;">
							${opt.nome}
						</div>
					`;
					valorComparacao = opt.img;
				}
				// 2. VERIFICAÇÃO: É o formato ANTIGO (String)?
				else if (typeof opt === 'string') {
					const isImagem = (opt.endsWith('.png') || opt.endsWith('.jpg') || opt.endsWith('.webp') || opt.endsWith('.svg'));
					
					if (isImagem) {
						const imgOpt = document.createElement('img');
						imgOpt.src = opt;
						imgOpt.className = 'imagem-opcao-vibrante';
						b.appendChild(imgOpt);
					} else {
						b.textContent = opt;
					}
					valorComparacao = opt; // O valor para comparar é a própria string
				}

				// AÇÃO DE CLIQUE: Usa o valorComparacao para validar contra a resposta correta
				b.onclick = () => {
					if(!podeInteragir) return;
					validar(valorComparacao === ronda.correta, b);
				};
				
				container.appendChild(b);
			});
			area.appendChild(container);
		}
		// D. GERADOR DE LIGAR COLUNAS (COM DESFAZER E CLASSES DO CSS)
		else if (ronda.tipo === 'ligar') {
			const container = document.createElement('div'); container.className = 'coluna-ligar-container';
			const colEsq = document.createElement('div'); colEsq.className = 'coluna-ligar';
			const colDir = document.createElement('div'); colDir.className = 'coluna-ligar';
			
			ronda.esquerda.forEach(it => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-azul'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir) return; selecionarLigarEsq(it, b, ronda); };
				colEsq.appendChild(b);
			});
			[...ronda.direita].sort(() => Math.random() - 0.5).forEach(it => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-turquesa'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir) return; selecionarLigarDir(it, b, ronda); };
				colDir.appendChild(b);
			});
			container.appendChild(colEsq); container.appendChild(colDir); area.appendChild(container);
		}
		// E. GERADOR DE TEXTO COM LACUNAS (MÉTODO PREMIUM 2 TOQUES)
		else if (ronda.tipo === 'lacunas') {
			const p = document.createElement('div'); p.className = 'texto-paragrafo-lacunas';
			let html = ronda.texto;
			ronda.respostas.forEach((r, i) => html = html.replace(`[${i}]`, `<span class="slot-vazio" id="slot-lacuna-${i}">...</span>`));
			p.innerHTML = html; area.appendChild(p);
			
			const banco = document.createElement('div'); banco.className = 'banco-opcoes';
			const distratoresSeguros = ronda.distratores || [];
			const todasAsOpcoes = baralharArray([...ronda.respostas, ...distratoresSeguros]);

			todasAsOpcoes.forEach(pal => {
				const b = document.createElement('button'); b.className = 'palavra-banco'; b.textContent = pal;
				b.onclick = () => {
					if (b.disabled || !podeInteragir) return;
					tocarSom('flip');
					document.querySelectorAll('.palavra-banco').forEach(x => x.classList.remove('selecionado'));
					b.classList.add('selecionado');
					lacunaAtiva = { elemento: b, texto: pal };

					// Ilumina apenas os slots vazios
					document.querySelectorAll('.slot-vazio').forEach(s => {
						if (!s.querySelector('strong')) {
							s.classList.add('pronto-receber');
						}
					});
				};
				banco.appendChild(b);
			});
			area.appendChild(banco);

			// Ativa ação de clique nos slots vazios para receber a palavra
			document.querySelectorAll('.slot-vazio').forEach((slot, idx) => {
				slot.onclick = () => {
					if (!lacunaAtiva) {
						const palavraAtual = slot.querySelector('strong')?.textContent;
						if (palavraAtual) {
							tocarSom('flip');
							slot.textContent = '...';
							slot.classList.remove('preenchido');
							delete selecoesLacunas[idx];
							
							document.querySelectorAll('.palavra-banco').forEach(b => {
								if (b.textContent === palavraAtual) {
									b.disabled = false;
									b.style.opacity = '1';
								}
							});
						} else {
							showToast("Seleciona primeiro uma palavra em baixo!");
						}
						return;
					}

					tocarSom('flip');
					const palavraTexto = lacunaAtiva.texto;

					const palavraAnterior = slot.querySelector('strong')?.textContent;
					if (palavraAnterior) {
						document.querySelectorAll('.palavra-banco').forEach(b => {
							if (b.textContent === palavraAnterior) {
								b.disabled = false;
								b.style.opacity = '1';
							}
						});
					}

					slot.innerHTML = `<strong style="color:var(--azul-escuro); font-size:1.1rem;">${palavraTexto}</strong>`;
					slot.classList.add('preenchido');
					selecoesLacunas[idx] = palavraTexto;

					lacunaAtiva.elemento.classList.remove('selecionado');
					lacunaAtiva.elemento.style.opacity = '0.3';
					lacunaAtiva.elemento.disabled = true;
					lacunaAtiva = null;

					document.querySelectorAll('.slot-vazio').forEach(s => s.classList.remove('pronto-receber'));

					if (Object.keys(selecoesLacunas).length === ronda.respostas.length) {
						let tudoOk = true; 
						ronda.respostas.forEach((res, index) => { 
							if(selecoesLacunas[index] !== res) tudoOk = false; 
						});

						if (tudoOk) {
							validar(true, p);
						} else {
							// Dispara feedback de erro e abana o texto das lacunas
							validar(false, p);

							// Aguarda os 600ms do abanão para repor apenas as lacunas erradas
							setTimeout(() => {
								ronda.respostas.forEach((res, index) => {
									const palavraColocada = selecoesLacunas[index];
									if (palavraColocada !== res) {
										
										// 1. Limpa o slot e repõe o aspeto inicial
										const slotErrado = document.getElementById(`slot-lacuna-${index}`);
										if (slotErrado) {
											slotErrado.textContent = '...';
											slotErrado.classList.remove('preenchido');
										}
										
										// 2. Reativa o botão correspondente no banco de opções
										document.querySelectorAll('.palavra-banco').forEach(b => {
											if (b.textContent === palavraColocada) {
												b.disabled = false;
												b.style.opacity = '1';
											}
										});
										
										// 3. Apaga a resposta errada da memória temporária de validação
										delete selecoesLacunas[index];
									}
								});
							}, 600);
						}
					}
				};
			});
		}
		// F. GERADOR DE ARRASTAR E LIGAR (SISTEMA DE DOIS TOQUES)
		else if (ronda.tipo === 'arrastar') {
			const container = document.createElement('div'); container.style.display="flex"; container.style.gap="30px";
			const colItens = document.createElement('div'); colItens.className="coluna-ligar";
			const colAlvos = document.createElement('div'); colAlvos.className="coluna-ligar";
			
			const itensEmbaralhados = baralharArray(ronda.itens);

			itensEmbaralhados.forEach(it => {
				const b = document.createElement('button'); b.className = 'bloco-arrastar'; b.textContent = it;
				b.onclick = () => { if(!podeInteragir || b.disabled) return; document.querySelectorAll('.bloco-arrastar').forEach(x=>x.classList.remove('selecionado')); b.classList.add('selecionado'); arrastoAtivo = {val: it, btn: b}; tocarSom('flip'); };
				colItens.appendChild(b);
			});

			ronda.alvos.forEach(al => {
				const b = document.createElement('button'); b.className = 'btn-opcao-vibrante bg-turquesa'; b.textContent = al;
				
				b.onclick = () => {
					// MECÂNICA DE DESFAZER ATIVA NO ARRASTAR: Se clicar num alvo já ocupado sem palavra selecionada
					if (!arrastoAtivo) {
						let itemEncontrado = null;
						for (let item in selecoesArrastar) {
							if (selecoesArrastar[item] === al) {
								itemEncontrado = item;
								break;
							}
						}
						
						if (itemEncontrado) {
							tocarSom('flip');
							delete selecoesArrastar[itemEncontrado];
							b.textContent = al; // Devolve o botão ao seu texto original de etapa

							// Reativa o bloco correspondente no lado esquerdo
							document.getElementById('game-area').querySelectorAll('.bloco-arrastar').forEach(bloco => {
								if (bloco.textContent === itemEncontrado) {
									bloco.disabled = false;
									bloco.style.opacity = '1';
								}
							});
						}
						return;
					}

					tocarSom('flip');
					const valorSelecionado = arrastoAtivo.val;
					selecoesArrastar[valorSelecionado] = al;
					
					b.innerHTML = `${al}<br><small style="color:white; opacity:0.8;">(${valorSelecionado})</small>`; 
					arrastoAtivo.btn.disabled = true; 
					arrastoAtivo.btn.style.opacity = "0.3"; 
					arrastoAtivo = null;

					if (Object.keys(selecoesArrastar).length === ronda.itens.length) {
						// CORREÇÃO: Encaminha para a validação e reposição do arrastamento em caso de erro!
						setTimeout(() => { validarArrastar(container, ronda); }, 400);
					}
				};
				colAlvos.appendChild(b);
			});
			container.appendChild(colItens); container.appendChild(colAlvos); area.appendChild(container);
		}

		// G. NOVO CASO: MAPA / ESQUEMA ANATÓMICO COM COORDENADAS E LINHAS VETORIAIS DINÂMICAS
		else if (ronda.tipo === 'mapa') {
			selecoesArrastar = {};
			arrastoAtivo = null;
			const totalArrastar = Object.keys(ronda.pares).length;

			const zona = document.createElement('div');
			zona.style.display = 'flex';
			zona.style.alignItems = 'center';
			zona.style.justifyContent = 'center';
			zona.style.gap = '25px';
			zona.style.width = '100%';
			zona.style.flexWrap = 'wrap';

			const itens = document.createElement('div');
			itens.className = 'coluna-ligar';

			const itensEmbaralhados = baralharArray(ronda.itens);
			itensEmbaralhados.forEach(valor => {
				const b = document.createElement('button');
				b.className = 'btn-opcao-vibrante bg-azul';
				b.textContent = valor;
				b.style.fontSize = '0.92rem';

				b.onclick = () => {
					if (b.disabled || !podeInteragir) return;
					tocarSom('flip');
					document.querySelectorAll('.btn-opcao-vibrante').forEach(b => b.classList.remove('selecionado'));
					b.classList.add('selecionado');
					arrastoAtivo = { val: valor, btn: b };

					document.querySelectorAll('.slot-mapa').forEach(s => {
						if (!s.querySelector('strong')) {
							s.classList.add('pronto-receber');
						}
					});
				};
				itens.appendChild(b);
			});

			const wrapper = document.createElement('div');
			const mapaProporcao = 'mapa-quadrado'; /* Forçado 1:1 Quadrado para o Corpo Humano */
			wrapper.className = `mapa-relevo-wrapper ${mapaProporcao}`;

			// Injeta o mapa de fundo
			const img = document.createElement('img');
			img.src = ronda.imagem;
			img.className = 'mapa-relevo-imagem';
			img.alt = 'Esquema do Corpo';
			img.onerror = () => { wrapper.remove(); };
			wrapper.appendChild(img);

			// NOVO: Desenha as linhas pontilhadas dinamicamente na tela transparente sobre o mapa
			if (ronda.coords.linhas) {
				const svgNS = "http://www.w3.org/2000/svg";
				const svg = document.createElementNS(svgNS, "svg");
				svg.setAttribute("viewBox", "0 0 100 100");
				svg.style.position = "absolute";
				svg.style.top = "0";
				svg.style.left = "0";
				svg.style.width = "100%";
				svg.style.height = "100%";
				svg.style.pointerEvents = "none";
				svg.style.zIndex = "5";

				ronda.coords.linhas.forEach(linhaObj => {
				const path = document.createElementNS(svgNS, "path");
				path.setAttribute("d", linhaObj.d); // Lê o trajeto d
				path.setAttribute("stroke", linhaObj.cor || "#0091ff"); // Lê a cor individual definida ou usa azul por padrão
				path.setAttribute("stroke-width", "0.6");
				path.setAttribute("fill", "none");
				svg.appendChild(path);
			});

				wrapper.appendChild(svg);
			}

			// Leitura das coordenadas dinâmicas da base de dados (Evita erros de cruzamento)
			const tops = ronda.coords.tops;
			const lefts = ronda.coords.lefts;
			const widths = ronda.coords.widths;
			const heights = ronda.coords.heights || ['6%', '6%', '6%', '6%', '6%'];

			ronda.alvos.forEach((alvo, index) => {
				const slot = document.createElement('div');
				slot.className = 'slot-mapa';
				slot.style.top = tops[index];
				slot.style.left = lefts[index];
				slot.style.width = widths[index];
				slot.style.height = heights[index];

				slot.onclick = () => {
					if (!arrastoAtivo) {
						const palavraAtual = slot.querySelector('strong')?.textContent;
						if (palavraAtual) {
							tocarSom('flip');
							slot.innerHTML = '';
							slot.classList.remove('preenchido');
							delete selecoesArrastar[palavraAtual];
							
							document.getElementById('game-area').querySelectorAll('.coluna-ligar button').forEach(b => {
								if (b.textContent === palavraAtual) {
									b.disabled = false;
									b.style.opacity = '1';
								}
							});
						} else {
							showToast("Seleciona primeiro uma palavra à esquerda!", false);
						}
						return;
					}

					tocarSom('flip');
					const valorSelecionado = arrastoAtivo.val;
					selecoesArrastar[valorSelecionado] = alvo;

					slot.innerHTML = `<strong>${valorSelecionado}</strong>`;
					slot.classList.add('preenchido');

					arrastoAtivo.btn.classList.remove('selecionado');
					arrastoAtivo.btn.style.opacity = '0.3';
					arrastoAtivo.btn.disabled = true;
					arrastoAtivo = null;

					document.querySelectorAll('.slot-mapa').forEach(s => s.classList.remove('pronto-receber'));

					if (Object.keys(selecoesArrastar).length === totalArrastar) {
						setTimeout(() => { validarMapa(zona); }, 400);
					}
				};

				wrapper.appendChild(slot);
			});

			zona.appendChild(itens);
			zona.appendChild(wrapper);
			area.appendChild(zona);
		}
		// H. NOVO CASO: JOGO DE VERDADEIRO OU FALSO (BOTÕES FIXOS DE CORES FIXAS)
		else if (ronda.tipo === 'verdadeiro-falso') {
			const container = document.createElement('div'); 
			container.className = 'opcoes-container';

			// Botão Fixo "Verdadeiro" (Sempre Verde Vibrante)
			const btnVerdadeiro = document.createElement('button');
			btnVerdadeiro.className = 'btn-opcao-vibrante bg-verde';
			btnVerdadeiro.textContent = 'Verdadeiro';
			btnVerdadeiro.onclick = () => validar(ronda.correta === 'Verdadeiro', btnVerdadeiro);

			// Botão Fixo "Falso" (Sempre Vermelho Vibrante)
			const btnFalso = document.createElement('button');
			btnFalso.className = 'btn-opcao-vibrante bg-vermelho';
			btnFalso.textContent = 'Falso';
			btnFalso.onclick = () => validar(ronda.correta === 'Falso', btnFalso);

			container.appendChild(btnVerdadeiro);
			container.appendChild(btnFalso);
			area.appendChild(container);
		}
		
		// I. JOGO I: CLASSIFICAÇÃO DE GAVETAS (CARRUAGENS DO COMBOIO)
		else if (ronda.tipo === 'classificacao') {
			selecoesArrastar = {};
			arrastoAtivo = null;
			let totalItens = ronda.itens.length;

			const colPalavras = document.createElement('div');
			colPalavras.className = 'coluna-classificacao';
			colPalavras.dataset.qtd = totalItens; // Regista o tamanho para simetria de grelha

			const categoriasUnicas = Array.from(new Set(Object.values(ronda.pares)));
			const cat1 = categoriasUnicas[0]; 
			const cat2 = categoriasUnicas[1]; 

			// LISTA UNIVERSAL DE CATEGORIAS AZUIS (Abrange todos os temas do 4.º ano)
			const categoriasAzuis = [
				'Masculino', 'Singular', 'Comparativo', 'Analítico', 'Relativo', 'Átonos',
				'Variável', 'Pretérito Perfeito', 'Presente', 'Indicativo', 'Modo Indicativo', 'Preposição'
			];

			// ASSOCIAÇÃO DINÂMICA DE CORES DAS CARRIAGES (Pretérito Perfeito = carruagem-perfeito, Pretérito Imperfeito = carruagem-imperfeito)
			const classeCat1 = categoriasAzuis.includes(cat1) ? 'carruagem-perfeito' : 'carruagem-imperfeito';
			const classeCat2 = categoriasAzuis.includes(cat2) ? 'carruagem-perfeito' : 'carruagem-imperfeito';

			const zona = document.createElement('div');
			zona.className = 'painel-carruagens-tempo'; // Usa a classe do painel do comboio

			const baralhadas = baralharArray(ronda.itens);
			baralhadas.forEach(pal => {
				const b = document.createElement('button');
				b.className = 'btn-opcao-pilula';
				b.textContent = pal;
				b.onclick = () => {
					if (b.disabled || !podeInteragir) return;
					tocarSom('flip');
					document.querySelectorAll('.coluna-classificacao button').forEach(x => x.classList.remove('selecionado'));
					b.classList.add('selecionado');
					arrastoAtivo = { val: pal, btn: b };
				};
				colPalavras.appendChild(b);
			});

			// Contentor 1 (Lê dinamicamente o nome e a classe de cor da carruagem)
			const depSingular = document.createElement('div');
			depSingular.className = `carruagem-destino ${classeCat1}`;
			depSingular.innerHTML = `<div class="carruagem-titulo">${cat1}</div>`;
			depSingular.onclick = () => { processarClassificacao(cat1, depSingular); };

			// Contentor 2 (Lê dinamicamente o nome e a classe de cor da carruagem)
			const depPlural = document.createElement('div');
			depPlural.className = `carruagem-destino ${classeCat2}`;
			depPlural.innerHTML = `<div class="carruagem-titulo">${cat2}</div>`;
			depPlural.onclick = () => { processarClassificacao(cat2, depPlural); };

			function processarClassificacao(categoria, elementoDep) {
				if (!arrastoAtivo) {
					showToast("Seleciona primeiro uma palavra em cima!");
					return;
				}
				tocarSom('flip');
				const palavra = arrastoAtivo.val;
				selecoesArrastar[palavra] = categoria;

				const tag = document.createElement('div');
				tag.className = 'destaque-fundo';
				tag.style.margin = '4px';
				tag.style.cursor = 'pointer'; // Indica visualmente que é clicável para remover
				tag.textContent = palavra;

				// MELHORIA 1: Lógica de clicar para desfazer a qualquer momento
				tag.onclick = (e) => {
					e.stopPropagation(); // Impede que o clique ative o depósito pai
					tocarSom('flip');
					delete selecoesArrastar[palavra];
					tag.remove();
					
					// Reativa o respetivo botão na pool de palavras à esquerda
					colPalavras.querySelectorAll('button').forEach(btn => {
						if (btn.textContent === palavra) {
							btn.disabled = false;
							btn.style.opacity = '1';
						}
					});
				};

				elementoDep.appendChild(tag);

				arrastoAtivo.btn.style.opacity = '0.3';
				arrastoAtivo.btn.disabled = true;
				arrastoAtivo = null;

				if (Object.keys(selecoesArrastar).length === totalItens) {
					setTimeout(() => {
						let tudoOk = true;
						for (let k in ronda.pares) {
							if (selecoesArrastar[k] !== ronda.pares[k]) {
								tudoOk = false;
							}
						}
						if (tudoOk) {
							validar(true, zona);
						} else {
							validar(false, zona);
							
							// MELHORIA 2: Devolução seletiva (só as erradas regressam à pool)
							setTimeout(() => {
								colPalavras.querySelectorAll('button').forEach(btn => {
									const pal = btn.textContent;
									const eCorreta = (selecoesArrastar[pal] === ronda.pares[pal]);
									
									if (!eCorreta) {
										// Se estiver incorreta, remove dos registos e reativa o botão
										btn.disabled = false;
										btn.style.opacity = '1';
										delete selecoesArrastar[pal];
										
										// Remove a etiqueta visual de dentro do depósito correspondente
										document.querySelectorAll('.carruagem-destino .destaque-fundo').forEach(tagEl => {
											if (tagEl.textContent === pal) {
												tagEl.remove();
											}
										});
									}
								});
								arrastoAtivo = null;
							}, 800);
						}
					}, 400);
				}
			}

			area.appendChild(colPalavras);
			zona.appendChild(depSingular);
			zona.appendChild(depPlural);
			area.appendChild(zona);
		}

		// J. JOGO J: O INTRUSO (BOLHAS DE SABÃO)
		else if (ronda.tipo === 'intruso') {
			const container = document.createElement('div');
			container.className = 'intruso-container';

			const baralhadas = [...ronda.opcoes].sort(() => Math.random() - 0.5);

			baralhadas.forEach(opt => {
				const btn = document.createElement('button');
				btn.className = 'btn-bolha-intruso';
				btn.textContent = opt;

				btn.onclick = () => {
					if (!podeInteragir) return;
					const isIntruso = (opt === ronda.correta);
					
					if (isIntruso) {
						// Efeito físico de rebentar a bolha antes de avançar
						btn.style.transition = 'transform 0.15s ease-out, opacity 0.15s ease-out';
						btn.style.transform = 'scale(0)';
						btn.style.opacity = '0';
						tocarSom('flip');
						setTimeout(() => {
							validar(true, btn);
						}, 200);
					} else {
						validar(false, btn);
					}
				};
				container.appendChild(btn);
			});
			area.appendChild(container);
		}

		// K. JOGO K: O CONSTRUTOR DE PALAVRAS (CARROSSEL DE AFIXOS)
		else if (ronda.tipo === 'carrossel') {
			let idxPrefixo = 0;
			let idxSufixo = 0;

			const container = document.createElement('div');
			container.style.display = 'flex';
			container.style.flexDirection = 'column';
			container.style.alignItems = 'center';
			container.style.gap = '20px';
			container.style.width = '100%';

			const carrosselWrap = document.createElement('div');
			carrosselWrap.className = 'carrossel-palavras-container';

			// --- 1. COLUNA PREFIXO ---
			const colPref = document.createElement('div');
			colPref.className = 'carrossel-coluna';

			const btnPrefUp = document.createElement('button');
			btnPrefUp.className = 'btn-carrossel-seta';
			btnPrefUp.innerHTML = '▲';
			btnPrefUp.onclick = () => {
				if (!podeInteragir) return;
				tocarSom('flip');
				idxPrefixo = (idxPrefixo - 1 + ronda.prefixos.length) % ronda.prefixos.length;
				visorPref.textContent = ronda.prefixos[idxPrefixo] || '---';
			};

			const visorPref = document.createElement('div');
			visorPref.className = 'carrossel-visor';
			visorPref.textContent = ronda.prefixos[idxPrefixo] || '---';

			const btnPrefDown = document.createElement('button');
			btnPrefDown.className = 'btn-carrossel-seta';
			btnPrefDown.innerHTML = '▼';
			btnPrefDown.onclick = () => {
				if (!podeInteragir) return;
				tocarSom('flip');
				idxPrefixo = (idxPrefixo + 1) % ronda.prefixos.length;
				visorPref.textContent = ronda.prefixos[idxPrefixo] || '---';
			};

			colPref.appendChild(btnPrefUp);
			colPref.appendChild(visorPref);
			colPref.appendChild(btnPrefDown);

			// --- 2. COLUNA RADICAL (FIXO CENTRAL) ---
			const colRad = document.createElement('div');
			colRad.className = 'carrossel-coluna';
			
			// Espaçadores transparentes para simetria vertical com as setas laterais
			const espacoTop = document.createElement('div');
			espacoTop.style.height = '42px';
			const espacoBot = document.createElement('div');
			espacoBot.style.height = '42px';

			const visorRad = document.createElement('div');
			visorRad.className = 'carrossel-visor visor-radical';
			visorRad.textContent = ronda.radical;

			colRad.appendChild(espacoTop);
			colRad.appendChild(visorRad);
			colRad.appendChild(espacoBot);

			// --- 3. COLUNA SUFIXO ---
			const colSuf = document.createElement('div');
			colSuf.className = 'carrossel-coluna';

			const btnSufUp = document.createElement('button');
			btnSufUp.className = 'btn-carrossel-seta';
			btnSufUp.innerHTML = '▲';
			btnSufUp.onclick = () => {
				if (!podeInteragir) return;
				tocarSom('flip');
				idxSufixo = (idxSufixo - 1 + ronda.sufixos.length) % ronda.sufixos.length;
				visorSuf.textContent = ronda.sufixos[idxSufixo] || '---';
			};

			const visorSuf = document.createElement('div');
			visorSuf.className = 'carrossel-visor';
			visorSuf.textContent = ronda.sufixos[idxSufixo] || '---';

			const btnSufDown = document.createElement('button');
			btnSufDown.className = 'btn-carrossel-seta';
			btnSufDown.innerHTML = '▼';
			btnSufDown.onclick = () => {
				if (!podeInteragir) return;
				tocarSom('flip');
				idxSufixo = (idxSufixo + 1) % ronda.sufixos.length;
				visorSuf.textContent = ronda.sufixos[idxSufixo] || '---';
			};

			colSuf.appendChild(btnSufUp);
			colSuf.appendChild(visorSuf);
			colSuf.appendChild(btnSufDown);

			carrosselWrap.appendChild(colPref);
			carrosselWrap.appendChild(colRad);
			carrosselWrap.appendChild(colSuf);
			container.appendChild(carrosselWrap);

			// --- 4. BOTÃO VALIDAR REGISTO ---
			const btnValidar = document.createElement('button');
			btnValidar.className = 'btn-validar-carrossel';
			btnValidar.textContent = 'Validar Palavra';
			btnValidar.onclick = () => {
				if (!podeInteragir) return;
				const palavraMontada = (ronda.prefixos[idxPrefixo] || '') + ronda.radical + (ronda.sufixos[idxSufixo] || '');
				const correta = (palavraMontada === ronda.correta);
				
				if (!correta) {
					// Feedback de abanão de erro localizado nas duas roletas móveis
					visorPref.classList.add('erro-vibrante');
					visorSuf.classList.add('erro-vibrante');
					validar(false, btnValidar);
					setTimeout(() => {
						visorPref.classList.remove('erro-vibrante');
						visorSuf.classList.remove('erro-vibrante');
					}, 600);
				} else {
					visorPref.classList.add('sucesso-vibrante');
					visorSuf.classList.add('sucesso-vibrante');
					validar(true, btnValidar);
				}
			};
			container.appendChild(btnValidar);

			area.appendChild(container);
		}

		// L. JOGO L: TIRO AO ALVO ORTOGRÁFICO
		else if (ronda.tipo === 'tiro-alvo') {
			const container = document.createElement('div');
			container.className = 'tiro-alvo-container';

			const painel = document.createElement('div');
			painel.className = 'painel-ortografico';
			painel.innerHTML = ronda.palavraComLacuna;
			container.appendChild(painel);

			const alvosWrap = document.createElement('div');
			alvosWrap.className = 'alvos-container';

			ronda.opcoes.forEach(opt => {
				const btn = document.createElement('button');
				btn.className = 'btn-alvo';
				btn.textContent = opt;
				btn.dataset.length = opt.length;

				btn.onclick = () => {
					if (!podeInteragir) return;
					const correta = (opt === ronda.correta);

					if (correta) {
						tocarSom('flip');
						// Troca dinamicamente o elemento pulsar pelo caractere correto
						const spanGap = painel.querySelector('.gap-pulsar');
						if (spanGap) {
							spanGap.textContent = opt;
							spanGap.classList.remove('gap-pulsar');
							spanGap.style.color = 'var(--cor-sucesso)';
							spanGap.style.borderBottom = 'none';
						}
						setTimeout(() => {
							validar(true, btn);
						}, 300);
					} else {
						validar(false, btn);
					}
				};
				alvosWrap.appendChild(btn);
			});

			container.appendChild(alvosWrap);
			area.appendChild(container);
		}
		
		resetTimerImpaciencia();
	}

/* ==========================================================================
   6. LÓGICA DE COORDENAÇÃO DO JOGO DE LIGAR (DESFAZER E ESTILO)
   ========================================================================== */
	function selecionarLigarEsq(it, b, ronda) {
		if (b.classList.contains('ligado')) {
			tocarSom('flip');
			const parIdx = paresElementosLigar.findIndex(p => p.esqBtn === b || p.dirBtn === b);
			if (parIdx !== -1) {
				const par = paresElementosLigar[parIdx];
				par.esqBtn.classList.remove('ligado');
				par.dirBtn.classList.remove('ligado');
				delete selecoesLigar[par.esqVal];
				paresElementosLigar.splice(parIdx, 1);
			}
			if (selecaoLigar) {
				selecaoLigar.btn.classList.remove('selecionado');
				selecaoLigar = null;
			}
			return;
		}

		if (selecaoLigar && selecaoLigar.btn === b) {
			b.classList.remove('selecionado');
			selecaoLigar = null;
			tocarSom('flip');
			return;
		}

		tocarSom('flip');
		document.querySelectorAll('.coluna-ligar button').forEach(x => x.classList.remove('selecionado'));
		b.classList.add('selecionado');
		selecaoLigar = { val: it, btn: b };
	}

	function selecionarLigarDir(it, b, ronda) {
		if (!selecaoLigar || !podeInteragir) return;
		
		if (b.classList.contains('ligado')) {
			tocarSom('flip');
			const parIdx = paresElementosLigar.findIndex(p => p.esqBtn === b || p.dirBtn === b);
			if (parIdx !== -1) {
				const par = paresElementosLigar[parIdx];
				par.esqBtn.classList.remove('ligado');
				par.dirBtn.classList.remove('ligado');
				delete selecoesLigar[par.esqVal];
				paresElementosLigar.splice(parIdx, 1);
			}
			selecaoLigar = null;
			return;
		}

		const ok = (ronda.pares[selecaoLigar.val] === it);
		
		if (ok) {
			b.classList.add('ligado');
			selecaoLigar.btn.classList.add('ligado');
			selecaoLigar.btn.classList.remove('selecionado');

			selecoesLigar[selecaoLigar.val] = it;
			paresElementosLigar.push({
				esqBtn: selecaoLigar.btn,
				dirBtn: b,
				esqVal: selecaoLigar.val,
				dirVal: it
			});

			selecaoLigar = null;

			const totalPares = Object.keys(ronda.pares).length;
			if (Object.keys(selecoesLigar).length === totalPares) {
				validar(true, b);
			} else {
				tocarSom('acerto');
			}
		} else {
			// Armazena e abana também o botão da esquerda que falhou a ligação
			const esqBtn = selecaoLigar.btn;
			esqBtn.classList.add('erro-vibrante');
			
			validar(false, b);
			
			setTimeout(() => {
				// Limpa apenas o par incorreto, mantendo os outros ligados ativos
				esqBtn.classList.remove('selecionado', 'erro-vibrante');
				selecaoLigar = null;
			}, 600);
		}
	}

/* ==========================================================================
   7. VERIFICAÇÃO E TRANSIÇÕES DE FEEDBACK
   ========================================================================== */
	function validar(correto, el) {
		if (!podeInteragir) return; podeInteragir = false; clearTimeout(timerImpaciencia);
		if (correto) {
			el.classList.add('sucesso-vibrante'); animarMascote('acerto'); tocarSom('decolar'); // Ativa o rugido do motor ao subir!
			
			// ADICIONADO: Reduz o cooldown da dica em caso de acerto!
			if (rondasParaDica > 0) {
				rondasParaDica--;
			}
			atualizarBotaoDica();

			setTimeout(() => { desafioAtual++; if(desafioAtual < 10) { atualizarBarraEstado(); carregarRonda(); } else finalizarJogo(); }, 1600);
		} else {
			el.classList.add('erro-vibrante'); erradas++; atualizarBarraEstado(); animarMascote('erro'); tocarSom('erro');
			setTimeout(() => { el.classList.remove('erro-vibrante'); podeInteragir = true; resetTimerImpaciencia(); }, 600);
		}
	}

	function animarMascote(estado) {
		const container = document.getElementById('mascote-feedback');
		if (!container) return;
		const imgNode = container.querySelector('img');

		// 1. Limpa as classes de animação anteriores do container (onde as animações CSS atuam)
		container.classList.remove('mascote-normal', 'mascote-erro', 'mascote-sucesso');
		void container.offsetWidth; // Truque de Engenharia para reiniciar a animação no navegador

		if (estado === 'normal') {
			if (imgNode) imgNode.src = "img/mascote_normal.png";
			container.classList.add('mascote-normal');
		}
		else if (estado === 'erro') {
			if (imgNode) imgNode.src = "img/mascote_erro.png";
			container.classList.add('mascote-erro');
			// Volta ao estado normal automaticamente após o abanão (0.7s)
			setTimeout(() => animarMascote('normal'), 700);
		}
		else if (estado === 'acerto') {
			if (imgNode) imgNode.src = "img/mascote_acerto.png";
			container.classList.add('mascote-sucesso');
			// Volta ao estado normal automaticamente após o salto (1s)
			setTimeout(() => {
				// Se ainda não acabou o jogo, volta a flutuar
				if (desafioAtual < totalRondas) animarMascote('normal');
			}, 1000);
		}
	}

	function resetTimerImpaciencia() {
		clearTimeout(timerImpaciencia); 
		const btnDica = document.getElementById('btn-dica');
		if(btnDica) btnDica.classList.remove('dica-impaciente');
		timerImpaciencia = setTimeout(() => { if(btnDica) btnDica.classList.add('dica-impaciente'); }, 15000);
	}

	function usarDica() {
		if (rondasParaDica > 0 || !podeInteragir) return;
		
		const ronda = perguntasSorteadas[desafioAtual];
		const configDica = ronda.dica;
		if (!configDica) return;

		tocarSom('flip');

		// 1. Dica tipo TEXTO (Abre Modal)
		if (typeof configDica === 'string') {
			document.getElementById('modal-dica-conteudo').innerHTML = `<p>${configDica}</p>`;
			document.getElementById('modal-ajuda').classList.add('active');
		}
		// 2. Dica tipo HIGHLIGHT (Delega para a função inteligente)
		else if (configDica.tipo === 'highlight') {
			aplicarHighlightRespostaCorreta(ronda);
		}
		// 3. Dica tipo 50-50 ou RETIRAR-UM
		else if (configDica.tipo === '50-50' || configDica.tipo === 'retirar-um') {
			
			// SALVAGUARDA DE SEGURANÇA: Se o tipo de ronda não suportar eliminação,
			// reverte silenciosamente para a dica de realce e evita que o jogo quebre.
			if (ronda.tipo !== 'multipla' && ronda.tipo !== 'lacunas') {
				aplicarHighlightRespostaCorreta(ronda);
				rondasParaDica = COOLDOWN_DICA;
				atualizarBotaoDica();
				return;
			}

			// Seleciona botões que não estão desativados nem ligados
			const botoes = Array.from(document.querySelectorAll('.btn-opcao-vibrante:not(.ligado), .palavra-banco:not([disabled])'));
			let errados = botoes.filter(btn => {
				const texto = btn.textContent.trim();
				const imgInside = btn.querySelector('img')?.getAttribute('src');
				
				// Verifica se é a correta (suporta texto ou imagem)
				const isCorretaMultipla = (texto === ronda.correta || imgInside === ronda.correta);
				const isCorretaLacuna = ronda.respostas && ronda.respostas.includes(texto);
				
				return !isCorretaMultipla && !isCorretaLacuna;
			});

			errados = baralharArray(errados);
			const qtdParaEsconder = (configDica.tipo === '50-50') ? Math.max(1, Math.floor(errados.length / 2)) : 1;

			for (let i = 0; i < qtdParaEsconder; i++) {
				errados[i].style.opacity = '0.2';
				errados[i].style.pointerEvents = 'none';
				errados[i].setAttribute('disabled', 'true');
			}
			showToast("O amigo Papagaio removeu uma opção errada!");
		}

		rondasParaDica = COOLDOWN_DICA;
		atualizarBotaoDica();
	}

	function fecharModalDica() { document.getElementById('modal-ajuda').classList.remove('active'); }

	function finalizarJogo() {
		document.getElementById('mascote-feedback').style.display = "none";
		mostrarEcra('ecra-fim');
		document.getElementById('final-erros').textContent = erradas;
		const rank = document.getElementById('rank-container');
		let img = erradas === 0 ? "rank_ouro.svg" : (erradas <= 3 ? "rank_prata.svg" : "rank_bronze.svg");
		rank.innerHTML = `<img src="../../../SVG/${img}" class="taca-vitoria" style="width:120px;">`;
		tocarSom('vitoria'); dispararConfetis();
	}

	function voltarAoMenuPrincipal() {
		mostrarEcra('ecra-selecao');
		document.getElementById('mascote-feedback').style.display = "none";
		document.getElementById('subtitulo-header').textContent = "Uma viagem pelo poder dos pronomes nas frases!";
		limparConfetis();
	}

	function confirmarSair() {
		voltarAoMenuPrincipal();
	}

	function reiniciarJogo() { prepararJogo(sistemaAtivo); limparConfetis();}

/* ==========================================================================
   8. ÁUDIO, CONFETIS E AUXILIARES (COM COMPATIBILIDADE SEGURA)
   ========================================================================== */
	const AudioContextClass = window.AudioContext || window.webkitAudioContext;
	let audioCtx = null;

	function initAudio() {
		try {
			if (!AudioContextClass) return;
			if (!audioCtx) {
				audioCtx = new AudioContextClass();
			}
			if (audioCtx && audioCtx.state === 'suspended') {
				audioCtx.resume().catch(e => console.warn("Aviso: Não foi possível retomar o AudioContext:", e));
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha na inicialização do AudioContext:", error);
			audioCtx = null;
		}
	}

	document.addEventListener('pointerdown', initAudio, { once: true });

	function baralharArray(arr) {
		let array = [...arr];
		for (let i = array.length - 1; i > 0; i--) {
			const j = Math.floor(Math.random() * (i + 1));
			[array[i], array[j]] = [array[j], array[i]];
		}
		return array;
	}

	function obterCoresAleatorias(quantidade) {
		const coresTemplate = ['bg-azul', 'bg-amarelo', 'bg-roxo', 'bg-laranja', 'bg-rosa', 'bg-turquesa', 'bg-vermelho'];
		const baralhadas = baralharArray(coresTemplate);
		return baralhadas.slice(0, quantidade);
	}

	function tocarSom(t) {
		try {
			initAudio();
			if (!audioCtx) return;
			const agora = audioCtx.currentTime; // Variável unificada como agora

			if (t === 'acerto') {
				const notas = [783.99, 1046.50];
				notas.forEach((freq, i) => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'sine';
					o.frequency.value = freq;
					g.gain.setValueAtTime(0, agora + i * 0.12);
					g.gain.linearRampToValueAtTime(0.08, agora + i * 0.12 + 0.02);
					g.gain.exponentialRampToValueAtTime(0.001, agora + i * 0.12 + 0.3);
					o.start(agora + i * 0.12);
					o.stop(agora + i * 0.12 + 0.3);
				});
			} else if (t === 'erro') {
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'triangle';
				o.frequency.setValueAtTime(220, agora);
				o.frequency.exponentialRampToValueAtTime(80, agora + 0.3);
				g.gain.setValueAtTime(0.08, agora);
				o.start(agora);
				o.stop(agora + 0.3);
			} else if (t === 'vitoria') {
				const melodia = [
					{ freq: 523.25, tempo: 0.00, duracao: 0.15 }, 
					{ freq: 659.25, tempo: 0.15, duracao: 0.15 }, 
					{ freq: 783.99, tempo: 0.30, duracao: 0.20 }, 
					{ freq: 659.25, tempo: 0.50, duracao: 0.15 }, 
					{ freq: 1046.50, tempo: 0.65, duracao: 0.70 } 
				];
				melodia.forEach(nota => {
					const o = audioCtx.createOscillator();
					const g = audioCtx.createGain();
					o.connect(g); g.connect(audioCtx.destination);
					o.type = 'triangle'; 
					o.frequency.value = nota.freq;
					g.gain.setValueAtTime(0.08, agora + nota.tempo);
					g.gain.exponentialRampToValueAtTime(0.001, agora + nota.tempo + nota.duracao);
					o.start(agora + nota.tempo);
					o.stop(agora + nota.tempo + nota.duracao);
				});
			} else if (t === 'decolar') {
				// NOVO: Som de Propulsão Sci-Fi Limpo e Cristalino (Zwoooop!)
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine'; // Onda 100% pura e limpa, sem qualquer distorção
				o.frequency.setValueAtTime(150, agora);
				// Varredura exponencial ascendente muito rápida (efeito de aceleração para o espaço)
				o.frequency.exponentialRampToValueAtTime(1800, agora + 0.8); 
				g.gain.setValueAtTime(0, agora);
				g.gain.linearRampToValueAtTime(0.12, agora + 0.05); // Ataque de ignição rápido
				g.gain.exponentialRampToValueAtTime(0.001, agora + 0.8); // Desvanece suavemente
				o.start(agora);
				o.stop(agora + 0.8);
			} else if (t === 'flip') { // CORREÇÃO: Removida a chaveta extra "}" que quebrava a sintaxe aqui
				const o = audioCtx.createOscillator();
				const g = audioCtx.createGain();
				o.connect(g); g.connect(audioCtx.destination);
				o.type = 'sine';
				o.frequency.setValueAtTime(400, agora);
				o.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
				g.gain.setValueAtTime(0.05, agora);
				o.start(agora);
				o.stop(agora + 0.1);
			}
		} catch (error) {
			console.warn("Aviso: Ocorreu uma falha ao tentar reproduzir o áudio sintetizado:", error);
		}
	}

	function dispararConfetis() {
		const c = document.getElementById('confetti-container');
		if (!c) return;
		c.innerHTML = '';
		const cores = ['#ff4757', '#2ed573', '#0091ff', '#fbc531'];
		for (let i = 0; i < 120; i++) {
			const d = document.createElement('div');
			d.className = 'confetti';
			d.style.left = Math.random() * 100 + '%';
			d.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];
			
			const escala = Math.random() * 0.8 + 0.4;
			const duracao = Math.random() * 2 + 2.5;
			const atraso = Math.random() * 1.5;
			
			d.style.animationDuration = duracao + 's';
			d.style.animationDelay = atraso + 's';
			d.style.transform = `scale(${escala})`;
			
			c.appendChild(d);
			setTimeout(() => d.remove(), (duracao + atraso) * 1000);
		}
	}

	function limparConfetis() {
		const container = document.getElementById('confetti-container');
		if (container) {
			container.innerHTML = '';
		}
	}

	function aplicarHighlightRespostaCorreta(ronda) {
		// Seleciona todos os elementos interativos possíveis
		const todosBotoes = document.querySelectorAll('.btn-opcao-vibrante, .btn-opcao, .bloco-arrastar, .palavra-banco, .cartao-opcao-visual');

		/* A. CASO: ESCOLHA MÚLTIPLA */
		if (ronda.tipo === 'multipla') {
			todosBotoes.forEach(btn => {
				const texto = btn.textContent.trim();
				const imgInside = btn.querySelector('img')?.getAttribute('src');
				// Verifica se o texto ou o SRC da imagem coincide com a resposta certa
				if (texto === ronda.correta || imgInside === ronda.correta) {
					btn.classList.add('highlight-correto');
					setTimeout(() => btn.classList.remove('highlight-correto'), 4000);
				}
			});
		}

		/* B. CASO: LIGAR (Lógica Inteligente) */
		else if (ronda.tipo === 'ligar') {
			// Encontra o primeiro par da esquerda que AINDA NÃO está ligado
			const parPendente = Object.entries(ronda.pares).find(([esq, dir]) => {
				const btnEsq = Array.from(todosBotoes).find(b => b.textContent.trim() === esq);
				return btnEsq && !btnEsq.classList.contains('ligado');
			});

			if (parPendente) {
				const [valEsq, valDir] = parPendente;
				todosBotoes.forEach(btn => {
					const txt = btn.textContent.trim();
					if (txt === valEsq || txt === valDir) {
						btn.classList.add('highlight-correto');
						setTimeout(() => btn.classList.remove('highlight-correto'), 4000);
					}
				});
			}
		}

		/* C. CASO: ARRASTAR OU MAPA */
		else if (ronda.tipo === 'arrastar' || ronda.tipo === 'mapa') {
			// Encontra o primeiro item que ainda não foi colocado no alvo
			const itemPendente = Object.keys(ronda.pares).find(item => !selecoesArrastar[item]);

			if (itemPendente) {
				todosBotoes.forEach(el => {
					if (el.textContent.trim() === itemPendente) {
						el.classList.add('highlight-correto');
						setTimeout(() => el.classList.remove('highlight-correto'), 4000);
					}
				});
				showToast("Observa o destaque!");
			}
		}
	}
	
	function showToast(mensagem) {
		const toast = document.getElementById('toast-msg');
		if (toast) {
			toast.textContent = mensagem;
			toast.classList.add('active');
			setTimeout(() => toast.classList.remove('active'), 2500);
		}
	}
