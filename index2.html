<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brincar e Aprender 🧩</title>
    
    <link rel="icon" type="image/png" href="logo.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            
            /* Cores dos Cartões mantidas */
            --cor-pre: #81e6d9;
            --cor-1ano: var(--azul-vibrante);
            --cor-2ano: #e7d83f;
            --cor-3ano: #feb2b2;
            --cor-4ano: #b197fc;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            /* Padrão escolar subtil de pintinhas no fundo */
            background-image: radial-gradient(rgba(13, 71, 161, 0.06) 2px, transparent 2px);
            background-size: 25px 25px;
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; /* Força a ocupar exatamente a altura do ecrã */
            overflow: hidden; /* Tranca o Scroll - Regra de Ouro */
        }
		
		@media (min-width: 769px) { body { height: 100vh; overflow-y: auto; } }

        /* =========================================
           CABEÇALHO RESPONSIVO
           ========================================= */
        header {
            background-color: var(--bg-header-footer);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            z-index: 100;
            flex-shrink: 0; /* Impede o cabeçalho de encolher */
        }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.2rem, 4.5vw, 2.5rem); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            white-space: nowrap; 
        }

        /* Imagens Laterais do Título (esq.png e dir.png) */
        .img-titulo-esq {
            height: 1.1em; /* 1.3em garante que é só um bocadinho maior que a letra do título */
            width: auto;
            object-fit: contain;
            margin: 0 clamp(5px, 2vw, 15px);
			transform: rotate(-7deg);
        }
		
		.img-titulo-dir {
            height: 1.1em; /* 1.3em garante que é só um bocadinho maior que a letra do título */
            width: auto;
            object-fit: contain;
            margin: 0 clamp(5px, 2vw, 15px);
			transform: rotate(7deg);
        }

        p.subtitulo {
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 2.5vw, 1.2rem);
            font-weight: 500;
            margin-top: 15px;
            margin-bottom: 0;
            opacity: 0.8;
        }

        /* =========================================
           GALERIA DE CARTÕES (A GRELHA MUTANTE)
           ========================================= */
        .galeria-container {
            flex: 1; /* Ocupa o espaço entre o cabeçalho e o rodapé */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 3vh, 30px) 15px;
            width: 100%;
            min-height: 0; /* Fundamental para o Flexbox não empurrar o footer */
        }

        .grelha-cartoes {
            display: grid;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            gap: clamp(10px, 2vw, 25px);
            align-content: center; /* Centra tudo verticalmente no meio da página */
        }

        /* O Cartão Padrão */
        .cartao-ano {
            background-color: white;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 9px 0px rgba(0,0,0,0.05);
            border: 6px solid white;
            padding: 10px;
        }

        /* Animação original mantida: o cartão levanta-se todo */
        @media (hover: hover) {
            .cartao-ano:hover {
                transform: translateY(-8px);
                box-shadow: 0 15px 25px rgba(0,0,0,0.15);
            }
        }
        .cartao-ano:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.05); }

        /* A Imagem do Cartão (Substitui o Emoji) */
        .img-ano {
            width: 90%; /* 60% do tamanho total do cartão */
            height: 90%;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); /* Sombra suave na imagem */
        }

        .titulo-ano {
            color: white;
            font-weight: 700;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            text-shadow: 1px 2px 3px rgba(0,0,0,0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Cores de Fundo dos Cartões */
        .pre { background-color: var(--cor-pre); }
        .ano1 { background-color: var(--cor-1ano); }
        .ano2 { background-color: var(--cor-2ano); }
        .ano3 { background-color: var(--cor-3ano); }
        .ano4 { background-color: var(--cor-4ano); }


        /* =========================================
           LÓGICA RESPONSIVA (A MÁGICA DO LAYOUT)
           ========================================= */

        /* 1. Ecrãs de PC (Tudo na mesma linha: 5 Colunas) */
        @media (min-width: 901px) {
            .grelha-cartoes {
                grid-template-columns: repeat(5, 1fr);
                max-height: 260px; /* Impede que fiquem esticados e gigantes num ecrã muito alto */
            }
        }

        /* 2. Tablets na Horizontal / Laptops Pequenos (3 em cima, 2 em baixo) */
        @media (min-width: 601px) and (max-width: 900px) {
            .grelha-cartoes {
                grid-template-columns: repeat(6, 1fr); /* Grelha invisível de 6 blocos */
                grid-template-rows: 1fr 1fr;
                max-height: 480px;
            }
            /* Encaixe matemático perfeito para os centrar */
            .cartao-ano.pre  { grid-column: 1 / 3; }
            .cartao-ano.ano1 { grid-column: 3 / 5; }
            .cartao-ano.ano2 { grid-column: 5 / 7; }
            .cartao-ano.ano3 { grid-column: 2 / 4; }
            .cartao-ano.ano4 { grid-column: 4 / 6; }
        }

        /* 3. Telemóveis na Vertical e Tablets pequenos (A "Grelha Bloco": 1 + 2 + 2) */
        @media (max-width: 600px), (max-height: 600px) {
            .grelha-cartoes {
                grid-template-columns: 1fr 1fr; /* 2 Colunas */
                grid-template-rows: 1fr 1fr 1fr; /* 3 Linhas */
                gap: 12px;
            }
            .cartao-ano { padding: 5px; }
            
            /* Cartão Pré-Escolar ocupa a largura toda na linha 1 */
            .cartao-ano.pre { 
                grid-column: 1 / 3; 
                flex-direction: row; /* Muda a imagem para o lado do texto para não gastar altura! */
                justify-content: center;
                gap: 15px;
            }
            /* A imagem do Pré adapta-se à linha deitada */
            .cartao-ano.pre .img-ano {
                width: auto;
                height: 60%;
                margin-bottom: 0;
            }
            
            /* Restantes cartões: 2 por linha */
            .cartao-ano.ano1 { grid-column: 1 / 2; }
            .cartao-ano.ano2 { grid-column: 2 / 3; }
            .cartao-ano.ano3 { grid-column: 1 / 2; }
            .cartao-ano.ano4 { grid-column: 2 / 3; }
        }

        /* Proteção para ecrãs de telemóvel extremamente pequenos (Ocultar imagens laterais do título) */
        @media (max-width: 400px) {
            .img-titulo-esq { display: none; }
			.img-titulo-dir { display: none; }
        }

        /* =========================================
           RODAPÉ (FOOTER)
           ========================================= */
        footer {
            flex-shrink: 0;
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-header-footer);
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
			height: 45px;
        }
        footer p { font-size: 0.8rem; font-weight: 700; color: var(--azul-escuro); margin: 0; line-height: 1.4; }
        footer a { color: var(--azul-vibrante); text-decoration: none; transition: 0.2s; }
        

    body { scrollbar-gutter: stable; }
</style>
</head>
<body>

<header>
    <h1>
        <img src="img/esq.png" alt="Esquerda" class="img-titulo-esq">
        Vamos Brincar e Aprender 
        <img src="img/dir.png" alt="Direita" class="img-titulo-dir">
    </h1>
    <p class="subtitulo">Escolhe o teu ano e diverte-te! ✨</p>
</header>

<main class="galeria-container">
    <div class="grelha-cartoes">
        
        <a href="pre/" class="cartao-ano pre">
            <img src="img/pre.png" alt="Pré-Escolar" class="img-ano">
            <span class="titulo-ano">PRÉ-ESCOLAR</span>
        </a>

        <a href="1/" class="cartao-ano ano1">
            <img src="img/1_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">1º ANO</span>
        </a>

        <a href="2/" class="cartao-ano ano2">
            <img src="img/2_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">2º ANO</span>
        </a>

        <a href="3/" class="cartao-ano ano3">
            <img src="img/3_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">3º ANO</span>
        </a>

        <a href="4/" class="cartao-ano ano4">
            <img src="img/4_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">4º ANO</span>
        </a>

    </div>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a> | Desenvolvido por Professor Eduardo
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
