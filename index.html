<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brincar e Aprender 🧩</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --cor-pre: #81e6d9;
            --cor-1ano: var(--azul-vibrante);
            --cor-2ano: #e7d83f;
            --cor-3ano: #feb2b2;
            --cor-4ano: #b197fc;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            background-image: radial-gradient(rgba(13, 71, 161, 0.06) 2px, transparent 2px);
            background-size: 25px 25px;
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100svh; /* svh garante a altura exata descontando barras no mobile */
            overflow: hidden; /* Tranca a página inteira! Header e Footer fixos */
        }

        /* =========================================
           CABEÇALHO RESPONSIVO
           ========================================= */
        header {
            background-color: var(--bg-header-footer);
            padding: clamp(15px, 2.5vh, 25px) 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            z-index: 100;
            flex-shrink: 0; 
        }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.2rem, 4.5vw, 2.5rem); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            white-space: nowrap; 
        }

        /* =========================================
		   ANIMAÇÃO DAS IMAGENS DO TÍTULO
		   ========================================= */
		.img-titulo-esq, .img-titulo-dir {
			height: 1.1em; 
			width: auto;
			object-fit: contain;
			margin: 0 clamp(5px, 2vw, 15px);
			transform-origin: bottom center; /* Ponto de rotação na base, igual à mascote */
		}

		.img-titulo-esq { 
			animation: acenoEsq 4s ease-in-out infinite; 
		}

		.img-titulo-dir { 
			animation: acenoDir 4s ease-in-out infinite; 
		}

		/* Animação Esquerda: Balança de -7º para -15º */
		@keyframes acenoEsq {
			0%, 100% { transform: rotate(0deg) scale(1); }
			50%      { transform: rotate(0deg) scale(1.15); }
		}

		/* Animação Direita: Balança de 7º para 15º (Efeito Espelho) */
		@keyframes acenoDir {
			0%, 100% { transform: rotate(0deg) scale(1); }
			50%      { transform: rotate(0deg) scale(1.15); }
		}

        p.subtitulo {
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 2.5vw, 1.2rem);
            font-weight: 500;
            margin-top: clamp(8px, 2vh, 15px);
            margin-bottom: 0;
            opacity: 0.8;
        }

        /* =========================================
           GALERIA DE CARTÕES (ZONA CENTRAL)
           ========================================= */
        .galeria-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: clamp(10px, 3vh, 30px) 15px;
            width: 100%;
            overflow-y: auto; /* Scroll vertical apenas aqui */
            scrollbar-gutter: stable;
			position: relative; z-index: 1;
        }

        .grelha-cartoes {
            display: grid;
            width: 100%;
            max-width: 1100px;
            margin: auto;
            gap: clamp(10px, 2vw, 25px);
        }

        /* =========================================
           O CARTÃO PADRÃO
           ========================================= */
        .cartao-ano {
            background-color: white;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 6px solid white;
            padding: 10px;
            position: relative; 
        }

        @media (hover: hover) {
            .cartao-ano:hover {
                transform: translateY(-8px);
            }
        }

        .cartao-ano:active { 
            transform: translateY(4px); 
        }

        /* ========================================================
           FEIXE LASER (ATIVAR APENAS EM DESKTOP)
           ======================================================== */
        @media (min-width: 1024px) {
            .cartao-ano::after {
                content: "";
                position: absolute;
                background-color: #FFF;
                border-radius: 4px;
                box-shadow: 0 0 10px #FFF, 0 0 20px #FFF; 
                pointer-events: none;
                z-index: 2;
                opacity: 0; 
                animation: rastoLaserSequencial 18s linear infinite;
            }

            .cartao-ano.pre::after   { animation-delay: 0s; }
            .cartao-ano.ano1::after  { animation-delay: 3.5s; }
            .cartao-ano.ano2::after  { animation-delay: 7s; }
            .cartao-ano.ano3::after  { animation-delay: 10.5s; }
            .cartao-ano.ano4::after  { animation-delay: 14s; }

            @keyframes rastoLaserSequencial {
                /* --- TOPO --- */
                0% { top: -2px; left: -2px; width: 40px; height: 4px; opacity: 0; }
                0.2% { opacity: 1; }
                2.0% { top: -2px; left: calc(100% - 38px); width: 40px; height: 4px; }
                
                /* --- DIREITA --- */
                2.1% { top: -2px; left: calc(100% - 2px); width: 4px; height: 40px; }
                4.0% { top: calc(100% - 38px); left: calc(100% - 2px); width: 4px; height: 40px; }
                
                /* --- BAIXO --- */
                4.1% { top: calc(100% - 2px); left: calc(100% - 38px); width: 40px; height: 4px; }
                6.0% { top: calc(100% - 2px); left: -2px; width: 40px; height: 4px; }
                
                /* --- ESQUERDA --- */
                6.1% { top: calc(100% - 40px); left: -2px; width: 4px; height: 40px; }
                8.0% { top: -2px; left: -2px; width: 4px; height: 40px; opacity: 1; }
                
                /* --- PAUSA FINAL --- */
                8.1%, 100% { top: -2px; left: -2px; width: 40px; height: 4px; opacity: 0; }
            }
        }

        /* =========================================
           ANIMAÇÃO PULSAR IMAGENS
           ========================================= */
        .img-ano {          
            width: 95%;             
            flex: 1;            
            min-height: 0;          
            object-fit: contain;            
            margin-bottom: 8px;         
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); 
            animation: pulsarSuave 2.5s ease-in-out infinite;
        }

        .cartao-ano:nth-child(1) .img-ano { animation-delay: 0s; }
        .cartao-ano:nth-child(2) .img-ano { animation-delay: 0.4s; }
        .cartao-ano:nth-child(3) .img-ano { animation-delay: 0.8s; }
        .cartao-ano:nth-child(4) .img-ano { animation-delay: 1.2s; }
        .cartao-ano:nth-child(5) .img-ano { animation-delay: 1.6s; }

        @keyframes pulsarSuave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        .titulo-ano {
            color: white;
            font-weight: 700;
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            text-shadow: 1px 2px 3px rgba(0,0,0,0.15);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            flex-shrink: 0; 
        }

        /* =========================================
           CORES DE FUNDO (COLOR-MIX)
           ========================================= */
        .pre  { background-color: var(--cor-pre);  box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-pre), transparent 60%); }
        .ano1 { background-color: var(--cor-1ano); box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-1ano), transparent 60%); }
        .ano2 { background-color: var(--cor-2ano); box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-2ano), transparent 60%); }
        .ano3 { background-color: var(--cor-3ano); box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-3ano), transparent 60%); }
        .ano4 { background-color: var(--cor-4ano); box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-4ano), transparent 60%); }

        @media (hover: hover) {
            .pre:hover  { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-pre), transparent 30%); }
            .ano1:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-1ano), transparent 30%); }
            .ano2:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-2ano), transparent 30%); }
            .ano3:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-3ano), transparent 30%); }
            .ano4:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-4ano), transparent 30%); }
        }
		
		
		/* =========================================
		   NOVA ÁREA ACIMA DO RODAPÉ
		   ========================================= */
		.zona-adicional-footer {
			flex-shrink: 0; /* Impede que a galeria "esmague" esta área */
			width: 100%;
			/*background: linear-gradient(to top, #ffffff, #f0f7ff);*/
			padding: 10px 20px;
			/* border-top: 1px solid color-mix(in srgb, var(--azul-vibrante), transparent 80%); */
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.zona-adicional-footer p {
			font-size: 0.75rem;
			color: var(--azul-escuro);
			margin: 0;
			opacity: 0.8;
		}
		

        /* =========================================
           LÓGICA RESPONSIVA (MEDIA QUERIES)
           ========================================= */
        @media (min-width: 901px) {
            .grelha-cartoes { grid-template-columns: repeat(5, 1fr); max-height: 280px; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .grelha-cartoes { grid-template-columns: repeat(6, 1fr); grid-template-rows: 1fr 1fr; }
            .cartao-ano { padding: 15px; } 
            .cartao-ano.pre  { grid-column: 1 / 3; }
            .cartao-ano.ano1 { grid-column: 3 / 5; }
            .cartao-ano.ano2 { grid-column: 5 / 7; }
            .cartao-ano.ano3 { grid-column: 2 / 4; }
            .cartao-ano.ano4 { grid-column: 4 / 6; }
        }

        @media (max-width: 600px) {
            .grelha-cartoes { grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 12px; }
            .cartao-ano { padding: 8px; aspect-ratio: 1 / 0.85; }
            .cartao-ano.pre { grid-column: 1 / 3; justify-self: center; width: calc(50% - 6px); aspect-ratio: 1 / 0.85; }
            .cartao-ano.ano1 { grid-column: 1 / 2; }
            .cartao-ano.ano2 { grid-column: 2 / 3; }
            .cartao-ano.ano3 { grid-column: 1 / 2; }
            .cartao-ano.ano4 { grid-column: 2 / 3; }
        }

        @media (max-width: 400px) {
            .img-titulo-esq, .img-titulo-dir { display: none; }
        }
        
        @media (max-height: 500px) and (orientation: landscape) {
            header { padding: 8px 15px; }
            h1 { font-size: 1.2rem; }
            .img-titulo-esq, .img-titulo-dir { height: 1em; }
            p.subtitulo { display: none; }
            .grelha-cartoes { grid-template-columns: repeat(5, 1fr); grid-auto-rows: 1fr; gap: 8px; height: 100%; max-height: none; }
            .cartao-ano { padding: 5px; aspect-ratio: auto; justify-content: space-evenly; }
            .cartao-ano.pre, .cartao-ano.ano1, .cartao-ano.ano2, .cartao-ano.ano3, .cartao-ano.ano4 { grid-column: span 1; width: 100%; }
            .titulo-ano { font-size: clamp(0.6rem, 1.5vw, 0.9rem); margin-bottom: 0; }
            .img-ano { margin-bottom: 2px; }
        }

        /* =========================================
           RODAPÉ (FOOTER)
           ========================================= */
        footer {
			flex-shrink: 0;
			padding: 15px 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--bg-header-footer);
			border-top: 1px solid var(--azul-vibrante);
			width: 100%;
			height: 45px;
		}
        footer p { font-size: 0.8rem; font-weight: 700; color: var(--azul-escuro); margin: 0; line-height: 1.4; }
        footer a { color: var(--azul-vibrante); text-decoration: none; transition: 0.2s; }
		
		.zona-adicional-footer, footer {
			position: relative; /* Essencial para o z-index funcionar! */
			z-index: 10;        /* Coloca estas zonas bem à frente das partículas */
		}
        
        .icon-svg-footer { width: 2.3em; height: 2.3em; vertical-align: middle; margin-right:5px; margin-left: 7px; object-fit: contain; }
        .icon-svg-titulo { width: 1em; height: 1em; vertical-align: middle; object-fit: contain; }
		
				
		/* =========================================
           NÚMERO DE JOGOS CANTO SUPERIOR DIREITO
           ========================================= */
		/* O Badge Base (Responsivo) */
		.badge-jogos {
			position: absolute;
			top: -10px;
			right: -10px;
			background-color: #ff9800;
			color: white;
			font-size: clamp(0.75rem, 2vw, 0.9rem); /* Cresce e encolhe com o ecrã */
			font-weight: 900;
			padding: 5px 12px;
			border-radius: 20px;
			border: 3px solid white;
			box-shadow: 0 4px 8px rgba(0,0,0,0.15);
			z-index: 10;
			transform: rotate(5deg);
			display: flex;
			align-items: center;
			gap: 4px; /* Espaço entre o número e a palavra */
		}

		/* Esconder a palavra "Jogos" em Mobile Vertical (Portrait) */
		@media (max-width: 480px) and (orientation: portrait) {
			.badge-jogos .txt {
				display: none; /* A palavra desaparece */
			}
			.badge-jogos {
				padding: 5px 10px; /* Ajusta o padding para ficar um círculo/quadrado mais bonito só com o número */
				border-radius: 50%; /* Fica em formato de bolinha no telemóvel */
				right: -5px; /* Ajusta a posição para não sair muito fora do ecrã */
			}
		}
		
		/* =========================================
		   BACKGROUND DINÂMICO (PARTÍCULAS)
		   ========================================= */
		.background-animado {
			position: absolute;
			top: 0; left: 0;
			width: 100%; height: 100%;
			overflow: hidden;
			z-index: 0; 
			pointer-events: none; /* Garante que não bloqueia os cliques nos cartões! */
		}

		/* Base de cada partícula (são círculos e quadrados arredondados) */
		.particula {
			position: absolute;
			border-radius: 40%; /* Forma ligeiramente orgânica, entre quadrado e círculo */
			opacity: 0;
			animation: flutuarParticula linear infinite;
		}

		/* Cores, tamanhos e velocidades diferentes para parecer aleatório e natural */
		.p1 { width: 30px; height: 30px; background: var(--cor-1ano); left: 10%; bottom: -50px; animation-duration: 15s; }
		.p2 { width: 20px; height: 20px; background: var(--cor-2ano); left: 30%; bottom: -50px; animation-duration: 12s; animation-delay: 2s; }
		.p3 { width: 40px; height: 40px; background: var(--cor-3ano); left: 60%; bottom: -50px; animation-duration: 18s; animation-delay: 4s; }
		.p4 { width: 25px; height: 25px; background: var(--cor-4ano); left: 85%; bottom: -50px; animation-duration: 14s; animation-delay: 1s; }
		.p5 { width: 15px; height: 15px; background: var(--cor-pre);  left: 45%; bottom: -50px; animation-duration: 10s; animation-delay: 5s; }
		.p6 { width: 35px; height: 35px; background: var(--azul-vibrante); left: 75%; bottom: -50px; animation-duration: 20s; animation-delay: 3s; }

		/* A magia do movimento */
		@keyframes flutuarParticula {
			0% { transform: translateY(0) translateX(0) rotate(0deg) scale(1); opacity: 0; }
			10% { opacity: 0.3; }
			50% { transform: translateY(-60vh) translateX(40px) rotate(180deg) scale(1.1); } /* Desvia para a direita e incha um bocadinho */
			90% { opacity: 0.3; }
			100% { transform: translateY(-120vh) translateX(-40px) rotate(360deg) scale(1); opacity: 0; } /* Desvia para a esquerda antes de sumir */
		}
		
		
		/* =========================================
		  ANIMAÇÃO DE SUCESSO NO CLIQUE
		========================================= */
		.cartao-clicado {
			/* Força a animação a sobrepor-se a outros hovers */
			animation: puloSucesso 0.4s ease-out forwards !important;
			pointer-events: none; /* Impede que a criança clique várias vezes seguidas por engano */
		}

		@keyframes puloSucesso {
			0%   { transform: scale(1); }
			40%  { transform: scale(0.9); } /* Afunda para dentro (espremido) */
			70%  { transform: scale(1.05); } /* Dá um pequeno salto para fora */
			100% { transform: scale(1);  } /* Volta ao normal e desaparece suavemente */
		}
		
		
    </style>
</head>
<body>
<div class="background-animado">
    <div class="particula p1"></div>
    <div class="particula p2"></div>
    <div class="particula p3"></div>
    <div class="particula p4"></div>
    <div class="particula p5"></div>
    <div class="particula p6"></div>
</div>
<header>
    
	<h1>
        <img src="img/esq.png" alt="Esquerda" class="img-titulo-esq">
        Vamos Brincar e Aprender 
        <img src="img/dir.png" alt="Direita" class="img-titulo-dir">
    </h1>
    <p class="subtitulo">Escolhe o teu ano e diverte-te! <img src="SVG/estrelas.svg" class="icon-svg-titulo" alt="Estrelas"></p>
</header>

<main class="galeria-container">
    <div class="grelha-cartoes">
        
        <a href="pre/" class="cartao-ano pre">
            <div class="badge-jogos" id="badge-pre">
				<span class="num">0</span><span class="txt"> Jogos</span>
			</div>
			<img src="img/pre_v1.png" alt="Desenho Pré-Escolar" class="img-ano">
            <span class="titulo-ano">PRÉ-ESCOLAR</span>
        </a>

        <a href="1/" class="cartao-ano ano1">
            <div class="badge-jogos" id="badge-ano1">
				<span class="num">0</span><span class="txt"> Jogos</span>
			</div>
			<img src="img/1_ano_v1.png" alt="Desenho 1º Ano" class="img-ano">
            <span class="titulo-ano">1º ANO</span>
        </a>

        <a href="2/" class="cartao-ano ano2">
            <div class="badge-jogos" id="badge-ano2">
				<span class="num">0</span><span class="txt"> Jogos</span>
			</div>
			<img src="img/2_ano_v1.png" alt="Desenho 2º Ano" class="img-ano">
            <span class="titulo-ano">2º ANO</span>
        </a>

        <a href="3/" class="cartao-ano ano3">
            <div class="badge-jogos" id="badge-ano3">
				<span class="num">0</span><span class="txt"> Jogos</span>
			</div>
			<img src="img/3_ano_v1.png" alt="Desenho 3º Ano" class="img-ano">
            <span class="titulo-ano">3º ANO</span>
        </a>

        <a href="4/" class="cartao-ano ano4">
            <div class="badge-jogos" id="badge-ano4">
				<span class="num">0</span><span class="txt"> Jogos</span>
			</div>
			<img src="img/4_ano_v1.png" alt="Desenho 4º Ano" class="img-ano">
            <span class="titulo-ano">4º ANO</span>
        </a>

    </div>
</main>
</main> <div class="zona-adicional-footer">
    <p><img src="SVG/edu.svg" class="icon-svg-footer" alt="Desenvolvedor"> Desenvolvido por <strong>Professor Eduardo</p>
</div>
<footer>
    <p>
        <span id="ano-atual" style="color: var(--azul-vibrante);"></span> 
        <img src="SVG/1_ano.webp" class="icon-svg-footer" alt="Ícone Ano"> 
        <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    // Define o ano atual dinamicamente
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    
    // Escolhe um set aleatório de imagens ao carregar a página
    document.addEventListener("DOMContentLoaded", function() {
        const numeroDeSets = 5;
        const setEscolhido = Math.floor(Math.random() * numeroDeSets) + 1;
        const namesBase = ["pre", "1_ano", "2_ano", "3_ano", "4_ano"];
        const imagens = document.querySelectorAll(".cartao-ano .img-ano");
        
        imagens.forEach((img, index) => {
            img.src = `img/${namesBase[index]}_v${setEscolhido}.png`;
        });
    });
	
	// =========================================
	// EFEITO DE CLIQUE NOS CARTÕES
	// =========================================
	const cartoes = document.querySelectorAll('.cartao-ano');

	cartoes.forEach(cartao => {
		cartao.addEventListener('click', function(evento) {
			// 1. Impede que o link mude de página instantaneamente
			evento.preventDefault(); 
			
			// 2. Guarda o destino da página (ex: "1/")
			const linkDestino = this.getAttribute('href');
			
			// 3. Adiciona a classe que faz a animação CSS acontecer
			this.classList.add('cartao-clicado');
			
			// 4. Espera 400 milissegundos (o tempo da animação) e depois muda a página
			setTimeout(() => {
				window.location.href = linkDestino;
			}, 400);
		});
	});
	
	// =========================================
	// LEITURA E CONTAGEM DOS JOGOS (MODO TEXTO)
	// =========================================

	// 1. Criamos uma lista com o ID do badge e o caminho exato do ficheiro a ler
	const diretoriosJogos = [
		{ id: 'badge-pre', url: 'pre/catalogo-pre.js' },
		{ id: 'badge-ano1', url: '1/catalogo-1ano.js' },
		{ id: 'badge-ano2', url: '2/catalogo-2ano.js' },
		{ id: 'badge-ano3', url: '3/catalogo-3ano.js' },
		{ id: 'badge-ano4', url: '4/catalogo-4ano.js' }
	];

	// 2. Pedimos ao JavaScript para ir ler cada um dos ficheiros
	diretoriosJogos.forEach(diretorio => {
		
		fetch(diretorio.url)
			.then(resposta => {
				if (!resposta.ok) throw new Error("Ficheiro não encontrado");
				return resposta.text(); // Lemos o ficheiro como puro texto
			})
			.then(texto => {
				// 3. Procuramos e contamos quantas vezes existe a propriedade "nome:" no texto
				// A expressão regular /nome\s*:/g garante que apanha "nome:" ou "nome :"
				const jogosEncontrados = texto.match(/nome\s*:/g);
				
				// Se encontrar, guarda o total. Se não, o total é 0.
				const totalJogos = jogosEncontrados ? jogosEncontrados.length : 0;
				
				// 4. Injeta o número encontrado no badge correspondente
				const badgeNumero = document.querySelector(`#${diretorio.id} .num`);
				if (badgeNumero) {
					badgeNumero.innerText = totalJogos;
				}
			})
			.catch(erro => {
				console.log(`Aviso: Ainda não foi possível contar os jogos de ${diretorio.url}`);
			});
	});
	
</script>

</body>
</html>
