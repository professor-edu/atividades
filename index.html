<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brincar e Aprender 🧩</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            
            /* Cores dos Cartões */
            --cor-pre: #81e6d9;
            --cor-1ano: var(--azul-vibrante);
            --cor-2ano: #e7d83f;
            --cor-3ano: #feb2b2;
            --cor-4ano: #b197fc;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CABEÇALHO RESPONSIVO */
        header {
            background-color: var(--bg-header-footer);
            padding: 20px 10px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        h1 {
            color: var(--azul-escuro);
            /* Font-size adaptável para não quebrar */
            font-size: clamp(1.1rem, 4.5vw, 2.5rem); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
            white-space: nowrap; 
        }

        h1 span.icon-title { font-size: 1.2em; }

        p.subtitulo {
            color: var(--azul-escuro); 
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            font-weight: 500;
            margin-top: 8px;
            margin-bottom: 0;
        }

        /* GALERIA */
        .galeria-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 30px 15px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .cartao-ano {
            width: 180px;
            height: 240px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0,0,0,0.05);
            border: 5px solid white;
        }

        .cartao-ano:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .cartao-ano span.emoji {
            font-size: clamp(2.8rem, 8vw, 4rem); 
            margin-bottom: 15px;
        }

        .cartao-ano span.titulo-ano {
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.15);
        }

        /* CORES */
        .pre { background-color: var(--cor-pre); }
        .ano1 { background-color: var(--cor-1ano); }
        .ano2 { background-color: var(--cor-2ano); }
        .ano3 { background-color: var(--cor-3ano); }
        .ano4 { background-color: var(--cor-4ano); }

        /* FOOTER ATUALIZADO */
        footer {
            height: auto;
            padding: 15px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-header-footer);
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
            margin-top: auto;
        }
        footer p { font-size: 0.85rem; font-weight: 700; color: var(--azul-escuro); margin: 0; line-height: 1.4; }
        footer a { color: var(--azul-vibrante); text-decoration: none; }

        /* MEDIA QUERIES EXTREMAS */
        @media (max-width: 430px) {
            h1 span.icon-title:last-child { display: none; } /* Remove 1 ícone se for muito apertado */
            .galeria-container { gap: 12px; }
            .cartao-ano { width: 145px; height: 190px; }
        }
    </style>
</head>
<body>

<header>
    <h1>
        <span class="icon-title">🧩</span> 
        Vamos Brincar e Aprender 
        <span class="icon-title">🧩</span>
    </h1>
    <p class="subtitulo">Escolhe o teu ano e diverte-te! ✨</p>
</header>

<main class="galeria-container">
    <a href="pre/" class="cartao-ano pre">
        <span class="emoji">🧒</span>
        <span class="titulo-ano">PRÉ-ESCOLAR</span>
    </a>

    <a href="1/" class="cartao-ano ano1">
        <span class="emoji">🎒</span>
        <span class="titulo-ano">1º ANO</span>
    </a>

    <a href="2/" class="cartao-ano ano2">
        <span class="emoji">💡</span>
        <span class="titulo-ano">2º ANO</span>
    </a>

    <a href="3/" class="cartao-ano ano3">
        <span class="emoji">🔍</span>
        <span class="titulo-ano">3º ANO</span>
    </a>

    <a href="4/" class="cartao-ano ano4">
        <span class="emoji">🚀</span>
        <span class="titulo-ano">4º ANO</span>
    </a>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a> | Desenvolvido por Professor Eduardo
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
