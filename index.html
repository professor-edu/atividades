<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Jogos - Vamos Aprender a Brincar 🎮</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-escuro: #0d47a1;
            --azul-vibrante: #0091ff;
            --text-main: #455a64;
            
            /* Cores dos Anos (Inspiradas na tua imagem) */
            --cor-pre: #ffb3c1;
            --cor-1ano: #ffc281;
            --cor-2ano: #63e6be;
            --cor-3ano: #7cc2ff;
            --cor-4ano: #b197fc;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
        }

        h1 {
            color: var(--azul-escuro);
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        p.subtitulo {
            color: var(--azul-vibrante);
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 10px;
        }

        /* CONTAINER DOS CARTÕES */
        .galeria-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ESTILO DO CARTÃO (Baseado na tua imagem) */
        .cartao-ano {
            width: 180px;
            height: 240px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0px rgba(0,0,0,0.05);
            border: 4px solid white;
            cursor: pointer;
        }

        .cartao-ano:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .cartao-ano span.emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .cartao-ano span.titulo-ano {
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* CORES ESPECÍFICAS */
        .pre { background-color: var(--cor-pre); }
        .ano1 { background-color: var(--cor-1ano); }
        .ano2 { background-color: var(--cor-2ano); }
        .ano3 { background-color: var(--cor-3ano); }
        .ano4 { background-color: var(--cor-4ano); }

        /* FOOTER (O nosso modelo oficial) */
        footer {
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
            margin-top: auto;
        }
        footer p { font-size: 0.85rem; font-weight: 700; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .cartao-ano { width: 140px; height: 180px; }
            .cartao-ano span.emoji { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎮 Vamos Aprender a Brincar</h1>
    <p class="subtitulo">Escolhe o teu ano. Diverte-te! ✨</p>
</header>

<main class="galeria-container">
    <a href="pre/index.html" class="cartao-ano pre">
        <span class="emoji">🦒</span>
        <span class="titulo-ano">PRÉ</span>
    </a>

    <a href="1ano/index.html" class="cartao-ano ano1">
        <span class="emoji">🐥</span>
        <span class="titulo-ano">1º ANO</span>
    </a>

    <a href="2ano/index.html" class="cartao-ano ano2">
        <span class="emoji">🐢</span>
        <span class="titulo-ano">2º ANO</span>
    </a>

    <a href="3ano/index.html" class="cartao-ano ano3">
        <span class="emoji">🦊</span>
        <span class="titulo-ano">3º ANO</span>
    </a>

    <a href="4ano/index.html" class="cartao-ano ano4">
        <span class="emoji">🧑‍🚀</span>
        <span class="titulo-ano">4º ANO</span>
    </a>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
