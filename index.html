<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brincar e Aprender 🧩</title>
    
    <link rel="icon" type="image/png" href="logo.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
		*, *::before, *::after { box-sizing: border-box; }

		:root {
			--bg-page: #f0f7ff;
			--bg-header-footer: #ffffff;
			--azul-vibrante: #0091ff;
			--azul-escuro: #0d47a1;
			--cor-pre: #81e6d9;
			--cor-1ano: var(--azul-vibrante);
			--cor-2ano: #e7d83f;
			--cor-3ano: #feb2b2;
			--cor-4ano: #b197fc;
		}

		body { 
			font-family: 'Roboto', sans-serif; 
			text-align: center; 
			background-color: var(--bg-page);
			background-image: radial-gradient(rgba(13, 71, 161, 0.06) 2px, transparent 2px);
			background-size: 25px 25px;
			margin: 0; 
			display: flex;
			flex-direction: column;
			/* FIX ESTRUTURA APP: */
			height: 100svh; /* svh garante a altura exata descontando barras de endereço no mobile */
			overflow: hidden; /* Tranca a página inteira! Header e Footer nunca saem do sítio */
		}

		/* =========================================
		   CABEÇALHO RESPONSIVO
		   ========================================= */
		header {
			background-color: var(--bg-header-footer);
			padding: clamp(15px, 2.5vh, 25px) 20px;
			border-bottom: 1px solid var(--azul-vibrante);
			box-shadow: 0 4px 10px rgba(0,0,0,0.03);
			z-index: 100;
			flex-shrink: 0; 
		}

		h1 {
			color: var(--azul-escuro);
			font-size: clamp(1.2rem, 4.5vw, 2.5rem); 
			margin: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 900;
			white-space: nowrap; 
		}

		.img-titulo-esq, .img-titulo-dir {
			height: 1.1em; 
			width: auto;
			object-fit: contain;
			margin: 0 clamp(5px, 2vw, 15px);
		}
		.img-titulo-esq { transform: rotate(-7deg); }
		.img-titulo-dir { transform: rotate(7deg); }

		p.subtitulo {
			color: var(--azul-escuro); 
			font-size: clamp(0.85rem, 2.5vw, 1.2rem);
			font-weight: 500;
			margin-top: clamp(8px, 2vh, 15px); /* Dinâmico para poupar espaço se o ecrã for baixo */
			margin-bottom: 0;
			opacity: 0.8;
		}

		/* =========================================
		   GALERIA DE CARTÕES (ZONA CENTRAL SCROLLÁVEL)
		   ========================================= */
		.galeria-container {
			flex: 1; /* Preenche todo o espaço entre header e footer */
			display: flex;
			flex-direction: column; /* Fundamental para o margin auto funcionar perfeitamente */
			padding: clamp(10px, 3vh, 30px) 15px;
			width: 100%;
			overflow-y: auto; /* O Scroll acontece exclusivamente AQUI se os cartões transbordarem */
			scrollbar-gutter: stable; /* Evita que a grelha salte se a barra de scroll aparecer */
		}

		.grelha-cartoes {
			display: grid;
			width: 100%;
			max-width: 1100px;
			margin: auto; /* TRUQUE MÁGICO: Centra no ecrã. Mas se não couber, assume o topo e previne cortes! */
			gap: clamp(10px, 2vw, 25px);
		}

/* =========================================
		   O CARTÃO PADRÃO (ESTRUTURA LIMPA)
		   ========================================= */
		.cartao-ano {
			background-color: white;
			border-radius: 25px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-decoration: none;
			transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			border: 6px solid white;
			padding: 10px;
			/* As sombras foram retiradas daqui e movidas para as cores específicas! */
		}

		@media (hover: hover) {
			.cartao-ano:hover {
				transform: translateY(-8px);
			}
		}
		
		.cartao-ano:active { 
			transform: translateY(4px); 
		}

		/* A Imagem do Cartão */
		.img-ano {
			width: 100%; 
			flex: 1; 
			min-height: 0; 
			object-fit: contain;
			margin-bottom: 8px;
			filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); 
		}

		.titulo-ano {
			color: white;
			font-weight: 700;
			font-size: clamp(0.9rem, 2.5vw, 1.3rem);
			text-shadow: 1px 2px 3px rgba(0,0,0,0.15);
			text-transform: uppercase;
			letter-spacing: 1px;
			margin-bottom: 5px;
			flex-shrink: 0; 
		}

		/* =========================================
		   CORES DE FUNDO E SOMBRAS (POR ANO)
		   ========================================= */
		
		/* --- PRÉ-ESCOLAR --- */
		.pre { 
			background-color: var(--cor-pre); 
			box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-pre), transparent 60%);
		}
		@media (hover: hover) { .pre:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-pre), transparent 30%); } }
		.pre:active { box-shadow: 0 2px 10px color-mix(in srgb, var(--cor-pre), transparent 60%); }

		/* --- 1º ANO --- */
		.ano1 { 
			background-color: var(--cor-1ano); 
			box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-1ano), transparent 60%);
		}
		@media (hover: hover) { .ano1:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-1ano), transparent 30%); } }
		.ano1:active { box-shadow: 0 2px 10px color-mix(in srgb, var(--cor-1ano), transparent 60%); }

		/* --- 2º ANO --- */
		.ano2 { 
			background-color: var(--cor-2ano); 
			box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-2ano), transparent 60%);
		}
		@media (hover: hover) { .ano2:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-2ano), transparent 30%); } }
		.ano2:active { box-shadow: 0 2px 10px color-mix(in srgb, var(--cor-2ano), transparent 60%); }

		/* --- 3º ANO --- */
		.ano3 { 
			background-color: var(--cor-3ano); 
			box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-3ano), transparent 60%);
		}
		@media (hover: hover) { .ano3:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-3ano), transparent 30%); } }
		.ano3:active { box-shadow: 0 2px 10px color-mix(in srgb, var(--cor-3ano), transparent 60%); }

		/* --- 4º ANO --- */
		.ano4 { 
			background-color: var(--cor-4ano); 
			box-shadow: 0 8px 20px color-mix(in srgb, var(--cor-4ano), transparent 60%);
		}
		@media (hover: hover) { .ano4:hover { box-shadow: 0 15px 25px color-mix(in srgb, var(--cor-4ano), transparent 30%); } }
		.ano4:active { box-shadow: 0 2px 10px color-mix(in srgb, var(--cor-4ano), transparent 60%); }
		
		
		
		/* =========================================
		   LÓGICA RESPONSIVA
		   ========================================= */

		/* 1. PC (5 Colunas na horizontal) */
		@media (min-width: 901px) {
			.grelha-cartoes {
				grid-template-columns: repeat(5, 1fr);
				max-height: 280px; 
			}
		}

		/* 2. Tablets ou Telemóveis na Horizontal (3 em cima, 2 em baixo) */
		@media (min-width: 601px) and (max-width: 900px) {
			.grelha-cartoes {
				grid-template-columns: repeat(6, 1fr);
				grid-template-rows: 1fr 1fr;
			}
			.cartao-ano { padding: 15px; } 
			.cartao-ano.pre  { grid-column: 1 / 3; }
			.cartao-ano.ano1 { grid-column: 3 / 5; }
			.cartao-ano.ano2 { grid-column: 5 / 7; }
			.cartao-ano.ano3 { grid-column: 2 / 4; }
			.cartao-ano.ano4 { grid-column: 4 / 6; }
		}

		/* 3. Telemóveis na Vertical (Empilhado 1 + 2 + 2) */
		@media (max-width: 600px) {
			.grelha-cartoes {
				grid-template-columns: 1fr 1fr; /* 2 Colunas */
				grid-auto-rows: 1fr; /* Força as linhas a terem a mesma altura */
				gap: 12px;
			}
			
			.cartao-ano { 
				padding: 8px; 
				/* Formato retangular (compacto em altura). Evita scroll no mobile! */
				aspect-ratio: 1 / 0.85; 
			}
			
			.cartao-ano.pre { 
				grid-column: 1 / 3; 
				justify-self: center; 
				width: calc(50% - 6px); /* Fica idêntico aos outros cartões de baixo */
				aspect-ratio: 1 / 0.85; 
			}
			
			.cartao-ano.ano1 { grid-column: 1 / 2; }
			.cartao-ano.ano2 { grid-column: 2 / 3; }
			.cartao-ano.ano3 { grid-column: 1 / 2; }
			.cartao-ano.ano4 { grid-column: 2 / 3; }
		}

		/* Proteção para ecrãs extremanente estreitos */
		@media (max-width: 400px) {
			.img-titulo-esq, .img-titulo-dir { display: none; }
		}
		
		
		/* 4. MODO TELEMÓVEL DEITADO (Forçar a caber no ecrã sem scroll) */
		@media (max-height: 500px) and (orientation: landscape) {
			/* 1. Encolher o cabeçalho para roubar espaço para o jogo */
			header { padding: 8px 15px; }
			h1 { font-size: 1.2rem; }
			.img-titulo-esq, .img-titulo-dir { height: 1em; }
			p.subtitulo { display: none; } /* Ocultamos o subtítulo para poupar muito espaço vertical */
			
			/* 2. Colocar os 5 cartões lado a lado numa única linha (aproveitando a largura) */
			.grelha-cartoes {
				grid-template-columns: repeat(5, 1fr);
				grid-auto-rows: 1fr;
				gap: 8px;
				height: 100%; /* Força a ocupar exatamente a altura disponível */
				max-height: none;
			}
			
			/* 3. Limpar os formatos antigos e espremer os botões de forma bonita */
			.cartao-ano { 
				padding: 5px; 
				aspect-ratio: auto; 
				justify-content: space-evenly;
			}
			
			/* 4. Anular a lógica de colunas do mobile vertical */
			.cartao-ano.pre, .cartao-ano.ano1, .cartao-ano.ano2, .cartao-ano.ano3, .cartao-ano.ano4 {
				grid-column: span 1;
				width: 100%;
			}
			
			.titulo-ano { font-size: clamp(0.6rem, 1.5vw, 0.9rem); margin-bottom: 0; }
			.img-ano { margin-bottom: 2px; }
		}
				
		

		/* =========================================
		   RODAPÉ (FOOTER)
		   ========================================= */
		footer {
			flex-shrink: 0;
			padding: 15px 10px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--bg-header-footer);
			border-top: 1px solid var(--azul-vibrante);
			width: 100%;
			height: 45px;
		}
		footer p { font-size: 0.8rem; font-weight: 700; color: var(--azul-escuro); margin: 0; line-height: 1.4; }
		footer a { color: var(--azul-vibrante); text-decoration: none; transition: 0.2s; }
	</style>
</head>
<body>

<header>
    <h1>
        <img src="img/esq.png" alt="Esquerda" class="img-titulo-esq">
        Vamos Brincar e Aprender 
        <img src="img/dir.png" alt="Direita" class="img-titulo-dir">
    </h1>
    <p class="subtitulo">Escolhe o teu ano e diverte-te! ✨</p>
</header>

<main class="galeria-container">
    <div class="grelha-cartoes">
        
        <a href="pre/" class="cartao-ano pre">
            <img src="img/pre.png" alt="Pré-Escolar" class="img-ano">
            <span class="titulo-ano">PRÉ-ESCOLAR</span>
        </a>

        <a href="1/" class="cartao-ano ano1">
            <img src="img/1_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">1º ANO</span>
        </a>

        <a href="2/" class="cartao-ano ano2">
            <img src="img/2_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">2º ANO</span>
        </a>

        <a href="3/" class="cartao-ano ano3">
            <img src="img/3_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">3º ANO</span>
        </a>

        <a href="4/" class="cartao-ano ano4">
            <img src="img/4_ano.png" alt="" class="img-ano">
            <span class="titulo-ano">4º ANO</span>
        </a>

    </div>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a> | Desenvolvido por Professor Eduardo
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
