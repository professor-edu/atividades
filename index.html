<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Jogos - Vamos Aprender a Brincar 🎮</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            
            /* Paleta de Cores dos Cartões */
            --cor-pre: #81e6d9;  /* Turquesa */
            --cor-1ano: var(--azul-vibrante); /* Teu Azul do Template */
            --cor-2ano: #faf089; /* Amarelo (combina com a Lâmpada) */
            --cor-3ano: #feb2b2; /* Coral/Vermelho Suave */
            --cor-4ano: #b197fc; /* Roxo Suave (combina com o Foguetão) */
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO COM FUNDO E BORDER (IGUAL AO FOOTER) */
        header {
            background-color: var(--bg-header-footer);
            padding: 30px 20px;
            border-bottom: 2px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.6rem, 5vw, 2.5rem); 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 700;
        }

        p.subtitulo {
            color: var(--azul-escuro); 
            font-size: clamp(1rem, 3.5vw, 1.2rem);
            font-weight: 500;
            margin-top: 12px;
            margin-bottom: 0;
        }

        /* CONTAINER DOS CARTÕES */
        .galeria-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ESTILO DO CARTÃO */
        .cartao-ano {
            width: 190px;
            height: 250px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0px rgba(0,0,0,0.05);
            border: 5px solid white;
            cursor: pointer;
        }

        .cartao-ano:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .cartao-ano span.emoji {
            font-size: clamp(3rem, 10vw, 4.5rem); 
            margin-bottom: 15px;
        }

        .cartao-ano span.titulo-ano {
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* CLASSES DE CORES */
        .pre { background-color: var(--cor-pre); }
        .ano1 { background-color: var(--cor-1ano); }
        .ano2 { background-color: var(--cor-2ano); }
        .ano3 { background-color: var(--cor-3ano); }
        .ano4 { background-color: var(--cor-4ano); }

        /* FOOTER UNIFICADO */
        footer {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-header-footer);
            border-top: 2px solid var(--azul-vibrante);
            width: 100%;
            margin-top: auto;
        }
        footer p { font-size: 0.9rem; font-weight: 700; color: var(--azul-escuro); margin: 0; }
        footer a { color: var(--azul-escuro); text-decoration: none; }

        @media (max-width: 600px) {
            .galeria-container { gap: 15px; padding: 25px 10px; }
            .cartao-ano { width: 150px; height: 210px; border-radius: 20px; }
            h1 { gap: 8px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🧩 Vamos Aprender a Brincar 🧩</h1>
    <p class="subtitulo">Escolhe o teu ano e diverte-te! ✨</p>
</header>

<main class="galeria-container">
    <a href="pre/index.html" class="cartao-ano pre">
        <span class="emoji">🎨</span>
        <span class="titulo-ano">PRÉ</span>
    </a>

    <a href="1ano/index.html" class="cartao-ano ano1">
        <span class="emoji">🎒</span>
        <span class="titulo-ano">1º ANO</span>
    </a>

    <a href="2ano/index.html" class="cartao-ano ano2">
        <span class="emoji">💡</span>
        <span class="titulo-ano">2º ANO</span>
    </a>

    <a href="3ano/index.html" class="cartao-ano ano3">
        <span class="emoji">🔍</span>
        <span class="titulo-ano">3º ANO</span>
    </a>

    <a href="4ano/index.html" class="cartao-ano ano4">
        <span class="emoji">🚀</span>
        <span class="titulo-ano">4º ANO</span>
    </a>
</main>

<footer>
    <p>
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
