<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz Matemática | 1º Ano</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f7ff;
        text-align: center;
    }

    header {
        padding: 20px 0;
        background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
        border-bottom: 4px solid #7ac7f0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    header img {
        width: 60px;
    }

    header h1 {
        margin: 0;
        font-size: 2.2rem;
        color: #155a8a;
    }

    #progress-container {
        width: 90%;
        max-width: 600px;
        margin: 25px auto;
        background: #cfe0ff;
        height: 18px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.15);
    }

    #progress-bar {
        height: 100%;
        width: 0%;
        background: #4c8bff;
        transition: width .3s;
        border-radius: 12px;
    }

    #question-box {
        background: white;
        max-width: 650px;
        margin: auto;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    #question {
        font-size: 1.8rem;
        color: #155a8a;
        margin-bottom: 20px;
    }

    #images {
        margin-bottom: 10px;
        font-size: 2.5rem;
    }

    .answers {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    .btn {
        background: white;
        border: 2px solid #7ac7f0;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 1.4rem;
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        transition: 0.2s;
        min-width: 90px;
    }

    .btn:hover {
        background: #bde6ff;
    }

    .correct {
        background: #c8f7c5 !important;
        border-color: #2ecc71 !important;
    }

    .wrong {
        background: #ffd4d4 !important;
        border-color: #ff6b6b !important;
    }

    #next-btn, #restart-btn {
        margin-top: 25px;
        background: #4caf50;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 10px;
        font-size: 1.3rem;
        display: none;
        cursor: pointer;
    }

    #next-btn:hover, #restart-btn:hover {
        background: #43a047;
    }

    #score {
        margin-top: 25px;
        font-size: 1.4rem;
        color: #155a8a;
    }

    #final-screen {
        display: none;
        background: white;
        max-width: 650px;
        margin: auto;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        margin-top: 20px;
    }

</style>
</head>

<body>

<header>
    <img src="contar.png">
    <h1>Quiz de Matemática</h1>
</header>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="question-box">
    <div id="question"></div>
    <div id="images"></div>
    <div class="answers" id="answers"></div>
    <button id="next-btn" onclick="nextQuestion()">Seguinte</button>
</div>

<div id="score">Pontuação: 0</div>

<div id="final-screen">
    <h1>✨ Terminaste! ✨</h1>
    <h2 id="final-text"></h2>
    <button id="restart-btn" onclick="restartQuiz()">Recomeçar</button>
</div>

<script>
let score = 0;
let index = 0;

/* ======================================================
   30 QUESTÕES – contagens com mais emojis, adições maiores,
   operações com emojis e subtrações variadas.
   ====================================================== */

let quiz = [

    /* Adições maiores */
    { q:"12 + 7 =", a:[18,19,20,17], correct:19 },
    { q:"9 + 8 =", a:[16,17,18,19], correct:17 },
    { q:"15 + 4 =", a:[18,17,19,20], correct:19 },
    { q:"11 + 9 =", a:[20,19,18,17], correct:20 },

    /* Operações com emojis */
    { q:"🐱 + 🐱🐱 =",  a:[2,3,4,5], correct:3 },
    { q:"🍎🍎🍎 – 🍎 =", a:[1,2,3,4], correct:2 },
    { q:"🐟🐟 + 🐟 =",  a:[2,3,4,5], correct:3 },
    { q:"🦆🦆🦆 – 🦆 =", a:[1,2,3,4], correct:2 },

    /* Contagens reforçadas */
    { q:"Quantos cães?", img:"🐶🐶🐶🐶🐶🐶🐶🐶🐶🐶", a:[10,9,11,8], correct:10 },
    { q:"Quantas bolas?", img:"🏀🏀🏀🏀🏀", a:[4,5,6,7], correct:5 },
    { q:"Quantas estrelas?", img:"⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐", a:[6,7,8,9], correct:7 },
    { q:"Quantos corações?", img:"❤️❤️❤️❤️", a:[3,4,5,6], correct:4 },

    /* Subtrações reforçadas */
    { q:"18 - 7 =", a:[10,11,12,13], correct:11 },
    { q:"20 - 9 =", a:[10,11,12,13], correct:11 },
    { q:"17 - 8 =", a:[9,8,7,6], correct:9 },

    /* Mistos */
    { q:"3 + 11 =", a:[12,13,14,15], correct:14 },
    { q:"19 - 3 =", a:[15,16,17,18], correct:16 },
    { q:"7 + 5 =", a:[11,12,13,14], correct:12 },
    { q:"16 - 7 =", a:[7,8,9,10], correct:9 },
    { q:"4 + 12 =", a:[14,15,16,17], correct:16 },

    /* MAIS perguntas novas */
    { q:"8 + 9 =", a:[16,17,18,19], correct:17 },
    { q:"6 + 13 =", a:[17,18,19,20], correct:19 },
    { q:"14 - 5 =", a:[8,9,10,11], correct:9 },
    { q:"🦋🦋🦋🦋 + 🦋 =", a:[4,5,6,7], correct:5 },
    { q:"🍓🍓🍓 – 🍓 =", a:[1,2,3,4], correct:2 },
    { q:"🐢🐢🐢🐢🐢 – 🐢 =", a:[3,4,5,6], correct:4 },
    { q:"9 + 6 =", a:[15,16,17,18], correct:15 },
    { q:"11 - 2 =", a:[8,9,10,11], correct:9 },
    { q:"4 + 14 =", a:[17,18,19,20], correct:18 },
    { q:"13 - 4 =", a:[7,8,9,10], correct:9 }
];

// ▶️ Aleatorizar
quiz = quiz.sort(() => Math.random() - 0.5);

function loadQuestion() {

    if (index >= quiz.length) {
        finishQuiz();
        return;
    }

    // Barra de progresso
    const percent = (index / quiz.length) * 100;
    document.getElementById("progress-bar").style.width = percent + "%";

    const q = quiz[index];
    document.getElementById("question").textContent = q.q;

    if (q.img) {
        document.getElementById("images").innerHTML =
            `<div style="font-size:2.6rem;margin:15px;">${q.img}</div>`;
    } else {
        document.getElementById("images").innerHTML = "";
    }

    const box = document.getElementById("answers");
    box.innerHTML = "";

    q.a.forEach(num => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = num;
        btn.onclick = () => check(btn, num);
        box.appendChild(btn);
    });

    document.getElementById("next-btn").style.display = "none";
}

function check(btn, choice) {

    const q = quiz[index];

    document.querySelectorAll(".btn").forEach(b =>
        b.style.pointerEvents = "none"
    );

    if (choice === q.correct) {
        btn.classList.add("correct");
        score += 1;
    } else {
        btn.classList.add("wrong");
        score = Math.max(0, score - 1);
    }

    document.getElementById("score").textContent =
        "Pontuação: " + score;

    document.getElementById("next-btn").style.display = "inline-block";
}

function nextQuestion() {
    index++;
    loadQuestion();
}

function finishQuiz() {
    document.getElementById("question-box").style.display = "none";
    document.getElementById("score").style.display = "none";

    document.getElementById("final-text").innerHTML =
        "Pontuação final: <b>" + score + "</b>";

    document.getElementById("restart-btn").style.display = "inline-block";
    document.getElementById("final-screen").style.display = "block";
}

function restartQuiz() {
    index = 0;
    score = 0;
    quiz = quiz.sort(() => Math.random() - 0.5);

    document.getElementById("final-screen").style.display = "none";
    document.getElementById("question-box").style.display = "block";
    document.getElementById("score").style.display = "block";
    document.getElementById("score").textContent = "Pontuação: 0";

    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
