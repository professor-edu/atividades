<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz de Matemática – 1.º Ano</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f7ff;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 {
        color: #155a8a;
        margin-bottom: 10px;
    }

    .quiz-box {
        background: white;
        max-width: 500px;
        margin: auto;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .question {
        font-size: 1.6rem;
        margin-bottom: 20px;
    }

    .answers {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .btn {
        padding: 15px;
        background: #e8f7ff;
        border: 2px solid #7ac7f0;
        border-radius: 10px;
        font-size: 1.4rem;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn:hover {
        background: #bde6ff;
    }

    .correct {
        background: #c8f7c5 !important;
        border-color: #2ecc71 !important;
    }

    .wrong {
        background: #ffd4d4 !important;
        border-color: #ff6b6b !important;
    }

    #next {
        margin-top: 20px;
        padding: 12px 25px;
        font-size: 1.3rem;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        display: none;
    }

    #final {
        display: none;
        font-size: 1.5rem;
        margin-top: 20px;
    }
</style>

</head>
<body>

<h1>Quiz de Matemática – 1.º Ano</h1>

<div class="quiz-box">
    <div id="question" class="question"></div>

    <div id="answers" class="answers"></div>

    <button id="next" onclick="nextQuestion()">Seguinte</button>

    <div id="final"></div>
</div>

<script>
const quiz = [
    { q: "2 + 3 =", a: [4, 5, 6, 3], correct: 5 },
    { q: "6 - 1 =", a: [5, 4, 3, 7], correct: 5 },
    { q: "Conta os objetos: 🐱🐱🐱", a: [2, 3, 4, 5], correct: 3 },
    { q: "10 - 8 =", a: [3, 1, 2, 4], correct: 2 },
    { q: "4 + 4 =", a: [6, 8, 7, 5], correct: 8 }
];

let index = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[index];
    document.getElementById("question").textContent = (index+1) + ". " + q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach(num => {
        const btn = document.createElement("button");
        btn.textContent = num;
        btn.className = "btn";
        btn.onclick = () => checkAnswer(btn, num);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(btn, answer) {
    const q = quiz[index];

    // bloquear cliques
    document.querySelectorAll(".btn").forEach(b => b.style.pointerEvents = "none");

    if (answer === q.correct) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
    }
    document.getElementById("next").style.display = "inline-block";
}

function nextQuestion() {
    index++;
    document.getElementById("next").style.display = "none";

    if (index < quiz.length) {
        loadQuestion();
    } else {
        finishQuiz();
    }
}

function finishQuiz() {
    document.getElementById("answers").style.display = "none";
    document.getElementById("question").style.display = "none";
    document.getElementById("next").style.display = "none";

    document.getElementById("final").style.display = "block";
    document.getElementById("final").textContent =
        "Terminaste! Pontuação final: " + score + " / " + quiz.length;
}

loadQuestion();
</script>

</body>
</html>
