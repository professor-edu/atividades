<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Divisão Silábica</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f2f7ff;
        text-align: center;
    }

    header {
        padding: 15px 0;
        background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
        border-bottom: 4px solid #7ac7f0;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
    }

    header img {
        width: 60px;
    }

    header h1 {
        margin: 0;
        font-size: 2.2rem;
        color: #155a8a;
    }

    .image-box {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        display: inline-block;
        margin-top: 20px;
        position: relative;
        width: 210px;
    }

    .image-box img {
        width: 200px;
        height: 200px;
        object-fit: contain;
        background:white;
    }

    /* Ícone de som: canto inferior direito */
    .sound-btn {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: #4c8bff;
        color: white;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 3px 6px rgba(0,0,0,0.25);
    }

    .instruction {
        margin-top: 25px;
        font-size: 1.4rem;
        color: #155a8a;
    }

    .syllables, .slots {
        margin-top: 25px;
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
    }

    .syl {
        background: white;
        border: 2px solid #7ac7f0;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 1.6rem;
        cursor: grab;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        user-select: none;
    }

    .slot {
        width: 120px;
        height: 65px;
        background: white;
        border: 3px dashed #155a8a;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.6rem;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    .correct {
        background: #c8f7c5 !important;
        border-color: #2ecc71 !important;
    }

    .wrong {
        background: #ffd4d4 !important;
        border-color: #ff6b6b !important;
    }

    #score {
        margin-top: 25px;
        font-size: 1.4rem;
        color: #155a8a;
    }

    #next-btn {
        margin-top: 30px;
        background: #4caf50;
        color: white;
        padding: 12px 30px;
        border: none;
        font-size: 1.3rem;
        border-radius: 10px;
        cursor: pointer;
        display: none;
    }

    #next-btn:hover {
        background: #43a047;
    }

    /* Página final */
    #final-screen {
        display: none;
        margin-top: 40px;
    }

    #final-screen h1 {
        font-size: 2rem;
        color: #155a8a;
    }

    #medal {
        width: 150px;
        margin-top: 20px;
    }

    #restart-btn {
        margin-top: 25px;
        padding: 12px 30px;
        font-size: 1.2rem;
        background: #4c8bff;
        color: white;
        border-radius: 10px;
        border: none;
        cursor: pointer;
    }
</style>
</head>

<body>

<header>
   <img src="https://openmoji.org/data/color/svg/270F.svg" alt="Divisão Silábica">
    <h1>Divisão Silábica</h1>
</header>

<div id="game-area">

    <div class="image-box">
        <img id="word-img" src="">
        <button class="sound-btn" onclick="playWord()">🔊</button>
    </div>

    <div class="instruction">Arrasta as sílabas para formar a palavra:</div>

    <div class="syllables" id="syl-container"></div>
    <div class="slots" id="slot-container"></div>

    <div id="score">Pontuação: 0</div>

    <button id="next-btn" onclick="nextWord()">Seguinte</button>
</div>

<div id="final-screen">
    <h1 id="final-text"></h1>
    <img id="medal">
    <br>
    <button id="restart-btn" onclick="restartGame()">Recomeçar</button>
</div>
    <script>
let score = 0;
let current = 0;
let dragged = null;

/* =====================================================
   LISTA COMPLETA DE 30 PALAVRAS COM IMAGENS OPENMOJI
   ===================================================== */
const words = [
    { w:"pato",img:"https://openmoji.org/data/color/svg/1F986.svg",syl:["PA","TO"] },
    { w:"gato",img:"https://openmoji.org/data/color/svg/1F431.svg",syl:["GA","TO"] },
    { w:"bola",img:"https://openmoji.org/data/color/svg/1F3C0.svg",syl:["BO","LA"] },
    { w:"vaca",img:"https://openmoji.org/data/color/svg/1F404.svg",syl:["VA","CA"] },
    { w:"rato",img:"https://openmoji.org/data/color/svg/1F42D.svg",syl:["RA","TO"] },
    { w:"violino",img:"https://openmoji.org/data/color/svg/1F3BB.svg",syl:["VI","O","LI","NO"] },
    { w:"melão",img:"https://openmoji.org/data/color/svg/1F348.svg",syl:["ME","LÃO"] },
    { w:"mota",img:"https://openmoji.org/data/color/svg/1F3CD.svg",syl:["MO","TA"] },
    { w:"janela",img:"https://openmoji.org/data/color/svg/1FA9F.svg",syl:["JA","NE","LA"] },
    { w:"jipe",img:"https://openmoji.org/data/color/svg/1F699.svg",syl:["JI","PE"] },
    { w:"cama",img:"https://openmoji.org/data/color/svg/1F6CF.svg",syl:["CA","MA"] },
    { w:"dado",img:"https://openmoji.org/data/color/svg/1F3B2.svg",syl:["DA","DO"] },
    { w:"baleia",img:"https://openmoji.org/data/color/svg/1F40B.svg",syl:["BA","LEI","A"] },
    { w:"vela",img:"https://openmoji.org/data/color/svg/1F56F.svg",syl:["VE","LA"] },
    { w:"mala",img:"https://openmoji.org/data/color/svg/1F9F3.svg",syl:["MA","LA"] },
    { w:"macaco",img:"https://openmoji.org/data/color/svg/1F412.svg",syl:["MA","CA","CO"] },
    { w:"dedo",img:"https://openmoji.org/data/color/svg/261D.svg",syl:["DE","DO"] },
    { w:"cavalo",img:"https://openmoji.org/data/color/svg/1F40E.svg",syl:["CA","VA","LO"] },
    { w:"limão",img:"https://openmoji.org/data/color/svg/1F34B.svg",syl:["LI","MÃO"] },
    { w:"foca",img:"https://openmoji.org/data/color/svg/1F9AD.svg",syl:["FO","CA"] },
    { w:"papagaio",img:"https://openmoji.org/data/color/svg/1FA81.svg",syl:["PA","PA","GAI","O"] },
    { w:"avião",img:"https://openmoji.org/data/color/svg/1F6E9.svg",syl:["A","VI","ÃO"] },
    { w:"pote",img:"https://openmoji.org/data/color/svg/1F3FA.svg",syl:["PO","TE"] },
    { w:"tomate",img:"https://openmoji.org/data/color/svg/1F345.svg",syl:["TO","MA","TE"] },
    { w:"banana",img:"https://openmoji.org/data/color/svg/1F34C.svg",syl:["BA","NA","NA"] },
    { w:"amarelo",img:"https://openmoji.org/data/color/svg/1F3F3-FE0F-200D-1F7E8.svg",syl:["A","MA","RE","LO"] },
    { w:"roda",img:"https://openmoji.org/data/color/svg/1F6DE.svg",syl:["RO","DA"] },
    { w:"bota",img:"https://openmoji.org/data/color/svg/1F462.svg",syl:["BO","TA"] },
    { w:"mapa",img:"https://openmoji.org/data/color/svg/1F5FA.svg",syl:["MA","PA"] },
    { w:"fada",img:"https://openmoji.org/data/color/svg/1F9DA.svg",syl:["FA","DA"] }
];

/* ALEATORIZAR A ORDEM DAS PALAVRAS */
words.sort(() => Math.random() - 0.5);


/* =====================================================
   FUNÇÕES DO JOGO
   ===================================================== */

function loadWord() {
    if (current >= words.length) {
        endGame();
        return;
    }

    const w = words[current];
    document.getElementById("word-img").src = w.img;

    const syls = shuffle([...w.syl]);
    const sylDiv = document.getElementById("syl-container");
    sylDiv.innerHTML = "";

    syls.forEach(s => {
        const el = document.createElement("div");
        el.className = "syl";
        el.textContent = s;
        el.draggable = true;
        el.addEventListener("dragstart", () => dragged = el);
        sylDiv.appendChild(el);
    });

    const slotDiv = document.getElementById("slot-container");
    slotDiv.innerHTML = "";

    w.syl.forEach(s => {
        const sl = document.createElement("div");
        sl.className = "slot";
        sl.dataset.correct = s;
        sl.addEventListener("dragover", e => e.preventDefault());
        sl.addEventListener("drop", () => dropSyllable(sl));
        slotDiv.appendChild(sl);
    });

    document.getElementById("next-btn").style.display = "none";
}

function dropSyllable(slot) {
    if (!dragged) return;

    const chosen = dragged.textContent;
    const correct = slot.dataset.correct;

    if (slot.textContent.trim() !== "") return;

    if (chosen === correct) {
        slot.textContent = chosen;
        slot.classList.add("correct");
        dragged.remove();
        score += 1;

        if (allCorrect()) {
            document.getElementById("next-btn").style.display = "inline-block";
        }

    } else {
        slot.classList.add("wrong");
        score = Math.max(0, score - 1);
        setTimeout(() => slot.classList.remove("wrong"), 400);
    }

    document.getElementById("score").textContent = "Pontuação: " + score;
}

/* SOM DA PALAVRA */
function playWord() {
    const word = words[current].w;
    const speak = new SpeechSynthesisUtterance(word);
    speak.lang = "pt-PT";
    window.speechSynthesis.speak(speak);
}

function allCorrect() {
    return [...document.querySelectorAll(".slot")]
        .every(s => s.textContent.trim() !== "");
}

function nextWord() {
    current++;
    loadWord();
}

/* ECRÃ FINAL */
function endGame() {
    document.getElementById("game-area").style.display = "none";
    document.getElementById("final-screen").style.display = "block";

    const totalSyllables = words.reduce((sum,w)=> sum + w.syl.length, 0);
    const percent = Math.round((score / totalSyllables) * 100);

    let medal = "";
    let text = "";

    if (percent >= 80) {
        medal = "https://openmoji.org/data/color/svg/1F947.svg"; // OURO
        text = "Excelente! Medalha de Ouro!";
    } 
    else if (percent >= 60) {
        medal = "https://openmoji.org/data/color/svg/1F948.svg"; // PRATA
        text = "Muito bem! Medalha de Prata!";
    }
    else if (percent >= 40) {
        medal = "https://openmoji.org/data/color/svg/1F949.svg"; // BRONZE
        text = "Bom esforço! Medalha de Bronze!";
    }
    else {
        medal = "https://openmoji.org/data/color/svg/1F614.svg"; // carinha triste leve
        text = "Continua a treinar!";
    }

    document.getElementById("final-text").textContent = text;
    document.getElementById("medal").src = medal;
}

/* RECOMEÇAR O JOGO */
function restartGame() {
    score = 0;
    current = 0;
    words.sort(() => Math.random() - 0.5);
    document.getElementById("score").textContent = "Pontuação: 0";
    document.getElementById("game-area").style.display = "block";
    document.getElementById("final-screen").style.display = "none";
    loadWord();
}

/* Função baralhar */
function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

loadWord();
</script>

</body>
</html>
