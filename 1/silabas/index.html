<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👏 Divisão Silábica 👏</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        /* Estrutura Flexbox para garantir footer no fundo */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* CABEÇALHO PADRÃO EM 3 COLUNAS */
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px 20px; 
            color: var(--azul-escuro); 
            border-bottom: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left, .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-start;
        }

        .header-right {
            justify-content: flex-end;
        }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px;
            flex: 2;
        }

        .icone-cabecalho { 
            width: 100px;
            height: auto; 
        }

        /* BOTÃO MENU LARANJA */
        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .btn-menu:hover { transform: scale(1.05); }

        .estrelas { 
            font-size: 20px; 
            color: #f57c00; 
            font-weight: bold; 
            padding: 10px 0;
            background: rgba(255,255,255,0.3);
        }

        /* ÁREA DE JOGO */
        #progress-container {
            width: 90%;
            height: 12px;
            background: #cfe0ff;
            border-radius: 10px;
            margin: 20px auto;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--azul-escuro);
            border-radius: 10px;
            transition: width .4s;
        }

        .image-box {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: inline-block;
            position: relative;
            margin-bottom: 20px;
        }

        .image-box img {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .instruction {
            font-size: 1.3rem;
            color: var(--azul-escuro);
            font-weight: bold;
            margin: 15px 0;
        }

        .syllables, .slots {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .syl {
            background: white;
            border: 2px solid var(--azul-medio);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 1.5rem;
            color: var(--azul-escuro);
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            user-select: none;
        }

        .slot {
            width: 100px;
            height: 60px;
            background: white;
            border: 3px dashed var(--azul-medio);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--azul-escuro);
        }

        .correct { background: var(--verde) !important; border-color: var(--verde) !important; color: white !important; }
        .wrong { background: var(--vermelho) !important; border-color: var(--vermelho) !important; }

        #next-btn {
            background: var(--verde);
            color: white;
            padding: 15px 35px;
            border: none;
            font-size: 1.3rem;
            border-radius: 50px;
            cursor: pointer;
            display: none;
            margin: 20px auto;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        /* FOOTER PADRÃO OFICIAL */
        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            background: #fff;
            width: 100%;
            box-sizing: border-box;
        }
        
        .footer-link, .footer-ano { 
            color: var(--azul-escuro); 
            text-decoration: none; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='index.html'">🏠 Menu</button>
    </div>

    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/270F.svg" class="icone-cabecalho" alt="lápis"> 
        <h1 style="margin:0">Divisão Silábica</h1>
    </div>

    <div class="header-right">
        </div>
</header>

<div class="estrelas">⭐ Estrelas: <span id="contador-estrelas">0</span></div>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="game-area" style="flex-grow: 1; padding: 20px;">
    <div class="image-box">
        <img id="word-img" src="">
    </div>

    <div class="instruction">Arrasta as sílabas para formar a palavra:</div>

    <div class="syllables" id="syl-container"></div>
    <div class="slots" id="slot-container"></div>

    <button id="next-btn" onclick="nextWord()">Seguinte ✨</button>
</div>

<div id="final-screen" style="display:none; flex-grow:1; padding: 40px;">
    <h2 id="final-text" style="color: var(--azul-escuro); font-size: 2rem;"></h2>
    <img id="medal" style="width: 150px; margin: 20px;">
    <div id="estatisticas" style="font-size: 1.2rem; line-height: 1.8;"></div>
    <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; cursor: pointer; background: var(--azul-escuro); color: white; border: none; font-weight: bold; font-size: 18px; margin-top: 20px;">Jogar de Novo</button>
</div>

<footer>
    <p>
        <span class="footer-ano">2026</span> 🏫 
        <a href="https://eb1pemarinheira.pt/" target="_blank" class="footer-link">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    let score = 0;
    let acertos = 0;
    let current = 0;
    let dragged = null;

    const words = [
        { w:"pato",img:"https://openmoji.org/data/color/svg/1F986.svg",syl:["PA","TO"] },
        { w:"gato",img:"https://openmoji.org/data/color/svg/1F431.svg",syl:["GA","TO"] },
        { w:"bola",img:"https://openmoji.org/data/color/svg/1F3C0.svg",syl:["BO","LA"] },
        { w:"vaca",img:"https://openmoji.org/data/color/svg/1F404.svg",syl:["VA","CA"] },
        { w:"ratito",img:"https://openmoji.org/data/color/svg/1F42D.svg",syl:["RA","TI","TO"] },
        { w:"mota",img:"https://openmoji.org/data/color/svg/1F3CD.svg",syl:["MO","TA"] },
        { w:"janela",img:"https://openmoji.org/data/color/svg/1FA9F.svg",syl:["JA","NE","LA"] },
        { w:"jipe",img:"https://openmoji.org/data/color/svg/1F699.svg",syl:["JI","PE"] },
        { w:"cama",img:"https://openmoji.org/data/color/svg/1F6CF.svg",syl:["CA","MA"] },
        { w:"dado",img:"https://openmoji.org/data/color/svg/1F3B2.svg",syl:["DA","DO"] },
        { w:"vela",img:"https://openmoji.org/data/color/svg/1F56F.svg",syl:["VE","LA"] },
        { w:"mala",img:"https://openmoji.org/data/color/svg/1F9F3.svg",syl:["MA","LA"] },
        { w:"macaco",img:"https://openmoji.org/data/color/svg/1F412.svg",syl:["MA","CA","CO"] },
        { w:"dedo",img:"https://openmoji.org/data/color/svg/261D.svg",syl:["DE","DO"] },
        { w:"cavalo",img:"https://openmoji.org/data/color/svg/1F40E.svg",syl:["CA","VA","LO"] },
        { w:"limão",img:"https://openmoji.org/data/color/svg/1F34B.svg",syl:["LI","MÃO"] },
        { w:"foca",img:"https://openmoji.org/data/color/svg/1F9AD.svg",syl:["FO","CA"] },
        { w:"tomate",img:"https://openmoji.org/data/color/svg/1F345.svg",syl:["TO","MA","TE"] },
        { w:"banana",img:"https://openmoji.org/data/color/svg/1F34C.svg",syl:["BA","NA","NA"] },
        { w:"fada",img:"https://openmoji.org/data/color/svg/1F9DA.svg",syl:["FA","DA"] }
    ];

    words.sort(() => Math.random() - 0.5);

    function loadWord() {
        if (current >= words.length) { endGame(); return; }
        
        document.getElementById("progress-bar").style.width = (current / words.length * 100) + "%";
        const w = words[current];
        document.getElementById("word-img").src = w.img;

        const syls = [...w.syl].sort(() => Math.random() - 0.5);
        const sylDiv = document.getElementById("syl-container");
        sylDiv.innerHTML = "";
        
        syls.forEach(s => {
            const el = document.createElement("div");
            el.className = "syl";
            el.textContent = s;
            el.draggable = true;
            el.addEventListener("dragstart", () => dragged = el);
            // Suporte para touch (mobile)
            el.addEventListener("touchstart", (e) => dragged = el, {passive: true});
            sylDiv.appendChild(el);
        });

        const slotDiv = document.getElementById("slot-container");
        slotDiv.innerHTML = "";
        w.syl.forEach(s => {
            const sl = document.createElement("div");
            sl.className = "slot";
            sl.dataset.correct = s;
            sl.addEventListener("dragover", e => e.preventDefault());
            sl.addEventListener("drop", () => dropSyllable(sl));
            slotDiv.appendChild(sl);
        });
        document.getElementById("next-btn").style.display = "none";
    }

    function dropSyllable(slot) {
        if (!dragged || slot.textContent !== "") return;
        if (dragged.textContent === slot.dataset.correct) {
            slot.textContent = dragged.textContent;
            slot.classList.add("correct");
            dragged.remove();
            if ([...document.querySelectorAll(".slot")].every(s => s.textContent !== "")) {
                acertos++;
                document.getElementById("contador-estrelas").textContent = acertos;
                document.getElementById("next-btn").style.display = "block";
            }
        } else {
            slot.classList.add("wrong");
            setTimeout(() => slot.classList.remove("wrong"), 500);
        }
    }

    function nextWord() { current++; loadWord(); }

    function endGame() {
        document.getElementById("game-area").style.display = "none";
        document.getElementById("final-screen").style.display = "block";
        const perc = Math.round((acertos / words.length) * 100);
        document.getElementById("final-text").textContent = perc >= 70 ? "Excelente Trabalho! 🌟" : "Bom esforço! 💪";
        document.getElementById("medal").src = perc >= 70 ? "https://openmoji.org/data/color/svg/1F947.svg" : "https://openmoji.org/data/color/svg/1F949.svg";
        document.getElementById("estatisticas").innerHTML = `Palavras Completas: ${acertos}/${words.length}<br>Percentagem: ${perc}%`;
    }

    loadWord();
</script>

<script src="js/componentes.js"></script>
</body>
</html>
