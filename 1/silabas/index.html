<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Arrastar Sílabas 🧩</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
            --borda-caixa: #cbd5e0;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100dvh; 
        }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 10px 20px 0 20px; 
            color: var(--azul-escuro); 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            position: relative;
            z-index: 20;
            flex-shrink: 0;
            min-height: 90px; 
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; flex: 2;
        }

        /* IMAGEM NO HEADER A 70PX E CAMINHO SEM ../ */
        .icone-cabecalho { 
            width: 70px !important; 
            height: 70px !important; 
            object-fit: contain;
            filter: drop-shadow(2px 2px 0px #fff); 
        }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 20px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-menu:hover { 
            transform: translateY(-3px) scale(1.05); 
            background: #f57c00;
            box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
        }

        .onda-container {
            height: 40px; width: 100%; overflow: hidden; line-height: 0;
            margin-top: -1px; filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.1));
            position: relative; z-index: 10; flex-shrink: 0;
        }

        .onda-container svg { width: 100%; height: 100%; }

        .status-jogo { padding: 10px; flex-shrink: 0; }
        .estrelas { font-size: 24px; color: #f57c00; font-weight: 700; margin-bottom: 8px; }

        .progresso-container {
            width: 95%; max-width: 480px; 
            height: 22px; 
            background: white; /* Fundo branco para ser mais limpo */
            border-radius: 15px; margin: 0 auto; overflow: hidden;
            border: 3px solid var(--azul-medio); box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .barra-progresso {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--azul-vibrante), #5ec2ff);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #main-content { 
            flex: 1 0 auto; padding: 10px 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .cartao {
            background: white; width: 95%; max-width: 480px;
            margin: 5px auto; padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .imagem-pergunta {
            height: 160px; width: 160px; object-fit: contain;
            border: 4px solid var(--azul-claro); border-radius: 20px; padding: 10px;
        }

        /* ZONA DE DESTINO SEM CINZENTO */
        .zona-drop {
            display: flex; gap: 12px; justify-content: center; min-height: 80px;
            margin: 15px 0; flex-wrap: wrap; padding: 15px;
            border-radius: 20px; background: #fff; border: 2px solid #edf2f7;
        }

        .caixa-vazia {
            width: 85px; height: 65px; border: 3px dashed #cbd5e0;
            border-radius: 15px; background: transparent; /* Remove o cinzento */
            display: flex; align-items: center; justify-content: center;
        }

        /* SÍLABAS COM VISUAL DE BLOCO LIMPO */
        .caixa-silaba {
            width: 85px; height: 65px; background: white;
            border: 3px solid var(--azul-medio); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: var(--azul-escuro);
            cursor: grab; transition: all 0.2s;
            box-shadow: 0 5px 0px var(--azul-medio);
            user-select: none; touch-action: none;
        }

        .caixa-silaba.dragging { opacity: 0.4; transform: scale(0.9); }

        /* ZONA DE ORIGEM SEM AZUL CLARO NO FUNDO */
        .opcoes-silabas {
            display: flex; gap: 12px; justify-content: center; 
            margin-top: 10px; flex-wrap: wrap; padding: 20px;
            background: white; /* Fundo limpo */
            border: 2px solid var(--azul-claro);
            border-radius: 25px; width: 100%; min-height: 90px;
        }

        footer {
            flex-shrink: 0; min-height: 70px; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 600px) {
            .caixa-silaba, .caixa-vazia { width: 72px; height: 62px; font-size: 19px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="puzzle.png" class="icone-cabecalho" alt="jogo"> 
        <h1 style="margin:0; font-size: 1.2rem;">Arrastar Sílabas</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: var(--azul-medio); opacity: 0.5;"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="estrelas"><span id="contador-estrelas">0</span> ⭐</div>
    <div class="progresso-container">
        <div id="barra-progresso" class="barra-progresso"></div>
    </div>
</div>

<main id="main-content">
    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="" alt="carregando...">
        <p style="font-weight: 700; color: var(--azul-escuro); margin: 5px 0;">Organiza as sílabas:</p>
        
        <div class="zona-drop" id="caixas-destino"></div>
        <div class="opcoes-silabas" id="caixas-origem"></div>
        
        <div id="feedback" style="min-height: 35px; font-weight: 700; font-size: 1.4rem; margin-top: 10px;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.85rem;">
        2026 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let estrelas = 0;
    let listaJogo = [];
    if (typeof palavras !== 'undefined') {
        listaJogo = [...palavras].sort(() => 0.5 - Math.random());
    }

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        
        atualizarBarra();
        const item = listaJogo[indiceAtual];
        const silabasCorretas = item.divisao.split('-');
        
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('feedback').innerText = "";
        
        const destino = document.getElementById('caixas-destino');
        destino.innerHTML = "";
        silabasCorretas.forEach((s) => {
            const caixa = document.createElement('div');
            caixa.className = 'caixa-vazia';
            caixa.dataset.silabaCorreta = s;
            caixa.ondragover = (e) => e.preventDefault();
            caixa.ondrop = lidarDrop;
            destino.appendChild(caixa);
        });

        const origem = document.getElementById('caixas-origem');
        origem.innerHTML = "";
        const silabasBaralhadas = [...silabasCorretas].sort(() => 0.5 - Math.random());
        silabasBaralhadas.forEach((s, i) => {
            const div = criarSilaba(s, i);
            origem.appendChild(div);
        });
    }

    function criarSilaba(texto, id) {
        const div = document.createElement('div');
        div.className = 'caixa-silaba';
        div.innerText = texto;
        div.draggable = true;
        div.id = "silaba-" + Math.random().toString(36).substr(2, 9);
        
        div.ondragstart = (e) => {
            e.dataTransfer.setData("text", e.target.id);
            e.target.classList.add('dragging');
        };
        div.ondragend = (e) => e.target.classList.remove('dragging');
        
        div.ontouchstart = lidarTouchStart;
        div.ontouchmove = lidarTouchMove;
        div.ontouchend = lidarTouchEnd;
        
        return div;
    }

    function lidarDrop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const elemento = document.getElementById(id);
        const caixaDestino = e.target.closest('.caixa-vazia');
        
        if (caixaDestino && !caixaDestino.hasChildNodes()) {
            caixaDestino.appendChild(elemento);
            verificarPalavra();
        }
    }

    let touchElement = null;
    function lidarTouchStart(e) { touchElement = e.target; }
    function lidarTouchMove(e) {
        e.preventDefault();
        let touch = e.touches[0];
        touchElement.style.position = 'fixed';
        touchElement.style.left = touch.clientX - 40 + 'px';
        touchElement.style.top = touch.clientY - 30 + 'px';
        touchElement.style.zIndex = "1000";
    }
    function lidarTouchEnd(e) {
        if(!touchElement) return;
        touchElement.style.position = 'static';
        let touch = e.changedTouches[0];
        let dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        let caixaVazia = dropTarget ? dropTarget.closest('.caixa-vazia') : null;

        if (caixaVazia && !caixaVazia.hasChildNodes()) {
            caixaVazia.appendChild(touchElement);
            verificarPalavra();
        } else {
            document.getElementById('caixas-origem').appendChild(touchElement);
        }
        touchElement = null;
    }

    function verificarPalavra() {
        const caixas = document.querySelectorAll('.caixa-vazia');
        let preenchidas = 0;
        caixas.forEach(c => { if(c.hasChildNodes()) preenchidas++; });

        if (preenchidas === caixas.length) {
            let todasCorretas = true;
            caixas.forEach(c => {
                if (c.firstChild.innerText !== c.dataset.silabaCorreta) todasCorretas = false;
            });

            if (todasCorretas) {
                estrelas++;
                document.getElementById('contador-estrelas').innerText = estrelas;
                document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Fantástico! ✨</span>";
                document.querySelectorAll('.caixa-silaba').forEach(s => s.draggable = false);
                setTimeout(() => { indiceAtual++; carregarPergunta(); }, 1500);
            } else {
                document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Tenta outra vez! 🔄</span>";
                setTimeout(() => {
                    caixas.forEach(c => {
                        if (c.firstChild) {
                            document.getElementById('caixas-origem').appendChild(c.firstChild);
                        }
                    });
                    document.getElementById('feedback').innerText = "";
                }, 1200);
            }
        }
    }

    function atualizarBarra() {
        const perc = (indiceAtual / listaJogo.length) * 100;
        document.getElementById('barra-progresso').style.width = perc + "%";
    }

    function finalizarJogo() {
        atualizarBarra();
        document.getElementById('jogo-container').innerHTML = `
            <h2 style="color: var(--azul-escuro)">🏆 Parabéns!</h2>
            <p style="font-size: 20px;">Terminaste o jogo com <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" class="btn-menu" style="margin: 20px auto; padding: 15px 30px;">Jogar de Novo</button>
        `;
    }

    window.onload = carregarPergunta;
</script>
</body>
</html>
