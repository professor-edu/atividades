<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Arrastar Sílabas 🧩</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100dvh; 
        }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 10px 20px 0 20px; 
            color: var(--azul-escuro); 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            position: relative;
            z-index: 20;
            flex-shrink: 0;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            flex: 2;
        }

        .icone-cabecalho { width: 60px; height: auto; filter: drop-shadow(2px 2px 0px #fff); }

        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-menu span { font-size: 1.2rem; }
        .btn-menu:hover { transform: translateY(-2px); background: #e68a00; }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden; line-height: 0;
            margin-top: -1px; filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.1));
            position: relative; z-index: 10; flex-shrink: 0;
        }

        .onda-container svg { width: 100%; height: 100%; }

        .estrelas { font-size: 22px; color: #f57c00; font-weight: 700; padding: 10px; }

        #main-content { 
            flex: 1 0 auto; 
            padding: 10px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .cartao {
            background: white; width: 95%; max-width: 500px;
            margin: 5px auto; padding: 25px;
            border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .imagem-pergunta {
            height: 140px; width: 140px; object-fit: contain;
            border: 4px solid var(--azul-claro); border-radius: 20px; padding: 8px;
        }

        .zona-drop {
            display: flex; gap: 10px; justify-content: center; min-height: 65px;
            margin: 15px 0; flex-wrap: wrap;
        }

        .caixa-vazia {
            width: 85px; height: 60px; border: 3px dashed var(--azul-medio);
            border-radius: 15px; background: var(--azul-claro);
            display: flex; align-items: center; justify-content: center;
        }

        .caixa-silaba {
            width: 85px; height: 60px; background: white;
            border: 3px solid var(--azul-medio); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: var(--azul-escuro);
            cursor: grab; transition: all 0.2s;
            box-shadow: 0 4px 0px var(--azul-medio);
            user-select: none;
        }

        .caixa-silaba:active { transform: translateY(2px); box-shadow: none; }

        .opcoes-silabas {
            display: flex; gap: 12px; justify-content: center; 
            margin-top: 10px; flex-wrap: wrap; padding: 10px;
            background: #f9f9f9; border-radius: 20px; width: 100%;
        }

        footer {
            flex-shrink: 0; min-height: 70px; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 600px) {
            .cabecalho { padding: 8px 10px 0 10px; }
            h1 { font-size: 0.9rem; }
            .cartao { padding: 15px; width: 92%; }
            .caixa-silaba, .caixa-vazia { width: 70px; height: 55px; font-size: 18px; }
            .onda-container { height: 30px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="puzzle.png" class="icone-cabecalho" alt="jogo"> 
        <h1 style="margin:0">Arrastar Sílabas</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#bde6ff; stop-opacity:1" />
                <stop offset="100%" style="stop-color:#7ac7f0; stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda);"></path>
    </svg>
</div>

<div class="estrelas"><span id="contador-estrelas">0</span> ⭐</div>

<main id="main-content">
    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="">
        
        <p style="font-weight: 700; color: var(--azul-escuro); margin: 5px 0;">Forma a palavra:</p>
        
        <div class="zona-drop" id="caixas-destino"></div>

        <div class="opcoes-silabas" id="caixas-origem"></div>

        <div id="feedback" style="min-height: 30px; font-weight: 700; font-size: 1.3rem; margin-top: 10px;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.85rem;">
        2026 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let estrelas = 0;
    let listaJogo = [...palavras].sort(() => 0.5 - Math.random());
    let silabasColocadas = [];

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        
        const item = listaJogo[indiceAtual];
        const silabasCorretas = item.divisao.split('-');
        silabasColocadas = new Array(silabasCorretas.length).fill(null);
        
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('feedback').innerText = "";
        
        // Criar caixas vazias de destino
        const destino = document.getElementById('caixas-destino');
        destino.innerHTML = "";
        silabasCorretas.forEach((_, i) => {
            const caixa = document.createElement('div');
            caixa.className = 'caixa-vazia';
            caixa.dataset.index = i;
            caixa.onclick = () => removerSilaba(i);
            destino.appendChild(caixa);
        });

        // Criar opções de sílabas (baralhadas)
        const origem = document.getElementById('caixas-origem');
        origem.innerHTML = "";
        const silabasEmbaralhadas = [...silabasCorretas].sort(() => 0.5 - Math.random());
        
        silabasEmbaralhadas.forEach(s => {
            const div = document.createElement('div');
            div.className = 'caixa-silaba';
            div.innerText = s;
            div.onclick = () => colocarSilaba(s, div);
            origem.appendChild(div);
        });
    }

    function colocarSilaba(silaba, elemento) {
        const proxEspaco = silabasColocadas.indexOf(null);
        if (proxEspaco !== -1) {
            silabasColocadas[proxEspaco] = silaba;
            const caixasVazias = document.querySelectorAll('.caixa-vazia');
            caixasVazias[proxEspaco].innerText = silaba;
            caixasVazias[proxEspaco].style.borderStyle = "solid";
            caixasVazias[proxEspaco].style.background = "white";
            elemento.style.visibility = "hidden";
            verificarResultado();
        }
    }

    function removerSilaba(index) {
        if (silabasColocadas[index] !== null) {
            const silabaRemovida = silabasColocadas[index];
            silabasColocadas[index] = null;
            
            const caixasVazias = document.querySelectorAll('.caixa-vazia');
            caixasVazias[index].innerText = "";
            caixasVazias[index].style.borderStyle = "dashed";
            caixasVazias[index].style.background = "var(--azul-claro)";
            
            // Devolver à origem
            const opcoes = document.querySelectorAll('.caixa-silaba');
            for (let opt of opcoes) {
                if (opt.innerText === silabaRemovida && opt.style.visibility === "hidden") {
                    opt.style.visibility = "visible";
                    break;
                }
            }
        }
    }

    function verificarResultado() {
        if (silabasColocadas.includes(null)) return;

        const item = listaJogo[indiceAtual];
        const palavraFormada = silabasColocadas.join('-');
        
        if (palavraFormada === item.divisao) {
            estrelas++;
            document.getElementById('contador-estrelas').innerText = estrelas;
            document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Correto! ✨</span>";
            setTimeout(() => { indiceAtual++; carregarPergunta(); }, 1500);
        } else {
            document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Tenta outra vez! 🔄</span>";
            setTimeout(() => {
                silabasColocadas.forEach((_, i) => removerSilaba(i));
                document.getElementById('feedback').innerText = "";
            }, 1500);
        }
    }

    function finalizarJogo() {
        document.getElementById('jogo-container').innerHTML = `
            <h2 style="color: var(--azul-escuro)">🏆 Parabéns!</h2>
            <p style="font-size: 20px;">Terminaste o desafio com <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" style="padding: 12px 30px; border-radius: 50px; cursor: pointer; background: var(--azul-escuro); color: white; border: none; font-weight: 700; font-family: 'Quicksand';">Jogar de Novo</button>
        `;
    }

    window.onload = carregarPergunta;
</script>
</body>
</html>
