<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Arrastar Sílabas 🧩</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; /* Azul Mais Claro */
            --azul-grad-dir: #2e86de; /* Azul Mais Escuro e Vibrante */
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
            /* Sombra suave para a onda */
            --sombra-separacao: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* HEADER PADRONIZADO - 85PX COM GRADIENTE ESQUERDA -> DIREITA */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            color: var(--azul-escuro); 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
            /* A sombra será aplicada no container da onda para cobrir a área */
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        /* TÍTULO COM TAMANHO CORRIGIDO (1.5rem / 24px) */
        .cabecalho h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .icone-cabecalho { 
            width: 70px !important; 
            height: 70px !important; 
            object-fit: contain;
            filter: drop-shadow(2px 2px 0px rgba(255,255,255,0.5)); 
        }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-menu:hover { transform: translateY(-3px) scale(1.05); background: #f57c00; }

        /* ONDA COM GRADIENTE ESQUERDA -> DIREITA E SOMBRA DE SEPARAÇÃO */
        .onda-container {
            height: 45px; 
            width: 100%; 
            overflow: hidden;
            margin-top: -1px; /* Para cobrir qualquer pixel branco */
            flex-shrink: 0; 
            z-index: 10;
            /* A SOMBRA É APLICADA AQUI NO CONTAINER */
            filter: drop-shadow(var(--sombra-separacao));
        }

        .onda-container svg { height: 100%; width: 100%; }

        .status-jogo { padding: 5px; flex-shrink: 0; }
        .estrelas { font-size: 22px; color: #f57c00; font-weight: 700; margin-bottom: 5px; }

        .progresso-container {
            width: 90%; max-width: 480px; height: 20px; 
            background: white; border-radius: 15px; margin: 0 auto; 
            overflow: hidden; border: 2.5px solid var(--azul-grad-dir);
        }
        .barra-progresso {
            width: 0%; height: 100%;
            background: var(--azul-vibrante);
            transition: width 0.5s ease;
        }

        #main-content { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            min-height: 0; padding: 10px;
        }

        .cartao {
            background: white; width: 92%; max-width: 480px;
            padding: 20px; border-radius: 30px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        .imagem-pergunta {
            height: 150px; width: 150px; object-fit: contain;
            border: 3px solid var(--azul-claro); border-radius: 20px; padding: 8px;
        }

        .zona-drop {
            display: flex; gap: 12px; justify-content: center; min-height: 75px;
            margin: 10px 0; flex-wrap: wrap; padding: 12px;
            border-radius: 20px; background: #fff; border: 2px solid #f1f5f9;
        }

        .caixa-vazia {
            width: 80px; height: 60px; border: 3px dashed #cbd5e0;
            border-radius: 15px; background: transparent;
            display: flex; align-items: center; justify-content: center;
        }

        .caixa-silaba {
            width: 80px; height: 60px; background: white;
            border: 3px solid var(--azul-grad-dir); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 700; color: var(--azul-escuro);
            cursor: grab; box-shadow: 0 5px 0px var(--azul-grad-dir);
            user-select: none; touch-action: none;
        }

        .opcoes-silabas {
            display: flex; gap: 12px; justify-content: center; 
            margin-top: 5px; flex-wrap: wrap; padding: 18px;
            background: white; border: 2px solid var(--azul-claro);
            border-radius: 25px; width: 100%; min-height: 85px;
        }

        footer {
            height: 55px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 600px) {
            .cabecalho h1 { font-size: 1.2rem; }
            .icone-cabecalho { width: 60px !important; height: 60px !important; }
            .caixa-silaba, .caixa-vazia { width: 68px; height: 55px; font-size: 17px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="puzzle.png" class="icone-cabecalho" alt="jogo"> 
        <h1>Arrastar Sílabas</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none">
        <defs>
            <linearGradient id="grad-onda-horizontal" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda-horizontal);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="estrelas"><span id="contador-estrelas">0</span> ⭐</div>
    <div class="progresso-container">
        <div id="barra-progresso" class="barra-progresso"></div>
    </div>
</div>

<main id="main-content">
    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="" alt="carregando...">
        <p style="font-weight: 700; color: var(--azul-escuro); margin: 5px 0;">Organiza as sílabas:</p>
        <div class="zona-drop" id="caixas-destino"></div>
        <div class="opcoes-silabas" id="caixas-origem"></div>
        <div id="feedback" style="min-height: 30px; font-weight: 700; font-size: 1.2rem; margin-top: 5px;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        2026 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    // A lógica JavaScript permanece igual
    let indiceAtual = 0;
    let estrelas = 0;
    let listaJogo = [];
    if (typeof palavras !== 'undefined') {
        listaJogo = [...palavras].sort(() => 0.5 - Math.random());
    }

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        atualizarBarra();
        const item = listaJogo[indiceAtual];
        const silabasCorretas = item.divisao.split('-');
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('feedback').innerText = "";
        
        const destino = document.getElementById('caixas-destino');
        destino.innerHTML = "";
        silabasCorretas.forEach((s) => {
            const caixa = document.createElement('div');
            caixa.className = 'caixa-vazia';
            caixa.dataset.silabaCorreta = s;
            caixa.ondragover = (e) => e.preventDefault();
            caixa.ondrop = lidarDrop;
            destino.appendChild(caixa);
        });

        const origem = document.getElementById('caixas-origem');
        origem.innerHTML = "";
        const silabasBaralhadas = [...silabasCorretas].sort(() => 0.5 - Math.random());
        silabasBaralhadas.forEach((s, i) => origem.appendChild(criarSilaba(s, i)));
    }

    function criarSilaba(texto, id) {
        const div = document.createElement('div');
        div.className = 'caixa-silaba';
        div.innerText = texto;
        div.draggable = true;
        div.id = "silaba-" + Math.random().toString(36).substr(2, 9);
        div.ondragstart = (e) => { e.dataTransfer.setData("text", e.target.id); e.target.classList.add('dragging'); };
        div.ondragend = (e) => e.target.classList.remove('dragging');
        div.ontouchstart = lidarTouchStart;
        div.ontouchmove = lidarTouchMove;
        div.ontouchend = lidarTouchEnd;
        return div;
    }

    function lidarDrop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const elemento = document.getElementById(id);
        const caixaDestino = e.target.closest('.caixa-vazia');
        if (caixaDestino && !caixaDestino.hasChildNodes()) {
            caixaDestino.appendChild(elemento);
            verificarPalavra();
        }
    }

    let touchElement = null;
    function lidarTouchStart(e) { touchElement = e.target; }
    function lidarTouchMove(e) {
        e.preventDefault();
        let touch = e.touches[0];
        touchElement.style.position = 'fixed';
        touchElement.style.left = touch.clientX - 35 + 'px';
        touchElement.style.top = touch.clientY - 25 + 'px';
        touchElement.style.zIndex = "1000";
    }
    function lidarTouchEnd(e) {
        if(!touchElement) return;
        touchElement.style.position = 'static';
        let touch = e.changedTouches[0];
        let dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        let caixaVazia = dropTarget ? dropTarget.closest('.caixa-vazia') : null;
        if (caixaVazia && !caixaVazia.hasChildNodes()) {
            caixaVazia.appendChild(touchElement);
            verificarPalavra();
        } else {
            document.getElementById('caixas-origem').appendChild(touchElement);
        }
        touchElement = null;
    }

    function verificarPalavra() {
        const caixas = document.querySelectorAll('.caixa-vazia');
        let preenchidas = 0;
        caixas.forEach(c => { if(c.hasChildNodes()) preenchidas++; });
        if (preenchidas === caixas.length) {
            let todasCorretas = true;
            caixas.forEach(c => { if (c.firstChild.innerText !== c.dataset.silabaCorreta) todasCorretas = false; });
            if (todasCorretas) {
                estrelas++;
                document.getElementById('contador-estrelas').innerText = estrelas;
                document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Incrível! ✨</span>";
                setTimeout(() => { indiceAtual++; carregarPergunta(); }, 1200);
            } else {
                document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Tenta outra vez! 🔄</span>";
                setTimeout(() => {
                    caixas.forEach(c => { if (c.firstChild) document.getElementById('caixas-origem').appendChild(c.firstChild); });
                    document.getElementById('feedback').innerText = "";
                }, 1000);
            }
        }
    }

    function atualizarBarra() {
        const perc = (indiceAtual / listaJogo.length) * 100;
        document.getElementById('barra-progresso').style.width = perc + "%";
    }

    function finalizarJogo() {
        atualizarBarra();
        document.getElementById('jogo-container').innerHTML = `
            <h2 style="color: var(--azul-escuro)">🏆 Parabéns!</h2>
            <p>Conseguiste as <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" class="btn-menu" style="margin: 10px auto;">Recomeçar</button>
        `;
    }
    window.onload = carregarPergunta;
</script>
</body>
</html>
