<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ Ordenar e Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* HEADER PADRONIZADO */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .icone-cabecalho { 
            width: 70px !important; 
            height: 70px !important; 
            object-fit: contain;
            filter: drop-shadow(2px 2px 0px rgba(255,255,255,0.4)); 
        }

        /* MENU COM ZOOM */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .btn-menu:hover { background: #f57c00; transform: scale(1.05); }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3));
        }

        /* PROGRESSO E CONTADORES */
        .status-jogo { padding: 5px; flex-shrink: 0; }
        .contadores { 
            display: flex; justify-content: center; gap: 20px; 
            font-weight: 700; margin-bottom: 8px; font-size: 1.1rem;
        }
        .icone-contador { width: 22px; vertical-align: middle; margin-right: 5px; }
        #certas { color: var(--verde); }
        #erros { color: var(--vermelho); }

        .progresso-container {
            width: 90%; max-width: 480px; height: 18px; 
            background: white; border-radius: 15px; margin: 0 auto; 
            overflow: hidden; border: 2.5px solid var(--azul-grad-dir);
        }
        .barra-progresso {
            width: 0%; height: 100%;
            background: var(--azul-vibrante);
            transition: width 0.5s ease;
        }

        /* ÁREA DE JOGO */
        #main-content { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            min-height: 0; padding: 10px;
        }

        .cartao {
            background: white; width: 92%; max-width: 460px;
            padding: 20px; border-radius: 25px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }

        .imagem-palavra {
            height: 140px; width: 140px; object-fit: contain;
            border: 3px solid var(--azul-claro); border-radius: 15px; padding: 8px;
        }

        .silabas-disponiveis {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            padding: 10px; background: var(--azul-claro); border-radius: 12px;
            width: 100%; box-sizing: border-box;
        }

        .silaba-caixa {
            background: white; padding: 8px 15px; border-radius: 10px;
            border: 2px solid var(--azul-grad-dir); font-weight: 700;
            color: var(--azul-escuro); box-shadow: 0 3px 0 var(--azul-grad-dir);
        }

        /* CAMPO DE ESCRITA */
        #campoEscrita {
            width: 80%; padding: 12px; border: 3px solid var(--azul-grad-dir);
            border-radius: 15px; font-size: 1.2rem; text-align: center;
            font-family: 'Quicksand', sans-serif; font-weight: 700;
            color: var(--azul-escuro); outline: none;
        }

        #campoEscrita:focus { border-color: var(--azul-vibrante); background: #f0f7ff; }

        /* BOTÃO VERIFICAR */
        #validar {
            background: var(--azul-vibrante); color: white; border: none;
            padding: 12px 25px; border-radius: 25px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem; box-shadow: 0 4px 0px var(--azul-escuro);
            transition: 0.2s;
        }

        #validar:hover { transform: translateY(-2px); box-shadow: 0 6px 0px var(--azul-escuro); }
        #validar:active { transform: translateY(2px); box-shadow: 0 1px 0px var(--azul-escuro); }
        .icone-lupa { width: 24px; filter: brightness(0) invert(1); }

        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 600px) {
            .cabecalho h1 { font-size: 1.3rem; }
            .icone-cabecalho { width: 55px !important; height: 55px !important; }
            #campoEscrita { width: 90%; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/270F.svg" class="icone-cabecalho">
        <h1>Escrever Sílabas</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <defs>
            <linearGradient id="grad-onda-final" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda-final);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="contadores">
        <span id="certas"><img src="img/certo.png" class="icone-contador"> 0</span>
        <span id="erros"><img src="img/errado.png" class="icone-contador"> 0</span>
    </div>
    <div class="progresso-container">
        <div id="progressoInterno" class="barra-progresso"></div>
    </div>
</div>

<main id="main-content">
    <div id="areaJogo" class="cartao">
        <img id="imagemPalavra" src="" alt="imagem da palavra" class="imagem-palavra">
        
        <div id="silabas" class="silabas-disponiveis">
            </div>

        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">

        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
            
        <div id="feedback" style="min-height: 25px; font-weight: 700; margin-top: 5px;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>
<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>
</body>
</html>
