<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - O Comboio das Sequências 🚂</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE (INTOCÁVEL)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            /* Adições exclusivas do jogo */
            --cor-erro: #ff4757;
            --cor-sucesso: #2ed573;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER IGUAL AO TEMPLATE 1 ANO PT */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* HAMBURGER ANIMADO */
        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 3vw, 1.1rem); 
            font-weight: 500; 
            opacity: 0.8; 
            margin-top: 15px; 
        }

        /* SIDEBAR COMPLETA DO TEMPLATE */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO COM CARTÃO CENTRAL */
        main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 30px 20px; }
        
        .cartao-jogo-container {
            background: white;
            width: 100%;
            max-width: 800px;
            min-height: 450px;
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-top: 8px solid var(--cor-1ano);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Ajustado para começar de cima */
            position: relative;
            overflow: hidden;
        }

        /* FOOTER COM BORDER AZUL FIXA */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center;}
            .cartao-jogo-container { padding: 20px 10px; }
        }

        /* =========================================
           CSS EXCLUSIVO DO JOGO
           ========================================= */
        
        /* Painel de Topo e Níveis */
        .painel-topo { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 15px; width: 100%; max-width: 750px; margin-bottom: 10px; padding-bottom: 15px; border-bottom: 2px dashed #e3f2fd; }
        
        .menu-niveis { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-nivel { background-color: white; border: 3px solid #ced6e0; border-radius: 12px; padding: 10px 18px; cursor: pointer; font-size: 1rem; font-weight: 700; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-nivel:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #ced6e0; }
        .btn-nivel:active { transform: translateY(3px); box-shadow: 0 0px 0 transparent; }
        .btn-nivel.active { border-color: var(--cor-1ano); background-color: #e3f2fd; color: var(--azul-escuro); box-shadow: 0 3px 0 var(--cor-1ano-dark); transform: translateY(2px); }

        .btn-ajuda-topo { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; border-radius: 50%; width: 42px; height: 42px; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 0 #ffeeba;}
        .btn-ajuda-topo:hover { transform: scale(1.1); background: #ffe8a1;}
        .btn-ajuda-topo:active { transform: translateY(2px); box-shadow: none;}

        /* Barra de Progresso e Certas/Erradas */
        .status-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; background: #f8fafc; padding: 10px 20px; border-radius: 15px; border: 2px solid #e3f2fd; min-width: 200px;}
        .status-counters { display: flex; gap: 20px; font-weight: bold; font-size: 1.1rem; width: 100%; justify-content: space-between;}
        .score-certas { color: var(--cor-sucesso); display: flex; align-items: center; gap: 5px; }
        .score-erradas { color: var(--cor-erro); display: flex; align-items: center; gap: 5px; }
        
        .barra-progresso-container { width: 100%; height: 10px; background-color: #e2e8f0; border-radius: 5px; overflow: hidden; position: relative;}
        .barra-progresso { height: 100%; background-color: var(--cor-1ano); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 5px;}

        #game-area { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; min-height: 250px;}

        /* Comboio das Sequências */
        .pergunta-texto { font-size: 1.6rem; color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 15px 0 30px 0; animation: fadeIn 0.4s ease;}
        
        .comboio-container { display: flex; align-items: flex-end; justify-content: center; padding-bottom: 25px; padding-top: 30px; margin-bottom: 20px; transition: transform 0.5s ease; width: 100%; max-width: 100%; }
        
        .locomotiva { width: 70px; height: 60px; background: var(--cor-1ano); border-radius: 20px 10px 0 0; position: relative; border: 4px solid var(--azul-escuro); border-bottom: none; box-shadow: inset -5px -5px 0 rgba(0,0,0,0.1); z-index: 2; }
        .janela-loc { width: 25px; height: 25px; background: #e3f2fd; border: 3px solid var(--azul-escuro); position: absolute; right: 5px; top: 8px; border-radius: 5px; }
        .chamine { width: 18px; height: 25px; background: var(--cor-1ano); border: 3px solid var(--azul-escuro); border-bottom: none; position: absolute; left: 8px; top: -25px; border-radius: 3px 3px 0 0; }
        .fumo { position: absolute; width: 12px; height: 12px; background: #cfd8dc; border-radius: 50%; left: 11px; top: -40px; animation: fumoSobe 2s infinite linear; opacity: 0; }
        .fumo:nth-child(2) { animation-delay: 1s; }

        .carruagem { width: 55px; height: 50px; background: white; border: 4px solid var(--azul-escuro); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; position: relative; color: var(--azul-escuro); box-shadow: inset -3px -3px 0 rgba(0,0,0,0.05); z-index: 2; }
        
        .carruagem.oculta { background: #fff3cd; border-color: #ffc107; color: #d39e00; font-size: 2.2rem; border-style: dashed; }
        .carruagem.sucesso { background: #eafff0; border-color: var(--cor-sucesso); color: var(--cor-sucesso); border-style: solid; animation: popIn 0.4s ease forwards;}

        .engate { width: 12px; height: 8px; background: var(--text-main); align-self: flex-end; margin-bottom: 12px; z-index: 1; border-radius: 2px;}
        
        .locomotiva::before, .locomotiva::after, .carruagem::before, .carruagem::after { content: ''; position: absolute; bottom: -12px; width: 18px; height: 18px; background: #455a64; border: 3px solid #b0bec5; border-radius: 50%; z-index: 3; box-sizing: border-box; }
        .locomotiva::before { left: 5px; } .locomotiva::after { right: 5px; }
        .carruagem::before { left: 5px; } .carruagem::after { right: 5px; }

        .linha-comboio { position: absolute; bottom: 10px; left: -10%; width: 120%; height: 6px; background: #ced6e0; border-radius: 3px; z-index: 0; }

        .opcoes-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 10px; width: 100%; animation: fadeIn 0.4s ease;}
        .btn-opcao { background: white; border: 3px solid var(--azul-vibrante); border-radius: 15px; padding: 15px 35px; font-size: 2.2rem; font-weight: bold; color: var(--azul-escuro); cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 var(--azul-vibrante); display: flex; align-items: center; justify-content: center; min-width: 90px;}
        .btn-opcao:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--azul-vibrante); }
        .btn-opcao:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        .btn-disabled { pointer-events: none; opacity: 0.7; }

        .arrancar { animation: sairEstacao 1.2s cubic-bezier(0.5, 0, 0.5, 1) forwards; }

        /* Modal e Ecrã Final */
        .modal-ajuda-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; padding: 20px; box-sizing: border-box;}
        .modal-ajuda-overlay.active { display: flex; }
        .modal-ajuda-box { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; border-top: 8px solid var(--cor-1ano);}
        .btn-fechar-modal { position: absolute; top: 15px; right: 15px; background: #ffebeb; color: #ff4757; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s;}
        .btn-fechar-modal:hover { background: #ff4757; color: white;}
        .ajuda-icone { font-size: 4rem; margin-bottom: 10px; }
        .ajuda-texto { font-size: 1.2rem; color: var(--text-main); line-height: 1.5; font-weight: 500;}

        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width: 100%; height:100%; background: rgba(255,255,255,0.95); z-index: 20; animation: fadeIn 0.5s ease;}
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; text-align: center;}
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; text-align: center; display: flex; gap: 20px; justify-content: center;}
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); display: flex; gap: 10px;}

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.5); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes errorShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-3deg); } 75% { transform: translateX(8px) rotate(3deg); } }
        @keyframes fumoSobe { 0% { opacity: 0; transform: translateY(0) scale(1); } 50% { opacity: 0.6; } 100% { opacity: 0; transform: translateY(-30px) scale(2); } }
        @keyframes sairEstacao { 0% { transform: translateX(0); } 100% { transform: translateX(120vw); } }
        
        .error-shake { animation: errorShake 0.4s ease; border-color: var(--cor-erro) !important; background-color: #ffefef !important; color: var(--cor-erro) !important;}
        .success-flash { background-color: #eafff0 !important; border-color: var(--cor-sucesso) !important; color: var(--cor-sucesso) !important; }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        /* Ajustes Mobile Adicionais */
        @media (max-width: 600px) {
            .painel-topo { gap: 10px; }
            .status-wrapper { width: 100%; padding: 8px 15px; }
            .btn-nivel { font-size: 0.9rem; padding: 8px 12px; flex: 1; justify-content: center;}
            .comboio-container { transform: scale(0.85); transform-origin: center bottom; margin-bottom: 5px; padding-top: 20px;}
            .btn-opcao { font-size: 1.8rem; padding: 12px 25px; min-width: 70px;}
            .pergunta-texto { font-size: 1.3rem; margin-bottom: 15px;}
        }
        @media (max-width: 400px) {
            .comboio-container { transform: scale(0.65); transform-origin: center bottom; margin-bottom: 0px;}
            .btn-opcao { font-size: 1.5rem; padding: 10px 20px;}
            .opcoes-container { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
         <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>O Comboio das Sequências 🚂</h1>
        <div class="subtitulo">Completa a carruagem que falta!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="area-jogo">
        
        <!-- PAINEL DE TOPO COM BARRA DE PROGRESSO E CONTADORES -->
        <div class="painel-topo">
            <div class="menu-niveis" id="menu-niveis">
                <button class="btn-nivel active" id="btn-nivel-1" onclick="iniciarJogo(1)">🍎 Visuais</button>
                <button class="btn-nivel" id="btn-nivel-2" onclick="iniciarJogo(2)">🔢 Fim da Linha</button>
                <button class="btn-nivel" id="btn-nivel-3" onclick="iniciarJogo(3)">🕵️ Meio da Linha</button>
            </div>
            
            <button class="btn-ajuda-topo" onclick="abrirAjuda()" title="Ajuda">💡</button>
            
            <div class="status-wrapper">
                <div class="status-counters">
                    <span class="score-certas">Certas: <span id="val-certas">0</span></span>
                    <span class="score-erradas">Erradas: <span id="val-erradas">0</span></span>
                </div>
                <div class="barra-progresso-container">
                    <div class="barra-progresso" id="barra-progresso"></div>
                </div>
            </div>
        </div>

        <!-- ÁREA DO COMBOIO -->
        <div id="game-area">
            <!-- CONTEÚDO INJETADO VIA JS -->
        </div>

        <!-- ECRÃ FINAL -->
        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Missão Cumprida! 🎉</h2>
            <div class="end-stats">
                <span style="color:var(--cor-sucesso)">✅ Certas: <strong id="final-certas">0</strong></span>
                <span style="color:var(--cor-erro)">❌ Erradas: <strong id="final-erradas">0</strong></span>
            </div>
            <button class="btn-reiniciar" onclick="reiniciarNivelAtual()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<!-- MODAL DE AJUDA -->
<div class="modal-ajuda-overlay" id="modal-ajuda">
    <div class="modal-ajuda-box">
        <button class="btn-fechar-modal" onclick="fecharAjuda()">✕</button>
        <div class="ajuda-icone" id="ajuda-icone">💡</div>
        <div class="ajuda-texto" id="ajuda-texto">Dica de jogo!</div>
    </div>
</div>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    function abrirAjuda() {
        const icone = document.getElementById('ajuda-icone');
        const texto = document.getElementById('ajuda-texto');

        if (nivelAtual === 1) {
            icone.innerHTML = "🗣️";
            texto.innerHTML = "Diz os desenhos em voz alta para descobrires o segredo!<br><br>Exemplo: Maçã, Banana, Maçã, Banana...";
        } else if (nivelAtual === 2) {
            icone.innerHTML = "🦘";
            texto.innerHTML = "Descobre de quanto em quanto o comboio salta!<br><br>Pode estar a crescer de 1 em 1, de 2 em 2 ou de 5 em 5.";
        } else if (nivelAtual === 3) {
            icone.innerHTML = "🕵️";
            texto.innerHTML = "Atenção Detetive!<br><br>O comboio salta sempre para a frente, mas o buraco agora pode estar escondido no meio!";
        }
        
        document.getElementById('modal-ajuda').classList.add('active');
        tocarSom('flip');
    }

    function fecharAjuda() { document.getElementById('modal-ajuda').classList.remove('active'); }

    /* =========================================
       LÓGICA DO JOGO E VARIÁVEIS
       ========================================= */
    let nivelAtual = 1;
    let certas = 0;
    let erradas = 0;
    const TOTAL_DESAFIOS = 10; // 10 questões por nível

    const gameArea = document.getElementById('game-area');
    const elCertas = document.getElementById('val-certas');
    const elErradas = document.getElementById('val-erradas');
    const barraProgresso = document.getElementById('barra-progresso');
    const endScreen = document.getElementById('end-screen');

    let sequencia =[];
    let indiceOculto = 4;
    let respostaCorreta = null;

    function iniciarJogo(nivel) {
        document.querySelectorAll('.btn-nivel').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-nivel-' + nivel).classList.add('active');

        nivelAtual = nivel;
        certas = 0;
        erradas = 0;

        atualizarPlacar();
        endScreen.style.display = 'none';
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        gerarDesafio();
    }

    function reiniciarNivelAtual() { iniciarJogo(nivelAtual); }
    
    function atualizarPlacar() { 
        elCertas.textContent = certas; 
        elErradas.textContent = erradas;
        // A barra enche mediante as respostas corretas (como cada correta avança um desafio, representa o progresso global)
        const percentagem = (certas / TOTAL_DESAFIOS) * 100;
        barraProgresso.style.width = percentagem + '%';
    }

    function gerarDesafio() {
        if (certas >= TOTAL_DESAFIOS) { finalizarJogo(); return; }
        
        if (nivelAtual === 1) gerarNivel1();
        else if (nivelAtual === 2) gerarNivel2();
        else if (nivelAtual === 3) gerarNivel3();
    }

    // NÍVEL 1: Padrões Visuais (AB, AABB, ABC)
    function gerarNivel1() {
        const temas = [['🍎','🍌'], ['🐶','🐱'], ['🚗','🚙'],['🔴','🔵','🟡'], ['⭐','🌙']];
        const tema = temas[Math.floor(Math.random() * temas.length)];
        
        let padrao = 'AB';
        if (tema.length === 3) padrao = 'ABC';
        else if (Math.random() > 0.5) padrao = 'AABB';

        sequencia =[];
        if (padrao === 'AB') {
            for(let i=0; i<5; i++) sequencia.push(tema[i%2]);
        } else if (padrao === 'AABB') {
            sequencia =[tema[0], tema[0], tema[1], tema[1], tema[0]]; 
        } else if (padrao === 'ABC') {
            for(let i=0; i<5; i++) sequencia.push(tema[i%3]);
        }

        indiceOculto = 4; // Fim da linha
        respostaCorreta = sequencia[indiceOculto];

        let opcoes = [respostaCorreta];
        let possiveis = [...tema];
        
        while(opcoes.length < 3) {
            let rnd = possiveis[Math.floor(Math.random()*possiveis.length)];
            if(!opcoes.includes(rnd)) opcoes.push(rnd);
            
            if(possiveis.length < 3) {
                let extra =['🍉','🐸','🎈'][Math.floor(Math.random()*3)];
                if(!opcoes.includes(extra)) opcoes.push(extra);
            }
        }
        renderComboio(opcoes);
    }

    // NÍVEL 2: Sequências Crescentes, Buraco no Fim da Linha
    function gerarNivel2() {
        const passos = [1, 2, 5];
        const passo = passos[Math.floor(Math.random() * passos.length)];
        const inicio = Math.floor(Math.random() * 10) + 1; 

        sequencia =[];
        for(let i=0; i<5; i++) sequencia.push(inicio + i*passo);

        indiceOculto = 4; // Fim da linha
        respostaCorreta = sequencia[indiceOculto];

        let opcoes = [respostaCorreta];
        while(opcoes.length < 3) {
            let offset = (Math.floor(Math.random()*5) - 2) * passo;
            if (offset === 0) offset = passo * 2;
            let rnd = respostaCorreta + offset;
            if(rnd !== respostaCorreta && rnd > 0 && !opcoes.includes(rnd)) opcoes.push(rnd);
        }
        renderComboio(opcoes);
    }

    // NÍVEL 3: Sequências Crescentes (Apenas para a frente!), Buraco no Meio da Linha
    function gerarNivel3() {
        const passos =[1, 2, 5, 10]; // Incluí o salto de 10
        const passo = passos[Math.floor(Math.random() * passos.length)];
        const inicio = Math.floor(Math.random() * 20) + 1; 

        sequencia =[];
        for(let i=0; i<5; i++) sequencia.push(inicio + i*passo); // Sempre crescente!

        // Buraco no meio (posição 1, 2 ou 3) - nunca a primeira nem a última carruagem
        indiceOculto = Math.floor(Math.random() * 3) + 1; 
        respostaCorreta = sequencia[indiceOculto];

        let opcoes = [respostaCorreta];
        while(opcoes.length < 3) {
            let rnd = respostaCorreta + (Math.floor(Math.random()*5) - 2) * passo;
            if (rnd === respostaCorreta) rnd += passo;
            if(rnd > 0 && !opcoes.includes(rnd)) opcoes.push(rnd);
        }
        renderComboio(opcoes);
    }

    // RENDERIZAR ESTRUTURA
    function renderComboio(opcoes) {
        opcoes.sort(() => Math.random() - 0.5);

        let html = `<div class="pergunta-texto">Completa a sequência!</div>`;
        html += `<div style="position:relative; width:100%; display:flex; justify-content:center;">`;
        html += `<div class="comboio-container" id="o-comboio">`;
        html += `<div class="linha-comboio"></div>`; 
        
        html += `
            <div class="locomotiva">
                <div class="janela-loc"></div>
                <div class="chamine"><div class="fumo"></div><div class="fumo"></div></div>
            </div>
        `;

        for(let i=0; i<5; i++) {
            html += `<div class="engate"></div>`;
            if (i === indiceOculto) {
                html += `<div class="carruagem oculta" id="carruagem-alvo">?</div>`;
            } else {
                html += `<div class="carruagem">${sequencia[i]}</div>`;
            }
        }

        html += `</div></div>`; 

        html += `<div class="opcoes-container" id="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarResposta(this, '${op}')">${op}</button>`;
        });
        html += `</div>`;

        gameArea.innerHTML = html;
    }

    function verificarResposta(btn, valorEscolhido) {
        if (String(valorEscolhido) === String(respostaCorreta)) {
            
            btn.classList.add('success-flash');
            tocarSom('acerto');
            certas++;
            atualizarPlacar();
            
            const alvo = document.getElementById('carruagem-alvo');
            alvo.textContent = respostaCorreta;
            alvo.classList.remove('oculta');
            alvo.classList.add('sucesso');
            
            document.getElementById('opcoes-container').classList.add('btn-disabled');
            
            setTimeout(() => { document.getElementById('o-comboio').classList.add('arrancar'); }, 500);

            setTimeout(gerarDesafio, 1500); 
            
        } else {
            btn.classList.add('error-shake');
            tocarSom('erro');
            erradas++;
            atualizarPlacar();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    function finalizarJogo() {
        endScreen.style.display = 'flex';
        document.getElementById('final-certas').textContent = certas;
        document.getElementById('final-erradas').textContent = erradas;
        dispararConfetis();

        if (erradas === 0) {
            document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
            tocarSom('vitoria'); 
        } else if (erradas <= 3) {
            document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
            tocarSom('vitoria'); 
        } else {
            document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
            tocarSom('vitoria'); 
        }
    }

    /* =========================================
       SISTEMA DE SOM E CONFETIS
       ========================================= */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'flip') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, agora); osc.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
            gain.gain.setValueAtTime(0.05, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        }
        else if (tipo === 'acerto') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(250, agora); osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() { canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth; canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight; }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis = [];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#9b59b6'];
        for (let i = 0; i < 100; i++) {
            confetis.push({ x: Math.random() * canvasConfetti.width, y: Math.random() * canvasConfetti.height - canvasConfetti.height, w: Math.random() * 10 + 5, h: Math.random() * 10 + 5, cor: cores[Math.floor(Math.random() * cores.length)], velY: Math.random() * 3 + 2, velX: Math.random() * 2 - 1, rotacao: Math.random() * 360, velRotacao: Math.random() * 5 - 2.5 });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;
        confetis.forEach(c => {
            c.y += c.velY; c.x += c.velX; c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;
            ctxConfetti.save(); ctxConfetti.translate(c.x, c.y); ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor; ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h); ctxConfetti.restore();
        });
        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = () => iniciarJogo(1);

</script>
