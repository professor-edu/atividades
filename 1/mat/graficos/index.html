<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Gráficos 📊</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        /* =========================================
           CSS DO TEMPLATE BASE (CORES E ESTRUTURA)
           ========================================= */
        :root {
            --bg-body: #f0f7ff;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --cor-borda: #0091ff;            
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --borda-cartao: #ced6e0;
            --cor-pt: #ff6b6b;
            --cor-mat: #4dabf7;
            --cor-em: #51cf66;

            /* NOVAS CORES DO MENU INICIAL (Referência da Imagem) */
            --cor-btn-azul: #61A0FF;
            --cor-btn-verde: #5DD279;
            --cor-btn-amarelo: #FBC531;
            --cor-btn-vermelho: #FF6B6B;
            --cor-btn-roxo: #A55EEA;
            --cor-btn-laranja: #FA983A;

            /* Cores específicas da mecânica de jogo */
            --cor-erro: #ff4757;
            --cor-sucesso: #2ed573;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        @media (min-width: 769px) and (min-height: 600px) { body { height: 100vh; overflow-y: auto; } }
        
        /* HEADER E NAVEGAÇÃO */
        header {
            background-color: var(--bg-header); padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100;
        }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.3); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        @media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }        
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
        @media (hover: hover) { .btn-voltar:hover { transform: scale(1.05); } }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 15px 10px; gap: 10px; } 
            .cartao-jogo-container { padding: 15px; }
        }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        @media (hover: hover) { .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* CARTÃO PRINCIPAL */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px 20px; width: 100%; box-sizing: border-box; }
        
        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 950px; 
            flex: 1; min-height: 0; 
            padding: 25px 20px; border-radius: 30px; box-shadow: 0 4px 15px var(--cor-mat); 
            border-top: 8px solid var(--cor-mat); 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; box-sizing: border-box;
        }

        /* CONFETIS */
        .confetti-container { position: absolute; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; border-radius:30px; z-index: 30; }
		.confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; pointer-events: none;}
        @keyframes fall { to { transform: translateY(600px) rotate(360deg); opacity: 0; } }
		

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto; flex-shrink: 0;}
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        /* =========================================
           ECRÃS E MENUS
           ========================================= */
        .ecra { width: 100%; flex: 1; min-height: 0; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; box-sizing: border-box; position: relative; z-index: 2;}
        #ecra-selecao { display: flex; }
        #ecra-jogo { justify-content: flex-start; }
        .titulo-menu { font-size: clamp(1.4rem, 4vw, 1.8rem); color: var(--azul-escuro); margin-bottom: 20px; font-weight: 900;}

        /* =========================================
           MENU INICIAL (ANIMAÇÃO + 2x2 GRID)
           ========================================= */
        .animacao-tutorial-grafico {
            width: 100%; max-width: 450px; height: 160px;
            background: #f4faff; border: 3px dashed #bcdcff; border-radius: 20px;
            margin: 0 auto 25px; display: flex; align-items: flex-end; justify-content: center; gap: 20px;
            box-shadow: inset 0 0 15px rgba(0,145,255,0.05); padding-bottom: 20px;
        }

        .bar-dummy { width: 40px; border-radius: 8px 8px 0 0; animation: barGrow 2s infinite alternate ease-in-out; }
        .bar-d1 { background-color: var(--cor-btn-vermelho); height: 50px; animation-delay: 0s; }
        .bar-d2 { background-color: var(--cor-btn-verde); height: 90px; animation-delay: -0.5s; }
        .bar-d3 { background-color: var(--cor-btn-amarelo); height: 30px; animation-delay: -1s; }
        
        @keyframes barGrow {
            0% { transform: scaleY(0.4); transform-origin: bottom; }
            100% { transform: scaleY(1.2); transform-origin: bottom; }
        }

        .grid-niveis {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
            width: 100%; max-width: 600px; margin: 0 auto 20px;
        }

        @media (max-width: 500px) {
            .grid-niveis { grid-template-columns: 1fr; max-width: 320px; }
        }

        .btn-nivel-novo {
            width: 100%; padding: 20px; border-radius: 20px; border: 4px solid white;
            color: white; font-size: 1.5rem; font-weight: 900; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            box-shadow: 0 6px 0 #e2e8f0, 0 10px 15px rgba(0,0,0,0.08); text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            touch-action: manipulation; user-select: none;
        }

        @media (hover: hover) {
            .btn-nivel-novo:hover {
                transform: translateY(-2px); box-shadow: 0 8px 0 #cbd5e1, 0 12px 20px rgba(0,0,0,0.12); filter: brightness(1.05);
            }
        }

        .btn-nivel-novo:active { transform: translateY(6px) !important; box-shadow: 0 0px 0 transparent, 0 0px 0 transparent !important; }

        /* Classes Utilitárias de Cor para os Botões */
        .bg-azul { background-color: var(--cor-btn-azul); }
        .bg-verde { background-color: var(--cor-btn-verde); }
        .bg-amarelo { background-color: var(--cor-btn-amarelo); }
        .bg-vermelho { background-color: var(--cor-btn-vermelho); }
        .bg-roxo { background-color: var(--cor-btn-roxo); }
        .bg-laranja { background-color: var(--cor-btn-laranja); }
        
        /* =========================================
           BARRA DE ESTADO DO JOGO
           ========================================= */
        .status-bar-jogo {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            width: 100%; background: #e0ecf3; padding: 8px 12px;
            border-radius: 20px; border: 2px solid var(--cor-mat); margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0;
        }

        .btn-voltar-menu { background-color: white; color: var(--azul-escuro); border: 2px solid var(--cor-mat); padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn-voltar-menu:hover { border-color: var(--azul-escuro); transform: scale(1.05); }
        
        .btn-dica { background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .btn-dica:hover { border-color: #b18500; transform: scale(1.05); }
        .btn-dica.esgotada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }

        .badge-ronda { background: white; font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 15px; white-space: nowrap; }
        .badge-ronda { border: 2px solid #219d53; color: #219d53; }
        .badge-erros { background: white; border: 2px solid var(--cor-pt); color: var(--cor-mat); font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 15px; white-space: nowrap; }
		.svg-icon { width: 1.2em; height: 1.2em; vertical-align: middle; margin-right: 5px; fill: currentColor; }

        .progress-bg { background-color: #e2e8f0; border-radius: 20px; height: 35px; flex: 1; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); border: 2px solid white; margin: 0 10px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-color: var(--cor-1ano); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }
        
        @media (max-width: 600px) {
            .status-bar-jogo { flex-wrap: wrap; justify-content: center; }
            .btn-voltar-menu, .btn-dica { padding: 4px 8px; font-size: 0.8rem;}
            .badge-ronda, .badge-erros { font-size: 0.9rem; padding: 4px 8px; }
            .progress-bg { order: 4; min-width: 100%; margin-top: 5px; }
        }

        /* TOAST E ANIMAÇÕES */
        .toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
        .toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) rotate(-2deg); } 75% { transform: translateX(6px) rotate(2deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .error-shake { animation: shakeError 0.4s ease; border-color: var(--cor-erro) !important; background-color: #ffefef !important; color: var(--cor-erro) !important;}
        .success-flash { background-color: #eafff0 !important; border-color: var(--cor-sucesso) !important; color: var(--cor-sucesso) !important; }

        /* =========================================
           ÁREA DE JOGO LIVRE E GRÁFICOS
           ========================================= */
        .area-jogo-custom {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; flex: 1; min-height: 0; background: #f8fafc; border: 2px dashed var(--cor-mat); border-radius: 20px; padding: 25px; gap: 15px;
            position: relative; color: #94a3b8; font-weight: bold; overflow: hidden;
        }

        .laboratorio-container { 
			/* Manténs o teu código e adicionas apenas o justify-content */
			width: 100%; max-width: 700px; display: flex; flex-direction: column; 
			align-items: center; 
			justify-content: center; /* Centra tudo verticalmente */
			gap: 15px; animation: fadeIn 0.4s ease; flex: 1;
		}
        
        .caixa-mistura { background: #f8fafc; border: 3px dashed #ced6e0; border-radius: 15px; padding: 10px 15px; font-size: 2rem; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 8px 15px; min-height: 60px; width: 100%; max-width: 650px; line-height: 1.2; box-sizing: border-box; }
        
        .pergunta-texto { font-size: 1.6rem; color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .emoji-texto { font-size: 2.2rem; line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));}
        .sinal-mais { color: var(--cor-sucesso); font-weight: 900; }
        .sinal-menos { color: var(--cor-erro); font-weight: 900; }

        /* Gráfico Compacto - 25px por bloco no PC para não criar Scrollbars */
        .grafico-wrapper { display: flex; align-items: flex-end; width: 90%; height: 160px; position: relative; margin-bottom: 5px; margin-top: 10px; }
        .eixo-y { height: 150px; width: 30px; position: relative; margin-right: 10px; }
        .eixo-y span { position: absolute; right: 0; font-weight: bold; color: var(--text-main); font-size: 1.1rem; line-height: 0; }
        .eixo-y span.y0 { bottom: 0px; }
        .eixo-y span.y1 { bottom: 25px; }
        .eixo-y span.y2 { bottom: 50px; }
        .eixo-y span.y3 { bottom: 75px; }
        .eixo-y span.y4 { bottom: 100px; }
        .eixo-y span.y5 { bottom: 125px; }
        .eixo-y span.y6 { bottom: 150px; }

        .grafico-core {
            flex: 1; height: 150px; 
            border-left: 4px solid var(--azul-escuro); border-bottom: 4px solid var(--azul-escuro); 
            display: flex; justify-content: space-around; align-items: flex-end;
            background: repeating-linear-gradient(to top, transparent, transparent 23px, #e3f2fd 23px, #e3f2fd 25px);
            background-size: 100% 25px;
        }

        .coluna-barras { display: flex; flex-direction: column-reverse; width: 45px; height: 100%; justify-content: flex-start;}
        .bloco { width: 100%; height: 23px; margin-top: 2px; border-radius: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); animation: popIn 0.2s ease-out forwards; transform: scale(0); }

        .eixo-x-container { display: flex; width: 90%; padding-left: 40px; justify-content: space-around; box-sizing: border-box; margin-top: 5px; }
        .coluna-x { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 60px; }
        .icone-x { font-size: 2.2rem; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.1));}

        .botoes-coluna { display: flex; gap: 5px; justify-content: center; }
        .btn-ctrl { background: white; border: 2px solid #ced6e0; border-radius: 50%; width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: 0.1s; touch-action: manipulation;}
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        
        .opcoes-container { 
			display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; 
			width: 100%; 
			margin-top: 15px; /* Retira o 'auto' para não ir para o fundo */
		}
        .btn-opcao { background: white; border: 3px solid var(--cor-mat); border-radius: 15px; padding: 10px 30px; font-size: 1.8rem; font-weight: bold; color: var(--azul-escuro); cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 var(--cor-mat); display: flex; align-items: center; justify-content: center; min-width: 80px; touch-action: manipulation;}
        @media (hover: hover) { .btn-opcao:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--cor-mat); } }
        .btn-opcao:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }

        .btn-verificar { background: var(--cor-sucesso); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 6px 0 #219d53; transition: 0.2s; margin-top: 15px;}
        @media (hover: hover) { .btn-verificar:hover { filter: brightness(1.1); transform: translateY(-2px); } }
        .btn-verificar:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }

        .btn-disabled { pointer-events: none; opacity: 0.7; }
		
		/* MODIFICADOR: Gráfico maior apenas para os níveis de Ler e Comparar */
		.grafico-maior { height: 260px; }
		.grafico-maior .eixo-y { height: 240px; }
		.grafico-maior .eixo-y span.y1 { bottom: 40px; }
		.grafico-maior .eixo-y span.y2 { bottom: 80px; }
		.grafico-maior .eixo-y span.y3 { bottom: 120px; }
		.grafico-maior .eixo-y span.y4 { bottom: 160px; }
		.grafico-maior .eixo-y span.y5 { bottom: 200px; }
		.grafico-maior .eixo-y span.y6 { bottom: 240px; }
		.grafico-maior .grafico-core { 
			height: 240px; 
			background: repeating-linear-gradient(to top, transparent, transparent 38px, #e3f2fd 38px, #e3f2fd 40px);
			background-size: 100% 40px; 
		}
		.grafico-maior .bloco { height: 38px; }

        /* Mobile Adjustments for Gráficos */
        @media (max-width: 768px) {
            .caixa-mistura { font-size: 1.6rem; padding: 10px; gap: 5px 10px; min-height: 50px;}
            .pergunta-texto { font-size: 1.3rem; margin-bottom: 5px; }
            
            /* Gráfico super compacto mobile (20px per block) */
            .grafico-wrapper { height: 130px; margin-bottom: 5px; margin-top: 5px; }
            .eixo-y { height: 120px; margin-right: 5px; }
            .eixo-y span.y0 { bottom: 0px; }
            .eixo-y span.y1 { bottom: 20px; }
            .eixo-y span.y2 { bottom: 40px; }
            .eixo-y span.y3 { bottom: 60px; }
            .eixo-y span.y4 { bottom: 80px; }
            .eixo-y span.y5 { bottom: 100px; }
            .eixo-y span.y6 { bottom: 120px; }
            .grafico-core { height: 120px; background: repeating-linear-gradient(to top, transparent, transparent 18px, #e3f2fd 18px, #e3f2fd 20px); background-size: 100% 20px; }
            .coluna-barras { width: 30px; }
            .bloco { height: 18px; margin-top: 2px; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
            
            .btn-opcao { font-size: 1.5rem; padding: 10px 20px; }
            .btn-ctrl { width: 30px; height: 30px; font-size: 1.2rem; }
            .icone-x { font-size: 1.8rem; }
        }

        /* Modal e Ecrã Final */
        .modal-ajuda-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; padding: 20px; box-sizing: border-box;}
        .modal-ajuda-overlay.active { display: flex; }
        .modal-ajuda-box { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; border-top: 8px solid var(--cor-1ano);}
        .btn-fechar-modal { position: absolute; top: 15px; right: 15px; background: #ffebeb; color: #ff4757; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s;}
        .btn-fechar-modal:hover { background: #ff4757; color: white;}
        .ajuda-icone { font-size: 4rem; margin-bottom: 10px; }
        .ajuda-texto { font-size: 1.2rem; color: var(--text-main); line-height: 1.5; font-weight: 500;}

        /* =========================================
           ECRÃ FIM E BOTÕES DE AÇÃO
           ========================================= */
        .end-title { 
            font-size: clamp(2rem, 5vw, 2.5rem); 
            color: var(--azul-escuro); 
            margin-bottom: 25px;
        }

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
   
	// ==========================================
    // SVGs BARRA DE ESTADO
    // ==========================================
    const SVG_HOME = `<svg viewBox="0 0 24 24" width="1.2em" height="1.2em" style="margin-right:4px; vertical-align:middle;"><path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9.5z" fill="#fff" stroke="#d35400" stroke-width="2" stroke-linejoin="round"/><rect x="10" y="12" width="4" height="10" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/></svg> Menu`;
    const SVG_STAR = `<svg viewBox="0 0 24 24" width="1.2em" height="1.2em" fill="#f1c40f" stroke="#f39c12" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px; vertical-align:middle;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
    const SVG_BULB = `<svg viewBox="0 0 24 24" width="1.2em" height="1.2em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px; vertical-align:middle;"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5.76.76 1.23 1.52 1.41 2.5"></path></svg>`;
    const SVG_ERRO = `<svg viewBox="0 0 14 14" width="0.8em" height="0.8em" style="margin-right: 5px; vertical-align: middle;"><path d="M2 2 L12 12 M12 2 L2 12" stroke="var(--cor-pt, #ff4757)" stroke-width="3" stroke-linecap="round" /></svg>`;
    
    // Injeção visual na carga da página
    document.addEventListener("DOMContentLoaded", () => {
        const btnHome = document.getElementById('btn-home-svg');
        const badgeRonda = document.getElementById('badge-ronda-svg');
        const btnAjuda = document.getElementById('btn-dica');
        const iconeErro = document.getElementById('icone-erro-svg');
        
        if(btnHome) btnHome.innerHTML = SVG_HOME;
        if(btnAjuda) btnAjuda.innerHTML = SVG_BULB + ' Dica';
        if(iconeErro) iconeErro.innerHTML = SVG_ERRO;
        if(badgeRonda) badgeRonda.innerHTML = SVG_STAR;
        
    });

	
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    function mostrarEcra(id) {
        document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function abrirAjuda() {
        const icone = document.getElementById('ajuda-icone');
        const texto = document.getElementById('ajuda-texto');

        if (nivelAtual === 1) {
            icone.innerHTML = "👀📏";
            texto.innerHTML = "Olha para a imagem.<br><br>Vê até que número a barra colorida sobe e clica na resposta certa.";
        } else if (nivelAtual === 2) {
            icone.innerHTML = "👆🔢";
            texto.innerHTML = "Conta os objetos na caixa lá em cima.<br><br>Clica no botão <b>(+)</b> para construir a barra até teres a quantidade certa!";
        } else if (nivelAtual === 3) {
            icone.innerHTML = "⚖️✅";
            texto.innerHTML = "Atenção às palavras!<br><br><b>MAIS (+)</b> é a barra maior.<br><b>MENOS (-)</b> é a barra menor.<br><br>Escolhe o desenho certo!";
        } else {
            icone.innerHTML = "🎲🧠";
            texto.innerHTML = "Tudo misturado!<br><br>Presta atenção se tens de ler, construir ou comparar o gráfico.";
        }
        
        document.getElementById('modal-ajuda').classList.add('active');
        tocarSom('flip');
    }

    function fecharAjuda() {
        document.getElementById('modal-ajuda').classList.remove('active');
    }

    const TOTAL_DESAFIOS = 5;
    const LIMITE_ALTURA = 6; 
    let nivelAtual = 1;
    let desafioAtual = 0;
    let erros = 0;

    const gameArea = document.getElementById('area-jogo');
    const elDesafios = document.getElementById('val-progresso');
    const elTotal = document.getElementById('val-total');
    const elErros = document.getElementById('val-erradas');
    const elProgressFill = document.getElementById('progress-fill');

    const temasObjetos = [[
            { emoji: '🍎', genero: 'f' }, { emoji: '🍌', genero: 'f' }, { emoji: '🍓', genero: 'm' }, { emoji: '🍇', genero: 'f' }, { emoji: '🍍', genero: 'm' }
        ],[
            { emoji: '🐶', genero: 'm' }, { emoji: '🐱', genero: 'm' }, { emoji: '🐰', genero: 'm' }, { emoji: '🐢', genero: 'f' }, { emoji: '🐠', genero: 'm' }
        ],[
            { emoji: '🚗', genero: 'm' }, { emoji: '⚽', genero: 'f' }, { emoji: '🧸', genero: 'm' }, { emoji: '🧩', genero: 'm' }, { emoji: '🪁', genero: 'm' }
        ],[
            { emoji: '🌻', genero: 'm' }, { emoji: '🌳', genero: 'f' }, { emoji: '🍁', genero: 'f' }, { emoji: '🍄', genero: 'm' }, { emoji: '🌺', genero: 'f' }
        ]
    ];

    const coresGrafico =['#0091ff', '#ff4757', '#2ed573', '#ffa502', '#9b59b6', '#1dd1a1'];

    let alvoCounts =[];
    let userCounts =[];
    let objetosAtuais =[];
    let coresAtuais =[];
    let respostaCorreta = null;

    function iniciarJogo(nivel) {
        nivelAtual = nivel;
        desafioAtual = 0;
        erros = 0;

        mostrarEcra('ecra-jogo');
        document.getElementById('confetti-container').innerHTML = ''; // Limpa confetis antigos

        atualizarPlacar();
        gerarDesafio();
    }

    function voltarAoMenu() {
        document.getElementById('confetti-container').innerHTML = '';
        mostrarEcra('ecra-selecao');
    }

    function reiniciarNivelAtual() {
        iniciarJogo(nivelAtual);
    }

    function atualizarPlacar() {
        elDesafios.textContent = Math.min(desafioAtual + 1, TOTAL_DESAFIOS);
        elTotal.textContent = TOTAL_DESAFIOS;
        elErros.textContent = erros;
        elProgressFill.style.width = `${(desafioAtual / TOTAL_DESAFIOS) * 100}%`;
    }

    function gerarDesafio() {
        if (desafioAtual >= TOTAL_DESAFIOS) {
            finalizarJogo();
            return;
        }

        atualizarPlacar();
        gameArea.innerHTML = '';
        gameArea.classList.remove('btn-disabled');

        const temaEscolhido = temasObjetos[Math.floor(Math.random() * temasObjetos.length)];
        const misturados = [...temaEscolhido].sort(() => 0.5 - Math.random());
        objetosAtuais = misturados.slice(0, 3);
        
        const coresMisturadas =[...coresGrafico].sort(() => 0.5 - Math.random());
        coresAtuais = coresMisturadas.slice(0, 3);

        if (nivelAtual === 1) renderLer();
        else if (nivelAtual === 2) renderConstruir();
        else if (nivelAtual === 3) renderComparar();
        else if (nivelAtual === 4) {
            const r = Math.random();
            if (r < 0.33) renderLer();
            else if (r < 0.66) renderConstruir();
            else renderComparar();
        }
    }

    /* 1º LER */
    function renderLer() {
        alvoCounts = objetosAtuais.map(() => Math.floor(Math.random() * LIMITE_ALTURA) + 1);
        const indexPergunta = Math.floor(Math.random() * 3);
        const objAlvo = objetosAtuais[indexPergunta];
        respostaCorreta = alvoCounts[indexPergunta];

        const artigo = objAlvo.genero === 'f' ? 'as' : 'os';
        const pergunta = `Conta ${artigo} <span class="emoji-texto">${objAlvo.emoji}</span>`;

        let opcoes = new Set([respostaCorreta]);
        while(opcoes.size < 3) {
            let fake = respostaCorreta + (Math.floor(Math.random() * 5) - 2); 
            if (fake > 0 && fake <= LIMITE_ALTURA + 2) opcoes.add(fake);
        }
        opcoes = Array.from(opcoes).sort(() => Math.random() - 0.5);

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">${pergunta}</div>
                
                <div class="grafico-wrapper grafico-maior">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `<div class="coluna-barras">`;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `</div>`;
        });

        html += `
                    </div>
                </div>
                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj) => {
            html += `<div class="coluna-x"><div class="icone-x">${obj.emoji}</div></div>`;
        });

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, ${op})">${op}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    /* 2º CONSTRUIR */
    function renderConstruir() {
        alvoCounts =[
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1
        ];
        userCounts = [0, 0, 0];

        let itensMisturados =[];
        alvoCounts.forEach((qnt, i) => {
            for(let j = 0; j < qnt; j++) itensMisturados.push(`<span>${objetosAtuais[i].emoji}</span>`);
        });
        itensMisturados = itensMisturados.sort(() => Math.random() - 0.5).join('');

        let html = `
            <div class="laboratorio-container">
                <div class="caixa-mistura">${itensMisturados}</div>
                
                <div class="grafico-wrapper">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
                        <div class="coluna-barras" id="col-0"></div>
                        <div class="coluna-barras" id="col-1"></div>
                        <div class="coluna-barras" id="col-2"></div>
                    </div>
                </div>

                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `
                    <div class="coluna-x">
                        <div class="icone-x">${obj.emoji}</div>
                        <div class="botoes-coluna">
                            <button class="btn-ctrl" onclick="modificarColuna(${i}, -1)">-</button>
                            <button class="btn-ctrl" onclick="modificarColuna(${i}, 1)">+</button>
                        </div>
                    </div>
            `;
        });

        html += `
                </div>
                <button class="btn-verificar" id="btn-verificar" onclick="verificarNivelConstruir()">VERIFICAR</button>
            </div>
        `;
        gameArea.innerHTML = html;
    }

    function modificarColuna(index, valor) {
        let novaQnt = userCounts[index] + valor;
        if (novaQnt >= 0 && novaQnt <= LIMITE_ALTURA) {
            userCounts[index] = novaQnt;
            desenharColuna(index);
            tocarSom('flip');
        }
    }

    function desenharColuna(index) {
        const coluna = document.getElementById(`col-${index}`);
        coluna.innerHTML = '';
        for(let i=0; i < userCounts[index]; i++) {
            coluna.innerHTML += `<div class="bloco" style="background-color: ${coresAtuais[index]}"></div>`;
        }
    }

    function verificarNivelConstruir() {
        const btn = document.getElementById('btn-verificar');
        const certo = alvoCounts.every((val, i) => val === userCounts[i]);

        if (certo) {
            btn.classList.add('success-flash');
            btn.textContent = "CERTO! ✅";
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    /* 3º COMPARAR */
    function renderComparar() {
        let nums;
        do {
            nums =[
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1
            ];
        } while (new Set(nums).size < 3); 
        
        alvoCounts = nums;
        const tipoPergunta = Math.random() > 0.5 ? 'mais' : 'menos';
        let indexCorreto = 0;
        
        if (tipoPergunta === 'mais') {
            indexCorreto = alvoCounts.indexOf(Math.max(...alvoCounts));
            respostaCorreta = objetosAtuais[indexCorreto].emoji;
        } else {
            indexCorreto = alvoCounts.indexOf(Math.min(...alvoCounts));
            respostaCorreta = objetosAtuais[indexCorreto].emoji;
        }

        const textoPergunta = tipoPergunta === 'mais' 
            ? `Qual tem <span class="sinal-mais">MAIS (+)</span> votos?` 
            : `Qual tem <span class="sinal-menos">MENOS (-)</span> votos?`;

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">${textoPergunta}</div>
                
                <div class="grafico-wrapper grafico-maior">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `<div class="coluna-barras">`;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `</div>`;
        });

        html += `
                    </div>
                </div>
                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj) => {
            html += `<div class="coluna-x"><div class="icone-x">${obj.emoji}</div></div>`;
        });

        let opcoes =[...objetosAtuais].sort(() => Math.random() - 0.5);

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, '${op.emoji}')">${op.emoji}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    function verificarMultiplaEscolha(btn, valorEscolhido) {
        if (valorEscolhido === respostaCorreta) {
            btn.classList.add('success-flash');
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    function sucessoAcao() {
        tocarSom('acerto');
        gameArea.classList.add('btn-disabled'); 
        desafioAtual++;
        atualizarPlacar();
        setTimeout(gerarDesafio, 1200);
    }

    function erroAcao() {
        tocarSom('erro');
        erros++;
        atualizarPlacar();
    }

    function finalizarJogo() {
        elProgressFill.style.width = `100%`;
        setTimeout(() => {
            mostrarEcra('ecra-fim');
            document.getElementById('final-erros').textContent = erros;

            dispararConfetis();

            if (erros === 0) {
                document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
                tocarSom('vitoria'); 
            } else if (erros <= 2) {
                document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); 
            } else {
                document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }
        }, 500);
    }

    // =========================================
    // EFEITOS SONOROS E CONFETIS (WEB AUDIO API)
    // =========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'flip') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, agora);
            osc.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
            gain.gain.setValueAtTime(0.05, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        }
        else if (tipo === 'acerto') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, agora);
            osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, agora);
            osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    function lancarConfetis() {
        const container = document.getElementById('confetti-container');
        container.innerHTML = ""; // Limpa qualquer confeti antigo
        const colors =['#e7d83f', '#0091ff', '#51cf66', '#ff6b6b', '#ff9f43'];
        
        for (let i = 0; i < 60; i++) {
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.floor(Math.random() * 90 + 5) + '%';
            conf.style.top = '-10%'; 
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
            conf.style.animationDelay = (Math.random() * 1.5) + 's';
            container.appendChild(conf);
        }
    }

    function dispararConfetis() {
        // Redirecionado para a função base compatível com HTML para confinar no cartão
        lancarConfetis();
    }

    window.onload = () => mostrarEcra('ecra-selecao');

</script>
