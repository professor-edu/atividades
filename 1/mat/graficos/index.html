<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Gráficos 📊</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE (MOLDE INTOCÁVEL BOM.HTML)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --cor-1ano: #0091ff;
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px; gap: 25px; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 800px; min-height: 450px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 20px 15px; gap: 15px; }
            .cartao-jogo-container { padding: 25px 15px; min-height: 350px; }
        }

        .status-bar { width: 100%; max-width: 700px; margin-bottom: 0; display: none; }
        .score-container { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 1.3rem; padding: 0 15px; }
        .score-certas { color: #219d53; }
        .score-erradas { color: #d0303f; }
        .progress-bg { 
    background-color: #e2e8f0; /* Um cinza mais suave */
    border-radius: 20px; 
    height: 20px; /* Um pouco mais grossa */
    width: 100%; 
    overflow: hidden; 
    box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); 
    border: 2px solid white; /* Borda branca dá um toque premium */
}

.progress-fill { 
    height: 100%; 
    width: 0%; 
    border-radius: 20px; 
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
    
    /* Magia das riscas animadas */
    background-color: var(--cor-1ano);
    background-image: linear-gradient(
        45deg, 
        rgba(255, 255, 255, 0.2) 25%, 
        transparent 25%, 
        transparent 50%, 
        rgba(255, 255, 255, 0.2) 50%, 
        rgba(255, 255, 255, 0.2) 75%, 
        transparent 75%, 
        transparent
    );
    background-size: 30px 30px;
    animation: moverRiscas 2s linear infinite;
}

/* Animação para fazer as riscas deslizarem */
@keyframes moverRiscas {
    0% { background-position: 0 0; }
    100% { background-position: 30px 0; }
}


        /* =========================================
           ESTILOS ESPECÍFICOS - GRÁFICOS
           ========================================= */
        :root {
            --cor-erro: #ff4757;
            --cor-sucesso: #2ed573;
        }

        .painel-topo { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; max-width: 700px; margin-bottom: 10px; padding-bottom: 15px; border-bottom: 2px dashed #e3f2fd; position: relative; }
        .menu-niveis { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; flex: 1; }
        .btn-nivel { background-color: white; border: 3px solid #ced6e0; border-radius: 12px; padding: 10px 18px; cursor: pointer; font-size: 1.05rem; font-weight: 700; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-nivel:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #ced6e0; }
        .btn-nivel:active { transform: translateY(3px); box-shadow: 0 0px 0 transparent; }
        .btn-nivel.active { border-color: var(--cor-1ano); background-color: #e3f2fd; color: var(--azul-escuro); box-shadow: 0 3px 0 var(--cor-1ano-dark); transform: translateY(2px); }
        .btn-ajuda-topo { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; border-radius: 50%; width: 45px; height: 45px; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 3px 0 #ffeeba; }
        .btn-ajuda-topo:hover { transform: scale(1.1); background: #ffe8a1; }
        .btn-ajuda-topo:active { transform: translateY(2px); box-shadow: none; }

        #game-area { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .laboratorio-container { width: 100%; max-width: 700px; display: flex; flex-direction: column; align-items: center; gap: 10px; animation: fadeIn 0.4s ease; }
        
        .caixa-mistura { background: #f8fafc; border: 3px dashed #ced6e0; border-radius: 15px; padding: 10px 15px; font-size: 2rem; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 8px 15px; min-height: 60px; width: 100%; max-width: 650px; line-height: 1.2; box-sizing: border-box; }
        
        .pergunta-texto { font-size: 1.6rem; color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .emoji-texto { font-size: 2.2rem; line-height: 1; }
        .sinal-mais { color: var(--cor-sucesso); font-weight: 900; }
        .sinal-menos { color: var(--cor-erro); font-weight: 900; }

        /* Gráfico Compacto - 25px por bloco no PC para não criar Scrollbars */
        .grafico-wrapper { display: flex; align-items: flex-end; width: 90%; height: 160px; position: relative; margin-bottom: 5px; margin-top: 10px; }
        .eixo-y { height: 150px; width: 30px; position: relative; margin-right: 10px; }
        .eixo-y span { position: absolute; right: 0; font-weight: bold; color: var(--text-main); font-size: 1.1rem; line-height: 0; }
        .eixo-y span.y0 { bottom: 0px; }
        .eixo-y span.y1 { bottom: 25px; }
        .eixo-y span.y2 { bottom: 50px; }
        .eixo-y span.y3 { bottom: 75px; }
        .eixo-y span.y4 { bottom: 100px; }
        .eixo-y span.y5 { bottom: 125px; }
        .eixo-y span.y6 { bottom: 150px; }

        .grafico-core {
            flex: 1; height: 150px; 
            border-left: 4px solid var(--azul-escuro); border-bottom: 4px solid var(--azul-escuro); 
            display: flex; justify-content: space-around; align-items: flex-end;
            background: repeating-linear-gradient(to top, transparent, transparent 23px, #e3f2fd 23px, #e3f2fd 25px);
            background-size: 100% 25px;
        }

        .coluna-barras { display: flex; flex-direction: column-reverse; width: 45px; height: 100%; justify-content: flex-start;}
        .bloco { width: 100%; height: 23px; margin-top: 2px; border-radius: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); animation: popIn 0.2s ease-out forwards; transform: scale(0); }

        .eixo-x-container { display: flex; width: 90%; padding-left: 40px; justify-content: space-around; box-sizing: border-box; margin-top: 5px; }
        .coluna-x { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 60px; }
        .icone-x { font-size: 2.2rem; }

        .botoes-coluna { display: flex; gap: 5px; justify-content: center; }
        .btn-ctrl { background: white; border: 2px solid #ced6e0; border-radius: 50%; width: 32px; height: 32px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: 0.1s;}
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        
        .opcoes-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; width: 100%; margin-top: 5px;}
        .btn-opcao { background: white; border: 3px solid var(--azul-vibrante); border-radius: 15px; padding: 10px 30px; font-size: 1.8rem; font-weight: bold; color: var(--azul-escuro); cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 var(--azul-vibrante); display: flex; align-items: center; justify-content: center; min-width: 80px;}
        .btn-opcao:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--azul-vibrante); }
        .btn-opcao:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }

        .btn-verificar { background: var(--cor-sucesso); color: white; border: none; padding: 10px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #219d53; transition: 0.2s; margin-top: 5px;}
        .btn-verificar:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }

        .btn-disabled { pointer-events: none; opacity: 0.7; }

        /* Mobile Adjustments for Gráficos */
        @media (max-width: 768px) {
            .painel-topo { padding-bottom: 10px; margin-bottom: 5px; gap: 10px;}
            .menu-niveis { gap: 5px; }
            .btn-nivel { padding: 8px 10px; font-size: 0.9rem; }
            .caixa-mistura { font-size: 1.6rem; padding: 10px; gap: 5px 10px; min-height: 50px;}
            .pergunta-texto { font-size: 1.3rem; margin-bottom: 5px; }
            
            /* Gráfico super compacto mobile (20px per block) */
            .grafico-wrapper { height: 130px; margin-bottom: 5px; margin-top: 5px; }
            .eixo-y { height: 120px; margin-right: 5px; }
            .eixo-y span.y0 { bottom: 0px; }
            .eixo-y span.y1 { bottom: 20px; }
            .eixo-y span.y2 { bottom: 40px; }
            .eixo-y span.y3 { bottom: 60px; }
            .eixo-y span.y4 { bottom: 80px; }
            .eixo-y span.y5 { bottom: 100px; }
            .eixo-y span.y6 { bottom: 120px; }
            .grafico-core { height: 120px; background: repeating-linear-gradient(to top, transparent, transparent 18px, #e3f2fd 18px, #e3f2fd 20px); background-size: 100% 20px; }
            .coluna-barras { width: 30px; }
            .bloco { height: 18px; margin-top: 2px; box-shadow: 0 1px 0 rgba(0,0,0,0.1); }
            
            .btn-opcao { font-size: 1.5rem; padding: 10px 20px; }
            .btn-ctrl { width: 30px; height: 30px; font-size: 1.2rem; }
            .icone-x { font-size: 1.8rem; }
        }

        /* Modal e Ecrã Final */
        .modal-ajuda-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; padding: 20px; box-sizing: border-box;}
        .modal-ajuda-overlay.active { display: flex; }
        .modal-ajuda-box { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; border-top: 8px solid var(--cor-1ano);}
        .btn-fechar-modal { position: absolute; top: 15px; right: 15px; background: #ffebeb; color: #ff4757; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.2s;}
        .btn-fechar-modal:hover { background: #ff4757; color: white;}
        .ajuda-icone { font-size: 4rem; margin-bottom: 10px; }
        .ajuda-texto { font-size: 1.2rem; color: var(--text-main); line-height: 1.5; font-weight: 500;}

        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: rgba(255,255,255,0.95); z-index: 20; animation: fadeIn 0.5s ease; border-radius: 30px;}
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; text-align: center;}
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; text-align: center;}
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes errorShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-3deg); } 75% { transform: translateX(8px) rotate(3deg); } }
        
        .error-shake { animation: errorShake 0.4s ease; border-color: var(--cor-erro) !important; background-color: #ffefef !important; color: var(--cor-erro) !important;}
        .success-flash { background-color: #eafff0 !important; border-color: var(--cor-sucesso) !important; color: var(--cor-sucesso) !important; }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    body { scrollbar-gutter: stable; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
<li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
<li><a href="../../">🎒 1º Ano</a></li>
<li><a href="../../../2/">💡 2º Ano</a></li>
<li><a href="../../../3/">🔍 3º Ano</a></li>
<li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Gráficos 📊</h1>
        <div class="subtitulo">Aprende a ler e construir gráficos!</div>
    </div>
</header>

<main>
    <div id="status-bar-container" class="status-bar">
        <div class="score-container">
            <span class="score-certas" style="color:var(--cor-1ano)">Desafios: <span id="val-desafios">0/5</span></span>
            <span class="score-erradas">❌ Erros: <span id="val-erradas">0</span></span>
        </div>
        <div class="progress-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="cartao-jogo-container">
        
        <!-- PAINEL DE NÍVEIS -->
        <div class="painel-topo">
            <div class="menu-niveis" id="menu-niveis">
                <button class="btn-nivel active" id="btn-nivel-1" onclick="iniciarJogo(1)">🔍 Ler</button>
                <button class="btn-nivel" id="btn-nivel-2" onclick="iniciarJogo(2)">🍎 Construir</button>
                <button class="btn-nivel" id="btn-nivel-3" onclick="iniciarJogo(3)">⚖️ Comparar</button>
            </div>
            <button class="btn-ajuda-topo" onclick="abrirAjuda()" title="Ajuda">💡</button>
        </div>

        <div id="game-area">
            <!-- CONTEÚDO INJETADO VIA JS -->
        </div>

        <!-- ECRÃ FINAL DENTRO DO CARTÃO -->
        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Missão Cumprida! 🎉</h2>
            <div class="end-stats">
                Completaste o nível com <strong id="final-erros" style="color:var(--cor-erro)">0</strong> erros.
            </div>
            <button class="btn-reiniciar" onclick="reiniciarNivelAtual()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<div class="modal-ajuda-overlay" id="modal-ajuda">
    <div class="modal-ajuda-box">
        <button class="btn-fechar-modal" onclick="fecharAjuda()">✕</button>
        <div class="ajuda-icone" id="ajuda-icone">💡</div>
        <div class="ajuda-texto" id="ajuda-texto">Dica de jogo!</div>
    </div>
</div>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    function abrirAjuda() {
        const icone = document.getElementById('ajuda-icone');
        const texto = document.getElementById('ajuda-texto');

        if (nivelAtual === 1) {
            icone.innerHTML = "👀📏";
            texto.innerHTML = "Olha para a imagem que pedem.<br><br>Vê até que número a barra colorida sobe e clica na resposta certa.";
        } else if (nivelAtual === 2) {
            icone.innerHTML = "👆🔢";
            texto.innerHTML = "Conta os objetos na caixa lá em cima.<br><br>Clica no botão <b>(+)</b> para construir a barra até teres a quantidade certa!";
        } else if (nivelAtual === 3) {
            icone.innerHTML = "⚖️✅";
            texto.innerHTML = "Atenção às palavras!<br><br><b>MAIS (+)</b> é a barra maior.<br><b>MENOS (-)</b> é a barra menor.<br><br>Escolhe o desenho certo!";
        }
        
        document.getElementById('modal-ajuda').classList.add('active');
        tocarSom('flip');
    }

    function fecharAjuda() {
        document.getElementById('modal-ajuda').classList.remove('active');
    }

    const TOTAL_DESAFIOS = 5;
    const LIMITE_ALTURA = 6; 
    let nivelAtual = 1;
    let desafioAtual = 0;
    let erros = 0;

    const gameArea = document.getElementById('game-area');
    const statusBar = document.getElementById('status-bar-container');
    const elDesafios = document.getElementById('val-desafios');
    const elErros = document.getElementById('val-erradas');
    const elProgressFill = document.getElementById('progress-fill');
    const endScreen = document.getElementById('end-screen');

    const temasObjetos = [[
            { emoji: '🍎', genero: 'f' }, { emoji: '🍌', genero: 'f' }, { emoji: '🍓', genero: 'm' }, { emoji: '🍇', genero: 'f' }, { emoji: '🍍', genero: 'm' }
        ],[
            { emoji: '🐶', genero: 'm' }, { emoji: '🐱', genero: 'm' }, { emoji: '🐰', genero: 'm' }, { emoji: '🐢', genero: 'f' }, { emoji: '🐠', genero: 'm' }
        ],[
            { emoji: '🚗', genero: 'm' }, { emoji: '⚽', genero: 'f' }, { emoji: '🧸', genero: 'm' }, { emoji: '🧩', genero: 'm' }, { emoji: '🪁', genero: 'm' }
        ],[
            { emoji: '🌻', genero: 'm' }, { emoji: '🌳', genero: 'f' }, { emoji: '🍁', genero: 'f' }, { emoji: '🍄', genero: 'm' }, { emoji: '🌺', genero: 'f' }
        ]
    ];

    const coresGrafico =['#0091ff', '#ff4757', '#2ed573', '#ffa502', '#9b59b6', '#1dd1a1'];

    let alvoCounts =[];
    let userCounts =[];
    let objetosAtuais =[];
    let coresAtuais =[];
    let respostaCorreta = null;

    function iniciarJogo(nivel) {
        document.querySelectorAll('.btn-nivel').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-nivel-' + nivel).classList.add('active');

        nivelAtual = nivel;
        desafioAtual = 0;
        erros = 0;

        statusBar.style.display = 'block';
        endScreen.style.display = 'none';
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        atualizarPlacar();
        gerarDesafio();
    }

    function reiniciarNivelAtual() {
        iniciarJogo(nivelAtual);
    }

    function atualizarPlacar() {
        elDesafios.textContent = `${desafioAtual}/${TOTAL_DESAFIOS}`;
        elErros.textContent = erros;
        elProgressFill.style.width = `${(desafioAtual / TOTAL_DESAFIOS) * 100}%`;
    }

    function gerarDesafio() {
        if (desafioAtual >= TOTAL_DESAFIOS) {
            finalizarJogo();
            return;
        }

        atualizarPlacar();
        gameArea.innerHTML = '';
        gameArea.classList.remove('btn-disabled');

        const temaEscolhido = temasObjetos[Math.floor(Math.random() * temasObjetos.length)];
        const misturados = [...temaEscolhido].sort(() => 0.5 - Math.random());
        objetosAtuais = misturados.slice(0, 3);
        
        const coresMisturadas =[...coresGrafico].sort(() => 0.5 - Math.random());
        coresAtuais = coresMisturadas.slice(0, 3);

        if (nivelAtual === 1) renderLer();
        else if (nivelAtual === 2) renderConstruir();
        else if (nivelAtual === 3) renderComparar();
    }

    /* 1º LER */
    function renderLer() {
        alvoCounts = objetosAtuais.map(() => Math.floor(Math.random() * LIMITE_ALTURA) + 1);
        const indexPergunta = Math.floor(Math.random() * 3);
        const objAlvo = objetosAtuais[indexPergunta];
        respostaCorreta = alvoCounts[indexPergunta];

        const artigo = objAlvo.genero === 'f' ? 'as' : 'os';
        const pergunta = `Conta ${artigo} <span class="emoji-texto">${objAlvo.emoji}</span>`;

        let opcoes = new Set([respostaCorreta]);
        while(opcoes.size < 3) {
            let fake = respostaCorreta + (Math.floor(Math.random() * 5) - 2); 
            if (fake > 0 && fake <= LIMITE_ALTURA + 2) opcoes.add(fake);
        }
        opcoes = Array.from(opcoes).sort(() => Math.random() - 0.5);

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">${pergunta}</div>
                
                <div class="grafico-wrapper">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `<div class="coluna-barras">`;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `</div>`;
        });

        html += `
                    </div>
                </div>
                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj) => {
            html += `<div class="coluna-x"><div class="icone-x">${obj.emoji}</div></div>`;
        });

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, ${op})">${op}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    /* 2º CONSTRUIR */
    function renderConstruir() {
        alvoCounts =[
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1
        ];
        userCounts = [0, 0, 0];

        let itensMisturados =[];
        alvoCounts.forEach((qnt, i) => {
            for(let j = 0; j < qnt; j++) itensMisturados.push(`<span>${objetosAtuais[i].emoji}</span>`);
        });
        itensMisturados = itensMisturados.sort(() => Math.random() - 0.5).join('');

        let html = `
            <div class="laboratorio-container">
                <div class="caixa-mistura">${itensMisturados}</div>
                
                <div class="grafico-wrapper">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
                        <div class="coluna-barras" id="col-0"></div>
                        <div class="coluna-barras" id="col-1"></div>
                        <div class="coluna-barras" id="col-2"></div>
                    </div>
                </div>

                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `
                    <div class="coluna-x">
                        <div class="icone-x">${obj.emoji}</div>
                        <div class="botoes-coluna">
                            <button class="btn-ctrl" onclick="modificarColuna(${i}, -1)">-</button>
                            <button class="btn-ctrl" onclick="modificarColuna(${i}, 1)">+</button>
                        </div>
                    </div>
            `;
        });

        html += `
                </div>
                <button class="btn-verificar" id="btn-verificar" onclick="verificarNivelConstruir()">VERIFICAR</button>
            </div>
        `;
        gameArea.innerHTML = html;
    }

    function modificarColuna(index, valor) {
        let novaQnt = userCounts[index] + valor;
        if (novaQnt >= 0 && novaQnt <= LIMITE_ALTURA) {
            userCounts[index] = novaQnt;
            desenharColuna(index);
            tocarSom('flip');
        }
    }

    function desenharColuna(index) {
        const coluna = document.getElementById(`col-${index}`);
        coluna.innerHTML = '';
        for(let i=0; i < userCounts[index]; i++) {
            coluna.innerHTML += `<div class="bloco" style="background-color: ${coresAtuais[index]}"></div>`;
        }
    }

    function verificarNivelConstruir() {
        const btn = document.getElementById('btn-verificar');
        const certo = alvoCounts.every((val, i) => val === userCounts[i]);

        if (certo) {
            btn.classList.add('success-flash');
            btn.textContent = "CERTO! ✅";
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    /* 3º COMPARAR */
    function renderComparar() {
        let nums;
        do {
            nums =[
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1
            ];
        } while (new Set(nums).size < 3); 
        
        alvoCounts = nums;
        const tipoPergunta = Math.random() > 0.5 ? 'mais' : 'menos';
        let indexCorreto = 0;
        
        if (tipoPergunta === 'mais') {
            indexCorreto = alvoCounts.indexOf(Math.max(...alvoCounts));
            respostaCorreta = objetosAtuais[indexCorreto].emoji;
        } else {
            indexCorreto = alvoCounts.indexOf(Math.min(...alvoCounts));
            respostaCorreta = objetosAtuais[indexCorreto].emoji;
        }

        const textoPergunta = tipoPergunta === 'mais' 
            ? `Qual tem <span class="sinal-mais">MAIS (+)</span> votos?` 
            : `Qual tem <span class="sinal-menos">MENOS (-)</span> votos?`;

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">${textoPergunta}</div>
                
                <div class="grafico-wrapper">
                    <div class="eixo-y">
                        <span class="y6">6</span><span class="y5">5</span><span class="y4">4</span>
                        <span class="y3">3</span><span class="y2">2</span><span class="y1">1</span>
                        <span class="y0">0</span>
                    </div>
                    <div class="grafico-core">
        `;

        objetosAtuais.forEach((obj, i) => {
            html += `<div class="coluna-barras">`;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `</div>`;
        });

        html += `
                    </div>
                </div>
                <div class="eixo-x-container">
        `;

        objetosAtuais.forEach((obj) => {
            html += `<div class="coluna-x"><div class="icone-x">${obj.emoji}</div></div>`;
        });

        let opcoes =[...objetosAtuais].sort(() => Math.random() - 0.5);

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, '${op.emoji}')">${op.emoji}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    function verificarMultiplaEscolha(btn, valorEscolhido) {
        if (valorEscolhido === respostaCorreta) {
            btn.classList.add('success-flash');
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    function sucessoAcao() {
        tocarSom('acerto');
        gameArea.classList.add('btn-disabled'); 
        desafioAtual++;
        atualizarPlacar();
        setTimeout(gerarDesafio, 1200);
    }

    function erroAcao() {
        tocarSom('erro');
        erros++;
        atualizarPlacar();
    }

    function finalizarJogo() {
        elProgressFill.style.width = `100%`;
        setTimeout(() => {
            statusBar.style.display = 'none';
            endScreen.style.display = 'flex';
            document.getElementById('final-erros').textContent = erros;

            dispararConfetis();

            if (erros === 0) {
                document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
                tocarSom('vitoria'); 
            } else if (erros <= 2) {
                document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); 
            } else {
                document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }
        }, 500);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'flip') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, agora);
            osc.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
            gain.gain.setValueAtTime(0.05, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        }
        else if (tipo === 'acerto') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, agora);
            osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, agora);
            osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() {
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth;
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis =[];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#9b59b6'];
        
        for (let i = 0; i < 100; i++) {
            confetis.push({
                x: Math.random() * canvasConfetti.width,
                y: Math.random() * canvasConfetti.height - canvasConfetti.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                cor: cores[Math.floor(Math.random() * cores.length)],
                velY: Math.random() * 3 + 2,
                velX: Math.random() * 2 - 1,
                rotacao: Math.random() * 360,
                velRotacao: Math.random() * 5 - 2.5
            });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;

        confetis.forEach(c => {
            c.y += c.velY;
            c.x += c.velX;
            c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;

            ctxConfetti.save();
            ctxConfetti.translate(c.x, c.y);
            ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor;
            ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
            ctxConfetti.restore();
        });

        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = () => iniciarJogo(1);

</script>
</body>
</html>
