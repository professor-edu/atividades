<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Detetive dos Gráficos 📊</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --cor-erro: #ff4757;
            --cor-sucesso: #2ed573;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--bg-header); padding: 20px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.3rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1rem); font-weight: 500; opacity: 0.8; margin-top: 10px; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 25px 20px; gap: 15px; }

        .cartao-jogo-container { 
            background: white; 
            width: 100%; max-width: 850px; 
            padding: 30px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; position: relative; overflow: hidden; 
            min-height: 500px;
        }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; z-index: 10;}
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        /* =========================================
           PAINEL DE TOPO: NÍVEIS + PLACAR
           ========================================= */
        .painel-topo { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 15px; width: 100%; max-width: 700px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #e3f2fd; }
        .status-bar { display: flex; gap: 20px; font-weight: bold; font-size: 1.2rem; background: #f8fafc; padding: 10px 25px; border-radius: 15px; border: 2px solid #e3f2fd; }
        .score-desafios { color: var(--cor-1ano); }
        .score-erros { color: var(--cor-erro); }

        .menu-niveis { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-nivel { background-color: white; border: 3px solid #ced6e0; border-radius: 12px; padding: 10px 18px; cursor: pointer; font-size: 1.05rem; font-weight: 700; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: all 0.2s ease; display: flex; align-items: center; gap: 8px; }
        .btn-nivel:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #ced6e0; }
        .btn-nivel:active { transform: translateY(3px); box-shadow: 0 0px 0 transparent; }
        .btn-nivel.active { border-color: var(--cor-1ano); background-color: #e3f2fd; color: var(--azul-escuro); box-shadow: 0 3px 0 var(--cor-1ano-dark); transform: translateY(2px); }

        /* =========================================
           ÁREA DO JOGO - GRÁFICOS
           ========================================= */
        #game-area { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; padding-bottom: 20px;}
        
        .laboratorio-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.4s ease;}
        
        .caixa-mistura { background: #f8fafc; border: 3px dashed #ced6e0; border-radius: 15px; padding: 15px; font-size: 2.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 80px; width: 90%; line-height: 1; }
        
        .pergunta-texto { font-size: 1.5rem; color: var(--azul-escuro); font-weight: bold; text-align: center; margin: 0 10px; }

        .grafico-area { 
            display: flex; align-items: flex-end; justify-content: space-around; 
            width: 90%; height: 200px; 
            border-bottom: 4px solid var(--azul-escuro); border-left: 4px solid var(--azul-escuro); 
            padding: 10px 10px 0 10px; margin-top: 10px; position: relative; 
            background: repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(0,0,0,0.05) 29px, rgba(0,0,0,0.05) 30px);
        }
        
        .eixo-y { position: absolute; left: -25px; bottom: 0; height: 100%; display: flex; flex-direction: column-reverse; justify-content: space-between; font-weight: bold; color: var(--text-main); font-size: 1rem; padding-bottom: 5px;}
        
        .coluna-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 30%; z-index: 2;}
        .coluna { display: flex; flex-direction: column-reverse; align-items: center; width: 100%; height: 180px; gap: 2px; justify-content: flex-start;}
        
        .bloco { 
            width: 100%; max-width: 45px; height: 28px; 
            border-radius: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.2); 
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display:flex; justify-content:center; align-items:center; 
            color:white; font-size:1.2rem; border: 1px solid rgba(0,0,0,0.1);
        }
        
        .icone-base { font-size: 2.2rem; border-top: 3px solid #ccc; width: 100%; text-align: center; padding-top: 5px; margin-bottom: -40px;} /* Margem negativa para compensar espaço */
        
        /* Controles do Nível 1 */
        .controles { display: flex; gap: 10px; margin-top: 45px; }
        .btn-ctrl { background: white; border: 2px solid #ced6e0; border-radius: 50%; width: 38px; height: 38px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-main); box-shadow: 0 3px 0 #ced6e0; transition: 0.1s;}
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }
        
        /* Botões de Resposta */
        .opcoes-container { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px; width: 100%;}
        .btn-opcao { background: white; border: 3px solid var(--azul-vibrante); border-radius: 15px; padding: 15px 35px; font-size: 2rem; font-weight: bold; color: var(--azul-escuro); cursor: pointer; transition: 0.2s; box-shadow: 0 5px 0 var(--azul-vibrante); display: flex; align-items: center; justify-content: center; min-width: 80px;}
        .btn-opcao:hover { transform: translateY(-3px); box-shadow: 0 8px 0 var(--azul-vibrante); }
        .btn-opcao:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }

        .btn-verificar { background: var(--cor-sucesso); color: white; border: none; padding: 15px 40px; font-size: 1.3rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 #219d53; margin-top: 50px; transition: 0.2s;}
        .btn-verificar:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 0 0 transparent; }

        .btn-disabled { pointer-events: none; opacity: 0.7; }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            
            main { padding: 15px 10px; }
            .cartao-jogo-container { padding: 20px 10px; min-height: auto;}
            .painel-topo { gap: 10px; padding-bottom: 15px; margin-bottom: 15px; }
            .status-bar { padding: 8px 15px; font-size: 1.1rem; width: 100%; justify-content: space-around;}
            .btn-nivel { padding: 8px 12px; font-size: 0.95rem; flex: 1; justify-content: center;}
            
            .caixa-mistura { font-size: 2rem; padding: 10px; gap: 8px; }
            .pergunta-texto { font-size: 1.2rem; }
            .grafico-area { height: 160px; margin-top: 5px;}
            .bloco { height: 22px; font-size: 1rem; }
            .icone-base { font-size: 1.6rem; margin-bottom: -35px;}
            .controles { margin-top: 40px; }
            .btn-ctrl { width: 32px; height: 32px; font-size: 1.2rem; }
            .btn-opcao { font-size: 1.5rem; padding: 12px 25px; }
            .btn-verificar { font-size: 1.1rem; padding: 12px 30px; margin-top: 40px;}
        }

        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width: 100%; height:100%; background: rgba(255,255,255,0.95); z-index: 20; animation: fadeIn 0.5s ease;}
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; text-align: center;}
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; text-align: center;}
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); display: flex; gap: 10px;}

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes errorShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-3deg); } 75% { transform: translateX(8px) rotate(3deg); } }
        
        .error-shake { animation: errorShake 0.4s ease; border-color: var(--cor-erro) !important; background-color: #ffefef !important; color: var(--cor-erro) !important;}
        .success-flash { background-color: #eafff0 !important; border-color: var(--cor-sucesso) !important; color: var(--cor-sucesso) !important; }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Detetive dos Gráficos 📊</h1>
        <div class="subtitulo">Aprende a ler e construir gráficos!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        
        <!-- PAINEL DE TOPO -->
        <div class="painel-topo">
            <div class="menu-niveis" id="menu-niveis">
                <button class="btn-nivel active" id="btn-nivel-1" onclick="iniciarJogo(1)">🍎 Construir</button>
                <button class="btn-nivel" id="btn-nivel-2" onclick="iniciarJogo(2)">🔍 Ler</button>
                <button class="btn-nivel" id="btn-nivel-3" onclick="iniciarJogo(3)">⚖️ Comparar</button>
            </div>
            
            <div id="status-bar-container" class="status-bar">
                <span class="score-desafios">Desafios: <span id="val-desafios">0/5</span></span>
                <span class="score-erros">Erros: <span id="val-erros">0</span></span>
            </div>
        </div>

        <div id="game-area">
            <!-- CONTEÚDO INJETADO VIA JS -->
        </div>

        <!-- ECRÃ FINAL -->
        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Missão Cumprida! 🎉</h2>
            <div class="end-stats">
                Completaste o nível com <strong id="final-erros" style="color:var(--cor-erro)">0</strong> erros.
            </div>
            <button class="btn-reiniciar" onclick="reiniciarNivelAtual()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    /* =========================================
       VARIÁVEIS GLOBAIS E DADOS DO JOGO
       ========================================= */
    let nivelAtual = 1;
    let desafioAtual = 0;
    let erros = 0;
    const TOTAL_DESAFIOS = 5;
    const LIMITE_ALTURA = 6; // Máximo de blocos por coluna

    const gameArea = document.getElementById('game-area');
    const elDesafios = document.getElementById('val-desafios');
    const elErros = document.getElementById('val-erros');
    const endScreen = document.getElementById('end-screen');

    // Coleções de emojis para os gráficos
    const temas =[
        ['🍎', '🍌', '🍓', '🍇', '🍉', '🍍'],['🐶', '🐱', '🐰', '🐢', '🐠', '🐹'],['🚗', '⚽', '🧸', '🧩', '🪁', '🚁'],['🍦', '🍩', '🍪', '🍬', '🍫', '🍭'],
        ['🌻', '🍄', '🌳', '🍁', '🌵', '🌺']
    ];

    const coresGrafico =['#0091ff', '#ff4757', '#2ed573', '#ffa502', '#9b59b6'];

    // Variáveis de estado do desafio
    let alvoCounts = [];
    let userCounts =[];
    let emojisAtuais = [];
    let coresAtuais =[];
    let respostaCorreta = null;

    /* =========================================
       LÓGICA PRINCIPAL DO JOGO
       ========================================= */
    function iniciarJogo(nivel) {
        document.querySelectorAll('.btn-nivel').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-nivel-' + nivel).classList.add('active');

        nivelAtual = nivel;
        desafioAtual = 0;
        erros = 0;

        atualizarPlacar();
        endScreen.style.display = 'none';
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        gerarDesafio();
    }

    function reiniciarNivelAtual() {
        iniciarJogo(nivelAtual);
    }

    function atualizarPlacar() {
        elDesafios.textContent = `${desafioAtual}/${TOTAL_DESAFIOS}`;
        elErros.textContent = erros;
    }

    function escolherElementosAleatorios(array, num) {
        const misturado = [...array].sort(() => 0.5 - Math.random());
        return misturado.slice(0, num);
    }

    function gerarDesafio() {
        if (desafioAtual >= TOTAL_DESAFIOS) {
            finalizarJogo();
            return;
        }

        atualizarPlacar();
        gameArea.innerHTML = '';
        gameArea.classList.remove('btn-disabled');

        // Escolher 3 emojis e 3 cores de um tema aleatório
        const temaEscolhido = temas[Math.floor(Math.random() * temas.length)];
        emojisAtuais = escolherElementosAleatorios(temaEscolhido, 3);
        coresAtuais = escolherElementosAleatorios(coresGrafico, 3);

        if (nivelAtual === 1) {
            renderNivel1();
        } else if (nivelAtual === 2) {
            renderNivel2();
        } else if (nivelAtual === 3) {
            renderNivel3();
        }
    }

    /* =========================================
       NÍVEL 1: CONSTRUIR O GRÁFICO
       ========================================= */
    function renderNivel1() {
        alvoCounts =[
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1,
            Math.floor(Math.random() * LIMITE_ALTURA) + 1
        ];
        userCounts = [0, 0, 0];

        // Criar os itens misturados para a caixa superior
        let itensMisturados =[];
        alvoCounts.forEach((qnt, i) => {
            for(let j = 0; j < qnt; j++) itensMisturados.push(`<span>${emojisAtuais[i]}</span>`);
        });
        itensMisturados = itensMisturados.sort(() => Math.random() - 0.5).join('');

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">Conta os objetos e constrói o gráfico!</div>
                <div class="caixa-mistura">${itensMisturados}</div>
                <div class="grafico-area">
                    <div class="eixo-y"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
        `;

        emojisAtuais.forEach((emoji, i) => {
            html += `
                <div class="coluna-wrapper">
                    <div class="coluna" id="col-${i}"></div>
                    <div class="icone-base">${emoji}</div>
                    <div class="controles">
                        <button class="btn-ctrl" onclick="modificarColuna(${i}, -1)">-</button>
                        <button class="btn-ctrl" onclick="modificarColuna(${i}, 1)">+</button>
                    </div>
                </div>
            `;
        });

        html += `
                </div>
                <button class="btn-verificar" id="btn-verificar" onclick="verificarNivel1()">Verificar Gráfico</button>
            </div>
        `;
        gameArea.innerHTML = html;
    }

    function modificarColuna(index, valor) {
        let novaQnt = userCounts[index] + valor;
        if (novaQnt >= 0 && novaQnt <= LIMITE_ALTURA) {
            userCounts[index] = novaQnt;
            desenharColuna(index);
            tocarSom('flip');
        }
    }

    function desenharColuna(index) {
        const coluna = document.getElementById(`col-${index}`);
        coluna.innerHTML = '';
        for(let i=0; i < userCounts[index]; i++) {
            coluna.innerHTML += `<div class="bloco" style="background-color: ${coresAtuais[index]}"></div>`;
        }
    }

    function verificarNivel1() {
        const btn = document.getElementById('btn-verificar');
        const certo = alvoCounts.every((val, i) => val === userCounts[i]);

        if (certo) {
            btn.classList.add('success-flash');
            btn.textContent = "Excelente! ✅";
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    /* =========================================
       NÍVEL 2: LER O GRÁFICO (NÚMEROS)
       ========================================= */
    function renderNivel2() {
        // Gerar quantidades aleatórias
        alvoCounts = emojisAtuais.map(() => Math.floor(Math.random() * LIMITE_ALTURA) + 1);
        
        // Escolher qual será perguntado
        const indexPergunta = Math.floor(Math.random() * 3);
        const emojiAlvo = emojisAtuais[indexPergunta];
        respostaCorreta = alvoCounts[indexPergunta];

        // Gerar opções de resposta falsas mas próximas
        let opcoes = new Set([respostaCorreta]);
        while(opcoes.size < 3) {
            let fake = respostaCorreta + (Math.floor(Math.random() * 5) - 2); // -2 a +2
            if (fake > 0 && fake <= LIMITE_ALTURA + 2) opcoes.add(fake);
        }
        opcoes = Array.from(opcoes).sort(() => Math.random() - 0.5);

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">Observa o gráfico. Quantos(as) <b>${emojiAlvo}</b> há?</div>
                <div class="grafico-area">
                    <div class="eixo-y"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
        `;

        emojisAtuais.forEach((emoji, i) => {
            html += `
                <div class="coluna-wrapper">
                    <div class="coluna">
            `;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `
                    </div>
                    <div class="icone-base">${emoji}</div>
                </div>
            `;
        });

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, ${op})">${op}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    /* =========================================
       NÍVEL 3: COMPARAR E INTERPRETAR
       ========================================= */
    function renderNivel3() {
        // Garantir que há um máximo e um mínimo únicos
        let nums;
        do {
            nums =[
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1,
                Math.floor(Math.random() * LIMITE_ALTURA) + 1
            ];
        } while (new Set(nums).size < 3); // Força os 3 a serem diferentes para facilitar a pergunta "Maioria/Minoria"
        
        alvoCounts = nums;
        
        const tipoPergunta = Math.random() > 0.5 ? 'mais' : 'menos';
        let indexCorreto = 0;
        
        if (tipoPergunta === 'mais') {
            indexCorreto = alvoCounts.indexOf(Math.max(...alvoCounts));
            respostaCorreta = emojisAtuais[indexCorreto];
        } else {
            indexCorreto = alvoCounts.indexOf(Math.min(...alvoCounts));
            respostaCorreta = emojisAtuais[indexCorreto];
        }

        const textoPergunta = tipoPergunta === 'mais' 
            ? `Qual teve <b>MAIS</b> votos? (Maioria)` 
            : `Qual teve <b>MENOS</b> votos? (Minoria)`;

        let html = `
            <div class="laboratorio-container">
                <div class="pergunta-texto">${textoPergunta}</div>
                <div class="grafico-area">
                    <div class="eixo-y"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span></div>
        `;

        emojisAtuais.forEach((emoji, i) => {
            html += `
                <div class="coluna-wrapper">
                    <div class="coluna">
            `;
            for(let b=0; b < alvoCounts[i]; b++) {
                html += `<div class="bloco" style="background-color: ${coresAtuais[i]}"></div>`;
            }
            html += `
                    </div>
                    <div class="icone-base">${emoji}</div>
                </div>
            `;
        });

        // As opções são as próprias imagens (emojis)
        let opcoes = [...emojisAtuais].sort(() => Math.random() - 0.5);

        html += `</div><div class="opcoes-container">`;
        opcoes.forEach(op => {
            html += `<button class="btn-opcao" onclick="verificarMultiplaEscolha(this, '${op}')">${op}</button>`;
        });
        html += `</div></div>`;
        
        gameArea.innerHTML = html;
    }

    /* =========================================
       VERIFICAÇÃO GERAL
       ========================================= */
    function verificarMultiplaEscolha(btn, valorEscolhido) {
        if (valorEscolhido === respostaCorreta) {
            btn.classList.add('success-flash');
            sucessoAcao();
        } else {
            btn.classList.add('error-shake');
            erroAcao();
            setTimeout(() => btn.classList.remove('error-shake'), 400);
        }
    }

    function sucessoAcao() {
        tocarSom('acerto');
        gameArea.classList.add('btn-disabled'); // Bloqueia cliques
        desafioAtual++;
        setTimeout(gerarDesafio, 1200);
    }

    function erroAcao() {
        tocarSom('erro');
        erros++;
        atualizarPlacar();
    }

    function finalizarJogo() {
        endScreen.style.display = 'flex';
        document.getElementById('final-erros').textContent = erros;
        atualizarPlacar();

        dispararConfetis();

        if (erros === 0) {
            document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
            tocarSom('vitoria'); 
        } else if (erros <= 2) {
            document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
            tocarSom('vitoria'); 
        } else {
            document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
            tocarSom('vitoria'); 
        }
    }

    /* =========================================
       SISTEMA DE SOM E EFEITOS (Reutilizado)
       ========================================= */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'flip') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, agora);
            osc.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
            gain.gain.setValueAtTime(0.05, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        }
        else if (tipo === 'acerto') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, agora);
            osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, agora);
            osc.frequency.exponentialRampToValueAtTime(150, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    /* Confetis */
    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() {
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth;
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis = [];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#9b59b6'];
        
        for (let i = 0; i < 100; i++) {
            confetis.push({
                x: Math.random() * canvasConfetti.width,
                y: Math.random() * canvasConfetti.height - canvasConfetti.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                cor: cores[Math.floor(Math.random() * cores.length)],
                velY: Math.random() * 3 + 2,
                velX: Math.random() * 2 - 1,
                rotacao: Math.random() * 360,
                velRotacao: Math.random() * 5 - 2.5
            });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;

        confetis.forEach(c => {
            c.y += c.velY;
            c.x += c.velX;
            c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;

            ctxConfetti.save();
            ctxConfetti.translate(c.x, c.y);
            ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor;
            ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
            ctxConfetti.restore();
        });

        if (ativos) requestAnimationFrame(animarConfetis);
    }

    // Inicia no nível 1 automaticamente ao abrir
    window.onload = () => iniciarJogo(1);

</script>
</body>
