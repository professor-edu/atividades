<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras 🔎</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
            --amarelo-selecao: #fff9c4; /* Nova variável para seleção */
            --borda-amarela-selecao: #fbc02d;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Para mobile */
        }
        
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Sombra mais subtil */
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-menu:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 16px rgba(255, 152, 0, 0.5); /* Sombra maior no hover */
        }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3));
        }

        .status-jogo { 
            padding: 15px 10px; /* Aumenta um pouco o padding vertical */
            flex-shrink: 0; 
            background-color: var(--azul-claro); /* Garante que o fundo corresponde ao body */
        }
        #countdown-box {
            display: inline-flex; /* Usa flex para alinhar melhor o ícone e o texto */
            align-items: center;
            justify-content: center;
            gap: 8px; /* Espaço entre o ícone e o texto */
            background: white;
            padding: 10px 30px; /* Ajusta o padding */
            border-radius: 28px; /* Ajusta um pouco para parecer mais redondo */
            border: 3px solid var(--azul-grad-dir);
            font-weight: 700;
            font-size: 1.6rem; /* Aumenta um pouco o tamanho da fonte */
            color: var(--azul-escuro);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Adiciona uma sombra subtil */
        }

        /* CONTENTOR PRINCIPAL AJUSTADO */
        .container { 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Alinha no topo, para a lista de palavras começar no topo */
            gap: 30px; 
            padding: 10px 20px 40px; 
            flex-wrap: wrap;
            flex-grow: 1; /* Permite que o container principal ocupe o espaço restante */
        }

        /* GRELHA */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 48px); 
            grid-template-rows: repeat(10, 48px); 
            gap: 6px; 
            background: white; 
            padding: 15px; 
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
            border: 2px solid var(--azul-janela-borda);
            touch-action: none; /* Previne scroll acidental em touch devices */
        }

        .letra { 
            width: 48px; height: 48px; 
            border: 1px solid #e3efff; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 24px; 
            border-radius: 12px; background: #fff;
            color: var(--azul-escuro); /* Cor das letras padrão */
            transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .letra.selecionando { 
            background: var(--amarelo-selecao) !important; 
            border-color: var(--borda-amarela-selecao) !important; 
            color: #333 !important; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1); /* Sombra interna para destaque */
        } 
        .letra.correta { 
            background: var(--verde) !important; 
            color: white !important; 
            border-color: #388e3c !important; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        /* LISTA DE PALAVRAS CORRIGIDA */
        #lista-palavras {
            display: grid;
            grid-template-columns: repeat(2, 160px);
            /* Ajustado para crescer e não fixar 4 linhas, permitindo mais flexibilidade */
            grid-auto-rows: minmax(100px, auto); 
            gap: 12px;
            padding: 15px; /* Adiciona padding para corresponder à grelha */
            background: white; /* Adiciona fundo branco */
            border-radius: 25px; /* Borda arredondada */
            box-shadow: 0 8px 30px rgba(0,0,0,0.08); /* Sombra */
            border: 2px solid var(--azul-janela-borda); /* Borda */
        }

        .item-palavra { 
            background: white; 
            padding: 8px; /* Reduz um pouco o padding para o conteúdo caber melhor */
            border-radius: 18px; /* Ajusta um pouco a borda */
            border: 2px solid var(--azul-janela-borda); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease;
            cursor: default; /* Indica que não é clicável diretamente */
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); /* Sombra mais subtil */
        }

        .item-palavra img { 
            width: 60px; /* ligeiramente menor */
            height: 60px; 
            object-fit: contain; 
            margin-bottom: 5px; /* Espaço entre imagem e texto */
        }
        .item-palavra span { 
            font-weight: 700; 
            font-size: 13px; /* Aumenta um pouco o texto */
            color: var(--azul-escuro); 
            text-transform: uppercase; 
            line-height: 1.2; /* Melhora a legibilidade */
        }
        .item-palavra.encontrada { 
            opacity: 0.6; /* Reduz um pouco a opacidade para ser visível mas distinto */
            background: #e6ffe6; /* Um verde muito claro para o fundo */
            border-color: var(--verde); 
            transform: scale(0.98); /* Reduz menos o tamanho */
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .item-palavra.encontrada span { 
            text-decoration: line-through; 
            color: #777; /* Cor mais suave para o texto riscado */
        }

        /* RESPONSIVIDADE MOBILE */
        @media (max-width: 768px) { /* Ponto de interrupção ligeiramente maior */
            .cabecalho { padding: 0 15px; height: 75px; }
            .cabecalho h1 { font-size: 1.6rem; }
            .btn-menu { padding: 8px 15px; font-size: 0.85rem; }
            .cabecalho-conteudo img { width: 45px !important; } /* A img precisa de !important para sobrepor o inline style */

            #countdown-box { font-size: 1.3rem; padding: 8px 20px; }

            .container { 
                flex-direction: column; 
                align-items: center; 
                gap: 20px; 
                padding: 10px 10px 30px; 
            }

            #grid { 
                grid-template-columns: repeat(10, 30px); /* Ligeiramente menor */
                grid-template-rows: repeat(10, 30px); 
                padding: 10px;
                gap: 3px; /* Espaçamento menor */
            }
            .letra { width: 30px; height: 30px; font-size: 15px; border-radius: 8px; }

            #lista-palavras { 
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* Mais flexível */
                grid-auto-rows: minmax(90px, auto); 
                width: 100%; 
                max-width: 400px; /* Limita a largura para não ficar demasiado grande em tablets */
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            .item-palavra { padding: 6px; border-radius: 15px; }
            .item-palavra img { width: 45px; height: 45px; }
            .item-palavra span { font-size: 11px; margin-top: 3px; }
        }

        /* MEDIA QUERY PARA TELAS MUITO PEQUENAS (EX: iPhone SE) */
        @media (max-width: 380px) {
            #grid {
                grid-template-columns: repeat(10, 26px);
                grid-template-rows: repeat(10, 26px);
                gap: 2px;
            }
            .letra { width: 26px; height: 26px; font-size: 13px; border-radius: 6px; }
            .cabecalho h1 { font-size: 1.3rem; }
            .cabecalho-conteudo img { width: 40px !important; }
            .btn-menu { padding: 6px 12px; font-size: 0.75rem; gap: 5px;}
            #countdown-box { font-size: 1.1rem; padding: 6px 15px; gap: 5px; }
            #countdown-box span { font-size: 1.2rem; }
            #lista-palavras {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                max-width: 300px;
            }
        }


        #feedback-final { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            backdrop-filter: blur(5px); /* Efeito de desfoque */
        }
        .painel-vitoria { 
            background: white; 
            padding: 40px; 
            border-radius: 35px; 
            text-align: center; 
            max-width: 400px; 
            width: 90%; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); /* Sombra mais pronunciada */
            animation: fadeInScale 0.5s ease-out forwards; /* Animação ao aparecer */
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; 
            width: 100%;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05); /* Sombra para o footer */
            margin-top: auto; /* Garante que o footer fica sempre em baixo */
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-menu" aria-label="Voltar ao Menu Principal"><span>🏠</span> MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:55px" alt="Ícone de lupa e letras, representando o jogo Sopa de Letras">
        <h1>Sopa de Letras</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;" aria-hidden="true">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda);"></path>
    </svg>
</div>

<main> <!-- Conteúdo principal do jogo -->
    <div class="status-jogo">
        <div id="countdown-box" role="timer" aria-label="Tempo restante">⏱️ <span id="timer-display">03:00</span></div>
    </div>

    <div class="container">
        <div id="grid" oncontextmenu="return false;" role="grid" aria-label="Grelha da Sopa de Letras"></div> 
        <div id="lista-palavras" role="list" aria-label="Lista de Palavras a Encontrar"></div>
    </div>
</main>

<div id="feedback-final" role="dialog" aria-modal="true" aria-labelledby="feedback-titulo">
    <div class="painel-vitoria">
        <span style="font-size: 80px;" id="feedback-emoji" role="img" aria-label="Emoji de celebração">🥳</span>
        <h2 id="feedback-titulo">Excelente Trabalho!</h2>
        <p id="msg-tempo" style="font-size: 1.2rem; color: var(--azul-escuro); font-weight: 500;"></p>
        <button class="btn-menu" style="margin: 20px auto 0; padding: 15px 30px;" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    const TEMPO_LIMITE = 180; // 3 minutos
    let tempoRestante = TEMPO_LIMITE;
    let intervaloCountdown;
    
    const gridElement = document.getElementById('grid');
    const listaElement = document.getElementById('lista-palavras');
    
    // Seleciona 8 palavras aleatoriamente e as prepara
    let palavrasParaEncontrar = palavras
        .sort(() => 0.5 - Math.random())
        .slice(0, 8)
        .map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem,
            // Adicionado 'alt' da imagem para acessibilidade no JavaScript
            altImagem: p.alt || p.palavra, 
            encontrada: false,
            celulas: []
        }));

    let matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
    let estaArrastando = false;
    let celulaInicial = null;
    let celulasSelecionadasAtuais = [];
    let direcaoSelecao = null; // 'H' ou 'V'

    /**
     * Inicia o jogo, colocando palavras na grelha e configurando a UI.
     */
    function iniciarJogo() {
        // Tenta colocar cada palavra na grelha
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false;
            let tentativas = 0;
            const MAX_TENTATIVAS = 200; // Limite para evitar loops infinitos
            while (!colocada && tentativas < MAX_TENTATIVAS) {
                // Escolhe direção aleatoriamente (Horizontal 'H' ou Vertical 'V')
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                
                // Calcula linha e coluna iniciais
                let l, c;
                if (dir === 'V') {
                    l = Math.floor(Math.random() * (TAMANHO - pObj.nome.length + 1));
                    c = Math.floor(Math.random() * TAMANHO);
                } else { // dir === 'H'
                    l = Math.floor(Math.random() * TAMANHO);
                    c = Math.floor(Math.random() * (TAMANHO - pObj.nome.length + 1));
                }
                
                // Verifica se há espaço e se a palavra pode ser colocada
                if (verificarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = (dir === 'V') ? l + i : l;
                        let curC = (dir === 'H') ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
            // Fallback caso a palavra não consiga ser colocada (pode acontecer com muitas palavras ou grelhas pequenas)
            if (!colocada) {
                console.warn(`Não foi possível colocar a palavra "${pObj.nome}" na grelha.`);
            }
        });
        desenharInterface();
        configurarEventosArrastamento();
        iniciarCountdown();
    }

    /**
     * Verifica se uma palavra pode ser colocada numa posição e direção específicas.
     * @param {string} palavra - A palavra a ser verificada.
     * @param {number} l - Linha inicial.
     * @param {number} c - Coluna inicial.
     * @param {string} dir - Direção ('H' para horizontal, 'V' para vertical).
     * @returns {boolean} - Verdadeiro se houver espaço, falso caso contrário.
     */
    function verificarEspaco(palavra, l, c, dir) {
        for (let i = 0; i < palavra.length; i++) {
            let curL = (dir === 'V') ? l + i : l;
            let curC = (dir === 'H') ? c + i : c;

            // Verifica os limites da grelha
            if (curL >= TAMANHO || curC >= TAMANHO || curL < 0 || curC < 0) {
                return false;
            }

            // Verifica se a célula já está ocupada por outra letra ou se a letra é diferente
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== palavra[i]) {
                return false;
            }
        }
        return true;
    }

    /**
     * Desenha a grelha e a lista de palavras na interface.
     */
    function desenharInterface() {
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let l = 0; l < TAMANHO; l++) {
            for (let c = 0; c < TAMANHO; c++) {
                const div = document.createElement('div');
                div.className = 'letra';
                div.textContent = matriz[l][c] || alfabeto[Math.floor(Math.random() * alfabeto.length)];
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; 
                div.dataset.c = c;
                // Adiciona atributos ARIA para acessibilidade
                div.setAttribute('role', 'gridcell');
                div.setAttribute('aria-label', `Letra ${div.textContent} na linha ${l + 1}, coluna ${c + 1}`);
                gridElement.appendChild(div);
            }
        }

        palavrasParaEncontrar.forEach(p => {
            const item = document.createElement('div');
            item.className = 'item-palavra';
            item.id = `item-${p.nome}`;
            // Adiciona alt à imagem para acessibilidade
            item.innerHTML = `<img src="${p.imagem}" alt="${p.altImagem}"><span>${p.nome}</span>`;
            item.setAttribute('role', 'listitem');
            item.setAttribute('aria-label', `Palavra ${p.nome} para encontrar`);
            listaElement.appendChild(item);
        });
    }

    /**
     * Configura os event listeners para arrastar e selecionar células.
     */
    function configurarEventosArrastamento() {
        gridElement.addEventListener('mousedown', iniciarSelecao);
        window.addEventListener('mousemove', enquantoArrasta);
        window.addEventListener('mouseup', finalizarSelecao);
        // Eventos para touch
        gridElement.addEventListener('touchstart', iniciarSelecao, {passive: false});
        window.addEventListener('touchmove', enquantoArrasta, {passive: false});
        window.addEventListener('touchend', finalizarSelecao);
    }

    /**
     * Obtém o elemento da célula a partir de um evento (rato ou toque).
     * @param {Event} e - O evento de rato ou toque.
     * @returns {Object|null} - Objeto com o elemento, linha e coluna, ou null se não for uma célula.
     */
    function obterCelulaDosEventos(e) {
        const touch = e.touches ? e.touches[0] : e;
        // Usa `elementFromPoint` para obter o elemento na posição do evento
        const elemento = document.elementFromPoint(touch.clientX, touch.clientY);
        if (elemento && elemento.classList.contains('letra')) {
            return { el: elemento, l: parseInt(elemento.dataset.l), c: parseInt(elemento.dataset.c) };
        }
        return null;
    }

    /**
     * Inicia o processo de seleção de células.
     * @param {Event} e - O evento de `mousedown` ou `touchstart`.
     */
    function iniciarSelecao(e) {
        // Impede o clique direito de abrir o menu de contexto
        if (e.button === 2) return; 

        const celula = obterCelulaDosEventos(e);
        if (!celula || celula.el.classList.contains('correta')) return; // Não iniciar seleção em palavras já encontradas

        estaArrastando = true;
        celulaInicial = { l: celula.l, c: celula.c };
        celulasSelecionadasAtuais = [];
        direcaoSelecao = null; // Reinicia a direção
        
        destacarCelula(celula.l, celula.c);
        if (e.cancelable) e.preventDefault(); // Previne o comportamento padrão (ex: scroll em mobile)
    }

    /**
     * Atualiza a seleção de células enquanto o utilizador arrasta.
     * @param {Event} e - O evento de `mousemove` ou `touchmove`.
     */
    function enquantoArrasta(e) {
        if (!estaArrastando) return;

        const celulaAtual = obterCelulaDosEventos(e);
        if (!celulaAtual || celulaAtual.el.classList.contains('correta')) return;

        const lI = celulaInicial.l, cI = celulaInicial.c; // Linha e coluna iniciais
        const lA = celulaAtual.l, cA = celulaAtual.c;     // Linha e coluna atuais

        // Determina a direção da seleção (apenas horizontal ou vertical)
        if (!direcaoSelecao) {
            const diffL = Math.abs(lA - lI);
            const diffC = Math.abs(cA - cI);
            if (diffL > diffC && diffL > 0) {
                direcaoSelecao = 'V';
            } else if (diffC > diffL && diffC > 0) {
                direcaoSelecao = 'H';
            } else if (diffL === 0 && diffC === 0) {
                // Se ainda na célula inicial, não define direção
                direcaoSelecao = null; 
            } else {
                // Se a diferença for igual (diagonal), trata como preferência horizontal ou vertical (ou nenhuma)
                // Mantém como nulo e o destaque será apenas na célula inicial
                direcaoSelecao = null; 
            }
        }

        // Limpa a seleção anterior
        document.querySelectorAll('.letra.selecionando').forEach(el => el.classList.remove('selecionando'));
        celulasSelecionadasAtuais = [];

        // Destaca as células com base na direção da seleção
        if (direcaoSelecao === 'V') {
            const passo = lA > lI ? 1 : -1;
            for (let l = lI; (passo === 1 ? l <= lA : l >= lA); l += passo) {
                destacarCelula(l, cI);
            }
        } else if (direcaoSelecao === 'H') {
            const passo = cA > cI ? 1 : -1;
            for (let c = cI; (passo === 1 ? c <= cA : c >= cA); c += passo) {
                destacarCelula(lI, c);
            }
        } else {
            // Se não houver direção definida (ainda na célula inicial ou diagonal), destaca apenas a inicial
            destacarCelula(lI, cI);
        }

        if (e.cancelable) e.preventDefault();
    }

    /**
     * Adiciona a classe 'selecionando' a uma célula e adiciona o seu ID à lista de células selecionadas.
     * @param {number} l - Linha da célula.
     * @param {number} c - Coluna da célula.
     */
    function destacarCelula(l, c) {
        if (l < 0 || l >= TAMANHO || c < 0 || c >= TAMANHO) return;
        const id = `${l}-${c}`;
        const el = document.getElementById(`cell-${id}`);
        if (el && !el.classList.contains('correta')) { // Não destacar se já foi encontrada
            el.classList.add('selecionando'); 
            celulasSelecionadasAtuais.push(id);
        }
    }

    /**
     * Finaliza a seleção, verifica se uma palavra foi encontrada e atualiza a UI.
     */
    function finalizarSelecao() {
        if (!estaArrastando) return;
        estaArrastando = false;
        celulaInicial = null;
        direcaoSelecao = null;

        const selecaoFeita = celulasSelecionadasAtuais.sort().join(','); // Normaliza a ordem para comparação

        let palavraEncontradaNestaJogada = false;

        for (const p of palavrasParaEncontrar) {
            if (!p.encontrada) {
                // Converte as células da palavra para uma string de comparação
                const palavraCelulasNormalizadas = p.celulas.sort().join(',');

                if (palavraCelulasNormalizadas === selecaoFeita) {
                    p.encontrada = true;
                    palavraEncontradaNestaJogada = true;
                    // Adiciona classes 'correta' às células da grelha
                    p.celulas.forEach(id => {
                        const cellElement = document.getElementById(`cell-${id}`);
                        if (cellElement) {
                            cellElement.classList.add('correta');
                            cellElement.classList.remove('selecionando'); // Remove seleção anterior
                            cellElement.setAttribute('aria-current', 'true'); // Acessibilidade
                        }
                    });
                    // Adiciona classe 'encontrada' ao item da lista de palavras
                    const listItemElement = document.getElementById(`item-${p.nome}`);
                    if (listItemElement) {
                        listItemElement.classList.add('encontrada');
                        listItemElement.setAttribute('aria-current', 'true'); // Acessibilidade
                    }
                    break; // Uma palavra foi encontrada, não precisamos verificar as restantes
                }
            }
        }

        // Remove a classe 'selecionando' de todas as células após a verificação
        document.querySelectorAll('.letra.selecionando').forEach(el => el.classList.remove('selecionando'));
        celulasSelecionadasAtuais = []; // Limpa a lista de seleção

        // Verifica se todas as palavras foram encontradas
        if (palavrasParaEncontrar.every(p => p.encontrada)) {
            finalizarJogo(true);
        }
    }

    /**
     * Inicia o contador regressivo do jogo.
     */
    function iniciarCountdown() {
        intervaloCountdown = setInterval(() => {
            tempoRestante--;
            let mins = Math.floor(tempoRestante / 60);
            let segs = tempoRestante % 60;
            document.getElementById('timer-display').textContent = 
                `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;

            if (tempoRestante <= 0) {
                finalizarJogo(false); // O tempo acabou
            }
        }, 1000);
    }

    /**
     * Finaliza o jogo, parando o contador e mostrando o painel de feedback.
     * @param {boolean} vitoria - Verdadeiro se o jogo foi ganho, falso se o tempo acabou.
     */
    function finalizarJogo(vitoria) {
        clearInterval(intervaloCountdown);
        const feedback = document.getElementById('feedback-final');
        const msg = document.getElementById('msg-tempo');
        const feedbackEmoji = document.getElementById('feedback-emoji');
        const feedbackTitulo = document.getElementById('feedback-titulo');

        if (vitoria) {
            const tempoGasto = TEMPO_LIMITE - tempoRestante;
            const minutosGasto = Math.floor(tempoGasto / 60);
            const segundosGasto = tempoGasto % 60;
            msg.innerHTML = `Resolvido em <strong>${minutosGasto}m ${segundosGasto.toString().padStart(2, '0')}s</strong>!`;
            feedbackEmoji.textContent = "🥳";
            feedbackEmoji.setAttribute('aria-label', 'Emoji de celebração');
            feedbackTitulo.textContent = "Excelente Trabalho!";
        } else {
            feedbackEmoji.textContent = "😢";
            feedbackEmoji.setAttribute('aria-label', 'Emoji de tristeza');
            feedbackTitulo.textContent = "O tempo acabou!";
            msg.textContent = "Tenta outra vez!";
        }
        feedback.style.display = 'flex';
        // Foca no botão "Jogar de Novo" para acessibilidade
        feedback.querySelector('button').focus(); 
    }

    // Define o ano atual no footer
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    // Inicia o jogo quando a página é carregada
    iniciarJogo();
</script>
