<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras 🔎</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --laranja: #ff9800;
            --verde: #4caf50;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0; background-color: var(--azul-claro); 
            display: flex; flex-direction: column; min-height: 100vh;
        }
        
        /* HEADER E ONDA (MANTIDOS) */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 85px; 
        }
        .btn-menu {
            background: var(--laranja); color: white; border: none; width: 180px;
            padding: 10px; border-radius: 50px; font-weight: 700; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .onda-container { height: 45px; width: 100%; filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1)); }

        /* SELEÇÃO DE DIFICULDADE */
        .controlo-jogo { padding: 15px; text-align: center; }
        .niveis { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-diff {
            background: white; border: 2px solid var(--azul-grad-dir); color: var(--azul-grad-dir);
            padding: 8px 20px; border-radius: 20px; font-weight: 700; cursor: pointer;
        }
        .btn-diff.active { background: var(--azul-grad-dir); color: white; }

        /* JOGO */
        .container { 
            display: flex; justify-content: center; align-items: stretch; 
            gap: 25px; padding: 10px 20px 40px; flex-wrap: wrap;
        }

        #grid { 
            display: grid; background: white; padding: 15px; border-radius: 25px;
            border: 2px solid var(--azul-janela-borda); touch-action: none;
        }

        /* Classes de tamanho dinâmico via JS para as letras */
        .letra { 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; border-radius: 10px; background: #fff; border: 1px solid #e3efff;
        }
        .letra.correta { background: var(--verde) !important; color: white !important; }

        #lista-palavras { display: grid; grid-template-columns: repeat(2, 160px); gap: 10px; }

        .item-palavra { 
            background: white; border-radius: 20px; border: 2px solid var(--azul-janela-borda); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px;
        }
        .item-palavra img { max-width: 80%; object-fit: contain; }
        .item-palavra span { font-weight: 700; font-size: 11px; color: var(--azul-escuro); text-transform: uppercase; }
        .item-palavra.encontrada { opacity: 0.3; }

        footer { height: 50px; background: white; display: flex; align-items: center; justify-content: center; margin-top: auto; }
        
        #feedback-final { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header class="cabecalho">
    <a href="../index.html" class="btn-menu">🏠 MENU</a>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="sopa-letras.png" style="width:45px">
        <h1 style="color:var(--azul-escuro); margin:0;">Sopa de Letras</h1>
    </div>
    <div style="width:180px"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="fill: var(--azul-grad-dir);"></path>
    </svg>
</div>

<div class="controlo-jogo">
    <div id="countdown-box" style="display:inline-block; background:white; padding:8px 30px; border-radius:25px; border:3px solid var(--azul-grad-dir); font-weight:700; font-size:1.4rem;">
        ⏱️ <span id="timer-display">03:00</span>
    </div>
    <div class="niveis">
        <button onclick="mudarDificuldade(8)" id="btn-8" class="btn-diff">FÁCIL</button>
        <button onclick="mudarDificuldade(10)" id="btn-10" class="btn-diff active">MÉDIO</button>
        <button onclick="mudarDificuldade(12)" id="btn-12" class="btn-diff">DIFÍCIL</button>
    </div>
</div>

<div class="container">
    <div id="grid"></div> 
    <div id="lista-palavras"></div>
</div>

<footer>
    <p>2026 🏫 <a href="https://eb1pemarinheira.pt/" style="text-decoration:none; color:inherit;">EB1/PE da Marinheira</a></p>
</footer>

<div id="feedback-final">
    <div style="background:white; padding:40px; border-radius:30px; text-align:center;">
        <h2 id="fb-titulo">Excelente!</h2>
        <button class="btn-menu" style="margin:20px auto" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<script src="js/dados.js"></script>
<script>
    let TAMANHO = 10;
    let tempoRestante = 180;
    let intervalo;

    function mudarDificuldade(n) {
        TAMANHO = n;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n).classList.add('active');
        iniciarJogo();
    }

    function iniciarJogo() {
        clearInterval(intervalo);
        tempoRestante = 180;
        document.getElementById('grid').innerHTML = '';
        document.getElementById('lista-palavras').innerHTML = '';
        
        // Ajuste de tamanho das letras baseado no nível
        const tamanhoLetra = TAMANHO === 8 ? 55 : (TAMANHO === 10 ? 48 : 38);
        const fontSize = TAMANHO === 8 ? 26 : (TAMANHO === 10 ? 22 : 18);
        
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${TAMANHO}, ${tamanhoLetra}px)`;
        grid.style.gridTemplateRows = `repeat(${TAMANHO}, ${tamanhoLetra}px)`;

        // Quantidade de palavras por nível
        const numPalavras = TAMANHO === 8 ? 6 : (TAMANHO === 10 ? 8 : 10);

        // Lógica de montagem da grelha (simplificada para o exemplo)
        // [Aqui entra a tua lógica de inserção de palavras que já tinhas]
        
        // Exemplo de como as imagens se ajustam:
        const lista = document.getElementById('lista-palavras');
        lista.style.gridTemplateRows = `repeat(${Math.ceil(numPalavras/2)}, 1fr)`;
        
        selecao.forEach(p => {
            lista.innerHTML += `
                <div class="item-palavra">
                    <img src="${p.imagem}" style="max-height:${TAMANHO === 12 ? '45px' : '65px'}">
                    <span>${p.palavra}</span>
                </div>`;
        });

        // Iniciar cronómetro
        intervalo = setInterval(() => {
            tempoRestante--;
            let m = Math.floor(tempoRestante/60), s = tempoRestante%60;
            document.getElementById('timer-display').textContent = `${m}:${s < 10 ? '0'+s : s}`;
            if(tempoRestante <= 0) { clearInterval(intervalo); alert('Tempo esgotado!'); }
        }, 1000);
    }

    iniciarJogo();
</script>
</body>
</html>
