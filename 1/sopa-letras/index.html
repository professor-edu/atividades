<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --laranja: #ff9800;
        }

        /* RESET PARA ELIMINAR ESPAÇOS EM BRANCO */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--azul-claro);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER COM GRADIENTE REAL */
        header {
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        /* BOTÃO MENU LARGO (ESTILO PILL) */
        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            width: 180px; /* Largura corrigida conforme a imagem */
            padding: 10px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* ONDA COM GRADIENTE CONTINUO */
        .onda-container {
            width: 100%;
            height: 60px;
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%);
            clip-path: url(#wave-clip);
            margin-bottom: 20px;
        }

        .main-content {
            flex: 1; /* Empurra o footer para baixo */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-wrapper {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
        }

        /* GRELHA */
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 48px);
            grid-template-rows: repeat(10, 48px);
            gap: 6px;
            background: white;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #add8e6;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            touch-action: none;
        }

        /* LISTA DE PALAVRAS ALINHADA */
        #word-list {
            display: grid;
            grid-template-columns: repeat(2, 160px);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            /* Altura sincronizada com a grelha */
        }

        .word-card {
            background: white;
            border: 2px solid #add8e6;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .word-card img { width: 65px; height: 65px; object-fit: contain; }
        .word-card span { font-weight: 700; font-size: 12px; color: #0d47a1; text-transform: uppercase; margin-top: 5px; }

        /* FOOTER COLADO AO FUNDO */
        footer {
            background: white;
            width: 100%;
            padding: 15px 0;
            text-align: center;
            border-top: 1px solid #ddd;
            font-size: 0.85rem;
            font-weight: 700;
            color: #0d47a1;
        }

        /* SVG PARA CLIP-PATH DA ONDA */
        .svg-defs { position: absolute; width: 0; height: 0; }

        @media (max-width: 600px) {
            .btn-menu { width: 120px; }
            #grid { grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); }
            #word-list { grid-template-columns: repeat(2, 1fr); height: auto; }
        }
    </style>
</head>
<body>

<svg class="svg-defs">
    <defs>
        <clipPath id="wave-clip" clipPathUnits="objectBoundingBox">
            <path d="M0,0 L1,0 L1,0.6 C0.8,0.9 0.5,1 0.2,0.8 L0,0.6 Z" />
        </clipPath>
    </defs>
</svg>

<header>
    <a href="#" class="btn-menu">🏠 MENU</a>
    <div style="display: flex; align-items: center; gap: 10px; color: #0d47a1;">
        <img src="logo.png" style="height: 45px;">
        <h1 style="margin: 0; font-size: 1.6rem;">Sopa de Letras</h1>
    </div>
    <div style="width: 180px;"></div>
</header>

<div class="onda-container"></div>

<div class="main-content">
    <div style="margin-bottom: 20px;">
        <div style="background: white; padding: 10px 30px; border-radius: 30px; border: 3px solid var(--azul-grad-dir); font-weight: bold; font-size: 1.4rem;">
            ⏱️ 02:54
        </div>
    </div>

    <div class="game-wrapper">
        <div id="grid">
            </div>
        <div id="word-list">
            <div class="word-card"><img src="baleia.png"><span>Baleia</span></div>
            <div class="word-card"><img src="piano.png"><span>Piano</span></div>
            <div class="word-card"><img src="mota.png"><span>Mota</span></div>
            <div class="word-card"><img src="limao.png"><span>Limão</span></div>
            <div class="word-card"><img src="papagaio.png"><span>Papagaio</span></div>
            <div class="word-card"><img src="vaca.png"><span>Vaca</span></div>
            <div class="word-card"><img src="amarelo.png"><span>Amarelo</span></div>
            <div class="word-card"><img src="tomate.png"><span>Tomate</span></div>
        </div>
    </div>
</div>

<footer>
    2026 🏫 EB1/PE da Marinheira
</footer>

</body>
</html>
