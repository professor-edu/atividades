<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras 🔎</title>

    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --amarelo: #fbc02d;
            --vermelho: #e53935;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            text-align: center;
            background-color: var(--azul-claro);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }

        /* HEADER / MENU / FOOTER (INALTERADOS) */
        .cabecalho {
            background: linear-gradient(90deg, var(--azul-grad-esq), var(--azul-grad-dir));
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 85px;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .btn-menu {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .onda-container {
            height: 45px;
            overflow: hidden;
        }

        /* PAINEL DE DIFICULDADE */
        .painel-dificuldade {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 20px;
        }

        .tempo-preview {
            background: white;
            border: 3px solid var(--azul-grad-dir);
            border-radius: 40px;
            padding: 10px 30px;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .botoes-dificuldade {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-dif {
            border: 3px solid;
            border-radius: 30px;
            padding: 10px 22px;
            font-weight: 700;
            background: white;
            cursor: pointer;
            transition: 0.25s;
        }

        .btn-dif.facil {
            color: #2e7d32;
            border-color: var(--verde);
        }
        .btn-dif.facil:hover { background: #e8f5e9; }

        .btn-dif.medio {
            color: #f57f17;
            border-color: var(--amarelo);
        }
        .btn-dif.medio:hover { background: #fffde7; }

        .btn-dif.dificil {
            color: #c62828;
            border-color: var(--vermelho);
        }
        .btn-dif.dificil:hover { background: #fdecea; }

        /* STATUS JOGO */
        .status-jogo { padding: 10px; display: none; }

        #countdown-box {
            display: inline-block;
            background: white;
            padding: 8px 30px;
            border-radius: 25px;
            border: 3px solid var(--azul-grad-dir);
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--azul-escuro);
        }

        /* CONTEÚDO JOGO */
        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px 20px 40px;
            flex-wrap: wrap;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 48px);
            grid-template-rows: repeat(10, 48px);
            gap: 6px;
            background: white;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid var(--azul-janela-borda);
            touch-action: none;
        }

        .letra {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            border-radius: 12px;
            border: 1px solid #e3efff;
        }

        .letra.selecionando { background: #fff9c4; }
        .letra.correta { background: var(--verde); color: white; }

        #lista-palavras {
            display: grid;
            grid-template-columns: repeat(2, 160px);
            gap: 12px;
        }

        .item-palavra {
            background: white;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid var(--azul-janela-borda);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item-palavra img { width: 65px; height: 65px; }
        .item-palavra span { font-weight: 700; font-size: 12px; }

        .item-palavra.encontrada { opacity: 0.3; }

        footer {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-top: 1px solid #eee;
        }
    </style>
</head>

<body>

<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-menu">🏠 MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:55px">
        <h1>Sopa de Letras</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height:100%;width:100%">
        <path d="M0,50 C150,150 350,-50 500,50 L500,0 L0,0 Z"
              style="fill:url(#grad-onda)"></path>
    </svg>
</div>

<!-- MENU DIFICULDADE -->
<div class="painel-dificuldade" id="escolha-dificuldade">
    <div class="tempo-preview">⏱️ <span id="tempo-preview">03:00</span></div>
    <div class="botoes-dificuldade">
        <button class="btn-dif facil" onclick="iniciarComNivel('facil')">FÁCIL (2 min)</button>
        <button class="btn-dif medio" onclick="iniciarComNivel('medio')">MÉDIO (3 min)</button>
        <button class="btn-dif dificil" onclick="iniciarComNivel('dificil')">DIFÍCIL (4 min)</button>
    </div>
</div>

<div class="status-jogo" id="status-jogo">
    <div id="countdown-box">⏱️ <span id="timer-display">03:00</span></div>
</div>

<div class="container">
    <div id="grid"></div>
    <div id="lista-palavras"></div>
</div>

<footer>
    <p><span id="ano-atual"></span> 🏫 EB1/PE da Marinheira</p>
</footer>

<script src="js/dados.js"></script>
<script>
let TAMANHO = 10;
let TEMPO_LIMITE = 180;
let tempoRestante;
let intervaloCountdown;

function iniciarComNivel(nivel) {
    if (nivel === 'facil') TEMPO_LIMITE = 120;
    if (nivel === 'medio') TEMPO_LIMITE = 180;
    if (nivel === 'dificil') TEMPO_LIMITE = 240;

    tempoRestante = TEMPO_LIMITE;

    document.getElementById('escolha-dificuldade').style.display = 'none';
    document.getElementById('status-jogo').style.display = 'block';

    document.getElementById('timer-display').textContent =
        `${Math.floor(tempoRestante/60).toString().padStart(2,'0')}:00`;

    iniciarCountdown();
    iniciarJogo();
}

function iniciarCountdown() {
    intervaloCountdown = setInterval(() => {
        tempoRestante--;
        let m = Math.floor(tempoRestante / 60);
        let s = tempoRestante % 60;
        document.getElementById('timer-display').textContent =
            `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);
}

document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
