<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Sopa de Letras</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS EXISTENTE -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ===== HEADER (INALTERADO) ===== -->
  <header>
    <button class="btn-menu">🏠 MENU</button>
    <div class="titulo">
      <img src="img/avatar.png" alt="Avatar">
      <h1>Sopa de Letras</h1>
    </div>
  </header>
  <!-- ============================== -->


  <!-- ===== CONTEÚDO PRINCIPAL ===== -->
  <main>

    <!-- PAINEL DE DIFICULDADE (ACIMA DA GRELHA) -->
    <section id="painel-dificuldade">

      <div id="temporizador">
        ⏱️ <span id="tempo">03:00</span>
      </div>

      <div class="botoes-dificuldade">
        <button class="btn facil" onclick="iniciarComNivel('facil')">
          FÁCIL (2 min)
        </button>

        <button class="btn medio" onclick="iniciarComNivel('medio')">
          MÉDIO (3 min)
        </button>

        <button class="btn dificil" onclick="iniciarComNivel('dificil')">
          DIFÍCIL (4 min)
        </button>
      </div>

    </section>

    <!-- ZONA DO JOGO -->
    <section id="zona-jogo">

      <!-- GRELHA -->
      <div id="grid"></div>

      <!-- LISTA DE PALAVRAS -->
      <div id="lista-palavras"></div>

    </section>

    <!-- PAINEL FINAL -->
    <section id="painel-final" style="display:none;">
      <h2>Excelente trabalho!</h2>
      <button onclick="location.reload()">Jogar de novo</button>
    </section>

  </main>
  <!-- ============================== -->


  <!-- ===== FOOTER (INALTERADO) ===== -->
  <footer>
    EB1/PE da Marinheira
  </footer>
  <!-- ============================== -->


  <!-- SCRIPTS (ORDEM IMPORTANTE) -->
  <script src="js/dados.js"></script>
  <script src="js/jogo.js"></script>

</body>
</html>
