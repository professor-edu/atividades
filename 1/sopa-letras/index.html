<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras 🔎</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
            user-select: none;
        }
        
        /* CABEÇALHO TEMPLATE */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
            white-space: nowrap;
        }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3));
        }

        /* COUNTDOWN FORA DO HEADER */
        .status-jogo { padding: 5px; flex-shrink: 0; }
        #countdown-container {
            display: inline-block;
            background: white;
            padding: 5px 25px;
            border-radius: 20px;
            border: 3px solid var(--laranja);
            margin: 10px 0;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--azul-escuro);
        }

        .container { 
            display: flex; justify-content: center; align-items: center; 
            gap: 25px; flex: 1; padding: 10px; overflow: hidden;
        }

        /* GRELHA E LISTA */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 45px); grid-template-rows: repeat(10, 45px); 
            gap: 5px; background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 2px solid var(--azul-janela-borda);
        }

        .letra { 
            width: 45px; height: 45px; border: 1px solid #e3efff; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; border-radius: 10px; background: #fff;
        }
        .letra.selecionando { background: #fff9c4; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde) !important; color: white; border-color: #388e3c; }

        #lista-palavras { display: grid; grid-template-columns: repeat(2, 160px); gap: 10px; }
        .item-palavra { background: white; padding: 8px; border-radius: 15px; border: 2px solid var(--azul-janela-borda); display: flex; flex-direction: column; align-items: center; }
        .item-palavra img { width: 60px; height: 60px; object-fit: contain; }
        .item-palavra span { font-weight: bold; font-size: 11px; margin-top: 5px; color: var(--azul-escuro); text-transform: uppercase; }
        .item-palavra.encontrada { opacity: 0.3; background: #e8f5e9; border-color: var(--verde); }

        /* FOOTER TEMPLATE */
        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        #feedback-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .painel-vitoria { background: white; padding: 40px; border-radius: 30px; text-align: center; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:55px" alt="ícone">
        <h1>Sopa de Letras</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div id="countdown-container">⏱️ <span id="timer-display">03:00</span></div>
</div>

<div class="container">
    <div id="grid" oncontextmenu="return false;"></div> 
    <div id="lista-palavras"></div>
</div>

<div id="feedback-final">
    <div class="painel-vitoria">
        <img src="img/certo.png" style="width: 80px;">
        <h2 id="titulo-final">Excelente Trabalho!</h2>
        <p id="msg-tempo"></p>
        <button class="btn-menu" style="margin: 0 auto; padding: 15px 30px;" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempoRestante = 180; // 3 minutos
    let intervaloCronometro;
    const gridElement = document.getElementById('grid');
    const listaElement = document.getElementById('lista-palavras');
    
    let selecaoOriginal = palavras.sort(() => 0.5 - Math.random()).slice(0, 8);
    let palavrasParaEncontrar = selecaoOriginal.map(p => ({
        nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
        imagem: p.imagem,
        encontrada: false,
        celulas: []
    }));

    let matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
    let estaArrastando = false;
    let celulaInicial = null;
    let celulasSelecionadasAtuais = [];

    function iniciarJogo() {
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false;
            let tentativas = 0;
            while (!colocada && tentativas < 150) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                if (verificarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l;
                        let curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
        });
        desenharInterface();
        configurarEventosArrastamento();
        iniciarCountdown();
    }

    function verificarEspaco(palavra, l, c, dir) {
        for (let i = 0; i < palavra.length; i++) {
            let curL = dir === 'V' ? l + i : l;
            let curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== palavra[i]) return false;
        }
        return true;
    }

    function desenharInterface() {
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let l = 0; l < TAMANHO; l++) {
            for (let c = 0; c < TAMANHO; c++) {
                const div = document.createElement('div');
                div.className = 'letra';
                div.textContent = matriz[l][c] || alfabeto[Math.floor(Math.random() * alfabeto.length)];
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l;
                div.dataset.c = c;
                gridElement.appendChild(div);
            }
        }
        palavrasParaEncontrar.forEach(p => {
            const item = document.createElement('div');
            item.className = 'item-palavra';
            item.id = `item-${p.nome}`;
            item.innerHTML = `<img src="${p.imagem}"><span>${p.nome}</span>`;
            listaElement.appendChild(item);
        });
    }

    function configurarEventosArrastamento() {
        gridElement.addEventListener('mousedown', iniciarSelecao);
        window.addEventListener('mousemove', enquantoArrasta);
        window.addEventListener('mouseup', finalizarSelecao);
        gridElement.addEventListener('touchstart', iniciarSelecao, {passive: false});
        window.addEventListener('touchmove', enquantoArrasta, {passive: false});
        window.addEventListener('touchend', finalizarSelecao);
    }

    function obterCelulaDosEventos(e) {
        const touch = e.touches ? e.touches[0] : e;
        const elemento = document.elementFromPoint(touch.clientX, touch.clientY);
        if (elemento && elemento.classList.contains('letra') && !elemento.classList.contains('correta')) {
            return { el: elemento, l: parseInt(elemento.dataset.l), c: parseInt(elemento.dataset.c) };
        }
        return null;
    }

    function iniciarSelecao(e) {
        const celula = obterCelulaDosEventos(e);
        if (!celula) return;
        estaArrastando = true;
        celulaInicial = { l: celula.l, c: celula.c };
        celulasSelecionadasAtuais = [];
        document.querySelectorAll('.letra.selecionando').forEach(el => el.classList.remove('selecionando'));
        destacarCelula(celula.l, celula.c);
        if (e.cancelable) e.preventDefault();
    }

    function enquantoArrasta(e) {
        if (!estaArrastando) return;
        const celulaAtual = obterCelulaDosEventos(e);
        if (!celulaAtual) return;
        const lInicial = celulaInicial.l;
        const cInicial = celulaInicial.c;
        const lAtual = celulaAtual.l;
        const cAtual = celulaAtual.c;
        const deltaL = lAtual - lInicial;
        const deltaC = cAtual - cInicial;
        document.querySelectorAll('.letra.selecionando').forEach(el => el.classList.remove('selecionando'));
        celulasSelecionadasAtuais = [];
        if (Math.abs(deltaL) > Math.abs(deltaC)) {
            const passo = deltaL > 0 ? 1 : -1;
            for (let l = lInicial; l !== lAtual + passo; l += passo) {
                if (l >= 0 && l < TAMANHO) destacarCelula(l, cInicial);
            }
        } else {
            const passo = deltaC > 0 ? 1 : -1;
            for (let c = cInicial; c !== cAtual + passo; c += passo) {
                if (c >= 0 && c < TAMANHO) destacarCelula(lInicial, c);
            }
        }
        if (e.cancelable) e.preventDefault();
    }

    function destacarCelula(l, c) {
        const id = `${l}-${c}`;
        const el = document.getElementById(`cell-${id}`);
        if (el && !el.classList.contains('correta')) {
            el.classList.add('selecionando');
            celulasSelecionadasAtuais.push(id);
        }
    }

    function finalizarSelecao() {
        if (!estaArrastando) return;
        estaArrastando = false;
        verificarPalavrasArrastadas();
        document.querySelectorAll('.letra.selecionando').forEach(el => el.classList.remove('selecionando'));
    }

    function verificarPalavrasArrastadas() {
        const selecaoQuery = celulasSelecionadasAtuais.sort().join(',');
        palavrasParaEncontrar.forEach(p => {
            if (!p.encontrada) {
                const palavraQuery = p.celulas.sort().join(',');
                if (selecaoQuery === palavraQuery) {
                    p.encontrada = true;
                    p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                    document.getElementById(`item-${p.nome}`).classList.add('encontrada');
                }
            }
        });
        if (palavrasParaEncontrar.every(p => p.found || p.encontrada)) finalizarJogo(true);
    }

    function iniciarCountdown() {
        intervaloCronometro = setInterval(() => {
            tempoRestante--;
            let mins = Math.floor(tempoRestante / 60);
            let segs = tempoRestante % 60;
            document.getElementById('timer-display').textContent = 
                `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
            
            if (tempoRestante <= 0) {
                finalizarJogo(false);
            }
        }, 1000);
    }

    function finalizarJogo(vitoria) {
        clearInterval(intervaloCronometro);
        const feedback = document.getElementById('feedback-final');
        const msg = document.getElementById('msg-tempo');
        const titulo = document.getElementById('titulo-final');
        
        feedback.style.display = 'flex';
        if(vitoria) {
            titulo.textContent = "Excelente Trabalho!";
            msg.textContent = `Encontraste todas as palavras!`;
        } else {
            titulo.textContent = "O tempo acabou!";
            msg.textContent = "Tenta ser mais rápido na próxima vez.";
        }
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    iniciarJogo();
</script>
</body>
</html>
