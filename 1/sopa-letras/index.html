<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧩 Sopa de Letras 🧩</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden; /* Evita que a página balance para os lados */
        }
        
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex; align-items: center; justify-content: space-between;
            height: 85px; flex-shrink: 0; z-index: 20;
        }

        .header-left { flex: 1; }
        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 3; }
        .cabecalho h1 { margin: 0; font-size: clamp(1.2rem, 4vw, 2rem); font-weight: 700; color: var(--azul-escuro); }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            transition: transform 0.3s ease; text-decoration: none; display: inline-block;
        }
        .btn-menu:hover { transform: scale(1.05); }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        .status-jogo { padding: 15px; text-align: center; }
        .contadores { 
            display: flex; justify-content: center; align-items: center; 
            gap: 10px; flex-wrap: wrap; 
        }
        
        .btn-nivel {
            padding: 8px 15px; border: 2.5px solid var(--azul-grad-dir); border-radius: 20px;
            background: white; color: var(--azul-escuro); font-weight: 700; cursor: pointer;
        }
        .btn-nivel.active { background: var(--azul-grad-dir); color: white; }

        #cronometro {
            background: white; padding: 5px 15px; border-radius: 15px;
            border: 2.5px solid var(--laranja); color: var(--azul-escuro); font-weight: 700;
        }

        main { flex: 1; padding: 10px; display: flex; justify-content: center; }

        .game-layout {
            display: flex; gap: 20px; align-items: flex-start; justify-content: center;
            max-width: 1200px; width: 100%;
        }

        /* GRELHA ADAPTÁVEL */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 1fr); 
            gap: 4px; background: white; padding: 10px; border-radius: 20px;
            border: 2px solid var(--azul-janela-borda);
            width: 100%; max-width: 500px; /* Impede que fique gigante no PC */
            touch-action: none; /* Crucial para o toque funcionar sem scroll do browser */
        }
        
        .letra { 
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: clamp(14px, 4vw, 22px); border-radius: 6px; 
            background: var(--azul-janela-fundo); color: var(--azul-escuro);
        }
        .letra.selecionando { background: #fff176 !important; } 
        .letra.correta { background: var(--verde) !important; color: white !important; }

        /* LISTA DE IMAGENS */
        #lista-imagens {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            width: 100%; max-width: 300px;
        }
        .cartao-img {
            background: white; border: 2px solid var(--azul-janela-borda);
            border-radius: 15px; padding: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .cartao-img img { width: 100%; height: auto; max-height: 80px; object-fit: contain; }
        .cartao-img span { font-size: 0.7rem; font-weight: 700; color: var(--azul-escuro); margin-top: 4px; }
        .cartao-img.encontrada { opacity: 0.3; filter: grayscale(1); border-color: var(--verde); }

        footer {
            padding: 15px; background: white; border-top: 1px solid #eee; 
            text-align: center; font-size: 0.8rem; font-weight: 700;
        }

        /* AJUSTES MOBILE */
        @media (max-width: 800px) {
            .game-layout { flex-direction: column; align-items: center; }
            #lista-imagens { max-width: 500px; grid-template-columns: repeat(4, 1fr); }
            .cabecalho { padding: 0 10px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-menu">🏠 MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/1F50E.svg" style="width:40px">
        <h1>Sopa de Letras</h1>
    </div>
    <div style="flex:1"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: var(--azul-grad-dir);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="contadores">
        <button class="btn-nivel active" onclick="setNivel(4, this)">FÁCIL</button>
        <button class="btn-nivel" onclick="setNivel(6, this)">MÉDIO</button>
        <button class="btn-nivel" onclick="setNivel(8, this)">DIFÍCIL</button>
        <div id="cronometro">⏱️ <span id="tempo">0</span>s</div>
    </div>
</div>

<main>
    <div class="game-layout">
        <div id="grid"></div>
        <div id="lista-imagens"></div>
    </div>
</main>

<footer>
    <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" style="color: var(--azul-escuro); text-decoration: none;">EB1/PE da Marinheira</a>
</footer>

<script src="js/dados.js"></script>
<script>
    let nivelAtual = 4, tempo = 0, timer, palavrasJogo = [];
    let isDragging = false, startPos = null, selectedCells = [];

    function setNivel(n, btn) {
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nivelAtual = n;
        init();
    }

    function init() {
        clearInterval(timer);
        tempo = 0; document.getElementById('tempo').innerText = tempo;
        const grid = document.getElementById('grid');
        const list = document.getElementById('lista-imagens');
        grid.innerHTML = ""; list.innerHTML = "";

        let pSel = [...palavras].sort(() => 0.5 - Math.random()).slice(0, nivelAtual);
        palavrasJogo = pSel.map(p => ({
            word: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            img: p.imagem,
            found: false,
            ids: []
        }));

        let matriz = Array(10).fill().map(() => Array(10).fill(''));
        palavrasJogo.forEach(p => {
            let placed = false;
            while(!placed) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let r = Math.floor(Math.random() * (dir === 'V' ? 10 - p.word.length : 10));
                let c = Math.floor(Math.random() * (dir === 'H' ? 10 - p.word.length : 10));
                let can = true;
                for(let i=0; i<p.word.length; i++) {
                    let rr = dir === 'V' ? r+i : r, cc = dir === 'H' ? c+i : c;
                    if(matriz[rr][cc] !== '' && matriz[rr][cc] !== p.word[i]) { can = false; break; }
                }
                if(can) {
                    for(let i=0; i<p.word.length; i++) {
                        let rr = dir === 'V' ? r+i : r, cc = dir === 'H' ? c+i : c;
                        matriz[rr][cc] = p.word[i];
                        p.ids.push(`${rr}-${cc}`);
                    }
                    placed = true;
                }
            }
        });

        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for(let r=0; r<10; r++) {
            for(let c=0; c<10; c++) {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `c-${r}-${c}`;
                div.dataset.r = r; div.dataset.c = c;
                div.textContent = matriz[r][c] || abc[Math.floor(Math.random()*26)];
                grid.appendChild(div);
            }
        }

        palavrasJogo.forEach(p => {
            list.innerHTML += `<div class="cartao-img" id="img-${p.word}"><img src="${p.img}"><span>${p.word}</span></div>`;
        });

        timer = setInterval(() => { tempo++; document.getElementById('tempo').innerText = tempo; }, 1000);
    }

    const getEl = (e) => {
        const t = e.touches ? e.touches[0] : e;
        return document.elementFromPoint(t.clientX, t.clientY);
    };

    const handleStart = (e) => {
        const el = getEl(e);
        if(el && el.classList.contains('letra')) {
            isDragging = true;
            startPos = {r: parseInt(el.dataset.r), c: parseInt(el.dataset.c)};
        }
    };

    const handleMove = (e) => {
        if(!isDragging) return;
        const el = getEl(e);
        if(el && el.classList.contains('letra')) {
            const rA = parseInt(el.dataset.r), cA = parseInt(el.dataset.c);
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            selectedCells = [];
            
            if(Math.abs(rA - startPos.r) > Math.abs(cA - startPos.c)) {
                const step = rA > startPos.r ? 1 : -1;
                for(let i=startPos.r; i !== rA+step; i+=step) mark(i, startPos.c);
            } else {
                const step = cA > startPos.c ? 1 : -1;
                for(let i=startPos.c; i !== cA+step; i+=step) mark(startPos.r, i);
            }
        }
        if(e.cancelable) e.preventDefault();
    };

    const mark = (r, c) => {
        const el = document.getElementById(`c-${r}-${c}`);
        if(el) { el.classList.add('selecionando'); selectedCells.push(`${r}-${c}`); }
    };

    const handleEnd = () => {
        if(!isDragging) return;
        isDragging = false;
        const sel = selectedCells.sort().join(',');
        palavrasJogo.forEach(p => {
            if(!p.found && p.ids.sort().join(',') === sel) {
                p.found = true;
                p.ids.forEach(id => document.getElementById(`c-${id}`).classList.add('correta'));
                document.getElementById(`img-${p.word}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if(palavrasJogo.every(p => p.found)) { clearInterval(timer); alert("Ganhaste em " + tempo + " segundos!"); }
    };

    const g = document.getElementById('grid');
    g.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    g.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = init;
</script>
</body>
</html>
