<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-onda: #bde6ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --laranja: #ff9800;
            --verde: #4caf50;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--azul-claro); display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HEADER COM ONDA REAL --- */
        header {
            background: var(--azul-onda);
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border-bottom: 5px solid var(--azul-medio);
            border-bottom-left-radius: 50% 20%;
            border-bottom-right-radius: 50% 20%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .btn-menu {
            position: absolute; left: 30px; top: 35px;
            background: var(--laranja); color: white; border: none; 
            padding: 12px 25px; border-radius: 30px;
            font-weight: bold; text-decoration: none; transition: all 0.3s ease;
            box-shadow: 0 4px 0 #d37e00;
        }
        /* HOVER NO MENU */
        .btn-menu:hover {
            background: #ffa726;
            transform: translateY(-3px);
            box-shadow: 0 6px 0 #d37e00;
        }

        header img { width: 80px; margin-right: 15px; }
        header h1 { color: var(--azul-escuro); font-size: 2.2rem; margin: 0; }

        /* --- SELETOR DE NÍVEL --- */
        .difficulty-bar {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;
        }
        .btn-nivel {
            padding: 10px 30px; border: 2px solid var(--azul-medio); border-radius: 25px;
            background: white; color: var(--azul-escuro); font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-nivel.active { background: var(--azul-escuro); color: white; border-color: var(--azul-escuro); }

        /* --- ÁREA DO JOGO (GRID + IMAGENS) --- */
        .game-wrapper {
            display: flex; justify-content: center; align-items: stretch;
            gap: 20px; max-width: 1100px; margin: 0 auto; padding: 20px;
        }

        /* GRELHA */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 48px); 
            grid-template-rows: repeat(10, 48px); gap: 4px; 
            background: white; padding: 15px; border-radius: 15px;
            border: 2px solid var(--azul-medio);
        }
        .letra { 
            width: 48px; height: 48px; border: 1px solid #e0e6ed; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 24px; border-radius: 8px; background: white;
            user-select: none; transition: background 0.2s;
        }
        .letra.selecionando { background: #fff59d !important; } 
        .letra.correta { background: var(--verde) !important; color: white !important; border-color: #388e3c; }

        /* LISTA DE IMAGENS - AJUSTE DINÂMICO */
        #lista-palavras {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            flex-grow: 1; min-width: 320px;
        }
        .card-palavra {
            background: white; border: 2px solid var(--azul-medio); border-radius: 15px;
            padding: 10px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center;
        }
        .card-palavra img { max-width: 80%; max-height: 70%; object-fit: contain; }
        .card-palavra span { font-size: 14px; font-weight: bold; color: var(--azul-escuro); margin-top: 8px; }
        .card-palavra.encontrada { opacity: 0.2; filter: grayscale(1); }

        /* CRONÓMETRO */
        #timer-display {
            font-size: 1.5rem; font-weight: bold; color: var(--azul-escuro);
            background: white; padding: 10px 30px; border-radius: 50px;
            border: 3px solid var(--laranja); margin-bottom: 20px;
        }

        footer { margin-top: auto; padding: 20px; background: white; border-top: 1px solid #ddd; text-align: center; }

        @media (max-width: 900px) {
            .game-wrapper { flex-direction: column; align-items: center; }
            #grid { grid-template-columns: repeat(10, 34px); grid-template-rows: repeat(10, 34px); }
            .letra { width: 34px; height: 34px; font-size: 16px; }
            #lista-palavras { grid-template-columns: repeat(4, 1fr); width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="btn-menu">🏠 MENU</a>
    <img src="sopa-letras.png" alt="">
    <h1>Sopa de Letras</h1>
</header>

<div style="text-align: center;">
    <div class="difficulty-bar">
        <button class="btn-nivel active" onclick="loadLevel(4, this)">FÁCIL</button>
        <button class="btn-nivel" onclick="loadLevel(6, this)">MÉDIO</button>
        <button class="btn-nivel" onclick="loadLevel(8, this)">DIFÍCIL</button>
    </div>
    <div id="timer-display">⏱️ <span id="tempo">0</span>s</div>
</div>

<div class="game-wrapper">
    <div id="grid"></div>
    <div id="lista-palavras"></div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        2026 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let nivel = 4, tempo = 0, timer, palavrasNivel = [];
    let drag = false, startCell = null, selectedIds = [];

    function loadLevel(qtd, btn) {
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nivel = qtd;
        initGame();
    }

    function initGame() {
        clearInterval(timer);
        tempo = 0; document.getElementById('tempo').innerText = tempo;
        document.getElementById('grid').innerHTML = "";
        document.getElementById('lista-palavras').innerHTML = "";

        const selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, nivel);
        palavrasNivel = selecao.map(p => ({
            txt: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            img: p.imagem,
            found: false,
            cells: []
        }));

        let matriz = Array(10).fill().map(() => Array(10).fill(''));

        palavrasNivel.forEach(p => {
            let placed = false;
            while(!placed) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let r = Math.floor(Math.random() * (dir==='V' ? 10-p.txt.length : 10));
                let c = Math.floor(Math.random() * (dir==='H' ? 10-p.txt.length : 10));
                
                let ok = true;
                for(let i=0; i<p.txt.length; i++) {
                    let curR = dir==='V' ? r+i : r, curC = dir==='H' ? c+i : c;
                    if(matriz[curR][curC] !== '' && matriz[curR][curC] !== p.txt[i]) { ok = false; break; }
                }

                if(ok) {
                    for(let i=0; i<p.txt.length; i++) {
                        let curR = dir==='V' ? r+i : r, curC = dir==='H' ? c+i : c;
                        matriz[curR][curC] = p.txt[i];
                        p.cells.push(`${curR}-${curC}`);
                    }
                    placed = true;
                }
            }
        });

        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for(let r=0; r<10; r++){
            for(let c=0; c<10; c++){
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${r}-${c}`;
                div.dataset.r = r; div.dataset.c = c;
                div.textContent = matriz[r][c] || abc[Math.floor(Math.random()*26)];
                document.getElementById('grid').appendChild(div);
            }
        }

        palavrasNivel.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card-palavra';
            card.id = `card-${p.txt}`;
            card.innerHTML = `<img src="${p.img}"><span>${p.txt}</span>`;
            document.getElementById('lista-palavras').appendChild(card);
        });

        timer = setInterval(() => { tempo++; document.getElementById('tempo').innerText = tempo; }, 1000);
    }

    // LÓGICA DE SELEÇÃO
    const grid = document.getElementById('grid');
    const getTarget = (e) => {
        const t = e.touches ? e.touches[0] : e;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        return el && el.classList.contains('letra') ? el : null;
    };

    const onStart = (e) => {
        const el = getTarget(e);
        if(el) { drag = true; startCell = {r: parseInt(el.dataset.r), c: parseInt(el.dataset.c)}; }
    };

    const onMove = (e) => {
        if(!drag) return;
        const el = getTarget(e);
        if(el) {
            const rA = parseInt(el.dataset.r), cA = parseInt(el.dataset.c);
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            selectedIds = [];
            if(Math.abs(rA - startCell.r) > Math.abs(cA - startCell.c)) {
                const step = rA > startCell.r ? 1 : -1;
                for(let i=startCell.r; i !== rA+step; i+=step) addSel(i, startCell.c);
            } else {
                const step = cA > startCell.c ? 1 : -1;
                for(let i=startCell.c; i !== cA+step; i+=step) addSel(startCell.r, i);
            }
        }
        e.preventDefault();
    };

    const addSel = (r, c) => {
        const el = document.getElementById(`cell-${r}-${c}`);
        if(el) { el.classList.add('selecionando'); selectedIds.push(`${r}-${c}`); }
    };

    const onEnd = () => {
        if(!drag) return;
        drag = false;
        const current = selectedIds.sort().join(',');
        palavrasNivel.forEach(p => {
            if(!p.found && p.cells.sort().join(',') === current) {
                p.found = true;
                p.cells.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                document.getElementById(`card-${p.txt}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if(palavrasNivel.every(p => p.found)) { clearInterval(timer); alert("Parabéns!"); }
    };

    grid.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    grid.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    window.onload = initGame;
</script>
</body>
</html>
