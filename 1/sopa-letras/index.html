<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras Divertida</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --amarelo: #ffeb3b;
        }

        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--azul-claro); margin: 0; padding-bottom: 30px; }
        
        .cabecalho { background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); padding: 15px; color: var(--azul-escuro); border-bottom: 3px solid #fff; }
        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .icone-titulo { width: 50px; height: auto; }

        #cronometro { font-size: 18px; font-weight: bold; background: white; display: inline-block; padding: 5px 20px; border-radius: 20px; margin-top: 10px; border: 2px solid var(--azul-medio); color: var(--azul-escuro); }

        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; align-items: flex-start; }

        /* GRELHA MAIS COMPACTA */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 42px); 
            gap: 4px; 
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }

        .letra { 
            width: 42px; height: 42px; 
            border: 1px solid #e3efff; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 20px; cursor: pointer;
            border-radius: 8px; background: #fff;
            user-select: none; transition: background 0.2s;
        }

        .letra.selecionada { background: var(--amarelo); border-color: #ffd600; }
        .letra.correta { background: var(--verde) !important; color: white; border-color: #388e3c; }

        /* LISTA DE 8 PALAVRAS (2 colunas de 4) */
        #lista-palavras { 
            display: grid; 
            grid-template-columns: repeat(2, 160px); 
            gap: 10px; 
        }

        .item-palavra { 
            background: white; padding: 8px; border-radius: 12px; 
            border: 2px solid var(--azul-medio); 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 13px;
        }

        .item-palavra img { width: 55px; height: 55px; object-fit: contain; }
        .item-palavra span { font-weight: bold; margin-top: 4px; color: var(--azul-escuro); }
        .item-palavra.encontrada { opacity: 0.3; background: #e8f5e9; border-color: var(--verde); }
        .item-palavra.encontrada span { text-decoration: line-through; }

        /* FEEDBACK FINAL */
        #feedback-final {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center; align-items: center; z-index: 100;
        }
        .painel-vitoria { background: white; padding: 30px; border-radius: 25px; text-align: center; max-width: 350px; }
        .btn-reiniciar { background: var(--azul-medio); color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 50px; cursor: pointer; margin-top: 15px; font-weight: bold; }

    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="confuso.png" class="icone-titulo">
        <h1 style="margin:0; font-size: 24px;">Sopa de Letras</h1>
    </div>
    <div id="cronometro">Tempo: 0s</div>
</header>

<div class="container">
    <div id="grid"></div>
    <div id="lista-palavras"></div>
</div>

<div id="feedback-final">
    <div class="painel-vitoria">
        <img src="img/certo.png" style="width: 60px;">
        <h2>Incrível!</h2>
        <p id="msg-tempo"></p>
        <button class="btn-reiniciar" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempo = 0;
    let intervaloCronometro;
    const gridElement = document.getElementById('grid');
    const listaElement = document.getElementById('lista-palavras');
    
    // Seleciona 8 palavras
    let selecaoOriginal = palavras.sort(() => 0.5 - Math.random()).slice(0, 8);
    let palavrasParaEncontrar = selecaoOriginal.map(p => ({
        nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
        imagem: p.imagem,
        encontrada: false,
        celulas: []
    }));

    let matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));

    function iniciarJogo() {
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false;
            let tentativas = 0;
            while (!colocada && tentativas < 100) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                
                if (verificarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l;
                        let curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
        });
        desenharInterface();
        iniciarCronometro();
    }

    function verificarEspaco(palavra, l, c, dir) {
        for (let i = 0; i < palavra.length; i++) {
            let curL = dir === 'V' ? l + i : l;
            let curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== palavra[i]) return false;
        }
        return true;
    }

    function desenharInterface() {
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let l = 0; l < TAMANHO; l++) {
            for (let c = 0; c < TAMANHO; c++) {
                const div = document.createElement('div');
                div.className = 'letra';
                div.textContent = matriz[l][c] || alfabeto[Math.floor(Math.random() * alfabeto.length)];
                div.id = `cell-${l}-${c}`;
                div.onclick = () => clicarLetra(l, c, div);
                gridElement.appendChild(div);
            }
        }
        palavrasParaEncontrar.forEach(p => {
            const item = document.createElement('div');
            item.className = 'item-palavra';
            item.id = `item-${p.nome}`;
            item.innerHTML = `<img src="${p.imagem}"><span>${p.nome}</span>`;
            listaElement.appendChild(item);
        });
    }

    let selecionadasAtuais = [];
    function clicarLetra(l, c, el) {
        const id = `${l}-${c}`;
        if (el.classList.contains('correta')) return;
        
        el.classList.toggle('selecionada');
        if (el.classList.contains('selecionada')) {
            selecionadasAtuais.push(id);
        } else {
            selecionadasAtuais = selecionadasAtuais.filter(item => item !== id);
        }
        verificarPalavras();
    }

    function verificarPalavras() {
        palavrasParaEncontrar.forEach(p => {
            if (!p.encontrada) {
                const encontrouTodas = p.celulas.every(celula => selecionadasAtuais.includes(celula));
                if (encontrouTodas) {
                    p.encontrada = true;
                    p.celulas.forEach(id => {
                        const el = document.getElementById(`cell-${id}`);
                        el.classList.remove('selecionada');
                        el.classList.add('correta');
                        selecionadasAtuais = selecionadasAtuais.filter(s => s !== id);
                    });
                    document.getElementById(`item-${p.nome}`).classList.add('encontrada');
                }
            }
        });
        if (palavrasParaEncontrar.every(p => p.encontrada)) finalizarJogo();
    }

    function iniciarCronometro() {
        intervaloCronometro = setInterval(() => {
            tempo++;
            document.getElementById('cronometro').textContent = `Tempo: ${tempo}s`;
        }, 1000);
    }

    function finalizarJogo() {
        clearInterval(intervaloCronometro);
        setTimeout(() => {
            document.getElementById('feedback-final').style.display = 'flex';
            document.getElementById('msg-tempo').textContent = `Terminaste em ${tempo} segundos!`;
        }, 500);
    }

    iniciarJogo();
</script>
</body>
</html>
