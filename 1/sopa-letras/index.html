<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        :root {
            --azul-claro: #f2f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #155a8a;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            margin: 0; font-family: Arial, sans-serif; background: var(--azul-claro); 
            display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden;
        }

        /* --- HEADER COM ONDA E GRADIENTE --- */
        header {
            width: 100%; padding: 20px 0 40px;
            background: linear-gradient(180deg, #bde6ff 0%, #e8f7ff 100%);
            border-bottom: 5px solid var(--azul-medio);
            display: flex; justify-content: center; align-items: center;
            position: relative; clip-path: ellipse(120% 100% at 50% 0%);
        }

        .btn-menu {
            position: absolute; left: 20px; top: 20px;
            background: var(--laranja); color: white; border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: bold; text-decoration: none;
            animation: pulse-orange 2s infinite; display: flex; align-items: center; gap: 8px;
        }

        header img { width: 90px; margin-right: 15px; }
        .titulo-jogo { font-size: 2.2rem; font-weight: bold; color: var(--azul-escuro); margin: 0; text-shadow: 1px 1px 2px white; }

        /* --- SELETOR DE DIFICULDADE --- */
        .difficulty-nav {
            display: flex; justify-content: center; gap: 10px; margin: 20px 0;
        }
        .btn-diff {
            padding: 10px 25px; border: 2px solid var(--azul-medio); border-radius: 20px;
            background: white; color: var(--azul-escuro); font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-diff.active { background: var(--azul-medio); color: white; transform: scale(1.1); }

        /* --- CRONÓMETRO --- */
        #cronometro-box {
            background: white; padding: 12px 30px; border-radius: 50px;
            border: 3px solid var(--laranja); font-size: 1.3rem; font-weight: bold;
            color: var(--azul-escuro); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px; align-self: center;
        }

        /* --- ÁREA DE JOGO --- */
        .container {
            display: flex; flex-direction: column; align-items: center;
            max-width: 1100px; margin: 0 auto; padding: 20px; flex-grow: 1;
        }

        .game-layout {
            display: flex; flex-direction: row; gap: 40px; align-items: center;
            justify-content: center; flex-wrap: wrap;
        }

        /* --- GRELHA --- */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 46px); 
            grid-template-rows: repeat(10, 46px); gap: 6px; 
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); touch-action: none;
        }
        .letra { 
            width: 46px; height: 46px; border: 1px solid #f0f0f0; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; border-radius: 10px; background: #fff;
        }
        .letra.selecionando { background: #fff9c4 !important; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde) !important; color: white !important; }

        /* --- LISTA DE PALAVRAS --- */
        .words-sidebar {
            display: grid; grid-template-columns: repeat(2, 120px); gap: 15px;
        }
        .item-palavra {
            background: white; padding: 10px; border-radius: 15px;
            border: 3px solid var(--azul-medio); display: flex; flex-direction: column;
            align-items: center; transition: 0.4s; animation: slideIn 0.5s ease;
        }
        .item-palavra img { width: 60px; height: 60px; object-fit: contain; }
        .item-palavra span { font-size: 12px; font-weight: bold; margin-top: 5px; color: var(--azul-escuro); }
        .item-palavra.encontrada { opacity: 0.2; background: #e6ffe6; border-color: var(--verde); transform: scale(0.9); }

        /* --- FOOTER --- */
        footer { padding: 25px; text-align: center; background: #fff; border-top: 1px solid #ddd; margin-top: auto; }

        #final-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100;
        }
        .painel-vitoria { background: white; padding: 40px; border-radius: 30px; text-align: center; }

        /* RESPONSIVIDADE PARA TELEMÓVEL */
        @media (max-width: 900px) {
            .game-layout { flex-direction: column; }
            .words-sidebar { grid-template-columns: repeat(4, 1fr); width: 100%; }
            #grid { grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); }
            .letra { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="btn-menu">🏠 MENU</a>
    <img src="sopa-letras.png">
    <h1 class="titulo-jogo">Sopa de Letras</h1>
</header>

<div class="container">
    <div class="difficulty-nav">
        <button class="btn-diff active" onclick="setDiff(4, this)">FÁCIL</button>
        <button class="btn-diff" onclick="setDiff(6, this)">MÉDIO</button>
        <button class="btn-diff" onclick="setDiff(8, this)">DIFÍCIL</button>
    </div>

    <div id="cronometro-box">⏱️ <span id="tempo">0</span>s</div>

    <div class="game-layout">
        <div id="grid" oncontextmenu="return false;"></div>
        <div id="words-container" class="words-sidebar"></div>
    </div>
</div>

<div id="final-screen">
    <div class="painel-vitoria">
        <h1 style="font-size: 3rem;">🏆</h1>
        <h2>Parabéns!</h2>
        <p id="msg-tempo"></p>
        <button onclick="location.reload()" class="btn-diff" style="background:var(--verde); color:white;">Jogar Novamente</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempo = 0, intervalo, nivel = 4;
    let matriz, palavrasParaEncontrar = [];
    let estaArrastando = false, celulaInicial = null, selecionadasAtuais = [];

    function setDiff(qtd, btn) {
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nivel = qtd;
        init();
    }

    function init() {
        clearInterval(intervalo);
        tempo = 0;
        document.getElementById('tempo').innerText = tempo;
        document.getElementById('grid').innerHTML = "";
        document.getElementById('words-container').innerHTML = "";
        
        // Seleção aleatória das palavras do teu ficheiro dados.js
        let selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, nivel);
        palavrasParaEncontrar = selecao.map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem,
            encontrada: false,
            celulas: []
        }));

        matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
        
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false, tentativas = 0;
            while (!colocada && tentativas < 300) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                if (checkSpace(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
        });

        draw();
        intervalo = setInterval(() => { tempo++; document.getElementById('tempo').innerText = tempo; }, 1000);
    }

    function checkSpace(pal, l, c, dir) {
        for (let i = 0; i < pal.length; i++) {
            let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== pal[i]) return false;
        }
        return true;
    }

    function draw() {
        const grid = document.getElementById('grid');
        const sidebar = document.getElementById('words-container');
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        matriz.forEach((linha, l) => {
            linha.forEach((letra, c) => {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; div.dataset.c = c;
                div.textContent = letra || alfabeto[Math.floor(Math.random() * 26)];
                grid.appendChild(div);
            });
        });

        palavrasParaEncontrar.forEach(p => {
            sidebar.innerHTML += `<div class="item-palavra" id="item-${p.nome}"><img src="${p.imagem}"><span>${p.nome}</span></div>`;
        });
    }

    // INTERAÇÃO
    const gridEl = document.getElementById('grid');
    const getEl = (e) => {
        const t = e.touches ? e.touches[0] : e;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        return (el && el.classList.contains('letra')) ? el : null;
    };

    const start = (e) => {
        const el = getEl(e);
        if (el) { estaArrastando = true; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)}; }
    };

    const move = (e) => {
        if (!estaArrastando) return;
        const el = getEl(e);
        if (el) {
            const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            selecionadasAtuais = [];
            if (Math.abs(lA - celulaInicial.l) > Math.abs(cA - celulaInicial.c)) {
                const passo = lA > celulaInicial.l ? 1 : -1;
                for (let i = celulaInicial.l; i !== lA + passo; i += passo) highlight(i, celulaInicial.c);
            } else {
                const passo = cA > celulaInicial.c ? 1 : -1;
                for (let i = celulaInicial.c; i !== cA + passo; i += passo) highlight(celulaInicial.l, i);
            }
        }
        if(e.cancelable) e.preventDefault();
    };

    const highlight = (l, c) => {
        const el = document.getElementById(`cell-${l}-${c}`);
        if (el) { el.classList.add('selecionando'); selecionadasAtuais.push(`${l}-${c}`); }
    };

    const end = () => {
        if (!estaArrastando) return;
        estaArrastando = false;
        const sel = selecionadasAtuais.sort().join(',');
        palavrasParaEncontrar.forEach(p => {
            if (!p.encontrada && p.celulas.sort().join(',') === sel) {
                p.encontrada = true;
                p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                document.getElementById(`item-${p.nome}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if (palavrasParaEncontrar.every(p => p.encontrada)) {
            clearInterval(intervalo);
            document.getElementById('final-screen').style.display = 'flex';
            document.getElementById('msg-tempo').innerText = `Terminaste em ${tempo} segundos!`;
        }
    };

    gridEl.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    gridEl.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend', end);

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = init;
</script>
</body>
</html>
