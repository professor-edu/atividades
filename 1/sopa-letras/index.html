<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f7ff; margin: 0; }
        
        .cabecalho { background: #7ac7f0; padding: 20px; color: white; border-bottom: 3px solid #fff; }
        
        /* GRELHA DA SOPA */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 40px); /* 10 colunas */
            gap: 5px; 
            justify-content: center; 
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: fit-content;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .letra { 
            width: 40px; height: 40px; 
            border: 1px solid #ddd; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 20px; cursor: pointer;
            border-radius: 5px; background: #fff;
            user-select: none;
        }

        .letra.selecionada { background: #ffeb3b; }
        .letra.encontrada { background: #4caf50; color: white; border-color: #388e3c; }

        /* LISTA DE PALAVRAS A ENCONTRAR */
        #lista-palavras {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 15px; margin-top: 20px; padding: 0 20px;
        }

        .palavra-item { 
            padding: 8px 15px; background: #fff; border: 2px solid #7ac7f0;
            border-radius: 20px; font-weight: bold; color: #0d47a1;
        }

        .palavra-item.riscada { text-decoration: line-through; opacity: 0.5; background: #e0e0e0; }
    </style>
</head>
<body>

<header class="cabecalho">
    <h1>Sopa de Letras</h1>
    <p>Encontra as palavras escondidas!</p>
</header>

<div id="grid"></div>

<div id="lista-palavras"></div>

<script src="js/dados.js"></script>
<script>
    const tamanho = 10;
    const gridElement = document.getElementById('grid');
    const listaElement = document.getElementById('lista-palavras');
    
    // Escolher 5 palavras aleatórias do teu dados.js
    let palavrasSelecionadas = palavras
        .sort(() => 0.5 - Math.random())
        .slice(0, 5)
        .map(p => p.palavra.toUpperCase().replace(/\s/g, ''));

    let matriz = Array(tamanho).fill().map(() => Array(tamanho).fill(''));

    function gerarSopa() {
        // 1. Colocar as palavras na matriz (Horizontal ou Vertical)
        palavrasSelecionadas.forEach(palavra => {
            let colocada = false;
            while (!colocada) {
                let direcao = Math.random() > 0.5 ? 'H' : 'V';
                let linha = Math.floor(Math.random() * tamanho);
                let col = Math.floor(Math.random() * tamanho);

                if (podeColocar(palavra, linha, col, direcao)) {
                    for (let i = 0; i < palavra.length; i++) {
                        if (direcao === 'H') matriz[linha][col + i] = palavra[i];
                        else matriz[linha + i][col] = palavra[i];
                    }
                    colocada = true;
                }
            }
        });

        // 2. Preencher espaços vazios com letras aleatórias
        const letrasPossiveis = "ABCDEfGHIJKLMNOPQRSTUVWXYZ";
        for (let l = 0; l < tamanho; l++) {
            for (let c = 0; c < tamanho; c++) {
                if (matriz[l][c] === '') {
                    matriz[l][c] = letrasPossiveis.charAt(Math.floor(Math.random() * letrasPossiveis.length));
                }
                
                // Criar o elemento visual
                const div = document.createElement('div');
                div.className = 'letra';
                div.textContent = matriz[l][c];
                div.dataset.l = l;
                div.dataset.c = c;
                div.onclick = () => selecionarLetra(div);
                gridElement.appendChild(div);
            }
        }

        // 3. Mostrar lista de palavras
        palavrasSelecionadas.forEach(p => {
            const span = document.createElement('div');
            span.className = 'palavra-item';
            span.id = 'word-' + p;
            span.textContent = p;
            listaElement.appendChild(span);
        });
    }

    function podeColocar(palavra, l, c, dir) {
        if (dir === 'H' && c + palavra.length > tamanho) return false;
        if (dir === 'V' && l + palavra.length > tamanho) return false;
        for (let i = 0; i < palavra.length; i++) {
            let letraAtual = dir === 'H' ? matriz[l][c + i] : matriz[l + i][c];
            if (letraAtual !== '' && letraAtual !== palavra[i]) return false;
        }
        return true;
    }

    let selecao = [];
    function selecionarLetra(el) {
        el.classList.toggle('selecionada');
        // Aqui precisarias de uma lógica para verificar se as letras selecionadas 
        // formam uma das palavras da lista.
    }

    gerarSopa();
</script>
</body>
</html>
