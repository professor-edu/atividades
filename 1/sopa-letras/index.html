<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧩 Sopa de Letras 🧩</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }
        
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; height: 85px; display: flex; align-items: center; justify-content: space-between;
        }

        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 3; }
        .cabecalho h1 { font-size: 2rem; color: var(--azul-escuro); margin: 0; }

        .btn-menu {
            background: var(--laranja); color: white; border: none; padding: 10px 18px; 
            border-radius: 25px; font-weight: 700; cursor: pointer; text-decoration: none;
        }

        .onda-container { height: 45px; width: 100%; margin-top: -1px; }

        #countdown-container {
            display: inline-block; background: white; padding: 5px 25px;
            border-radius: 20px; border: 3px solid var(--laranja);
            margin: 10px 0; font-weight: 700; font-size: 1.4rem; color: var(--azul-escuro);
        }

        .container { 
            display: flex; justify-content: center; align-items: flex-start; 
            gap: 25px; padding: 20px; flex: 1;
        }

        #grid { 
            display: grid; grid-template-columns: repeat(10, 45px); grid-template-rows: repeat(10, 45px); 
            gap: 5px; background: white; padding: 15px; border-radius: 20px;
            border: 2px solid var(--azul-janela-borda); touch-action: none;
        }

        .letra { 
            width: 45px; height: 45px; border: 1px solid #e3efff; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; border-radius: 10px; background: #fff;
        }
        
        /* A cor correta agora permite a seleção por cima */
        .letra.selecionando { background: #fff9c4 !important; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde); color: white; border-color: #388e3c; }

        #lista-palavras { display: grid; grid-template-columns: repeat(2, 160px); gap: 10px; }
        .item-palavra { 
            background: white; padding: 8px; border-radius: 15px; 
            border: 2px solid var(--azul-janela-borda); display: flex; flex-direction: column; align-items: center; 
        }
        .item-palavra img { width: 60px; height: 60px; object-fit: contain; }
        .item-palavra span { font-weight: bold; font-size: 11px; margin-top: 5px; color: var(--azul-escuro); text-transform: uppercase; }
        .item-palavra.encontrada { opacity: 0.3; background: #e8f5e9; border-color: var(--verde); }

        #feedback-final { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; 
        }
        .painel-vitoria { background: white; padding: 40px; border-radius: 30px; text-align: center; }
        #emoji-feedback { font-size: 80px; display: block; margin-bottom: 10px; }

        footer { padding: 15px; background: white; border-top: 1px solid #eee; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div style="flex:1"><a href="../index.html" class="btn-menu">🏠 MENU</a></div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:55px">
        <h1>Sopa de Letras</h1>
    </div>
    <div style="flex:1"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="fill: var(--azul-grad-dir);"></path>
    </svg>
</div>

<div id="countdown-container">⏱️ <span id="timer-display">03:00</span></div>

<div class="container">
    <div id="grid"></div> 
    <div id="lista-palavras"></div>
</div>

<div id="feedback-final">
    <div class="painel-vitoria">
        <span id="emoji-feedback"></span>
        <h2 id="titulo-final"></h2>
        <p id="msg-tempo"></p>
        <button class="btn-menu" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" style="color: var(--azul-escuro); text-decoration: none;">EB1/PE da Marinheira</a>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    const TEMPO_INICIAL = 180;
    let tempoRestante = TEMPO_INICIAL;
    let intervaloCronometro;
    let estaArrastando = false;
    let celulaInicial = null;
    let celulasSelecionadasAtuais = [];

    let selecaoOriginal = palavras.sort(() => 0.5 - Math.random()).slice(0, 8);
    let palavrasParaEncontrar = selecaoOriginal.map(p => ({
        nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
        imagem: p.imagem,
        encontrada: false,
        celulas: []
    }));

    let matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));

    function iniciarJogo() {
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false;
            while (!colocada) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                
                let podeColocar = true;
                for (let i = 0; i < pObj.nome.length; i++) {
                    let curL = dir === 'V' ? l + i : l;
                    let curC = dir === 'H' ? c + i : c;
                    if (matriz[curL][curC] !== '' && matriz[curL][curC] !== pObj.nome[i]) { podeColocar = false; break; }
                }

                if (podeColocar) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l;
                        let curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
            }
        });

        const grid = document.getElementById('grid');
        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let l = 0; l < TAMANHO; l++) {
            for (let c = 0; c < TAMANHO; c++) {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; div.dataset.c = c;
                div.textContent = matriz[l][c] || abc[Math.floor(Math.random() * 26)];
                grid.appendChild(div);
            }
        }

        palavrasParaEncontrar.forEach(p => {
            document.getElementById('lista-palavras').innerHTML += `
                <div class="item-palavra" id="item-${p.nome}">
                    <img src="${p.imagem}"><span>${p.nome}</span>
                </div>`;
        });

        configurarEventos();
        intervaloCronometro = setInterval(atualizarTimer, 1000);
    }

    function configurarEventos() {
        const grid = document.getElementById('grid');
        const start = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.classList.contains('letra')) {
                estaArrastando = true;
                celulaInicial = { l: parseInt(el.dataset.l), c: parseInt(el.dataset.c) };
            }
        };
        const move = (e) => {
            if (!estaArrastando) return;
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el && el.dataset.l) {
                const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
                document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
                celulasSelecionadasAtuais = [];
                
                if (Math.abs(lA - celulaInicial.l) > Math.abs(cA - celulaInicial.c)) {
                    const step = lA > celulaInicial.l ? 1 : -1;
                    for (let i = celulaInicial.l; i !== lA + step; i += step) marcar(i, celulaInicial.c);
                } else {
                    const step = cA > celulaInicial.c ? 1 : -1;
                    for (let i = celulaInicial.c; i !== cA + step; i += step) marcar(celulaInicial.l, i);
                }
            }
            if (e.cancelable) e.preventDefault();
        };
        const end = () => {
            if (!estaArrastando) return;
            estaArrastando = false;
            const sel = celulasSelecionadasAtuais.sort().join(',');
            palavrasParaEncontrar.forEach(p => {
                if (!p.encontrada && p.celulas.sort().join(',') === sel) {
                    p.encontrada = true;
                    p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                    document.getElementById(`item-${p.nome}`).classList.add('encontrada');
                }
            });
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            if (palavrasParaEncontrar.every(p => p.encontrada)) finalizarJogo(true);
        };

        grid.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        grid.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', end);
    }

    function marcar(l, c) {
        const el = document.getElementById(`cell-${l}-${c}`);
        if (el) { el.classList.add('selecionando'); celulasSelecionadasAtuais.push(`${l}-${c}`); }
    }

    function atualizarTimer() {
        tempoRestante--;
        const mins = Math.floor(tempoRestante / 60);
        const segs = tempoRestante % 60;
        document.getElementById('timer-display').textContent = `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
        if (tempoRestante <= 0) finalizarJogo(false);
    }

    function finalizarJogo(vitoria) {
        clearInterval(intervaloCronometro);
        const feedback = document.getElementById('feedback-final');
        const emoji = document.getElementById('emoji-feedback');
        const msg = document.getElementById('msg-tempo');
        
        feedback.style.display = 'flex';
        if (vitoria) {
            const gasto = TEMPO_INICIAL - tempoRestante;
            const m = Math.floor(gasto / 60);
            const s = gasto % 60;
            const tempoTexto = m > 0 ? `${m} minuto(s) e ${s} segundo(s)` : `${s} segundos`;
            
            emoji.textContent = "🥳";
            document.getElementById('titulo-final').textContent = "Excelente Trabalho!";
            msg.innerHTML = `Conseguiste encontrar todas as palavras em <strong>${tempoTexto}</strong>!`;
        } else {
            emoji.textContent = "😢";
            document.getElementById('titulo-final').textContent = "O tempo acabou!";
            msg.textContent = "Não desistas, tenta outra vez!";
        }
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    iniciarJogo();
</script>
</body>
</html>
