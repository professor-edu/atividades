<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        :root {
            --azul-claro: #f2f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #155a8a;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            margin: 0; font-family: Arial, sans-serif; background: var(--azul-claro); 
            color: #333; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- Header Template Oficial --- */
        header {
            width: 100%; padding: 15px 0;
            background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
            border-bottom: 4px solid var(--azul-medio);
            display: flex; justify-content: center; align-items: center;
            gap: 15px; position: relative;
        }

        .nav-buttons { position: absolute; left: 15px; display: flex; gap: 10px; }
        .btn-nav {
            background: var(--laranja); color: white; border: none; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; text-decoration: none; font-size: 0.8rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1); cursor: pointer;
        }

        header img { width: 80px; }
        .titulo-jogo { font-size: 1.8rem; font-weight: bold; color: var(--azul-escuro); margin: 0; }

        /* --- Seletor de Dificuldade --- */
        .difficulty-selector {
            display: flex; justify-content: center; gap: 10px; margin: 20px 0;
        }
        .btn-diff {
            padding: 10px 20px; border: none; border-radius: 20px; font-weight: bold;
            cursor: pointer; background: white; color: var(--azul-escuro);
            border: 2px solid var(--azul-medio); transition: 0.2s;
        }
        .btn-diff.active { background: var(--azul-medio); color: white; }

        /* --- Cronômetro Sobressalente --- */
        #cronometro-box {
            background: white; padding: 10px 25px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: inline-block;
            margin-bottom: 20px; border: 3px solid var(--laranja);
            font-size: 1.2rem; font-weight: bold; color: var(--azul-escuro);
        }

        /* --- Container Principal --- */
        .container {
            max-width: 900px; margin: 0 auto; padding: 10px; flex-grow: 1;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Lista de Palavras (Superior e Inferior) --- */
        #lista-palavras {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin: 15px 0; width: 100%;
        }
        .item-palavra {
            background: white; padding: 8px; border-radius: 12px;
            border: 2px solid var(--azul-medio); display: flex; flex-direction: column;
            align-items: center; transition: 0.3s; flex: 1 1 80px; max-width: 100px;
        }
        .item-palavra img { width: 100%; height: auto; max-height: 60px; object-fit: contain; }
        .item-palavra span { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        .item-palavra.encontrada { opacity: 0.2; background: #e6ffe6; border-color: var(--verde); }

        /* --- Grelha --- */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 45px); 
            grid-template-rows: repeat(10, 45px); gap: 5px; 
            background: white; padding: 15px; border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05); touch-action: none;
        }
        .letra { 
            width: 45px; height: 45px; border: 1px solid #eee; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; border-radius: 8px; background: #fff;
        }
        .letra.selecionando { background: #fff9c4 !important; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde) !important; color: white !important; }

        /* --- Footer --- */
        footer { padding: 20px; text-align: center; border-top: 1px solid #ddd; background: #fff; margin-top: 20px; }

        #final-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;
        }
        .painel-vitoria { background: white; padding: 40px; border-radius: 30px; text-align: center; }

        @media (max-width: 600px) {
            .nav-buttons { position: static; width: 100%; justify-content: center; order: -1; margin-bottom: 10px; }
            header { flex-direction: column; }
            #grid { grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); }
            .letra { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-buttons">
        <a href="../index.html" class="btn-nav">🏠 MENU</a>
        <a href="index.html" class="btn-nav">🧩 JOGOS</a>
    </div>
    <img src="sopa-letras.png" alt="Sopa de Letras">
    <h1 class="titulo-jogo">Sopa de Letras</h1>
</header>

<div class="container">
    <div class="difficulty-selector">
        <button class="btn-diff active" onclick="ajustarDificuldade(4, this)">FÁCIL</button>
        <button class="btn-diff" onclick="ajustarDificuldade(6, this)">MÉDIO</button>
        <button class="btn-diff" onclick="ajustarDificuldade(8, this)">DIFÍCIL</button>
    </div>

    <div id="cronometro-box">Tempo: <span id="tempo">0</span>s</div>

    <div id="lista-palavras"></div>

    <div id="grid" oncontextmenu="return false;"></div>
</div>

<div id="final-screen">
    <div class="painel-vitoria">
        <h1>🎉 Parabéns!</h1>
        <p id="msg-tempo"></p>
        <button onclick="location.reload()" class="btn-nav" style="padding: 15px 30px;">Jogar Novamente</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempo = 0, intervalo, nivelAtual = 4;
    let matriz, palavrasParaEncontrar = [];
    let estaArrastando = false, celulaInicial = null, selecionadasAtuais = [];

    function ajustarDificuldade(qtd, btn) {
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nivelAtual = qtd;
        iniciarJogo();
    }

    function iniciarJogo() {
        clearInterval(intervalo);
        tempo = 0;
        document.getElementById('tempo').innerText = tempo;
        document.getElementById('grid').innerHTML = "";
        document.getElementById('lista-palavras').innerHTML = "";
        
        let selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, nivelAtual);
        palavrasParaEncontrar = selecao.map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem,
            encontrada: false,
            celulas: []
        }));

        matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
        
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false, tentativas = 0;
            while (!colocada && tentativas < 200) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                if (verificarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l;
                        let curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
        });

        desenharInterface();
        intervalo = setInterval(() => { tempo++; document.getElementById('tempo').innerText = tempo; }, 1000);
    }

    function verificarEspaco(pal, l, c, dir) {
        for (let i = 0; i < pal.length; i++) {
            let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== pal[i]) return false;
        }
        return true;
    }

    function desenharInterface() {
        const grid = document.getElementById('grid');
        const list = document.getElementById('lista-palavras');
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        matriz.forEach((linha, l) => {
            linha.forEach((letra, c) => {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; div.dataset.c = c;
                div.textContent = letra || alfabeto[Math.floor(Math.random() * 26)];
                grid.appendChild(div);
            });
        });

        palavrasParaEncontrar.forEach(p => {
            list.innerHTML += `<div class="item-palavra" id="item-${p.nome}"><img src="${p.imagem}"><span>${p.nome}</span></div>`;
        });
    }

    function obterCelula(e) {
        const t = e.touches ? e.touches[0] : e;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (el && el.classList.contains('letra')) return el;
        return null;
    }

    const grid = document.getElementById('grid');
    grid.addEventListener('mousedown', (e) => { 
        const el = obterCelula(e);
        if (el) { estaArrastando = true; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)}; }
    });
    grid.addEventListener('touchstart', (e) => { 
        const el = obterCelula(e);
        if (el) { estaArrastando = true; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)}; e.preventDefault(); }
    }, {passive:false});

    window.addEventListener('mousemove', (e) => {
        if (!estaArrastando) return;
        const el = obterCelula(e);
        if (el) {
            const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            selecionadasAtuais = [];
            if (Math.abs(lA - celulaInicial.l) > Math.abs(cA - celulaInicial.c)) {
                const passo = lA > celulaInicial.l ? 1 : -1;
                for (let i = celulaInicial.l; i !== lA + passo; i += passo) selecionar(i, celulaInicial.c);
            } else {
                const passo = cA > celulaInicial.c ? 1 : -1;
                for (let i = celulaInicial.c; i !== cA + passo; i += passo) selecionar(celulaInicial.l, i);
            }
        }
    });

    function selecionar(l, c) {
        const el = document.getElementById(`cell-${l}-${c}`);
        if (el) { el.classList.add('selecionando'); selecionadasAtuais.push(`${l}-${c}`); }
    }

    window.addEventListener('mouseup', validar);
    window.addEventListener('touchend', validar);

    function validar() {
        if (!estaArrastando) return;
        estaArrastando = false;
        const sel = selecionadasAtuais.sort().join(',');
        palavrasParaEncontrar.forEach(p => {
            if (!p.encontrada && p.celulas.sort().join(',') === sel) {
                p.encontrada = true;
                p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                document.getElementById(`item-${p.nome}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if (palavrasParaEncontrar.every(p => p.encontrada)) {
            clearInterval(intervalo);
            document.getElementById('final-screen').style.display = 'flex';
            document.getElementById('msg-tempo').innerText = `Terminaste em ${tempo} segundos!`;
        }
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciarJogo;
</script>
</body>
</html>
