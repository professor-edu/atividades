<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sopa de Letras 🔎</title>
<link rel="icon" type="image/png" href="../logo.png">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
    --azul-claro: #f0f7ff;
    --azul-janela-fundo: #ebf5ff;
    --azul-janela-borda: #add8e6;
    --azul-grad-esq: #bde6ff;
    --azul-grad-dir: #2e86de;
    --azul-vibrante: #0091ff;
    --azul-escuro: #0d47a1;
    --verde: #4caf50;
    --laranja: #ff9800;
    --vermelho: #e53935;
}

body {
    font-family: 'Quicksand', sans-serif;
    text-align: center;
    background-color: var(--azul-claro);
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;

    /* CORREÇÃO: permitir scroll vertical */
    overflow-x: hidden;
    overflow-y: auto;

    user-select: none;
}

/* Cabeçalho */
.cabecalho {
    background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 85px;
    flex-shrink: 0;
    z-index: 20;
}
.header-left, .header-right { flex: 1; display: flex; align-items: center; }
.header-left { justify-content: flex-start; }
.header-right { justify-content: flex-end; }
.cabecalho-conteudo {
    display: flex; justify-content: center; align-items: center;
    gap: 15px; flex: 3;
}
.cabecalho h1 {
    margin: 0;
    font-size: 2rem;
    font-weight: 700;
    color: var(--azul-escuro);
    white-space: nowrap;
}
.btn-menu {
    background: var(--laranja); color: white; border: none;
    padding: 10px 18px; border-radius: 25px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
    font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
    text-decoration: none;
    transition: transform 0.3s ease;
}
.btn-menu:hover { transform: scale(1.05); }

.onda-container {
    height: 45px; width: 100%; overflow: hidden;
    margin-top: -1px; flex-shrink: 0; z-index: 10;
    filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3));
}

/* Timer */
.status-jogo { padding: 10px; flex-shrink: 0; }
#countdown-box {
    display: inline-block;
    background: white;
    padding: 8px 30px;
    border-radius: 25px;
    border: 3px solid var(--azul-grad-dir);
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--azul-escuro);
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.tempo-baixo {
    color: var(--vermelho) !important;
    border-color: var(--vermelho) !important;
    animation: shake 0.5s infinite;
}
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(2px); }
    50% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
    100% { transform: translateX(0); }
}

/* Container principal */
.container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 30px;
    flex: 1;
    padding: 10px;

    /* CORREÇÃO: conteúdo não deve ser cortado */
    overflow: visible;

    /* CORREÇÃO: permite quebrar em duas linhas no telemóvel */
    flex-wrap: wrap;
}

/* Grelha */
#grid {
    display: grid;
    grid-template-columns: repeat(10, 48px);
    grid-template-rows: repeat(10, 48px);
    gap: 6px;
    background: white;
    padding: 15px;
    border-radius: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    border: 2px solid var(--azul-janela-borda);
    touch-action: none;
}
.letra {
    width: 48px; height: 48px;
    border: 1px solid #e3efff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 24px;
    border-radius: 12px; background: #fff;
}

/* Lista de palavras — CORREÇÃO: alinhada à altura da grelha */
#lista-palavras {
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* estica verticalmente */
    height: 100%; /* ocupa a mesma altura da grelha */
    min-height: 480px; /* garante alinhamento mesmo com grelha menor */
}

.item-palavra {
    background: white; padding: 10px; border-radius: 20px;
    border: 2px solid var(--azul-janela-borda);
    display: flex; flex-direction: column; align-items: center;
    transition: all 0.3s ease;
}
.item-palavra img { width: 70px; height: 70px; object-fit: contain; }
.item-palavra span { font-weight: 700; font-size: 13px; margin-top: 8px; color: var(--azul-escuro); text-transform: uppercase; }
.item-palavra.encontrada { opacity: 0.3; background: #f1f9f2; border-color: var(--verde); transform: scale(0.95); }
.item-palavra.encontrada span { text-decoration: line-through; }

/* Feedback final */
#feedback-final {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;
}
.painel-vitoria {
    background: white; padding: 40px; border-radius: 35px; text-align: center; max-width: 400px; width: 90%;
}
.emoji-feedback { font-size: 80px; display: block; margin-bottom: 15px; }

/* Footer */
footer {
    height: 50px; flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
}

/* RESPONSIVO — telemóvel */
@media (max-width: 700px) {
    .container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    #lista-palavras {
        width: 100%;
        max-width: 350px;

        /* duas colunas em ecrãs pequenos */
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        justify-items: center;

        min-height: auto;
        height: auto;
    }

    #grid {
        transform: scale(0.95);
    }
}

@media (max-width: 1000px) {
    #grid { grid-template-columns: repeat(10, 38px); grid-template-rows: repeat(10, 38px); }
    .letra { width: 38px; height: 38px; font-size: 18px; }
    .item-palavra img { width: 50px; height: 50px; }
}
</style>
</head>

<body>

<!-- Cabeçalho -->
<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-menu">🏠 MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:70px" alt="ícone">
        <h1>Sopa de Letras</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z"
              style="stroke: none; fill: url(#grad-onda);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div id="countdown-box">⏱️ <span id="timer-display">03:00</span></div>
</div>

<!-- CONTAINER PRINCIPAL -->
<div class="container">
    <div id="grid" oncontextmenu="return false;"></div>
    <div id="lista-palavras"></div>
</div>

<!-- FEEDBACK FINAL -->
<div id="feedback-final">
    <div class="painel-vitoria">
        <span class="emoji-feedback" id="feedback-emoji">🥳</span>
        <h2 id="feedback-titulo">Excelente Trabalho!</h2>
        <p id="msg-tempo" style="font-size: 1.2rem; color: var(--azul-escuro); font-weight: 500;"></p>
        <button class="btn-menu" style="margin: 20px auto 0; padding: 15px 30px; font-size: 1.1rem;" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>

<script>
/* --- TODO O TEU JAVASCRIPT ORIGINAL FOI MANTIDO SEM QUALQUER ALTERAÇÃO --- */
/* (omitido aqui só para não ocupar várias páginas, mas será incluído por ti normalmente) */
document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
