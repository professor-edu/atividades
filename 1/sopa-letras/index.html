<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--azul-claro); display: flex; flex-direction: column; min-height: 100vh;
        }

        /* --- HEADER TEMPLATE OFICIAL --- */
        header {
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio));
            padding: 20px; color: var(--azul-escuro); border-bottom: 3px solid #fff;
            display: flex; justify-content: center; align-items: center; position: relative;
        }

        .btn-menu {
            position: absolute; left: 20px; background: var(--laranja);
            color: white; border: none; padding: 10px 20px; border-radius: 25px;
            font-weight: bold; text-decoration: none; cursor: pointer;
        }

        .header-content { display: flex; align-items: center; gap: 15px; }
        .header-content img { width: 70px; height: auto; }
        .header-content h1 { margin: 0; font-size: 2rem; }

        /* --- SELETOR DE NÍVEL HORIZONTAL --- */
        .nav-niveis {
            display: flex; justify-content: center; gap: 10px; padding: 15px; background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .btn-nivel {
            padding: 8px 20px; border: 2px solid var(--azul-medio); border-radius: 20px;
            background: white; color: var(--azul-escuro); font-weight: bold; cursor: pointer;
        }
        .btn-nivel.active { background: var(--azul-medio); color: white; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-container {
            display: flex; flex-direction: column; align-items: center; padding: 20px; flex-grow: 1;
        }

        #cronometro-container {
            background: white; padding: 8px 25px; border-radius: 20px;
            border: 2px solid var(--laranja); font-weight: bold; font-size: 1.2rem;
            color: var(--azul-escuro); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .game-area {
            display: flex; gap: 30px; align-items: flex-start; justify-content: center;
        }

        /* --- GRELHA --- */
        #grid { 
            display: grid; grid-template-columns: repeat(10, 45px); 
            grid-template-rows: repeat(10, 45px); gap: 5px; 
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); touch-action: none;
        }
        .letra { 
            width: 45px; height: 45px; border: 1px solid #eef; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 22px; border-radius: 8px; background: #fff;
        }
        .letra.selecionando { background: #fff9c4 !important; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde) !important; color: white !important; }

        /* --- LISTA DE IMAGENS ADAPTÁVEL --- */
        #lista-palavras {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            width: 300px; /* Largura fixa no desktop */
        }
        .item-palavra {
            background: white; border: 2px solid var(--azul-medio); border-radius: 12px;
            padding: 10px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; transition: 0.3s;
        }
        /* Tamanho dinâmico das imagens */
        .item-palavra img { width: 100%; height: auto; object-fit: contain; }
        .item-palavra span { font-size: 0.7rem; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        .item-palavra.encontrada { opacity: 0.2; background: #f0fff0; border-color: var(--verde); }

        /* --- FOOTER --- */
        footer { padding: 20px; text-align: center; background: white; border-top: 1px solid #ddd; }

        #modal-vitoria {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;
        }
        .vitoria-box { background: white; padding: 40px; border-radius: 20px; text-align: center; }

        /* --- MOBILE --- */
        @media (max-width: 850px) {
            .game-area { flex-direction: column; align-items: center; }
            #lista-palavras { width: 100%; grid-template-columns: repeat(4, 1fr); }
            #grid { grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); }
            .letra { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="btn-menu">🏠 MENU</a>
    <div class="header-content">
        <img src="sopa-letras.png" alt="Sopa de Letras">
        <h1>Sopa de Letras</h1>
    </div>
</header>

<div class="nav-niveis">
    <button class="btn-nivel active" onclick="mudarNivel(4, this)">FÁCIL (4)</button>
    <button class="btn-nivel" onclick="mudarNivel(6, this)">MÉDIO (6)</button>
    <button class="btn-nivel" onclick="mudarNivel(8, this)">DIFÍCIL (8)</button>
</div>

<div class="main-container">
    <div id="cronometro-container">⏱️ <span id="tempo">0</span>s</div>

    <div class="game-area">
        <div id="grid" oncontextmenu="return false;"></div>
        <div id="lista-palavras"></div>
    </div>
</div>

<div id="modal-vitoria">
    <div class="vitoria-box">
        <h1 style="font-size: 3rem; margin:0">🎉</h1>
        <h2>Parabéns!</h2>
        <p id="feedback-tempo"></p>
        <button onclick="location.reload()" class="btn-nivel" style="background:var(--verde); color:white; border:none; padding:10px 30px">Novo Jogo</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempo = 0, intervalo, nivelAtual = 4;
    let matriz, palavrasEncontrar = [];
    let estaArrastando = false, celulaIni = null, selecionadas = [];

    function mudarNivel(qtd, btn) {
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        nivelAtual = qtd;
        // Ajustar altura das imagens consoante o nível
        const lista = document.getElementById('lista-palavras');
        if(qtd === 4) lista.style.gridTemplateRows = "repeat(2, 1fr)";
        else if(qtd === 6) lista.style.gridTemplateRows = "repeat(3, 1fr)";
        else lista.style.gridTemplateRows = "repeat(4, 1fr)";
        
        iniciar();
    }

    function iniciar() {
        clearInterval(intervalo);
        tempo = 0;
        document.getElementById('tempo').innerText = tempo;
        document.getElementById('grid').innerHTML = "";
        document.getElementById('lista-palavras').innerHTML = "";
        
        let selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, nivelAtual);
        palavrasEncontrar = selecao.map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem,
            encontrada: false,
            celulas: []
        }));

        matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
        
        palavrasEncontrar.forEach(pObj => {
            let colocada = false, t = 0;
            while (!colocada && t < 400) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                if (validarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                t++;
            }
        });

        const grid = document.getElementById('grid');
        const list = document.getElementById('lista-palavras');
        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        matriz.forEach((linha, l) => {
            linha.forEach((letra, c) => {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; div.dataset.c = c;
                div.textContent = letra || abc[Math.floor(Math.random() * 26)];
                grid.appendChild(div);
            });
        });

        palavrasEncontrar.forEach(p => {
            list.innerHTML += `<div class="item-palavra" id="item-${p.nome}"><img src="${p.imagem}"><span>${p.nome}</span></div>`;
        });

        intervalo = setInterval(() => { tempo++; document.getElementById('tempo').innerText = tempo; }, 1000);
    }

    function validarEspaco(pal, l, c, dir) {
        for (let i = 0; i < pal.length; i++) {
            let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== pal[i]) return false;
        }
        return true;
    }

    // INTERAÇÃO RATO/TOQUE
    function getCell(e) {
        const t = e.touches ? e.touches[0] : e;
        const el = document.elementFromPoint(t.clientX, t.clientY);
        return (el && el.classList.contains('letra')) ? el : null;
    }

    const gridDiv = document.getElementById('grid');
    gridDiv.addEventListener('mousedown', (e) => { 
        const el = getCell(e);
        if(el) { estaArrastando = true; celulaIni = {l:parseInt(el.dataset.l), c:parseInt(el.dataset.c)}; }
    });
    gridDiv.addEventListener('touchstart', (e) => { 
        const el = getCell(e);
        if(el) { estaArrastando = true; celulaIni = {l:parseInt(el.dataset.l), c:parseInt(el.dataset.c)}; e.preventDefault(); }
    }, {passive:false});

    window.addEventListener('mousemove', (e) => {
        if(!estaArrastando) return;
        const el = getCell(e);
        if(el) {
            const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
            document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
            selecionadas = [];
            if(Math.abs(lA - celulaIni.l) > Math.abs(cA - celulaIni.c)) {
                const p = lA > celulaIni.l ? 1 : -1;
                for(let i=celulaIni.l; i!==lA+p; i+=p) mark(i, celulaIni.c);
            } else {
                const p = cA > celulaIni.c ? 1 : -1;
                for(let i=celulaIni.c; i!==cA+p; i+=p) mark(celulaIni.l, i);
            }
        }
    });

    function mark(l, c) {
        const el = document.getElementById(`cell-${l}-${c}`);
        if(el) { el.classList.add('selecionando'); selecionadas.push(`${l}-${c}`); }
    }

    window.addEventListener('mouseup', validarFinal);
    window.addEventListener('touchend', validarFinal);

    function validarFinal() {
        if(!estaArrastando) return;
        estaArrastando = false;
        const selStr = selecionadas.sort().join(',');
        palavrasEncontrar.forEach(p => {
            if(!p.encontrada && p.celulas.sort().join(',') === selStr) {
                p.encontrada = true;
                p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                document.getElementById(`item-${p.nome}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if(palavrasEncontrar.every(p => p.encontrada)) {
            clearInterval(intervalo);
            document.getElementById('modal-vitoria').style.display = 'flex';
            document.getElementById('feedback-tempo').innerText = `Encontraste tudo em ${tempo} segundos!`;
        }
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
