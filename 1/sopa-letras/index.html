<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras Divertida ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    <style>
        :root {
            --azul-claro: #f2f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none;
        }

        /* --- Header Oficial (Template) --- */
        header {
            width: 100%;
            padding: 15px 0;
            background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
            border-bottom: 4px solid var(--azul-medio);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            position: relative;
        }

        .btn-menu {
            position: absolute;
            left: 15px;
            background: var(--laranja);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.8rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        header img { width: 100px; height: auto; }

        /* --- Seletor de Níveis --- */
        #menu-niveis {
            padding: 50px 20px;
            flex-grow: 1;
        }

        .btn-nivel {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-nivel:hover { transform: scale(1.05); }
        .facil { background: #4caf50; }
        .medio { background: #2196f3; }
        .dificil { background: #f44336; }

        /* --- Área de Jogo --- */
        #game-content { display: none; flex-direction: column; align-items: center; flex-grow: 1; padding: 10px; }

        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(10, 42px); 
            grid-template-rows: repeat(10, 42px); 
            gap: 4px; 
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            touch-action: none;
        }

        .letra { 
            width: 42px; height: 42px; 
            border: 1px solid #eee; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 20px; 
            border-radius: 8px; background: #fff;
        }

        .letra.selecionando { background: #fff9c4; border-color: #fbc02d; } 
        .letra.correta { background: var(--verde) !important; color: white !important; border-color: #388e3c !important; }

        #lista-palavras { 
            display: grid; 
            grid-template-columns: repeat(2, 130px); 
            gap: 8px; 
            align-content: start;
        }
        .item-palavra { 
            background: white; padding: 5px; border-radius: 12px; 
            border: 2px solid var(--azul-medio); 
            display: flex; flex-direction: column; align-items: center; 
        }
        .item-palavra img { width: 50px; height: 50px; object-fit: contain; }
        .item-palavra span { font-size: 11px; font-weight: bold; color: var(--azul-escuro); margin-top: 3px; }
        .item-palavra.encontrada { opacity: 0.3; background: #e8f5e9; border-color: var(--verde); }

        /* --- Footer --- */
        footer {
            padding: 15px;
            text-align: center;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        #feedback-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .painel-vitoria { background: white; padding: 30px; border-radius: 20px; text-align: center; }

        @media (max-width: 700px) {
            header img { width: 70px; }
            #grid { grid-template-columns: repeat(10, 32px); grid-template-rows: repeat(10, 32px); }
            .letra { width: 32px; height: 32px; font-size: 16px; }
            #lista-palavras { grid-template-columns: repeat(3, 100px); }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="btn-menu">🏠 MENU</a>
    <img src="sopa-letras.png" alt="Sopa de Letras">
</header>

<div id="menu-niveis">
    <h2 style="color: var(--azul-escuro);">Escolhe a Dificuldade:</h2>
    <button class="btn-nivel facil" onclick="iniciarNivel(4)">Fácil (4 palavras)</button>
    <button class="btn-nivel medio" onclick="iniciarNivel(6)">Médio (6 palavras)</button>
    <button class="btn-nivel dificil" onclick="iniciarNivel(8)">Difícil (8 palavras)</button>
</div>

<div id="game-content">
    <div id="cronometro" style="font-weight:bold; margin-bottom:10px; color:var(--azul-escuro);">Tempo: 0s</div>
    <div class="game-container">
        <div id="grid" oncontextmenu="return false;"></div> 
        <div id="lista-palavras"></div>
    </div>
</div>

<div id="feedback-final">
    <div class="painel-vitoria">
        <h1>🎉 Parabéns!</h1>
        <p id="msg-tempo"></p>
        <button onclick="location.reload()" style="background:var(--verde); color:white; border:none; padding:12px 25px; border-radius:25px; font-weight:bold; cursor:pointer;">Voltar ao Menu</button>
    </div>
</div>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    const TAMANHO = 10;
    let tempo = 0, intervalo;
    let matriz, palavrasParaEncontrar = [];
    let estaArrastando = false, celulaInicial = null, selecionadasAtuais = [];

    function iniciarNivel(qtd) {
        document.getElementById('menu-niveis').style.display = 'none';
        document.getElementById('game-content').style.display = 'flex';
        
        // Seleção aleatória do banco de dados (js/dados.js)
        let selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, qtd);
        palavrasParaEncontrar = selecao.map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem,
            encontrada: false,
            celulas: []
        }));

        gerarMatriz();
        configurarEventos();
        intervalo = setInterval(() => { tempo++; document.getElementById('cronometro').innerText = `Tempo: ${tempo}s`; }, 1000);
    }

    function gerarMatriz() {
        matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
        
        palavrasParaEncontrar.forEach(pObj => {
            let colocada = false, tentativas = 0;
            while (!colocada && tentativas < 200) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - pObj.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - pObj.nome.length : TAMANHO));
                
                if (verificarEspaco(pObj.nome, l, c, dir)) {
                    for (let i = 0; i < pObj.nome.length; i++) {
                        let curL = dir === 'V' ? l + i : l;
                        let curC = dir === 'H' ? c + i : c;
                        matriz[curL][curC] = pObj.nome[i];
                        pObj.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
                tentativas++;
            }
        });

        const grid = document.getElementById('grid');
        const list = document.getElementById('lista-palavras');
        const alfabeto = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        matriz.forEach((linha, l) => {
            linha.forEach((letra, c) => {
                const div = document.createElement('div');
                div.className = 'letra';
                div.id = `cell-${l}-${c}`;
                div.dataset.l = l; div.dataset.c = c;
                div.textContent = letra || alfabeto[Math.floor(Math.random() * 26)];
                grid.appendChild(div);
            });
        });

        palavrasParaEncontrar.forEach(p => {
            list.innerHTML += `<div class="item-palavra" id="item-${p.nome}"><img src="${p.imagem}"><span>${p.nome}</span></div>`;
        });
    }

    function verificarEspaco(pal, l, c, dir) {
        for (let i = 0; i < pal.length; i++) {
            let curL = dir === 'V' ? l + i : l, curC = dir === 'H' ? c + i : c;
            if (matriz[curL][curC] !== '' && matriz[curL][curC] !== pal[i]) return false;
        }
        return true;
    }

    function configurarEventos() {
        const grid = document.getElementById('grid');
        const mover = (e) => {
            if (!estaArrastando) return;
            const t = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(t.clientX, t.clientY);
            if (el && el.classList.contains('letra')) {
                const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
                document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
                selecionadasAtuais = [];
                if (Math.abs(lA - celulaInicial.l) > Math.abs(cA - celulaInicial.c)) {
                    const passo = lA > celulaInicial.l ? 1 : -1;
                    for (let i = celulaInicial.l; i !== lA + passo; i += passo) selecionar(i, celulaInicial.c);
                } else {
                    const passo = cA > celulaInicial.c ? 1 : -1;
                    for (let i = celulaInicial.c; i !== cA + passo; i += passo) selecionar(celulaInicial.l, i);
                }
            }
        };

        const selecionar = (l, c) => {
            const el = document.getElementById(`cell-${l}-${c}`);
            if (el) { el.classList.add('selecionando'); selecionadasAtuais.push(`${l}-${c}`); }
        };

        grid.addEventListener('mousedown', (e) => { estaArrastando = true; const el = e.target; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)}; });
        grid.addEventListener('touchstart', (e) => { estaArrastando = true; const el = e.targetTouches[0].target; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)}; }, {passive:false});
        window.addEventListener('mousemove', mover); window.addEventListener('touchmove', mover, {passive:false});
        window.addEventListener('mouseup', validar); window.addEventListener('touchend', validar);
    }

    function validar() {
        if (!estaArrastando) return;
        estaArrastando = false;
        const sel = selecionadasAtuais.sort().join(',');
        palavrasParaEncontrar.forEach(p => {
            if (!p.encontrada && p.celulas.sort().join(',') === sel) {
                p.encontrada = true;
                p.celulas.forEach(id => document.getElementById(`cell-${id}`).classList.add('correta'));
                document.getElementById(`item-${p.nome}`).classList.add('encontrada');
            }
        });
        document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
        if (palavrasParaEncontrar.every(p => p.encontrada)) {
            clearInterval(intervalo);
            document.getElementById('feedback-final').style.display = 'flex';
            document.getElementById('msg-tempo').innerText = `Terminaste em ${tempo} segundos!`;
        }
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>
</body>
</html>
