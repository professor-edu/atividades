<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopa de Letras 🔎</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
        }
        
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 20;
        }

        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 3; }
        .cabecalho h1 { font-size: 1.8rem; color: var(--azul-escuro); margin: 0; }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            text-decoration: none; transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        /* DIFICULDADE */
        .seletor-niveis { margin: 10px 0; display: flex; justify-content: center; gap: 10px; }
        .btn-diff {
            background: white; border: 2px solid var(--azul-grad-dir); color: var(--azul-grad-dir);
            padding: 6px 20px; border-radius: 20px; font-weight: 700; cursor: pointer;
        }
        .btn-diff.active { background: var(--azul-grad-dir); color: white; }

        .status-jogo { padding: 10px; }
        #countdown-box {
            display: inline-block; background: white; padding: 8px 30px;
            border-radius: 25px; border: 3px solid var(--azul-grad-dir);
            font-weight: 700; font-size: 1.4rem; color: var(--azul-escuro);
        }

        .container { 
            display: flex; justify-content: center; align-items: stretch; 
            gap: 30px; padding: 10px 20px 40px; flex-wrap: wrap;
        }

        #grid { 
            display: grid; background: white; padding: 15px; border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05); border: 2px solid var(--azul-janela-borda);
            touch-action: none;
        }

        .letra { 
            border: 1px solid #e3efff; display: flex; align-items: center; justify-content: center; 
            font-weight: 700; border-radius: 10px; background: #fff;
        }
        .letra.selecionando { background: #fff9c4 !important; border-color: #fbc02d !important; } 
        .letra.correta { background: var(--verde) !important; color: white !important; }

        #lista-palavras { display: grid; grid-template-columns: repeat(2, 160px); gap: 12px; }

        .item-palavra { 
            background: white; border-radius: 20px; border: 2px solid var(--azul-janela-borda); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .item-palavra img { object-fit: contain; }
        .item-palavra span { font-weight: 700; font-size: 11px; margin-top: 5px; color: var(--azul-escuro); text-transform: uppercase; }
        .item-palavra.encontrada { opacity: 0.3; }

        #feedback-final { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        footer { height: 50px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: center; margin-top: auto; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div style="flex:1"><a href="../index.html" class="btn-menu"><span>🏠</span> MENU</a></div>
    <div class="cabecalho-conteudo">
        <img src="sopa-letras.png" style="width:45px">
        <h1>Sopa de Letras</h1>
    </div>
    <div style="flex:1"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="fill: var(--azul-grad-dir);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div id="countdown-box">⏱️ <span id="timer-display">03:00</span></div>
    <div class="seletor-niveis">
        <button onclick="mudarDificuldade(8)" id="btn-8" class="btn-diff">FÁCIL</button>
        <button onclick="mudarDificuldade(10)" id="btn-10" class="btn-diff active">MÉDIO</button>
        <button onclick="mudarDificuldade(12)" id="btn-12" class="btn-diff">DIFÍCIL</button>
    </div>
</div>

<div class="container">
    <div id="grid"></div> 
    <div id="lista-palavras"></div>
</div>

<div id="feedback-final">
    <div style="background:white; padding:40px; border-radius:30px; text-align:center;">
        <h2 id="fb-titulo">Excelente Trabalho!</h2>
        <button class="btn-menu" style="margin:20px auto" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <p>2026 🏫 EB1/PE da Marinheira</p>
</footer>

<script src="js/dados.js"></script>
<script>
    let TAMANHO = 10;
    let tempoRestante = 180;
    let intervaloCountdown;
    let matriz, selecao, estaArrastando = false, celulaInicial = null, celulasSelecionadasAtuais = [];

    function mudarDificuldade(n) {
        TAMANHO = n;
        document.querySelectorAll('.btn-diff').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+n).classList.add('active');
        iniciarJogo();
    }

    function iniciarJogo() {
        clearInterval(intervaloCountdown);
        tempoRestante = 180;
        const grid = document.getElementById('grid');
        const lista = document.getElementById('lista-palavras');
        grid.innerHTML = '';
        lista.innerHTML = '';

        const celSize = TAMANHO === 8 ? 55 : (TAMANHO === 10 ? 48 : 38);
        grid.style.gridTemplateColumns = `repeat(${TAMANHO}, ${celSize}px)`;
        grid.style.gridTemplateRows = `repeat(${TAMANHO}, ${celSize}px)`;

        const numPal = TAMANHO === 8 ? 6 : (TAMANHO === 10 ? 8 : 10);
        selecao = palavras.sort(() => 0.5 - Math.random()).slice(0, numPal).map(p => ({
            nome: p.palavra.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
            imagem: p.imagem, encontrada: false, celulas: []
        }));

        matriz = Array(TAMANHO).fill().map(() => Array(TAMANHO).fill(''));
        
        // Lógica de posicionamento (Resumida)
        selecao.forEach(p => {
            let colocada = false;
            while(!colocada) {
                let dir = Math.random() > 0.5 ? 'H' : 'V';
                let l = Math.floor(Math.random() * (dir === 'V' ? TAMANHO - p.nome.length : TAMANHO));
                let c = Math.floor(Math.random() * (dir === 'H' ? TAMANHO - p.nome.length : TAMANHO));
                let livre = true;
                for(let i=0; i<p.nome.length; i++) {
                    if(matriz[dir==='V'?l+i:l][dir==='H'?c+i:c] !== '') livre = false;
                }
                if(livre) {
                    for(let i=0; i<p.nome.length; i++){
                        let curL = dir==='V'?l+i:l, curC = dir==='H'?c+i:c;
                        matriz[curL][curC] = p.nome[i];
                        p.celulas.push(`${curL}-${curC}`);
                    }
                    colocada = true;
                }
            }
        });

        // Desenhar Letras
        const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for(let l=0; l<TAMANHO; l++){
            for(let c=0; c<TAMANHO; c++){
                const div = document.createElement('div');
                div.className = 'letra';
                div.style.width = celSize+'px'; div.style.height = celSize+'px';
                div.style.fontSize = (celSize/2)+'px';
                div.textContent = matriz[l][c] || abc[Math.floor(Math.random()*26)];
                div.id = `cell-${l}-${c}`; div.dataset.l = l; div.dataset.c = c;
                grid.appendChild(div);
            }
        }

        // Desenhar Imagens
        lista.style.gridTemplateRows = `repeat(${Math.ceil(numPal/2)}, 1fr)`;
        selecao.forEach(p => {
            lista.innerHTML += `<div class="item-palavra" id="item-${p.nome}">
                <img src="${p.imagem}" style="height:${TAMANHO===12?'45px':'65px'}">
                <span>${p.nome}</span></div>`;
        });

        ativarEventos();
        intervaloCountdown = setInterval(atualizarTimer, 1000);
    }

    function atualizarTimer() {
        tempoRestante--;
        let m = Math.floor(tempoRestante/60), s = tempoRestante%60;
        document.getElementById('timer-display').textContent = `${m}:${s<10?'0'+s:s}`;
        if(tempoRestante <= 0) { clearInterval(intervaloCountdown); alert('Tempo esgotado!'); }
    }

    function ativarEventos() {
        const grid = document.getElementById('grid');
        const start = (e) => {
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if(el && el.classList.contains('letra')) {
                estaArrastando = true; celulaInicial = {l: parseInt(el.dataset.l), c: parseInt(el.dataset.c)};
            }
        };
        const move = (e) => {
            if(!estaArrastando) return;
            const touch = e.touches ? e.touches[0] : e;
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if(el && el.classList.contains('letra')) {
                const lA = parseInt(el.dataset.l), cA = parseInt(el.dataset.c);
                document.querySelectorAll('.letra.selecionando').forEach(x => x.classList.remove('selecionando'));
                celulasSelecionadasAtuais = [];
                if(Math.abs(lA-celulaInicial.l) > Math.abs(cA-celulaInicial.c)) {
                    for(let i=Math.min(lI,lA); i<=Math.max(lI,lA); i++) marcar(i, celulaInicial.c);
                } // [Lógica de marcação simplificada para caber]
            }
        };
        // ... (resto dos eventos mousedown/mouseup)
    }

    iniciarJogo();
</script>
</body>
</html>
