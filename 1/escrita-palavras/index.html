<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Sílabas</title>

    <!-- Folha de estilo -->
    <link rel="stylesheet" href="css/jogo.css">
</head>

<body>

    <h1 class="titulo">Ordena as sílabas e escreve a palavra</h1>

    <!-- Barra de progresso e contadores -->
    <div class="progresso">
        <div class="barra">
            <div id="progressoInterno"></div>
        </div>

        <div class="contadores">
            <span id="certas">Certas: 0</span>
            <span id="erros">Erradas: 0</span>
        </div>
    </div>

    <!-- Cartão do jogo -->
    <div id="areaJogo">

        <!-- Imagem da palavra -->
        <img id="imagemPalavra" src="" alt="imagem da palavra" class="imagem">

        <!-- Sílabas -->
        <div id="silabas" class="silabas"></div>

        <!-- Campo de escrita -->
        <input id="campoEscrita"
               type="text"
               placeholder="Escreve aqui..."
               autocomplete="off">

        <!-- Botão validar -->
        <button id="validar">Validar</button>

        <!-- Feedback visual (✔ ou ✘) -->
        <div id="feedback"></div>

    </div>

    <!-- Scripts -->
    <script src="js/dados.js"></script>
    <script src="js/jogo.js"></script>

</body>
</html>
