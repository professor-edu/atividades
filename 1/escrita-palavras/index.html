<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras</title>
    <style>
        /* =====================================================
           GERAL E ESTRUTURA
        ===================================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f7ff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* CABEÇALHO MAIOR E ATRATIVO */
        .cabecalho {
            background: linear-gradient(135deg, #bde6ff 0%, #7ac7f0 100%);
            padding: 25px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 3px solid #ffffff;
        }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .icone-cabecalho {
            width: 60px;
            height: auto;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .titulo-cabecalho {
            margin: 0;
            font-size: 32px;
            color: #0d47a1;
            text-shadow: 1px 1px 0px white;
        }

        /* =====================================================
           PROGRESSO E CONTADORES (AMPLOS)
        ===================================================== */
        .progresso {
            width: 95%;
            margin: 30px auto 10px auto;
        }

        .barra {
            width: 100%;
            height: 18px;
            background: #e3efff;
            border-radius: 20px;
            border: 2px solid #ffffff;
            overflow: hidden;
        }

        #progressoInterno {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #7ac7f0, #a8d5ff);
            transition: width .5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .contadores {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 0 10px;
            font-size: 18px;
            font-weight: bold;
        }

        .icone-contador {
            width: 24px;
            height: auto;
            vertical-align: middle;
            margin-right: 8px;
        }

        #certas { color: #2d8a23; }
        #erros { color: #b30000; }

        /* =====================================================
           ÁREA DE JOGO (CARTÃO BRANCO AMPLIADO)
        ===================================================== */
        .cartao {
            background: white;
            width: 95%;
            margin: 20px auto;
            padding: 60px 20px;
            border-radius: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            box-sizing: border-box;
        }

        .imagem {
            width: 300px;
            max-width: 80%;
            height: auto;
            margin-bottom: 40px;
        }

        .entrada {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        #campoEscrita {
            font-size: 28px;
            padding: 18px;
            width: 100%;
            max-width: 450px;
            border: 3px solid #7ac7f0;
            border-radius: 15px;
            text-align: center;
            background-color: #fafcfe;
            outline: none;
        }

        #validar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 15px 60px;
            font-size: 22px;
            font-weight: bold;
            background: #e3f2fd;
            border: 2px solid #90caf9;
            border-radius: 50px;
            cursor: pointer;
            color: #1565c0;
            transition: all 0.2s;
        }

        #validar:hover {
            background: #bbdefb;
            transform: translateY(-3px);
        }

        /* =====================================================
           FEEDBACK (CENTRADO E SÓBRIO)
        ===================================================== */
        #feedback {
            margin-top: 40px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .feedback-certo {
            font-size: 80px;
            color: #4caf50;
        }

        .feedback-errado {
            width: 100%;
            max-width: 550px;
            background: #fff5f5; /* Caixa rosada sóbria */
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #fde2e2;
            color: #d32f2f;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .palavra-correta {
            display: block;
            margin: 10px 0 20px 0;
            font-size: 26px;
            font-weight: 900;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-continuar {
            background: #ffffff;
            border: 2px solid #90caf9;
            padding: 12px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            color: #1565c0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .icone-lupa, .icone-continuar {
            width: 24px;
        }

        /* ANIMAÇÃO DE ERRO */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s; border-color: #d32f2f !important; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho">
        <h1 class="titulo-cabecalho">Escrita de Palavras</h1>
        <img src="img/10214904.png" class="icone-cabecalho" onerror="this.style.display='none'">
    </div>
</header>

<div class="progresso">
    <div class="barra">
        <div id="progressoInterno"></div>
    </div>
    <div class="contadores">
        <span id="certas">
            <img src="img/certo.png" class="icone-contador"> Certas: 0
        </span>
        <span id="erros">
            <img src="img/errado.png" class="icone-contador"> Erradas: 0
        </span>
    </div>
</div>

<div id="areaJogo" class="cartao">
    <img id="imagemPalavra" src="" class="imagem">

    <div class="entrada">
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>

</body>
</html>
