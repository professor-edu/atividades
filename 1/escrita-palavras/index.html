<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jogo das Sílabas</title>

    css/jogo.css
</head>

<body>

    <!-- CABEÇALHO NOVO -->
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <img src="img/icones/lapis.png" alt="" class="icone-cabecalho">
            <h1 class="titulo-cabecalho">Ordenar Sílabas</h1>
            <img src="img/icones/dialogo.png" alt="" class="icone-cabecalho">
        </div>
        <div class="linha-cabecalho"></div>
    </header>

    <!-- PROGRESSO -->
    <div class="progresso">
        <div class="barra">
            <div id="progressoInterno"></div>
        </div>

        <div class="contadores">
            <span id="certas">Certas: 0</span>
            <span id="erros">Erradas: 0</span>
        </div>
    </div>

    <!-- CARTÃO DO JOGO -->
    <div id="areaJogo" class="cartao">

        <img id="imagemPalavra" src="" alt="imagem da palavra" class="imagem">

        <div id="silabas" class="silabas"></div>

        <input id="campoEscrita"
               type="text"
               placeholder="Escreve aqui..."
               autocomplete="off">

        <button id="validar">Validar</button>

        <div id="feedback"></div>

    </div>

    js/dados.js</script>
    js/jogo.js</script>

</body>
</html>
