<body>

    <h1 class="titulo">Ordena as sílabas e escreve a palavra</h1>

            <div id="progressoInterno"></div>
        </div>

        <div class="contadores">
            <span id="certas">Certas: 0</span>
            <span id="erros">Erros: 0</span>
        </div>
    </div>

    <div id="areaJogo">

        <img id="imagemPalavra" src="" alt="imagem" class="imagem">

        <div id="silabas" class="silabas"></div>

        <input id="campoEscrita" 
               type="text"
               placeholder="Escreve aqui..."
               autocomplete="off">

        <button id="validar">Validar</button>

        </div>
