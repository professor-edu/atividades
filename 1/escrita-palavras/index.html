<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras</title>
    <style>
        /* =====================================================
           CSS EMBUTIDO PARA TESTE (Resolve o problema da imagem)
        ===================================================== */
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            background: #f2f7ff;
            margin: 0;
            padding: 0;
        }

        .cabecalho {
            background: linear-gradient(#d6ecff, #bde6ff);
            padding: 15px 0;
        }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        /* CORREÇÃO: Ícones do cabeçalho */
        .icone-cabecalho {
            width: 50px;
            height: auto;
        }

        .progresso {
            width: 80%;
            max-width: 600px;
            margin: 20px auto 10px auto;
        }

        .barra {
            width: 100%;
            height: 12px;
            background: #d3e7ff;
            border-radius: 8px;
            overflow: hidden;
        }

        #progressoInterno {
            width: 0%;
            height: 100%;
            background: #7ac7f0;
            transition: width .4s;
        }

        .contadores {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 18px;
        }

        /* CORREÇÃO: Ícones Certas/Erradas (estavam gigantes) */
        .icone-contador {
            width: 24px;
            height: auto;
            vertical-align: middle;
            margin-right: 5px;
        }

        .cartao {
            background: white;
            width: 85%;
            max-width: 500px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(0,0,0,.12);
        }

        /* CORREÇÃO: Tamanho da imagem da palavra */
        .imagem {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        .entrada {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #campoEscrita {
            font-size: 22px;
            padding: 12px;
            width: 100%;
            max-width: 260px;
            border: 2px solid #7ac7f0;
            border-radius: 10px;
            text-align: center;
        }

        #validar, .btn-continuar, .btn-recomecar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 25px;
            font-size: 18px;
            background: #e8f4ff;
            border: 2px solid #7ac7f0;
            border-radius: 10px;
            cursor: pointer;
            width: fit-content;
        }

        .icone-lupa, .icone-continuar {
            width: 20px;
        }

        #feedback {
            margin-top: 15px;
            font-size: 32px;
            min-height: 100px;
        }

        .feedback-certo { color: #2d8a23; }
        .feedback-errado { color: #b30000; }
        
        .palavra-correta {
            color: #004aad;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            font-size: 22px;
        }

        /* Animação de erro */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease-in-out; border-color: red !important; }

    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho">
        <h1 style="margin:0; font-size: 24px;">Escrita de Palavras</h1>
        <img src="img/10214904.png" class="icone-cabecalho" alt="">
    </div>
</header>

<div class="progresso">
    <div class="barra">
        <div id="progressoInterno"></div>
    </div>
    <div class="contadores">
        <span id="certas"><img src="img/certo.png" class="icone-contador"> Certas: 0</span>
        <span id="erros"><img src="img/errado.png" class="icone-contador"> Erradas: 0</span>
    </div>
</div>

<div id="areaJogo" class="cartao">
    <img id="imagemPalavra" src="" class="imagem">

    <div class="entrada">
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>

</body>
</html>
