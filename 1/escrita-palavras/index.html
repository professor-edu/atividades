<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras ✍️</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
        }
        
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 85px; 
            flex-shrink: 0;
            z-index: 30;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; flex: 3;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .icone-cabecalho { 
            width: 60px; 
            height: 60px; 
            object-fit: contain;
        }

        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
        }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.1));
        }

        .status-jogo { 
            padding: 5px; 
            flex-shrink: 0; 
            position: relative; 
            z-index: 25;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progresso-container {
            width: 90%; max-width: 650px; height: 18px; 
            background: white; border-radius: 15px; margin: 5px auto; 
            overflow: hidden; border: 2.5px solid var(--azul-grad-dir);
        }
        .barra-progresso {
            width: 0%; height: 100%;
            background: var(--azul-vibrante);
            transition: width 0.5s ease;
        }

        .contadores {
            display: flex;
            gap: 25px;
            font-weight: 700;
            font-size: 1.2rem;
            margin-top: 5px;
        }
        .certas { color: var(--verde); }
        .erradas { color: var(--vermelho); }

        #main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 15px;
            overflow-y: auto;
        }

        .cartao {
            background: white; 
            width: 95%; 
            max-width: 650px;
            padding: 35px 20px; 
            border-radius: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
        }

        .imagem-pergunta {
            height: 200px;
            width: auto; 
            object-fit: contain;
            border-radius: 20px;
        }

        #campoEscrita {
            font-family: 'Quicksand', sans-serif;
            font-size: 26px;
            padding: 12px;
            width: 90%;
            max-width: 350px;
            border: 2px solid var(--azul-grad-esq);
            border-radius: 12px;
            text-align: center;
            outline: none;
            background-color: #fafcfe;
        }

        #validar {
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            background: var(--azul-janela-fundo);
            border: 2px solid var(--azul-grad-esq);
            border-radius: 12px;
            cursor: pointer;
            color: var(--azul-escuro);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        #validar:hover { transform: scale(1.05); }

        #feedback {
            min-height: 50px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
        }

        footer {
            height: 50px; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            background: white; 
            border-top: 1px solid #eee; 
            width: 100%;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s; border-color: var(--vermelho) !important; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            🏠 MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho"> 
        <h1>Escrita de Palavras</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda-final);"></path>
        <defs>
            <linearGradient id="grad-onda-final" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>
</div>

<div class="status-jogo">
    <div class="progresso-container">
        <div id="barra-progresso" class="barra-progresso"></div>
    </div>
    <div class="contadores">
        <span class="certas">✅ Certas: <span id="num-certas">0</span></span>
        <span class="erradas">❌ Erradas: <span id="num-erradas">0</span></span>
    </div>
</div>

<main id="main-content">
    <div class="cartao" id="areaJogo">
        <img id="imagemPalavra" src="" class="imagem-pergunta">
        
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        
        <button id="validar">
            🔍 Verificar
        </button>

        <div id="feedback"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    let indiceAtual = 0;
    let certas = 0;
    let erradas = 0;
    let listaJogo = [];
    
    if (typeof palavras !== 'undefined') {
        listaJogo = [...palavras].sort(() => 0.5 - Math.random());
    }

    const campo = document.getElementById('campoEscrita');
    const btnValidar = document.getElementById('validar');
    const feedback = document.getElementById('feedback');

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        
        atualizarBarra();
        const item = listaJogo[indiceAtual];
        document.getElementById('imagemPalavra').src = item.imagem;
        campo.value = "";
        campo.classList.remove('shake');
        feedback.innerText = "";
        campo.focus();
    }

    function verificarResposta() {
        const item = listaJogo[indiceAtual];
        const respostaUsuario = campo.value.trim().toLowerCase();
        const respostaCorreta = item.palavra.toLowerCase();

        if (respostaUsuario === respostaCorreta) {
            certas++;
            document.getElementById('num-certas').innerText = certas;
            feedback.innerHTML = "<span style='color: var(--verde)'>Excelente! ✨</span>";
            
            setTimeout(() => {
                indiceAtual++;
                carregarPergunta();
            }, 1200);
        } else {
            erradas++;
            document.getElementById('num-erradas').innerText = erradas;
            campo.classList.add('shake');
            feedback.innerHTML = "<span style='color: var(--vermelho)'>Tenta outra vez! 🔄</span>";
            setTimeout(() => {
                campo.classList.remove('shake');
            }, 500);
        }
    }

    btnValidar.onclick = verificarResposta;
    campo.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') verificarResposta();
    });

    function atualizarBarra() {
        if (listaJogo.length === 0) return;
        const perc = (indiceAtual / listaJogo.length) * 100;
        document.getElementById('barra-progresso').style.width = perc + "%";
    }

    function finalizarJogo() {
        document.getElementById('barra-progresso').style.width = "100%";
        document.getElementById('areaJogo').innerHTML = `
            <h2 style="color: var(--azul-escuro)">🏆 Desafio Terminado!</h2>
            <p style="font-size: 1.2rem;">Acertaste <strong>${certas}</strong> palavras.</p>
            <button onclick="location.reload()" class="btn-menu" style="margin: 20px auto; padding: 15px 30px;">Recomeçar</button>
        `;
    }

    window.onload = carregarPergunta;
</script>
</body>
</html>
