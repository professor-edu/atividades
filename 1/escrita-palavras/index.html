<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras</title>
    <style>
        /* =====================================================
           GERAL & ESTRUTURA
        ===================================================== */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f0f7ff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .cabecalho {
            background: linear-gradient(#d6ecff, #bde6ff);
            padding: 10px 0;
            border-bottom: 1px solid #7ac7f0;
        }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .icone-cabecalho {
            width: 45px;
            height: auto;
        }

        /* =====================================================
           PROGRESSO (AMPLO COMO NA IMAGEM)
        ===================================================== */
        .progresso {
            width: 95%; /* Ocupa quase a largura toda */
            margin: 20px auto;
        }

        .barra {
            width: 100%;
            height: 10px;
            background: #e3efff;
            border-radius: 20px;
            overflow: hidden;
        }

        #progressoInterno {
            width: 0%;
            height: 100%;
            background: #a8d5ff;
            transition: width .4s ease;
        }

        .contadores {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }

        .icone-contador {
            width: 16px;
            vertical-align: middle;
        }

        /* =====================================================
           ÁREA DE JOGO (GRANDE E SEM LIMITES)
        ===================================================== */
        .cartao {
            background: white;
            width: 95%; /* Expandido */
            margin: 10px auto;
            padding: 50px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .imagem {
            width: 280px; /* Imagem central de destaque */
            height: auto;
            margin-bottom: 30px;
        }

        .entrada {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #campoEscrita {
            font-size: 26px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #333; /* Estilo mais sóbrio como na imagem */
            border-radius: 12px;
            text-align: center;
            outline: none;
        }

        #validar, .btn-continuar, .btn-recomecar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 50px;
            font-size: 20px;
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 10px;
            cursor: pointer;
            color: #1565c0;
            transition: background 0.2s;
        }

        #validar:hover { background: #bbdefb; }

        /* =====================================================
           FEEDBACK SÓBRIO & CENTRADO
        ===================================================== */
        #feedback {
            margin-top: 30px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .feedback-certo {
            font-size: 60px;
            color: #4caf50;
        }

        .feedback-errado {
            width: 100%;
            max-width: 500px;
            background: #fcf4f4; /* Fundo sóbrio */
            padding: 20px;
            border-radius: 12px;
            color: #d32f2f;
        }

        .palavra-correta {
            display: block;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .icone-lupa, .icone-continuar {
            width: 20px;
            opacity: 0.7;
        }

        /* Animação */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.3s; border-color: #d32f2f !important; }

    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/270E.svg" class="icone-cabecalho">
        <h1 style="margin:0; font-size: 22px; color: #0d47a1;">Escrita de Palavras</h1>
        <img src="img/10214904.png" class="icone-cabecalho" onerror="this.style.display='none'">
    </div>
</header>

<div class="progresso">
    <div class="barra">
        <div id="progressoInterno"></div>
    </div>
    <div class="contadores">
        <span id="certas">Certas: 0</span>
        <span id="erros">Erradas: 0</span>
    </div>
</div>

<div id="areaJogo" class="cartao">
    <img id="imagemPalavra" src="" class="imagem">

    <div class="entrada">
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>

</body>
</html>
