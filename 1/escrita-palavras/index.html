<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras</title>
    <style>
        /* =====================================================
           GERAL E ESTRUTURA (Compacto para evitar scroll)
        ===================================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #f0f7ff;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Evita scroll horizontal */
        }

        .cabecalho {
            background: linear-gradient(135deg, #bde6ff 0%, #7ac7f0 100%);
            padding: 10px 0; /* Reduzido */
            border-bottom: 2px solid #ffffff;
        }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .icone-cabecalho {
            width: 40px; /* Reduzido */
            height: auto;
        }

        .titulo-cabecalho {
            margin: 0;
            font-size: 24px; /* Reduzido */
            color: #0d47a1;
        }

        /* PROGRESSO */
        .progresso {
            width: 95%;
            margin: 10px auto 5px auto;
        }

        .barra {
            width: 100%;
            height: 10px;
            background: #e3efff;
            border-radius: 10px;
            overflow: hidden;
        }

        #progressoInterno {
            width: 0%;
            height: 100%;
            background: #7ac7f0;
            transition: width .4s ease;
        }

        .contadores {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        /* =====================================================
           ÁREA DE JOGO (CENTRADA E COMPACTA)
        ===================================================== */
        .cartao {
            background: white;
            width: 95%;
            margin: 10px auto;
            padding: 20px; /* Reduzido para poupar espaço */
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center; /* Garante que tudo no cartão está centrado */
        }

        .imagem {
            width: 180px; /* Reduzido para evitar o scroll */
            height: auto;
            margin-bottom: 15px;
        }

        .entrada {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        #campoEscrita {
            font-size: 22px;
            padding: 10px;
            width: 100%;
            max-width: 300px;
            border: 2px solid #7ac7f0;
            border-radius: 10px;
            text-align: center;
            outline: none;
        }

        #validar {
            padding: 10px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #e8f4ff;
            border: 2px solid #90caf9;
            border-radius: 10px;
            cursor: pointer;
            color: #1565c0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* =====================================================
           FEEDBACK (CORREÇÃO DE ALINHAMENTO)
        ===================================================== */
        #feedback {
            margin-top: 15px;
            width: 100%;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center; /* CENTRA HORIZONTALMENTE */
            justify-content: center; /* CENTRA VERTICALMENTE */
            text-align: center;
        }

        .feedback-certo {
            font-size: 50px;
            color: #4caf50;
        }

        .feedback-errado {
            width: 100%;
            max-width: 500px;
            background: #fff5f5;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #fde2e2;
            color: #d32f2f;
            display: flex;
            flex-direction: column;
            align-items: center; /* GARANTE QUE O CONTEÚDO DO ERRO ESTÁ CENTRADO */
        }

        .palavra-correta {
            display: block;
            margin: 5px 0 10px 0;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
        }

        .btn-continuar {
            background: #ffffff;
            border: 2px solid #90caf9;
            padding: 8px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #1565c0;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .icone-contador, .icone-lupa, .icone-continuar {
            width: 20px;
            height: auto;
        }

        /* ANIMAÇÃO */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.3s; border-color: #d32f2f !important; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho">
        <h1 class="titulo-cabecalho">Escrita de Palavras</h1>
        <img src="img/10214904.png" class="icone-cabecalho" onerror="this.style.display='none'">
    </div>
</header>

<div class="progresso">
    <div class="barra">
        <div id="progressoInterno"></div>
    </div>
    <div class="contadores">
        <span id="certas"><img src="img/certo.png" class="icone-contador"> Certas: 0</span>
        <span id="erros"><img src="img/errado.png" class="icone-contador"> Erradas: 0</span>
    </div>
</div>

<div id="areaJogo" class="cartao">
    <img id="imagemPalavra" src="" class="imagem">

    <div class="entrada">
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>

</body>
</html>
