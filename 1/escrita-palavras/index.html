<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrita de Palavras</title>
    <style>
        /* =====================================================
           GERAL
        ===================================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #f2f7ff;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .cabecalho {
            background: linear-gradient(#d6ecff, #bde6ff);
            padding: 15px 0;
            border-bottom: 2px solid #7ac7f0;
        }

        .cabecalho-conteudo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .icone-cabecalho {
            width: 50px;
            height: auto;
        }

        /* =====================================================
           PROGRESSO
        ===================================================== */
        .progresso {
            width: 90%;
            max-width: 800px;
            margin: 20px auto 10px auto;
        }

        .barra {
            width: 100%;
            height: 14px;
            background: #d3e7ff;
            border-radius: 10px;
            overflow: hidden;
        }

        #progressoInterno {
            width: 0%;
            height: 100%;
            background: #7ac7f0;
            transition: width .4s ease;
        }

        .contadores {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        .icone-contador {
            width: 20px;
            height: auto;
            vertical-align: middle;
            margin-right: 5px;
        }

        /* =====================================================
           CARTÃO DO JOGO (ÁREA BRANCA AMPLIADA)
        ===================================================== */
        .cartao {
            background: white;
            width: 95%; /* Aumentado de 85% para 95% */
            /* Removido o max-width para não ter limite de largura */
            margin: 20px auto;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        .imagem {
            width: 250px; /* Imagem ligeiramente maior para acompanhar a área */
            height: auto;
            margin-bottom: 25px;
            border-radius: 10px;
        }

        .entrada {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #campoEscrita {
            font-size: 24px;
            padding: 15px;
            width: 100%;
            max-width: 350px; /* Input um pouco mais largo */
            border: 2px solid #7ac7f0;
            border-radius: 12px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        #campoEscrita:focus {
            border-color: #004aad;
        }

        #validar, .btn-continuar, .btn-recomecar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #e8f4ff;
            border: 2px solid #7ac7f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #004aad;
        }

        #validar:hover, .btn-continuar:hover, .btn-recomecar:hover {
            background: #bde6ff;
            transform: translateY(-2px);
        }

        /* =====================================================
           FEEDBACK
        ===================================================== */
        #feedback {
            margin-top: 30px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .feedback-certo {
            font-size: 60px;
            color: #2d8a23;
        }

        .feedback-errado {
            width: 100%;
            max-width: 600px; /* Limite apenas para a caixa de texto não ficar desmesurada */
            background: #fdf2f2;
            border-radius: 12px;
            padding: 20px 0;
            color: #b30000;
            font-size: 32px;
        }

        .palavra-correta {
            color: #444;
            font-weight: bold;
            display: block;
            margin-top: 8px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .icone-lupa, .icone-continuar {
            width: 24px;
        }

        /* Animação */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.3s ease-in-out; border-color: #b30000 !important; }

    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho">
        <h1 style="margin:0; font-size: 26px;">Escrita de Palavras</h1>
        <img src="img/10214904.png" class="icone-cabecalho" onerror="this.style.display='none'">
    </div>
</header>

<div class="progresso">
    <div class="barra">
        <div id="progressoInterno"></div>
    </div>
    <div class="contadores">
        <span id="certas"><img src="img/certo.png" class="icone-contador"> Certas: 0</span>
        <span id="erros"><img src="img/errado.png" class="icone-contador"> Erradas: 0</span>
    </div>
</div>

<div id="areaJogo" class="cartao">
    <img id="imagemPalavra" src="" class="imagem">

    <div class="entrada">
        <input id="campoEscrita" type="text" placeholder="Escreve aqui..." autocomplete="off">
        <button id="validar">
            <img src="img/lupa.png" class="icone-lupa"> Verificar
        </button>
    </div>

    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script src="js/jogo.js"></script>

</body>
</html>
