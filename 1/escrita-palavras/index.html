<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Escrita de Palavras</title>

    <link rel="stylesheet" href="css/jogo.css">
</head>

<body>

    <!-- CABEÇALHO -->
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <img src="https://openmoji.org/data/color/svg/2328.svg" class="icone-cabecalho">
            <h1 class="titulo-cabecalho">Escrita de Palavras</h1>
            <img src="img/10214904.png" class="icone-cabecalho">
        </div>
        <div class="linha-cabecalho"></div>
    </header>

    <!-- PROGRESSO -->
    <div class="progresso">
        <div class="barra">
            <div id="progressoInterno"></div>
        </div>

        <div class="contadores">
            <span id="certas">
                <img src="img/certo.png" class="icone-contador"> Certas: 0
            </span>

            <span id="erros">
                <img src="img/errado.png" class="icone-contador"> Erradas: 0
            </span>
        </div>
    </div>

    <!-- CARTÃO DO JOGO -->
    <div id="areaJogo" class="cartao">

        <img id="imagemPalavra" src="" alt="imagem da palavra" class="imagem">

        <!-- INPUT + BOTÃO ALINHADOS E CENTRADOS -->
        <div class="entrada">
            <input id="campoEscrita"
                type="text"
                placeholder="Escreve aqui..."
                autocomplete="off">

            <button id="validar">
                <img src="img/lupa.png" class="icone-lupa"> Verificar
            </button>
        </div>

        <div id="feedback"></div>

    </div>

    <!-- JS -->
    <script src="js/dados.js"></script>
    <script src="js/jogo.js"></script>

</body>
</html>
