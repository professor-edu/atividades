<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Sílabas</title>

    <!-- Ficheiro CSS correto -->
    <link rel="stylesheet" href="css/jogo.css">
</head>

<body>

    <!-- CABEÇALHO -->
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <img src="https://openmoji.org/data/color/svg/270F.svg" class="icone-cabecalho">
            <h1 class="titulo-cabecalho">Ordenar Sílabas</h1>
            <img src="img/10223302.png" class="icone-cabecalho">
        </div>
        <div class="linha-cabecalho"></div>
    </header>

    <!-- PROGRESSO -->
    <div class="progresso">
        <div class="barra">
            <div id="progressoInterno"></div>
        </div>

        
<div class="contadores">
    <span id="certas">
       <img src="img/certo.png" class="icone-contador"> Certas: 0
    </span>

    <span id="erros">
        <img src="img/errado.png" class="icone-contador"> Erros: 0
    </span>
</div>

    <!-- CARTÃO DO JOGO -->
    <div id="areaJogo" class="cartao">

        <img id="imagemPalavra" src="" alt="imagem da palavra" class="imagem">

        <div id="silabas" class="silabas"></div>

        <input id="campoEscrita"
               type="text"
               placeholder="Escreve aqui..."
               autocomplete="off">

        <button id="validar">Validar</button>

        <div id="feedback"></div>

    </div>

    <!-- Ficheiros JS corretos -->
    <script src="js/dados.js"></script>
    <script src="js/jogo.js"></script>

</body>
</html>
