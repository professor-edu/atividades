<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Escrita de Palavras</title>
    css/jogo.css
</head>

<body>

    <!-- CABEÇALHO -->
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <img src="https://openmoji.org/data/color/svg/270F.svg" class="icone-cabecalho">
            <h1 class="titulo-cabecalho">Escrita de Palavras</h1>
            <img src="img/10214904.png" class="icone-cabecalho">
        </div>
        <div class="linha-cabecalho"></div>
    </header>

    <!-- PROGRESSO -->
    <div class="progresso">
        <div class="barra">
            <div id="progressoInterno2"></div>
        </div>

        <div class="contadores">
            <span id="certas2">
                <img src="img/certo.png" class="icone-contador"> Certas: 0
            </span>
            <span id="erros2">
                <img src="img/errado.png" class="icone-contador"> Erradas: 0
            </span>
        </div>
    </div>

    <!-- CARTÃO DO JOGO -->
    <div id="areaJogo2" class="cartao">

        <img id="imagemPalavra2" src="" alt="imagem da palavra" class="imagem">

        <input id="campoEscrita2"
               type="text"
               placeholder="Escreve aqui..."
               autocomplete="off">

        <button id="validar2">
           <img src="img/lupa.png" Verificar>
        </button>

        <div id="feedback2"></div>

    </div>

    <!-- JS -->
    js/dados2.js</script>
    js/jogo2.js</script>

</body>
</html>
