<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual Falta?</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --vermelho: #e53935;
            --laranja: #ff9800;
        }

        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: var(--azul-claro); margin: 0; overflow-x: hidden; }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px; color: var(--azul-escuro); border-bottom: 3px solid #fff; 
        }

        .cabecalho-principal {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .icone-questao {
            width: 40px;
            height: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .icone-questao:hover { transform: scale(1.1); }

        .pontos { font-size: 24px; font-weight: bold; color: #f57c00; margin: 10px 0; transition: all 0.3s; }
        .perdeu-estrela { color: var(--vermelho); transform: scale(1.2); }

        .cartao-xl {
            background: white; width: 90%; max-width: 800px;
            margin: 20px auto; padding: 40px;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            min-height: 500px;
        }

        .imagem-ajuda { max-height: 250px; border-radius: 20px; }

        .palavra-lacuna {
            font-size: 80px; font-weight: bold; letter-spacing: 10px;
            color: var(--azul-escuro); text-transform: uppercase; margin: 20px 0;
        }

        .lacuna { color: var(--laranja); border-bottom: 5px solid var(--laranja); padding: 0 10px; }

        .container-opcoes { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }

        .btn-letra {
            width: 100px; height: 100px; font-size: 50px; font-weight: bold;
            background: white; border: 4px solid var(--azul-medio);
            color: var(--azul-escuro); border-radius: 20px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
        }

        .btn-letra:hover { transform: scale(1.1); background: var(--azul-claro); }
        .btn-letra.correto { background: var(--verde); color: white; border-color: var(--verde); }
        .btn-letra.errado { background: var(--vermelho); color: white; border-color: var(--vermelho); }

        #feedback { font-size: 24px; font-weight: bold; min-height: 40px; margin-top: 20px; }
        .btn-acao { margin-top: 15px; padding: 12px 40px; background: var(--azul-medio); border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-principal">
        <h1 style="margin:0">Qual Falta?</h1>
        <img src="questao.png" alt="Ajuda" class="icone-questao" onclick="mostrarAjuda()">
    </div>
    <div class="pontos" id="area-pontos">⭐ Estrelas: <span id="valorPontos">10</span></div>
</header>

<main class="cartao-xl" id="conteudo-jogo">
    <img id="imagem" class="imagem-ajuda" src="">
    
    <div id="display-palavra" class="palavra-lacuna"></div>

    <div class="container-opcoes" id="opcoes-letras"></div>

    <div id="feedback"></div>
</main>

<script src="js/dados.js"></script>
<script>
    let indice = 0;
    let estrelas = 10;
    // Seleciona 10 desafios aleatórios do dados.js
    let lista = [...palavras].sort(() => 0.5 - Math.random()).slice(0, 10);

    function mostrarAjuda() {
        alert("Como jogar:\n1. Olha para a imagem e para a palavra.\n2. Falta uma letra onde está o ponto de interrogação.\n3. Clica na letra certa para ganhar! ✨\n4. Se errares, perdes uma estrela. ⭐");
    }

    function carregar() {
        if (indice >= lista.length || estrelas <= 0) {
            finalizarJogo();
            return;
        }

        const item = lista[indice];
        document.getElementById('imagem').src = item.imagem;
        document.getElementById('feedback').innerHTML = "";
        
        // Se não houver lacuna definida no dados.js, retira a primeira letra
        let correta = item.correta || item.palavra[0];
        let base = item.falta || "_" + item.palavra.substring(1);
        
        document.getElementById('display-palavra').innerHTML = base.replace("_", "<span class='lacuna'>?</span>");

        // Gerar opções (se não houver no dados.js, gera aleatórias)
        let letrasOpcoes = item.opcoes || gerarOpcoesAleatorias(correta);
        
        const container = document.getElementById('opcoes-letras');
        container.innerHTML = "";
        
        letrasOpcoes.forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-letra';
            btn.innerText = letra;
            btn.onclick = () => verificar(letra, correta, btn);
            container.appendChild(btn);
        });
    }

    function verificar(escolha, correta, btn) {
        const feedback = document.getElementById('feedback');
        
        if (escolha.toLowerCase() === correta.toLowerCase()) {
            btn.classList.add('correto');
            feedback.innerHTML = "<span style='color: var(--verde)'>Excelente! ✨</span>";
            document.getElementById('display-palavra').innerText = lista[indice].palavra.toUpperCase();
            
            setTimeout(() => {
                indice++;
                carregar();
            }, 2000);
        } else {
            estrelas--;
            atualizarEstrelasVisual();
            btn.classList.add('errado');
            feedback.innerHTML = "<span style='color: var(--vermelho)'>Ups! Perdeste uma estrela.</span>";
            
            if (estrelas <= 0) setTimeout(finalizarJogo, 1000);
        }
    }

    function atualizarEstrelasVisual() {
        const span = document.getElementById('valorPontos');
        const area = document.getElementById('area-pontos');
        span.innerText = estrelas;
        area.classList.add('perdeu-estrela');
        setTimeout(() => area.classList.remove('perdeu-estrela'), 500);
    }

    function gerarOpcoesAleatorias(correta) {
        let alfabeto = "abcdefghijklmnopqrstuvwxyzç";
        let erradas = alfabeto.replace(correta, "").split("");
        let final = [correta];
        for(let i=0; i<2; i++) {
            let rand = Math.floor(Math.random() * erradas.length);
            final.push(erradas.splice(rand, 1)[0]);
        }
        return final.sort(() => 0.5 - Math.random());
    }

    function finalizarJogo() {
        const cartao = document.getElementById('conteudo-jogo');
        let mensagemFinal = estrelas >= 8 ? "És um mestre das letras! 🏆" : (estrelas > 0 ? "Muito bem! 👍" : "Tenta outra vez! 💪");
        
        cartao.innerHTML = `
            <div style="padding: 20px;">
                <h2 style="color: var(--azul-escuro); font-size: 36px;">Jogo Terminado!</h2>
                <p style="font-size: 60px; margin: 10px 0;">${estrelas > 0 ? '⭐' : '☁️'}</p>
                <p style="font-size: 24px;">Terminaste com <strong>${estrelas}</strong> estrelas!</p>
                <p style="font-size: 20px; color: #555;">${mensagemFinal}</p>
                <button class="btn-acao" onclick="location.reload()" style="background:var(--azul-escuro); padding: 15px 50px; font-size: 22px; margin-top: 20px;">Recomeçar</button>
            </div>
        `;
    }

    window.onload = carregar;
</script>

</body>
</html>
