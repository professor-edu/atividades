<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qual Falta? 🤔</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
            --cinza-claro: #d1d8e0;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        
        /* HEADER IGUAL AO TEMPLATE */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
            height: 85px; flex-shrink: 0; z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 3; }
        
        .cabecalho h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .icone-cabecalho { 
            width: 70px !important; 
            height: 70px !important; 
            object-fit: contain;
            filter: drop-shadow(2px 2px 0px rgba(255,255,255,0.4));
            cursor: pointer;
        }

        /* MENU IGUAL AO TEMPLATE (SEM ANIMAÇÃO, FONTE 700) */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            padding: 10px 18px; border-radius: 25px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px;
            transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        .onda-container {
            height: 45px; width: 100%; overflow: hidden;
            margin-top: -1px; flex-shrink: 0; z-index: 10;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3));
        }

        /* STATUS E ETAPAS */
        .status-jogo { 
            padding: 10px; flex-shrink: 0; position: relative; z-index: 25;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .etapas-container { display: flex; gap: 10px; justify-content: center; }
        
        .etapa {
            width: 35px; height: 35px; border-radius: 50%;
            background: white; border: 3px solid var(--cinza-claro);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--cinza-claro);
            transition: all 0.4s ease;
        }
        .etapa.ativa { border-color: var(--azul-vibrante); color: var(--azul-vibrante); transform: scale(1.2); box-shadow: 0 0 10px rgba(0,145,255,0.3); }
        .etapa.concluida { background: var(--verde); border-color: var(--verde); color: white; }

        .vidas-texto { font-weight: 700; color: var(--vermelho); font-size: 1.1rem; }

        #main-content { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 0; padding: 15px;
        }

        /* CARTÃO XL 800px */
        .cartao-xl {
            background: white; width: 95%; max-width: 800px;
            padding: 30px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .imagem-ajuda { max-height: 220px; border-radius: 20px; border: 3px solid var(--azul-claro); padding: 5px; }

        .palavra-lacuna {
            font-size: 75px; font-weight: 800; letter-spacing: 12px;
            color: var(--azul-escuro); text-transform: uppercase; margin: 10px 0;
        }
        .lacuna { color: var(--laranja); border-bottom: 8px solid var(--laranja); padding: 0 10px; }

        .container-opcoes { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }

        .btn-letra {
            width: 95px; height: 95px; font-size: 48px; font-weight: 800;
            background: var(--azul-janela-fundo); border: 4px solid #add8e6;
            color: var(--azul-escuro); border-radius: 22px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
            box-shadow: 0 6px 0px #add8e6;
        }
        .btn-letra:hover { transform: translateY(-3px); background: white; }
        .btn-letra.correto { background: var(--verde) !important; color: white; border-color: #388e3c; box-shadow: 0 6px 0px #388e3c; }
        .btn-letra.errado { background: var(--vermelho) !important; color: white; border-color: #b71c1c; box-shadow: 0 6px 0px #b71c1c; }

        #feedback { font-size: 24px; font-weight: 700; min-height: 35px; }

        /* FOOTER IGUAL AO TEMPLATE */
        footer {
            height: 50px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid #eee; width: 100%;
        }

        @media (max-width: 600px) {
            .cabecalho h1 { font-size: 1.4rem; }
            .palavra-lacuna { font-size: 40px; letter-spacing: 5px; }
            .btn-letra { width: 70px; height: 70px; font-size: 28px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> MENU
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="confuso.png" class="icone-cabecalho" alt="ajuda" onclick="mostrarAjuda()"> 
        <h1>Qual Falta?</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <defs>
            <linearGradient id="grad-onda-final" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="stroke: none; fill: url(#grad-onda-final);"></path>
    </svg>
</div>

<div class="status-jogo">
    <div class="etapas-container" id="missao-etapas"></div>
    <div class="vidas-texto">Vidas: <span id="vidas-restantes">10</span> ❤️</div>
</div>

<main id="main-content">
    <div class="cartao-xl" id="jogo-container">
        <img id="img-pergunta" class="imagem-ajuda" src="" alt="carregando...">
        <div id="display-palavra" class="palavra-lacuna"></div>
        <div class="container-opcoes" id="opcoes-letras"></div>
        <div id="feedback"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    let indice = 0; let vidas = 10; let lista = [];

    function inicializarEtapas() {
        const container = document.getElementById('missao-etapas');
        container.innerHTML = "";
        for (let i = 0; i < 10; i++) {
            const div = document.createElement('div');
            div.className = 'etapa';
            div.id = `etapa-${i}`;
            div.innerText = i + 1;
            container.appendChild(div);
        }
    }

    if (typeof palavras !== 'undefined') {
        lista = [...palavras].sort(() => 0.5 - Math.random()).slice(0, 10);
    }

    function carregar() {
        if (indice >= lista.length || vidas <= 0) { finalizarJogo(); return; }
        for(let i=0; i<10; i++) {
            const el = document.getElementById(`etapa-${i}`);
            el.classList.remove('ativa');
            if (i < indice) el.classList.add('concluida');
            if (i === indice) el.classList.add('ativa');
        }
        const item = lista[indice];
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('feedback').innerText = "";
        let correta = item.correta || item.palavra[0];
        let base = item.falta || "_" + item.palavra.substring(1);
        document.getElementById('display-palavra').innerHTML = base.replace("_", "<span class='lacuna'>?</span>");
        
        let letrasOpcoes = item.opcoes || gerarOpcoesAleatorias(correta);
        const container = document.getElementById('opcoes-letras');
        container.innerHTML = "";
        letrasOpcoes.forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'btn-letra';
            btn.innerText = letra;
            btn.onclick = () => verificar(letra, correta, btn);
            container.appendChild(btn);
        });
    }

    function verificar(escolha, correta, btn) {
        if (escolha.toLowerCase() === correta.toLowerCase()) {
            btn.classList.add('correto');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Boa! ✅</span>";
            document.getElementById('display-palavra').innerText = lista[indice].palavra.toUpperCase();
            setTimeout(() => { indice++; carregar(); }, 1500);
        } else {
            vidas--;
            document.getElementById('vidas-restantes').innerText = vidas;
            btn.classList.add('errado');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Tenta outra vez! ❌</span>";
            if (vidas <= 0) setTimeout(finalizarJogo, 1000);
        }
    }

    function gerarOpcoesAleatorias(correta) {
        let alfabeto = "abcdefghijklmnopqrstuvwxyzç";
        let erradas = alfabeto.replace(correta.toLowerCase(), "").split("");
        let final = [correta];
        for(let i=0; i<2; i++) {
            let rand = Math.floor(Math.random() * erradas.length);
            final.push(erradas.splice(rand, 1)[0]);
        }
        return final.sort(() => 0.5 - Math.random());
    }

    function finalizarJogo() {
        document.getElementById('jogo-container').innerHTML = `
            <h2 style="color: var(--azul-escuro); font-size: 32px;">${vidas > 0 ? '🏆 Muito Bem!' : 'Fim de Jogo! ☁️'}</h2>
            <p style="font-size: 1.2rem;">Completaste <strong>${indice}</strong> de 10 palavras.</p>
            <button onclick="location.reload()" class="btn-menu" style="margin: 20px auto; padding: 15px 30px;">Recomeçar</button>
        `;
    }

    function mostrarAjuda() { alert("Olha para a imagem e clica na letra que falta!"); }
    window.onload = () => { inicializarEtapas(); carregar(); };
</script>
</body>
</html>
