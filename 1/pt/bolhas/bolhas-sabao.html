<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Bolhas de Sabão 🧼</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

			body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
			header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
			.header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
			.nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
			.hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
			.hamburger:hover { background: #fff9c4; }
			.hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
			.hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
			.hamburger.open span:nth-child(2) { opacity: 0; }
			.hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
			.btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
			.btn-voltar:hover { transform: scale(1.05); }
			h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
			.subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
		.cartao-jogo-container { 
            background: #a3e4ff; /* Fundo azul claro a imitar o céu */
            background-image: linear-gradient(to bottom, #a3e4ff, #e3f2fd);
            width: 100%; max-width: 900px; height: 650px; /* Altura fixa para as bolhas terem espaço */
            border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; 
            align-items: center; position: relative; overflow: hidden; 
        }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
		footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        .status-bar { width: 100%; max-width: 700px; margin-bottom: 0; display: none; }
        .score-container { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 1.3rem; padding: 0 15px; }
        .score-certas { color: #219d53; }
        .score-erradas { color: #d0303f; }
        .progress-bg { background-color: white; border-radius: 15px; height: 22px; width: 100%; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .progress-fill { background-color: var(--cor-1ano); height: 100%; width: 0%; border-radius: 15px; transition: width 0.4s ease-out; }

        /* =========================================
           PAINEL SUPERIOR (IMAGEM + SÍLABAS)
           ========================================= */
        #painel-alvo {
            background: rgba(255, 255, 255, 0.9);
            width: 90%;
            margin-top: 20px;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 5;
        }

        .img-alvo {
            height: 110px;
            object-fit: contain;
            animation: fadeIn 0.5s ease;
        }

        .silabas-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .silaba-slot {
            width: 70px;
            height: 60px;
            border: 3px dashed #ced6e0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--azul-escuro);
            background-color: rgba(255,255,255,0.5);
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .silaba-slot.preenchida {
            border: 3px solid #2ed573;
            background-color: #eafff0;
            color: #219d53;
            animation: popIn 0.3s ease;
        }

        /* =========================================
           ÁREA E ANIMAÇÃO DAS BOLHAS
           ========================================= */
        #area-bolhas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Deixa passar cliques nas bolhas */
            overflow: hidden;
            z-index: 2;
        }

        .bolha {
            position: absolute;
            bottom: -100px;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(0, 145, 255, 0.3) 60%, rgba(0, 145, 255, 0.6));
            box-shadow: inset 0 0 20px rgba(255,255,255,0.7), 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #0d47a1;
            cursor: pointer;
            user-select: none;
            pointer-events: auto; /* A bolha é clicável */
            text-transform: uppercase;
            text-shadow: 1px 1px 2px white;
            transition: transform 0.1s ease;
        }

        .bolha:active {
            transform: scale(0.95);
        }

        .bolha.estourada {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            color: transparent !important;
            text-shadow: none !important;
            transform: scale(1.5) !important;
            pointer-events: none;
        }

        .bolha.estourada::after {
            content: "💦";
            font-size: 3rem;
            color: white;
            position: absolute;
            animation: fadeOut 0.4s forwards;
        }

        /* Animação CSS para fazer a bolha flutuar para cima e abanar um pouco */
        @keyframes flutuar {
            0% { transform: translateY(0) translateX(0px); }
            33% { transform: translateY(-400px) translateX(20px); }
            66% { transform: translateY(-800px) translateX(-20px); }
            100% { transform: translateY(-1200px) translateX(0px); }
        }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            
            main { padding: 15px 10px; }
            .cartao-jogo-container { height: 550px; padding: 0; }
            .img-alvo { height: 80px; }
            .silaba-slot { width: 50px; height: 50px; font-size: 1.4rem; }
            .bolha { width: 75px; height: 75px; font-size: 1.4rem; }
        }

        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; animation: fadeIn 0.5s ease; z-index: 20; background: rgba(255,255,255,0.9); position: absolute; top: 0; left: 0;}
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; }
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; }
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 80% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-2deg); } 50% { transform: translateX(8px) rotate(2deg); } 75% { transform: translateX(-8px) rotate(-2deg); } }
        
        .error-shake { animation: shake 0.4s ease-in-out; border: 2px solid #ff4757 !important; background: rgba(255, 71, 87, 0.3) !important; }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Bolhas de Sabão 🧼</h1>
        <div class="subtitulo">Clica nas sílabas certas para formar a palavra.</div>
    </div>
</header>

<main>
    <div id="status-bar-container" class="status-bar">
        <div class="score-container">
            <span class="score-certas">✔️ Certas: <span id="val-certas">0</span></span>
            <span class="score-erradas">❌ Erradas: <span id="val-erradas">0</span></span>
        </div>
        <div class="progress-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="cartao-jogo-container" id="game-container">
        
        <!-- PAINEL SUPERIOR -->
        <div id="painel-alvo">
            <img id="img-alvo" class="img-alvo" src="" alt="Imagem secreta">
            <div id="silabas-slots" class="silabas-container">
                <!-- Espaços vazios injetados por JS -->
            </div>
        </div>

        <!-- ÁREA ONDE AS BOLHAS NASCEM -->
        <div id="area-bolhas"></div>

        <!-- ECRÃ FINAL -->
        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Fim do Jogo! 🎉</h2>
            <div class="end-stats">
                Formaste <strong id="final-certas" style="color:#2ed573">0</strong> palavras<br>
                Estouraste bolhas erradas <strong id="final-erradas" style="color:#ff4757">0</strong> vezes.
            </div>
            <button class="btn-reiniciar" onclick="iniciarJogo()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script src="dados.js"></script>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    const MAX_PALAVRAS = 6; // Jogo rápido para não cansar as crianças
    let palavrasDoJogo =[];
    let palavraAtualIndex = 0;
    
    // Status
    let palavrasCertas = 0;
    let cliquesErrados = 0;
    let isTransitando = false; // Pausa a criação de bolhas entre palavras
    let spawnInterval = null;

    // Lógica das Sílabas
    let silabasAlvo = [];
    let todasSilabasExistentes =[];

    // Elementos DOM
    const elImgAlvo = document.getElementById('img-alvo');
    const elSilabasSlots = document.getElementById('silabas-slots');
    const areaBolhas = document.getElementById('area-bolhas');
    
    const elEndScreen = document.getElementById('end-screen');
    const statusBar = document.getElementById('status-bar-container');
    const elValCertas = document.getElementById('val-certas');
    const elValErradas = document.getElementById('val-erradas');
    const elProgressFill = document.getElementById('progress-fill');

    function getImagePath(imgPath) {
        if (!imgPath) return '';
        return imgPath.replace('img/', '../img/');
    }

    function iniciarJogo() {
        palavrasCertas = 0; cliquesErrados = 0; palavraAtualIndex = 0; isTransitando = false;
        atualizarPlacar();
        
        elEndScreen.style.display = 'none';
        statusBar.style.display = 'block';
        areaBolhas.innerHTML = '';
        
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        // Prepara lista universal de sílabas para usar como intrusas
        todasSilabasExistentes =[];
        palavras.forEach(p => {
            if(p.divisao) p.divisao.split('-').forEach(s => todasSilabasExistentes.push(s));
        });
        todasSilabasExistentes = [...new Set(todasSilabasExistentes)]; // Remover repetidas

        // Baralha o dataset e seleciona 6 palavras
        let baralhadas = [...palavras].sort(() => Math.random() - 0.5);
        palavrasDoJogo = baralhadas.slice(0, Math.min(MAX_PALAVRAS, palavras.length));
        
        carregarPalavra();
    }

    function carregarPalavra() {
        isTransitando = false;
        const palavraObj = palavrasDoJogo[palavraAtualIndex];
        
        elProgressFill.style.width = `${(palavraAtualIndex / palavrasDoJogo.length) * 100}%`;
        
        // Configurar a imagem e alvo
        elImgAlvo.src = getImagePath(palavraObj.imagem);
        elSilabasSlots.innerHTML = '';
        
        // Criar o estado interno das sílabas (Ex: MA-CA-CO)
        const silabasArray = palavraObj.divisao.split('-');
        silabasAlvo = silabasArray.map((silaba, index) => {
            return {
                silaba: silaba,
                encontrada: false,
                id: index
            };
        });

        // Criar os caixotes pontilhados vazios
        silabasAlvo.forEach(() => {
            const slot = document.createElement('div');
            slot.className = 'silaba-slot';
            slot.textContent = '?';
            elSilabasSlots.appendChild(slot);
        });

        // Iniciar a máquina de bolhas!
        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnBolha, 1200); // 1 bolha a cada 1.2 segundos
    }

    function spawnBolha() {
        if (isTransitando) return;

        // Quais as sílabas que ainda faltam estourar?
        let silabasFalta = silabasAlvo.filter(s => !s.encontrada);
        if (silabasFalta.length === 0) return; // Se já encontrou todas, não faz nada

        let silabaDestaBolha = "";
        
        // 50% de probabilidade de sair uma sílaba correta vs errada
        if (Math.random() < 0.5) {
            // Escolhe aleatoriamente uma das corretas que ainda faltam
            let alvo = silabasFalta[Math.floor(Math.random() * silabasFalta.length)];
            silabaDestaBolha = alvo.silaba;
        } else {
            // Sorteia uma sílaba errada aleatória (que não pertença à palavra atual)
            let erradas = todasSilabasExistentes.filter(s => !silabasAlvo.some(alvo => alvo.silaba === s));
            silabaDestaBolha = erradas[Math.floor(Math.random() * erradas.length)];
        }

        criarElementoBolha(silabaDestaBolha);
    }

    function criarElementoBolha(textoSilaba) {
        const bolha = document.createElement('div');
        bolha.className = 'bolha';
        bolha.textContent = textoSilaba;

        // Posição X aleatória (entre 10% e 80% do ecrã para não sair fora)
        bolha.style.left = Math.floor(Math.random() * 70 + 10) + '%';
        
        // Velocidade aleatória para dar dinâmica
        const duracao = Math.floor(Math.random() * 4 + 7); // 4 a 6 segundos
        bolha.style.animation = `flutuar ${duracao}s linear forwards`;

        bolha.onclick = () => clicarNaBolha(textoSilaba, bolha);

        // Quando a animação acaba e a bolha sai do ecrã, limpamo-la do HTML para não pesar
        bolha.addEventListener('animationend', () => bolha.remove());

        areaBolhas.appendChild(bolha);
    }

    function clicarNaBolha(silabaClicada, bolhaElemento) {
        if (isTransitando) return;
        
        // Verifica se é uma sílaba que falta preencher
        let silabasFalta = silabasAlvo.filter(s => !s.encontrada);
        let alvoCorreto = silabasFalta.find(s => s.silaba === silabaClicada);

        if (alvoCorreto) {
            // ACERTOU 🟢
            alvoCorreto.encontrada = true;
            tocarSom('pop');
            
            // Animação da bolha
            bolhaElemento.classList.add('estourada');
            
            // Preencher o caixote correspondente no ecrã (Respeitando a ordem visual original)
            const slotsHtml = elSilabasSlots.children;
            slotsHtml[alvoCorreto.id].textContent = silabaClicada;
            slotsHtml[alvoCorreto.id].classList.add('preenchida');

            // Verifica se a palavra está completa
            if (silabasAlvo.every(s => s.encontrada)) {
                completouPalavra();
            }

        } else {
            // ERROU 🔴 (Ou clicou numa sílaba errada, ou numa correta que já tinha sido preenchida)
            cliquesErrados++;
            atualizarPlacar();
            tocarSom('erro');
            
            bolhaElemento.classList.add('error-shake');
            setTimeout(() => bolhaElemento.classList.remove('error-shake'), 400);
        }
    }

    function completouPalavra() {
        isTransitando = true;
        palavrasCertas++;
        atualizarPlacar();
        tocarSom('vitoria_curta');
        
        // Limpar bolhas do ecrã e parar o intervalo
        clearInterval(spawnInterval);
        
        // Pequena pausa para admirar a palavra completa antes da próxima
        setTimeout(() => {
            areaBolhas.innerHTML = '';
            palavraAtualIndex++;
            
            if (palavraAtualIndex < palavrasDoJogo.length) {
                carregarPalavra();
            } else {
                finalizarJogo();
            }
        }, 1500);
    }

    function atualizarPlacar() {
        elValCertas.textContent = palavrasCertas;
        elValErradas.textContent = cliquesErrados;
    }

    function finalizarJogo() {
        elProgressFill.style.width = `100%`;
        areaBolhas.innerHTML = ''; // Limpa bolhas residuais
        document.getElementById('painel-alvo').style.display = 'none';
        statusBar.style.display = 'none';
        elEndScreen.style.display = 'flex';
        
        document.getElementById('final-certas').textContent = palavrasCertas;
        document.getElementById('final-erradas').textContent = cliquesErrados;

        if (cliquesErrados === 0) {
            document.getElementById('end-title-text').textContent = "BOMBA DE SABÃO! 🏆";
            tocarSom('vitoria'); dispararConfetis();
        } else if (cliquesErrados <= 5) {
            document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
            tocarSom('vitoria'); dispararConfetis();
        } else {
            document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
            tocarSom('vitoria_curta'); 
        }
    }

    // Gerador Dinâmico de Sons
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'pop') {
            // Som realista de bolha de sabão a estourar
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, agora);
            osc.frequency.exponentialRampToValueAtTime(1500, agora + 0.05);
            gain.gain.setValueAtTime(0.3, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, agora);
            osc.frequency.exponentialRampToValueAtTime(100, agora + 0.2);
            gain.gain.setValueAtTime(0.15, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria_curta') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, agora);
            osc.frequency.setValueAtTime(659.25, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    // Efeito de Confetis
    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() {
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth;
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis =[];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#eccc68'];
        
        for (let i = 0; i < 100; i++) {
            confetis.push({
                x: Math.random() * canvasConfetti.width,
                y: Math.random() * canvasConfetti.height - canvasConfetti.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                cor: cores[Math.floor(Math.random() * cores.length)],
                velY: Math.random() * 3 + 2,
                velX: Math.random() * 2 - 1,
                rotacao: Math.random() * 360,
                velRotacao: Math.random() * 5 - 2.5
            });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;

        confetis.forEach(c => {
            c.y += c.velY;
            c.x += c.velX;
            c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;

            ctxConfetti.save();
            ctxConfetti.translate(c.x, c.y);
            ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor;
            ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
            ctxConfetti.restore();
        });

        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = iniciarJogo;

</script>
</body>
</html>
