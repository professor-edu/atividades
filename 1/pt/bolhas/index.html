<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Bolhas de Sabão 🧼</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Importação do ficheiro de dados externo -->
    <script src="../dados.js"></script>
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        /* =========================================
           CSS DO TEMPLATE BASE (1º ANO)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --cor-pt: #ff6b6b;
            --cor-destaque: #ff4757; 
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; touch-action: pan-y; }
        
        @media (min-width: 769px) and (min-height: 600px) { body { height: 100vh; overflow-y: hidden; } }

        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; touch-action: manipulation; }
        @media (hover: hover) { .hamburger:hover { background: #fff9c4; } }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer; touch-action: manipulation; }
        @media (hover: hover) { .btn-voltar:hover { transform: scale(1.05); } }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: flex; flex-direction: column; align-items: center; gap: 8px; }
            .nav-container { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; height: 40px; margin-bottom: 5px; transform: none; top: 0; }
            .hamburger { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); }
            .btn-voltar { margin: 0 auto; position: relative; z-index: 5; }
            h1 { text-align: center; font-size: 1.8rem; }
            .subtitulo { text-align: center; margin-top: 5px; }
        }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        @media (hover: hover) { .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 25px 20px; width: 100%; box-sizing: border-box; }

        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 950px; flex: 1; min-height: 0;
            padding: 25px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-pt); display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; position: relative; box-sizing: border-box; 
        }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; z-index: 10;}
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        /* =========================================
           MENU INICIAL E ECRÃS
           ========================================= */
        .ecra { width: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.4s ease; box-sizing: border-box; flex: 1; }
        .titulo-menu { font-size: 2rem; color: var(--azul-escuro); margin-bottom: 25px; font-weight: 900;}

        /* =========================================
           BARRA DE ESTADO DO JOGO
           ========================================= */
        .status-bar-jogo {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            width: 100%; background: #fdf2f2; padding: 8px 12px;
            border-radius: 20px; border: 2px solid var(--cor-pt); margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0;
        }

        .btn-voltar-menu { background-color: white; color: var(--azul-escuro); border: 2px solid var(--cor-pt); padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn-voltar-menu:hover { border-color: var(--azul-escuro); transform: scale(1.05); }
        
        .btn-dica { background-color: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .btn-dica:hover { border-color: #b18500; transform: scale(1.05); }
        .btn-dica.esgotada { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }

        .badge-ronda, .badge-erros { background: white; font-weight: 800; font-size: 1rem; padding: 6px 12px; border-radius: 15px; white-space: nowrap; }
        .badge-ronda { border: 2px solid #219d53; color: #219d53; }
        .badge-erros { border: 2px solid #ff4757; color: #ff4757; }

        .progress-bg { background-color: #e2e8f0; border-radius: 20px; height: 35px; flex: 1; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); border: 2px solid white; margin: 0 10px; }
        .progress-fill { height: 100%; width: 0%; border-radius: 20px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-color: var(--cor-1ano); background-image: linear-gradient(45deg, rgba(255, 255, 255, 0.2) 25%, transparent 25%, transparent 50%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0.2) 75%, transparent 75%, transparent); background-size: 30px 30px; animation: moverRiscas 2s linear infinite; }
        
        @media (max-width: 850px) {
            .status-bar-jogo { flex-wrap: wrap; justify-content: center; }
            .btn-voltar-menu, .btn-dica { padding: 4px 8px; font-size: 0.8rem;}
            .badge-ronda, .badge-erros { font-size: 0.9rem; padding: 4px 8px; }
            .progress-bg { order: 6; min-width: 100%; margin-top: 5px; height: 25px; margin: 5px 0 0 0;}
        }

        /* =========================================
           ÁREA DE JOGO LIVRE (Abaixo da status-bar)
           ========================================= */
        .area-jogo-custom {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            width: 100%; flex: 1; min-height: 0; background: #e3f2fd; border: 2px dashed #ced6e0; border-radius: 20px; padding: 15px; overflow: hidden; gap: 15px;
            position: relative; color: #94a3b8; font-weight: bold;
        }

        /* =========================================
           CSS ESPECÍFICO DO JOGO: BOLHAS DE SABÃO
           ========================================= */
        
        /* Animação Inicial Tutorial */
        .animacao-tutorial {
            position: relative; height: 250px; width: 100%; max-width: 400px; background: #e3f2fd;
            border-radius: 20px; border: 3px dashed #bcdcff; margin: 0 auto 30px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 20px; overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,145,255,0.1);
        }
        
        .tut-img-alvo { font-size: 55px; background: white; padding: 5px 15px; border-radius: 15px; border: 3px solid #fff; box-shadow: 0 5px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        .tut-silabas-slots { display: flex; gap: 10px; z-index: 5; }
        .tut-slot { 
            width: 60px; height: 60px; border: 3px dashed #ced6e0; border-radius: 15px; background: rgba(255,255,255,0.5); 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: var(--azul-escuro); text-transform: uppercase; 
        }
        .tut-slot.preenchido { border: 3px solid #2ed573; background: #eafff0; color: #219d53; animation: popInTut 3s infinite; }
        
        .tut-bolha { 
            position: absolute; bottom: -60px; width: 60px; height: 60px; border-radius: 50%; 
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(0, 145, 255, 0.3) 60%, rgba(0, 145, 255, 0.6)); 
            border: 1px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; font-weight: 900; color: #0d47a1; text-transform: uppercase; animation: floatBolhaTut 3s infinite; 
        }

        @keyframes popInTut {
            0%, 65% { opacity: 0; transform: scale(0.5); border: 3px dashed #ced6e0; background: rgba(255,255,255,0.5); color: transparent;}
            70% { opacity: 1; transform: scale(1.1); border: 3px solid #2ed573; background: #eafff0; color: #219d53;}
            80%, 100% { opacity: 1; transform: scale(1); border: 3px solid #2ed573; background: #eafff0; color: #219d53;}
        }
        @keyframes floatBolhaTut {
            0% { bottom: -60px; transform: scale(1); opacity: 1;}
            60% { bottom: 105px; transform: scale(1); opacity: 1;}
            65% { bottom: 105px; transform: scale(1.5); opacity: 0;}
            100% { bottom: 105px; transform: scale(1.5); opacity: 0;}
        }

        /* Imagem Alvo do Jogo */
        #painel-alvo {
            background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 600px; padding: 15px 30px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: row;
            align-items: center; justify-content: center; flex-wrap: wrap; gap: 25px; z-index: 5; margin-top: 10px;
        }

        .game-image { 
            height: 100px; object-fit: contain; border-radius: 12px; transition: transform 0.3s ease, filter 0.3s ease; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        @media (hover: hover) {
            .game-image:hover {
                transform: scale(1.1) translateY(-3px); 
                filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
            }
        }
        
        /* Caixas das Sílabas */
        .silabas-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

        .silaba-slot {
            width: 70px; height: 60px; border: 3px dashed #ced6e0; border-radius: 15px; display: flex; align-items: center;
            justify-content: center; font-size: 1.8rem; font-weight: 900; color: var(--azul-escuro); background-color: rgba(255,255,255,0.5);
            transition: all 0.3s; text-transform: uppercase;
        }

        .silaba-slot.preenchida {
            border: 3px solid #2ed573; background-color: #eafff0; color: #219d53; animation: popIn 0.3s ease;
        }

        /* Animação da Dica (Pisca o slot) */
        .dica-iluminada {
            animation: piscarDicaSlot 0.8s infinite alternate !important;
            border-color: #fbc531 !important; color: #b18500 !important; background-color: #fff9c4 !important;
        }
        @keyframes piscarDicaSlot {
            from { box-shadow: 0 0 10px #fbc531; }
            to { box-shadow: 0 0 25px #fbc531; }
        }

        /* Bolhas Flutuantes */
        #area-bolhas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 2;
        }

        .bolha {
            position: absolute; bottom: -100px; width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(0, 145, 255, 0.3) 60%, rgba(0, 145, 255, 0.6));
            box-shadow: inset 0 0 20px rgba(255,255,255,0.7), 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: #0d47a1; cursor: pointer; user-select: none; pointer-events: auto;
            text-transform: uppercase; text-shadow: 1px 1px 2px white; transition: transform 0.1s ease;
        }

        .bolha:active { transform: scale(0.95); }

        .bolha.estourada {
            background: none !important; border: none !important; box-shadow: none !important; color: transparent !important;
            text-shadow: none !important; transform: scale(1.5) !important; pointer-events: none;
        }

        .bolha.estourada::after {
            content: "💦"; font-size: 3rem; color: white; position: absolute; animation: fadeOut 0.4s forwards;
        }

        @keyframes flutuar {
            0% { transform: translateY(0) translateX(0px); }
            33% { transform: translateY(-400px) translateX(20px); }
            66% { transform: translateY(-800px) translateX(-20px); }
            100% { transform: translateY(-1200px) translateX(0px); }
        }

        /* Animações e Feedbacks */
        .error-shake { animation: shakeError 0.4s ease-in-out; border-color: #ff4757 !important; background: rgba(255, 71, 87, 0.3) !important; }

        /* =========================================
           ECRÃ FIM E BOTÕES DE AÇÃO
           ========================================= */
        .end-title { font-size: clamp(2rem, 5vw, 2.5rem); color: var(--azul-escuro); margin-bottom: 25px; }
        
        .btn-acao { 
            background-color: var(--azul-escuro); color: white; border: none; padding: 15px 35px; 
            font-size: 1.1rem; font-weight: 700; border-radius: 15px; cursor: pointer; 
            box-shadow: 0 6px 0 #093273; display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin-bottom: 20px; width: 100%; max-width: 320px; 
            transition: transform 0.2s, box-shadow 0.2s, filter 0.2s; 
        }
        @media (hover: hover) { .btn-acao:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #093273; filter: brightness(1.15); } }
        .btn-acao:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent; }

        @media (max-width: 768px) {
            #painel-alvo { flex-direction: column; gap: 10px; padding: 15px; width: 95%; }
            .game-image { height: 80px; margin-bottom: 5px; }
            .silaba-slot { width: 50px; height: 50px; font-size: 1.4rem; }
            .bolha { width: 75px; height: 75px; font-size: 1.4rem; }
        }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.5); } 80% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-2deg); } 75% { transform: translateX(8px) rotate(3deg); } }
        @keyframes moverRiscas { 0% { background-position: 0 0; } 100% { background-position: 30px 0; } }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: hidden; }
        
        /* Modal e Overlays Extras */
        .toast-msg { position: absolute; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #fff9c4; border: 2px solid #fbc531; color: #b18500; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 1.1rem; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 50; }
        .toast-msg.active { opacity: 1; transform: translateX(-50%) translateY(0); }

        body { scrollbar-gutter: stable; }

        @media (max-height: 600px) {
            body { height: auto !important; overflow-y: auto !important; }
            main { justify-content: flex-start !important; padding-top: 15px; padding-bottom: 15px; overflow-y: visible !important; }
            .cartao-jogo-container { margin: auto 0; }
        }
        @media (hover: none) and (pointer: coarse) {
            body { height: auto !important; overflow-y: auto !important; }
            main { justify-content: flex-start !important; overflow-y: visible !important; }
            footer { margin-top: auto; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Bolhas de Sabão 🧼</h1>
        <div class="subtitulo">Clica nas sílabas certas para formar a palavra!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        
        <canvas id="confetti-canvas"></canvas>
        <div class="toast-msg" id="toast-msg">Mensagem</div>

        <!-- ECRÃ 1: MENU INICIAL -->
        <div id="ecra-selecao" class="ecra" style="display: flex;">
            <h2 class="titulo-menu">Como Jogar:</h2>
            
            <div class="animacao-tutorial">
                <div class="tut-img-alvo">🐱</div>
                <div class="tut-silabas-slots">
                    <div class="tut-slot preenchido">GA</div>
                    <div class="tut-slot"></div>
                </div>
                <div class="tut-bolha">GA</div>
            </div>

            <button class="btn-acao" onclick="iniciarJogo()" style="margin: 0 auto;">JOGAR AGORA ▶️</button>
        </div>

        <!-- ECRÃ 2: JOGO -->
        <div id="ecra-jogo" class="ecra">
            
            <!-- BARRA DE ESTADO COM DICA -->
            <div class="status-bar-jogo" id="status-bar" style="display: none;">
                <button class="btn-voltar-menu" onclick="voltarAoMenu()">🏠 Menu</button>
                <button id="btn-dica" class="btn-dica" onclick="usarDica()">💡 Dica</button>
                <div class="badge-ronda">⭐ <span id="val-progresso">1</span>/<span id="val-total">10</span></div>
                <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
                <div class="badge-erros">❌ <span id="val-erros">0</span></div>
            </div>

            <div class="area-jogo-custom" id="area-jogo">
                
                <!-- PAINEL SUPERIOR: IMAGEM + SÍLABAS LADO A LADO -->
                <div id="painel-alvo">
                    <img id="img-alvo" class="game-image" src="" alt="Imagem secreta">
                    <div id="silabas-slots" class="silabas-container">
                        <!-- Espaços vazios injetados por JS -->
                    </div>
                </div>

                <!-- ÁREA ONDE AS BOLHAS NASCEM -->
                <div id="area-bolhas"></div>

            </div>

        </div>

        <!-- ECRÃ 3: FIM -->
        <div id="ecra-fim" class="ecra">
            <div style="font-size: 5rem; margin-bottom: 15px; line-height: 1;">🏆</div>
            <h2 class="titulo-menu" id="end-title-text" style="margin-bottom: 10px;">Missão Cumprida!</h2>
            <p style="font-size: 1.2rem; color: var(--text-main); font-weight: bold;">Completaste todas as palavras!</p>
            <div style="font-size: 1.3rem; color: #ff4757; font-weight: bold; margin-bottom: 25px; padding: 10px 25px; border: 2px solid #ff4757; border-radius: 15px;">Erros: <span id="final-erros">0</span></div>
            <button class="btn-acao" onclick="iniciarJogo()" style="margin: 0 auto; margin-bottom: 10px;">JOGAR DE NOVO 🔄</button>
        </div>

    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() { 
        document.getElementById('sidebar').classList.toggle('active'); 
        document.getElementById('overlay').classList.toggle('active'); 
        document.getElementById('hamburgerBtn').classList.toggle('open'); 
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast-msg');
        toast.textContent = msg;
        toast.style.borderColor = isError ? "#ff4757" : "#fbc531";
        toast.style.color = isError ? "#ff4757" : "#b18500";
        toast.style.backgroundColor = isError ? "#ffefef" : "#fff9c4";
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 2500);
    }

    /* =========================================
       DADOS DE FALLBACK (Se ../dados.js falhar)
       ========================================= */
    let bancoPalavras = [];
    if (typeof palavras !== 'undefined') {
        bancoPalavras = palavras;
    } else if (typeof window.palavras !== 'undefined') {
        bancoPalavras = window.palavras;
    } else {
        bancoPalavras = [
            { palavra: "abacaxi", imagem: "img/abacaxi.png", divisao: "A-BA-CA-XI" },
            { palavra: "abelha", imagem: "img/abelha.png", divisao: "A-BE-LHA" },
            { palavra: "bolo", imagem: "img/bolo.png", divisao: "BO-LO" },
            { palavra: "cavalo", imagem: "img/cavalo.png", divisao: "CA-VA-LO" },
            { palavra: "dado", imagem: "img/dado.png", divisao: "DA-DO" },
            { palavra: "elefante", imagem: "img/elefante.png", divisao: "E-LE-FAN-TE" },
            { palavra: "fada", imagem: "img/fada.png", divisao: "FA-DA" },
            { palavra: "gato", imagem: "img/gato.png", divisao: "GA-TO" },
            { palavra: "hipopótamo", imagem: "img/hipopotamo.png", divisao: "HI-PO-PÓ-TA-MO" },
            { palavra: "janela", imagem: "img/janela.png", divisao: "JA-NE-LA" }
        ];
    }

    /* =========================================
       ESTADOS E VARIÁVEIS
       ========================================= */
    const MAX_PALAVRAS = 10;
    let palavrasDoJogo = [];
    let palavraAtualIndex = 0;
    let rondaAtual = 1; // 1 to 10
    let errosTotais = 0;
    let isTransitando = false;
    let spawnInterval = null;

    // Lógica das Dicas
    let dicasUsadas = []; 

    // Lógica das Sílabas
    let silabasAlvo = [];
    let todasSilabasExistentes = [];

    // DOM
    const elStatus = document.getElementById('status-bar');
    const elProgresso = document.getElementById('val-progresso');
    const elErros = document.getElementById('val-erros');
    const elValTotal = document.getElementById('val-total');
    const elProgressFill = document.getElementById('progress-fill');
    
    const elGameScreen = document.getElementById('ecra-jogo');
    const elEndScreen = document.getElementById('ecra-fim');
    
    const elImgAlvo = document.getElementById('img-alvo');
    const elSilabasSlots = document.getElementById('silabas-slots');
    const areaBolhas = document.getElementById('area-bolhas');
    
    function mostrarEcra(id) {
        document.querySelectorAll('.ecra').forEach(e => e.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function voltarAoMenu() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        clearInterval(spawnInterval);
        areaBolhas.innerHTML = '';
        elStatus.style.display = 'none';
        mostrarEcra('ecra-selecao');
    }

    function atualizarPlacarUI() {
        elProgresso.textContent = rondaAtual > MAX_PALAVRAS ? MAX_PALAVRAS : rondaAtual;
        elErros.textContent = errosTotais;
        elValTotal.textContent = MAX_PALAVRAS;
        let percent = ((rondaAtual - 1) / MAX_PALAVRAS) * 100;
        elProgressFill.style.width = `${percent}%`;
    }

    function atualizarDicasUI() {
        const btnDica = document.getElementById('btn-dica');
        const blocoAtual = Math.floor((rondaAtual - 1) / 5);
        
        if (!dicasUsadas[blocoAtual]) {
            btnDica.classList.remove('esgotada');
        } else {
            btnDica.classList.add('esgotada');
        }
    }

    /* =========================================
       LÓGICA PRINCIPAL
       ========================================= */
    function iniciarJogo() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        rondaAtual = 1;
        palavraAtualIndex = 0;
        errosTotais = 0;
        isTransitando = false;
        dicasUsadas = [];
        areaBolhas.innerHTML = '';
        
        // Reunir todas as sílabas existentes para bolhas falsas
        todasSilabasExistentes = [];
        bancoPalavras.forEach(p => {
            if(p.divisao) p.divisao.split('-').forEach(s => todasSilabasExistentes.push(s));
        });
        todasSilabasExistentes = [...new Set(todasSilabasExistentes)];

        // Misturar o banco
        let embaralhadas = [...bancoPalavras].sort(() => Math.random() - 0.5);
        
        // Prevenir erro se a lista fosse menor
        while (embaralhadas.length < MAX_PALAVRAS) {
            embaralhadas = embaralhadas.concat([...bancoPalavras].sort(() => Math.random() - 0.5));
        }
        
        palavrasDoJogo = embaralhadas.slice(0, MAX_PALAVRAS);
        
        elStatus.style.display = 'flex';
        atualizarPlacarUI();
        atualizarDicasUI();
        mostrarEcra('ecra-jogo');
        
        carregarPalavra();
    }

    function getImagePath(imgPath) {
        if (!imgPath) return '';
        if (imgPath.startsWith('../') || imgPath.startsWith('http')) return imgPath;
        return '../' + imgPath;
    }

    function carregarPalavra() {
        isTransitando = false;
        removerDestaquesDica();
        atualizarDicasUI();

        const palavraObj = palavrasDoJogo[palavraAtualIndex];
        
        // Configurar Imagem
        elImgAlvo.src = getImagePath(palavraObj.imagem);
        elImgAlvo.onerror = () => { elImgAlvo.src = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23eee'/><text x='50' y='50' font-family='sans-serif' font-size='14' text-anchor='middle' dominant-baseline='middle' fill='%23999'>${palavraObj.palavra}</text></svg>`; };

        elSilabasSlots.innerHTML = '';
        
        // Processar Sílabas Alvo
        if(palavraObj.divisao) {
            const silabasArray = palavraObj.divisao.split('-');
            silabasAlvo = silabasArray.map((silaba, index) => {
                return {
                    silaba: silaba,
                    encontrada: false,
                    id: index
                };
            });

            silabasAlvo.forEach(() => {
                const slot = document.createElement('div');
                slot.className = 'silaba-slot';
                slot.textContent = '';
                elSilabasSlots.appendChild(slot);
            });
        } else {
            // Em caso de falha de dados
            silabasAlvo = [];
        }

        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnBolha, 1200); 
    }

    function spawnBolha() {
        if (isTransitando) return;

        let silabasFalta = silabasAlvo.filter(s => !s.encontrada);
        if (silabasFalta.length === 0) return; 

        let silabaDestaBolha = "";
        
        // 50% de probabilidade de ser uma bolha certa, 50% de ser errada
        if (Math.random() < 0.5) {
            let alvo = silabasFalta[Math.floor(Math.random() * silabasFalta.length)];
            silabaDestaBolha = alvo.silaba;
        } else {
            let erradas = todasSilabasExistentes.filter(s => !silabasAlvo.some(alvo => alvo.silaba === s));
            if (erradas.length > 0) {
                silabaDestaBolha = erradas[Math.floor(Math.random() * erradas.length)];
            } else {
                // Fallback de segurança
                let alvo = silabasFalta[Math.floor(Math.random() * silabasFalta.length)];
                silabaDestaBolha = alvo.silaba;
            }
        }

        criarElementoBolha(silabaDestaBolha);
    }

    function criarElementoBolha(textoSilaba) {
        const bolha = document.createElement('div');
        bolha.className = 'bolha';
        bolha.textContent = textoSilaba;

        bolha.style.left = Math.floor(Math.random() * 70 + 10) + '%';
        
        const duracao = Math.floor(Math.random() * 4 + 7);
        bolha.style.animation = `flutuar ${duracao}s linear forwards`;

        bolha.onclick = () => clicarNaBolha(textoSilaba, bolha);

        bolha.addEventListener('animationend', () => bolha.remove());

        areaBolhas.appendChild(bolha);
    }

    function clicarNaBolha(silabaClicada, bolhaElemento) {
        if (isTransitando) return;
        removerDestaquesDica();
        
        let silabasFalta = silabasAlvo.filter(s => !s.encontrada);
        let alvoCorreto = silabasFalta.find(s => s.silaba.toLowerCase() === silabaClicada.toLowerCase());

        if (alvoCorreto) {
            alvoCorreto.encontrada = true;
            tocarSom('pop');
            
            bolhaElemento.classList.add('estourada');
            
            const slotsHtml = elSilabasSlots.children;
            slotsHtml[alvoCorreto.id].textContent = silabaClicada;
            slotsHtml[alvoCorreto.id].classList.add('preenchida');

            if (silabasAlvo.every(s => s.encontrada)) {
                completouPalavra();
            }

        } else {
            errosTotais++;
            atualizarPlacarUI();
            tocarSom('erro');
            
            bolhaElemento.classList.add('error-shake');
            setTimeout(() => bolhaElemento.classList.remove('error-shake'), 400);
        }
    }

    /* --- DICA --- */
    function usarDica() {
        const btnDica = document.getElementById('btn-dica');
        const blocoAtual = Math.floor((rondaAtual - 1) / 5);
        
        if(btnDica.classList.contains('esgotada') || dicasUsadas[blocoAtual]) return;

        // Encontra o primeiro slot que ainda não foi preenchido
        let primeiraFalta = silabasAlvo.find(s => !s.encontrada);
        
        if (primeiraFalta) {
            primeiraFalta.encontrada = true;
            tocarSom('pop');
            
            const slotsHtml = elSilabasSlots.children;
            slotsHtml[primeiraFalta.id].textContent = primeiraFalta.silaba;
            slotsHtml[primeiraFalta.id].classList.add('preenchida', 'dica-iluminada');
            
            dicasUsadas[blocoAtual] = true;
            atualizarDicasUI();

            if (silabasAlvo.every(s => s.encontrada)) {
                completouPalavra();
            }
        }
    }

    function removerDestaquesDica() {
        document.querySelectorAll('.dica-iluminada').forEach(el => el.classList.remove('dica-iluminada'));
    }

    /* --- GESTÃO GERAL --- */
    function completouPalavra() {
        isTransitando = true;
        tocarSom('vitoria_curta');
        clearInterval(spawnInterval);
        
        setTimeout(() => {
            areaBolhas.innerHTML = '';
            avancarRonda();
        }, 1500);
    }

    function avancarRonda() {
        palavraAtualIndex++;
        rondaAtual++;
        
        if (rondaAtual > MAX_PALAVRAS) {
            elProgressFill.style.width = `100%`;
            document.getElementById('final-erros').textContent = errosTotais;
            
            const titleText = document.getElementById('end-title-text');
            if (errosTotais === 0) {
                titleText.textContent = "BOMBA DE SABÃO! 🏆";
                tocarSom('vitoria'); dispararConfetis();
            } else if (errosTotais <= 3) {
                titleText.textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); dispararConfetis();
            } else {
                titleText.textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }

            elStatus.style.display = 'none';
            mostrarEcra('ecra-fim');
        } 
        else {
            atualizarPlacarUI();
            carregarPalavra();
        }
    }

    /* =========================================
       SISTEMA DE SOM E CONFETIS
       ========================================= */
    let audioCtx = null;
    function iniciarAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    document.body.addEventListener('click', iniciarAudio, { once: true });
    document.body.addEventListener('touchstart', iniciarAudio, { once: true });

    function tocarSom(tipo) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'pop') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, agora);
            osc.frequency.exponentialRampToValueAtTime(1500, agora + 0.05);
            gain.gain.setValueAtTime(0.3, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        } 
        else if (tipo === 'acerto') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.2);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(150, agora); osc.frequency.exponentialRampToValueAtTime(100, agora + 0.2);
            gain.gain.setValueAtTime(0.15, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2);
            osc.start(agora); osc.stop(agora + 0.2);
        }
        else if (tipo === 'vitoria_curta') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, agora);
            osc.frequency.setValueAtTime(659.25, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        }
        else if (tipo === 'vitoria') {
            const notas =[440, 554.37, 659.25, 880, 1046.50]; 
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'triangle'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.6);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.6);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis = [];

    function redimensionarCanvas() { 
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth; 
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight; 
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas(); confetis = []; const cores = ['#0091ff', '#2ed573', '#ff4757', '#ffa502', '#eccc68'];
        for (let i = 0; i < 150; i++) {
            confetis.push({ x: Math.random() * canvasConfetti.width, y: Math.random() * canvasConfetti.height - canvasConfetti.height, w: Math.random() * 10 + 5, h: Math.random() * 10 + 5, cor: cores[Math.floor(Math.random() * cores.length)], velY: Math.random() * 3 + 2, velX: Math.random() * 2 - 1, rotacao: Math.random() * 360, velRotacao: Math.random() * 5 - 2.5 });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height); let ativos = false;
        confetis.forEach(c => {
            c.y += c.velY; c.x += c.velX; c.rotacao += c.velRotacao; if (c.y < canvasConfetti.height) ativos = true;
            ctxConfetti.save(); ctxConfetti.translate(c.x, c.y); ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor; ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h); ctxConfetti.restore();
        });
        if (ativos) requestAnimationFrame(animarConfetis);
    }

    // Arranca no menu
    window.onload = () => mostrarEcra('ecra-selecao');

</script>
</body>
</html>
