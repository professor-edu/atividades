<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Quantas Sílabas? 👏</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER & NAV - TEMPLATE ORIGINAL */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column; gap: 4px;
            padding: 10px; border-radius: 8px;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white; border: none;
            padding: 8px 20px; border-radius: 20px;
            font-weight: 700; text-decoration: none;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1rem; opacity: 0.8; margin-top: 10px; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ESTRELAS */
        .estrelas-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .estrela-box { font-size: 2.5rem; color: #cbd5e0; text-shadow: 1px 2px 4px rgba(0,0,0,0.1); transition: 0.4s; }
        .estrela-box.vitoria { color: #f6e05e; transform: scale(1.1); }
        .estrela-box.derrota { color: var(--erro); text-decoration: line-through; opacity: 0.4; }

        /* JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; min-height: 480px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center;
        }

        .wrapper-imagem {
            background: #ffffff; padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }
        .imagem-pergunta { max-width: 220px; height: 180px; object-fit: contain; display: block; }

        /* BOTÕES DE NÚMEROS */
        .num-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .btn-num {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: var(--cor-1ano); color: white; font-size: 2rem; font-weight: 800;
            cursor: pointer; box-shadow: 0 6px 0 var(--cor-1ano-dark); transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-num:hover { transform: translateY(-3px); box-shadow: 0 9px 0 var(--cor-1ano-dark); }
        .btn-num:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cor-1ano-dark); }
        .btn-num.errado { background: var(--erro) !important; box-shadow: 0 6px 0 #b91c1c !important; transform: scale(0.9); }
        .btn-num.certo { background: var(--sucesso) !important; box-shadow: 0 6px 0 #2f855a !important; }

        #feedback-msg { margin-top: 30px; font-weight: 700; font-size: 1.6rem; min-height: 2.5rem; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            .nav-container { position: static; transform: none; display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; }
            .btn-num { width: 65px; height: 65px; font-size: 1.5rem; }
            .estrela-box { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Quantas Sílabas? 👏</h1>
        <div class="subtitulo">Quantas vezes bates as palmas?</div>
    </div>
</header>

<div class="estrelas-container" id="estrelas-box"></div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="wrapper-imagem">
            <img src="" id="img-word" class="imagem-pergunta">
        </div>
        
        <div class="num-container" id="opcoes-numeros">
            <button class="btn-num" onclick="verificar(1)">1</button>
            <button class="btn-num" onclick="verificar(2)">2</button>
            <button class="btn-num" onclick="verificar(3)">3</button>
            <button class="btn-num" onclick="verificar(4)">4</button>
        </div>

        <div id="feedback-msg"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <b>EB1/PE da Marinheira</b></p>
</footer>

<script>
    let indice = 0;
    const total = 10;
    let selecionadas = [];
    let erroNaTentativa = false;
    let podeClicar = true;

    function iniciar() {
        indice = 0;
        selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, total);
        const box = document.getElementById('estrelas-box');
        box.innerHTML = '';
        for(let i=0; i<total; i++) box.innerHTML += `<div class="estrela-box" id="s-${i}">★</div>`;
        montarFase();
    }

    function montarFase() {
        const item = selecionadas[indice];
        erroNaTentativa = false;
        podeClicar = true;
        
        document.getElementById('img-word').src = `../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerHTML = "";
        
        // Resetar botões
        document.querySelectorAll('.btn-num').forEach(btn => {
            btn.className = 'btn-num';
        });
    }

    function verificar(valorEscolhido) {
        if (!podeClicar) return;
        
        const item = selecionadas[indice];
        const numCorreto = item.num; // Usa a propriedade "num" do teu dados.js
        const feedback = document.getElementById('feedback-msg');
        const botoes = document.querySelectorAll('.btn-num');

        if (valorEscolhido === numCorreto) {
            podeClicar = false;
            // Destacar o botão correto
            botoes[valorEscolhido - 1].classList.add('certo');
            feedback.innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🎉</span>";
            
            // Atualizar estrela
            document.getElementById(`s-${indice}`).classList.add(erroNaTentativa ? 'derrota' : 'vitoria');
            
            indice++;
            setTimeout(() => {
                if(indice < total) montarFase();
                else finalizar();
            }, 1200);
        } else {
            erroNaTentativa = true;
            // Destacar o botão errado temporariamente
            botoes[valorEscolhido - 1].classList.add('errado');
            feedback.innerHTML = "<span style='color:var(--erro)'>Tenta outra vez! 🤔</span>";
            
            setTimeout(() => {
                if(podeClicar) {
                    botoes[valorEscolhido - 1].classList.remove('errado');
                    feedback.innerHTML = "";
                }
            }, 800);
        }
    }

    function finalizar() {
        const vitorias = document.querySelectorAll('.estrela-box.vitoria').length;
        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2.5rem;">🎉 EXCELENTE! 🎉</h2>
            <div style="font-size:6rem; margin:20px;">🏆</div>
            <p style="font-size:1.4rem;">Contaste corretamente <b>${vitorias} de 10</b> palavras!</p>
            <button onclick="location.reload()" class="btn-voltar" style="padding:15px 40px; font-size:1.2rem; cursor:pointer; margin-top:20px;">Jogar de Novo 🔄</button>
        `;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
