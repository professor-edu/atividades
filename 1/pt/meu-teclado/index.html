<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - O Meu Teclado ⌨️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE (INTOCÁVEL)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --cor-1ano: #0091ff;
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px; gap: 25px; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 800px; min-height: 450px; padding: 40px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; flex: 1; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 20px 15px; gap: 15px; }
            .cartao-jogo-container { padding: 25px 10px; min-height: 350px; }
        }

        .status-bar { width: 100%; max-width: 700px; margin-bottom: 0; display: none; }
        .score-container { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 1.3rem; padding: 0 15px; }
        .score-certas { color: #219d53; }
        .score-tempo { color: var(--text-main); font-variant-numeric: tabular-nums; }
        .score-erradas { color: #d0303f; }
        .progress-bg { 
			background-color: #e2e8f0; /* Um cinza mais suave */
			border-radius: 20px; 
			height: 35px; /* Um pouco mais grossa */
			width: 100%; 
			overflow: hidden; 
			box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); 
			border: 2px solid #d4dbe3;
		}

.progress-fill { 
    height: 100%; 
    width: 0%; 
    border-radius: 20px; 
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
    
    /* Magia das riscas animadas */
    background-color: var(--cor-1ano);
    background-image: linear-gradient(
        45deg, 
        rgba(255, 255, 255, 0.2) 25%, 
        transparent 25%, 
        transparent 50%, 
        rgba(255, 255, 255, 0.2) 50%, 
        rgba(255, 255, 255, 0.2) 75%, 
        transparent 75%, 
        transparent
    );
    background-size: 30px 30px;
    animation: moverRiscas 2s linear infinite;
}

/* Animação para fazer as riscas deslizarem */
@keyframes moverRiscas {
    0% { background-position: 0 0; }
    100% { background-position: 30px 0; }
}


        /* =========================================
           CSS ESPECÍFICO: CONTAGEM DECRESCENTE
           ========================================= */
        #countdown-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; flex: 1;}
        
        .countdown-text { 
            font-size: clamp(6rem, 15vw, 10rem); 
            font-weight: 900; 
            color: var(--azul-vibrante); 
            text-shadow: 0 8px 20px rgba(0,145,255,0.2); 
            text-transform: uppercase; 
            text-align: center; 
        }
        
        .countdown-text.start-msg { 
            font-size: clamp(3rem, 8vw, 5rem); 
            color: #2ed573; 
            text-shadow: 0 8px 20px rgba(46, 213, 115, 0.2); 
        }
        
        @keyframes popCount {
            0% { transform: scale(0.3); opacity: 0; }
            30% { transform: scale(1.1); opacity: 1; }
            50% { transform: scale(1); opacity: 1; }
            90% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }
        .anim-count { animation: popCount 0.95s ease-in-out; }

        /* =========================================
           CSS ESPECÍFICO: TECLADO E LETRA ALVO
           ========================================= */
        #game-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; flex: 1;}

        .target-letter-box { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--azul-escuro); 
            background: #e3f2fd; 
            border: 5px dashed var(--azul-vibrante); 
            border-radius: 25px; 
            width: 140px; 
            height: 140px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 30px; 
            box-shadow: 0 8px 20px rgba(0,145,255,0.15); 
            transition: 0.3s; 
            text-transform: uppercase;
        }

        /* O Teclado Virtual */
        .keyboard-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            align-items: center;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        /* Ligeiro avanço nas linhas inferiores para simular um teclado real */
        .kb-row:nth-child(2) { padding-left: 5%; }
        .kb-row:nth-child(3) { padding-left: 10%; }

        .kb-key {
            background: white;
            border: 3px solid #ced6e0;
            border-radius: 10px;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--azul-escuro);
            cursor: pointer;
            padding: 12px 0;
            flex: 1; /* Estica para preencher a linha */
            max-width: 55px; /* Não fica demasiado largo num PC */
            text-align: center;
            box-shadow: 0 5px 0 #ced6e0;
            transition: all 0.1s ease;
            user-select: none;
            touch-action: manipulation;
        }

        .kb-key:hover {
            border-color: var(--azul-vibrante);
            color: var(--azul-vibrante);
            transform: translateY(-2px);
            box-shadow: 0 7px 0 var(--azul-vibrante);
        }

        .kb-key:active, .kb-key.active-physical {
            transform: translateY(5px);
            box-shadow: 0 0px 0 transparent;
        }

        /* Estados de Resposta na Tecla */
        .kb-key.key-correct { background: #2ed573; color: white; border-color: #219d53; box-shadow: 0 5px 0 #219d53; }
        .kb-key.key-wrong { background: #ff4757; color: white; border-color: #d0303f; box-shadow: 0 5px 0 #d0303f; }

        @media (max-width: 768px) {
            .target-letter-box { width: 100px; height: 100px; font-size: 4rem; border-width: 4px; margin-bottom: 25px;}
            .keyboard-container { gap: 6px; }
            .kb-row { gap: 4px; }
            .kb-key { font-size: 1.2rem; padding: 10px 0; border-width: 2px; border-radius: 6px; box-shadow: 0 4px 0 #ced6e0;}
            .kb-key:hover { transform: none; box-shadow: 0 4px 0 #ced6e0; border-color: #ced6e0; color: var(--azul-escuro);} /* Desliga o hover no telemóvel para não encravar */
            .kb-key:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; border-color: var(--azul-vibrante); color: var(--azul-vibrante);}
            
            .score-container { font-size: 1.1rem; padding: 0 5px;}
        }

        /* Ecrã de Fim */
        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; flex: 1; animation: fadeIn 0.5s ease; }
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; }
        .end-stats { font-size: 1.3rem; color: var(--text-main); margin-bottom: 30px; line-height: 1.6; }
        .end-time-msg { font-size: 1.5rem; font-weight: 900; color: var(--azul-vibrante); margin-top: 10px; display: block; }
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-3deg); }
            50% { transform: translateX(8px) rotate(3deg); }
            75% { transform: translateX(-8px) rotate(-3deg); }
        }
        
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ff4757 !important; background-color: #ffefef !important; color: #ff4757 !important; }
        .success-bounce { border-color: #2ed573 !important; background-color: #eafff0 !important; color: #219d53 !important; transform: scale(1.1); }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .anim-pop { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    body { scrollbar-gutter: stable; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
<li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
<li><a href="../../">🎒 1º Ano</a></li>
<li><a href="../../../2/">💡 2º Ano</a></li>
<li><a href="../../../3/">🔍 3º Ano</a></li>
<li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>O Meu Teclado ⌨️</h1>
        <div class="subtitulo">Olha para a letra e clica na tecla certa ou usa o teclado!</div>
    </div>
</header>

<main>
    <div id="status-bar-container" class="status-bar">
        <div class="score-container">
            <span class="score-certas">✔️ <span id="val-certas">0</span></span>
            <span class="score-tempo">⏱️ <span id="val-tempo">00:00</span></span>
            <span class="score-erradas">❌ <span id="val-erradas">0</span></span>
        </div>
        <div class="progress-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="cartao-jogo-container">
        
        <!-- ECRÃ DE COUNTDOWN -->
        <div id="countdown-screen">
            <div id="countdown-number" class="countdown-text">3</div>
        </div>

        <!-- ECRÃ DE JOGO -->
        <div id="game-screen">
            <div id="target-letter" class="target-letter-box">A</div>
            
            <div class="keyboard-container" id="keyboard">
                <!-- O teclado será injetado aqui -->
            </div>
        </div>

        <!-- ECRÃ FINAL -->
        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Fim do Jogo! 🎉</h2>
            <div class="end-stats">
                Acertaste <strong id="final-certas" style="color:#2ed573">0</strong> letras e erraste <strong id="final-erradas" style="color:#ff4757">0</strong>.<br>
                <span class="end-time-msg" id="final-tempo">Demoraste 0 segundos.</span>
            </div>
            <button class="btn-reiniciar" onclick="iniciarJogo()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    // ==========================================
    // VARIÁVEIS DE JOGO
    // ==========================================
    const MAX_LETRAS = 26; 
    let letraAtualIndex = 0;
    let certas = 0;
    let erradas = 0;
    let isVerificando = true; // Bloqueado no início até o countdown acabar
    let letraAlvo = "";
    
    // Controlo de Tempo
    let tempoInicio = 0;
    let tempoDecorrido = 0;
    let timerInterval = null;

    // Layout QWERTY
    const layoutTeclado = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']
    ];

    const todasLetras = layoutTeclado.flat();
    let letrasDoJogo =[];

    // DOM Elements
    const elCountdownScreen = document.getElementById('countdown-screen');
    const elCountdownNumber = document.getElementById('countdown-number');
    const elGameScreen = document.getElementById('game-screen');
    const elEndScreen = document.getElementById('end-screen');
    const statusBar = document.getElementById('status-bar-container');
    const elValCertas = document.getElementById('val-certas');
    const elValErradas = document.getElementById('val-erradas');
    const elValTempo = document.getElementById('val-tempo');
    const elProgressFill = document.getElementById('progress-fill');
    
    const targetLetterBox = document.getElementById('target-letter');
    const keyboardContainer = document.getElementById('keyboard');

    // ==========================================
    // INICIALIZAÇÃO E COUNTDOWN
    // ==========================================
    function construirTeclado() {
        keyboardContainer.innerHTML = '';
        
        layoutTeclado.forEach(linha => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            
            linha.forEach(letra => {
                const btn = document.createElement('button');
                btn.className = 'kb-key';
                btn.id = 'key-' + letra;
                btn.textContent = letra;
                
                // Evento de clique no botão virtual
                btn.onclick = () => verificarResposta(letra, btn);
                
                rowDiv.appendChild(btn);
            });
            
            keyboardContainer.appendChild(rowDiv);
        });
    }

    function iniciarJogo() {
        certas = 0; 
        erradas = 0; 
        letraAtualIndex = 0; 
        isVerificando = true; // Bloqueia cliques acidentais durante a contagem
        
        atualizarPlacar();
        elValTempo.textContent = "00:00";
        elProgressFill.style.width = "0%";
        
        elEndScreen.style.display = 'none';
        elGameScreen.style.display = 'none';
        statusBar.style.display = 'block'; // Mostra logo o placar (a 0)
        
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        // Baralhar as 26 letras do alfabeto, sem repetições
        letrasDoJogo =[...todasLetras].sort(() => Math.random() - 0.5);

        if(keyboardContainer.children.length === 0) {
            construirTeclado();
        }

        executarContagemDecrescente();
    }

    function executarContagemDecrescente() {
        elCountdownScreen.style.display = 'flex';
        
        let count = 3;
        elCountdownNumber.classList.remove('start-msg');
        elCountdownNumber.textContent = count;
        
        // Reinicia a animação para o número 3
        elCountdownNumber.classList.remove('anim-count');
        void elCountdownNumber.offsetWidth;
        elCountdownNumber.classList.add('anim-count');
        tocarSom('tick');

        let countInterval = setInterval(() => {
            count--;
            
            if (count > 0) {
                elCountdownNumber.textContent = count;
                elCountdownNumber.classList.remove('anim-count');
                void elCountdownNumber.offsetWidth;
                elCountdownNumber.classList.add('anim-count');
                tocarSom('tick');
            } else if (count === 0) {
                elCountdownNumber.textContent = "VAMOS COMEÇAR!";
                elCountdownNumber.classList.add('start-msg');
                elCountdownNumber.classList.remove('anim-count');
                void elCountdownNumber.offsetWidth;
                elCountdownNumber.classList.add('anim-count');
                tocarSom('go');
            } else {
                clearInterval(countInterval);
                elCountdownScreen.style.display = 'none';
                elGameScreen.style.display = 'flex';
                
                isVerificando = false; // Desbloqueia o jogo
                iniciarCronometro();
                carregarLetra();
            }
        }, 1000);
    }

    // ==========================================
    // LÓGICA DE TEMPO
    // ==========================================
    function iniciarCronometro() {
        clearInterval(timerInterval);
        tempoInicio = Date.now();
        
        timerInterval = setInterval(() => {
            tempoDecorrido = Math.floor((Date.now() - tempoInicio) / 1000);
            
            let m = Math.floor(tempoDecorrido / 60);
            let s = tempoDecorrido % 60;
            
            elValTempo.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function formatarTextoTempoFim(segundosTotais) {
        let m = Math.floor(segundosTotais / 60);
        let s = segundosTotais % 60;
        
        if (m === 0) {
            return `Demoraste ${s} segundos.`;
        } else {
            let minStr = m === 1 ? 'minuto' : 'minutos';
            return `Demoraste ${m} ${minStr} e ${s} segundos.`;
        }
    }

    // ==========================================
    // LÓGICA DO JOGO
    // ==========================================
    function carregarLetra() {
        isVerificando = false;
        letraAlvo = letrasDoJogo[letraAtualIndex];
        
        elProgressFill.style.width = `${(letraAtualIndex / MAX_LETRAS) * 100}%`;
        
        // Animação na letra
        targetLetterBox.textContent = letraAlvo;
        targetLetterBox.classList.remove('success-bounce', 'error-shake');
        
        // Força o reflow para a animação reiniciar
        void targetLetterBox.offsetWidth; 
        targetLetterBox.classList.add('anim-pop');
        
        // Limpar botões
        document.querySelectorAll('.kb-key').forEach(b => {
            b.classList.remove('key-correct', 'key-wrong', 'active-physical');
        });
    }

    function verificarResposta(letraClicada, btnElement) {
        if (isVerificando) return;
        isVerificando = true;

        if (letraClicada === letraAlvo) {
            certas++; 
            atualizarPlacar(); 
            tocarSom('acerto');
            
            btnElement.classList.add('key-correct');
            targetLetterBox.classList.remove('anim-pop');
            targetLetterBox.classList.add('success-bounce');

            setTimeout(() => {
                letraAtualIndex++;
                if (letraAtualIndex < MAX_LETRAS) {
                    carregarLetra();
                } else {
                    finalizarJogo();
                }
            }, 600); // Passagem rápida para não quebrar o ritmo
        } else {
            erradas++; 
            atualizarPlacar(); 
            tocarSom('erro');
            
            btnElement.classList.add('key-wrong');
            targetLetterBox.classList.remove('anim-pop');
            targetLetterBox.classList.add('error-shake');
            
            setTimeout(() => {
                targetLetterBox.classList.remove('error-shake');
                btnElement.classList.remove('key-wrong');
                isVerificando = false;
            }, 500);
        }
    }

    // Suporte para Teclado Físico do Computador!
    document.addEventListener('keydown', (e) => {
        // Ignora se o jogo não estiver a decorrer ou estiver bloqueado (durante o countdown ou verificação)
        if (elGameScreen.style.display === 'none' || isVerificando) return;
        
        let teclaPressionada = e.key.toUpperCase();
        
        // Se a tecla pressionada existir no nosso teclado virtual
        if (todasLetras.includes(teclaPressionada)) {
            const btnVirtual = document.getElementById('key-' + teclaPressionada);
            if (btnVirtual) {
                btnVirtual.classList.add('active-physical'); // Simula o clique visualmente
                verificarResposta(teclaPressionada, btnVirtual);
                
                setTimeout(() => {
                    btnVirtual.classList.remove('active-physical');
                }, 150);
            }
        }
    });

    function atualizarPlacar() {
        elValCertas.textContent = certas;
        elValErradas.textContent = erradas;
    }

    function finalizarJogo() {
        clearInterval(timerInterval); // Para o cronómetro
        elProgressFill.style.width = `100%`;
        
        setTimeout(() => {
            elGameScreen.style.display = 'none';
            statusBar.style.display = 'none';
            elEndScreen.style.display = 'flex';
            
            document.getElementById('final-certas').textContent = certas;
            document.getElementById('final-erradas').textContent = erradas;
            
            document.getElementById('final-tempo').textContent = formatarTextoTempoFim(tempoDecorrido);

            if (erradas === 0) {
                document.getElementById('end-title-text').textContent = "MÃOS DE FADA! 🏆";
                tocarSom('vitoria'); dispararConfetis();
            } else if (erradas <= 3) {
                document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); dispararConfetis();
            } else {
                document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }
        }, 500);
    }

    // ==========================================
    // EFEITOS DE SOM E CONFETIS
    // ==========================================
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'tick') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, agora);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
            osc.start(agora); osc.stop(agora + 0.1);
        }
        else if (tipo === 'go') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, agora);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.4);
            osc.start(agora); osc.stop(agora + 0.4);
        }
        else if (tipo === 'acerto') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, agora);
            osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.2); // Som mais curto para ritmo rápido
            osc.start(agora); osc.stop(agora + 0.2);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, agora);
            osc.frequency.exponentialRampToValueAtTime(100, agora + 0.3);
            gain.gain.setValueAtTime(0.15, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.4);
            osc.start(agora); osc.stop(agora + 0.4);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() {
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth;
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis =[];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#eccc68'];
        
        for (let i = 0; i < 100; i++) {
            confetis.push({
                x: Math.random() * canvasConfetti.width,
                y: Math.random() * canvasConfetti.height - canvasConfetti.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                cor: cores[Math.floor(Math.random() * cores.length)],
                velY: Math.random() * 3 + 2,
                velX: Math.random() * 2 - 1,
                rotacao: Math.random() * 360,
                velRotacao: Math.random() * 5 - 2.5
            });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;

        confetis.forEach(c => {
            c.y += c.velY;
            c.x += c.velX;
            c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;

            ctxConfetti.save();
            ctxConfetti.translate(c.x, c.y);
            ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor;
            ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
            ctxConfetti.restore();
        });

        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = iniciarJogo;

</script>
