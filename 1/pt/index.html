<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escreve a Palavra ✍️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER & SIDEBAR (TEMPLATE OFICIAL) */
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; flex-shrink: 0; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.4s; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* PAINEL DE PONTUAÇÃO E PROGRESSO */
        .game-status { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px auto; width: 90%; max-width: 600px; }
        .stats { display: flex; gap: 20px; font-weight: 700; font-size: 1.2rem; }
        .stat-item { display: flex; align-items: center; gap: 5px; }
        .progress-bar-bg { width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px; overflow: hidden; border: 1px solid #cbd5e0; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--cor-1ano); transition: 0.4s ease; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; min-height: 480px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
        }

        .img-container { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #f0f0f0; }
        .img-container img { max-width: 180px; height: 160px; object-fit: contain; }

        .hints-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .hint-box { background: #eef6ff; color: var(--azul-escuro); padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 1.2rem; border: 2px solid #d0e4ff; }

        .input-escrita {
            width: 90%; max-width: 400px; padding: 15px; border: 3px solid #cbd5e0; border-radius: 15px;
            font-size: 1.5rem; font-weight: 700; text-align: center; text-transform: uppercase;
            color: var(--azul-escuro); outline: none; margin-bottom: 20px; transition: 0.3s;
        }
        .input-escrita:focus { border-color: var(--cor-1ano); }

        .btn-verificar {
            background: var(--cor-1ano); color: white; border: none; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark);
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-verificar:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--cor-1ano-dark); }
        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cor-1ano-dark); }

        #feedback-msg { margin-top: 20px; font-weight: 700; font-size: 1.4rem; min-height: 2rem; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            .nav-container { position: static; transform: none; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .btn-verificar { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Escreve a Palavra ✍️</h1>
        <div class="subtitulo">Olha para a imagem e escreve o nome correto.</div>
    </div>
</header>

<div class="game-status">
    <div class="stats">
        <div class="stat-item" style="color:var(--sucesso)">✅ <span id="acertos">0</span></div>
        <div class="stat-item" style="color:var(--erro)">❌ <span id="erros">0</span></div>
    </div>
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
</div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="img-container">
            <img src="" id="img-pergunta">
        </div>

        <div class="hints-container" id="silabas-dica"></div>

        <input type="text" class="input-escrita" id="entrada-texto" placeholder="Escreve aqui..." autocomplete="off">

        <button class="btn-verificar" id="btn-verificar" onclick="validar()">
            🔍 Verificar
        </button>

        <div id="feedback-msg"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    let indice = 0;
    const totalDesafios = 20;
    let selecionadas = [];
    let contadorAcertos = 0;
    let contadorErros = 0;
    let podeVerificar = true;

    function iniciar() {
        // Baralhar e pegar 20 palavras do dados.js
        selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, totalDesafios);
        proximaFase();
    }

    function proximaFase() {
        if (indice >= totalDesafios) {
            finalizar();
            return;
        }

        podeVerificar = true;
        const item = selecionadas[indice];
        const feedback = document.getElementById('feedback-msg');
        const entrada = document.getElementById('entrada-texto');
        const btn = document.getElementById('btn-verificar');

        // Reset UI
        feedback.innerHTML = "";
        entrada.value = "";
        entrada.style.borderColor = "#cbd5e0";
        entrada.disabled = false;
        btn.disabled = false;
        
        // Atualiza Imagem e Sílabas Dica
        document.getElementById('img-pergunta').src = `../img/${item.imagem.split('/').pop()}`;
        
        const dicasContainer = document.getElementById('silabas-dica');
        dicasContainer.innerHTML = "";
        const silabas = item.divisao.split('-').sort(() => Math.random() - 0.5);
        silabas.forEach(s => {
            dicasContainer.innerHTML += `<div class="hint-box">${s.toLowerCase()}</div>`;
        });

        // Atualiza Barra de Progresso
        document.getElementById('progress-fill').style.width = `${(indice / totalDesafios) * 100}%`;
        
        entrada.focus();
    }

    function validar() {
        if (!podeVerificar) return;

        const entrada = document.getElementById('entrada-texto');
        const feedback = document.getElementById('feedback-msg');
        const item = selecionadas[indice];
        const respostaUsuario = entrada.value.trim().toLowerCase();
        const respostaCorreta = item.palavra.toLowerCase();

        podeVerificar = false;
        entrada.disabled = true;

        if (respostaUsuario === respostaCorreta) {
            contadorAcertos++;
            document.getElementById('acertos').innerText = contadorAcertos;
            entrada.style.borderColor = "var(--sucesso)";
            feedback.innerHTML = `<span style="color:var(--sucesso)">Muito bem! 🌟</span>`;
            
            indice++;
            setTimeout(proximaFase, 1200);
        } else {
            contadorErros++;
            document.getElementById('erros').innerText = contadorErros;
            entrada.style.borderColor = "var(--erro)";
            feedback.innerHTML = `<span style="color:var(--erro)">Errado. A palavra era: <b>${item.palavra.toUpperCase()}</b></span>`;
            
            indice++;
            // Espera 2 segundos antes de avançar se estiver errado
            setTimeout(proximaFase, 2500);
        }
    }

    // Permitir tecla Enter
    document.getElementById('entrada-texto').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') validar();
    });

    function finalizar() {
        document.getElementById('progress-fill').style.width = "100%";
        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2.5rem;">Fim do Jogo! 🎉</h2>
            <div style="font-size:5rem; margin:20px;">🏆</div>
            <div style="font-size:1.4rem; line-height:1.6;">
                Pontuação Final:<br>
                <span style="color:var(--sucesso)">Acertos: ${contadorAcertos}</span><br>
                <span style="color:var(--erro)">Erros: ${contadorErros}</span>
            </div>
            <button onclick="location.reload()" class="btn-voltar" style="padding:15px 40px; font-size:1.2rem; cursor:pointer; margin-top:20px;">Jogar de Novo 🔄</button>
        `;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
