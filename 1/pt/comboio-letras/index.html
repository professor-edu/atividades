<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Comboio das Letras 🚂</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER DO TEMPLATE */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        /* SIDEBAR DO TEMPLATE */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* JOGO: COMBOIO DAS LETRAS */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; min-height: 450px;
            padding: 40px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; align-items: center;
        }

        .img-pergunta { max-width: 200px; height: 160px; object-fit: contain; margin-bottom: 20px; }

        .comboio-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }

        .carruagem {
            width: 65px; height: 65px; border: 3px dashed #cbd5e0; border-radius: 12px;
            background: #f8fafc; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 700; color: var(--azul-escuro); position: relative;
        }
        .carruagem::after { content: "● ●"; position: absolute; bottom: -12px; font-size: 0.8rem; color: #4a5568; }
        .carruagem.correct { background: #c6f6d5; border: 3px solid var(--sucesso); }

        .letras-espalhadas { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .letra-peca {
            width: 55px; height: 55px; background: #fff9c4; border: 2px solid var(--azul-vibrante);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 700; cursor: grab; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            user-select: none; touch-action: none;
        }
       .letra-peca:active {
    cursor: grabbing;
    background: var(--azul-vibrante); /* Muda de cor ao clicar */
    color: white;
    transform: scale(1.1); /* Aumenta um pouco de tamanho */
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
}

        #feedback-msg { min-height: 1.6em; margin-top: 25px; font-weight: 700; font-size: 1.4rem; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            main { padding: 20px 15px; gap: 15px; }
            .cartao-jogo-container { padding: 25px 15px; min-height: 350px; }
            .game-image { height: 160px !important; margin-bottom: 25px !important; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Comboio das Letras 🚂</h1>
        <div class="subtitulo">Arrasta as letras para as carruagens certas e forma a palavra!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        <img src="" id="img-alvo" class="img-pergunta">
        <div id="comboio" class="comboio-container"></div>
        <div id="letras-disponiveis" class="letras-espalhadas"></div>
        <div id="feedback-msg"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    let palavraAlvo = "";
    let letrasColocadas = 0;

    function iniciarJogo() {
        // Seleciona uma palavra aleatória do ficheiro dados.js
        const item = palavras[Math.floor(Math.random() * palavras.length)];
        palavraAlvo = item.palavra.toUpperCase();
        letrasColocadas = 0;
        
        document.getElementById('img-alvo').src = "../" + item.imagem;
        document.getElementById('feedback-msg').innerHTML = "";
        
        const comboio = document.getElementById('comboio');
        const letrasBox = document.getElementById('letras-disponiveis');
        comboio.innerHTML = "";
        letrasBox.innerHTML = "";

        // Criar as carruagens (slots)
        for(let i=0; i < palavraAlvo.length; i++) {
            const slot = document.createElement('div');
            slot.className = 'carruagem';
            slot.dataset.index = i;
            slot.addEventListener('dragover', e => e.preventDefault());
            slot.addEventListener('drop', lidarComDrop);
            comboio.appendChild(slot);
        }

        // Criar as letras baralhadas
        const letrasBaralhadas = palavraAlvo.split('').sort(() => Math.random() - 0.5);
        letrasBaralhadas.forEach((letra, i) => {
            const peca = document.createElement('div');
            peca.className = 'letra-peca';
            peca.draggable = true;
            peca.innerText = letra;
            peca.id = "letra-" + i;
            peca.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text', letra);
                e.dataTransfer.setData('sourceId', peca.id);
            });
            letrasBox.appendChild(peca);
        });
    }

    function lidarComDrop(e) {
        e.preventDefault();
        const letraData = e.dataTransfer.getData('text');
        const sourceId = e.dataTransfer.getData('sourceId');
        const slotIndex = e.target.dataset.index;

        // Verifica se a letra é a correta para aquela posição específica
        if (letraData === palavraAlvo[slotIndex] && !e.target.innerText) {
            e.target.innerText = letraData;
            e.target.classList.add('correct');
            document.getElementById(sourceId).style.visibility = 'hidden';
            letrasColocadas++;
            
            if (letrasColocadas === palavraAlvo.length) {
                concluirPalavra();
            }
        } else {
            e.target.style.borderColor = "#e53e3e";
            setTimeout(() => e.target.style.borderColor = "#cbd5e0", 500);
        }
    }

    function concluirPalavra() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('feedback-msg').innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🚂💨 O comboio está pronto!</span>";
        setTimeout(iniciarJogo, 3000);
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciarJogo;
</script>
</body>
</html>
