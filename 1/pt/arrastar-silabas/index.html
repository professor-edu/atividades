<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Arrastar Sílabas 🖐️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); }
        
        .hamburger { cursor: pointer; background: rgba(255,255,255,0.4); border: none; padding: 10px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; box-shadow: 0 3px 0 var(--cor-1ano-dark); }

        h1 { color: var(--azul-escuro); margin: 0; font-size: 1.8rem; }
        .subtitulo { color: var(--azul-escuro); font-size: 1rem; opacity: 0.8; margin-top: 10px; }

        /* SISTEMA DE ESTRELAS */
        .progresso-container { margin: 20px auto; width: 90%; max-width: 450px; }
        .estrelas { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; font-size: 1.5rem; }
        .estrela { color: #cbd5e0; transition: 0.3s; }
        .estrela.vitoria { color: #f6e05e; } /* Amarela se acertou */
        .estrela.derrota { color: #e53e3e; text-decoration: line-through; opacity: 0.5; } /* Vermelha e riscada se errou */

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 750px; min-height: 480px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .imagem-pergunta { width: 180px; height: 180px; object-fit: contain; margin-bottom: 25px; }
        
        .drop-zone-container { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .drop-zone {
            width: 85px; height: 85px; border: 3px dashed #cbd5e0; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 800; color: var(--azul-escuro); background: #fdfdfd;
        }

        .options-container { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .silaba-drag {
            padding: 15px 25px; background: var(--cor-1ano); color: white; border-radius: 12px;
            cursor: grab; font-weight: bold; font-size: 1.5rem; box-shadow: 0 4px 0 var(--cor-1ano-dark);
            user-select: none;
        }
        .silaba-drag.dragging { opacity: 0.4; }

        #feedback { margin-top: 25px; font-weight: 700; font-size: 1.3rem; min-height: 1.5rem; transition: 0.3s; }
        
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: 20px; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger"><span></span><span></span><span></span></button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Arrastar Sílabas 🖐️</h1>
        <div class="subtitulo">Forma a palavra correta arrastando as sílabas.</div>
    </div>
</header>

<div class="progresso-container">
    <div class="estrelas" id="estrelas-box"></div>
</div>

<main>
    <div class="cartao-jogo-container" id="game-container">
        <img src="" id="imagem-palavra" class="imagem-pergunta">
        <div class="drop-zone-container" id="drop-zones"></div>
        <div class="options-container" id="options"></div>
        <div id="feedback"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <b>EB1/PE da Marinheira</b></p>
</footer>

<script>
    let indiceAtual = 0;
    const totalJogadas = 10;
    let palavrasSelecionadas = [];
    let errouNestaPalavra = false;

    function iniciarJogo() {
        indiceAtual = 0;
        // Baralhar todas as palavras do dados.js e escolher 10
        palavrasSelecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, totalJogadas);
        
        desenharEstrelas();
        carregarQuestao();
    }

    function desenharEstrelas() {
        const box = document.getElementById('estrelas-box');
        box.innerHTML = '';
        for (let i = 0; i < totalJogadas; i++) {
            box.innerHTML += `<span class="estrela" id="star-${i}">★</span>`;
        }
    }

    function carregarQuestao() {
        const item = palavrasSelecionadas[indiceAtual];
        const imgElement = document.getElementById('imagem-palavra');
        const dropZonesBox = document.getElementById('drop-zones');
        const optionsBox = document.getElementById('options');
        const feedbackBox = document.getElementById('feedback');

        errouNestaPalavra = false;
        feedbackBox.innerHTML = "";
        dropZonesBox.innerHTML = "";
        optionsBox.innerHTML = "";
        
        // Caminho da imagem (ajustado para ../img/ baseado na tua estrutura)
        imgElement.src = `../img/${item.imagem.split('/').pop()}`;

        // Criar zonas baseadas na divisão (ex: "PA-TO")
        const silabasCorretas = item.divisao.split('-');
        silabasCorretas.forEach(s => {
            const zone = document.createElement('div');
            zone.className = 'drop-zone';
            zone.dataset.expected = s;
            dropZonesBox.appendChild(zone);
        });

        // Criar opções (as corretas + 2 aleatórias de outras palavras para baralhar)
        let opcoes = [...silabasCorretas];
        while(opcoes.length < silabasCorretas.length + 2) {
            let randSill = palavras[Math.floor(Math.random()*palavras.length)].divisao.split('-')[0];
            if(!opcoes.includes(randSill)) opcoes.push(randSill);
        }
        
        opcoes.sort(() => Math.random() - 0.5).forEach(s => {
            const drag = document.createElement('div');
            drag.className = 'silaba-drag';
            drag.draggable = true;
            drag.innerText = s;
            drag.addEventListener('dragstart', () => drag.classList.add('dragging'));
            drag.addEventListener('dragend', () => drag.classList.remove('dragging'));
            optionsBox.appendChild(drag);
        });

        configurarEventosDrag();
    }

    function configurarEventosDrag() {
        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', () => {
                const dragging = document.querySelector('.dragging');
                const feedbackBox = document.getElementById('feedback');

                if (dragging.innerText === zone.dataset.expected) {
                    zone.innerText = dragging.innerText;
                    zone.style.borderColor = "var(--sucesso)";
                    zone.style.background = "#f0fff4";
                    dragging.style.visibility = "hidden";
                    feedbackBox.innerHTML = "<span style='color:var(--sucesso)'>Muito bem! ✨</span>";
                    verificarPalavraCompleta();
                } else {
                    errouNestaPalavra = true;
                    feedbackBox.innerHTML = "<span style='color:var(--erro)'>Tenta outra vez! 🤔</span>";
                }
            });
        });
    }

    function verificarPalavraCompleta() {
        const zones = document.querySelectorAll('.drop-zone');
        const todasPreenchidas = Array.from(zones).every(z => z.innerText !== "");

        if (todasPreenchidas) {
            const estrela = document.getElementById(`star-${indiceAtual}`);
            if (errouNestaPalavra) {
                estrela.classList.add('derrota');
            } else {
                estrela.classList.add('vitoria');
            }

            indiceAtual++;
            setTimeout(() => {
                if (indiceAtual < totalJogadas) {
                    carregarQuestao();
                } else {
                    mostrarFimJogo();
                }
            }, 1200);
        }
    }

    function mostrarFimJogo() {
        const container = document.getElementById('game-container');
        const vitorias = document.querySelectorAll('.estrela.vitoria').length;
        
        container.innerHTML = `
            <h2 style="color: var(--azul-escuro); font-size: 2.2rem; margin-top:0;">Fim do Jogo!</h2>
            <div style="font-size: 5rem; margin: 20px;">🏆</div>
            <p style="font-size: 1.4rem; color: var(--text-main);">Acertaste <b>${vitorias}</b> de 10 palavras sem errar!</p>
            <button onclick="location.reload()" class="btn-voltar" style="padding: 15px 40px; font-size: 1.2rem; cursor:pointer; margin-top:20px;">Jogar Novamente 🔄</button>
        `;
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciarJogo;
</script>

</body>
</html>
