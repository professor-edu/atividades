<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Arrastar Sílabas 🖐️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER & NAV - TEMPLATE ORIGINAL RESTRITO */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .hamburger:hover { background: #d0e8ff; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        /* SIDEBAR - LINKS ATUALIZADOS */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white !important; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ESTRELAS */
        .estrelas-container { display: flex; justify-content: center; gap: 12px; margin: 15px 0; }
        .estrela-box { font-size: 2.5rem; color: #cbd5e0; transition: 0.4s; text-shadow: 1px 2px 4px rgba(0,0,0,0.1); }
        .estrela-box.vitoria { color: #f6e05e; transform: scale(1.1); }
        .estrela-box.derrota { color: var(--erro); text-decoration: line-through; opacity: 0.4; }

        /* JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; min-height: 480px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center;
        }

        /* CONTENTOR DA IMAGEM COM REALCE */
        .wrapper-imagem {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); /* Sombra suave */
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #f0f0f0; /* Borda muito fina */
        }

        .imagem-pergunta { 
            max-width: 220px; 
            height: 180px; 
            object-fit: contain; 
            display: block;
        }

        .drop-zone-container { display: flex; gap: 15px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center; }
        .drop-zone {
            width: 90px; height: 90px; border: 3px dashed #cbd5e0; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 800; color: var(--azul-escuro); background: #fdfdfd;
        }

        .options-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .silaba-drag {
            padding: 18px 32px; background: var(--cor-1ano); color: white; border-radius: 15px;
            cursor: grab; font-weight: bold; font-size: 1.7rem; box-shadow: 0 5px 0 var(--cor-1ano-dark);
            user-select: none; transition: 0.2s;
        }
        .silaba-drag:active { cursor: grabbing; transform: translateY(2px); box-shadow: 0 2px 0 var(--cor-1ano-dark); }
        .silaba-drag.dragging { opacity: 0; }

        #feedback-msg { margin-top: 25px; font-weight: 700; font-size: 1.5rem; min-height: 2.2rem; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; margin-bottom: 10px; }
            .hamburger { grid-column: 1; }
            .btn-voltar { grid-column: 2; justify-self: center; }
            h1, .subtitulo { grid-column: 2; }
            .estrela-box { font-size: 1.6rem; gap: 5px; }
            .wrapper-imagem { padding: 10px; max-width: 90%; }
            .imagem-pergunta { max-width: 100%; height: 140px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Arrastar Sílabas 🖐️</h1>
        <div class="subtitulo">Arrasta as sílabas para o lugar certo!</div>
    </div>
</header>

<div class="estrelas-container" id="estrelas-box"></div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="wrapper-imagem">
            <img src="" id="img-word" class="imagem-pergunta">
        </div>
        <div class="drop-zone-container" id="drop-zones"></div>
        <div class="options-container" id="options"></div>
        <div id="feedback-msg"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <b>EB1/PE da Marinheira</b></p>
</footer>

<script>
    let indice = 0;
    const total = 10;
    let selecionadas = [];
    let erroNaTentativa = false;

    function iniciar() {
        indice = 0;
        selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, total);
        const box = document.getElementById('estrelas-box');
        box.innerHTML = '';
        for(let i=0; i<total; i++) box.innerHTML += `<div class="estrela-box" id="s-${i}">★</div>`;
        montarFase();
    }

    function montarFase() {
        const item = selecionadas[indice];
        erroNaTentativa = false;
        document.getElementById('img-word').src = `../../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerHTML = "";
        
        const zones = document.getElementById('drop-zones');
        const opts = document.getElementById('options');
        zones.innerHTML = "";
        opts.innerHTML = "";

        const silabas = item.divisao.split('-');
        silabas.forEach(s => {
            const z = document.createElement('div');
            z.className = 'drop-zone';
            z.dataset.val = s;
            zones.appendChild(z);
        });

        [...silabas].sort(() => Math.random() - 0.5).forEach(s => {
            const d = document.createElement('div');
            d.className = 'silaba-drag';
            d.draggable = true;
            d.innerText = s;
            d.addEventListener('dragstart', () => d.classList.add('dragging'));
            d.addEventListener('dragend', () => d.classList.remove('dragging'));
            opts.appendChild(d);
        });
        ativarDrag();
    }

    function ativarDrag() {
        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', () => {
                const drag = document.querySelector('.dragging');
                if(!drag) return;
                if(drag.innerText === z.dataset.val) {
                    z.innerText = drag.innerText;
                    z.style.borderColor = "var(--sucesso)";
                    z.style.background = "#f0fff4";
                    drag.remove();
                    verificar();
                } else {
                    erroNaTentativa = true;
                }
            });
        });
    }

    function verificar() {
        const zones = document.querySelectorAll('.drop-zone');
        if(Array.from(zones).every(z => z.innerText !== "")) {
            document.getElementById('feedback-msg').innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🎉</span>";
            document.getElementById(`s-${indice}`).classList.add(erroNaTentativa ? 'derrota' : 'vitoria');
            indice++;
            setTimeout(() => {
                if(indice < total) montarFase();
                else finalizar();
            }, 1200);
        }
    }

    function finalizar() {
        const vitorias = document.querySelectorAll('.estrela-box.vitoria').length;
        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2.5rem;">🎉 PARABÉNS! 🎉</h2>
            <div style="font-size:6rem; margin:20px;">🏆</div>
            <p style="font-size:1.4rem;">Conseguiste <b>${vitorias} de 10</b> estrelas douradas!</p>
            <button onclick="location.reload()" class="btn-voltar" style="padding:15px 40px; font-size:1.2rem; cursor:pointer; margin-top:20px;">Jogar de Novo 🔄</button>
        `;
    }

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
