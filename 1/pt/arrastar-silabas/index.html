<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Ordenar Sílabas 🖐️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Script para o Arrastar funcionar em ecrãs táteis (Tablets/Telemóveis) -->
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE (IGUAL AO BOM)
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px; gap: 25px; }
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        /* =========================================
           ÁREA DO JOGO (Flex para ocupar o ecrã)
           ========================================= */
        .cartao-jogo-container { 
            background: white; width: 100%; max-width: 900px; 
            flex: 1; /* Estica magicamente! */
            min-height: 450px; 
            padding: 40px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; overflow: hidden; 
        }

        .status-bar { width: 100%; max-width: 750px; display: none; margin-bottom: 20px; }
        .score-container { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: bold; font-size: 1.3rem; padding: 0 15px; }
        .score-certas { color: #219d53; }
        .score-erradas { color: #d0303f; }
        .progress-bg { 
			background-color: #e2e8f0; /* Um cinza mais suave */
			border-radius: 20px; 
			height: 30px; /* Um pouco mais grossa */
			width: 100%; 
			overflow: hidden; 
			box-shadow: inset 0 3px 5px rgba(0,0,0,0.1); 
			border: 2px solid #d4dbe3; /* Borda branca dá um toque premium */
		}

.progress-fill { 
    height: 100%; 
    width: 0%; 
    border-radius: 20px; 
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
    
    /* Magia das riscas animadas */
    background-color: var(--cor-1ano);
    background-image: linear-gradient(
        45deg, 
        rgba(255, 255, 255, 0.2) 25%, 
        transparent 25%, 
        transparent 50%, 
        rgba(255, 255, 255, 0.2) 50%, 
        rgba(255, 255, 255, 0.2) 75%, 
        transparent 75%, 
        transparent
    );
    background-size: 30px 30px;
    animation: moverRiscas 2s linear infinite;
}

/* Animação para fazer as riscas deslizarem */
@keyframes moverRiscas {
    0% { background-position: 0 0; }
    100% { background-position: 30px 0; }
}

        #game-screen { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: center;}

        /* LADO A LADO: Imagem e Dropzones */
        .top-panel {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .game-image {
            height: 240px; /* Aumentada! */
            object-fit: contain;
            border-radius: 20px;
            background-color: #ffffff;
            padding: 15px;
            border: 3px solid #e3f2fd;
            box-shadow: 0 8px 25px rgba(0, 145, 255, 0.15), 0 4px 10px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .game-image:hover { transform: scale(1.03); box-shadow: 0 12px 30px rgba(0, 145, 255, 0.25), 0 6px 15px rgba(0,0,0,0.1); }

        .dropzone-container {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; min-height: 75px;
        }

        .slot {
            width: 80px; height: 75px; border: 3px dashed #ced6e0; border-radius: 15px; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; transition: all 0.3s;
        }
        .slot.drag-over { border-color: var(--azul-vibrante); background-color: #e3f2fd; transform: scale(1.05); }

        /* CONTENTOR DE BAIXO (PISCINA DE SÍLABAS) */
        .pool-container {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 750px; padding-top: 25px; border-top: 2px dashed #e3f2fd; min-height: 80px;
        }
        .pool-container.drag-over { background-color: #f0f8ff; border-radius: 15px; }

        .syllable-card {
            background-color: var(--cor-1ano); color: white; width: 80px; height: 75px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; border-radius: 15px; cursor: grab; box-shadow: 0 5px 0 var(--cor-1ano-dark); text-transform: uppercase; user-select: none; touch-action: none; transition: transform 0.1s, box-shadow 0.1s;
        }
        .syllable-card:active { cursor: grabbing; transform: translateY(4px); box-shadow: 0 1px 0 var(--cor-1ano-dark); }
        .syllable-card.dragging { opacity: 0.4; transform: scale(0.95); }

        /* =========================================
           MOBILE RESPONSIVE
           ========================================= */
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            
            main { padding: 20px 15px; gap: 15px; } 
            .cartao-jogo-container { padding: 25px 15px; min-height: 350px; }
            
            /* Em mobile a imagem volta a ficar em cima das sílabas */
            .top-panel { flex-direction: column; gap: 20px; margin-bottom: 20px; }
            .game-image { height: 160px; }
        }

        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 300px; animation: fadeIn 0.5s ease; }
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; }
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; }
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px) rotate(-3deg); } 50% { transform: translateX(8px) rotate(3deg); } 75% { transform: translateX(-8px) rotate(-3deg); } }
        .error-shake { animation: shake 0.4s ease-in-out; }
        .slot-error .syllable-card { background-color: #ff4757 !important; box-shadow: 0 5px 0 #d0303f !important; }
        .slot-success .syllable-card { background-color: #2ed573 !important; box-shadow: 0 5px 0 #219d53 !important; transform: scale(1.1); transition: 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    body { scrollbar-gutter: stable; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../">🏠 Início</a></li>
        <li><a href="../../../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="../../">🎒 1º Ano</a></li>
        <li><a href="../../../2/">💡 2º Ano</a></li>
        <li><a href="../../../3/">🔍 3º Ano</a></li>
        <li><a href="../../../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Ordenar Sílabas 🖐️</h1>
        <div class="subtitulo">Arrasta as sílabas para os quadrados na ordem certa!</div>
    </div>
</header>

<main>
    <div id="status-bar-container" class="status-bar">
        <div class="score-container">
            <span class="score-certas">✔️ Certas: <span id="val-certas">0</span></span>
            <span class="score-erradas">❌ Erradas: <span id="val-erradas">0</span></span>
        </div>
        <div class="progress-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="cartao-jogo-container">
        <div id="game-screen">
            
            <div class="top-panel">
                <img id="game-image" class="game-image" src="" alt="Imagem secreta">
                <div id="dropzone-container" class="dropzone-container"></div>
            </div>
            
            <div id="pool-container" class="pool-container"></div>
        </div>

        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Fim do Jogo! 🎉</h2>
            <div class="end-stats">
                Acertaste <strong id="final-certas" style="color:#2ed573">0</strong> palavras<br>
                Tiveste <strong id="final-erradas" style="color:#ff4757">0</strong> tentativas erradas.
            </div>
            <button class="btn-reiniciar" onclick="iniciarJogo()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script src="../dados.js"></script>

<script>
    // Inicializa o arrastar e largar (Drag and Drop) para Telemóveis
    MobileDragDrop.polyfill({ holdToDrag: 0 });

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    const MAX_PALAVRAS = 10;
    let palavrasDoJogo =[];
    let palavraAtualIndex = 0;
    let certas = 0;
    let erradas = 0;
    let isVerificando = false;

    const elGameScreen = document.getElementById('game-screen');
    const elEndScreen = document.getElementById('end-screen');
    const statusBar = document.getElementById('status-bar-container');
    const elValCertas = document.getElementById('val-certas');
    const elValErradas = document.getElementById('val-erradas');
    const elProgressFill = document.getElementById('progress-fill');
    const elImage = document.getElementById('game-image');
    const dropzoneContainer = document.getElementById('dropzone-container');
    const poolContainer = document.getElementById('pool-container');

    let draggedElement = null;

    function getImagePath(imgPath) {
        if (!imgPath) return '';
        return imgPath.replace('img/', '../img/');
    }

    function iniciarJogo() {
        certas = 0; erradas = 0; palavraAtualIndex = 0; isVerificando = false;
        atualizarPlacar();
        
        elEndScreen.style.display = 'none';
        elGameScreen.style.display = 'flex';
        statusBar.style.display = 'block';
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        let baralhadas = [...palavras].sort(() => Math.random() - 0.5);
        palavrasDoJogo = baralhadas.slice(0, MAX_PALAVRAS);
        carregarPalavra();
    }

    function carregarPalavra() {
        isVerificando = false;
        const palavraObj = palavrasDoJogo[palavraAtualIndex];
        
        elProgressFill.style.width = `${(palavraAtualIndex / MAX_PALAVRAS) * 100}%`;
        elImage.src = getImagePath(palavraObj.imagem);

        dropzoneContainer.innerHTML = '';
        poolContainer.innerHTML = '';

        const silabasCorretas = palavraObj.divisao.split('-');
        
        for (let i = 0; i < silabasCorretas.length; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.addEventListener('dragover', handleDragOver);
            slot.addEventListener('dragleave', handleDragLeave);
            slot.addEventListener('drop', handleDropSlot);
            dropzoneContainer.appendChild(slot);
        }

        let silabasBaralhadas = [...silabasCorretas].sort(() => Math.random() - 0.5);
        
        silabasBaralhadas.forEach((silaba, index) => {
            const card = document.createElement('div');
            card.className = 'syllable-card';
            card.textContent = silaba;
            card.draggable = true;
            card.id = `card-${index}`;

            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);

            poolContainer.appendChild(card);
        });

        poolContainer.addEventListener('dragover', handleDragOverPool);
        poolContainer.addEventListener('dragleave', handleDragLeavePool);
        poolContainer.addEventListener('drop', handleDropPool);
    }

    // ==========================================
    // FUNÇÕES DE ARRASTAR (DRAG & DROP)
    // ==========================================

    function handleDragStart(e) {
        if (isVerificando) { e.preventDefault(); return; }
        draggedElement = e.target;
        e.target.classList.add('dragging');
        e.dataTransfer.setData('text/plain', e.target.id);
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        e.target.classList.remove('dragging');
        draggedElement = null;
    }

    function handleDragOver(e) {
        e.preventDefault(); 
        if (!e.target.firstChild && e.target.classList.contains('slot')) {
            e.target.classList.add('drag-over');
        }
    }
    
    function handleDragLeave(e) {
        if (e.target.classList.contains('slot')) e.target.classList.remove('drag-over');
    }

    function handleDropSlot(e) {
        e.preventDefault();
        const slot = e.target.closest('.slot');
        if (slot) {
            slot.classList.remove('drag-over');
            if (!slot.firstChild && draggedElement) {
                slot.appendChild(draggedElement);
                verificarCompletude();
            }
        }
    }

    function handleDragOverPool(e) {
        e.preventDefault();
        poolContainer.classList.add('drag-over');
    }

    function handleDragLeavePool(e) {
        poolContainer.classList.remove('drag-over');
    }

    function handleDropPool(e) {
        e.preventDefault();
        poolContainer.classList.remove('drag-over');
        if (draggedElement && draggedElement.parentElement !== poolContainer) {
            poolContainer.appendChild(draggedElement);
        }
    }

    function verificarCompletude() {
        const slots = Array.from(dropzoneContainer.children);
        const todasPreenchidas = slots.every(slot => slot.firstChild !== null);

        if (todasPreenchidas && !isVerificando) {
            isVerificando = true;
            
            const palavraFormada = slots.map(slot => slot.firstChild.textContent).join('-');
            const palavraCorreta = palavrasDoJogo[palavraAtualIndex].divisao;

            if (palavraFormada === palavraCorreta) {
                certas++; atualizarPlacar(); tocarSom('acerto');
                slots.forEach(slot => slot.classList.add('slot-success'));

                setTimeout(() => {
                    palavraAtualIndex++;
                    if (palavraAtualIndex < MAX_PALAVRAS) carregarPalavra();
                    else finalizarJogo();
                }, 1200);
            } else {
                erradas++; atualizarPlacar(); tocarSom('erro');
                dropzoneContainer.classList.add('error-shake');
                slots.forEach(slot => slot.classList.add('slot-error'));

                setTimeout(() => {
                    dropzoneContainer.classList.remove('error-shake');
                    slots.forEach(slot => {
                        slot.classList.remove('slot-error');
                        if(slot.firstChild) poolContainer.appendChild(slot.firstChild);
                    });
                    isVerificando = false;
                }, 800);
            }
        }
    }

    function atualizarPlacar() {
        elValCertas.textContent = certas;
        elValErradas.textContent = erradas;
    }

    function finalizarJogo() {
        elProgressFill.style.width = `100%`;
        setTimeout(() => {
            elGameScreen.style.display = 'none';
            statusBar.style.display = 'none';
            elEndScreen.style.display = 'flex';
            document.getElementById('final-certas').textContent = certas;
            document.getElementById('final-erradas').textContent = erradas;

            if (erradas === 0) {
                document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
                tocarSom('vitoria'); dispararConfetis();
            } else if (erradas <= 3) {
                document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); dispararConfetis();
            } else {
                document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }
        }, 500);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'acerto') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, agora); osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } else if (tipo === 'erro') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(250, agora); osc.frequency.exponentialRampToValueAtTime(100, agora + 0.3);
            gain.gain.setValueAtTime(0.15, agora); gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.4);
            osc.start(agora); osc.stop(agora + 0.4);
        } else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15); g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() { canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth; canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight; }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas(); confetis =[]; const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#eccc68'];
        for (let i = 0; i < 100; i++) {
            confetis.push({ x: Math.random() * canvasConfetti.width, y: Math.random() * canvasConfetti.height - canvasConfetti.height, w: Math.random() * 10 + 5, h: Math.random() * 10 + 5, cor: cores[Math.floor(Math.random() * cores.length)], velY: Math.random() * 3 + 2, velX: Math.random() * 2 - 1, rotacao: Math.random() * 360, velRotacao: Math.random() * 5 - 2.5 });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height); let ativos = false;
        confetis.forEach(c => {
            c.y += c.velY; c.x += c.velX; c.rotacao += c.velRotacao; if (c.y < canvasConfetti.height) ativos = true;
            ctxConfetti.save(); ctxConfetti.translate(c.x, c.y); ctxConfetti.rotate(c.rotacao * Math.PI / 180); ctxConfetti.fillStyle = c.cor; ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h); ctxConfetti.restore();
        });
        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = () => {
        if (typeof palavras === 'undefined') {
            console.error("dados.js não encontrado!");
        } else {
            iniciarJogo();
        }
    };

</script>
