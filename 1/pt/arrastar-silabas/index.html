<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Português | Arrastar Sílabas 🖐️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; /* Cor temática do 1º Ano */
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            /* Cores do Jogo */
            --verde: #4caf50;
            --vermelho: #e53935;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER E SIDEBAR DO TEMPLATE */
        header {
            background-color: var(--bg-header);
            padding: 20px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }

        .hamburger {
            cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }

        .btn-voltar {
            background: var(--cor-1ano); color: white; border: none;
            padding: 8px 18px; border-radius: 20px; font-weight: 700;
            text-decoration: none; font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
        }

        h1 { color: var(--azul-escuro); font-size: clamp(1.2rem, 4vw, 2rem); margin: 0; display: flex; align-items: center; gap: 10px; font-family: 'Quicksand', sans-serif; }

        /* AREA DE JOGO INTEGRADA */
        main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .status-jogo { width: 100%; max-width: 600px; margin-bottom: 20px; }
        .estrelas { font-size: 24px; color: #f57c00; font-weight: 700; margin-bottom: 8px; }

        .progresso-container {
            height: 14px; background: white; border-radius: 10px; 
            overflow: hidden; border: 2px solid var(--azul-vibrante);
        }
        .barra-progresso { width: 0%; height: 100%; background: var(--azul-vibrante); transition: 0.5s; }

        .cartao-jogo {
            background: white; width: 100%; max-width: 600px;
            padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid var(--azul-vibrante);
        }

        .imagem-pergunta { height: 150px; width: 150px; object-fit: contain; margin-bottom: 15px; }

        .zona-drop {
            display: flex; gap: 12px; justify-content: center; min-height: 70px;
            margin: 15px 0; flex-wrap: wrap; padding: 15px;
            border-radius: 20px; background: #f9f9f9; border: 2px dashed var(--azul-janela-borda);
        }

        .caixa-silaba {
            width: 80px; height: 55px; background: var(--azul-janela-fundo);
            border: 2px solid var(--azul-janela-borda); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: var(--azul-escuro);
            cursor: grab; box-shadow: 0 4px 0px var(--azul-janela-borda);
            touch-action: none;
        }

        .caixa-vazia {
            width: 80px; height: 55px; border: 2px dashed #cbd5e0;
            border-radius: 12px; background: #fff;
        }

        .opcoes-silabas {
            display: flex; gap: 12px; justify-content: center; 
            margin-top: 20px; flex-wrap: wrap; padding: 15px;
            background: #f0f7ff; border-radius: 20px; min-height: 80px;
        }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { padding: 20px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #eee; color: #ff4757; }
        .sidebar ul { list-style: none; padding: 20px; margin: 0; }
        .sidebar li a { display: block; padding: 12px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 10px; margin-bottom: 8px; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-escuro); font-weight: 700; }

        @media (max-width: 600px) {
            .caixa-silaba, .caixa-vazia { width: 65px; height: 50px; font-size: 18px; }
            .nav-container { position: static; transform: none; width: 100%; justify-content: space-between; margin-bottom: 10px; }
            .btn-voltar { padding: 5px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()">✕ Fechar</div>
    <ul>
        <li><a href="../../index.html">🏠 Início</a></li>
        <li><a href="../index.html">🎒 Menu 1º Ano</a></li>
        <li><a href="index.html">✍️ Português</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>🖐️ Arrastar Sílabas 🖐️</h1>
    </div>
</header>

<main>
    <div class="status-jogo">
        <div class="estrelas"><span id="contador-estrelas">0</span> ⭐</div>
        <div class="progresso-container">
            <div id="barra-progresso" class="barra-progresso"></div>
        </div>
    </div>

    <div class="cartao-jogo" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="" alt="carregando...">
        <p style="font-weight: 700; color: var(--azul-escuro); margin: 0;">Organiza as sílabas:</p>
        
        <div class="zona-drop" id="caixas-destino"></div>
        <div class="opcoes-silabas" id="caixas-origem"></div>
        
        <div id="feedback" style="min-height: 35px; font-weight: 700; font-size: 1.2rem; margin-top: 10px;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 EB1/PE da Marinheira</p>
</footer>

<script src="js/dados.js"></script>
<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    let indiceAtual = 0;
    let estrelas = 0;
    let listaJogo = [];

    // Verificação de segurança se os dados existem
    if (typeof palavras !== 'undefined') {
        listaJogo = [...palavras].sort(() => 0.5 - Math.random());
    } else {
        // Dados de teste caso o dados.js falhe
        listaJogo = [{divisao: "BO-LA", imagem: "https://cdn-icons-png.flaticon.com/512/5361/5361025.png"}];
    }

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        atualizarBarra();
        const item = listaJogo[indiceAtual];
        const silabasCorretas = item.divisao.split('-');
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('feedback').innerText = "";
        
        const destino = document.getElementById('caixas-destino');
        destino.innerHTML = "";
        silabasCorretas.forEach((s) => {
            const caixa = document.createElement('div');
            caixa.className = 'caixa-vazia';
            caixa.dataset.silabaCorreta = s;
            caixa.ondragover = (e) => e.preventDefault();
            caixa.ondrop = lidarDrop;
            destino.appendChild(caixa);
        });

        const origem = document.getElementById('caixas-origem');
        origem.innerHTML = "";
        const silabasBaralhadas = [...silabasCorretas].sort(() => 0.5 - Math.random());
        silabasBaralhadas.forEach((s, i) => origem.appendChild(criarSilaba(s, i)));
    }

    function criarSilaba(texto, id) {
        const div = document.createElement('div');
        div.className = 'caixa-silaba';
        div.innerText = texto;
        div.draggable = true;
        div.id = "silaba-" + Math.random().toString(36).substr(2, 9);
        div.ondragstart = (e) => { e.dataTransfer.setData("text", e.target.id); };
        div.ontouchstart = lidarTouchStart;
        div.ontouchmove = lidarTouchMove;
        div.ontouchend = lidarTouchEnd;
        return div;
    }

    function lidarDrop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const elemento = document.getElementById(id);
        const caixaDestino = e.target.closest('.caixa-vazia');
        if (caixaDestino && !caixaDestino.hasChildNodes()) {
            caixaDestino.appendChild(elemento);
            verificarPalavra();
        }
    }

    let touchElement = null;
    function lidarTouchStart(e) { touchElement = e.target; }
    function lidarTouchMove(e) {
        e.preventDefault();
        let touch = e.touches[0];
        touchElement.style.position = 'fixed';
        touchElement.style.left = touch.clientX - 40 + 'px';
        touchElement.style.top = touch.clientY - 25 + 'px';
        touchElement.style.zIndex = "1000";
    }
    function lidarTouchEnd(e) {
        if(!touchElement) return;
        touchElement.style.position = 'static';
        let touch = e.changedTouches[0];
        let dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        let caixaVazia = dropTarget ? dropTarget.closest('.caixa-vazia') : null;
        if (caixaVazia && !caixaVazia.hasChildNodes()) {
            caixaVazia.appendChild(touchElement);
            verificarPalavra();
        } else {
            document.getElementById('caixas-origem').appendChild(touchElement);
        }
        touchElement = null;
    }

    function verificarPalavra() {
        const caixas = document.querySelectorAll('.caixa-vazia');
        let preenchidas = 0;
        caixas.forEach(c => { if(c.hasChildNodes()) preenchidas++; });
        
        if (preenchidas === caixas.length) {
            let todasCorretas = true;
            caixas.forEach(c => { if (c.firstChild.innerText !== c.dataset.silabaCorreta) todasCorretas = false; });
            
            if (todasCorretas) {
                estrelas++;
                document.getElementById('contador-estrelas').innerText = estrelas;
                document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Excelente! ✨</span>";
                setTimeout(() => { indiceAtual++; carregarPergunta(); }, 1200);
            } else {
                document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Tenta de novo! 🔄</span>";
                setTimeout(() => {
                    caixas.forEach(c => { if (c.firstChild) document.getElementById('caixas-origem').appendChild(c.firstChild); });
                    document.getElementById('feedback').innerText = "";
                }, 1000);
            }
        }
    }

    function atualizarBarra() {
        if (listaJogo.length === 0) return;
        const perc = (indiceAtual / listaJogo.length) * 100;
        document.getElementById('barra-progresso').style.width = perc + "%";
    }

    function finalizarJogo() {
        document.getElementById('barra-progresso').style.width = "100%";
        document.getElementById('jogo-container').innerHTML = `
            <h2 style="color: var(--azul-escuro)">🏆 Missão Cumprida!</h2>
            <p style="font-size: 1.2rem;">Conseguiste as <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" style="background: var(--cor-1ano); color:white; border:none; padding:15px 30px; border-radius:25px; font-weight:700; cursor:pointer;">Jogar Novamente</button>
        `;
    }
    window.onload = carregarPergunta;
</script>
</body>
</html>
