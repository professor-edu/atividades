<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escrita de Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER (IGUAL AO TEMPLATE) */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* HAMBURGER ANIMADO */
        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        /* SIDEBAR COMPLETA */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* JOGO DE ESCRITA */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; min-height: 500px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
        }

        .img-container {
            background: #fff; padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px;
            border: 1px solid #f0f0f0;
        }
        .img-container img { max-width: 200px; height: 160px; object-fit: contain; }

        .caixas-escrita { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .input-silaba {
            width: 80px; height: 80px; border: 3px solid #cbd5e0; border-radius: 15px;
            font-size: 1.8rem; font-weight: 800; text-align: center; text-transform: uppercase;
            color: var(--azul-escuro); outline: none; transition: 0.3s;
        }
        .input-silaba:focus { border-color: var(--cor-1ano); background: #f0f9ff; }
        .input-silaba.correto { border-color: var(--sucesso); background: #f0fff4; }
        .input-silaba.errado { border-color: var(--erro); background: #fff5f5; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        /* FOOTER */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .input-silaba { width: 65px; height: 65px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Escrever Sílabas ✍️</h1>
        <div class="subtitulo">Completa as caixas com as sílabas corretas da palavra.</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="img-container">
            <img src="" id="imagem-pergunta">
        </div>

        <div class="caixas-escrita" id="caixas-escrita">
            </div>

        <div id="feedback-msg" style="font-weight:700; font-size:1.5rem; min-height:2rem;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    let indice = 0;
    let selecionadas = [];
    const totalFases = 10;

    function iniciar() {
        // Seleciona 10 palavras aleatórias do teu dados.js
        selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, totalFases);
        proximaFase();
    }

    function proximaFase() {
        if (indice >= totalFases) {
            finalizar();
            return;
        }

        const item = selecionadas[indice];
        const silabas = item.divisao.split('-'); // Usa a divisão do dados.js
        
        document.getElementById('imagem-pergunta').src = `../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerText = "";
        
        const container = document.getElementById('caixas-escrita');
        container.innerHTML = "";

        silabas.forEach((sil, i) => {
            const input = document.createElement('input');
            input.type = "text";
            input.className = "input-silaba";
            input.maxLength = sil.length;
            input.dataset.correta = sil;
            
            // Lógica de verificação automática
            input.addEventListener('input', function() {
                this.classList.remove('errado');
                if (this.value.toUpperCase() === this.dataset.correta.toUpperCase()) {
                    this.classList.add('correto');
                    this.readOnly = true;
                    
                    // Focar na próxima caixa se existir
                    const proximo = container.children[i + 1];
                    if (proximo) proximo.focus();
                    
                    verificarPalavraCompleta();
                }
            });

            // Tecla Enter para feedback visual se estiver errado
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && this.value.toUpperCase() !== this.dataset.correta.toUpperCase()) {
                    this.classList.add('errado');
                }
            });

            container.appendChild(input);
        });

        // Foca na primeira caixa
        container.children[0].focus();
    }

    function verificarPalavraCompleta() {
        const inputs = document.querySelectorAll('.input-silaba');
        const tudoCorreto = Array.from(inputs).every(inp => inp.classList.contains('correto'));

        if (tudoCorreto) {
            document.getElementById('feedback-msg').innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🎉</span>";
            indice++;
            setTimeout(proximaFase, 1500);
        }
    }

    function finalizar() {
        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2.5rem;">🎉 FANTÁSTICO! 🎉</h2>
            <div style="font-size:6rem; margin:20px;">🌟</div>
            <p style="font-size:1.4rem;">Completaste as 10 palavras com sucesso!</p>
            <button onclick="location.reload()" class="btn-voltar" style="padding:15px 40px; font-size:1.2rem; cursor:pointer; margin-top:20px;">Jogar de Novo 🔄</button>
        `;
    }

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
