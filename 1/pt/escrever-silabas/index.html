<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER ESTRUTURADO DO TEMPLATE */
        header { 
            background-color: var(--bg-header); 
            padding: 25px 20px; 
            border-bottom: 1px solid var(--azul-vibrante); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            position: relative; 
            z-index: 100;
        }

        .header-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .nav-container { 
                position: static; 
                transform: none; 
                display: grid; 
                grid-template-columns: 50px 1fr 50px; 
                width: 100%; 
                margin-bottom: 10px; 
            }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1 { font-size: 1.6rem !important; margin-top: 5px; }
        }

        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* STATUS E BARRA ALTA */
        .game-status { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px auto; width: 90%; max-width: 600px; }
        .progress-bar-bg { width: 100%; height: 24px; background: #e2e8f0; border-radius: 12px; overflow: hidden; border: 2px solid #cbd5e0; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--cor-1ano); transition: 0.4s; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; padding: 40px 20px; border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-1ano);
            display: flex; flex-direction: column; align-items: center;
        }

        /* BORDA NA IMAGEM CONFORME PEDIDO */
        .wrapper-imagem {
            background: #ffffff; padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px;
            border: 2px solid #eef2f7;
        }
        .wrapper-imagem img { max-width: 220px; height: 180px; object-fit: contain; }

        .hint-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .hint-box { background: #f0f9ff; color: var(--azul-escuro); padding: 12px 25px; border-radius: 15px; font-weight: 700; font-size: 1.4rem; border: 2px solid #d0e4ff; }

        .input-escrita {
            width: 90%; max-width: 320px; padding: 18px; border: 3px solid #d0e4ff; border-radius: 20px;
            font-size: 1.8rem; font-weight: 700; text-align: center; color: var(--azul-escuro);
            outline: none; margin: 10px 0 25px; background: #fff; transition: border-color 0.3s;
        }
        .input-escrita:focus { border-color: var(--azul-vibrante); }

        /* BOTÃO VERIFICAR COM ANIMAÇÃO */
        .btn-verificar {
            background: var(--cor-1ano); color: white; border: none; padding: 15px 50px; border-radius: 50px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark);
            transition: all 0.2s ease; display: flex; align-items: center; gap: 10px;
        }
        .btn-verificar:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 0 var(--cor-1ano-dark); }
        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cor-1ano-dark); }

        /* FOOTER OFICIAL */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Escrever Sílabas ✍️</h1>
        <div class="subtitulo">Ordena as sílabas e escreve a palavra correta.</div>
    </div>
</header>

<div class="game-status">
    <div style="font-weight:700;">✅ <span id="acertos">0</span> | ❌ <span id="erros">0</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
</div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="wrapper-imagem"><img src="" id="img-pergunta"></div>
        <div class="hint-container" id="silabas-dica"></div>
        <input type="text" class="input-escrita" id="entrada-texto" placeholder="Escreve aqui..." autocomplete="off">
        <button class="btn-verificar" onclick="validar()">🔍 Verificar</button>
        <div id="feedback-msg" style="margin-top:20px; font-weight:700; font-size:1.4rem; min-height:1.6em;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    let indice = 0, total = 10, selecionadas = [], certos = 0, errados = 0, bloqueio = false;
    const somSucesso = new Audio('https://actions.google.com/sounds/v1/cartoon/clime_up_tone.ogg');

    function iniciar() {
        selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, total);
        proxima();
    }

    function proxima() {
        if (indice >= total) return finalizar();
        bloqueio = false;
        const item = selecionadas[indice];
        document.getElementById('img-pergunta').src = `../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerText = "";
        
        const entrada = document.getElementById('entrada-texto');
        entrada.value = ""; entrada.disabled = false; entrada.focus();
        
        const dicas = document.getElementById('silabas-dica');
        dicas.innerHTML = "";
        item.divisao.split('-').sort(() => 0.5 - Math.random()).forEach(s => {
            dicas.innerHTML += `<div class="hint-box">${s.toLowerCase()}</div>`;
        });
        
        document.getElementById('progress-fill').style.width = `${(indice / total) * 100}%`;
    }

    function validar() {
        if (bloqueio) return;
        bloqueio = true;
        const entrada = document.getElementById('entrada-texto');
        const item = selecionadas[indice];
        const feedback = document.getElementById('feedback-msg');

        if (entrada.value.trim().toLowerCase() === item.palavra.toLowerCase()) {
            certos++;
            document.getElementById('acertos').innerText = certos;
            feedback.innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🌟</span>";
            indice++;
            setTimeout(proxima, 1200);
        } else {
            errados++;
            document.getElementById('erros').innerText = errados;
            feedback.innerHTML = `<span style='color:var(--erro)'>A palavra era: ${item.palavra.toLowerCase()}</span>`;
            indice++;
            setTimeout(proxima, 2500);
        }
    }

    function finalizar() {
        document.getElementById('progress-fill').style.width = "100%";
        somSucesso.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2rem;">Parabéns! 🎉</h2>
            <p style="font-size:1.3rem;">Acertaste ${certos} de ${total} palavras!</p>
            <button onclick="location.reload()" class="btn-voltar" style="margin:20px auto; justify-content:center;">🔄 Jogar de Novo</button>
        `;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    document.getElementById('entrada-texto').addEventListener('keypress', (e) => { if(e.key==='Enter') validar(); });
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
