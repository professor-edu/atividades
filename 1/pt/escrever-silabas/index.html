<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escrever Sílabas ✏️</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; flex-shrink: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        
        /* =========================================
           O NOVO LAYOUT "MEIO TERMO" ESTRUTURAL
           ========================================= */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
            gap: 25px; 
        }

        .cartao-jogo-container { 
            background: white; 
            width: 100%; 
            max-width: 800px; 
            min-height: 450px; 
            padding: 40px 20px; 
            border-radius: 30px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
            border-top: 8px solid var(--cor-1ano); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            overflow: hidden; 
        }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; text-align: center; }
            
            /* Ajustes finos para Mobile */
            main { padding: 20px 15px; gap: 15px; } 
            .cartao-jogo-container { padding: 25px 15px; min-height: 350px; }
            .game-image { height: 160px !important; margin-bottom: 25px !important; }
        }

        /* =========================================
           BARRA E COMPONENTES AUMENTADOS
           ========================================= */
        .status-bar { 
            width: 100%; 
            max-width: 700px; 
            margin-bottom: 0; 
            display: none; 
        }
        
        .score-container { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-weight: bold; 
            font-size: 1.3rem; 
            padding: 0 15px;
        }

        .score-certas { color: #219d53; }
        .score-erradas { color: #d0303f; }
        
        .progress-bg { 
            background-color: white; 
            border-radius: 15px; 
            height: 22px; 
            width: 100%; 
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .progress-fill { 
            background-color: var(--cor-1ano); 
            height: 100%; 
            width: 0%; 
            border-radius: 15px; 
            transition: width 0.4s ease-out; 
        }

        .game-image {
            height: 200px; 
            object-fit: contain;
            margin-bottom: 35px; 
            border-radius: 20px;
            background-color: #ffffff;
            padding: 15px;
            border: 3px solid #e3f2fd;
            box-shadow: 0 8px 25px rgba(0, 145, 255, 0.15), 0 4px 10px rgba(0,0,0,0.05); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .game-image:hover { transform: scale(1.03); box-shadow: 0 12px 30px rgba(0, 145, 255, 0.25), 0 6px 15px rgba(0,0,0,0.1); }

        /* =========================================
           ESTILOS ESPECÍFICOS: ESCRITA DE SÍLABAS
           ========================================= */
        .slots-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .slot {
            width: 70px;
            height: 70px;
            border: 3px dashed var(--azul-vibrante);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--azul-escuro);
            background-color: transparent;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            box-sizing: border-box;
        }

        .slot.filled {
            border-style: solid;
            background-color: #e3f2fd;
            border-color: var(--azul-vibrante);
            box-shadow: 0 4px 0 #b1dcfb;
            transform: translateY(-2px);
        }

        .pool-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            padding-top: 20px;
            border-top: 2px solid #f0f4f8;
        }

        .syllable-btn {
            background-color: var(--cor-1ano);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.6rem;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--cor-1ano-dark);
            transition: all 0.1s;
            text-transform: uppercase;
            font-family: 'Roboto', sans-serif;
        }

        .syllable-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 var(--cor-1ano-dark);
        }

        .syllable-btn.hidden {
            visibility: hidden;
            opacity: 0;
        }

        /* =========================================
           SCREENS E ANIMAÇÕES
           ========================================= */
        #end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; animation: fadeIn 0.5s ease; }
        .end-title { font-size: 2.5rem; color: var(--azul-escuro); margin-bottom: 10px; }
        .end-stats { font-size: 1.5rem; color: var(--text-main); margin-bottom: 30px; }
        .btn-reiniciar { background-color: var(--cor-1ano); color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px) rotate(-2deg); }
            50% { transform: translateX(8px) rotate(2deg); }
            75% { transform: translateX(-8px) rotate(-2deg); }
        }
        
        .error-shake { 
            animation: shake 0.4s ease-in-out; 
            border-color: #ff4757 !important; 
            background-color: #ffefef !important; 
            color: #ff4757 !important; 
            box-shadow: 0 4px 0 #ffc1c1 !important;
        }
        
        .success-bounce { 
            background-color: #2ed573 !important;
            border-color: #26b360 !important;
            color: white !important;
            box-shadow: 0 4px 0 #219d53 !important;
            transform: scale(1.1); 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../../index.html">🏠 Início</a></li>
        <li><a href="../../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../../3/index.html">🔍 3º Ano</a></li>

    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Escrever Sílabas ✏️</h1>
        <div class="subtitulo">Usa as pistas (sílabas) e escreve o nome da imagem!</div>
    </div>
</header>

<main>
    <div id="status-bar-container" class="status-bar">
        <div class="score-container">
            <span class="score-certas">✔️ Certas: <span id="val-certas">0</span></span>
            <span class="score-erradas">❌ Erradas: <span id="val-erradas">0</span></span>
        </div>
        <div class="progress-bg">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </div>

    <div class="cartao-jogo-container">
        <div id="game-screen" style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <img id="game-image" class="game-image" src="" alt="Imagem secreta">
            
            <div id="slots-container" class="slots-container"></div>
            <div id="pool-container" class="pool-container"></div>
        </div>

        <div id="end-screen">
            <h2 class="end-title" id="end-title-text">Fim do Jogo! 🎉</h2>
            <div class="end-stats">
                Acertaste <strong id="final-certas" style="color:#2ed573">0</strong> palavras<br>
                Tiveste <strong id="final-erradas" style="color:#ff4757">0</strong> tentativas erradas.
            </div>
            <button class="btn-reiniciar" onclick="iniciarJogo()">JOGAR NOVAMENTE 🔄</button>
        </div>

        <canvas id="confetti-canvas"></canvas>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script src="dados.js"></script>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    const MAX_PALAVRAS = 10;
    let palavrasDoJogo =[];
    let palavraAtualIndex = 0;
    let certas = 0;
    let erradas = 0;
    let isVerificando = false;
    let palavraAtualObj = null;
    let silabasCorretas = [];
    let silabasNoTabuleiro = [];
    let poolDeSilabas =[];
    let todasAsSilabas =[];

    const elGameScreen = document.getElementById('game-screen');
    const elEndScreen = document.getElementById('end-screen');
    const statusBar = document.getElementById('status-bar-container');
    
    const elValCertas = document.getElementById('val-certas');
    const elValErradas = document.getElementById('val-erradas');
    const elProgressFill = document.getElementById('progress-fill');
    const elImage = document.getElementById('game-image');
    const slotsContainer = document.getElementById('slots-container');
    const poolContainer = document.getElementById('pool-container');

    function getImagePath(imgPath) {
        return imgPath.replace('img/', '../img/');
    }

    function iniciarJogo() {
        certas = 0; erradas = 0; palavraAtualIndex = 0; isVerificando = false;
        atualizarPlacar();
        
        elEndScreen.style.display = 'none';
        elGameScreen.style.display = 'flex';
        statusBar.style.display = 'block';
        
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);

        palavrasDoJogo =[...palavras].sort(() => Math.random() - 0.5).slice(0, MAX_PALAVRAS);
        todasAsSilabas =[...new Set(palavras.flatMap(p => p.divisao.split('-')))];
        
        carregarPalavra();
    }

    function carregarPalavra() {
        isVerificando = false;
        palavraAtualObj = palavrasDoJogo[palavraAtualIndex];
        
        elProgressFill.style.width = `${(palavraAtualIndex / MAX_PALAVRAS) * 100}%`;
        elImage.src = getImagePath(palavraAtualObj.imagem);

        silabasCorretas = palavraAtualObj.divisao.split('-');
        silabasNoTabuleiro = new Array(silabasCorretas.length).fill(null);
        
        gerarPoolDeSilabas();
        renderizarTabuleiro();
    }

    function gerarPoolDeSilabas() {
        poolDeSilabas = silabasCorretas.map(s => ({ id: Math.random().toString(), texto: s, usada: false }));
        let n = silabasCorretas.length > 2 ? 3 : 4;
        let a = 0;
        
        while (a < n) {
            let r = todasAsSilabas[Math.floor(Math.random() * todasAsSilabas.length)];
            if (!silabasCorretas.includes(r)) {
                poolDeSilabas.push({ id: Math.random().toString(), texto: r, usada: false });
                a++;
            }
        }
        
        poolDeSilabas.sort(() => Math.random() - 0.5);
    }

    function renderizarTabuleiro() {
        slotsContainer.innerHTML = '';
        silabasNoTabuleiro.forEach((item, i) => {
            const s = document.createElement('div');
            s.className = 'slot';
            if (item !== null) {
                s.textContent = item.texto;
                s.classList.add('filled');
                s.onclick = () => devolverSilabaAoPool(i);
            }
            slotsContainer.appendChild(s);
        });

        poolContainer.innerHTML = '';
        poolDeSilabas.forEach(sObj => {
            const b = document.createElement('button');
            b.className = 'syllable-btn';
            b.textContent = sObj.texto;
            if (sObj.usada) {
                b.classList.add('hidden');
            } else {
                b.onclick = () => enviarSilabaParaSlot(sObj.id);
            }
            poolContainer.appendChild(b);
        });
    }

    function enviarSilabaParaSlot(id) {
        if (isVerificando) return;
        const e = silabasNoTabuleiro.findIndex(i => i === null);
        if (e !== -1) {
            const idx = poolDeSilabas.findIndex(s => s.id === id);
            poolDeSilabas[idx].usada = true;
            silabasNoTabuleiro[e] = poolDeSilabas[idx];
            renderizarTabuleiro();
            verificarVitoria();
        }
    }

    function devolverSilabaAoPool(idx) {
        if (isVerificando) return;
        const sObj = silabasNoTabuleiro[idx];
        const pIdx = poolDeSilabas.findIndex(s => s.id === sObj.id);
        poolDeSilabas[pIdx].usada = false;
        silabasNoTabuleiro[idx] = null;
        renderizarTabuleiro();
    }

    function verificarVitoria() {
        if (silabasNoTabuleiro.includes(null)) return;
        
        isVerificando = true;
        const pf = silabasNoTabuleiro.map(s => s.texto).join('-');
        
        if (pf === palavraAtualObj.divisao) {
            certas++;
            atualizarPlacar();
            tocarSom('acerto');
            
            document.querySelectorAll('.slot').forEach(s => s.classList.add('success-bounce'));
            
            setTimeout(() => {
                palavraAtualIndex++;
                if (palavraAtualIndex < MAX_PALAVRAS) carregarPalavra();
                else finalizarJogo();
            }, 1000);
        } else {
            erradas++;
            atualizarPlacar();
            tocarSom('erro');
            
            document.querySelectorAll('.slot').forEach(s => s.classList.add('error-shake'));
            
            setTimeout(() => {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('error-shake'));
                silabasNoTabuleiro.forEach((item, idx) => {
                    if (item !== null) devolverSilabaAoPool(idx);
                });
                isVerificando = false;
            }, 600);
        }
    }

    function atualizarPlacar() {
        elValCertas.textContent = certas;
        elValErradas.textContent = erradas;
    }

    function finalizarJogo() {
        elProgressFill.style.width = `100%`;
        setTimeout(() => {
            elGameScreen.style.display = 'none';
            statusBar.style.display = 'none';
            elEndScreen.style.display = 'flex';
            
            document.getElementById('final-certas').textContent = certas;
            document.getElementById('final-erradas').textContent = erradas;

            if (erradas === 0) {
                document.getElementById('end-title-text').textContent = "PERFEITO! 🏆";
                tocarSom('vitoria'); dispararConfetis();
            } else if (erradas <= 3) {
                document.getElementById('end-title-text').textContent = "MUITO BEM! 🎉";
                tocarSom('vitoria'); dispararConfetis();
            } else {
                document.getElementById('end-title-text').textContent = "BOM ESFORÇO! 💪";
                tocarSom('acerto'); 
            }
        }, 500);
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tocarSom(tipo) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const agora = audioCtx.currentTime;

        if (tipo === 'acerto') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, agora);
            osc.frequency.exponentialRampToValueAtTime(1200, agora + 0.1);
            gain.gain.setValueAtTime(0.1, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
            osc.start(agora); osc.stop(agora + 0.3);
        } 
        else if (tipo === 'erro') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, agora);
            osc.frequency.exponentialRampToValueAtTime(100, agora + 0.3);
            gain.gain.setValueAtTime(0.15, agora);
            gain.gain.exponentialRampToValueAtTime(0.01, agora + 0.4);
            osc.start(agora); osc.stop(agora + 0.4);
        }
        else if (tipo === 'vitoria') {
            const notas =[523.25, 659.25, 783.99, 1046.50];
            notas.forEach((freq, i) => {
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = 'sine';
                o.frequency.value = freq;
                g.gain.setValueAtTime(0.1, agora + i * 0.15);
                g.gain.exponentialRampToValueAtTime(0.01, agora + i * 0.15 + 0.3);
                o.start(agora + i * 0.15); o.stop(agora + i * 0.15 + 0.3);
            });
        }
    }

    const canvasConfetti = document.getElementById('confetti-canvas');
    const ctxConfetti = canvasConfetti.getContext('2d');
    let confetis =[];

    function redimensionarCanvas() {
        canvasConfetti.width = document.querySelector('.cartao-jogo-container').clientWidth;
        canvasConfetti.height = document.querySelector('.cartao-jogo-container').clientHeight;
    }
    window.addEventListener('resize', redimensionarCanvas);

    function dispararConfetis() {
        redimensionarCanvas();
        confetis =[];
        const cores =['#ff4757', '#2ed573', '#0091ff', '#ffa502', '#eccc68'];
        
        for (let i = 0; i < 100; i++) {
            confetis.push({
                x: Math.random() * canvasConfetti.width,
                y: Math.random() * canvasConfetti.height - canvasConfetti.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                cor: cores[Math.floor(Math.random() * cores.length)],
                velY: Math.random() * 3 + 2,
                velX: Math.random() * 2 - 1,
                rotacao: Math.random() * 360,
                velRotacao: Math.random() * 5 - 2.5
            });
        }
        animarConfetis();
    }

    function animarConfetis() {
        ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        let ativos = false;

        confetis.forEach(c => {
            c.y += c.velY;
            c.x += c.velX;
            c.rotacao += c.velRotacao;
            if (c.y < canvasConfetti.height) ativos = true;

            ctxConfetti.save();
            ctxConfetti.translate(c.x, c.y);
            ctxConfetti.rotate(c.rotacao * Math.PI / 180);
            ctxConfetti.fillStyle = c.cor;
            ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
            ctxConfetti.restore();
        });

        if (ativos) requestAnimationFrame(animarConfetis);
    }

    window.onload = iniciarJogo;

</script>
</body>
