<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER (REPLICADO EXATAMENTE DO TEMPLATE) */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* AJUSTE MOBILE (VOLTAR CENTRADO ACIMA DO TÍTULO) */
        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { gap: 10px; }
            .nav-container {
                position: static;
                transform: none;
                display: grid;
                grid-template-columns: 40px 1fr 40px; /* Hamburger esquerda, Voltar centro */
                width: 100%;
                margin-bottom: 5px;
            }
            .hamburger { grid-column: 1; }
            .btn-voltar { grid-column: 2; justify-self: center; }
            h1 { font-size: 1.6rem !important; margin: 0; }
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h1 { color: var(--azul-escuro); font-size: 2.2rem; margin: 0; font-weight: 700; }
        .subtitulo { color: var(--azul-escuro); font-size: 1.1rem; font-weight: 500; opacity: 0.8; margin-top: 5px; }

        /* SIDEBAR E OVERLAY */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 20px; margin: 0; }
        .sidebar li a { display: block; padding: 12px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 8px; margin-bottom: 8px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* JOGO */
        .game-status { display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 15px auto; width: 90%; max-width: 600px; }
        .progress-bar-bg { width: 100%; height: 24px; background: #e2e8f0; border-radius: 12px; border: 2px solid #cbd5e0; overflow: hidden; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--cor-1ano); transition: 0.4s; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-1ano);
            display: flex; flex-direction: column; align-items: center;
        }

        /* BORDA NA IMAGEM */
        .img-wrapper {
            background: white; padding: 15px; border-radius: 20px;
            border: 2px solid #eef2f7; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .img-wrapper img { max-width: 200px; height: 180px; object-fit: contain; }

        .hint-box { background: #f0f9ff; color: var(--azul-escuro); padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 1.3rem; border: 2px solid #d0e4ff; margin: 5px; display: inline-block; }

        .input-escrita {
            width: 280px; padding: 15px; border: 3px solid #d0e4ff; border-radius: 15px;
            font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--azul-escuro);
            outline: none; margin: 20px 0; text-transform: lowercase;
        }
        .input-escrita:focus { border-color: var(--azul-vibrante); }

        /* BOTÃO COM ANIMAÇÃO */
        .btn-verificar {
            background: var(--cor-1ano); color: white; border: none; padding: 15px 45px; border-radius: 50px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark);
            transition: all 0.2s ease;
        }
        .btn-verificar:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--cor-1ano-dark); }
        .btn-verificar:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cor-1ano-dark); }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Escrever Sílabas ✍️</h1>
        <div class="subtitulo">Ordena as sílabas e escreve a palavra correta.</div>
    </div>
</header>

<div class="game-status">
    <div style="font-weight:700;">✅ <span id="acertos">0</span> | ❌ <span id="erros">0</span></div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
</div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="img-wrapper"><img src="" id="img-pergunta"></div>
        <div id="silabas-dica"></div>
        <input type="text" class="input-escrita" id="entrada-texto" placeholder="..." autocomplete="off">
        <button class="btn-verificar" onclick="validar()">🔍 Verificar</button>
        <div id="feedback-msg" style="margin-top:20px; font-weight:700; font-size:1.4rem;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    let indice = 0, total = 10, selecionadas = [], certos = 0, errados = 0, bloqueio = false;
    const somSucesso = new Audio('https://actions.google.com/sounds/v1/cartoon/clime_up_tone.ogg');

    function iniciar() {
        selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, total);
        proxima();
    }

    function proxima() {
        if (indice >= total) return finalizar();
        bloqueio = false;
        const item = selecionadas[indice];
        document.getElementById('img-pergunta').src = `../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerText = "";
        const entrada = document.getElementById('entrada-texto');
        entrada.value = ""; entrada.disabled = false; entrada.focus();
        
        const dicas = document.getElementById('silabas-dica');
        dicas.innerHTML = "";
        item.divisao.split('-').sort(() => 0.5 - Math.random()).forEach(s => {
            dicas.innerHTML += `<div class="hint-box">${s.toLowerCase()}</div>`;
        });
        document.getElementById('progress-fill').style.width = `${(indice / total) * 100}%`;
    }

    function validar() {
        if (bloqueio) return;
        bloqueio = true;
        const entrada = document.getElementById('entrada-texto');
        const item = selecionadas[indice];
        const feedback = document.getElementById('feedback-msg');

        if (entrada.value.trim().toLowerCase() === item.palavra.toLowerCase()) {
            certos++;
            document.getElementById('acertos').innerText = certos;
            feedback.innerHTML = "<span style='color:var(--sucesso)'>Muito bem! 🌟</span>";
            indice++;
            setTimeout(proxima, 1200);
        } else {
            errados++;
            document.getElementById('erros').innerText = errados;
            feedback.innerHTML = `<span style='color:var(--erro)'>Era a palavra: ${item.palavra.toLowerCase()}</span>`;
            indice++;
            setTimeout(proxima, 2500);
        }
    }

    function finalizar() {
        document.getElementById('progress-fill').style.width = "100%";
        somSucesso.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('game-canvas').innerHTML = `
            <h2>Parabéns! 🎉</h2>
            <p>Completaste o desafio!</p>
            <button onclick="location.reload()" class="btn-voltar" style="margin:20px auto; justify-content:center;">🔄 Repetir</button>
        `;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    document.getElementById('entrada-texto').addEventListener('keypress', (e) => { if(e.key==='Enter') validar(); });
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
