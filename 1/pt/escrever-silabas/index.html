<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Escrever Sílabas ✍️</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER ESTRUTURADO */
        header { 
            background-color: var(--bg-header); 
            padding: 20px; 
            border-bottom: 1px solid var(--azul-vibrante); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            z-index: 100;
        }

        .header-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            position: relative;
        }

        /* Contentor de Navegação */
        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Hamburger esquerda, Voltar centro-direita no desktop */
            margin-bottom: 10px;
        }

        /* MOBILE: Voltar centrado por cima do título, Hamburger à esquerda */
        @media (max-width: 768px) {
            .nav-container {
                display: grid;
                grid-template-columns: 50px 1fr 50px; /* Coluna central para o botão voltar */
                align-items: center;
                justify-items: center;
                width: 100%;
            }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; }
            
            h1 { font-size: 1.6rem !important; margin-top: 10px !important; }
        }

        .hamburger { 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.6); 
            border: none; 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            padding: 10px; 
            border-radius: 8px; 
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }

        .btn-voltar { 
            background: var(--cor-1ano); 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 25px; 
            font-weight: 700; 
            text-decoration: none; 
            box-shadow: 0 4px 0 var(--cor-1ano-dark); 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: 2.2rem; margin: 10px 0 5px 0; }
        
        /* Subtítulo corrigido */
        .subtitulo { 
            color: var(--text-main); 
            font-size: 1.1rem; 
            font-weight: 400; 
            margin-bottom: 10px;
        }

        /* SIDEBAR (LINKS COMPLETOS) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 20px; margin: 0; }
        .sidebar li a { display: block; padding: 12px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 8px; margin-bottom: 8px; }

        /* JOGO */
        .progress-bar-bg { width: 90%; max-width: 600px; height: 24px; background: #e2e8f0; border-radius: 12px; margin: 10px auto; border: 2px solid #cbd5e0; overflow: hidden; }
        .progress-bar-fill { width: 0%; height: 100%; background: var(--cor-1ano); transition: 0.4s; }

        .cartao-jogo-container {
            background: white; width: 95%; max-width: 800px; margin: 20px auto;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .img-container img { max-width: 250px; height: 220px; object-fit: contain; margin-bottom: 20px; }

        .hint-box { background: #eef6ff; color: var(--azul-escuro); padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: 1.3rem; border: 2px solid #d0e4ff; margin: 5px; display: inline-block; }

        /* INPUT EM MINÚSCULAS COM BORDA AZUL */
        .input-escrita {
            width: 280px; padding: 15px; border: 3px solid var(--azul-vibrante); border-radius: 15px;
            font-size: 1.6rem; font-weight: 700; text-align: center;
            color: var(--azul-escuro); outline: none; margin: 20px 0;
            background: #f0f9ff;
            text-transform: lowercase; /* Força minúsculas visualmente */
        }

        .btn-verificar {
            background: var(--cor-1ano); color: white; border: none; padding: 15px 50px; border-radius: 50px;
            font-size: 1.2rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 0 var(--cor-1ano-dark);
        }

        footer { padding: 15px; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto; }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Escrever Sílabas ✍️</h1>
        <div class="subtitulo">Lê as sílabas e escreve a palavra correta.</div>
    </div>
</header>

<div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>

<main>
    <div class="cartao-jogo-container" id="game-canvas">
        <div class="img-container"><img src="" id="img-pergunta"></div>
        <div id="silabas-dica"></div>
        <input type="text" class="input-escrita" id="entrada-texto" placeholder="escreve aqui..." autocomplete="off">
        <br>
        <button class="btn-verificar" onclick="validar()">🔍 Verificar</button>
        <div id="feedback-msg" style="margin-top:20px; font-weight:700;"></div>
    </div>
</main>

<footer>
    <p>© <span id="ano-atual"></span> EB1/PE da Marinheira</p>
</footer>

<script>
    let indice = 0, total = 20, selecionadas = [], certos = 0, bloqueio = false;
    
    // Som de sucesso (Beep curto e alegre)
    const somSucesso = new Audio('https://actions.google.com/sounds/v1/cartoon/clime_up_tone.ogg');

    function iniciar() {
        selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, total);
        proxima();
    }

    function proxima() {
        if (indice >= total) return finalizar();
        bloqueio = false;
        const item = selecionadas[indice];
        document.getElementById('img-pergunta').src = `../img/${item.imagem.split('/').pop()}`;
        document.getElementById('feedback-msg').innerText = "";
        
        const entrada = document.getElementById('entrada-texto');
        entrada.value = ""; entrada.disabled = false; entrada.focus();
        
        const dicas = document.getElementById('silabas-dica');
        dicas.innerHTML = "";
        item.divisao.split('-').sort(() => 0.5 - Math.random()).forEach(s => {
            dicas.innerHTML += `<div class="hint-box">${s.toLowerCase()}</div>`;
        });
        
        document.getElementById('progress-fill').style.width = `${(indice / total) * 100}%`;
    }

    function validar() {
        if (bloqueio) return;
        bloqueio = true;
        const entrada = document.getElementById('entrada-texto');
        const item = selecionadas[indice];
        const feedback = document.getElementById('feedback-msg');

        // Compara sempre em minúsculas
        if (entrada.value.trim().toLowerCase() === item.palavra.toLowerCase()) {
            certos++;
            feedback.innerHTML = "<span style='color:var(--sucesso); font-size:1.5rem;'>Muito bem! 🌟</span>";
            indice++;
            setTimeout(proxima, 1200);
        } else {
            feedback.innerHTML = `<span style='color:var(--erro); font-size:1.3rem;'>A palavra correta é: ${item.palavra.toLowerCase()}</span>`;
            indice++;
            setTimeout(proxima, 2500);
        }
    }

    function finalizar() {
        document.getElementById('progress-fill').style.width = "100%";
        
        // Efeito de Confetis e Som
        somSucesso.play();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

        document.getElementById('game-canvas').innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2rem;">Parabéns! 🎉</h2>
            <p style="font-size:1.3rem;">Completaste o desafio de escrita!</p>
            <button onclick="location.reload()" class="btn-voltar" style="margin:20px auto; justify-content:center;">🔄 Jogar de Novo</button>
        `;
    }

    document.getElementById('entrada-texto').addEventListener('keypress', (e) => { if(e.key==='Enter') validar(); });
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    window.onload = iniciar;
</script>
</body>
</html>
