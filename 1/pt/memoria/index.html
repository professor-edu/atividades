<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #28a745;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER (IGUAL AO TEMPLATE) */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* HAMBURGER ANIMADO */
        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-1ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 3vw, 1.1rem); 
            font-weight: 500; 
            opacity: 0.8; 
            margin-top: 15px; 
        }

        /* SIDEBAR COMPLETA */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 30px 20px; }
        
        .cartao-jogo-container {
            background: white;
            width: 100%;
            max-width: 950px;
            min-height: 550px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border-top: 8px solid var(--cor-1ano);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* COMPONENTES DO JOGO */
        .menu-niveis { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; width: 100%; border-bottom: 2px solid #f0f4f8; padding-bottom: 15px; }
        .btn-nivel { padding: 10px 14px; font-size: 0.75rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .btn-nivel.active { transform: translateY(2px); box-shadow: none; outline: 3px solid var(--azul-escuro); }

        #capa-jogo { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        .carta-animada { width: 120px; height: 120px; background: var(--cor-1ano); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .info-bar { display: none; margin-bottom: 15px; font-size: 1.3rem; font-weight: 700; color: var(--azul-escuro); background: #f8fafc; padding: 8px 25px; border-radius: 50px; gap: 20px; align-items: center; }
        .memory-grid { display: none; gap: 12px; margin: 0 auto; perspective: 1000px; }
        .memory-card { width: 125px; height: 125px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched .card-front { opacity: 0.5; border: 4px solid var(--sucesso) !important; background: #f8fcf8; }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; box-sizing: border-box; }
        .card-back { background: var(--cor-1ano); color: white; font-size: 3rem; font-weight: 800; }
        .card-front { background: white; transform: rotateY(180deg); padding: 10px; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card-front.texto { font-size: 1.1rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; }

        .stars { font-size: 4rem; color: #ffd700; margin: 15px 0; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 50; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(550px) rotate(360deg); opacity: 0; } }

        /* FOOTER */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .memory-card { width: 80px; height: 80px; }
            .card-back { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>Jogo da Memória 👀</h1>
        <div class="subtitulo">Encontra o par correto ligando a imagem à palavra!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="game-container">
        <div class="menu-niveis">
            <button class="btn-nivel" style="background:#4caf50" onclick="iniciar(8, 120, 4, false, this)">Fácil (8 cartas - 2 min)</button>
            <button class="btn-nivel" style="background:#ff9800" onclick="iniciar(12, 180, 4, false, this)">Médio (12 cartas - 3 min)</button>
            <button class="btn-nivel" style="background:#f44336" onclick="iniciar(16, 240, 4, false, this)">Difícil (16 cartas - 4 min)</button>
            <button class="btn-nivel" style="background:#9c27b0" onclick="iniciar(20, 300, 5, true, this)">✨ Génio (20 cartas - 5 min) ✨</button>
        </div>

        <div id="capa-jogo">
            <div class="carta-animada">?</div>
            <h2 style="color: var(--azul-escuro)">Vamos Jogar?</h2>
            <p style="color: var(--text-main)">Escolhe um nível acima para começar!</p>
        </div>

        <div class="info-bar" id="info-bar">
            <span>⏱️ <span id="timer">00:00</span></span>
            <span>✅ <span id="acertos">0</span> de <span id="total">0</span></span>
        </div>

        <div id="memory-grid" class="memory-grid"></div>
        <div id="final-screen" style="display:none;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    let flipped = [], matched = 0, timerId, totalT, paresNivel;

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    function iniciar(num, tempo, cols, genius, btn) {
        clearInterval(timerId);
        document.getElementById('capa-jogo').style.display = 'none';
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('info-bar').style.display = 'flex';
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('memory-grid');
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.innerHTML = '';
        
        matched = 0; totalT = tempo; flipped = []; paresNivel = num / 2;
        document.getElementById('acertos').innerText = '0';
        document.getElementById('total').innerText = paresNivel;

        const sel = [...palavras].sort(() => 0.5 - Math.random()).slice(0, paresNivel);
        let deck = [];
        sel.forEach(p => {
            deck.push({ t: 'img', v: p.imagem, id: p.palavra });
            deck.push({ t: 'txt', v: p.palavra, id: p.palavra });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const c = document.createElement('div');
            c.className = 'memory-card' + (genius ? ' flipped' : '');
            c.dataset.id = item.id;
            c.innerHTML = `<div class="card-back">?</div><div class="card-front ${item.t==='txt'?'texto':''}">
                ${item.t==='img' ? `<img src="../${item.v}">` : item.v}</div>`;
            grid.appendChild(c);
        });

        if (genius) {
            setTimeout(() => {
                document.querySelectorAll('.memory-card').forEach(card => {
                    card.classList.remove('flipped');
                    card.onclick = virar;
                });
                contar(tempo);
            }, 3000);
        } else {
            document.querySelectorAll('.memory-card').forEach(card => card.onclick = virar);
            contar(tempo);
        }
    }

    function contar(t) {
        let r = t;
        timerId = setInterval(() => {
            r--;
            let m = Math.floor(r/60), s = r%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(r <= 0) fim(false, 0);
        }, 1000);
    }

    function virar() {
        if (flipped.length < 2 && !this.classList.contains('flipped')) {
            this.classList.add('flipped');
            flipped.push(this);
            if (flipped.length === 2) {
                if (flipped[0].dataset.id === flipped[1].dataset.id) {
                    matched++;
                    document.getElementById('acertos').innerText = matched;
                    flipped.forEach(c => c.classList.add('matched'));
                    flipped = [];
                    if (matched === paresNivel) {
                        let rel = document.getElementById('timer').innerText.split(':');
                        fim(true, totalT - (parseInt(rel[0])*60 + parseInt(rel[1])));
                    }
                } else {
                    setTimeout(() => { flipped.forEach(c => c.classList.remove('flipped')); flipped = []; }, 1000);
                }
            }
        }
    }

    function fim(v, tempoGasto) {
        clearInterval(timerId);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('info-bar').style.display = 'none';
        const fs = document.getElementById('final-screen');
        fs.style.display = 'block';
        if (v) {
            let estrelas = tempoGasto < totalT/4 ? "⭐⭐⭐" : (tempoGasto < totalT/2 ? "⭐⭐" : "⭐");
            fs.innerHTML = `<h2>Muitos Parabéns!</h2><div class="stars">${estrelas}</div>`;
            for (let i = 0; i < 40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 95 + '%';
                c.style.top = '10%';
                c.style.backgroundColor = ['#ff0','#0ff','#f0f','#0f0','#f00'][Math.floor(Math.random()*5)];
                c.style.animationDelay = Math.random() + 's';
                document.getElementById('game-container').appendChild(c);
            }
        } else { fs.innerHTML = `<h2 style="color:red">O tempo acabou!</h2><p>Tenta de novo clicando num nível!</p>`; }
    }
</script>
</body>
</html>
