<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* HEADER & NAV */
        header { background-color: var(--bg-header); padding: 20px; border-bottom: 2px solid var(--azul-vibrante); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); }
        
        /* BOTÃO HAMBURGER */
        .hamburger { cursor: pointer; background: white; border: 1px solid #cbd5e1; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.3s; z-index: 1001; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.8rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.2rem, 4vw, 2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1rem; margin-top: 5px; font-weight: 500; }

        /* SIDEBAR COMPLETA */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; text-align: center; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.2s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* JOGO */
        main { flex: 1; display: flex; justify-content: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 1100px; min-height: 500px;
            padding: 25px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center;
        }

        .menu-niveis { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; width: 100%; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .btn-nivel { padding: 12px 18px; font-size: 0.85rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .n-facil { background: #48bb78; }
        .n-medio { background: #ed8936; }
        .n-dificil { background: #e53e3e; }
        .n-genio { background: #805ad5; }
        .btn-nivel:hover { transform: translateY(-2px); }
        .btn-nivel.active { transform: scale(0.95); box-shadow: none; outline: 3px solid var(--azul-vibrante); }

        .info-bar { display: none; justify-content: center; gap: 30px; margin-bottom: 20px; font-weight: 700; color: var(--azul-escuro); font-size: 1.2rem; }

        /* GRELHA DINÂMICA */
        .memory-grid { display: none; gap: 12px; margin: 0 auto; justify-content: center; }
        
        .memory-card { width: 110px; height: 110px; position: relative; transform-style: preserve-3d; transition: transform 0.4s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        
        /* ESTADO ESBATIDO (PAR ENCONTRADO) */
        .memory-card.matched { opacity: 0.35; filter: grayscale(100%); pointer-events: none; transition: 0.5s; }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.08); border: 2px solid #e2e8f0; }
        .card-back { background: var(--cor-1ano); color: white; font-size: 2.5rem; font-weight: 800; border: 4px solid white; }
        .card-front { background: white; transform: rotateY(180deg); padding: 8px; }
        .card-front.texto { font-size: 0.9rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; word-break: break-word; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }

        @media (max-width: 600px) {
            .memory-card { width: 80px; height: 80px; }
            .card-back { font-size: 1.8rem; }
            .card-front.texto { font-size: 0.75rem; }
        }

        footer { padding: 15px; background: white; border-top: 1px solid var(--azul-vibrante); font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()">✕ Fechar Menu</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Jogo da Memória 👀</h1>
        <div class="subtitulo" id="instrucao">Encontra o par de cada imagem!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        <div class="menu-niveis" id="menu-niveis">
            <button class="btn-nivel n-facil" onclick="iniciarJogo(8, 120, this, 4)">Fácil (2x4)</button>
            <button class="btn-nivel n-medio" onclick="iniciarJogo(12, 180, this, 4)">Médio (3x4)</button>
            <button class="btn-nivel n-dificil" onclick="iniciarJogo(16, 240, this, 4)">Difícil (4x4)</button>
            <button class="btn-nivel n-genio" onclick="iniciarJogo(20, 300, this, 5)">Génio (4x5)</button>
        </div>

        <div class="info-bar" id="game-info">
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>✅ <span id="certas">0</span></div>
        </div>

        <div id="game-area" style="width: 100%;">
            <div id="placeholder" style="margin-top: 80px; opacity: 0.5;">
                <h3>Clica num nível para começar! 👆</h3>
            </div>
            <div class="memory-grid" id="memory-grid"></div>
        </div>

        <div id="resultado-final" style="display:none; text-align:center;"></div>
    </div>
</main>

<footer><p>© <span id="ano"></span> 🏫 EB1/PE da Marinheira</p></footer>

<script>
    let flippedCards = [];
    let matchedCount = 0;
    let certas = 0;
    let timerId = null;
    let lockBoard = false;

    // CONTROLO DO MENU SIDEBAR
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    function iniciarJogo(numTotal, tempo, btn, colunas) {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('resultado-final').style.display = 'none';
        document.getElementById('game-info').style.display = 'flex';
        const grid = document.getElementById('memory-grid');
        grid.style.display = 'grid';
        
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // AJUSTE DA GRELHA PARA RETÂNGULO PERFEITO
        const cardWidth = window.innerWidth < 600 ? 92 : 122; // tamanho + gap
        grid.style.width = 'max-content';
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        grid.innerHTML = '';

        matchedCount = 0; certas = 0;
        let timeLeft = tempo;
        document.getElementById('certas').innerText = certas;

        // Criar Deck (Imagem + Palavra)
        const selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, numTotal / 2);
        let deck = [];
        selecionadas.forEach(p => {
            deck.push({ tipo: 'img', valor: p.imagem, id: p.palavra });
            deck.push({ tipo: 'txt', valor: p.palavra, id: p.palavra });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = item.id;
            card.innerHTML = `
                <div class="card-back">?</div>
                <div class="card-front ${item.tipo === 'txt' ? 'texto' : ''}">
                    ${item.tipo === 'img' ? `<img src="../${item.valor}">` : item.valor}
                </div>`;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60);
            const seg = timeLeft % 60;
            document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) finalizar("O tempo acabou! ⌛");
        }, 1000);
    }

    function flipCard() {
        if (lockBoard || this === flippedCards[0] || this.classList.contains('flipped')) return;
        this.classList.add('flipped');
        flippedCards.push(this);
        
        if (flippedCards.length === 2) {
            lockBoard = true;
            const match = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
            
            if (match) {
                certas++; matchedCount += 2;
                // Aplica efeito esbatido após a animação de virar
                const currentPair = [...flippedCards];
                setTimeout(() => {
                    currentPair.forEach(c => c.classList.add('matched'));
                }, 500);
                flippedCards = []; lockBoard = false;
                if (matchedCount === document.querySelectorAll('.memory-card').length) finalizar("Parabéns! Ganhaste! 🏆");
            } else {
                setTimeout(() => {
                    flippedCards.forEach(c => c.classList.remove('flipped'));
                    flippedCards = []; lockBoard = false;
                }, 1000);
            }
            document.getElementById('certas').innerText = certas;
        }
    }

    function finalizar(msg) {
        clearInterval(timerId);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        const res = document.getElementById('resultado-final');
        res.style.display = 'block';
        res.innerHTML = `<h2 style="font-size:2rem; color:var(--azul-escuro);">${msg}</h2>
                         <button onclick="location.reload()" class="btn-voltar" style="padding:15px 35px; font-size:1rem; cursor:pointer;">Jogar Novamente 👀</button>`;
    }

    document.getElementById('ano').innerText = new Date().getFullYear();
</script>
</body>
</html>
