<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        
        /* HAMBURGER ANIMADO */
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1.1rem; opacity: 0.9; margin-top: 10px; font-weight: 500; }

        /* SIDEBAR & OVERLAY */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; display: flex; align-items: center; gap: 10px; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white !important; transform: translateX(5px); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* CONTENTOR JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 1000px; min-height: 600px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center;
        }

        /* SELETOR NÍVEIS HORIZONTAL */
        .menu-niveis { 
            display: flex; flex-direction: row; gap: 10px; width: 100%; justify-content: center; 
            margin-bottom: 25px; flex-wrap: wrap; padding-bottom: 20px; border-bottom: 2px solid #f0f4f8;
        }
        .btn-nivel { 
            padding: 12px 20px; font-size: 0.95rem; font-weight: 700; border: none; border-radius: 50px; 
            cursor: pointer; color: white; transition: 0.2s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); 
        }
        .n-facil { background: #48bb78; }
        .n-medio { background: #ed8936; }
        .n-dificil { background: #e53e3e; }
        .n-genio { background: #805ad5; }
        .btn-nivel:hover { transform: translateY(-2px); }
        .btn-nivel.active { transform: translateY(2px); box-shadow: none; outline: 3px solid var(--azul-vibrante); }

        /* INFO BAR */
        .info-bar { display: none; justify-content: center; gap: 30px; margin-bottom: 20px; font-weight: 700; color: var(--azul-escuro); font-size: 1.2rem; }
        .tempo-critico { color: var(--erro); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* GRID CARTAS */
        .memory-grid { display: none; gap: 15px; perspective: 1000px; width: 100%; justify-content: center; }
        .memory-card { width: 110px; height: 110px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-back { background: var(--cor-1ano); color: white; font-size: 2.8rem; font-weight: 800; border: 3px solid white; }
        .card-front { background: white; transform: rotateY(180deg); border: 2px solid #e3f2fd; padding: 8px; }
        
        /* Carta de Texto */
        .card-front.texto { font-size: 1rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; padding: 5px; line-height: 1.2; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 600px) {
            .memory-card { width: 80px; height: 80px; }
            .card-back { font-size: 1.8rem; }
            .card-front.texto { font-size: 0.75rem; }
            .cartao-jogo-container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Jogo da Memória 👀</h1>
        <div class="subtitulo" id="instrucao">Escolhe um nível para começar o desafio!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        <div class="menu-niveis" id="menu-niveis">
            <button class="btn-nivel n-facil" onclick="iniciarJogo(8, 120, this)">Fácil (8)</button>
            <button class="btn-nivel n-medio" onclick="iniciarJogo(12, 180, this)">Médio (12)</button>
            <button class="btn-nivel n-dificil" onclick="iniciarJogo(16, 240, this)">Difícil (16)</button>
            <button class="btn-nivel n-genio" onclick="iniciarJogo(20, 300, this)">Génio (20)</button>
        </div>

        <div class="info-bar" id="game-info">
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>✅ <span id="certas">0</span></div>
            <div>❌ <span id="erradas">0</span></div>
        </div>

        <div id="game-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div id="placeholder" style="margin-top: 80px; color: var(--text-main); opacity: 0.6;">
                <h3>Clica num nível acima para começar! 👆</h3>
                <p>Liga a <b>imagem</b> à <b>palavra certa</b>.</p>
            </div>
            
            <div class="memory-grid" id="memory-grid"></div>
        </div>

        <div id="resultado-final" style="display:none; text-align:center; padding: 40px 0;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <b>EB1/PE da Marinheira</b></p>
</footer>

<script>
    let flippedCards = [];
    let matchedCount = 0;
    let certas = 0;
    let erradas = 0;
    let timeLeft = 0;
    let timerId = null;
    let lockBoard = false;

    // Função do Menu Hamburger
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('hamburgerBtn');
        
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        btn.classList.toggle('open');
    }

    function iniciarJogo(numCartas, tempoSegundos, btn) {
        // UI Updates
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('resultado-final').style.display = 'none';
        document.getElementById('game-info').style.display = 'flex';
        document.getElementById('memory-grid').style.display = 'grid';
        document.getElementById('instrucao').innerText = "Liga cada imagem à sua palavra! 👀";
        
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('memory-grid');
        grid.innerHTML = '';
        matchedCount = 0; certas = 0; erradas = 0;
        timeLeft = tempoSegundos;
        updateInfo();

        const cols = window.innerWidth < 600 ? 3 : (numCartas <= 12 ? 4 : 5);
        grid.style.gridTemplateColumns = `repeat(${cols}, auto)`;

        // Criar baralho (Imagem + Palavra)
        const selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, numCartas / 2);
        let deck = [];
        selecionadas.forEach(item => {
            deck.push({ tipo: 'img', valor: item.imagem, id: item.palavra });
            deck.push({ tipo: 'txt', valor: item.palavra, id: item.palavra });
        });
        deck.sort(() => Math.random() - 0.5);

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = item.id;
            
            card.innerHTML = `
                <div class="card-back">?</div>
                <div class="card-front ${item.tipo === 'txt' ? 'texto' : ''}">
                    ${item.tipo === 'img' ? `<img src="../${item.valor}">` : item.valor}
                </div>
            `;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        startTimer();
    }

    function flipCard() {
        if (lockBoard || this === flippedCards[0] || this.classList.contains('flipped')) return;
        this.classList.add('flipped');
        flippedCards.push(this);
        if (flippedCards.length === 2) checkMatch();
    }

    function checkMatch() {
        lockBoard = true;
        const match = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
        
        if (match) {
            certas++; matchedCount += 2;
            flippedCards = []; lockBoard = false;
            if (matchedCount === document.querySelectorAll('.memory-card').length) finalizar("Parabéns! Ganhaste! 🏆");
        } else {
            erradas++;
            setTimeout(() => {
                flippedCards.forEach(c => c.classList.remove('flipped'));
                flippedCards = []; lockBoard = false;
            }, 1000);
        }
        updateInfo();
    }

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60);
            const seg = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
            if(timeLeft <= 10) timerEl.classList.add('tempo-critico');
            if(timeLeft <= 0) finalizar("Acabou o tempo! ⌛");
        }, 1000);
    }

    function updateInfo() {
        document.getElementById('certas').innerText = certas;
        document.getElementById('erradas').innerText = erradas;
    }

    function finalizar(msg) {
        clearInterval(timerId);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        document.getElementById('instrucao').innerText = "Fim de Jogo!";
        
        const res = document.getElementById('resultado-final');
        res.style.display = 'block';
        res.innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2.2rem;">${msg}</h2>
            <div style="font-size:5rem; margin:20px;">${timeLeft > 0 ? '🌟' : '😅'}</div>
            <p style="font-size:1.2rem;">Concluíste o desafio!</p>
            <button onclick="location.reload()" class="btn-voltar" style="padding:15px 40px; font-size:1.2rem; cursor:pointer; margin:20px auto;">Jogar Novamente 👀</button>
        `;
    }

    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>
</body>
</html>
