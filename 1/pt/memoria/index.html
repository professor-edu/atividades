<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #28a745;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* HEADER E NAV (RIGOROSO AO TEMPLATE) */
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); }

        .hamburger { cursor: pointer; background: none; border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; z-index: 1000; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.85rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.2rem, 5vw, 2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1rem; opacity: 0.9; margin-top: 8px; font-weight: 500; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar ul { list-style: none; padding: 20px; margin: 0; }
        .sidebar li a { display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); border-radius: 10px; transition: 0.3s; margin-bottom: 5px; font-weight: 500; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(5px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; justify-content: center; padding: 20px; align-items: center; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 900px; min-height: 520px; padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano); box-shadow: 0 10px 40px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; position: relative; }

        /* CAPA INICIAL */
        #capa-jogo { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        .carta-capa { width: 120px; height: 120px; background: var(--cor-1ano); border-radius: 15px; display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem; font-weight: bold; animation: pulse 2s infinite; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* NÍVEIS */
        .menu-niveis { display: none; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; width: 100%; padding-bottom: 15px; border-bottom: 1px solid #f0f4f8; }
        .btn-nivel { padding: 10px 15px; font-size: 0.8rem; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .btn-nivel.active { transform: translateY(2px); box-shadow: none; outline: 3px solid var(--azul-escuro); }

        /* GRELHA */
        .memory-grid { display: none; gap: 12px; margin: 0 auto; perspective: 1000px; }
        .memory-card { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched .card-front { opacity: 0.5; border: 4px solid var(--sucesso) !important; background: #f8fcf8; }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; box-sizing: border-box; }
        .card-back { background: var(--cor-1ano); color: white; font-size: 2.5rem; font-weight: 800; }
        .card-front { background: white; transform: rotateY(180deg); padding: 8px; }
        .card-front img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .card-front.texto { font-size: 1rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; }

        /* PROGRESSO */
        .info-bar { display: none; margin-bottom: 15px; font-size: 1.3rem; font-weight: 700; color: var(--azul-escuro); background: #f8fafc; padding: 10px 25px; border-radius: 50px; }

        /* FINAL */
        .stars { font-size: 3.5rem; color: #ffd700; margin: 10px 0; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 50; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(550px) rotate(360deg); opacity: 0; } }

        /* FOOTER (TEMPLATE) */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: inherit; text-decoration: none; font-weight: 700; }

        @media (max-width: 600px) { .memory-card { width: 80px; height: 80px; } .card-back { font-size: 1.8rem; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div style="padding: 20px; font-weight: 700; color: #ff4757; cursor: pointer; text-align: center;" onclick="toggleMenu()">✕ FECHAR MENU</div>
    <ul>
        <li><a href="../../index.html">🏠 Início</a></li>
        <li><a href="../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../1/index.html">🎒 1º Ano</a></li>
        <li><a href="../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Jogo da Memória 👀</h1>
        <div class="subtitulo" id="instr-text">Encontra o par correto ligando a imagem à palavra!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="game-box">
        
        <div id="capa-jogo">
            <div class="carta-capa">?</div>
            <h2 style="color: var(--azul-escuro)">Vamos Jogar?</h2>
            <button class="btn-voltar" style="padding: 12px 35px; font-size: 1.1rem;" onclick="mostrarNiveis()">COMEÇAR</button>
        </div>

        <div class="menu-niveis" id="menu-niveis">
            <button class="btn-nivel" style="background:#4caf50" onclick="jogar(8, 120, 4, false, this)">Fácil</button>
            <button class="btn-nivel" style="background:#ff9800" onclick="jogar(12, 180, 4, false, this)">Médio</button>
            <button class="btn-nivel" style="background:#f44336" onclick="jogar(16, 240, 4, false, this)">Difícil</button>
            <button class="btn-nivel" style="background:#9c27b0" onclick="jogar(20, 300, 5, true, this)">✨ GÉNIO ✨</button>
        </div>

        <div class="info-bar" id="info-bar">
            ⏱️ <span id="timer">00:00</span> &nbsp; | &nbsp; ✅ <span id="acertos">0</span> de <span id="total-pares">0</span>
        </div>

        <div id="memory-grid" class="memory-grid"></div>
        <div id="final-screen" style="display:none; text-align:center;"></div>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    let flipped = [], matched = 0, timer, totalTime, paresNivel;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    function mostrarNiveis() {
        document.getElementById('capa-jogo').style.display = 'none';
        document.getElementById('menu-niveis').style.display = 'flex';
        document.getElementById('instr-text').innerText = "Escolhe um nível:";
    }

    function jogar(numCartas, tempo, cols, genius, btn) {
        clearInterval(timer);
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('final-screen').style.display = 'none';
        document.getElementById('info-bar').style.display = 'flex';
        const grid = document.getElementById('memory-grid');
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.innerHTML = '';
        
        matched = 0; totalTime = tempo; flipped = [];
        paresNivel = numCartas / 2;
        document.getElementById('acertos').innerText = '0';
        document.getElementById('total-pares').innerText = paresNivel;

        let deck = [];
        const selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, paresNivel);
        selecionadas.forEach(p => {
            deck.push({ t: 'img', v: p.imagem, id: p.palavra });
            deck.push({ t: 'txt', v: p.palavra, id: p.palavra });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const c = document.createElement('div');
            c.className = 'memory-card' + (genius ? ' flipped' : '');
            c.dataset.id = item.id;
            c.innerHTML = `<div class="card-back">?</div><div class="card-front ${item.t==='txt'?'texto':''}">
                ${item.t==='img' ? `<img src="../${item.v}">` : item.v}</div>`;
            grid.appendChild(c);
        });

        if (genius) {
            document.getElementById('instr-text').innerText = "Memoriza bem! Começa em 3 segundos...";
            setTimeout(() => {
                document.querySelectorAll('.memory-card').forEach(card => {
                    card.classList.remove('flipped');
                    card.onclick = virarCarta;
                });
                contagemRegressiva(tempo);
            }, 3000);
        } else {
            document.querySelectorAll('.memory-card').forEach(card => card.onclick = virarCarta);
            contagemRegressiva(tempo);
        }
    }

    function contagemRegressiva(t) {
        document.getElementById('instr-text').innerText = "Encontra os pares!";
        let restante = t;
        timer = setInterval(() => {
            restante--;
            let m = Math.floor(restante/60), s = restante%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(restante <= 0) fimDeJogo(false, 0);
        }, 1000);
    }

    function virarCarta() {
        if (flipped.length < 2 && !this.classList.contains('flipped')) {
            this.classList.add('flipped');
            flipped.push(this);
            if (flipped.length === 2) {
                if (flipped[0].dataset.id === flipped[1].dataset.id) {
                    matched++;
                    document.getElementById('acertos').innerText = matched;
                    flipped.forEach(c => c.classList.add('matched'));
                    flipped = [];
                    if (matched === paresNivel) {
                        let tempoNoRelogio = document.getElementById('timer').innerText.split(':');
                        fimDeJogo(true, totalTime - (parseInt(tempoNoRelogio[0])*6
