<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }

        /* HEADER - TEMPLATE 1º ANO */
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); }
        
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.8); border: 1px solid #cce3f5; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; z-index: 1000; }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 18px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.85rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.2rem, 5vw, 2rem); margin: 0; }
        .subtitulo { color: var(--azul-escuro); font-size: 1rem; opacity: 0.9; margin-top: 8px; font-weight: 500; }

        /* SIDEBAR & HOVER */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; text-align: center; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: block; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: all 0.3s ease; border: 1px solid transparent; }
        
        /* CORREÇÃO HOVER MENU */
        .sidebar li a:hover { background: var(--bg-header); color: var(--azul-vibrante); border-color: var(--azul-vibrante); transform: translateX(5px); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; }
        .overlay.active { display: block; }

        /* CONTEÚDO PRINCIPAL */
        main { flex: 1; display: flex; justify-content: center; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 1000px; min-height: 600px;
            padding: 30px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center;
        }

        /* NÍVEIS COM ANIMAÇÃO */
        .menu-niveis { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; width: 100%; padding-bottom: 20px; border-bottom: 2px solid #f0f4f8; }
        .btn-nivel { padding: 12px 20px; font-size: 0.9rem; font-weight: 700; border: none; border-radius: 50px; cursor: pointer; color: white; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
        .n-facil { background: #48bb78; }
        .n-medio { background: #ed8936; }
        .n-dificil { background: #e53e3e; }
        .n-genio { background: #805ad5; }
        
        /* ANIMAÇÃO HOVER NÍVEIS */
        .btn-nivel:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); filter: brightness(1.1); }
        .btn-nivel:active { transform: translateY(2px); }
        .btn-nivel.active { outline: 4px solid var(--azul-vibrante); outline-offset: 2px; }

        .info-bar { display: none; justify-content: center; gap: 40px; margin-bottom: 25px; font-weight: 700; color: var(--azul-escuro); font-size: 1.3rem; }

        /* GRELHA E CARTÕES (MAIORES) */
        .memory-grid { display: none; gap: 15px; margin: 0 auto; justify-content: center; width: max-content; perspective: 1000px; }
        
        .memory-card { width: 130px; height: 130px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        
        /* PAR DESCOBERTO: Fica visível (virado) mas com aspeto de concluído */
        .memory-card.matched { pointer-events: none; }
        .memory-card.matched .card-front { border: 4px solid var(--sucesso); opacity: 0.7; filter: saturate(0.8); }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.08); border: 2px solid #e2e8f0; }
        
        .card-back { background: var(--cor-1ano); color: white; font-size: 3rem; font-weight: 800; border: 4px solid white; }
        
        .card-front { background: white; transform: rotateY(180deg); padding: 10px; transition: border 0.3s; }
        .card-front.texto { font-size: 1rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; padding: 5px; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }

        @media (max-width: 650px) {
            .memory-card { width: 85px; height: 85px; }
            .card-back { font-size: 2rem; }
            .card-front.texto { font-size: 0.75rem; }
            .cartao-jogo-container { padding: 15px; }
        }

        footer { padding: 20px; background: white; border-top: 1px solid var(--azul-vibrante); font-size: 0.85rem; color: var(--text-main); }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()">✕ Fechar Menu</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Jogo da Memória 👀</h1>
        <div class="subtitulo" id="instrucao">Encontra o par palavra-imagem!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        <div class="menu-niveis">
            <button class="btn-nivel n-facil" onclick="iniciarJogo(8, 120, this, 4)">Fácil (8 cartas - 2 min)</button>
            <button class="btn-nivel n-medio" onclick="iniciarJogo(12, 180, this, 4)">Médio (12 cartas - 3 min)</button>
            <button class="btn-nivel n-dificil" onclick="iniciarJogo(16, 240, this, 4)">Difícil (16 cartas - 4 min)</button>
            <button class="btn-nivel n-genio" onclick="iniciarJogo(20, 300, this, 5)">Génio (20 cartas - 5 min)</button>
        </div>

        <div class="info-bar" id="game-info">
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>✅ <span id="certas">0</span></div>
        </div>

        <div id="game-area" style="width:100%">
            <div id="placeholder" style="margin-top: 80px; opacity: 0.5;">
                <h2>Escolhe um nível para começar! 👆</h2>
            </div>
            <div class="memory-grid" id="memory-grid"></div>
        </div>

        <div id="resultado-final" style="display:none; padding: 40px;"></div>
    </div>
</main>

<footer><p>🏫 EB1/PE da Marinheira</p></footer>

<script>
    let flippedCards = [];
    let matchedCount = 0;
    let certas = 0;
    let timerId = null;
    let lockBoard = false;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    function iniciarJogo(numTotal, tempo, btn, colunas) {
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('resultado-final').style.display = 'none';
        document.getElementById('game-info').style.display = 'flex';
        const grid = document.getElementById('memory-grid');
        grid.style.display = 'grid';
        
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Grelha retangular
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        grid.innerHTML = '';

        matchedCount = 0; certas = 0;
        let timeLeft = tempo;
        document.getElementById('certas').innerText = certas;

        const selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, numTotal / 2);
        let deck = [];
        selecionadas.forEach(p => {
            deck.push({ tipo: 'img', valor: p.imagem, id: p.palavra });
            deck.push({ tipo: 'txt', valor: p.palavra, id: p.palavra });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.id = item.id;
            card.innerHTML = `
                <div class="card-back">?</div>
                <div class="card-front ${item.tipo === 'txt' ? 'texto' : ''}">
                    ${item.tipo === 'img' ? `<img src="../${item.valor}">` : item.valor}
                </div>`;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60);
            const seg = timeLeft % 60;
            document.getElementById('timer').innerText = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) finalizar("O tempo acabou! ⌛");
        }, 1000);
    }

    function flipCard() {
        if (lockBoard || this === flippedCards[0] || this.classList.contains('flipped')) return;
        
        this.classList.add('flipped');
        flippedCards.push(this);

        if (flippedCards.length === 2) {
            lockBoard = true;
            const isMatch = flippedCards[0].dataset.id === flippedCards[1].dataset.id;
            
            if (isMatch) {
                certas++; matchedCount += 2;
                const parEncontrado = [...flippedCards];
                
                // O par fica virado (visível) mas com estilo de "resolvido"
                setTimeout(() => {
                    parEncontrado.forEach(c => c.classList.add('matched'));
                }, 400);
                
                flippedCards = []; 
                lockBoard = false;
                
                if (matchedCount === document.querySelectorAll('.memory-card').length) {
                    setTimeout(() => finalizar("Parabéns! Completaste o desafio! 🏆"), 600);
                }
            } else {
                // Se errar, volta a virar para baixo após 1 segundo
                setTimeout(() => {
                    flippedCards.forEach(c => c.classList.remove('flipped'));
                    flippedCards = [];
                    lockBoard = false;
                }, 1000);
            }
            document.getElementById('certas').innerText = certas;
        }
    }

    function finalizar(msg) {
        clearInterval(timerId);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        const res = document.getElementById('resultado-final');
        res.style.display = 'block';
        res.innerHTML = `
            <h1 style="font-size: 2.5rem; color: var(--azul-escuro);">${msg}</h1>
            <button onclick="location.reload()" class="btn-voltar" style="padding: 15px 40px; font-size: 1.1rem; cursor: pointer; margin-top: 20px;">Jogar de Novo 👀</button>
        `;
    }
</script>
</body>
</html>
