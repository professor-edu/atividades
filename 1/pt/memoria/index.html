<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #28a745;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* HEADER E NAV (TEMPLATE 1º ANO) */
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: 0.4s; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-voltar:hover { transform: scale(1.05); }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white; transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ÁREA DO JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .cartao-jogo-container { background: white; width: 100%; max-width: 900px; min-height: 550px; padding: 30px 20px; border-radius: 30px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-top: 8px solid var(--cor-1ano); display: flex; flex-direction: column; align-items: center; position: relative; }

        /* MENU DE NÍVEIS SEMPRE VISÍVEL */
        .menu-niveis { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; padding-bottom: 15px; border-bottom: 2px solid #f0f4f8; width: 100%; }
        .btn-nivel { padding: 10px 18px; font-size: 0.85rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-nivel:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .btn-nivel.active { transform: translateY(2px); box-shadow: none; outline: 3px solid var(--azul-escuro); outline-offset: 2px; }

        /* GRELHA E CARTÕES */
        .memory-grid { display: none; gap: 12px; margin: 0 auto; perspective: 1000px; padding: 10px; }
        .memory-card { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched .card-front { opacity: 0.5; border: 4px solid var(--sucesso) !important; background: #f8fcf8; }

        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; box-sizing: border-box; }
        .card-back { background: var(--cor-1ano); color: white; font-size: 2.5rem; font-weight: 800; }
        .card-front { background: white; transform: rotateY(180deg); padding: 8px; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .card-front.texto { font-size: 1rem; font-weight: 700; color: var(--azul-escuro); text-transform: uppercase; }

        /* FEEDBACK FINAL */
        .stars { font-size: 3.5rem; color: #ffd700; margin: 10px 0; }
        .confetti { position: absolute; width: 8px; height: 8px; z-index: 5; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(600px) rotate(360deg); opacity: 0; } }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 600px) { .memory-card { width: 80px; height: 80px; } .card-back { font-size: 1.5rem; } }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
       <li><a href="../../index.html">🏠 Início</a></li>
        <li><a href="../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../1/index.html">🎒 1º Ano</a></li>
        <li><a href="../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            <a href="index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>👀 Jogo da Memória 👀</h1>
        <div class="subtitulo" id="instr-text">Escolhe um nível para começar!</div>
    </div>
</header>

<main>
    <div class="cartao-jogo-container" id="game-container">
        <div class="menu-niveis">
            <button class="btn-nivel" style="background:#4caf50" onclick="prepararJogo(8, 120, 4, false, this)">Fácil (8 cartas - 2 min)</button>
            <button class="btn-nivel" style="background:#ff9800" onclick="prepararJogo(12, 180, 4, false, this)">Médio (12 cartas - 3 min)</button>
            <button class="btn-nivel" style="background:#f44336" onclick="prepararJogo(16, 240, 4, false, this)">Difícil (16 cartas - 4 min)</button>
            <button class="btn-nivel" style="background:#9c27b0" onclick="prepararJogo(20, 300, 5, true, this)">✨ Génio (20 cartas - 5 min) ✨</button>
        </div>

        <div id="game-info" style="display:none; font-size:1.4rem; font-weight:700; margin-bottom:15px; color:var(--azul-escuro)">
            ⏱️ <span id="timer">00:00</span> &nbsp;&nbsp; ✅ <span id="certas">0</span>
        </div>

        <div id="memory-grid" class="memory-grid"></div>
        <div id="final-area" style="display:none;"></div>
    </div>
</main>

<footer><p><span id="ano-atual"></span> 🏫 EB1/PE da Marinheira</p></footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    let flippedCards = [], matchedPairs = 0, timerInterval, totalTimeInitial;

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }

    function prepararJogo(num, tempo, colunas, genius, btn) {
        // Limpeza de estados anteriores
        clearInterval(timerInterval);
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('final-area').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        
        const grid = document.getElementById('memory-grid');
        grid.style.display = 'grid';
        grid.style.gridTemplateColumns = `repeat(${colunas}, 1fr)`;
        grid.innerHTML = '';
        
        flippedCards = []; matchedPairs = 0; totalTimeInitial = tempo;
        document.getElementById('certas').innerText = '0';

        // Lógica de baralho
        const selecionadas = [...palavras].sort(() => 0.5 - Math.random()).slice(0, num / 2);
        let deck = [];
        selecionadas.forEach(p => {
            deck.push({ t: 'img', v: p.imagem, id: p.palavra });
            deck.push({ t: 'txt', v: p.palavra, id: p.palavra });
        });
        deck.sort(() => 0.5 - Math.random());

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'memory-card' + (genius ? ' flipped' : '');
            card.dataset.id = item.id;
            card.innerHTML = `<div class="card-back">?</div><div class="card-front ${item.t === 'txt' ? 'texto' : ''}">${item.t === 'img' ? `<img src="../${item.v}">` : item.v}</div>`;
            grid.appendChild(card);
        });

        if (genius) {
            document.getElementById('instr-text').innerText = "Memoriza! Começamos em 3 segundos...";
            setTimeout(() => {
                document.querySelectorAll('.memory-card').forEach(c => {
                    c.classList.remove('flipped');
                    c.onclick = flipCard;
                });
                iniciarCronometro(tempo);
            }, 3000);
        } else {
            document.querySelectorAll('.memory-card').forEach(c => c.onclick = flipCard);
            iniciarCronometro(tempo);
        }
    }

    function iniciarCronometro(tempo) {
        document.getElementById('game-info').style.display = 'block';
        document.getElementById('instr-text').innerText = "Encontra os pares!";
        let left = tempo;
        timerInterval = setInterval(() => {
            left--;
            let m = Math.floor(left / 60), s = left % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            if(left <= 0) finalizar(false, 0);
        }, 1000);
    }

    function flipCard() {
        if (flippedCards.length < 2 && !this.classList.contains('flipped')) {
            this.classList.add('flipped');
            flippedCards.push(this);
            if (flippedCards.length === 2) {
                const [c1, c2] = flippedCards;
                if (c1.dataset.id === c2.dataset.id) {
                    matchedPairs++;
                    document.getElementById('certas').innerText = matchedPairs;
                    c1.classList.add('matched'); c2.classList.add('matched');
                    flippedCards = [];
                    if (matchedPairs === document.querySelectorAll('.memory-card').length / 2) {
                        let tempoRestante = document.getElementById('timer').innerText.split(':');
                        finalizar(true, totalTimeInitial - (parseInt(tempoRestante[0])*60 + parseInt(tempoRestante[1])));
                    }
                } else {
                    setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); flippedCards = []; }, 1000);
                }
            }
        }
    }

    function finalizar(vitoria, tempoGasto) {
        clearInterval(timerInterval);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        const area = document.getElementById('final-area');
        area.style.display = 'block';

        if (vitoria) {
            let estrelas = tempoGasto < totalTimeInitial/4 ? "⭐⭐⭐" : (tempoGasto < totalTimeInitial/2 ? "⭐⭐" : "⭐");
            area.innerHTML = `<h2 style="color:var(--azul-escuro)">Muitos Parabéns!</h2><div class="stars">${estrelas}</div>`;
            for (let i = 0; i < 40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 90 + '%';
                c.style.top = "-10px";
                c.style.backgroundColor = ['#f00','#0f0','#00f','#ff0','#f0f'][Math.floor(Math.random()*5)];
                c.style.animationDelay = (Math.random() * 2) + "s";
                document.getElementById('game-container').appendChild(c);
            }
        } else {
            area.innerHTML = `<h2 style="color:#f44336">O tempo acabou!</h2><p>Tenta novamente!</p>`;
        }
    }
</script>
</body>
</html>
