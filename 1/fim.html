<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Resultado Final</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f7ff;
      text-align: center;
      padding: 30px;
    }
    .caixa {
      background: white;
      max-width: 450px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
    }
    h1 { color: #2a6edb; }
  </style>
</head>

<body>
<div class="caixa">
  <h1>🎉 Fim da atividade</h1>

  <p id="resultado"></p>
  <p id="mensagem"></p>

  <button onclick="recomecar()">Recomeçar</button>
</div>

<script>
  const pontos = Number(localStorage.getItem("pontuacao"));
  document.getElementById("resultado").innerText =
    "Pontuação final: " + pontos + " pontos";

  let msg = "";
  if (pontos >= 80) {
    msg = "Excelente trabalho! ⭐⭐⭐";
  } else if (pontos >= 50) {
    msg = "Bom trabalho! Continua a praticar 👍";
  } else {
    msg = "Não desistas! Treinar ajuda a melhorar 💪";
  }

  document.getElementById("mensagem").innerText = msg;

  function recomecar() {
    window.location.href = "index.html";
  }
</script>
</body>
</html>
