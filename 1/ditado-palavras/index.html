<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ditado de Palavras</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --amarelo: #ffca28;
        }

        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: var(--azul-claro); margin: 0; }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px; color: var(--azul-escuro); border-bottom: 3px solid #fff; 
        }

        .cabecalho-conteudo {
            display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 10px;
        }

        .icone-cabecalho { width: 45px; height: auto; }
        .titulo-cabecalho { margin: 0; font-size: 28px; font-weight: bold; }

        .config-voz { margin: 5px 0; font-size: 14px; color: var(--azul-escuro); }
        select { padding: 5px 10px; border-radius: 10px; border: 1px solid var(--azul-medio); outline: none; background: white; cursor: pointer; }

        .pontos { font-size: 20px; font-weight: bold; color: #f57c00; margin: 10px 0; }

        .cartao {
            background: white; width: 95%; max-width: 500px;
            margin: 20px auto; padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            min-height: 400px;
        }

        #revelacao { height: 150px; display: flex; align-items: center; justify-content: center; width: 100%; }
        #imgSucesso { 
            max-height: 100%; display: none; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .btn-ouvir {
            width: 110px; height: 110px;
            background: #e3f2fd; border: 3px solid var(--azul-medio);
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .btn-ouvir:hover { transform: scale(1.1); background: #bbdefb; }
        .btn-ouvir img { width: 55px; }

        input {
            font-size: 24px; padding: 12px; width: 80%;
            border: 2px solid var(--azul-medio); border-radius: 12px;
            text-align: center; outline: none;
        }

        #validar {
            padding: 12px 60px; font-size: 20px; font-weight: bold;
            background: var(--azul-escuro); color: white; border: none;
            border-radius: 50px; cursor: pointer;
        }

        #feedback { min-height: 80px; width: 100%; font-weight: bold; }
        .feedback-errado { background: #fff5f5; padding: 15px; border-radius: 15px; border: 1px solid #fde2e2; color: #d32f2f; }
        .btn-continuar { margin-top: 10px; padding: 8px 25px; background: white; border: 2px solid var(--azul-medio); border-radius: 50px; cursor: pointer; font-weight: bold; color: var(--azul-escuro); }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="ouvir.png" class="icone-cabecalho">
        <h1 class="titulo-cabecalho">Ditado de Palavras</h1>
    </div>

    <div class="config-voz">
        Voz: <select id="selecaoVoz"></select>
    </div>
    <div class="pontos">⭐ Estrelas: <span id="valorPontos">0</span></div>
</header>

<div class="cartao">
    <div id="revelacao">
        <img id="imgSucesso" src="">
    </div>

    <button class="btn-ouvir" onclick="tocarVoz()">
        <img src="https://openmoji.org/data/color/svg/1F50A.svg">
    </button>

    <input type="text" id="campoEscrita" placeholder="Ouve e escreve aqui..." autocomplete="off">
    <button id="validar" onclick="verificar()">Verificar</button>
    <div id="feedback"></div>
</div>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let pontos = 0;
    let listaDitado = [...palavras].sort(() => 0.5 - Math.random());
    const sintetizador = window.speechSynthesis;
    let vozesPT = [];

    function carregarVozes() {
        // Filtra estritamente por pt-PT (Portugal)
        const todasAsVozes = sintetizador.getVoices();
        vozesPT = todasAsVozes.filter(v => v.lang === 'pt-PT');

        // Se o browser não identificar 'pt-PT', tentamos 'pt_PT'
        if (vozesPT.length === 0) {
            vozesPT = todasAsVozes.filter(v => v.lang.includes('pt-PT') || v.lang.includes('pt_PT'));
        }

        const select = document.getElementById('selecaoVoz');
        select.innerHTML = '';

        vozesPT.forEach((v, i) => {
            const option = document.createElement('option');
            option.value = i;
            // Simplifica o nome para o utilizador (Voz 1, Voz 2 ou Masculina/Feminina se o nome ajudar)
            let nomeVoz = v.name.includes('Duarte') || v.name.includes('Helder') ? 'Masculina' : 
                          v.name.includes('Raquel') || v.name.includes('Fernanda') ? 'Feminina' : v.name;
            option.textContent = nomeVoz;
            select.appendChild(option);
        });
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = carregarVozes;
    }
    carregarVozes();

    function tocarVoz() {
        if (sintetizador.speaking) sintetizador.cancel();
        
        const enunciado = new SpeechSynthesisUtterance(listaDitado[indiceAtual].palavra);
        const indexVoz = document.getElementById('selecaoVoz').value;
        
        if (vozesPT[indexVoz]) {
            enunciado.voice = vozesPT[indexVoz];
        }
        
        enunciado.lang = 'pt-PT';
        enunciado.rate = 0.8;
        sintetizador.speak(enunciado);
    }

    function verificar() {
        const campo = document.getElementById('campoEscrita');
        const resposta = campo.value.trim().toLowerCase();
        const correta = listaDitado[indiceAtual].palavra.toLowerCase();
        const feedback = document.getElementById('feedback');
        const imgSucesso = document.getElementById('imgSucesso');

        if (resposta === correta) {
            pontos += 1;
            document.getElementById('valorPontos').innerText = pontos;
            
            // Procura na pasta img/
            imgSucesso.src = "img/" + listaDitado[indiceAtual].palavra.toLowerCase() + ".png";
            imgSucesso.style.display = 'block';
            feedback.innerHTML = "<span style='color: var(--verde); font-size: 24px;'>Boa! ✨</span>";
            
            setTimeout(proximaPalavra, 2500); 
        } else {
            feedback.innerHTML = `
                <div class="feedback-errado">
                    <span>A palavra correta é: <strong>${correta}</strong></span><br>
                    <button class="btn-continuar" onclick="proximaPalavra()">Continuar</button>
                </div>`;
        }
    }

    function proximaPalavra() {
        indiceAtual++;
        document.getElementById('imgSucesso').style.display = 'none';
        document.getElementById('feedback').innerHTML = "";
        document.getElementById('campoEscrita').value = "";
        
        if (indiceAtual < listaDitado.length) {
            document.getElementById('campoEscrita').focus();
            // REMOVIDO: tocarVoz() automático para respeitar o pedido de clicar no ícone
        } else {
            document.querySelector('.cartao').innerHTML = `
                <div style="padding: 40px 0;">
                    <h2>🏆 Parabéns!</h2>
                    <p style="font-size: 22px; color: #f57c00; font-weight: bold;">⭐ Ganhaste ${pontos} estrelas!</p>
                    <button class="btn-continuar" onclick="location.reload()">Jogar de Novo</button>
                </div>`;
        }
    }

    document.getElementById('campoEscrita').addEventListener('keypress', (e) => { if(e.key === 'Enter') verificar(); });
</script>

</body>
</html>
