<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das Sílabas - Versão XL</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        /* Ocupar toda a altura do ecrã e evitar scroll */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--azul-claro);
        }

        body { display: flex; flex-direction: column; }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 10px 20px; 
            color: var(--azul-escuro); 
            border-bottom: 3px solid #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .cabecalho-conteudo { display: flex; align-items: center; gap: 10px; }
        .icone-cabecalho { width: 35px; height: auto; }
        .estrelas { font-size: 22px; color: #f57c00; font-weight: bold; }

        /* CONTENTOR PRINCIPAL MAIOR */
        .area-jogo {
            flex: 1; /* Ocupa o resto do ecrã */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 15px;
        }

        .cartao-grande {
            background: white;
            width: 90%;
            max-width: 1000px; /* Aumentado de 500px para 1000px */
            height: 85%;
            border-radius: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 30px;
            position: relative;
        }

        /* IMAGEM MUITO MAIOR */
        .imagem-pergunta {
            max-height: 45%; /* Ocupa quase metade do cartão */
            width: auto;
            object-fit: contain;
            border-radius: 25px;
            transition: transform 0.3s;
        }

        .pergunta-texto { 
            font-size: clamp(24px, 4vw, 36px); 
            font-weight: bold; 
            color: var(--azul-escuro); 
            margin: 0;
        }

        /* BOTÕES DE NÚMEROS GIGANTES */
        .container-numeros { 
            display: flex; 
            gap: 20px; 
            width: 100%;
            justify-content: center; 
        }
        
        .btn-numero {
            width: clamp(80px, 15vw, 150px);
            height: clamp(80px, 15vw, 150px);
            font-size: clamp(40px, 6vw, 80px);
            font-weight: bold;
            background: #fff; 
            border: 5px solid var(--azul-medio);
            color: var(--azul-medio); 
            border-radius: 25px;
            cursor: pointer; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-numero:hover { transform: scale(1.05); background: var(--azul-claro); }
        .btn-numero.correto { background: var(--verde) !important; color: white !important; border-color: var(--verde) !important; }
        .btn-numero.errado { background: #ffeded !important; color: #d32f2f !important; border-color: #fde2e2 !important; }

        /* FEEDBACK INTEGRADO (Overlay) */
        #overlay-feedback {
            position: absolute;
            bottom: 20px;
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            min-height: 50px;
        }

        #silabas-reveladas { 
            font-size: clamp(40px, 8vw, 70px); 
            letter-spacing: 10px; 
            color: var(--laranja); 
            font-weight: bold;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }

    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="https://openmoji.org/data/color/svg/1F44F.svg" class="icone-cabecalho">
        <h1 style="margin:0; font-size: 24px;">Quantas Sílabas?</h1>
    </div>
    <div class="estrelas">⭐ <span id="contador-estrelas">0</span></div>
</header>

<main class="area-jogo">
    <div class="cartao-grande" id="cartao">
        <img id="img-pergunta" class="imagem-pergunta" src="">
        
        <div id="silabas-reveladas"></div> <div class="pergunta-texto" id="texto-instrucao">Quantas sílabas ouves?</div>

        <div class="container-numeros" id="teclado">
            <button class="btn-numero" onclick="verificar(1)">1</button>
            <button class="btn-numero" onclick="verificar(2)">2</button>
            <button class="btn-numero" onclick="verificar(3)">3</button>
            <button class="btn-numero" onclick="verificar(4)">4</button>
            <button class="btn-numero" onclick="verificar(5)">5</button> </div>

        <div id="overlay-feedback"></div>
    </div>
</main>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let estrelas = 0;
    let podeClicar = true;
    let listaJogo = [...palavras].sort(() => 0.5 - Math.random());

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) {
            finalizarJogo();
            return;
        }
        
        podeClicar = true;
        const item = listaJogo[indiceAtual];
        
        // CORREÇÃO: Usar o caminho exato do dados.js
        document.getElementById('img-pergunta').src = item.imagem;
        document.getElementById('img-pergunta').style.display = "block";
        
        document.getElementById('overlay-feedback').innerHTML = "";
        document.getElementById('silabas-reveladas').innerHTML = "";
        document.getElementById('texto-instrucao').style.visibility = "visible";
        
        document.querySelectorAll('.btn-numero').forEach(btn => {
            btn.className = 'btn-numero';
        });
    }

    function verificar(escolha) {
        if (!podeClicar) return;
        
        const item = listaJogo[indiceAtual];
        const correta = item.num;
        const botoes = document.querySelectorAll('.btn-numero');
        podeClicar = false;

        if (escolha === correta) {
            estrelas++;
            document.getElementById('contador-estrelas').innerText = estrelas;
            
            // Feedback Visual de Sucesso
            botoes[escolha-1].classList.add('correto');
            document.getElementById('img-pergunta').style.display = "none"; // Esconde imagem para mostrar texto grande
            document.getElementById('texto-instrucao').style.visibility = "hidden";
            document.getElementById('silabas-reveladas').innerText = item.divisao;
            
            setTimeout(proxima, 2000);
        } else {
            // Feedback de Erro
            botoes[escolha-1].classList.add('errado');
            botoes[correta-1].classList.add('correto');
            
            setTimeout(proxima, 2500);
        }
    }

    function proxima() {
        indiceAtual++;
        carregarPergunta();
    }

    function finalizarJogo() {
        const cartao = document.getElementById('cartao');
        cartao.innerHTML = `
            <h1 style="font-size: 80px;">🏆</h1>
            <h2 style="font-size: 40px; color: var(--azul-escuro);">Incrível!</h2>
            <p style="font-size: 30px;">Ganhaste ${estrelas} estrelas!</p>
            <button onclick="location.reload()" style="padding: 20px 50px; font-size: 24px; border-radius: 50px; cursor: pointer; background: var(--azul-medio); color: white; border: none; font-weight: bold;">Jogar de Novo</button>
        `;
    }

    window.onload = carregarPergunta;
</script>

</body>
</html>
