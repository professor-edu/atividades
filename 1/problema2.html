<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>⭐ Problema 2 ⭐</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f7ff;
      text-align: center;
      padding: 30px;
    }

    .caixa {
      background: white;
      max-width: 450px;
      margin: auto;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2a6edb;
    }

    p {
      font-size: 18px;
    }

    input {
      font-size: 20px;
      width: 120px;
      text-align: center;
      padding: 5px;
    }

    button {
      font-size: 18px;
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      background-color: #2a6edb;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    #feedback {
      font-size: 18px;
      margin-top: 15px;
    }

    #seguinte {
      display: none;
      background-color: #2aaa4b;
    }
  </style>
</head>

<body>

  <div class="caixa">
    <h1>Problema 2️⃣</h1>

    <p>
     O Pedro tinha <strong>46</strong> carrinhos.<br>
Deu <strong>18</strong> aos seus amigos.<br><br>
Quantos carrinhos ficaram?
    </p>

    <input id="resposta">
    <br>
    <button onclick="verificar()">Verificar</button>

    <p id="feedback"></p>

    <button id="seguinte" onclick="avancar()">Problema seguinte ➡️</button>
  </div>

  <script>
    // ===== CONFIGURAÇÃO DO PROBLEMA =====
    const respostaCorreta = 28;

    const feedbackErro = [
      "Lê o problema com atenção.",
  "Quantos carrinhos tinha? Quantos deu? Ficou com mais ou menos?",
  "Faz a conta: 46 − 18"
    ];

    const feedbackPrimeiraTentativa = "Excelente! ⭐ 10 pontos!";
    const feedbackComAjuda = "Muito bem! 👍 5 pontos.";

    const proximaPagina = "problema3.html";
    // ==================================

    let tentativas = 0;

    function verificar() {
      const resposta = document.getElementById("resposta").value;
      const feedback = document.getElementById("feedback");

      if (resposta == respostaCorreta) {
        let pontosAtuais = Number(localStorage.getItem("pontuacao"));
        let pontosGanho = (tentativas === 0) ? 10 : 5;

        feedback.innerText = (tentativas === 0)
          ? feedbackPrimeiraTentativa
          : feedbackComAjuda;

        feedback.style.color = "green";
        localStorage.setItem("pontuacao", pontosAtuais + pontosGanho);

        document.getElementById("seguinte").style.display = "inline-block";
      } else {
        feedback.innerText = feedbackErro[Math.min(tentativas, feedbackErro.length - 1)];
        feedback.style.color = "red";
        tentativas++;
      }
    }

    function avancar() {
      window.location.href = proximaPagina;
    }
  </script>

</body>
</html>
