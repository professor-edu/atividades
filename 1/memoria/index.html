<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória 🧠</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-janela-fundo: #ebf5ff;
            --azul-janela-borda: #add8e6;
            --azul-grad-esq: #bde6ff; 
            --azul-grad-dir: #2e86de; 
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex; flex-direction: column; min-height: 100vh;
            user-select: none;
        }
        
        /* CABEÇALHO PADRÃO 85PX */
        .cabecalho { 
            background: linear-gradient(90deg, var(--azul-grad-esq) 0%, var(--azul-grad-dir) 100%); 
            padding: 0 20px; 
            display: flex; align-items: center; justify-content: space-between;
            height: 85px; flex-shrink: 0; z-index: 20;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; width: 180px; }

        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; flex: 3; }
        .cabecalho h1 { font-size: 2rem; color: var(--azul-escuro); margin: 0; font-weight: 700; }

        /* MENU PILL 180PX COM ZOOM */
        .btn-menu {
            background: var(--laranja); color: white; border: none;
            height: 45px; border-radius: 50px; 
            font-weight: 700; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            transition: transform 0.3s ease;
        }
        .btn-menu:hover { transform: scale(1.05); }

        /* ONDA */
        .onda-container {
            height: 45px; width: 100%; overflow: hidden; margin-top: -1px;
            filter: drop-shadow(0px 8px 12px rgba(0,0,0,0.3)); z-index: 10;
        }

        /* NÍVEIS E STATS */
        .menu-niveis { margin: 15px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-nivel { 
            padding: 10px 20px; border: 2px solid var(--azul-grad-dir); border-radius: 20px; cursor: pointer; 
            font-weight: bold; background: white; color: var(--azul-grad-dir); transition: 0.2s;
        }
        .btn-nivel.ativo { background: var(--azul-grad-dir); color: white; }

        .stats { font-size: 1.2rem; margin-bottom: 10px; display: flex; justify-content: center; gap: 20px; }
        .stat-item { font-weight: 700; }

        /* TABULEIRO E CARTAS */
        .tabuleiro {
            display: grid; gap: 12px; max-width: 900px; margin: 10px auto 30px;
            padding: 15px; justify-content: center;
        }

        .carta {
            width: 120px; aspect-ratio: 1/1; border-radius: 15px;
            cursor: pointer; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .carta.virada { transform: rotateY(180deg); }
        .carta.par-encontrado { opacity: 0.4; cursor: default; pointer-events: none; transform: rotateY(180deg); }

        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; align-items: center; justify-content: center;
            border-radius: 15px; background: white; border: 3px solid var(--azul-janela-borda);
            box-sizing: border-box;
        }

        .verso { background-color: var(--azul-escuro); color: white; font-size: 2.5rem; font-weight: 700; }
        .frente { transform: rotateY(180deg); padding: 10px; }
        .frente img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .frente span { font-weight: 700; color: var(--azul-escuro); font-size: 1.1rem; }

        #final-screen { display: none; padding: 40px; }

        /* FOOTER DINÂMICO */
        footer {
            height: 50px; background: white; border-top: 1px solid #eee;
            display: flex; align-items: center; justify-content: center; margin-top: auto;
            font-weight: 700; color: var(--azul-escuro); font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .carta { width: 80px; }
            .cabecalho h1 { font-size: 1.4rem; }
            .btn-menu { width: 140px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <a href="../index.html" class="btn-menu"><span>🏠</span> MENU</a>
    </div>
    <div class="cabecalho-conteudo">
        <img src="memoria.png" style="width:55px"> 
        <h1>Jogo da Memória</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="onda-container">
    <svg viewBox="0 0 500 150" preserveAspectRatio="none" style="height: 100%; width: 100%;">
        <defs>
            <linearGradient id="grad-onda" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:var(--azul-grad-esq); stop-opacity:1" />
                <stop offset="100%" style="stop-color:var(--azul-grad-dir); stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M0.00,49.98 C150.00,150.00 349.20,-49.98 500.00,49.98 L500.00,0.00 L0.00,0.00 Z" style="fill: url(#grad-onda);"></path>
    </svg>
</div>

<div class="menu-niveis">
    <button class="btn-nivel" id="btn-4" onclick="iniciarJogo(4)">Fácil (8)</button>
    <button class="btn-nivel" id="btn-6" onclick="iniciarJogo(6)">Médio (12)</button>
    <button class="btn-nivel" id="btn-8" onclick="iniciarJogo(8)">Difícil (16)</button>
    <button class="btn-nivel" id="btn-10" onclick="iniciarJogo(10)">Génio (20)</button>
</div>

<div class="stats">
    <span class="stat-item" style="color: var(--verde);">✅ Acertos: <span id="v-acertos">0</span></span>
    <span class="stat-item" style="color: var(--vermelho);">❌ Erros: <span id="v-erros">0</span></span>
</div>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="final-screen">
    <div style="background:white; padding:40px; border-radius:30px; display:inline-block; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
        <h2 style="color:var(--azul-escuro); margin-bottom:20px;">🏆 Parabéns! 🏆</h2>
        <button class="btn-menu" style="margin:0 auto;" onclick="location.reload()">Jogar de Novo</button>
    </div>
</div>

<footer>
    <p style="margin:0;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    document.getElementById('ano-atual').textContent = new Date().getFullYear();

    let cartasViradas = [];
    let paresDescobertos = 0;
    let totalPares = 0;
    let nAcertos = 0;
    let nErros = 0;
    let podeJogar = true;

    function iniciarJogo(numPares) {
        const tabuleiro = document.getElementById('tabuleiro');
        tabuleiro.innerHTML = "";
        tabuleiro.style.display = "grid";
        document.getElementById('final-screen').style.display = "none";
        
        tabuleiro.style.gridTemplateColumns = numPares >= 10 ? "repeat(5, 1fr)" : "repeat(4, 1fr)";

        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('ativo'));
        document.getElementById('btn-' + numPares).classList.add('ativo');

        paresDescobertos = 0;
        totalPares = numPares;
        nAcertos = 0; nErros = 0;
        atualizarStats();

        const selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, numPares);
        let baralho = [];
        selecao.forEach(item => {
            baralho.push({ id: item.palavra, tipo: 'img', conteudo: item.imagem });
            baralho.push({ id: item.palavra, tipo: 'txt', conteudo: item.palavra });
        });
        baralho.sort(() => 0.5 - Math.random());

        baralho.forEach(info => {
            const carta = document.createElement('div');
            carta.className = 'carta';
            carta.dataset.id = info.id;
            carta.innerHTML = `
                <div class="face verso">?</div>
                <div class="face frente">
                    ${info.tipo === 'img' ? `<img src="${info.conteudo}">` : `<span>${info.conteudo.toUpperCase()}</span>`}
                </div>
            `;
            carta.onclick = function() { virarCarta(this); };
            tabuleiro.appendChild(carta);
        });
    }

    function virarCarta(carta) {
        if (!podeJogar || carta.classList.contains('virada') || carta.classList.contains('par-encontrado')) return;
        carta.classList.add('virada');
        cartasViradas.push(carta);
        if (cartasViradas.length === 2) verificarPar();
    }

    function verificarPar() {
        podeJogar = false;
        const [c1, c2] = cartasViradas;
        if (c1.dataset.id === c2.dataset.id) {
            nAcertos++; paresDescobertos++;
            setTimeout(() => {
                c1.classList.add('par-encontrado');
                c2.classList.add('par-encontrado');
                cartasViradas = []; podeJogar = true;
                if (paresDescobertos === totalPares) finalizar();
            }, 600);
        } else {
            nErros++;
            setTimeout(() => {
                c1.classList.remove('virada');
                c2.classList.remove('virada');
                cartasViradas = []; podeJogar = true;
            }, 1000);
        }
        atualizarStats();
    }

    function atualizarStats() {
        document.getElementById('v-acertos').innerText = nAcertos;
        document.getElementById('v-erros').innerText = nErros;
    }

    function finalizar() {
        document.getElementById('tabuleiro').style.display = "none";
        document.getElementById('final-screen').style.display = "block";
    }

    window.onload = () => iniciarJogo(4);
</script>
</body>
</html>
