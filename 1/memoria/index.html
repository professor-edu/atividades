<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ Jogo da Memória ⭐</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧠</text></svg>">
    
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --vermelho: #e53935;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px; color: var(--azul-escuro); border-bottom: 3px solid #fff; 
        }

        .cabecalho-conteudo { display: flex; justify-content: center; align-items: center; gap: 15px; }
        .icone-titulo { width: 50px; height: auto; }

        .menu-niveis { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-nivel { 
            padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; 
            font-weight: bold; background: white; color: var(--azul-escuro); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .btn-nivel.ativo { background: var(--azul-escuro); color: white; }

        .stats { font-size: 1.2rem; margin: 10px 0; }
        .stat-item { margin: 0 15px; font-weight: bold; }

        .tabuleiro {
            display: grid;
            gap: 12px;
            max-width: 900px;
            margin: 20px auto;
            padding: 15px;
            justify-content: center;
        }

        .carta {
            width: 130px;
            aspect-ratio: 1/1;
            background-color: var(--azul-medio);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.8s;
        }

        /* ESTADO VIRADO */
        .carta.virada { transform: rotateY(180deg); }

        /* ESTADO ESBATIDO (ACERTO) */
        .carta.par-encontrado { 
            opacity: 0.4 !important; 
            cursor: default;
            pointer-events: none;
            transform: rotateY(180deg) !important; 
        }

        .face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-weight: bold; padding: 10px; box-sizing: border-box;
            background: white; border: 3px solid var(--azul-medio);
        }

        .verso { background-color: var(--azul-escuro); color: white; font-size: 2rem; }
        
        .frente { 
            transform: rotateY(180deg); 
            color: var(--azul-escuro); 
        }

        /* Garante que a frente continua visível após o esbatimento */
        .par-encontrado .frente { backface-visibility: visible; }

        .frente img { max-width: 90%; max-height: 90%; object-fit: contain; }

        #final-screen { display: none; padding: 30px; flex-grow: 1; }

        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        .footer-link, .footer-ano { color: #0d47a1; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="cabecalho-conteudo">
        <img src="memoria.png" class="icone-titulo"> 
        <h1 style="margin:0">Jogo da Memória</h1>
    </div>
</header>

<div class="menu-niveis">
    <button class="btn-nivel" id="btn-4" onclick="iniciarJogo(4)">Fácil (8)</button>
    <button class="btn-nivel" id="btn-6" onclick="iniciarJogo(6)">Médio (12)</button>
    <button class="btn-nivel" id="btn-8" onclick="iniciarJogo(8)">Difícil (16)</button>
    <button class="btn-nivel" id="btn-10" onclick="iniciarJogo(10)">Génio (20)</button>
</div>

<div class="stats">
    <span class="stat-item" style="color: var(--verde);">✅ Acertos: <span id="v-acertos">0</span></span>
    <span class="stat-item" style="color: var(--vermelho);">❌ Erros: <span id="v-erros">0</span></span>
</div>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="final-screen">
    <h2>🏆 Parabéns 🏆</h2>
    <button class="btn-nivel" style="background: var(--azul-escuro); color: white; padding: 15px 30px;" onclick="location.reload()">Jogar de Novo</button>
</div>

<footer>
    <p>
        <span class="footer-ano">2026</span> 🏫 
        <a href="https://eb1pemarinheira.pt/" target="_blank" class="footer-link">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let cartasViradas = [];
    let paresDescobertos = 0;
    let totalPares = 0;
    let nAcertos = 0;
    let nErros = 0;
    let podeJogar = true;

    function iniciarJogo(numPares) {
        const tabuleiro = document.getElementById('tabuleiro');
        tabuleiro.innerHTML = "";
        tabuleiro.style.display = "grid";
        document.getElementById('final-screen').style.display = "none";
        
        if(numPares === 4) tabuleiro.style.gridTemplateColumns = "repeat(4, 1fr)";
        else if(numPares === 6) tabuleiro.style.gridTemplateColumns = "repeat(4, 1fr)";
        else if(numPares === 8) tabuleiro.style.gridTemplateColumns = "repeat(4, 1fr)";
        else if(numPares === 10) tabuleiro.style.gridTemplateColumns = "repeat(5, 1fr)";

        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('ativo'));
        document.getElementById('btn-' + numPares).classList.add('ativo');

        paresDescobertos = 0;
        totalPares = numPares;
        nAcertos = 0; nErros = 0;
        atualizarStats();

        const selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, numPares);
        let baralho = [];
        selecao.forEach(item => {
            baralho.push({ id: item.palavra, tipo: 'img', conteudo: item.imagem });
            baralho.push({ id: item.palavra, tipo: 'txt', conteudo: item.palavra });
        });
        baralho.sort(() => 0.5 - Math.random());

        baralho.forEach(info => {
            const carta = document.createElement('div');
            carta.className = 'carta';
            carta.dataset.id = info.id;
            carta.innerHTML = `
                <div class="face verso">?</div>
                <div class="face frente">
                    ${info.tipo === 'img' ? `<img src="${info.conteudo}">` : `<span>${info.conteudo.toUpperCase()}</span>`}
                </div>
            `;
            carta.onclick = function() { virarCarta(this); };
            tabuleiro.appendChild(carta);
        });
    }

    function virarCarta(carta) {
        if (!podeJogar || carta.classList.contains('virada') || carta.classList.contains('par-encontrado')) return;
        carta.classList.add('virada');
        cartasViradas.push(carta);
        if (cartasViradas.length === 2) verificarPar();
    }

    function verificarPar() {
        podeJogar = false;
        const [c1, c2] = cartasViradas;
        if (c1.dataset.id === c2.dataset.id) {
            nAcertos++; paresDescobertos++;
            setTimeout(() => {
                // Adicionamos a classe sem remover a classe 'virada'
                c1.classList.add('par-encontrado');
                c2.classList.add('par-encontrado');
                cartasViradas = []; podeJogar = true;
                if (paresDescobertos === totalPares) finalizar();
            }, 600);
        } else {
            nErros++;
            setTimeout(() => {
                c1.classList.remove('virada');
                c2.classList.remove('virada');
                cartasViradas = []; podeJogar = true;
            }, 1000);
        }
        atualizarStats();
    }

    function atualizarStats() {
        document.getElementById('v-acertos').innerText = nAcertos;
        document.getElementById('v-erros').innerText = nErros;
    }

    function finalizar() {
        document.getElementById('tabuleiro').style.display = "none";
        document.getElementById('final-screen').style.display = "block";
    }

    window.onload = () => iniciarJogo(4);
</script>
<script src="js/componentes.js"></script>
</body>
</html>
