<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: var(--azul-claro); margin: 0; }
        
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px; color: var(--azul-escuro); border-bottom: 3px solid #fff; 
        }

        .tabuleiro {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 800px;
            margin: 30px auto;
            padding: 10px;
        }

        .carta {
            aspect-ratio: 1/1;
            background-color: var(--azul-medio);
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .carta.virada { transform: rotateY(180deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 5px;
            box-sizing: border-box;
            background: white;
            border: 4px solid var(--azul-medio);
        }

        .verso { background-color: var(--azul-escuro); color: white; font-size: 2rem; }

        .frente { transform: rotateY(180deg); color: var(--azul-escuro); }

        .frente img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .acertou { visibility: hidden; opacity: 0; transition: opacity 0.5s, visibility 0.5s; }

        #feedback-final { display: none; padding: 20px; }
        .btn-recomecar { padding: 15px 40px; border-radius: 50px; cursor: pointer; background: var(--azul-escuro); color: white; border: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header class="cabecalho">
    <h1 style="margin:0">Jogo da Memória</h1>
    <div style="margin-top: 5px;">Encontra os pares (Imagem e Nome)!</div>
</header>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="feedback-final">
    <h2>🎉 Parabéns! Completaste o desafio!</h2>
    <button class="btn-recomecar" onclick="location.reload()">Jogar de Novo</button>
</div>

<script src="js/dados.js"></script>
<script>
    let cartasViradas = [];
    let paresEncontrados = 0;
    let podeJogar = true;

    // Selecionamos 6 palavras aleatórias do dados.js para criar 12 cartas (6 imagens + 6 nomes)
    const selecao = [...palavras].sort(() => 0.5 - Math.random()).slice(0, 6);
    
    let baralho = [];
    selecao.forEach(item => {
        // Carta de Imagem
        baralho.push({ id: item.palavra, tipo: 'imagem', conteudo: item.imagem });
        // Carta de Nome
        baralho.push({ id: item.palavra, tipo: 'nome', conteudo: item.palavra });
    });

    // Baralhar as 12 cartas
    baralho.sort(() => 0.5 - Math.random());

    const tabuleiro = document.getElementById('tabuleiro');

    function criarTabuleiro() {
        baralho.forEach((info, index) => {
            const carta = document.createElement('div');
            carta.classList.add('carta');
            carta.dataset.id = info.id;
            carta.dataset.index = index;

            carta.innerHTML = `
                <div class="face verso">?</div>
                <div class="face frente">
                    ${info.tipo === 'imagem' ? `<img src="${info.conteudo}">` : `<span>${info.conteudo.toUpperCase()}</span>`}
                </div>
            `;

            carta.addEventListener('click', virarCarta);
            tabuleiro.appendChild(carta);
        });
    }

    function virarCarta() {
        if (!podeJogar || this.classList.contains('virada') || cartasViradas.length >= 2) return;

        this.classList.add('virada');
        cartasViradas.push(this);

        if (cartasViradas.length === 2) {
            verificarPar();
        }
    }

    function verificarPar() {
        podeJogar = false;
        const [carta1, carta2] = cartasViradas;

        if (carta1.dataset.id === carta2.dataset.id) {
            // Acertou!
            setTimeout(() => {
                carta1.classList.add('acertou');
                carta2.classList.add('acertou');
                paresEncontrados++;
                cartasViradas = [];
                podeJogar = true;

                if (paresEncontrados === selecao.length) {
                    document.getElementById('feedback-final').style.display = 'block';
                    tabuleiro.style.display = 'none';
                }
            }, 1000);
        } else {
            // Errou
            setTimeout(() => {
                carta1.classList.remove('virada');
                carta2.classList.remove('virada');
                cartasViradas = [];
                podeJogar = true;
            }, 1500);
        }
    }

    criarTabuleiro();
</script>

<script src="js/componentes.js"></script>

</body>
</html>
