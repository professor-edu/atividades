<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Jogo da Memória 👀</title>
    
    <link rel="icon" type="image/png" href="../../../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="dados.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            --sucesso: #48bb78;
            --erro: #e53e3e;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); }

        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; gap: 10px; justify-content: center; }

        /* SIDEBAR */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; }
        .sidebar li a:hover { background: var(--cor-1ano); color: white !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ÁREA DE JOGO */
        main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .cartao-jogo-container {
            background: white; width: 100%; max-width: 1000px; min-height: 600px;
            padding: 25px; border-radius: 30px; border-top: 8px solid var(--cor-1ano);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center;
        }

        /* NÍVEIS NA HORIZONTAL (Barra Superior) */
        .menu-niveis { 
            display: flex; 
            flex-direction: row; 
            gap: 10px; 
            width: 100%; 
            justify-content: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f4f8;
        }
        .btn-nivel { 
            padding: 10px 15px; 
            font-size: 0.9rem; 
            font-weight: 700; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            transition: 0.2s; 
            box-shadow: 0 3px 0 rgba(0,0,0,0.1); 
        }
        .n-facil { background: #48bb78; }
        .n-medio { background: #ed8936; }
        .n-dificil { background: #e53e3e; }
        .n-genio { background: #805ad5; }
        .btn-nivel:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-nivel.active { transform: translateY(2px); box-shadow: none; outline: 3px solid var(--azul-vibrante); }

        /* BARRA DE INFO (Tempo e Pontos) */
        .info-bar { 
            display: none; 
            justify-content: center; 
            gap: 25px; 
            margin-bottom: 20px; 
            font-weight: 700; 
            color: var(--azul-escuro); 
            font-size: 1.1rem; 
        }
        .tempo-critico { color: var(--erro); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* TABULEIRO (Área que altera) */
        .memory-grid { 
            display: grid; 
            gap: 12px; 
            perspective: 1000px; 
            width: 100%; 
            justify-content: center; 
            align-content: center;
        }
        
        .memory-card { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-back { background: var(--cor-1ano); color: white; font-size: 2.2rem; font-weight: 800; border: 3px solid white; }
        .card-front { background: white; transform: rotateY(180deg); border: 2px solid #e3f2fd; padding: 10px; }
        .card-front img { max-width: 90%; max-height: 90%; object-fit: contain; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 600px) {
            .memory-card { width: 75px; height: 75px; }
            .card-back { font-size: 1.5rem; }
            .btn-nivel { padding: 8px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../../../index.html">🏠 Início</a></li>
        <li><a href="../../../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../../index.html">🎒 1º Ano</a></li>
        <li><a href="../../../2/index.html">💡 2º Ano</a></li>
        <li><a href="../../../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../../../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        <h1>Jogo da Memória 👀</h1>
    </div>
</header>

<main>
    <div class="cartao-jogo-container">
        
        <div class="menu-niveis" id="menu-niveis">
            <button class="btn-nivel n-facil" onclick="iniciarJogo(8, 120, this)">Fácil (8)</button>
            <button class="btn-nivel n-medio" onclick="iniciarJogo(12, 180, this)">Médio (12)</button>
            <button class="btn-nivel n-dificil" onclick="iniciarJogo(16, 240, this)">Difícil (16)</button>
            <button class="btn-nivel n-genio" onclick="iniciarJogo(20, 300, this)">Génio (20)</button>
        </div>

        <div class="info-bar" id="game-info">
            <div>⏱️ <span id="timer">00:00</span></div>
            <div>✅ <span id="certas">0</span></div>
            <div>❌ <span id="erradas">0</span></div>
        </div>

        <div id="game-content" style="width: 100%;">
            <div id="placeholder-msg" style="color: var(--text-main); margin-top: 50px;">
                <h3>Escolhe um nível para começar!</h3>
            </div>
            <div class="memory-grid" id="memory-grid"></div>
            <div id="resultado-final" style="display:none; text-align:center; padding: 40px 0;"></div>
        </div>

    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <b>EB1/PE da Marinheira</b></p>
</footer>

<script>
    let flippedCards = [];
    let matchedCount = 0;
    let certasCount = 0;
    let erradasCount = 0;
    let timeLeft = 0;
    let timerId = null;
    let lockBoard = false;

    function iniciarJogo(numCartas, tempoSegundos, btn) {
        // UI Reset
        document.getElementById('placeholder-msg').style.display = 'none';
        document.getElementById('resultado-final').style.display = 'none';
        document.getElementById('game-info').style.display = 'flex';
        document.getElementById('memory-grid').style.display = 'grid';
        
        // Destacar botão ativo
        document.querySelectorAll('.btn-nivel').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const grid = document.getElementById('memory-grid');
        grid.innerHTML = '';
        
        matchedCount = 0; certasCount = 0; erradasCount = 0;
        timeLeft = tempoSegundos;
        updateInfo();

        const cols = window.innerWidth < 600 ? 3 : (numCartas <= 12 ? 4 : 5);
        grid.style.gridTemplateColumns = `repeat(${cols}, auto)`;

        const selecionadas = [...palavras].sort(() => Math.random() - 0.5).slice(0, numCartas / 2);
        const deck = [...selecionadas, ...selecionadas].sort(() => Math.random() - 0.5);

        deck.forEach(item => {
            const card = document.createElement('div');
            card.className = 'memory-card';
            card.dataset.name = item.palavra;
            card.innerHTML = `
                <div class="card-back">?</div>
                <div class="card-front"><img src="../${item.imagem}"></div>
            `;
            card.addEventListener('click', flipCard);
            grid.appendChild(card);
        });

        startTimer();
    }

    function flipCard() {
        if (lockBoard || this === flippedCards[0] || this.classList.contains('flipped')) return;
        this.classList.add('flipped');
        flippedCards.push(this);
        if (flippedCards.length === 2) checkMatch();
    }

    function checkMatch() {
        lockBoard = true;
        if (flippedCards[0].dataset.name === flippedCards[1].dataset.name) {
            certasCount++; matchedCount += 2;
            flippedCards = []; lockBoard = false;
            if (matchedCount === document.querySelectorAll('.memory-card').length) finalizar("Vitória! 🏆");
        } else {
            erradasCount++;
            setTimeout(() => {
                flippedCards.forEach(c => c.classList.remove('flipped'));
                flippedCards = []; lockBoard = false;
            }, 1000);
        }
        updateInfo();
    }

    function startTimer() {
        if(timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft--;
            const min = Math.floor(timeLeft / 60);
            const seg = timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.innerText = `${min.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
            if(timeLeft <= 10) timerEl.classList.add('tempo-critico');
            if(timeLeft <= 0) finalizar("Tempo Esgotado! ⌛");
        }, 1000);
    }

    function updateInfo() {
        document.getElementById('certas').innerText = certasCount;
        document.getElementById('erradas').innerText = erradasCount;
    }

    function finalizar(msg) {
        clearInterval(timerId);
        document.getElementById('memory-grid').style.display = 'none';
        document.getElementById('game-info').style.display = 'none';
        const res = document.getElementById('resultado-final');
        res.style.display = 'block';
        res.innerHTML = `
            <h2 style="color:var(--azul-escuro); font-size:2rem;">${msg}</h2>
            <div style="font-size:4rem; margin:10px;">✨</div>
            <p>Pares: <b>${certasCount}</b> | Erros: <b>${erradasCount}</b></p>
            <button onclick="location.reload()" class="btn-voltar" style="padding:10px 25px; margin:20px auto;">Reiniciar 👀</button>
        `;
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>
</body>
</html>
