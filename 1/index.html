<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --bg-header-1ano: #ddecfa; 
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        header {
            background-color: var(--bg-header-1ano);
            padding: 15px;
            /* Alterado para 1px conforme pedido */
            border-bottom: 1px solid var(--azul-vibrante);
            position: relative;
            flex-shrink: 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra tudo horizontalmente */
            gap: 10px;
        }

        /* Container para os botões de navegação no topo */
        .nav-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            position: relative;
        }

        .hamburger {
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
        }

        .btn-voltar {
            background: var(--azul-vibrante);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #0070c4;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 5px 0 0 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1rem); font-weight: 500; opacity: 0.8; margin-bottom: 5px; }

        /* Estilo das linhas do hamburger */
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left;
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li { margin-bottom: 8px; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; transition: 0.3s ease; }
        .sidebar li a:hover { background: #e3f2fd; color: var(--azul-vibrante); transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* GRID CENTRADA */
        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 1000px; width: 100%; }

        .cartao-disciplina {
            background: white; flex: 0 1 220px; aspect-ratio: 1 / 1;
            border-radius: 30px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 15px; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee;
            border-top: 8px solid var(--azul-vibrante);
        }
        .cartao-disciplina:hover { transform: translateY(-10px); }
        .icone-wrapper { font-size: 4rem; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.2rem; }

        .c-port { border-top-color: #ff6b6b; } 
        .c-mat { border-top-color: #4dabf7; } 
        .c-estudo { border-top-color: #51cf66; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 600px) {
            .grid-disciplinas { gap: 15px; }
            .cartao-disciplina { flex: 0 1 150px; }
            .icone-wrapper { font-size: 3rem; }
            .nome-disciplina { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-buttons">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">🏠 Início</a>
        </div>
        
        <h1>🎒 1º Ano 🎒</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🌱</div> <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }
</script>
</body>
</html>
