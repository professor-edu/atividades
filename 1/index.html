<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-1ano: #ddecfa; 
            --bg-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --cor-1ano-forte: #3b82f6;
            --accent: #ff9800;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO COM ALTURA E ESTILO DO TEMPLATE */
        header {
            background-color: var(--bg-header-1ano);
            height: 80px; /* Altura fixa conforme o template */
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 2px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            z-index: 100;
            flex-shrink: 0;
        }

        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            flex: 1;
        }

        /* MENU HAMBÚRGUER IGUAL AO TEMPLATE */
        .hamburger {
            cursor: pointer; 
            background: rgba(255,255,255,0.4); 
            border: none;
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            padding: 8px; 
            border-radius: 8px;
            transition: 0.3s;
        }
        .hamburger span { 
            display: block; width: 20px; height: 2px; 
            background: var(--azul-escuro); 
            transition: 0.3s;
        }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* BOTÃO VOLTAR LOGO A SEGUIR AO HAMBÚRGUER */
        .btn-header {
            background: var(--accent); color: white; border: none;
            padding: 6px 15px; border-radius: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 0px #e68a00;
            font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-header:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-header:active { transform: translateY(3px); box-shadow: 0 1px 0px #e68a00; }

        .cabecalho-conteudo { 
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 { 
            color: var(--azul-escuro); 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .header-right { flex: 1; }

        .subtitulo-bar {
            background-color: var(--bg-header-1ano);
            padding: 10px 0 15px 0;
        }
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: 1rem; 
            font-weight: 500; 
            margin: 0;
            opacity: 0.8;
        }

        /* GRID HORIZONTAL FLEXÍVEL */
        main {
            flex: 1 0 auto;
            display: flex;
            justify-content: center; 
            padding: 40px 20px;
        }

        .grid-jogos {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; /* Mantém os cartões horizontais e centrados */
            gap: 25px;
            max-width: 1200px; 
            width: 100%;
        }

        .cartao-jogo {
            background: white;
            flex: 0 1 220px; /* Tamanho base horizontal */
            aspect-ratio: 1 / 1;
            border-radius: 25px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            border-top: 8px solid var(--azul-vibrante);
        }

        .cartao-jogo:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .icone-wrapper { font-size: 4rem; transition: 0.3s; }
        .cartao-jogo:hover .icone-wrapper { transform: scale(1.1); }
        .nome-jogo { color: var(--azul-escuro); font-weight: 700; font-size: 1.2rem; }

        /* Cores das Disciplinas */
        .c-port { border-top-color: #ff6b6b; } 
        .c-mat { border-top-color: #4dabf7; }
        .c-estudo { border-top-color: #51cf66; }

        /* FOOTER IGUAL AO TEMPLATE */
        footer {
            height: 45px; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center;
            justify-content: center; 
            background: white; 
            border-top: 1px solid var(--azul-vibrante); 
            width: 100%;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        /* SIDEBAR (Oculta por padrão) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        @media (max-width: 600px) {
            header { height: auto; padding: 15px; flex-direction: column; gap: 10px; }
            .header-left { width: 100%; justify-content: space-between; }
            .cartao-jogo { flex: 0 1 150px; }
            .icone-wrapper { font-size: 2.8rem; }
            .nome-jogo { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<header>
    <div class="header-left">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <a href="../index.html" class="btn-header">
            <span>🏠</span> <span>Início</span>
        </a>
    </div>

    <div class="cabecalho-conteudo">
        <h1>🎒 1º Ano 🎒</h1>
    </div>

    <div class="header-right"></div>
</header>

<div class="subtitulo-bar">
    <p class="subtitulo">O que vamos aprender hoje? 😊</p>
</div>

<main>
    <div class="grid-jogos">
        <a href="portugues/index.html" class="cartao-jogo c-port">
            <div class="icone-wrapper">📚</div>
            <span class="nome-jogo">Português</span>
        </a>

        <a href="matematica/index.html" class="cartao-jogo c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-jogo">Matemática</span>
        </a>

        <a href="estudo-meio/index.html" class="cartao-jogo c-estudo">
            <div class="icone-wrapper">🌍</div>
            <span class="nome-jogo">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    function toggleMenu() {
        const hamburger = document.getElementById('hamburgerBtn');
        const overlay = document.getElementById('overlay');
        hamburger.classList.toggle('open');
        overlay.classList.toggle('active');
        // Aqui podes adicionar a lógica para abrir uma sidebar se necessário
    }
</script>
</body>
</html>
