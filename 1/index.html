<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --bg-header-1ano: #ddecfa; 
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            /* Permite crescer se houver muitos cartões, mas ocupa pelo menos a tela toda */
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto; 
        }

        header {
            background-color: var(--bg-header-1ano);
            padding: 20px 15px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* HAMBURGER */
        .hamburger {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            z-index: 10;
        }

        /* BOTÃO INÍCIO (Posicionado ao lado do hamburger) */
        .btn-voltar {
            position: absolute;
            left: 60px; /* Dá espaço ao hamburger */
            top: 50%;
            transform: translateY(-50%);
            background: var(--azul-vibrante);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #0070c4;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-voltar:hover { transform: translateY(-50%) scale(1.05); filter: brightness(1.1); }
        .btn-voltar:active { transform: translateY(-48%); box-shadow: none; }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.9rem, 3vw, 1.1rem); font-weight: 500; margin-top: 8px; opacity: 0.8; }

        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* SIDEBAR */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left;
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li { margin-bottom: 8px; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; transition: 0.3s ease; }
        .sidebar li a:hover { background: #e3f2fd; color: var(--azul-vibrante); transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* MAIN: Alinhamento centralizado com margem para o footer */
        main { 
            flex: 1 0 auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
        }

        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1200px; width: 100%; }

        .cartao-disciplina {
            background: white; flex: 0 1 240px; aspect-ratio: 1 / 1;
            border-radius: 30px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1.5px solid #eee;
            border-top: 10px solid var(--azul-vibrante);
        }
        .cartao-disciplina:hover { transform: translateY(-12px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .icone-wrapper { font-size: 4.5rem; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.4rem; }

        .c-port { border-top-color: #ff6b6b; } 
        .c-mat { border-top-color: #4dabf7; } 
        .c-estudo { border-top-color: #51cf66; }

        footer { 
            height: 50px; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            border-top: 1px solid var(--azul-vibrante); 
            width: 100%; 
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        /* AJUSTES MOBILE */
       @media (max-width: 768px) {
    header {
        height: auto; /* Permite que o header cresça verticalmente */
        padding-bottom: 20px;
    }

    .header-content {
        display: flex;
        flex-direction: column; /* Empilha os elementos */
        align-items: center;
        padding-top: 60px; /* Dá espaço para os botões fixos no topo */
    }

    /* Posicionamento do Hamburger e Botão Início no topo */
    .hamburger {
        position: absolute;
        left: 10px;
        top: 10px;
        transform: none;
    }

    .btn-voltar {
        position: absolute;
        left: 60px; /* Mantém o menu ao lado do hamburger */
        top: 10px;
        transform: none;
    }

    /* O Título e Subtítulo ficam agora naturalmente por baixo */
    h1 {
        margin-top: 10px;
        font-size: 1.6rem;
    }
}
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <a href="../index.html" class="btn-voltar">🏠 Início</a>
        <h1>🎒 1º Ano 🎒</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🍃</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
        document.getElementById('hamburgerBtn').classList.toggle('open');
    }
</script>
</body>
</html>
