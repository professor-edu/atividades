<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            /* Azul suave mas com presença para o cabeçalho do 1º Ano */
            --bg-header-1ano: #ddecfa; 
            --bg-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --cor-1ano-forte: #3b82f6;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO ADAPTADO */
        header {
            background-color: var(--bg-header-1ano);
            padding: 20px 15px;
            border-bottom: 2px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Espaça hambúrguer, título e botão */
        }

        /* MENU HAMBÚRGUER (Estilo Página do Jogo) */
        .menu-hamburguer {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: none;
            border: none;
        }
        .menu-hamburguer span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--azul-escuro);
            border-radius: 3px;
            transition: 0.3s;
        }

        h1 { 
            color: var(--azul-escuro); 
            font-size: clamp(1.4rem, 5vw, 2.2rem); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
        }

        .btn-voltar {
            background: var(--cor-1ano-forte); 
            color: white; 
            border: none;
            padding: 8px 18px; 
            border-radius: 20px; 
            font-weight: 700;
            text-decoration: none; 
            font-size: 0.85rem; 
            box-shadow: 0 3px 0 #2563eb;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-voltar:active { transform: translateY(2px); box-shadow: none; }

        .subtitulo-bar {
            background-color: var(--bg-header-1ano);
            padding-bottom: 15px;
            opacity: 0.9;
        }
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.9rem, 3vw, 1.1rem); 
            font-weight: 500; 
            margin: 0;
        }

        /* CONTENTOR FLEXÍVEL IGUAL À PRÉ (FLEXIBILIDADE TOTAL) */
        main {
            flex: 1 0 auto;
            display: flex;
            justify-content: center; 
            padding: 40px 20px;
        }

        .grid-jogos {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px;
            max-width: 1100px; 
            width: 100%;
        }

        .cartao-jogo {
            background: white;
            flex: 0 1 240px; /* Cartões das disciplinas ligeiramente maiores */
            aspect-ratio: 1 / 1;
            border-radius: 25px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            border-top: 8px solid var(--azul-vibrante);
        }

        /* ANIMAÇÃO HOVER */
        .cartao-jogo:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 20px 35px rgba(0,0,0,0.12);
        }

        .cartao-jogo .icone-wrapper { font-size: 4.5rem; transition: transform 0.3s ease; }
        .cartao-jogo:hover .icone-wrapper { transform: scale(1.1); }
        .cartao-jogo span.nome-jogo { color: var(--azul-escuro); font-weight: 700; font-size: 1.3rem; }

        /* Cores das Disciplinas */
        .c-port { border-top-color: #ff6b6b; } 
        .c-mat { border-top-color: #4dabf7; }
        .c-estudo { border-top-color: #51cf66; }

        footer {
            flex-shrink: 0;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-footer);
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        /* Mobile */
        @media (max-width: 600px) {
            .header-content { flex-wrap: wrap; }
            .menu-hamburguer { order: 1; }
            .btn-voltar { order: 2; }
            h1 { order: 3; width: 100%; margin-top: 15px; font-size: 1.6rem; }
            .cartao-jogo { flex: 0 1 160px; border-top-width: 6px; }
            .cartao-jogo .icone-wrapper { font-size: 3rem; }
            .cartao-jogo span.nome-jogo { font-size: 1rem; }
            .grid-jogos { gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <button class="menu-hamburguer" onclick="alert('Menu de navegação em breve!')">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <h1>🎒 1º Ano 🎒</h1>

        <a href="../index.html" class="btn-voltar">🏠 Início</a>
    </div>
</header>
<div class="subtitulo-bar">
    <p class="subtitulo">O que vamos aprender hoje?</p>
</div>

<main>
    <div class="grid-jogos">
        <a href="portugues/index.html" class="cartao-jogo c-port">
            <div class="icone-wrapper">📚</div>
            <span class="nome-jogo">Português</span>
        </a>

        <a href="matematica/index.html" class="cartao-jogo c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-jogo">Matemática</span>
        </a>

        <a href="estudo-meio/index.html" class="cartao-jogo c-estudo">
            <div class="icone-wrapper">🌍</div>
            <span class="nome-jogo">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>document.getElementById('ano-atual').innerText = new Date().getFullYear();</script>
</body>
</html>
