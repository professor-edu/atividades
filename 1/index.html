<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --bg-header-1ano: #ddecfa; 
            --text-main: #455a64;
            --accent: #ff9800;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa a altura total para centrar o conteúdo */
            overflow: hidden; 
        }
        
        /* CABEÇALHO AJUSTADO */
        .cabecalho { 
            background-color: var(--bg-header-1ano);
            padding: 5px 20px 30px 20px; 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            height: 100px; /* Aumentado ligeiramente para caber o subtítulo */
            flex-shrink: 0;
            z-index: 100;
            position: relative;
            border-bottom: 2px solid var(--azul-vibrante);
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; gap: 12px; }
        .header-right { justify-content: flex-end; }

        /* MOCHILA + TÍTULO + MOCHILA */
        .cabecalho-conteudo { 
            display: flex; 
            flex-direction: column; /* Para colocar o subtítulo por baixo */
            justify-content: center; 
            align-items: center; 
            flex: 2;
        }

        .titulo-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cabecalho h1 {
            margin: 0;
            font-size: clamp(1.4rem, 4vw, 2rem); 
            font-weight: 700;
            color: var(--azul-escuro);
        }

        .subtitulo-header {
            font-size: 1rem;
            font-weight: 500;
            color: var(--azul-escuro);
            margin-top: 5px;
            opacity: 0.8;
        }

        .img-titulo { width: 50px; height: auto; }

        /* BOTÃO MENU NO AZUL VIBRANTE */
        .btn-header {
            background: var(--azul-vibrante); color: white; border: none;
            padding: 8px 18px; border-radius: 20px; font-weight: 700;
            cursor: pointer; box-shadow: 0 4px 0px #0070c4;
            font-size: 0.85rem; display: flex; align-items: center; gap: 6px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-header:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-header:active { transform: translateY(3px); box-shadow: 0 1px 0px #0070c4; }

        /* HAMBURGER */
        .hamburger {
            cursor: pointer; background: rgba(255,255,255,0.5); border: none;
            display: flex; flex-direction: column; gap: 4px; padding: 8px; border-radius: 8px;
            transition: 0.3s; z-index: 201;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* SIDEBAR LIMPA (Sem recordes/ajuda) */
        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: white; z-index: 200; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            text-align: left;
        }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar {
            background: #fff5f5; color: #ff4757; padding: 20px 25px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
            font-weight: 700; border-bottom: 1px solid #ffebeb;
        }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li { margin-bottom: 8px; }
        .sidebar li a {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 15px; text-decoration: none;
            color: var(--text-main); background: #f8fafc; border-radius: 12px; 
            transition: 0.3s ease;
        }
        .sidebar li a:hover { background: #e3f2fd; color: var(--azul-vibrante); transform: translateX(8px); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        /* ALINHAMENTO CENTRALIZADO DOS CARTÕES */
        main { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; /* Centra verticalmente */
            padding: 20px;
        }

        .grid-disciplinas {
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-content: center; /* Centra as linhas */
            gap: 30px;
            max-width: 1200px; 
            width: 100%;
        }

        .cartao-disciplina {
            background: white; flex: 0 1 240px; aspect-ratio: 1 / 1;
            border-radius: 30px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1.5px solid #eee;
            border-top: 10px solid var(--azul-vibrante);
        }
        .cartao-disciplina:hover { transform: translateY(-12px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        
        .icone-wrapper { font-size: 4.5rem; transition: 0.3s; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.4rem; }

        /* NOVOS ÍCONES E CORES */
        .c-port { border-top-color: #ff6b6b; } /* Português: Lápis/Abc */
        .c-mat { border-top-color: #4dabf7; } /* Matemática: Números */
        .c-estudo { border-top-color: #51cf66; } /* Estudo do Meio: Lupa/Natureza */

        footer {
            height: 45px; flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); width: 100%;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        @media (max-width: 600px) {
            .img-titulo { width: 35px; }
            .cabecalho { height: auto; padding: 15px 10px; }
            .cartao-disciplina { flex: 0 1 160px; }
            .icone-wrapper { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">🔍 3º Ano</a></li> <li><a href="../4/index.html">🧬 4º Ano</a></li>
    </ul>
</nav>

<header class="cabecalho">
    <div class="header-left">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
        <a href="../index.html" class="btn-header">
            <span>🏠</span> <span>Início</span>
        </a>
    </div>
    
    <div class="cabecalho-conteudo">
        <div class="titulo-wrapper">
            <img src="mochila.png" class="img-titulo" alt="mochila">
            <h1>1º Ano</h1>
            <img src="mochila.png" class="img-titulo" alt="mochila">
        </div>
        <div class="subtitulo-header">O que vamos aprender hoje? 😊</div>
    </div>

    <div class="header-right"></div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>

        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>

        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🍃</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }
</script>
</body>
</html>
