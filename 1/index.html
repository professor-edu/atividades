<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano - Disciplinas 📚</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-page: #f0f7ff;
            --bg-header-1ano: #e3f2fd; /* Azul muito suave para o 1º ano */
            --bg-footer: #ffffff;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --cor-1ano: #42a5f5; /* Azul principal do 1º ano */
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-page);
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* CABEÇALHO COM MENU HAMBÚRGUER */
        header {
            background-color: var(--bg-header-1ano);
            padding: 20px 15px;
            border-bottom: 2px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            z-index: 1000;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Menu Hambúrguer */
        .menu-hamburguer {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: none;
            border: none;
        }

        .menu-hamburguer span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--azul-escuro);
            border-radius: 3px;
            transition: 0.3s;
        }

        h1 {
            color: var(--azul-escuro);
            font-size: clamp(1.4rem, 5vw, 2.2rem); 
            margin: 0;
            flex-grow: 1;
        }

        .btn-voltar {
            background: var(--cor-1ano);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.85rem;
            box-shadow: 0 3px 0 #1e88e5;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* SUBTÍTULO */
        .subtitulo-container {
            background-color: var(--bg-header-1ano);
            padding-bottom: 15px;
        }
        .subtitulo {
            color: var(--azul-escuro);
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0.8;
            margin: 0;
        }

        /* GRID FLEXÍVEL PARA AS DISCIPLINAS */
        main {
            flex: 1 0 auto;
            display: flex;
            justify-content: center;
            align-items: center; /* Centra verticalmente se houver poucos cartões */
            padding: 40px 20px;
        }

        .grid-disciplinas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }

        .cartao-disciplina {
            background: white;
            flex: 0 1 250px; /* Cartões um pouco maiores para as disciplinas */
            aspect-ratio: 1 / 1;
            border-radius: 25px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #eee;
            border-top: 8px solid var(--azul-vibrante);
        }

        /* ANIMAÇÃO HOVER DO TEMPLATE */
        .cartao-disciplina:hover {
            transform: translateY(-12px) scale(1.05);
            box-shadow: 0 20px 35px rgba(0,0,0,0.12);
        }

        .icone-disciplina {
            font-size: 4rem;
            transition: transform 0.3s ease;
        }
        .cartao-disciplina:hover .icone-disciplina { transform: scale(1.15); }

        .nome-disciplina {
            color: var(--azul-escuro);
            font-weight: 700;
            font-size: 1.3rem;
        }

        /* CORES ESPECÍFICAS DAS DISCIPLINAS */
        .portugues { border-top-color: #ff6b6b; }
        .matematica { border-top-color: #4dabf7; }
        .estudo-meio { border-top-color: #51cf66; }

        /* FOOTER SEGURO */
        footer {
            flex-shrink: 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-footer);
            border-top: 1px solid var(--azul-vibrante);
            width: 100%;
        }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
        footer a { color: var(--azul-vibrante); text-decoration: none; font-weight: 700; }

        /* RESPONSIVIDADE */
        @media (max-width: 600px) {
            .header-content { flex-direction: row; flex-wrap: wrap; justify-content: space-between; }
            .cartao-disciplina { flex: 0 1 160px; border-top-width: 6px; }
            .icone-disciplina { font-size: 3rem; }
            .nome-disciplina { font-size: 1rem; }
            .grid-disciplinas { gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <button class="menu-hamburguer" onclick="alert('Menu em breve!')">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <h1>1º Ano 🎒</h1>
        <a href="../index.html" class="btn-voltar">🏠 Início</a>
    </div>
</header>
<div class="subtitulo-container">
    <p class="subtitulo">Escolhe a tua disciplina 😊</p>
</div>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina portugues">
            <div class="icone-disciplina">📚</div>
            <span class="nome-disciplina">Português</span>
        </a>

        <a href="matematica/index.html" class="cartao-disciplina matematica">
            <div class="icone-disciplina">➕</div>
            <span class="nome-disciplina">Matemática</span>
        </a>

        <a href="estudo-meio/index.html" class="cartao-disciplina estudo-meio">
            <div class="icone-disciplina">🌍</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank">EB1/PE da Marinheira</a></p>
</footer>

<script>document.getElementById('ano-atual').innerText = new Date().getFullYear();</script>
</body>
</html>
