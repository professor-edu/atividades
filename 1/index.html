<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CSS DO TEMPLATE BASE E MOLDE INTOCÁVEL
           ========================================= */
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --cor-1ano: #0091ff;     
            --cor-1ano-dark: #0070c5;
            --bg-header: #e3f2fd;    
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
            
            /* Cores das Disciplinas */
            --cor-pt: #ff6b6b;
            --cor-mat: #4dabf7;
            --cor-em: #51cf66;
        }

        body { font-family: 'Roboto', sans-serif; text-align: center; background-color: var(--bg-body); margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        header { background-color: var(--bg-header); padding: 25px 20px; border-bottom: 1px solid var(--azul-vibrante); box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .nav-container { width: 100%; display: flex; align-items: center; justify-content: flex-start; gap: 15px; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; }
        
        .hamburger { cursor: pointer; background: rgba(255, 255, 255, 0.4); border: none; display: flex; flex-direction: column; gap: 4px; padding: 10px; border-radius: 8px; transition: background 0.4s ease; }
        .hamburger:hover { background: #fff9c4; }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--azul-escuro); transition: 0.3s; transform-origin: center; }
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        
        .btn-voltar { background: var(--cor-1ano); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 700; text-decoration: none; font-size: 0.9rem; box-shadow: 0 3px 0 var(--cor-1ano-dark); display: flex; align-items: center; gap: 8px; transition: 0.2s; cursor: pointer;}
        .btn-voltar:hover { transform: scale(1.05); }
        
        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .subtitulo { color: var(--azul-escuro); font-size: clamp(0.85rem, 3vw, 1.1rem); font-weight: 500; opacity: 0.8; margin-top: 15px; }
        
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-1ano); transform: translateX(8px); color: white; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }
        
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); margin-top: auto;}
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; }
        }

        /* =========================================
           ÁREA PRINCIPAL E GRELHAS DE JOGOS
           ========================================= */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 30px; width: 100%; box-sizing: border-box; }
        
        /* ZONA SUPERIOR: AS 3 DISCIPLINAS */
        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1000px; width: 100%; }
        
        .cartao-disciplina { 
            flex: 1; min-width: 250px; aspect-ratio: 4/3; border-radius: 25px; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            border: 1px solid #eee; transition: 0.3s; position: relative;
        }
        .cartao-disciplina:hover { transform: translateY(-8px); box-shadow: 0 15px 25px rgba(0,0,0,0.1); }
        
        .c-port { border-top: 8px solid var(--cor-pt); background: linear-gradient(180deg, #ffffff 0%, #fff0f0 100%); }
        .c-mat { border-top: 8px solid var(--cor-mat); background: linear-gradient(180deg, #ffffff 0%, #f0f8ff 100%); }
        .c-estudo { border-top: 8px solid var(--cor-em); background: linear-gradient(180deg, #ffffff 0%, #f0fff4 100%); }

        .icone-wrapper { font-size: 4.5rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 900; font-size: 1.4rem; letter-spacing: 1px;}
        
        /* Etiqueta de Quantidade nos Cartões Grandes */
        .badge-qnt {
            position: absolute; top: 15px; right: 15px;
            background: white; padding: 5px 12px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 800; color: var(--text-main);
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        /* SEPARADOR VISUAL */
        .separador {
            display: flex; align-items: center; text-align: center; width: 100%; max-width: 1000px;
            margin: 10px 0; color: var(--azul-escuro); font-weight: 900; font-size: 1.5rem;
            text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;
        }
        .separador::before, .separador::after {
            content: ''; flex: 1; border-bottom: 3px dashed #ced6e0; margin: 0 20px;
        }

        /* ZONA INFERIOR: JOGOS ALEATÓRIOS (APP STORE STYLE) */
        .grid-jogos-dia {
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px;
        }
        
        .cartao-jogo-dia {
            background: white; aspect-ratio: 1/1; border-radius: 20px; 
            text-decoration: none; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; gap: 10px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s;
            position: relative;
        }
        .cartao-jogo-dia:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .cartao-jogo-dia .icone-wrapper-dia { font-size: 3rem; }
        .cartao-jogo-dia .nome-jogo-dia { color: var(--azul-escuro); font-weight: 700; font-size: 1.05rem; padding: 0 10px; line-height: 1.2;}
        
        /* Cores das Bordas Dinâmicas */
        .borda-pt { border-top: 6px solid var(--cor-pt); }
        .borda-mat { border-top: 6px solid var(--cor-mat); }
        .borda-em { border-top: 6px solid var(--cor-em); }

        @media (max-width: 600px) {
            main { padding: 20px 15px; gap: 20px; }
            .cartao-disciplina { aspect-ratio: 2/1; min-width: 100%; }
            .icone-wrapper { font-size: 3.5rem; }
            .separador { font-size: 1.1rem; margin: 0; }
            .separador::before, .separador::after { margin: 0 10px; }
            .grid-jogos-dia { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .cartao-jogo-dia .icone-wrapper-dia { font-size: 2.5rem; }
            .cartao-jogo-dia .nome-jogo-dia { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../">🏠 Início</a></li>
        <li><a href="../pre/">🎨 Pré-Escolar</a></li>
        <li><a href="">🎒 1º Ano</a></li>
        <li><a href="../2/">💡 2º Ano</a></li>
        <li><a href="../3/">🔍 3º Ano</a></li>
        <li><a href="../4/">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>🎒 1º Ano 🎒</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <!-- ZONA SUPERIOR: DISCIPLINAS FIXAS -->
    <div class="grid-disciplinas">
        <a href="pt/" class="cartao-disciplina c-port">
            <div class="badge-jogos" id="contador-pt">0 Jogos</div>
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="mat/" class="cartao-disciplina c-mat">
            <div class="badge-jogos" id="contador-mat">0 Jogos</div>
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="em/" class="cartao-disciplina c-estudo">
            <div class="badge-jogos" id="contador-em">0 Jogos</div>
            <div class="icone-wrapper">🌍</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>

    <!-- SEPARADOR VISUAL -->
    <div class="separador">Descobre e Joga! 🎲</div>

    <!-- ZONA INFERIOR: JOGOS DO DIA (Gerados via JS) -->
    <div class="grid-jogos-dia" id="jogos-dia-container">
        <!-- Os cartões são injetados aqui -->
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }

    // =========================================================
    // BASE DE DADOS (JOGOS DO DIA)
    // Podes atualizar as hiperligações e adicionar mais jogos
    // =========================================================
    const todosOsJogos =[
        // PORTUGUÊS (cat: pt)
        { nome: "O Meu Teclado", icone: "⌨️", link: "pt/meu-teclado/", cat: "pt" },
        { nome: "Palavra Certa", icone: "👁️", link: "pt/palavra-certa/", cat: "pt" },
        { nome: "Letra em Falta", icone: "🔤", link: "pt/letra-em-falta/", cat: "pt" },
        { nome: "Contar Sílabas", icone: "👏", link: "pt/contar-silabas/", cat: "pt" },
        { nome: "Rimas", icone: "🎶", link: "pt/rimas/", cat: "pt" },
        { nome: "Comboio das Letras", icone: "🚂", link: "pt/comboio-letras/", cat: "pt" },
        { nome: "Código Secreto", icone: "🕵️‍♂️", link: "pt/codigo-secreto/", cat: "pt" },
        { nome: "Sílaba Inicial", icone: "🗣️", link: "pt/primeira-silaba/", cat: "pt" },
        
        // MATEMÁTICA (cat: mat)
        { nome: "Vamos Contar!", icone: "🎲", link: "mat/vamos-contar/", cat: "mat" },
        { nome: "O Detetive", icone: "🕵️‍♂️", link: "mat/detetive/", cat: "mat" },
        { nome: "Camião de Carga", icone: "🚚", link: "mat/camiao-carga/", cat: "mat" },
        { nome: "Sapo Saltitão", icone: "🐸", link: "mat/sapo-saltitao/", cat: "mat" },
        { nome: "Gráficos", icone: "📊", link: "mat/graficos/", cat: "mat" },
        { nome: "Ligar Quant.", icone: "🔗", link: "mat/ligar-quantidades/", cat: "mat" },
        { nome: "O Mealheiro", icone: "🐷", link: "mat/mealheiro/", cat: "mat" },
        
        // ESTUDO DO MEIO (cat: em)
        { nome: "O Meu Corpo", icone: "🧍", link: "em/corpo/", cat: "em" },
        { nome: "Os Ecopontos", icone: "♻️", link: "em/ecopontos/", cat: "em" },
        { nome: "Estações do Ano", icone: "🍂", link: "em/estacoes/", cat: "em" },
        { nome: "Sons da Natureza", icone: "👂", link: "em/sons-natureza/", cat: "em" },
        { nome: "As Profissões", icone: "🧑‍🚒", link: "em/profissoes/", cat: "em" }
    ];

  // =========================================================
    // 1. FUNÇÃO QUE CONTA OS JOGOS AUTOMATICAMENTE
    // =========================================================
    function atualizarContadores() {
        const totalPT = todosOsJogos.filter(jogo => jogo.cat === 'pt').length;
        const totalMAT = todosOsJogos.filter(jogo => jogo.cat === 'mat').length;
        const totalEM = todosOsJogos.filter(jogo => jogo.cat === 'em').length;

        // Atualiza o texto nas etiquetas (tendo a certeza que usaste os IDs corretos no HTML)
        const badgePT = document.getElementById('contador-pt');
        const badgeMAT = document.getElementById('contador-mat');
        const badgeEM = document.getElementById('contador-em');

        if(badgePT) badgePT.textContent = totalPT + " Jogos";
        if(badgeMAT) badgeMAT.textContent = totalMAT + " Jogos";
        if(badgeEM) badgeEM.textContent = totalEM + " Jogos";
    }

    // =========================================================
    // 2. FUNÇÃO QUE GERA OS 6 JOGOS ALEATÓRIOS DO DIA
    // =========================================================
    function gerarJogosDoDia() {
        const container = document.getElementById('jogos-dia-container');
        if (!container) return; // Segurança extra

        container.innerHTML = ''; // Limpa o container
        
        // Baralhar o array inteiro
        const jogosBaralhados = [...todosOsJogos].sort(() => Math.random() - 0.5);
        
        // Selecionar apenas os 6 primeiros
        const jogosSelecionados = jogosBaralhados.slice(0, 6);
        
        jogosSelecionados.forEach(jogo => {
            // Escolher a cor da borda com base na categoria
            let classeBorda = "";
            if(jogo.cat === "pt") classeBorda = "borda-pt";
            else if(jogo.cat === "mat") classeBorda = "borda-mat";
            else if(jogo.cat === "em") classeBorda = "borda-em";

            // Criar o cartão
            const a = document.createElement('a');
            a.href = jogo.link;
            a.className = `cartao-jogo-dia ${classeBorda}`;
            
            a.innerHTML = `
                <div class="icone-wrapper-dia">${jogo.icone}</div>
                <span class="nome-jogo-dia">${jogo.nome}</span>
            `;
            
            container.appendChild(a);
        });
    }

    // =========================================================
    // 3. ARRANQUE: EXECUTA AS DUAS FUNÇÕES QUANDO A PÁGINA ABRE
    // =========================================================
    window.onload = function() {
        atualizarContadores();
        gerarJogosDoDia();
    };

</script>
</body>
</html>
