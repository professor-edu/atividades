<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Ano 🎒</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff;
            --azul-escuro: #0d47a1;
            --bg-header-1ano: #ddecfa; 
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER COM BORDER 1PX CONFORME PEDIDO */
        header {
            background-color: var(--bg-header-1ano);
            padding: 15px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            position: relative;
            flex-shrink: 0;
            z-index: 100; /* Garante que o header fica por cima do conteúdo */
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* DESKTOP: Hamburger à Esquerda e Botão Início ao lado */
        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Alinhado à esquerda no desktop */
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10; /* Garante clique nos botões no desktop */
        }

        /* BOTÃO HAMBURGER COM ANIMAÇÕES FIXADAS */
        .hamburger {
            cursor: pointer;
            background: rgba(255,255,255,0.6);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .hamburger:hover { background: rgba(255,255,255,0.9); }

        .hamburger span { 
            display: block; width: 20px; height: 2px; 
            background: var(--azul-escuro); 
            transition: 0.3s cubic-bezier(0.215, 0.610, 0.355, 1.000); /* Animação mais suave */
            transform-origin: center;
        }
        
        /* Estado Ativo do Hamburger (Transforma em X) */
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* BOTÃO VOLTAR À ESQUERDA */
        .btn-voltar {
            background: var(--azul-vibrante);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #0070c4;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }
        .btn-voltar:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn-voltar:active { transform: translateY(2px); box-shadow: 0 1px 0 #0070c4; }

        /* TÍTULO E SUBTÍTULO */
        h1 { 
            color: var(--azul-escuro); 
            font-size: clamp(1.4rem, 5vw, 2.2rem); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            position: relative; /* z-index automático inferior ao nav-container */
        }
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 3vw, 1rem); 
            font-weight: 500; 
            opacity: 0.8; 
            margin-top: 5px; 
        }

        /* MOBILE: Correção das Animações e Hover usando Grid */
        @media (max-width: 768px) {
            header { padding: 10px; }

            .header-content {
                display: grid;
                /* Cria 3 colunas: Esquerda (hamburger), Centro (Título), Direita (Vazia para equilíbrio) */
                grid-template-columns: 50px 1fr 50px; 
                grid-template-rows: auto auto; /* Linha 1: Botões, Linha 2: Título */
                gap: 10px;
                align-items: center;
            }

            /* Container de navegação flui para o grid */
            .nav-container {
                position: static; /* Remove o absoluto que quebrava o hover */
                transform: none;
                grid-column: 1 / -1; /* Ocupa todas as colunas na linha 1 */
                display: grid;
                grid-template-columns: 50px 1fr 50px; /* Recria a estrutura interna */
                align-items: center;
                justify-items: center; /* Centra o conteúdo de cada célula */
                width: 100%;
            }

            .hamburger {
                grid-column: 1; /* Força o hamburger para a célula da esquerda */
                justify-self: start; /* Alinha à esquerda da célula */
                position: static;
            }

            .btn-voltar {
                grid-column: 2; /* Força o botão para a célula central */
                position: static;
                transform: none;
                width: fit-content;
                /* Removemos o translate mobile anterior que causava conflito */
            }
            .btn-voltar:hover { transform: scale(1.05); } /* Reativa hover limpo */

            /* Título e Subtítulo vão para a linha 2 */
            h1, .subtitulo {
                grid-column: 2; /* Centrados na coluna central */
                margin-top: 0;
            }
            h1 { font-size: 1.6rem; }
            .subtitulo { margin-bottom: 5px; }
        }

        /* SIDEBAR E GRID DE DISCIPLINAS (Mantidos iguais) */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; transition: 0.3s; }
        .sidebar li a:hover { background: #e3f2fd; color: var(--azul-vibrante); transform: translateX(8px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 1000px; width: 100%; }
        .cartao-disciplina { background: white; flex: 0 1 220px; aspect-ratio: 1/1; border-radius: 30px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; transition: 0.3s; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; border-top: 8px solid var(--azul-vibrante); }
        .cartao-disciplina:hover { transform: translateY(-10px) scale(1.02); }
        .icone-wrapper { font-size: 4rem; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.3rem; }
        .c-port { border-top-color: #ff6b6b; } .c-mat { border-top-color: #4dabf7; } .c-estudo { border-top-color: #51cf66; }

        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); flex-shrink: 0; }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }

        @media (max-width: 600px) {
            .grid-disciplinas { gap: 15px; }
            .cartao-disciplina { flex: 0 1 150px; }
            .icone-wrapper { font-size: 3rem; }
            .nome-disciplina { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="../3/index.html">🔍 3º Ano</a></li>
        <li><a href="../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">🏠 Início</a>
        </div>
        
        <h1>🎒 1º Ano 🎒</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🌍</div> <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }
</script>
</body>
</html>
