<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Mágica - Menu de Jogos</title>
    <style>
        :root {
            --azul: #4db6ac;
            --rosa: #ff8aab;
            --amarelo: #ffd54f;
            --roxo: #9575cd;
            --laranja: #ffb74d;
            --bg: #f0f4f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: white;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #37474f;
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
        }

        .icone-principal { width: 60px; height: auto; }

        .container-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .card-jogo {
            background: white;
            border-radius: 35px;
            padding: 40px 20px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-bottom: 10px solid rgba(0,0,0,0.1);
            position: relative;
        }

        .card-jogo:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .icone {
            font-size: 90px;
            margin-bottom: 20px;
        }

        .titulo-jogo {
            font-size: 2rem;
            font-weight: bold;
            color: #455a64;
            margin-bottom: 15px;
        }

        .info-novo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            background: #eee;
            padding: 5px 10px;
            border-radius: 10px;
            color: #888;
        }

        /* Cores Temáticas */
        .escrita { border-top: 20px solid var(--azul); }
        .sopa { border-top: 20px solid var(--rosa); }
        .ditado { border-top: 20px solid var(--amarelo); }
        .silabas { border-top: 20px solid var(--roxo); }
        .falta { border-top: 20px solid var(--laranja); }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container-menu { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Escola Mágica</h1>
    <img src="img/questao.png" alt="Logo" class="icone-principal">
</header>

<div class="container-menu">
    
    <a href="1/copia-frases" target="_blank" class="card-jogo escrita">
       
        <div class="icone">✏️</div>
        <div class="titulo-jogo">Escrita</div>
    </a>

    <a href="1/sopa-letras/index.html" target="_blank" class="card-jogo sopa">
        
        <div class="icone">🔍</div>
        <div class="titulo-jogo">Sopa de Letras</div>
    </a>

    <a href="ditado.html" target="_blank" class="card-jogo ditado">
        <span class="info-novo">Abre em novo separador ↗</span>
        <div class="icone">🎧</div>
        <div class="titulo-jogo">Ditado</div>
    </a>

    <a href="silabas.html" target="_blank" class="card-jogo silabas">
        <span class="info-novo">Abre em novo separador ↗</span>
        <div class="icone">👏</div>
        <div class="titulo-jogo">Sílabas</div>
    </a>

    <a href="qualfalta.html" target="_blank" class="card-jogo falta">
        <span class="info-novo">Abre em novo separador ↗</span>
        <div class="icone">🧐</div>
        <div class="titulo-jogo">Qual Falta?</div>
    </a>

</div>

</body>
</html>
