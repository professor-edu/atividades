<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Copiar Frases ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">
    
    <style>
        body{margin:0;font-family:Arial,sans-serif;background:#f2f7ff;text-align:center;display:flex;flex-direction:column;min-height:100vh;}
        
        /* Header com Menu */
        header{
            padding: 25px;
            background: linear-gradient(to bottom,#bde6ff,#e8f7ff);
            border-bottom: 4px solid #7ac7f0;
            position: relative;
        }

        .btn-menu {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.4);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease;
            text-decoration: none;
        }
        .btn-menu:hover { transform: translateY(-50%) scale(1.05); }

        h1{font-size:2.8rem;color:#155a8a;margin:0;}
        .main-img{width:180px;margin-top:10px;}

        .letters-grid{max-width:900px;margin:40px auto;display:grid;grid-template-columns:repeat(7,1fr);gap:25px;flex-grow:1;}
        .letter-card{background:white;padding:20px;border-radius:12px;box-shadow:0 3px 8px rgba(0,0,0,0.20);font-size:3rem;color:#155a8a;font-weight:bold;cursor:pointer;transition:transform .15s;text-decoration:none;}
        .letter-card:hover{transform:scale(1.05);}

        /* Footer Oficial */
        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            border-top: 1px solid #ddd;
            background: #fff;
        }

        @media (max-width: 800px) {
            .btn-menu { position: static; transform: none; margin: 0 auto 15px; width: fit-content; }
            .btn-menu:hover { transform: scale(1.05); }
            .letters-grid { grid-template-columns: repeat(4, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <button class="btn-menu" onclick="window.location.href='../index.html'">
        <span>🏠</span> MENU
    </button>
    <h1>Copiar Frases</h1>
    <img class="main-img" src="copiar-frases.png">
</header>

<div class="letters-grid">
    <a class="letter-card" href="letra.html?letra=P">P</a>
    <a class="letter-card" href="letra.html?letra=T">T</a>
    <a class="letter-card" href="letra.html?letra=L">L</a>
    <a class="letter-card" href="letra.html?letra=D">D</a>
    <a class="letter-card" href="letra.html?letra=M">M</a>
    <a class="letter-card" href="letra.html?letra=V">V</a>
    <a class="letter-card" href="letra.html?letra=N">N</a>
    <a class="letter-card" href="letra.html?letra=R">R</a>
    <a class="letter-card" href="letra.html?letra=C">C</a>
    <a class="letter-card" href="letra.html?letra=Q">Q</a>
    <a class="letter-card" href="letra.html?letra=B">B</a>
    <a class="letter-card" href="letra.html?letra=G">G</a>
    <a class="letter-card" href="letra.html?letra=J">J</a>
    <a class="letter-card" href="letra.html?letra=F">F</a>
    <a class="letter-card" href="letra.html?letra=S">S</a>
    <a class="letter-card" href="letra.html?letra=Z">Z</a>
    <a class="letter-card" href="letra.html?letra=H">H</a>
    <a class="letter-card" href="letra.html?letra=X">X</a>
    <a class="letter-card" href="letra.html?letra=K">K</a>
    <a class="letter-card" href="letra.html?letra=W">W</a>
    <a class="letter-card" href="letra.html?letra=Y">Y</a>
</div>

<footer>
    <p style="margin: 0; color: #0d47a1; font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
</script>

</body>
</html>
