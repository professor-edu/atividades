<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Copiar Frases ⭐</title>
    <link rel="icon" type="image/png" href="../logo.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f7ff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Cabeçalho --- */
        header {
            width: 100%;
            padding: 15px 0;
            background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
            border-bottom: 4px solid #7ac7f0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            position: absolute;
            left: 15px;
        }

        .btn-nav {
            background: #ff9800;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.8rem;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .btn-nav:hover { transform: scale(1.05); }

        header img { width: 80px; }

        header .letter-box {
            padding: 10px 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #155a8a;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.15);
        }

        /* --- Conteúdo --- */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            flex-grow: 1;
            width: 90%;
        }

        .progress {
            margin: 10px auto 20px;
            width: 100%;
            background: #cfe0ff;
            height: 12px;
            border-radius: 10px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            background: #4c8bff;
            transition: width .4s;
        }

        .sentence-box {
            background: linear-gradient(to bottom, #e8f7ff, #bde6ff);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }

        .sentence-text { font-size: 20px; margin-bottom: 12px; font-weight: bold; color: #155a8a; }

        .sentence-input {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid #bbbbbb;
            box-sizing: border-box;
            outline: none;
            background: white;
            transition: all 0.2s;
        }

        /* Feedbacks Visuais */
        .correct { background: #e6ffe6 !important; border-color: #2ecc71 !important; }
        .wrong { background: #ffe8e8 !important; border-color: #ff6b6b !important; }

        #final-btn {
            background: #4caf50;
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            display: none;
            margin: 20px auto;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
            background: #fff;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .nav-buttons { position: static; width: 100%; justify-content: center; order: -1; }
            header { padding: 10px; }
            .sentence-text { font-size: 18px; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-buttons">
        <a href="../index.html" class="btn-nav">🏠 MENU</a>
        <a href="index.html" class="btn-nav">🔤 LETRAS</a>
    </div>
    <img id="header-img" src="" alt="emoji">
    <div class="letter-box" id="header-letter"></div>
</header>

<div class="container">
    <div class="progress">
        <div id="progress-bar" class="progress-bar"></div>
    </div>

    <div id="game-area">
        <h2 id="page-title" style="text-align:center; color:#155a8a;"></h2>
        <div id="sentences-container"></div>
    </div>

    <div id="final-screen" style="display:none; text-align:center; padding: 40px 0;">
        <h1>🎉 Parabéns! 👍</h1>
        <p id="final-msg">Completaste todas as frases desta letra!</p>
        <img src="https://openmoji.org/data/color/svg/1F3C6.svg" style="width:120px;">
        <br><br>
    </div>
    
    <div style="text-align: center;">
        <a id="final-btn" href="#">Avançar para a letra ...</a>
    </div>
</div>

<footer>
    <p style="margin: 0; color: #0d47a1; font-weight: 700; font-size: 0.8rem;">
        <span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script>
const imageFor = {
    "P": "https://openmoji.org/data/color/svg/1F986.svg", "T": "https://openmoji.org/data/color/svg/1F578.svg",
    "L": "https://openmoji.org/data/color/svg/1F319.svg", "D": "https://openmoji.org/data/color/svg/1F3B2.svg",
    "M": "https://openmoji.org/data/color/svg/1F412.svg", "V": "https://openmoji.org/data/color/svg/1F404.svg",
    "N": "https://openmoji.org/data/color/svg/2601.svg", "R": "https://openmoji.org/data/color/svg/1F42D.svg",
    "C": "https://openmoji.org/data/color/svg/1F415.svg", "Q": "https://openmoji.org/data/color/svg/1F95D.svg",
    "B": "https://openmoji.org/data/color/svg/26BD.svg", "G": "https://openmoji.org/data/color/svg/1F408.svg",
    "J": "https://openmoji.org/data/color/svg/1FA9F.svg", "F": "https://openmoji.org/data/color/svg/1F9DA.svg",
    "S": "https://openmoji.org/data/color/svg/1F438.svg", "Z": "https://openmoji.org/data/color/svg/1F993.svg",
    "H": "https://openmoji.org/data/color/svg/1F99B.svg", "X": "https://openmoji.org/data/color/svg/1F4AE.svg", 
    "K": "https://openmoji.org/data/color/svg/1F3CE.svg", "W": "https://openmoji.org/data/color/svg/1F310.svg",
    "Y": "https://openmoji.org/data/color/svg/1F9D8.svg"
};

const pages = [
    {letter:"P",sentences:["O pai papa o pão.","É o Pepe e o pau.","É o pote e o pai."]},
    {letter:"T",sentences:["É o tapete e o Tó.","A tia tapa o pote.","É o tapete e o tio."]},
    {letter:"L",sentences:["É a Lili e o leite.","O Paulo pula.","É a lula e a lua."]},
    {letter:"D",sentences:["O dedo da Dalila dói muito.","A dália é da Didi.","É dia de ditado."]},
    {letter:"M",sentences:["A mãe mede a mala.","É a mala e a moeda da Mimi.","A Milu deu o mapa à Ema."]},
    {letter:"V",sentences:["A Violeta vê a vela.","O avô leva o vitelo até à vila.","A vaca teve medo do leão."]},
    {letter:"N",sentences:["A Nena é a neta do avô Nuno.","O Nito dá a nota ao Paulo.","A Diana nada muito."]},
    {letter:"R",sentences:["O Rui roda a roda do carro.","A Rita vê o ramo.","O rato roeu a rede e a roupa toda."]},
    {letter:"C",sentences:["A Cátia come a comida.","O cão vê o camião e corre na rua.","O Caio colou o copo."]},
    {letter:"Q",sentences:["O Quico comeu um quivi no piquenique.","A Quina queima o papel.","O Aquilino é do Quénia."]},
    {letter:"B",sentences:["O Beto bebe água.","A Bela dá a boneca à Bárbara.","O bolo é de banana."]},
    {letter:"G",sentences:["O Gugu come o gelado.","A Gabi cuida do gato.","O cágado vive na água do lago."]},
    {letter:"J",sentences:["A Júlia joga à bola.","O João leva areia no jipe.","A Joana vai ao judo."]},
    {letter:"F",sentences:["A faca é da Fátima.","O Filipe teve fome e comeu o figo.","A fada Fifó fala."]},
    {letter:"S",sentences:["A Sara sapateia na sala.","O Simão salta no sofá.","A Sofia vai no passeio."]},
    {letter:"Z",sentences:["A zebra zune no zoo.","O búzio é do Zeca.","A baliza é azul."]},
    {letter:"H",sentences:["O Hugo há-de voltar.","Na horta há hortelã.","A Helena humedece o pano."]},
    {letter:"X",sentences:["O Xico toca xilofone.","A Xana come o peixe.","O Aleixo toca xilofone no xalé."]},
    {letter:"K",sentences:["A Filipa vê o karaté na TV.","A Kika faz kung-fu.","A Kiara vai ao kart."]},
    {letter:"W",sentences:["A Wanda vê a webcam.","O Wilson come waffles.","O wifi da sala é muito rápido."]},
    {letter:"Y",sentences:["O Yuri faz yoga.","A Yara come iogurte.","É o Yuki e a Yara."]}
];

let pageIndex = 0;
const urlParams = new URLSearchParams(window.location.search);
const letraEscolhida = urlParams.get("letra");

if (letraEscolhida) {
    const pos = pages.findIndex(p => p.letter.toUpperCase() === letraEscolhida.toUpperCase());
    if (pos !== -1) { pageIndex = pos; }
}

function loadPage() {
    const page = pages[pageIndex];
    document.getElementById("header-img").src = imageFor[page.letter];
    document.getElementById("header-letter").textContent = page.letter.toLowerCase() + " - " + page.letter;
    document.getElementById("page-title").textContent = "Letra " + page.letter;

    const container = document.getElementById("sentences-container");
    container.innerHTML = "";
    page.sentences.forEach((txt, i) => {
        const div = document.createElement("div");
        div.className = "sentence-box";
        div.innerHTML = `
            <div class="sentence-text">${txt}</div>
            <input id="inp${i}" class="sentence-input" placeholder="" oninput="checkSentence(this, '${txt.replace(/'/g, "\\'")}')">
        `;
        container.appendChild(div);
    });
    document.getElementById("final-btn").style.display = "none";
    updateProgress();
}

// LOGICA DE FEEDBACK CORRIGIDA
function checkSentence(input, correct) {
    const val = input.value; // Valor que o aluno está a escrever

    if (val === "") {
        input.classList.remove("correct", "wrong");
    } else if (val === correct) {
        // Frase totalmente correta
        input.classList.remove("wrong");
        input.classList.add("correct");
    } else if (correct.startsWith(val)) {
        // Está no caminho certo, mas ainda não terminou
        input.classList.remove("correct", "wrong");
    } else {
        // Errou alguma letra
        input.classList.remove("correct");
        input.classList.add("wrong");
    }
    
    checkPageComplete();
}

function checkPageComplete() {
    const inputs = document.querySelectorAll(".sentence-input");
    const allCorrect = Array.from(inputs).every(inp => inp.classList.contains("correct"));
    if (allCorrect) {
        showFinalOptions();
    }
}

function showFinalOptions() {
    document.getElementById("game-area").style.display = "none";
    document.getElementById("final-screen").style.display = "block";
    const btnNext = document.getElementById("final-btn");
    
    if (pageIndex < pages.length - 1) {
        const proximaLetra = pages[pageIndex + 1].letter;
        btnNext.textContent = "Avançar para a letra " + proximaLetra + " ➔";
        btnNext.href = "letra.html?letra=" + proximaLetra;
    } else {
        btnNext.textContent = "🏆 Terminar Desafio";
        btnNext.href = "index.html";
    }
    btnNext.style.display = "inline-block";
}

function updateProgress() {
    const percent = ((pageIndex + 1) / pages.length) * 100;
    document.getElementById("progress-bar").style.width = percent + "%";
}

document.getElementById('ano-atual').innerText = new Date().getFullYear();
window.onload = loadPage;
</script>

</body>
</html>
