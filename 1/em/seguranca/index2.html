<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1º Ano - Caminho Seguro 🏫</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; 
            --bg-header: #e3f2fd;    
            --text-main: #455a64;
            
            /* Cores do Medidor de Segurança */
            --cor-perigo: #ff4757; /* Vermelho - Perigo */
            --cor-seguro: #2ed573; /* Verde - Seguro */
            --cor-alerta: #ffa502; /* Laranja - Alerta */
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background: var(--bg-body); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Contentor do Jogo */
        .game-container { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 800px; 
        }

        /* Cabeçalho */
        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .game-header h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 24px;
        }

        /* Área do Cenário (A Rua) */
        .cenario-window {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            background-color: #95a5a6; /* Cor de asfalto */
            transition: background 0.5s;
            border: 4px solid #bdc3c7;
        }

        /* Passadeira desenhada em CSS */
        .cenario-window::after {
            content: "";
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 50px;
            background-image: linear-gradient(90deg, #fff 50%, transparent 50%);
            background-size: 60px 100%;
            opacity: 0.8;
        }

        /* Passeio onde o Leo começa */
        .passeio {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20px;
            background-color: #7f8c8d;
            z-index: 5;
        }

        /* Efeitos de Clima / Trânsito */
        #clima-fx {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            font-size: 30px;
        }

        /* Personagem (Leo) e Poste */
        .boneco-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 250px;
            z-index: 20;
        }

        .base-leo {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 100px;
            height: 150px;
            background-color: #ddd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #555;
            text-align: center;
            border: 2px dashed #999;
        }

        .poste-vazio {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 15px;
            height: 180px;
            background: #2c3e50;
            border-radius: 5px 5px 0 0;
            z-index: 15;
        }

        /* Slots para as imagens dinâmicas */
        .item-equipado {
            position: absolute;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0);
        }

        .item-equipado.ativo {
            opacity: 1;
            transform: scale(1);
        }

        /* Tamanhos e posições dos slots */
        #slot-leo { width: 120px; height: 160px; bottom: 0; left: 10px; z-index: 21; }
        #slot-poste { width: 80px; height: 80px; top: -10px; left: -32px; z-index: 16; }

        /* Interface: Painel de Controlo */
        .ui-panel {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Medidor de Segurança */
        .status-card {
            flex: 1;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            min-width: 250px;
            border: 2px solid #e9ecef;
        }

        .medidor-bar {
            height: 25px;
            background: #ddd;
            border-radius: 15px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
        }

        .medidor-fill {
            height: 100%;
            width: 50%;
            background: var(--cor-perigo);
            border-radius: 15px;
            transition: all 0.5s ease;
        }

        .medidor-marcador {
            position: absolute;
            top: 0; left: 50%;
            width: 4px; height: 100%;
            background: rgba(0,0,0,0.3);
            transform: translateX(-50%);
        }

        .emoji-status { font-size: 40px; margin-top: 10px; transition: transform 0.3s; }

        /* Armário de Sinais */
        .armario-card {
            flex: 2;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            min-width: 300px;
            border: 2px solid #e9ecef;
        }

        .categorias-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #e9ecef;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-main);
        }

        .tab-btn.ativo { background: var(--azul-vibrante); color: white; }

        .itens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .item-btn {
            background: white;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .item-btn:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .item-btn.selecionado { border-color: var(--azul-vibrante); background: #e3f2fd; }
        .item-btn img { width: 40px; height: 40px; object-fit: contain; }
        .item-btn span { font-size: 12px; font-weight: 500; color: #555; }

        /* Botão Final */
        .btn-confirmar {
            width: 100%;
            padding: 15px;
            background: var(--cor-seguro);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-confirmar.pronto {
            opacity: 1;
            pointer-events: auto;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 0 15px rgba(46, 213, 115, 0.6); }
            100% { transform: scale(1); }
        }

        /* Confetis */
        #canvas-confetti {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <h2>🚦 Caminho Seguro para a Escola</h2>
            <p id="fase-desc">Fase 1: Ajuda o Leo a atravessar a rua!</p>
        </div>

        <div class="cenario-window" id="cenario-bg">
            <div id="clima-fx"></div>
            
            <div class="boneco-container">
                <div class="base-leo">O LEO<br>(Aqui)</div>
                <div id="slot-leo" class="item-equipado"></div>
                
                <div class="poste-vazio">
                    <div id="slot-poste" class="item-equipado"></div>
                </div>
            </div>
            
            <div class="passeio"></div>
        </div>

        <div class="ui-panel">
            <div class="status-card">
                <h3>Medidor de Segurança</h3>
                <div class="medidor-bar">
                    <div class="medidor-fill" id="barra-seguranca"></div>
                    <div class="medidor-marcador"></div>
                </div>
                <div class="emoji-status" id="emoji-seguranca">🚗</div>
                <p id="texto-seguranca" style="font-weight: bold; color: var(--cor-perigo);">Muito Perigoso!</p>
            </div>

            <div class="armario-card">
                <div class="categorias-tabs">
                    <button class="tab-btn ativo" onclick="mudarCategoria('poste')">Sinais (Poste)</button>
                    <button class="tab-btn" onclick="mudarCategoria('leo')">Ações (Leo)</button>
                </div>
                <div class="itens-grid" id="grid-itens">
                    </div>
            </div>
        </div>

        <button class="btn-confirmar" id="btn-atravessar" onclick="sucesso()">
            <span>Atravessar em Segurança!</span> ✨
        </button>
    </div>

    <canvas id="canvas-confetti"></canvas>

    <script>
        // ==========================================
        // DADOS DO JOGO
        // ==========================================
        
        // As situações (fases) que o aluno tem de resolver
        const situacoes = [
            { id: "transito", nome: "Rua com Muito Trânsito!", segurancaBase: -2, bgCor: "#7f8c8d", fx: "🚗" },
            { id: "passadeira_simples", nome: "Passadeira sem Sinais", segurancaBase: -1, bgCor: "#95a5a6", fx: "🚶‍♂️" }
        ];

        let faseAtual = 0;

        // O nosso "Guarda-Roupa" agora são Ferramentas de Trânsito
        // Nota: Deves garantir que crias estas imagens na pasta 'img/'
        const ferramentasTransito = [
            // Sinais para o Poste
            { id: "sinal_verde", nome: "Semáforo Verde", img: "img/sinal_verde.svg", slot: "poste", seguranca: 1 },
            { id: "sinal_vermelho", nome: "Semáforo Vermelho", img: "img/sinal_vermelho.svg", slot: "poste", seguranca: -1 },
            { id: "sinal_stop", nome: "Sinal de STOP", img: "img/sinal_stop.svg", slot: "poste", seguranca: 2 },
            
            // Ações para o Leo
            { id: "parar", nome: "Parar e Olhar", img: "img/leo_parar.png", slot: "leo", seguranca: 1 },
            { id: "correr", nome: "Correr à toa", img: "img/leo_correr.png", slot: "leo", seguranca: -2 }
        ];

        // Estado atual dos slots
        let equipados = {
            poste: null,
            leo: null
        };

        // ==========================================
        // LÓGICA PRINCIPAL
        // ==========================================

        function iniciarFase() {
            const situacao = situacoes[faseAtual];
            document.getElementById("fase-desc").innerText = `Fase ${faseAtual + 1}: ${situacao.nome}`;
            document.getElementById("cenario-bg").style.backgroundColor = situacao.bgCor;
            
            // Limpa as escolhas
            equipados.poste = null;
            equipados.leo = null;
            document.getElementById("slot-poste").classList.remove("ativo");
            document.getElementById("slot-leo").classList.remove("ativo");

            iniciarClima(situacao.fx);
            renderizarArmario("poste"); // Começa a mostrar os sinais do poste
            atualizarMedidor();
        }

        function mudarCategoria(categoria) {
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("ativo"));
            event.target.classList.add("ativo");
            renderizarArmario(categoria);
        }

        function renderizarArmario(categoria) {
            const grid = document.getElementById("grid-itens");
            grid.innerHTML = "";

            const itensFiltrados = ferramentasTransito.filter(item => item.slot === categoria);

            itensFiltrados.forEach(item => {
                const btn = document.createElement("button");
                btn.className = `item-btn ${equipados[categoria] === item.id ? 'selecionado' : ''}`;
                // Se não tiveres as imagens, ele mostra um texto alternativo
                btn.innerHTML = `
                    <img src="${item.img}" alt="${item.nome}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span style="display:none; font-size:24px;">📦</span>
                    <span>${item.nome}</span>
                `;
                btn.onclick = () => alternarItem(item);
                grid.appendChild(btn);
            });
        }

        function alternarItem(item) {
            const slotAtivo = equipados[item.slot];
            
            if (slotAtivo === item.id) {
                // Desequipar
                equipados[item.slot] = null;
                document.getElementById(`slot-${item.slot}`).classList.remove("ativo");
            } else {
                // Equipar
                equipados[item.slot] = item.id;
                const divSlot = document.getElementById(`slot-${item.slot}`);
                divSlot.style.backgroundImage = `url('${item.img}')`;
                divSlot.classList.add("ativo");
            }

            renderizarArmario(item.slot); // Atualiza os botões (borda azul)
            atualizarMedidor();
        }

        function atualizarMedidor() {
            const situacao = situacoes[faseAtual];
            let segurancaTotal = situacao.segurancaBase;

            // Soma a segurança dos itens equipados
            Object.values(equipados).forEach(idItem => {
                if (idItem) {
                    const item = ferramentasTransito.find(i => i.id === idItem);
                    segurancaTotal += item.seguranca;
                }
            });

            // Lógica Visual da Barra
            const barra = document.getElementById("barra-seguranca");
            const emoji = document.getElementById("emoji-seguranca");
            const texto = document.getElementById("texto-seguranca");
            const btnAtravessar = document.getElementById("btn-atravessar");

            // Converter a escala (-2 a +2) para percentagem da barra (0% a 100%)
            // -2 = 10% (Perigo), 0 = 50% (Equilíbrio/Seguro), +2 = 90%
            let percentagem = 50 + (segurancaTotal * 20);
            if (percentagem < 5) percentagem = 5;
            if (percentagem > 95) percentagem = 95;
            
            barra.style.width = `${percentagem}%`;

            if (segurancaTotal < 0) {
                barra.style.backgroundColor = "var(--cor-perigo)";
                emoji.innerText = "🚗💨";
                texto.innerText = "Perigo! Não atravesses!";
                texto.style.color = "var(--cor-perigo)";
                btnAtravessar.classList.remove("pronto");
                
            } else if (segurancaTotal === 0 || segurancaTotal === 1) {
                barra.style.backgroundColor = "var(--cor-seguro)";
                emoji.innerText = "✅😊";
                texto.innerText = "Caminho Seguro!";
                texto.style.color = "var(--cor-seguro)";
                btnAtravessar.classList.add("pronto"); // ATIVA O BOTÃO
                
            } else {
                barra.style.backgroundColor = "var(--cor-alerta)";
                emoji.innerText = "🛑";
                texto.innerText = "Demasiado parado...";
                texto.style.color = "var(--cor-alerta)";
                btnAtravessar.classList.remove("pronto");
            }
        }

        // ==========================================
        // ANIMAÇÕES (Clima/Trânsito e Confetis)
        // ==========================================
        
        function iniciarClima(emoji) {
            const container = document.getElementById('clima-fx');
            container.innerHTML = '';
            
            // Cria elementos que passam da esquerda para a direita (como carros)
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.innerText = emoji;
                    el.style.position = 'absolute';
                    el.style.left = '-50px';
                    // Posição aleatória na estrada (parte inferior do cenário)
                    el.style.top = `${Math.random() * 40 + 50}%`; 
                    el.style.transition = `left ${Math.random() * 3 + 2}s linear`;
                    container.appendChild(el);
                    
                    // Animação de repetição
                    setInterval(() => {
                        el.style.transition = 'none';
                        el.style.left = '-50px';
                        setTimeout(() => {
                            el.style.transition = `left ${Math.random() * 3 + 2}s linear`;
                            el.style.left = '110%';
                        }, 50);
                    }, 4000);

                }, i * 800);
            }
        }

        // Sistema de Confetis (reaproveitado do teu código)
        const canvasConfetti = document.getElementById('canvas-confetti');
        const ctxConfetti = canvasConfetti.getContext('2d');
        let confetis = [];

        function redimensionarCanvas() { canvasConfetti.width = window.innerWidth; canvasConfetti.height = window.innerHeight; }
        window.addEventListener('resize', redimensionarCanvas);

        function sucesso() {
            dispararConfetis();
            setTimeout(() => {
                alert("Parabéns! O Leo atravessou em segurança. Vamos para a próxima fase!");
                faseAtual = (faseAtual + 1) % situacoes.length;
                iniciarFase();
            }, 2000);
        }

        function dispararConfetis() {
            redimensionarCanvas(); 
            confetis = []; 
            const cores = ['#0091ff', '#2ed573', '#ff4757', '#ffa502', '#eccc68'];
            for (let i = 0; i < 100; i++) {
                confetis.push({ 
                    x: Math.random() * canvasConfetti.width, 
                    y: Math.random() * canvasConfetti.height - canvasConfetti.height, 
                    w: Math.random() * 10 + 5, h: Math.random() * 10 + 5, 
                    cor: cores[Math.floor(Math.random() * cores.length)], 
                    velY: Math.random() * 3 + 2, velX: Math.random() * 2 - 1, 
                    rotacao: Math.random() * 360, velRotacao: Math.random() * 5 - 2.5 
                });
            }
            animarConfetis();
        }

        function animarConfetis() {
            ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height); 
            let ativos = false;
            confetis.forEach(c => {
                c.y += c.velY; c.x += c.velX; c.rotacao += c.velRotacao; 
                if (c.y < canvasConfetti.height) ativos = true;
                
                ctxConfetti.save();
                ctxConfetti.translate(c.x, c.y);
                ctxConfetti.rotate(c.rotacao * Math.PI / 180);
                ctxConfetti.fillStyle = c.cor;
                ctxConfetti.fillRect(-c.w/2, -c.h/2, c.w, c.h);
                ctxConfetti.restore();
            });
            if (ativos) requestAnimationFrame(animarConfetis);
            else ctxConfetti.clearRect(0, 0, canvasConfetti.width, canvasConfetti.height);
        }

        // Iniciar o jogo quando a página carrega
        window.onload = iniciarFase;

    </script>
</body>
</html>
