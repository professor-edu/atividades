<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👏 Quantas Sílabas? 👏</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        /* CONFIGURAÇÃO PARA POSICIONAR O FOOTER */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ocupa a altura total da janela */
        }
        
        /* CABEÇALHO PADRÃO OFICIAL */
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 15px 20px; 
            color: var(--azul-escuro); 
            border-bottom: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left, .header-right { flex: 1; display: flex; justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex: 2;
        }

        .icone-cabecalho { width: 100px; height: auto; }

        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            font-size: 1rem;
        }

        /* CONTEÚDO PRINCIPAL */
        #jogo-container-wrapper {
            flex-grow: 1; /* Faz esta parte ocupar o espaço disponível, empurrando o footer */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 30px;
        }

        .cartao {
            background: white; width: 95%; max-width: 500px;
            margin: 30px auto; padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            min-height: 450px;
        }

        .imagem-pergunta {
            height: 180px; width: 180px; object-fit: contain;
            border: 4px solid var(--azul-claro); border-radius: 20px; padding: 10px;
        }

        .pergunta-texto { font-size: 22px; font-weight: bold; color: var(--azul-escuro); margin: 10px 0; }
        .container-numeros { display: flex; gap: 15px; justify-content: center; margin-top: 10px; }
        
        .btn-numero {
            width: 70px; height: 70px;
            font-size: 30px; font-weight: bold;
            background: white; border: 3px solid var(--azul-medio);
            color: var(--azul-medio); border-radius: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .btn-numero:hover { transform: translateY(-5px); background: var(--azul-claro); }
        .btn-numero.correto { background: var(--verde) !important; color: white !important; border-color: var(--verde) !important; }
        .btn-numero.errado { background: var(--vermelho) !important; color: white !important; border-color: var(--vermelho) !important; }

        #feedback { min-height: 60px; font-size: 24px; font-weight: bold; margin-top: 20px; }
        #silabas-reveladas { font-size: 32px; letter-spacing: 5px; color: var(--laranja); margin-top: 10px; font-weight: bold; }
        .estrelas { font-size: 20px; color: #f57c00; font-weight: bold; margin-top: 10px; }

        /* FOOTER PADRÃO OFICIAL */
        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            background: #fff;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header class="cabecalho">
     <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">🏠 Menu</button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="palmas.png" class="icone-cabecalho"> 
        <h1 style="margin:0">Quantas Sílabas?</h1>
    </div>
    <div class="header-right"></div>
</header>

<div id="jogo-container-wrapper">
    <div class="estrelas">⭐ Estrelas: <span id="contador-estrelas">0</span></div>

    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="">
        <div class="pergunta-wrapper" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <div class="pergunta-texto">Quantas vezes bates as palmas?</div>
            <img src="https://openmoji.org/data/color/svg/1F44F.svg" style="height: 1.2em; width: auto;">
        </div>
        <div class="container-numeros">
            <button class="btn-numero" onclick="verificar(1, this)">1</button>
            <button class="btn-numero" onclick="verificar(2, this)">2</button>
            <button class="btn-numero" onclick="verificar(3, this)">3</button>
            <button class="btn-numero" onclick="verificar(4, this)">4</button>
        </div>
        <div id="feedback"></div>
        <div id="silabas-reveladas"></div>
    </div>
</div>

<footer>
    <p style="margin: 0; font-family: Arial, sans-serif;">
        <span style="color: #0d47a1; font-weight: bold;">2026</span> 🏫 
        <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: #0d47a1; text-decoration: none; font-weight: bold;">
            EB1/PE da Marinheira
        </a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let estrelas = 0;
    let podeClicar = true;
    let listaJogo = [...palavras].sort(() => 0.5 - Math.random());

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        podeClicar = true;
        const item = listaJogo[indiceAtual];
        document.getElementById('img-pergunta').src = item.imagem; 
        document.getElementById('feedback').innerHTML = "";
        document.getElementById('silabas-reveladas').innerHTML = "";
        document.querySelectorAll('.btn-numero').forEach(btn => btn.className = 'btn-numero');
    }

    function verificar(escolha, btnCuidado) {
        if (!podeClicar) return;
        const item = listaJogo[indiceAtual];
        const correta = item.num;
        const botoes = document.querySelectorAll('.btn-numero');
        podeClicar = false;

        if (escolha === correta) {
            estrelas++;
            document.getElementById('contador-estrelas').innerText = estrelas;
            btnCuidado.classList.add('correto');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Muito bem! ✨</span>";
            document.getElementById('silabas-reveladas').innerText = item.divisao || item.palavra.toUpperCase();
            setTimeout(proxima, 2000);
        } else {
            btnCuidado.classList.add('errado');
            botoes[correta - 1].classList.add('correto');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Ups! Eram " + correta + " sílabas.</span>";
            document.getElementById('silabas-reveladas').innerText = item.divisao || item.palavra.toUpperCase();
            setTimeout(proxima, 3000);
        }
    }

    function proxima() { indiceAtual++; carregarPergunta(); }

    function finalizarJogo() {
        document.getElementById('jogo-container').innerHTML = `
            <h2>🏆 Jogo Terminado!</h2>
            <p style="font-size: 24px;">Conseguiste <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; cursor: pointer; background: var(--azul-escuro); color: white; border: none; font-weight: bold; font-size: 18px; margin-top: 20px;">Jogar de Novo</button>
        `;
    }

    window.onload = carregarPergunta;
</script>
<script src="js/componentes.js"></script>
</body>
</html>
