<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👏 Quantas Sílabas? 👏</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
            --vermelho: #e53935;
        }

        /* 1. LAYOUT BASE E FOOTER SEMPRE EM BAIXO */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* 2. CABEÇALHO COM ALINHAMENTO VERTICAL E CONTRASTE */
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 10px 20px; 
            color: var(--azul-escuro); 
            display: flex;
            align-items: center; 
            justify-content: space-between;
            border-bottom: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex: 2;
        }

        .icone-cabecalho { width: 80px; height: auto; }

        /* 3. MENU - SÓ ANIMA NO HOVER (SEM PISCAR) */
        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s ease;
        }

        .btn-menu span { font-size: 1.6rem; } /* Casa Maior */

        .btn-menu:hover {
            transform: scale(1.1);
        }

        /* 4. CONTEÚDO DO JOGO */
        #main-content { flex-grow: 1; padding: 20px; }

        .cartao {
            background: white; width: 95%; max-width: 500px;
            margin: 10px auto; padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            min-height: 450px;
        }

        .imagem-pergunta {
            height: 180px; width: 180px; object-fit: contain;
            border: 4px solid var(--azul-claro); border-radius: 20px; padding: 10px;
            display: block;
        }

        .btn-numero {
            width: 70px; height: 70px;
            font-size: 30px; font-weight: bold;
            background: white; border: 3px solid var(--azul-medio);
            color: var(--azul-medio); border-radius: 15px;
            cursor: pointer; transition: all 0.2s;
        }

        .btn-numero:hover { transform: translateY(-5px); background: var(--azul-claro); }
        .btn-numero.correto { background: var(--verde) !important; color: white !important; border-color: var(--verde) !important; }
        .btn-numero.errado { background: var(--vermelho) !important; color: white !important; border-color: var(--vermelho) !important; }

        .estrelas { font-size: 22px; color: #f57c00; font-weight: bold; padding: 10px; }

        /* 5. FOOTER COM ALTURA SEMPRE IGUAL */
        footer {
            margin-top: auto;
            min-height: 80px; /* Altura fixa garantida */
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-top: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
        }

        /* 6. RESPONSIVIDADE (TELEMÓVEIS) */
        @media (max-width: 600px) {
            .cabecalho { padding: 8px 12px; }
            .icone-cabecalho { width: 50px; }
            h1 { font-size: 1.1rem; }
            .btn-menu { padding: 6px 12px; font-size: 0.9rem; }
            .btn-menu span { font-size: 1.2rem; }
            .cartao { width: 90%; padding: 15px; min-height: 400px; }
            .imagem-pergunta { width: 140px; height: 140px; }
            .btn-numero { width: 55px; height: 55px; font-size: 22px; }
            #silabas-reveladas { font-size: 26px; }
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='../index.html'">
            <span>🏠</span> Menu
        </button>
    </div>
    <div class="cabecalho-conteudo">
        <img src="palmas.png" class="icone-cabecalho" alt="palmas"> 
        <h1 style="margin:0">Quantas Sílabas?</h1>
    </div>
    <div class="header-right"></div>
</header>

<div class="estrelas">⭐ Estrelas: <span id="contador-estrelas">0</span></div>

<main id="main-content">
    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="">
        
        <div style="font-size: 20px; font-weight: bold; color: var(--azul-escuro);">
            Quantas vezes bates as palmas? 👏
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn-numero" onclick="verificar(1, this)">1</button>
            <button class="btn-numero" onclick="verificar(2, this)">2</button>
            <button class="btn-numero" onclick="verificar(3, this)">3</button>
            <button class="btn-numero" onclick="verificar(4, this)">4</button>
        </div>

        <div id="feedback" style="min-height: 30px; font-weight: bold; font-size: 22px;"></div>
        <div id="silabas-reveladas" style="font-weight: bold; color: var(--laranja);"></div>
    </div>
</main>

<footer>
    <p style="margin: 0; color: var(--azul-escuro); font-weight: bold;">
        2026 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: inherit; text-decoration: none;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    let indiceAtual = 0;
    let estrelas = 0;
    let podeClicar = true;
    let listaJogo = [...palavras].sort(() => 0.5 - Math.random());

    function carregarPergunta() {
        if (indiceAtual >= listaJogo.length) { finalizarJogo(); return; }
        podeClicar = true;
        const item = listaJogo[indiceAtual];
        document.getElementById('img-pergunta').src = item.imagem; 
        document.getElementById('feedback').innerHTML = "";
        document.getElementById('silabas-reveladas').innerText = "";
        document.querySelectorAll('.btn-numero').forEach(btn => btn.className = 'btn-numero');
    }

    function verificar(escolha, btnCuidado) {
        if (!podeClicar) return;
        const item = listaJogo[indiceAtual];
        const correta = item.num;
        podeClicar = false;

        if (escolha === correta) {
            estrelas++;
            document.getElementById('contador-estrelas').innerText = estrelas;
            btnCuidado.classList.add('correto');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--verde)'>Muito bem! ✨</span>";
            document.getElementById('silabas-reveladas').innerText = item.divisao || item.palavra.toUpperCase();
            setTimeout(proxima, 2000);
        } else {
            btnCuidado.classList.add('errado');
            document.querySelectorAll('.btn-numero')[correta - 1].classList.add('correto');
            document.getElementById('feedback').innerHTML = "<span style='color: var(--vermelho)'>Eram " + correta + " sílabas.</span>";
            document.getElementById('silabas-reveladas').innerText = item.divisao || item.palavra.toUpperCase();
            setTimeout(proxima, 3000);
        }
    }

    function proxima() { indiceAtual++; carregarPergunta(); }

    function finalizarJogo() {
        document.getElementById('jogo-container').innerHTML = `
            <h2>🏆 Jogo Terminado!</h2>
            <p style="font-size: 24px;">Conseguiste <strong>${estrelas}</strong> estrelas!</p>
            <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; cursor: pointer; background: var(--azul-escuro); color: white; border: none; font-weight: bold; font-size: 18px; margin-top: 20px;">Jogar de Novo</button>
        `;
    }

    window.onload = carregarPergunta;
</script>
<script src="js/componentes.js"></script>
</body>
</html>
