<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👏 Quantas Sílabas? 👏</title>
    <style>
        :root {
            --azul-claro: #f0f7ff;
            --azul-medio: #7ac7f0;
            --azul-escuro: #0d47a1;
            --verde: #4caf50;
            --laranja: #ff9800;
        }

        /* 1. ESTRUTURA FLEXBOX PARA O FOOTER NO FUNDO */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--azul-claro); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* 2. CABEÇALHO COM CONTRASTE E ALINHAMENTO VERTICAL */
        .cabecalho { 
            background: linear-gradient(135deg, #bde6ff, var(--azul-medio)); 
            padding: 12px 20px; 
            color: var(--azul-escuro); 
            display: flex;
            align-items: center; /* Centraliza verticalmente */
            justify-content: space-between;
            
            /* Contraste de transição */
            border-bottom: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; }

        .cabecalho-conteudo { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex: 2;
        }

        .icone-cabecalho { width: 90px; height: auto; }

        /* 3. BOTÃO MENU COM ANIMAÇÃO E ÍCONE MAIOR */
        .btn-menu {
            background: var(--laranja);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            /* Animação de entrada */
            animation: pulse 2s infinite;
        }

        .btn-menu span { 
            font-size: 1.4rem; /* Ícone da casa maior */
        }

        .btn-menu:hover {
            transform: scale(1.1);
            background: #e68a00;
            animation: none; /* Pára de pulsar ao interagir */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }

        /* 4. CONTEÚDO DO JOGO */
        #main-content {
            flex-grow: 1; /* Empurra o footer */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .seccao-estrelas {
            background: rgba(255,255,255,0.4);
            width: 100%;
            padding: 8px 0;
            color: #f57c00;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .cartao {
            background: white; width: 95%; max-width: 500px;
            padding: 30px 20px;
            border-radius: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .imagem-pergunta {
            height: 180px; width: 180px; object-fit: contain;
            border: 4px solid var(--azul-claro); border-radius: 20px; padding: 10px;
        }

        /* 5. FOOTER PADRÃO */
        footer {
            margin-top: auto;
            padding: 20px;
            background: #fff;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

<header class="cabecalho">
    <div class="header-left">
        <button class="btn-menu" onclick="window.location.href='index.html'">
            <span>🏠</span> Menu
        </button>
    </div>

    <div class="cabecalho-conteudo">
        <img src="palmas.png" class="icone-cabecalho" alt="palmas"> 
        <h1 style="margin:0">Quantas Sílabas?</h1>
    </div>

    <div class="header-right">
        </div>
</header>

<div class="seccao-estrelas">
    ⭐ Estrelas: <span id="contador-estrelas">0</span>
</div>

<main id="main-content">
    <div class="cartao" id="jogo-container">
        <img id="img-pergunta" class="imagem-pergunta" src="">
        <div style="font-size: 1.4rem; font-weight: bold; color: var(--azul-escuro);">
            Quantas vezes bates as palmas? 👏
        </div>
        
        <div style="display: flex; gap: 15px; margin-top: 10px;">
            <button class="btn-numero" onclick="verificar(1, this)">1</button>
            <button class="btn-numero" onclick="verificar(2, this)">2</button>
            <button class="btn-numero" onclick="verificar(3, this)">3</button>
            <button class="btn-numero" onclick="verificar(4, this)">4</button>
        </div>

        <div id="feedback" style="min-height: 40px; font-weight: bold; font-size: 1.5rem;"></div>
        <div id="silabas-reveladas" style="font-size: 2rem; color: var(--laranja); font-weight: bold;"></div>
    </div>
</main>

<footer>
    <p style="margin: 0;">
        <span style="color: var(--azul-escuro); font-weight: bold;">2026</span> 🏫 
        <a href="https://eb1pemarinheira.pt/" target="_blank" style="color: var(--azul-escuro); text-decoration: none; font-weight: bold;">EB1/PE da Marinheira</a>
    </p>
</footer>

<script src="js/dados.js"></script>
<script>
    // Lógica do jogo (verificar, carregarPergunta, etc.) igual ao teu original
</script>
</body>
</html>
