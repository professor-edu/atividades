<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Estoura o Balão!</title>

<style>
    body {
        margin: 0;
        background: #f2f7ff;
        font-family: Arial, sans-serif;
        text-align: center;
        overflow: hidden;
    }

    header {
        background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
        border-bottom: 4px solid #7ac7f0;
        padding: 20px;
    }

    header h1 {
        margin: 0;
        color: #155a8a;
        font-size: 2.3rem;
    }

    #tab-select {
        margin-top: 20px;
        padding: 10px;
        border-radius: 10px;
        border: 2px solid #7ac7f0;
        font-size: 1.2rem;
    }

    #score {
        margin-top: 15px;
        font-size: 1.4rem;
        color: #155a8a;
    }

    /* Balões */
    .balloon {
        position: absolute;
        bottom: -100px;
        width: 70px;
        height: 90px;
        background: #ffc8dd;
        border-radius: 50%;
        box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.6rem;
        border: 3px solid #ff8fab;
        cursor: pointer;
        animation: rise 6s linear forwards;
    }

    @keyframes rise {
        from { bottom: -120px; }
        to { bottom: 120vh; }
    }

    .correct {
        background: #c8f7c5 !important;
        border-color: #2ecc71 !important;
    }

    .wrong {
        background: #ffd4d4 !important;
        border-color: #ff6b6b !important;
    }

    /* Final */
    #final-screen {
        display: none;
        margin-top: 80px;
        color: #155a8a;
    }

    #medal {
        width: 150px;
        margin-top: 20px;
    }

    #restart {
        margin-top: 20px;
        background: #4c8bff;
        color: white;
        padding: 12px 30px;
        border-radius: 10px;
        border: none;
        font-size: 1.3rem;
        cursor: pointer;
    }

</style>
</head>

<body>

<header><h1>Estoura o Balão!</h1></header>

<select id="tab-select" onchange="startGame()">
    <option value="">Escolhe a tabuada</option>
    <option value="2">Tabuada do 2</option>
    <option value="3">Tabuada do 3</option>
    <option value="4">Tabuada do 4</option>
    <option value="5">Tabuada do 5</option>
    <option value="6">Tabuada do 6</option>
    <option value="7">Tabuada do 7</option>
    <option value="8">Tabuada do 8</option>
    <option value="9">Tabuada do 9</option>
    <option value="10">Tabuada do 10</option>
</select>

<div id="score">Pontos: 0</div>

<div id="final-screen">
    <h2 id="final-title"></h2>
    <p id="final-info"></p>
    <img id="medal">
    <br>
    <button id="restart" onclick="startGame()">Recomeçar</button>
</div>

<script>
let tabuada = null;
let acertos = 0;
let erros = 0;
let pontos = 0;
let multiplos = [];
let estourados = 0;
let intervaloBalões = null;

function startGame() {
    tabuada = Number(document.getElementById("tab-select").value);
    if (!tabuada) return;

    acertos = 0;
    erros = 0;
    pontos = 0;
    estourados = 0;

    document.getElementById("final-screen").style.display = "none";
    document.getElementById("score").textContent = "Pontos: 0";

    multiplos = [];
    for (let i = 1; i <= 10; i++) multiplos.push(i * tabuada);

    clearInterval(intervaloBalões);
    intervaloBalões = setInterval(criarBalao, 1500);
}

function criarBalao() {

    if (estourados === multiplos.length) {
        clearInterval(intervaloBalões);
        setTimeout(fimDoJogo, 1500);
        return;
    }

    let numero = Math.floor(Math.random() * 80) + 1;

    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.floor(Math.random() * 80) + "%";
    b.textContent = numero;

    b.onclick = () => clicarBalao(b, numero);

    document.body.appendChild(b);

    setTimeout(() => b.remove(), 6500);
}

function clicarBalao(balao, numero) {

    if (multiplos.includes(numero)) {
        balao.classList.add("correct");
        acertos++;
        pontos++;
        estourados++;
    } else {
        balao.classList.add("wrong");
        erros++;
        pontos = Math.max(0, pontos - 1);
    }

    document.getElementById("score").textContent =
        "Pontos: " + pontos;

    setTimeout(() => balao.remove(), 300);
}

function fimDoJogo() {
    document.getElementById("final-screen").style.display = "block";

    let percent = Math.round((acertos / multiplos.length) * 100);

    let medal =
        percent >= 80 ? "https://openmoji.org/data/color/svg/1F947.svg" :
        percent >= 60 ? "https://openmoji.org/data/color/svg/1F948.svg" :
        percent >= 40 ? "https://openmoji.org/data/color/svg/1F949.svg" :
                        "https://openmoji.org/data/color/svg/1F614.svg";

    document.getElementById("final-title").textContent =
        "Jogo completo!";

    document.getElementById("final-info").innerHTML =
        `Acertos: ${acertos}<br>
         Erros: ${erros}<br>
         Percentagem: ${percent}%`;

    document.getElementById("medal").src = medal;
}
</script>

</body>
</html>
