<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu das Tabuadas</title>

<style>
    body {
        margin: 0;
        background: #f2f7ff;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    header {
        padding: 20px 0;
        background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
        border-bottom: 4px solid #7ac7f0;
    }

    header h1 {
        margin: 0;
        color: #155a8a;
        font-size: 2.5rem;
    }

    .grid {
        margin: 40px auto;
        max-width: 900px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
        gap: 25px;
        padding: 10px;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        text-decoration: none;
        color: #155a8a;
        font-size: 1.4rem;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: 0.2s;
    }

    .card:hover {
        background: #bde6ff;
        transform: scale(1.05);
    }

    .card img {
        width: 70px;
        margin-bottom: 12px;
    }
</style>
</head>

<body>

<header>
    <h1>Jogos das Tabuadas</h1>
</header>

<div class="grid">

    <a class="card" href="corrida_tabuadas.html">
        <img src="https://openmoji.org/data/color/svg/1F697.svg">
        Corrida das Tabuadas
    </a>

    <a class="card" href="puzzle_tabuadas.html">
        <img src="https://openmoji.org/data/color/svg/1F9E9.svg">
        Puzzle da Tabuada
    </a>

    <a class="card" href="torre_tabuadas.html">
        <img src="https://openmoji.org/data/color/svg/1F3D7.svg">
        Torre das Labirinto da Tabuada
    </a>

    estoura_balao_tabuadas.html
        https://openmoji.org/data/color/svg/1F388.svg
        Estoura o Balão
    </a>

    padroes_tabuadas.html
        https://openmoji.org/data/color/svg/1F522.svg
        Padrões da Tabuada
    </a>

</div>

</body>
</html>
