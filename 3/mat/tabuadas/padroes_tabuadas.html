<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Padrões das Tabuadas</title>

<style>
    body {
        margin: 0;
        font-family: Arial;
        background: #f2f7ff;
        text-align: center;
    }

    header {
        background: linear-gradient(to bottom, #bde6ff, #e8f7ff);
        border-bottom: 4px solid #7ac7f0;
        padding: 20px;
    }

    h1 {
        margin: 0;
        color: #155a8a;
        font-size: 2.3rem;
    }

    #tab-select {
        margin-top: 20px;
        padding: 10px;
        font-size: 1.3rem;
        border-radius: 10px;
        border: 2px solid #7ac7f0;
    }

    #grid {
        margin: 30px auto;
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 10px;
        max-width: 600px;
    }

    .cell {
        background: white;
        padding: 15px;
        border-radius: 10px;
        font-size: 1.3rem;
        box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        cursor: pointer;
        user-select: none;
        border: 2px solid transparent;
    }

    .correct { 
        background: #c8f7c5;
        border-color: #2ecc71;
    }

    .wrong { 
        background: #ffd4d4; 
        border-color: #ff6b6b;
    }

    #progress-container {
        width: 90%;
        height: 18px;
        background: #cfe0ff;
        border-radius: 10px;
        margin: 20px auto;
    }

    #progress {
        height: 100%;
        width: 0%;
        background: #4c8bff;
        border-radius: 10px;
        transition: width .4s;
    }

    #score {
        font-size: 1.4rem;
        color: #155a8a;
        margin-top: 10px;
    }

    #final-screen {
        display: none;
        margin-top: 30px;
    }

    #medal {
        width: 120px;
        margin-top: 20px;
    }
body { scrollbar-gutter: stable; }
</style>
</head>

<body>

<header>
    <h1>Padrões das Tabuadas</h1>
</header>

<select id="tab-select" onchange="startGame()">
    <option value="">Escolhe a tabuada</option>
    <option value="2">Tabuada do 2</option>
    <option value="3">Tabuada do 3</option>
    <option value="4">Tabuada do 4</option>
    <option value="5">Tabuada do 5</option>
    <option value="6">Tabuada do 6</option>
    <option value="7">Tabuada do 7</option>
    <option value="8">Tabuada do 8</option>
    <option value="9">Tabuada do 9</option>
    <option value="10">Tabuada do 10</option>
</select>

<div id="progress-container">
    <div id="progress"></div>
</div>

<div id="score">Pontos: 0</div>

<div id="grid"></div>

<div id="final-screen">
    <h2 id="final-title"></h2>
    <p id="stats"></p>
    <img id="medal">
    <br><br>
    <button onclick="startGame()">Recomeçar</button>
</div>

<script>
let tabuada = null;
let pontos = 0;
let acertos = 0;
let erros = 0;
let totalMultiplos = 0;

function startGame() {
    tabuada = Number(document.getElementById("tab-select").value);
    if (!tabuada) return;

    pontos = 0;
    acertos = 0;
    erros = 0;

    document.getElementById("score").textContent = "Pontos: 0";
    document.getElementById("final-screen").style.display = "none";

    generateGrid();
}

function generateGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    totalMultiplos = 0;
    for (let i = 1; i <= 100; i++) {
        if (i % tabuada === 0) totalMultiplos++;
    }

    for (let i = 1; i <= 100; i++) {
        let cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = i;

        cell.onclick = () => check(i, cell);

        grid.appendChild(cell);
    }

    updateProgress();
}

function check(number, cell) {

    if (cell.classList.contains("correct") || cell.classList.contains("wrong")) return;

    if (number % tabuada === 0) {
        cell.classList.add("correct");
        pontos += 1;
        acertos++;
    } else {
        cell.classList.add("wrong");
        pontos = Math.max(0, pontos - 1);
        erros++;
    }

    document.getElementById("score").textContent = "Pontos: " + pontos;

    updateProgress();

    if (acertos === totalMultiplos) endGame();
}

function updateProgress() {
    let percent = (acertos / totalMultiplos) * 100;
    document.getElementById("progress").style.width = percent + "%";
}

function endGame() {
    document.getElementById("final-screen").style.display = "block";

    const percent = Math.round((acertos / totalMultiplos) * 100);

    let medal = "";
    if (percent >= 80) medal = "https://openmoji.org/data/color/svg/1F947.svg";
    else if (percent >= 60) medal = "https://openmoji.org/data/color/svg/1F948.svg";
    else if (percent >= 40) medal = "https://openmoji.org/data/color/svg/1F949.svg";
    else medal = "https://openmoji.org/data/color/svg/1F614.svg";

    document.getElementById("final-title").textContent =
        "Completo! Tabuada do " + tabuada;

    document.getElementById("stats").innerHTML =
        `Acertos: ${acertos}<br>Erros: ${erros}<br>Percentagem: ${percent}%`;

    document.getElementById("medal").src = medal;
}
</script>

</body>
</html>
