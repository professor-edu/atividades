<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3º Ano 🔍</title>
    
    <link rel="icon" type="image/png" href="../logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f0f4f8;
            --azul-vibrante: #0091ff; /* Azul fixo para as borders */
            --cor-3ano: #ffabab;     /* Rosa Coral/Salmão da imagem */
            --cor-3ano-dark: #ff8a8a;
            --bg-header: #fff0f0;    /* Fundo coral muito suave */
            --azul-escuro: #0d47a1;
            --text-main: #455a64;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            text-align: center; 
            background-color: var(--bg-body); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* HEADER COM BORDER AZUL FIXA */
        header {
            background-color: var(--bg-header);
            padding: 25px 20px;
            border-bottom: 1px solid var(--azul-vibrante);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        /* HAMBURGER COM HOVER SUAVE AMARELO */
        .hamburger {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.4s ease;
        }
        .hamburger:hover {
            background: #fff9c4; 
        }

        .hamburger span { 
            display: block; width: 20px; height: 2px; 
            background: var(--azul-escuro); 
            transition: 0.3s;
            transform-origin: center;
        }
        
        .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

        /* BOTÃO VOLTAR COM SETA E COR DO ANO */
        .btn-voltar {
            background: #fda4a4;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 var(--cor-3ano-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-voltar:hover { transform: scale(1.05); }

        h1 { color: var(--azul-escuro); font-size: clamp(1.4rem, 5vw, 2.2rem); margin: 0; display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        /* NOVO TAMANHO DE FONTE E MARGEM DE 15PX */
        .subtitulo { 
            color: var(--azul-escuro); 
            font-size: clamp(0.85rem, 3vw, 1.1rem); 
            font-weight: 500; 
            opacity: 0.8; 
            margin-top: 15px; 
        }

        @media (max-width: 768px) {
            header { padding: 15px 10px; }
            .header-content { display: grid; grid-template-columns: 50px 1fr 50px; grid-template-rows: auto auto; gap: 5px; }
            .nav-container { position: static; transform: none; grid-column: 1 / -1; display: grid; grid-template-columns: 50px 1fr 50px; width: 100%; margin-bottom: 10px; }
            .hamburger { grid-column: 1; justify-self: start; }
            .btn-voltar { grid-column: 2; justify-self: center; width: fit-content; }
            h1, .subtitulo { grid-column: 2; }
        }

        /* SIDEBAR COM HOVER DA COR DO ANO */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: white; z-index: 200; transition: 0.4s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); text-align: left; }
        .sidebar.active { left: 0; }
        .sidebar .btn-fechar { background: #fff5f5; color: #ff4757; padding: 20px 25px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; border-bottom: 1px solid #ffebeb; }
        .sidebar ul { list-style: none; padding: 15px; margin: 0; }
        .sidebar li a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: var(--text-main); background: #f8fafc; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .sidebar li a:hover { background: var(--cor-3ano); transform: translateX(8px); color: white; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 150; }
        .overlay.active { display: block; }

        main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .grid-disciplinas { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 1000px; width: 100%; }
        
        /* BORDAS DAS DISCIPLINAS DIFERENTES */
        .cartao-disciplina { 
            background: white; flex: 0 1 220px; aspect-ratio: 1/1; border-radius: 30px; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); 
            border: 1px solid #eee; transition: 0.3s;
        }
        .cartao-disciplina:hover { transform: translateY(-10px); }
        
        .c-port { border-top: 8px solid #ff6b6b; }  
        .c-mat { border-top: 8px solid #4dabf7; }   
        .c-estudo { border-top: 8px solid #51cf66; } 

        .icone-wrapper { font-size: 4rem; }
        .nome-disciplina { color: var(--azul-escuro); font-weight: 700; font-size: 1.3rem; }

        /* FOOTER UNIVERSAL COM BORDER AZUL */
        footer { height: 45px; display: flex; align-items: center; justify-content: center; background: white; border-top: 1px solid var(--azul-vibrante); }
        footer p { font-size: 0.8rem; color: var(--azul-vibrante); margin: 0; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav class="sidebar" id="sidebar">
    <div class="btn-fechar" onclick="toggleMenu()"><span>✕</span> Fechar</div>
    <ul>
        <li><a href="../index.html">🏠 Início</a></li>
        <li><a href="../pre/index.html">🎨 Pré-Escolar</a></li>
        <li><a href="../1/index.html">🎒 1º Ano</a></li>
        <li><a href="../2/index.html">💡 2º Ano</a></li>
        <li><a href="index.html">🔍 3º Ano</a></li>
        <li><a href="../4/index.html">🚀 4º Ano</a></li>
    </ul>
</nav>

<header>
    <div class="header-content">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
            <a href="../index.html" class="btn-voltar">⬅️ Voltar</a>
        </div>
        
        <h1>🔍 3º Ano 🔍</h1>
        <div class="subtitulo">O que vamos aprender hoje?</div>
    </div>
</header>

<main>
    <div class="grid-disciplinas">
        <a href="portugues/index.html" class="cartao-disciplina c-port">
            <div class="icone-wrapper">✍️</div>
            <span class="nome-disciplina">Português</span>
        </a>
        <a href="matematica/index.html" class="cartao-disciplina c-mat">
            <div class="icone-wrapper">🔢</div>
            <span class="nome-disciplina">Matemática</span>
        </a>
        <a href="estudo-meio/index.html" class="cartao-disciplina c-estudo">
            <div class="icone-wrapper">🌍</div>
            <span class="nome-disciplina">Estudo do Meio</span>
        </a>
    </div>
</main>

<footer>
    <p><span id="ano-atual"></span> 🏫 <a href="https://eb1pemarinheira.pt/" target="_blank" style="color:inherit; text-decoration:none; font-weight:700;">EB1/PE da Marinheira</a></p>
</footer>

<script>
    document.getElementById('ano-atual').innerText = new Date().getFullYear();
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const hamburger = document.getElementById('hamburgerBtn');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
        hamburger.classList.toggle('open');
    }
</script>
</body>
</html>
